body:
  text: 事實類苑卷二十六宋江少虞撰官職儀制賜毬露金帶毬露金帶俗謂之笏頭帶非二府大臣不得賜武臣而得賜者惟張耆為樞宻使李用和以元舅王貽永為駙馬都尉李昭亮亦戚里四人者皆兼侍中出於特恩東齋記亊職田天聖七年晏元獻公奏朝廷置職田葢欲稍資俸給其官吏不務至公以差遣徇私僥倖者極衆屢致訟言上煩聴覽欲乞停罷時可其奏但令佃户逐年收課利類聚天下都數紐價均散見任官員至九年二月忽降勅國家均敷職田以勵清白向因僥倖遂行停罷風聞縉紳之間持亷守道者甚衆苦節難守宜布明恩悉仍舊貫審官三班流内銓今後將有無職田處均濟公平定奪差遣不得徇私湘山野錄賜常參官冬衣建隆二年十月賜近臣冬衣有司言累代故事止賜將相學士諸軍大校太祖曰不賜常㕘官甚無謂也宜亦賜之自是文武常㕘官悉賜冬衣自此始玉壺清話宰樞聚㕔見客王元之常謂宰相于政事堂樞宻於都堂同時見客不許本㕔私接識者以為是疑大臣以私也遂寢或以元之所請為當但難其率宰相于政事堂共見耳其後二府乞以朝退時聚㕔見客以杜請謁從之率如元之言澠水燕談二天禧中宰臣奏中書樞宻院接見賔客然兩府慎宻之地亦欲咨訪天下之良楛早暮接待勿滯留機務又分㕔言事各有異同欲今後中書樞宻院每有所在外得替又在京主執臣僚如有公事並逐日於巳時以前聚㕔見客已分㕔即俟次日急速者不在此限非公事不得到中書樞宻院玉壺清話學士預曲宴承旨預肆赦故事便殿宴勞將帥翰林學士預坐開寳中閣門使梁迥輕鄙儒士啟太祖以曲宴將相安用此書生輩遂罷之淳化中蘇易簡知政事始引故事為請自今後當直學士與樞宻直學士並預長春殿曲宴又引元闕承旨㕔記御樓肆赦惟承旨得升丹鳳樓之西南隅楊文公談苑前兩府白事宰相掇案熈寜中曽孝寛以端明殿學士簽書樞宻公事未幾以父魯公解去服除判司農事舊例百官以事至中書即宰相據案百官北向而坐前兩府白事即宰相案去叙賔主東西行坐時謂之掇案及孝寛之至司農也呉正憲公當國不以前兩府禮待之每至中書不為掇桉自後每有建白止令同判寺太常博士周直孺請中書孝寛不至矣正憲頗疑之未幾除直孺為兩浙提刑以張璪判寺事璪為翰林學士班在端明之上乃本寺官長也異時白事皆璪詣中書而孝寛亦竟不至於是正憲知其果以掇案為嫌而出譏其隘矣兩制下獄仁宗朝兩制近臣得罪雖有贓汚亦止降為散官無下獄者旋亦收叙熈寜初龍圖直學士祖無擇始以臺官下秀州獄是時鄭獬知杭州上章救解言甚切直自後許將沈季長劉奉世舒亶相繼下臺獄而天下習熟見聞莫有為之救解者東軒筆錄前任班趂辨唐朝闕闕則補之後唐長興二年詔諸州得替節度防禦團練副使並令隨常朝官逐日立班二年放免常朝令五日赴起居國初尚多前資官令閣門儀制尚有見任前任防禦團練使倦逰襍録節度使罷除降麻不降麻真宗時丁晉公謂自平江節度使除兵部尚書㕘知政事節度使當降麻而朝闕惜之遂以制除近者陳相執中罷使相除僕射乃降麻龎籍罷節度使觀文殿學士又不降麻葢無定制也樞宻使除罷降麻不降麻嘉祐二年樞宻使田公况罷為尚書太丞觀文殿學士兼翰林院侍讀學士罷樞宻使當降麻而止以制除盖徃時髙若訥罷樞宻使所除官職正與田公同亦不降麻遂以為故事二漢乾祐中除樞宻使始降麻如將相之制本朝循之石元懿罷為僕射亦降麻髙文莊曰宣簡吕寳臣罷止舍人院出春明退朝録三衙官不敢謁舍人逢之則立馬寳元康定之間余自貶所還過京見王君貺初作舍人自契丹使歸余在坐見都知押班殿前馬步軍聯騎立門外呈牓子稱不敢求見舍人遣人謝之而去至慶厯三年余作舍人此禮已廢然三衙管軍臣僚于道路相逢望見舍人呵引者即歛馬駐立前呵者傳聲太尉立馬即遣人謝之比舍人馬過然後敢行後官於外十年而還遂入翰林學士見三衙呵引甚雄不復如當時與學士相逢分道而過更無歛避之禮盖兩制漸輕而三衙漸重有偶出一時而為故事者朝廷之制有因偶出一時而遂為故事者契丹人使見辭賜宴雜學士員雖多皆赴坐惟翰林學士祇召當直一員餘皆不赴諸王宫教授入謝祖宗特偶因便殿不御袍帶見之至今教授入謝必俟上入内解袍帶復出見之有司皆以為定制也三班喫香羣牧喫糞三班院所領使臣八十餘人涖事於外其罷而在院者常數百人每歳乾元節醵錢飯僧進香合以祝聖夀謂之香錢判院官常利其餘以為餐錢羣牧司領内外坊監使判官比他司俸入最優又歳收糞墼錢頗多以充公用故京師為之語曰三班喫香羣牧喫糞是也官稱訛謬官制廢久矣今其名稱訛謬者多雖士大夫皆從俗不以為怪皇女為公主其夫必拜駙馬都尉故謂之駙馬宗室女封郡主者謂其夫為郡馬封縣主者為縣馬不知何義唐制三衙有司階司戈執干執㦸謂之四色官今三衙廢無官惟金吾有一人每日為正衙放朝唱不坐直謂之四色官尤可笑也樞宻使侍宴賜衣循唐舊國朝之制大宴樞宻使副不坐侍立殿上既而退就御厨賜食與閣門引進四方舘使列坐簾下親王一人伴食每春秋賜衣門謝則與内諸司副使班於垂拱殿外廷中而中書則别班謝於門上故朝中為之語曰厨中賜食階下謝衣葢樞宻使唐制以内臣為之故常與内諸司使副為伍自後唐荘宗用郭崇韜與宰相分秉政文事出中書武事出樞宻自此之後其權漸盛至本朝遂號為兩府事權進用禄賜禮遇與宰相均惟趨内朝侍宴賜衣等事尚循唐舊制其任隆輔弼之崇而雜用内諸司故事使朝廷制度輕重失序盖沿革異時因循不能釐正也歸田録禮遇講讀官崇政殿之西有延義閣南向近陽門之北有邇英閣東向皆講讀之所也仁宗皇帝新即位多御延義閣每初講讀終篇則宣二府大臣同聽賜飛白書或遂賜宴其後不復御延義專御邇英春以二月中起至端午罷秋以八月中起至冬至罷講讀官移門上賜食俟後殿公事退繋闕以入宣坐賜茶就南壁下以賜坐復以次起講讀之宣坐賜湯其禮數恩渥雖執政大臣亦莫得與也澠水燕談堂劄子唐中書指揮謂之堂帖子曽見唐人堂帖宰相簽押如今之堂劄子也宣頭予為史舘檢討時樞宻院劄子問宣頭所起余按唐故事中書舍人職掌詔誥皆冩四本一本為底一本為宣此宣謂行出耳未以名書也晚唐樞宻使自禁中受旨出付中書即謂之宣中書丞受録之於籍謂之宣底今史舘中尚有梁室底三卷如今之聖語簿也梁朝初置崇政院專行宻命至後唐荘宗復樞宻使郭崇韜安重誨為之始分領政事不闗由中書直行下者謂之宣如中書之勅小事則廢發頭子擬唐帖也至今樞宻院亦用劄子中書劄子宰相押字在上次相及參政以次向下樞宻劄子樞長押字在下副二以次向上以次為别頭子繼給驛馬之類用也湘山野録宣勅樞宻院問龍宣故事具故申院按今有梁朝宣底二本載朱梁貞明四年三年事每事下有月日云臣李振宣或除官差官或宣事於方鎮等處其間有云宣頭宣命宣旨者梁朝以樞宻院為崇政院始置使以大臣領之任以政事貞明四年李振為使當時以宣傳上旨故名之曰宣而樞宻院所出文字之名也似欲與中書勅並行雖無所明見疑降宣始自朱梁之時晉天福五年改樞宻承旨為承宣亦似相合其底乃底本也係日月姓名者此所以為底本今尚仍舊名熈寜七年六月十三日或問今之勅起於何時按蔡邕獨㫁曰天子下書有四一曰䇿書二曰制書三曰詔書四曰戒勅然自隋唐以来除改百官必有告敕而從勅字予家有景龍年敕其制盖須由中書門下省故劉禕之云不經鳳閣鸞臺何謂之敕唐時政事堂在門下省而除擬百官必中書令宣侍郎奉舍人行進入畫勅字此所以為勅也然後政事堂出牒布於外所以云牒奉勅云云也慶厯中予與蘇子美同在舘子美嘗攜其逺祖珦唐時勅數本來觀與予家者一同字書不載勅令非近世所用也春明退朝録百官拜宰相百官於中書見宰相九卿而下臺省吏髙聲唱一聲屈則趨而入宰相揖及進茶皆抗聲贊喝謂之屈揖待制以上見則言請某官吏不屈揖臨退仍進湯皆於席面南横設百官之位升朝坐京官以下皆立後殿引臣僚則待制以上宣名拜舞闕官但贊拜不宣名不舞蹈中書略貴者不示與之抗也上前則略微闕者殺禮也籠門謝唐制丞郎拜官即籠門謝今三司副使以上拜官則拜舞蹈于門下百官拜于門下亦不舞蹈此亦籠門故事也湘山野録都堂及寺舘百官㑹集坐次都堂及寺舘百官㑹拜坐次多出臨時唐以前故事皆不可考惟顔真卿與左僕射定襄郡國王郭英文書云宰相御史大夫兩省五品供奉官自為一行十二衛大將軍次之三師三公太僕少師保傅尚書左右丞侍郎自為一行九卿三監對之從古以来未嘗參錯此亦略見當時故事今録於此以備闕文湘山野録請修時政記梁修撰周幹一歳後苑燕從臣各探韻賦詩得春字曰百花將盡牡丹拆十雨初晴太液春上特稱之為史舘修撰上疏自今崇德長春二殿皇帝之言侍臣論列之事令中書修為時政記其樞宻院使涉機宻亦令本院編修至月終送史舘其餘百司凡于對拜除授沿革之事悉條報本院仍令舍人分直皆從之玉壺清話宰相許纔午歸第太祖受禪以趙韓王普有佐命功勲除右諫議大夫樞宻直學士未幾范質罷相以公為門下侍郎平章事既冠台符參搃朝權參政李餘慶薛居正雖副之但奉行制書備位而已不宣制不預奏事不押班每候對長春殿啓沃小大之務盡決於公兼權之議喧于時論㑹李繼遷擾邊用公計封趙保忠守夏臺闕池令滅之保忠反與繼遷合謀大為邊患河西極撓罪歸於公因不得專政詔令㕘政長史即押班奏事分其權也舊制宰相報到未刻方出中闕會歳大熟特許云纔午歸第遂為永制玉壺清話丁晉公自節度使以制除㕘政丁晉公自保信軍節度使知江寜府召為㕘知政事中書以丁節度使召學士草麻時盛文肅為學士以為㕘知政事合用舍人草制遂以制除丁甚恨之倦游襍錄納節不降麻唐制節度使僕射尚書侍郎謂之納節皆不降麻止舍人院出制天禧中丁晉公自保信軍節度使除吏部尚書參知政事先公在西閣當制至和中韓魏公自武康軍節度使除工部尚書三司使降麻非故事也請立家廟者子孫襲三品階勲及爵皇祐中宗衮請置家廟下兩制禮官議以為廟室若當靈長身殁而子孫官微則廟隨毁請以其子孫襲三品階勲及爵庶常得奉祀不報文武官朝㕘唐在京文武職事九品以上朔望日朝其文官五品以上官及監察御史員外郎太常博士每日㕘武官五品以上仍每月五日十一日二十一日二十五日㕘三品以上九日十九日二十九日又㕘其長上折衝果毅若文武散官五品以上直諸司及長上者各准職事㕘其昭文舘及國子監博士每季㕘若雨露沾服失容及泥潦並假以上唐儀制凡今在京百司有常㕘官謂五品以上職事八品以上供奉官以上唐大典貞觀元年勅文官充翰林學士皇太子諸王侍讀武官充禁軍職事並不常朝㕘其在三舘等諸職掌者並朝㕘訖各歸所務是年御史中丞竇闕奏常㕘文官准令每日㕘自艱難以来遂許分日得待戎事稍平即依常式其武准令五品以上每月六㕘三品以上每月六㕘二品以上更加三㕘頃並停廢今請准令却復舊儀十三年御史奉奏諸司常㕘文官隔三日益以横行㕘假其武班每日先配九㕘六㕘九㕘謂一月九次六㕘謂一月六次今後每經三節假滿縱不是配八日並令文官例横行㕘假以上唐要典後唐同光二年四方舘㕘令後除隨駕將校及外方進奉專使文武兩班三品以上官可於殿内對見其餘並詣正衙從之天成元年御禮文武百僚每日正衙常朝外五日一赴内殿起居每月朔望日賜廊下食唐室太平時常㕘官每日入朝謂之廊餐自乾符離亂罷之惟月旦入閣日賜食明宗即位請文武百僚五日一起居見對於便殿李琪以為非故事以五日為𦂳請每月朔望日入閣賜廊下食罷五日起居之儀至是宣旨朔望閣外五日一起居遂以為常天成元年勅今後若遇不坐正殿未御内殿前便令閣門使傳宣不坐朝班退是年御史臺奏凡新除官及差使者合於正衙謝辭若遇内殿起居日百官不於正衙叙班其差使及新除官辭謝不得合㕘謝每内殿起居日百僚先叙於文明殿庭後謝官退則班入内殿從之晉天福二年中書門下奏在廷諸司使等每除正官諸令赴正衙謝後不赴常朝其京官未升朝官秪赴朔望日朝班從之國朝諸在京升朝官每日朝其制免常朝者五日一㕘起居國朝令文掌唐制文武職事官並赴常㕘武班五日一㕘又有三日一㕘五日㕘為朔望為六㕘三日㕘乃九㕘所謂常㕘官未有無闕者由後唐同光中乃常朝内殿凡隨駕官將校及外方進奉使文武三品以上官即于内殿對見其餘並詣正衙至天成初詔文武百官每日常朝外五日一赴内殿起居其趨朝官遇宣不坐放朝各退歸司本朝之制文德殿曰外朝以不釐務朝臣日赴是謂常朝垂拱殿曰内殿宰臣樞宻以下要近職事者并班闕日赴是謂常起居每日文武朝臣釐務不釐務並赴内朝謂之百官大起居是則奉朝之制自為三等盖天子坐朝莫先於正衙殿于禮羣臣無一日不朝有故正衙雖不坐常參官獨立班後放朝乃退凡有職事謂之常朝今格外朝不釐務者謂之常㕘參假横行之禮舊制凡連假三日而著於令者宰相至升朝官盡赴文德殿參假為之横行次日百官乃赴内殿起居闕年連假後多便起居而廢横行之禮宰執押知印開寳六年六月敕參知政事薛居正李餘慶於都堂與宰臣趙普同議公事是月又勅中書門下押班知印及祠祭行香今後宜令宰臣趙普與參知政事薛居正李餘慶輪知七月既而復有釐革二雍熈四年文德殿前始置㕘政位在宰相之後至道中寇莱公為㕘知政事復與宰相輪日知印正衙押班簿位遂與中書門下一班書勅齊列銜街衢並馬宰相使相上事并有公事並升都堂後莱公罷遂詔令宰臣押班知印㕘政止得輪祠祭行香正衙位次宰臣之下立究有公事並與宰臣同升都堂如宰臣使相上事即不得升景德四年六月勅臣僚自外到闕及在京主執如有公事並逐日於己時以前中書樞宻院聚㕔相見其後復分㕔見客慶厯八年禁止之如景德之制賜笏頭帶太宗制笏頭帶以賜輔臣其闕服之至祥符中趙文公罷㕘知政事為兵部侍郎後數載除景靈宫副使真宗廷賜御仙花帶與繡韉服御仙帶自後二府罷者學士與散官通服此帶遂以為故事予嘗見蔡文忠公罷㕘知政事為户部侍郎服此帶盖曽為學士用昭文金帶曽經賜者許繫之沂公為翰林及侍讀學士三清遂落職為中書舍人初舊服年皆如此景祐三八月方其宰相罷免雖散官并衣舊服笏帶闕文定公天聖中自秘書監来朝除刑部侍郎并服笏帶其後有罷㕘政者黒帶佩魚而入非故事也入兩府自黒帶賜笏帶者太宗朝甚多祥符中張文節自待制為中丞而㕘知政事天聖中姜侍郎自三司副使為諫議大夫而樞宻並賜如上以上皆春明退朝録事實類苑卷二十六

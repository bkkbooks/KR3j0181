body:
  text: 事實類苑卷六十二宋江少虞撰風俗雜志辰砂辰州硃砂嘉者出蠻峒錦州界狤獠峒老鴉井其井深廣十丈高亦如之欲取必聚薪于井俟滿火燎之石壁迸裂入火者既化為煙氣矣其偶存在壁者方得之乃青石色頑石有砂處即有小龕中坐白石牀如玉牀上乃生丹砂小者如箭鏃大者如芙蓉光如玉罄可鑒研之如猩血砂洎牀大者重七八兩至十兩小者五六兩者亦有赤色如箭鏃者帶石得自土中非此之比也骨羮真宗時有人奉使交趾以骨羮配籠餅而食羮中血皆如皂莢子雖味不甚佳莫知其何以致然洎回苦求其法乃取牛蜱瀹而去其皮耳華清宫故華清宫在繡嶺之下山半有玉蘂峯天聖末豫為學于山之嶺所謂朝元閣者峰側有夾室掛王母之像雖小有損腐之處而丹青未甚暗昧其御階甃以蓮花千條次則一石柱柱端有孔相傳云開元天寶中貫以紅錦紐宫女攀援而上慶厯中再游詢王母之像失之久石柱孔已為庸道士燒為灰而塗壁矣嶺之隂溫泉湧流嶺之南有丹霞泉者極寒冽豫嘗消夏于彼二唐華清宫今靈泉觀也七聖殿之西隅十數步間有皂莢一枝合數人抱條頗相萃相𫝊云明皇洎貴妃共椎莢於此每嵗結實必有十數莢合歡者京兆尹命老卒數十人守視之移接于他枝則不復合歡也杜太監植嘗言南方無好羊洎酪惟魚稻為佳故南人嗜之北方魚稍不多而肉麵為佳故北人嗜之易地則皆然不必相非笑也白石碑江陵北四十里有白石碑驛其西有疏陂東有鴨陂白碑亦當作陂澤之陂也蓋驛側數里有後梁宣明二帝墓唐相蕭嵩為其祠立碑于馹之北因此人以陂為碑誤也虎畏槖駝天禧中有武臣赴官青社齊州北境時河水漸退葭莢阻深武臣以槖駝十數頭負槖篋肩輿夜行有虎蹲于道槖駝既見鳴且逐之虎大怖駭棄三子而赱役卒獲其子而鬻之石魚隴西有地名魚龍出石魚掘地取石破而得之多鯽洎鰍亦有數尾相隨者如以漆描畫鱗鬛稍直燒之尚作魚腥魚龍古之陂澤也豈非魚生其中乎頽塞漸久而土凝為石鼓破之有魚形今衡州有石魚無異隴州者杜甫詩有水落魚龍夜山空鳥鼠秋正謂隴州也沸沙荆江自湖口而上有沸沙船行而抗然而止其下即沙水湧沸舟子無以施其力俄頃即至埋溺為蘆葦五七畨置油米其上焯之船下乃得行石燕零陵出石燕舊傳遇雨則飛嘗見同年謝郎鴻云向在鄉中山寺為學髙巗石上有如燕狀者因以筆識之石為烈日所暴忽有驟雨過所識者往往墮地蓋寒熱相激而迸落非能飛也豫向過永州有人贈一石板上亦有燕形者在焉土人呼為燕窠陽朔石峰桂州左右諸山皆平地拔起數百丈竹木蓊鬱石如黛染陽朔縣地尤佳四面峰巒駢立唐沈水部彬嘗題詩曰陶潛彭澤五株栁潘嶽河陽一縣花兩處何如陽朔好碧蓮峰裏住人家南海啖檳榔南海地氣暑濕人多患胸中痞滯故常啖檳榔日數十口加以勃蔞藤洎蜆灰同咀之液如硃色程思孟知畨禺凡左右侍吏啖檳榔者悉驅之或問其故曰我惡其口唇如潄血耳蟻鮓嶺南暑月欲雨則朽壞中白蟻蔽空而飛入水翅脫化為蝦土人遇夜于水次秉燭蟻見火光悉投水中則以竹篩漉取摶之如合捧每摶一兩闕以豚臠糝之為鮓號天蝦鮓又有大赤蟻作窠于木梢如數升器者取其卵并蟻以糝洎薑鹽釀為鮓云味極辛辣杭人好飾門窗竹器熙寧八年淮浙大旱米價騰湧人多殍饑杭人素輕夸好美潔家有百金必以大半飾門窗具竹器荒歉既甚鬻之不能售多斧之為薪列賣于市往往是金漆薪木饅頭木饅頭亰師亦有之謂之無花果狀類小梨中空既熟色微紅味頗甘酸食之大發瘴嶺南尤多州郡待客多取為茶牀髙飣故云公筵多飣木饅頭或謂嶺南諸州刻木作饅頭狀成刻字云大中祥符年一牒造三十隻談者之過也並倦逰録嶺南人相呼嶺南風俗相呼不以行第唯以各人所生男女小名呼其父母元豐中余任大理丞斷賓州奏案有民韋超男名首即呼韋超作父首韋遨男名滿即呼韋遨作父滿韋全女名插娘即呼韋全作父插韋庶女名睡娘即呼韋庶作父睡妻作嬸睡閩人稱呼閩人謂子為囝謂父為郎罷故顧况有哀閩囝一萹曰囝生閩方閩吏得之乃絶其陽為臧為獲致金滿屋為髠為鉗如視草木天道無知我罹其毒神道無知彼受其福郎罷别囝吾悔生汝及汝既生人勸不舉不從人言果獲是苦囝别郎罷心摧血下隔地絶天及至黃泉不得在郎罷前蓋唐世多取閩童為閹奴以進之故况陳其苦以諷焉並靑箱雜記西域山水昔人文章用北邉事多言黑山黑山在大漠之北今謂之姚家谷有城在西南謂之慶州豫奉使嘗帳宿其下山長數十里土石皆紫黑似今之磁石有水出其下所謂黑水也遼人言黑水原下委髙水曾逆流豫臨視之無此理亦常流耳山在水之東大抵北方水多黑色故有盧龍郡北人謂水為龍盧龍即黑水也黑水之西有連山謂之夜來山其山極髙峻契丹墳墓皆在山之東南麓近西有逺祖射龍廟在山之上有龍舌藏于廟中其形如劍山西别是一族尤為徑悍惟啖生肉血不火食遼人謂之山西族北與黑水部南與達靼接境見筆談洛陽貢花洛陽至亰六驛舊未嘗進花李文定公留守始以花進嵗差府校一人乘馹馬晝夜馳至亰師所進止姚黃魏紫三四朵用菜葉實籠中籍覆上下使馬上不動搖亦所以禦日氣又以蠟封花蒂可數日不落迄今貢不絶見澠水燕談海仙花朐山有花類海棠而枝尤長花尤密惜其不香無子既開繁麗裊娜如曵錦帶故淮南人以錦帶目之王元之以其名俚命之曰海仙而為詩曰春憎窈窕教無子天為妖嬈不與香又曰錦帶為名太卑俗為君呼作海仙花見澠水燕談硯南唐後主留心筆札所用澄心堂紙李廷圭墨龍尾石硯三物為天下之冠自李氏之亡龍尾硯石不復出嘉祐中校理錢仙芝知歙州訪得其所乃大溪也李氏嘗患溪深不可入斷其流使由他道李氏亡居民苦溪之回逺導之如昔石乃絶仙芝移溪還故道石乃復出遂與端溪並行二淄州淄川縣梓桐山石門澗有石曰青金色青黑相雜其文如銅屑或曰即自然銅也理極細密范文正公早居長白山往來于此常見其石皇祐末鎮靑遣石工取以為硯極發墨頗類歙石今東方人多用之或曰范公石然不耐久久則石乃斷裂並澠水燕談三余為兒童時見端溪硯有三種曰岩石曰西坑曰後歷石色深紫襯手而潤幾於有水叩之聲清逺石上有㸃靑緑間暈員小而緊者謂之鸜鵒眼此乃岩石也採于水底最為土人貴重又其次則石色亦赤呵之乃潤叩之有聲但不甚清逺亦有鸜鵒眼色紫緑慢而大此乃西坑石土人不甚重又其下者靑紫色向眀側視有碎星光㸃如沙中雲母石理極慢乾而少潤扣之聲重濁亦有鸜鵒眼極大而偏斜不緊謂之後歷石土人賤之西坑硯三當巗石之一後歷硯三當西坑之一則其品價相懸可知矣自三十年前見士大夫言得端巗硯者豫觀之皆西坑石也邇來士大夫所收者又皆後歷石也豈惟世無巗石雖西坑者亦不可得見矣東軒筆録四唐彥猷清簡寡欲不以世務為意公退一室蕭然終日默坐惟吟詩臨書烹茶試墨以度日比嘉祐中守青社得紅絲石於黑山琢以為硯其理紅黃相間文如林木或如月暈或如山峰或如雲霞花卉石自膏潤浮泛墨色覆之以匣至數日不乾彥猷作硯録品為第一以謂自得此石端溪龍尾皆置不復視矣墨莆陽蔡君謨嘗評李超易水人唐末與子廷圭渡江至歙州以其地多美松因留居以墨名家本姓奚江南賜姓李氏圭或為邽弟廷寬男承宴承宴男乂用皆有聞易水江南又有朱君德柴成務李文逺張遇陳贇著名當時其制有劍脊圎餅拙墨進貢墨供堂墨面多為龍紋其幕有宣府字或止云宣或著姓氏或别州府今人間少有傳者仁宗嘉祐中宴近臣于羣玉殿嘗以其墨賜之曰新安香墨其後翰林諸君承賜者皆廷圭雙脊龍樣尤為佳品鰐魚咸平中陳文惠公謫官潮州時潮人張氏子濯于江邉為鰐魚食之公曰昔韓吏部以文投惡溪鰐魚為吏部逺徙今鰐魚賊人則不可赦矣乃命吏督漁者網而得之鳴鼓告其罪戮之于市圗其形為之贊至今人多傳之鰐大者數丈或𤣥黃或蒼白似龍而無角類蛇而有足睅目利齒見之駭人卵出山谷間大率為鰐者十二三其餘或為黿或為龜也喜食人畜其食必以尾卷去如象之任鼻也法相院矮檜亳州法相禪院矮檜髙才數尺偃亞蟠屈枝葉茂盛不可圖狀唐大中年李待價石記云圎蔭三丈餘距今又百餘年廣袤五六丈為一郡之珍玩土人目其寺曰矮檜真廟祀老子嘗駐蹕其下今御榻尚在故陸子履詩曰先皇玉座親臨地故老于今涕泫然慈航院通州狼山廣教寺在唐為慈航院在江中山上昔人有詩曰飛來靈鷲嶺化作寶陀山山前後乃江海相接處舟出二山間水湍礙石率多覆溺昔有僧率其徒操楫護之舟免觸石之患故有慈航之名近年江水南徙山之前後皆為陸田後人有詩曰昔年航底浪今日馬蹄㾗皆紀實也瓊花揚州后土廟有花一株潔白可愛嵗久木大而花繁俗目為瓊花不知實何木也世以為天下無之唯此一株孫冕鎮維揚使訪之山中甚多但嵗苦樵斧野燒故木不得大花不能盛遂不為人貴孫傷之以詩曰可憐遐地産常化燎原灰近亰師亦有之或曰乃李文饒所賦玉蘂花也並澠水燕談二揚州后土廟有瓊花一株或云自南所植即李衛公所謂玉蘂花也舊不可移徙今亰師亦有之茶建茶盛於江南近嵗製作尤精龍鳳團茶最為上品一斤八餅慶厯中蔡君謨為福建轉運使始造小團以充嵗貢一斤二十餅所謂上品龍茶者也仁宗皇帝尤珍惜雖輔相未嘗輒賜唯郊祀致齊之夕兩府各四人并賜一餅宫人翦金為龍鳳花貼其上八人分蓄之以為至寶不敢碾試時有嘉客出而傳玩歐陽文忠公云茶為物之至精而小團又其精者也澠水燕談二建州陸羽茶經尚未知之但言福建等十二州未詳往往有之其味極佳江左近日方有蠟面之號李氏别令取其乳作片或號曰亰挺的乳及骨子等每嵗不過五六萬斤訖今嵗出三十餘萬斤九十品曰龍鳳茶亰挺的乳石乳白乳頭金蠟面頭骨次骨龍茶以供乘輿及賜執政親王長主餘皇族學士將帥皆得鳳茶舍人近臣賜亰挺的乳館閣白乳龍鳳石乳茶皆太宗令作江左乃有研膏茶供御即龍茶之品也丁謂北苑茶録三卷備載造茶之法今行于世楊文公談苑三蠟茶出於福建草茶盛於兩浙浙之品日注為第一自景祐以後洪州雙井白芽漸盛近嵗製作尤精囊以紅紗不過一二兩以常茶十數斤養之用辟暑濕之氣其品逺出日注上遂為草茶第一青箱雜記取碑碣為塔材長安故都多古碑石景祐初莊獻太后遣中使建塔城中時姜遵知永興盡力于塔悉取碑碣以為塔材漢唐公卿墓石十亡八九楊大年談苑叙五行德金石厄事宋有天下百餘年長安碑刻再厄矣惜哉澠水燕談威州唐李衛公在維州吐蕃德之號曰無憂城景祐中或以其與濰州聲相亂郵置文字率多往來住滯乞改其名仁宗曰此足以威西戎乃改曰威州西溪寺名華陽揚褒好古博物家雖甚貧而書畫奇玩充實中橐家姬數人布裙糲食而歌舞絶妙故歐陽公贈之詩曰三腳木牀坐調曲蓋言褒之貧乏也褒皇祐中宿華州西溪寺夜䦨燈滅於閣下有光燁然旦起視之石也詢寺僧云西溪華下勝處郡僚宴集之地故以此石鎮內耳至夜褒移至他處光復在焉意其藴玉因求得之輦至都下使玉工視之以為然剖之得玉徑數寸溫潤純粹光彩燦然工人驚曰至寶也今王府中未有其比㑹朝廷求良玉琢鎮國寶褒因獻之遂以為璽鎮國華州軍額朝廷以名與璽同乃改曰鎮潼軍亦異也余叔父博士早為華州幕官故知其詳烏魚骨毒牡丹洛陽牡丹嵗久蟲蠧則花開稍小園戶以硫黃簮其穴蟲死花復盛大其園戶相妬則以烏賊魚骨刺花樹皮中及花中必死蓋牡丹忌烏魚骨耳陳太丘碑熙寧中余為亳之蒙城主簿聞鄼縣北睢水之陽漢太丘長陳實廟前有蔡中郎立碑詢土人云無有也一日公牒過其地與邑令丹陽姚存詢訪得之已為村人鑱為石橋腳矣方趺在水涘因舁至祠下石五假字正𨽻皆訛缺不可讀僅有一二存者獨碑陰故吏姓名差完其東數里復得漢富春丞張君墓碑二因教吏磨墨模本將以獻歐陽公以助集古未果而公薨至今以為恨古銅魚符李文邵推官於夀光縣東境稻田中得古銅魚左符以遺余銅正赤長二寸許背刻為魚頭尾鱗一具面刻一同字深二分許所以合信也環自刻刺史官氏云左雲麾將軍行磨米州刺史持節磨米州諸軍事高從政鐫刻極工字小訛筆法精妙類歐陽率更書按唐貞觀中平高麗裂其地為十二州各因其酋長以為刺史磨米其一也左符乃所頒者當在其國不知緣何遺于此也部光靑屬邑其瀕海矣日本扇熙寧末豫逰相國寺見賣日本國扇者琴漆柄以鴉靑紙厚如餅摺為旋風扇溪粉畫平逺山水薄傅以五采近岸為寒蘆衰蓼鷗鷺佇立景物如八九月間􅋈小舟漁人披簔釣其上天末隱隱有微雲飛鳥之狀意思深逺筆勢精妙中國之善畫者或不能也索價絶高豫時苦貧無以置之每以為恨其後再訪都市不復有矣齊南陵古鑑熙寧末齊南陵耕者破冢得古圎鑑大小二徑六七寸明徹驚人非他鑑比其背郭皆有詞句大為小篆小為正𨽻附篆為流水芙蓉茂林叢竹又為孤雲野鶴下有老人倚杖岸幘逍遙其間似非世間人有飄逸不可扳之高致蓋昔之高人逋客能自致于寂寞之鄉有足以寓意寫懷者未嘗遺物鑑以寄一時之適耳豈良工巧冶所能知也附𨽻亦為雜花皆古簡不可識元豐初終南仰盤艮翁得其一而小者尚藏士家南陽賈黯大年求得之一日相遇于臨淄阿育寺出二鑑示客請合而為一使二鑑不相去遂并以歸大年鳯凰雙頭南金裝陰陽合配日月兩相㑹白玉芙蓉匣翠羽瓊瑶帶同心人心相親照心照膽保千春煉形巧冶營質良工如珠出匣似月停空當戶寫翠對影傳紅綺幌繡幕俱含影中羽陽古瓦秦武公作羽陽宫在鳯翔寶雞縣界嵗久不可究知其處元祐六年正月直縣門之東百步居民權氏濬池得古銅瓦五皆破一獨完瓦面徑四寸四分靣上隱起四字曰羽陽千嵗篆字隨勢為之不取方正始知即羽陽舊址其地北負髙原南臨渭水前對羣峰形勢雄壯真勝地也武公之初年距今千有七百餘年吳武功遊景叔方總秦鳯刑獄摹刊于石置之岐陽憲臺之瑞豐亭以貽好事者椰子木椰子木生安南及海外諸國木如棕櫚大者高百餘尺花葉白如千葉芙蓉一本花不過數十實不過三五顆其大如斗至乾熟差小外有黃毛軟皮中有殼正類檳榔故有人戲為詩曰百果之中爾最尊檳榔應是汝雲孫沈佺期有題椰子詩曰叢生雕胡首圎實檳榔身殼上有二穴芽出穴中殼內類蘿蔔皮味苦而肉極甘脆蠻人甚珍之中有汁大者一二升蠻人謂之椰子酒飲之得醉交州記以為漿者是也治消渴塗髭髮立黑皮煮汁止血療吐逆肉益氣去風並澠水燕談事實類苑卷六十二

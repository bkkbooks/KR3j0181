body:
  text: 事實類苑卷三十四宋江少虞撰詩歌賦詠范杲藝祖收河東凱旋范杲叩馬進詩曰千里版圖來浙右一聲金鼓下河東上愛慕不已增秩賜章服杲魯公質之姪好學有文時稱髙梁柳范謂髙辨梁周翰柳開與杲也楊侍講楊侍講徽之以能詩聞於祖宗朝太宗知其名索其所著以百篇奏御仍獻詩於上卒句曰少年牢落今何幸叨遇君王問姓名太宗賜和且語近臣曰徽之文雅可尚操履端正拜禮部侍郎選十聯寫於御屏梁周翰貽之詩曰誰似金華楊學士十聯詩在御屏中江行云犬吠竹籬沽酒客鶴隨苔岸洗僧衣寒食云天寒酒冷難成醉地迥臺髙易斷魂塞上云戍樓煙自直戰地雨長腥嘉陽川青帝已教春不老素娥何惜月長圓又云落花水入瞿塘峽帶雨雲歸越嶲州哭江為云廢宅寒塘水荒墳宿草煙元夜云春歸萬年樹月滿九重城僧舍云偶題巖石雲生筆間繞松庭露濕衣湘江舟行云新霜染楓葉皓月失蘆花宿東林云開盡菊花秋色老落遲梧葉雨聲寒王元之王元之之謫黃州也實由宰相不説交親無敢私見惟竇元實握手泣唁於閣門曰天乎使公屢黜豈非命耶士大夫髙之元之以詩謝之曰惟有南宫竇員外為余垂淚閣門前二雷德驤有終父子二人嘗並命為江南淮南兩路轉運使當世榮之王禹稱贈詩二首其一曰江南江北接王畿漕運帆檣去似飛父子有才同佐國君王無事免宵衣屏除姦吏魂應喪養活疲民肉漸肥還有文場受恩客望塵懷抱倍依依其二曰當時詞氣壓朱雲老作皇家諌諍臣章疏罷封無事日朝廷有旨直言人題詩野館光泉石講易秋堂動鬼神棘寺下僚叨末路齋心惟祝秉鴻鈞蓋禹稱嘗出德驤門下而德驤深於易而酷嗜吟詠故也三王禹稱詩多紀實作趙普挽詞云玄象中台折皇家上相薨大功銘玉鉉密事在金縢宋湜挽詞云先帝升遐日詞臣遇直時柩前書顧命筆下定鴻基蓋嘗密贊太祖傳位太宗而湜為內相宿直遇太祖升遐是夜草遺制立太宗故也云此事湜家亦不知唯以公挽詩詞為傳信四王黃州始居濟陽父本磨家時畢文簡公為州從事元之七歲一日代其父輸麵至公宇立庭下應對不懾文簡方命諸子屬句鸚鵡能言爭似鳳文簡曰童子口舌喧呶顧能對此乎意惡犯分而譏之元之抗首應聲曰蜘蛛雖巧不如蠶復涵諷意報文簡文簡歎曰子精神滿腹將且鳴世矣其後與公接武朝廷焉五王元之謫黃州有詩云又為太守黃州去依舊郎官白髮生論詩者尚其質直元之先謫滁州謝上表云諸縣豐登苦無公事一家飽暖全荷君恩元之有畫像在滁及歐陽尚書謫官至郡謁畫像取表中語為詩曰諸縣豐登少公事一家飽暖荷君恩元之在朝與宰相不相能作江豚詩刺之譏其肥大云食啖魚蝦頗肥腯又云江雲漠漠江雨來天意為霖不在汝俗云江豚出能致風雨也楊文公楊文公初為光祿丞太宗頗愛其才一日後苑賞花宴詞臣公不得預以詩貽諸館職曰聞帶宫花滿髻紅上林絲管侍重瞳蓬萊咫尺無因到始信仙凡迥不同諸公不敢匿以詩進呈上詰有司所以不召左右曰以來帖職例不得預即命直集賢院免謝令預晚宴時以為榮謹案原本時以為榮下尚有唐韓吏部石鼎聨句一事共四十九字與上文不相屬此條係引澠水燕談檢所書無此語當為原本誤入今刪去之謹附識於此二楊大年與錢劉數公唱和自西崑集出時人爭效之詩體一變而先生老輩患其多用故事至於語僻難曉殊不知自是學者之弊如大年新蟬云風來玉宇烏先轉露下金莖鶴未知雖用故事何害為佳句也又如峭帆橫渡官橋柳疊鼓驚飛海岸鷗其不用故事又豈不佳乎蓋其雄文博學筆力有餘故無施而不可非前世號詩人者區區於風雲草木之類為許洞所困者也三冦萊公在中書與同列云水底日為天上日未有對而楊大年適來白事因請其對大年應聲曰眼中人是面前人一時稱為的對四楊大年年十一建州送入闕下真宗親試一賦二詩頃刻而成上喜令中人送中書俾宰臣覆試時參政李至狀云臣等今月某日入內都知王知眷傳聖旨押送建州十一歲習進士楊億到中書其人來自江湖對揚軒陛殊無震懾便有老成蓋聖祚平承神童間出也臣亦令賦喜朝金闕五言六韻亦頃刻而就其詩謹封進詩內有七閩波浩渺雙闕勢岧嶤曉登雲外嶺夜渡月中潮斷句云願秉清忠節終身立聖朝之句五楊文公億數歲未能言一日家人抱登樓誤觸其首忽便言家人驚謂曰汝既能言能吟詩乎曰能遂令吟樓詩應聲吟曰危樓髙百尺手可摘星辰不敢髙聲語恐驚天上人後為天下文章宗主夏文莊夏文莊公景德初侍父監通州狼山鹽場嘗登狼山賦渡口詩曰渡口人稀黯翠煙登臨猶喜夕陽天殘雲右倚維揚樹逺水南回建鄴船山引亂猿啼古寺電驅甘雨過間田季鷹死後無歸客江上鱸魚不直錢時年十七後之題詩無出其右識者以為甘雨過間田雖有為霖之志終無澤物之功二夏文莊公舉制科對䇿罷方出殿門遇楊徽之見其年少遽邀與語曰老夫他則不知唯喜吟詠願丐賢良一篇以卜他日之志不識可否公援筆欣然殿上衮衣明日月硯中旗影動龍蛇縱橫禮樂三千字獨對丹墀日未斜楊公歎服數四曰真宰相器也三景德中夏公初授館職時方早秋上多宴後庭酒酣遽命中使索新詩公問上在甚處中使曰在拱辰按舞公即抒思立進喜遷鶯詞曰日霞散綺月沉鈎簾捲未央樓夜涼河漢截天流宫闕鎖新秋瑤階曙浥金莖露鳳髓香雲霧三千珠翠擁宸遊水殿按梁州中使入奏上大悅四夏鄭公以父殁王事得三班差使然自好讀書工為詩一日攜所業伺宰相李文靖公沆退朝拜於馬首面獻之文靖讀其句有山勢蜂腰斷溪流燕尾分之句深愛之終卷皆佳句翊日袖詩呈真宗及敘其死事之後家貧乞與換一文資遂改潤州金壇主簿平生好為詩皆有所屬初罷樞密府為南京留守時有忌疾之者到郡作詩曰造化平分荷大鈞腰間新佩玉麒麟南湖日夜栽桃李準擬濉陽過十春又曰海雁闕橋春水深略無塵土到花隂忘機不管人知否自有沙鷗信此心晚年流落仇敵益衆而抨彈之疏不輟上聞因作詩送一臺官曰弱羽驚弦勢未安孤飛殊不應鴛鸞黃金自有雙南貴莫與遊人作彈丸始王沂公曾當國鄭公為翰林學士欲撼之因作青州詩曰日上西山舞鸞鶴波翻碧海對蛟龍直勾到了成何事消得君王賜履封以沂公青州人故也五景休曰夏竦字子喬父故錢氏臣歸朝為侍禁竦幼學於姚鉉使為水賦限以萬字竦作三千字以示鉉鉉怒不視曰汝何不於水之前後左右廣言之則多矣竦又益之凡得六千字以示鉉鉉喜曰可教矣年七歲善屬文為時人所稱舉進士開封解者百數竦為第六貢院時奏名第四會其父死於邊竦以死事者子補奉職貢院奏竦所試賦優於省元陳堯佐以其幼故抑之來舉請免考試詔許之竦以奉職行父喪服終換丹陽主簿舉賢良方正及第拜大理寺評事通判台州秩滿遷光祿寺丞直史館頃之奉詔修史俄知制誥時年二十七陳文惠陳文惠堯佐端拱元年程宿下及第止二十八人時公兄弟先登第舉族貧時俱未仕父闕華尚為小官家極貧魏野以詩賀之曰放人少處先登第舉族貧時已授官蘇東坡慶厯中歐陽文忠公謫守滁州州有琅琊幽谷山川奇麗鳴泉飛瀑聲若環珮公臨聽忘歸僧智仙作亭其上刻石為記以遺州人既去十年太常博士沈遵好竒之士聞而往遊愛其山水秀絶以琴寫其聲為醉翁吟蓋宫聲三疊後會公河朔遵援琴作之公作歌以遺遵并為醉翁引以敘其事然詞不主聲為知琴者所惜後三十餘年公薨遵亦殁有廬山道人崔間逋客也妙於琴理常恨此曲無詞乃譜其聲請於東坡居士蘇子瞻以補其闕然後聲詞皆備遂為琴中絶妙好辭爭傳之其詞曰琅然清圓誰彈響空山無言唯公醉中知其天月明風露涓涓人未眠荷蕢過山前曰有心哉此賢第二疊泛聲同此醉翁嘯咏聲和流泉醉翁去後空有朝吟夜怨山有時而童巔水有時而回川思翁無歲年翁今為飛仙此意在人間試聽徽外兩三絃方其補詞間為絃其聲居士倚聲為詞頃刻而就無所點竄遵之子比丘號本覺􅀈真禪師居士書以與之調曰二水同器有不相入二琴同手有不相應沈君信手彈琴而與泉和居士縱筆作詞而與琴會此必有其同者矣二張藝叟奉使大遼宿幽州館中有題蘇子瞻老人語壁間者聞范陽書肆亦刻子瞻詩數十篇謂之大蘇集子瞻名重當代外至遼人亦愛服如此藝叟題其後曰誰傳佳句到幽都逢著邉人問大蘇已上並澠水燕談李文質李昉再入相以司空致仕為詩慕白居易之淺初所居有園林畜五禽以客為名白鷴為間客鷺為雪客鶴為仙客孔雀為南客鸚鵡為隴客昉各為詩一章畫五客圖傳於好事者又慕居易西京九老之會得宋琪等八人皆年七十餘時為九老會未果而卒玉溪生公嘗言至道中偶得玉溪生詩百餘篇意甚愛之而未得其深趣咸平景德間因演綸之暇遍尋前代名公詩籍觀富於才調兼極雅麗包藴密緻演繹平暢味有窮而久愈出旨彌淡而酌不竭曲盡萬變之態精索推言之要使學者少窺其一班略得其餘光若滌腸而換骨矣由是孜孜求訪凡得五七言長短韻歌行雜言共五百八十二首唐末浙右多得其本故錢鄧帥若水嘗留意捃拾才得四百餘首錢君舉其賈誼兩句云可憐夜半虛前席不問蒼生問鬼神錢云其措辭如此後人何以企及余聞其所云遂愛其詩彌篤乃專緝綴鹿門先生唐彥謙慕玉溪得其清峭感愴蓋聖人之一體也然警拔之句亦多豫數年類集搆求得薛廷圭所作序凡百八十二首世俗見豫愛慕二君詩什誇傳於書林文苑淺學之徒相非者甚衆噫大聲不入俚耳豈足論哉范文正公海陵西溪鹽場初吕文靖公嘗官於此手植牡丹有詩列其後范文正公亦嘗臨蒞復題一絶云陽和不擇地海角正還春憶得上林色相看如故人以二公詩筆故題詠極多而花亦為人貴重護以朱欄不折歲久盛茂林枝復數文每春花開數百朵為海濱之奇觀二范文正公未免乳喪其父隨母嫁淄山朱氏既冠文行過人一試為南宫第一人遂擢第仕宦四十年晚鎮青州西望故居才百餘里以詩遺其鄉人曰長自一寒儒登榮三紀餘百花春滿路二麥雨隨車鼓吹迎前道煙霞指舊廬鄉人莫相羡教子讀詩書三范文正公謫睦州過嚴陵祠下會吳俗歲里祀巫迎神但歌滿江紅詞有桐江好煙漠漠浪似堆山如削繞嚴陵灘畔鷺飛魚躍之句公曰吾不善音律撰一絶送神曰漢包六合網英豪一箇冥鴻惜羽毛世祖功成三十六雲臺爭似釣臺髙四范希文為詩不徒然而作也贈釣者詩曰江上往來人盡愛鱸魚美君看一葉舟出沒風濤裏觀競渡詩一棹輕如葉旁觀亦損神他時在平地無忽險中人率以教化為主非獨風騷之將抑又文之豪傑與五范文正公氣節忠徑知無不言仁宗朝屢獻章疏數見斥逐故梅聖俞作啄木鳥詩以見意啄盡林中蠧未肯出林飛不識黃金彈雙翎墜落暉張在青州布衣張在少能文尤精於詩奇蹇不偶老死場屋題龍興寺老柏院詩云南鄰北舍牡丹開年少尋芳去又回唯有君家老柏樹春風恰似不曾來大為人所傳誦故御史中丞范諷補之喜論詩尤愛此篇誦於文潞公公皇祐中鎮青詣老柏院訪其所題字已漫滅公惜其不傳為大字書於西廡之壁後三十餘年當元豐癸亥東平畢仲甫將叔見公於洛下公囑畢往觀畢至青訪其故處壁已圮毁不復可得為刻於天官柱石又刋其故所題處僧惠崇寇萊公一日延詩僧惠崇於池邊探􅍐分題丞相得池上柳青字韻崇得池上鷺明字韻崇默繞池邊心於杳冥以搜之自午及晡忽以二指點空微笑曰已得之此篇功在明字凡五押之俱不到今方得之丞相試請口舉崇曰照水千尋逈棲煙一點明冦公笑曰吾之柳功在青字已四押之終未愜不若且罷崇詩全篇曰雨絶方塘隘遲回不復驚曝翎沙日暖引步島風清及斷句云主人池上鳳見爾憶蓬瀛二宋九釋詩惟惠崇詩絶出嘗有河分岡勢斷春入燒痕青之句傳誦都下籍籍宣著餘緇遂寂寥無聞因忌之乃厚誣其盜閩僧文兆以詩嘲之曰河分岡勢司空曙春入燒痕劉長卿不是師兄偷古句古人詩句犯師兄石昌言皇祐間館中詩筆石昌言楊林最得唐人風格余常攜琴訪之一詩見謝尤佳鄭衛湮俗耳正聲追不回誰傳廣陵操老盡嶧陽材古意為師復清風尋我來幽隂竹軒下重約月明開恐遺泯故録耳已上並湘山野録石曼卿石曼卿天聖寶元間以歌詩豪於一時嘗於平陽會中作代意寄尹師魯一篇詞意深美曰千年一見空花委依舊山河損桃李雁聲北去燕西飛髙樓日日春風裏局聳石州山對起嬌波淚落妝如洗汾河不斷水南流天色無情淡如水曼卿死後數年故人關詠夢曼卿曰延年平生作詩多矣獨賞自以為平陽代意一篇最為得意而世人罕稱之能令豫此詩盛傳於世在永言耳詠覺後輒演其詞引度於是天下爭歌之他日復夢曼卿致謝詠字永言二石曼卿自少以詩酒豪放自得其氣貌偉然詩格奇峭又工於書筆畫遒徑體兼顔柳為世所好余家嘗得南唐後主澄心堂紙曼卿為豫以此紙書籌筆驛詩曼卿平生所自愛者至今藏之號為三絶真豫家寶也曼卿卒後其故人有見之者云恍惚如夢中言我今為鬼仙也所主芙蓉城欲呼故人往遊不得忿然騎一素驢去如飛其後又有云降於亳州一舉子家又呼舉子去不得因留詩一篇與之余亦記舉子一聯云鶯聲不逐春光老花影長隨日腳流神仙事怪不可知其詩頗類曼卿平生語舉子不能道也趙師民龍圖趙學士師民以醇儒碩學名重當時為人沈厚端默羣居終日似不能言而於文章之外詩思尤精如麥天晨氣潤槐夏午隂清前世名流皆所未到也又如曉鶯林外千聲囀芳草階前一尺長殆不類其為人矣已上並廬陵歸田録事實類苑卷三十四

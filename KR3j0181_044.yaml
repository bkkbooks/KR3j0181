body:
  text: 事實類苑卷四十四宋江少虞撰曠達隱逸孫明復先生孫明復先生退居太山之陽枯稿憔悴鬢髮皓白著春秋尊王發微十五卷為春秋學者未有能過之者也故相李文定公守兖就見之嘆曰先生年五十一室獨居誰事左右不幸風雨飲食生疾奈何吾弟之女賢甚可以奉先生箕帚先生固辭文定曰吾女不妻先生不過一官人妻先生德高天下幸壻李氏榮貴莫大于此先生曰宰相女不以妻公侯貴戚而顧以嫁山谷衰老藜藿不充之人相國之賢古無有也豫不可不成相國之賢遂娶之其女亦甘淡泊事先生盡妻道當時士大夫莫不賢之見澠水燕談蘇澄隱太祖征太原還至真定幸龍興觀道士蘇澄隱迎鑾駕毫髮星星年九十許氣貌翹疏上因延問甚久自言頃與亳州道士丁少微華山陳摶結遊於關洛嘗過從麞皮處士上問曰得何術對曰臣得長嘯引和之法遂令長嘯清入杳冥移時不絶上默久低迷欲寐殆食頃方欠伸其聲略不中斷上大奇之因問養生之要隱對曰帝王養生異於是老子曰我無為而民自化我無欲而民自朴無為無欲凝神太和唐堯所以享國永圖得此道也遂賜號熙素先生李集賢李集賢建中恬退喜道處縉紳有逍遙之風善翰劄行有筆工至於草𨽻分篆俱楷兼妙人得之則寶焉為詩清淡間暇如其人有杭州望湖樓詩小艇間撑處湖天景亦微春波無限緑白鳥自由飛落日孤汀逺輕煙古寺稀時攜一壺酒戀到晚涼歸西湖詩有障煙春氣重貯月夜痕深之句皆類如此晚喜洛中景物詠留司園池亭榭蕭然自如每喜誦楞嚴中四句云將聞持佛佛何不自間間聞復翳根除塵消覺圓淨凡起居皆詠之後被詔與張君房集賢校勘道藏時號稱職朱侍郎朱昻晚以工部侍郎懇求歸江陵逾年方允乃入謝於殿門外有詔賜坐時方劇暑恩旨寵留詔秋涼進程時吳淑贈行詩有漢殿夜涼初閣筆渚宫秋晚得懸車之句尤為中的賜宴玉津園中人傳詔令各賦詩為送李承旨維有清朝納祿猶強健白首還家正太平陳文惠堯佐部吏有函通爵里送兵千騎過荆門之句四十八篇皆警絶一體朝論榮之弟協亦同隱皆享眉夀家林相接謂之渚宫二疏荆帥陳康肅堯咨表其居為東西致仕坊八十二薨門人請諡正俗先生王昭素王昭素酸棗人學古純直行高於世市物隨所索價與其直賣者反曰所索實非本價昭素謂之曰汝且受之免陷汝於妄語咎自爾人無敢欺者相告曰王先生市物不可虛索一夕盜者穿窬將入以橫木滿室不用其穴昭素覺之盡室之物潛擲於外謂窬兒曰速去恐有捕者盜慚委物而遁去盜即息李穆昔師之逮為學士薦於太宗年七十顔如渥丹目如蕩漆鰥居絶欲四十嵗家無女侍上賜坐講乾卦至九五飛龍在天起整衣稽顙改容而説上問曰何故昭素奏曰此爻史作文王正陛下之今日事引諭該證微含針補上側聽善之講罷留果茗宴語賜國子博士致仕留禁中月餘詢至養身之術昭素曰治世莫如安民養身無如寡欲此外無他上愛之書於屛几享年八十九王元澤壬子嵗王雱元澤記會稽開杞刻之以廣其傳庶乎世之聞見者有所警焉戊午嵗元澤病中友人魏道輔奉謁于寢對榻一片屛大書曰宋故王先生之墓君名雱字元澤登第於治平四年釋褐授旌德尉起身事熙寧天子才六年拜天章閣待制以病廢于家後尚有數十言挂衣于屏角覆之不能盡見此亦得謂之達歟郭延卿錢文僖公惟演生貴家而文雅樂善出于天性晚年以使相留守西京時通判謝絳掌書記尹洙留府推官歐陽修皆一時文士遊宴吟詠未嘗不同洛下多水竹奇花凡園囿之勝無不到者有郭延卿者居水南少與張文定公吕文穆公遊纍舉不第以文行稱於鄉里張吕相繼作相更薦之得職官然延卿亦未嘗出仕葺園亭藝花足迹不及城市是時年八十餘矣一日文僖率僚屬往遊去其居一里外即屏騎從腰輿張蓋而訪之不告以名氏洛下士族多過客衆延卿未始出蓋莫知其何人也但歡然相接道服對談而已數公疏爽闓朗天下之選延卿歎曰陋居罕有過從而平日所接之人亦無若數君者老夫甚愜願少留對花小酌也於是以陶尊果䔩而進文僖愛其野逸為引滿不辭既而吏報申牌府吏牙兵列庭中延卿徐曰公等何官而從吏之多也尹洙指而告曰留守相公也延卿歎曰不圖相國肯顧野人遂相與大笑又曰尚能飲否文僖欣然從之又數杯延客之禮數杯盤無少加於前而談笑自若日入辭去延卿送之門顧曰老病不能造謝希無訝也文僖登車茫然自失翊日語僚屬曰此真隱者也彼視冨貴為何等物耶歎息纍日不止見東軒筆録馮樞密馮樞密京熙寧初以端明殿學士帥太原時王左丞安禮以池州司戶參軍掌機宜文字馮雅相好因以書詫於王平甫曰并門歌舞妙麗吾閉目不窺但日與和甫談禪耳平甫答曰所謂禪者直恐明公未達也蓋閉目不窺已是一重公案馮深服其言東軒筆録王荆公王荆公再罷政以使相判金陵到任即納節讓同平章事懇請賜允改左僕射未幾又求宫觀纍表得會靈觀使築第南門外七里去蔣山亦七里平日乘一驢從數僮遊諸山寺欲入城則乘小舫泛潮溝以行蓋未嘗乘馬與肩輿也所居之地四無人家其宅僅庇風雨又不設垣牆望之若逆旅之舍有勸築垣輒不答元豐末荆公被疾奏捨此宅為寺有旨賜名報寧既而荆公疾愈稅城中室以居竟不復造宅東軒筆録韓丕薦三處士韓丕少遊學嵩山間性質朴刻勵著名於時作感秋詩三十篇人多傳誦後為翰林學士太宗召問當時流輩頗有遺逸否以萬適楊朴田誥為對上悉令召之而誥詔下乃卒朴至召對自言不願仕進賜束帛遣還與一子出身適醉後至閉門拒之不得見居京城半年僅至免餓丕又出翰林因表言其事詔以為廬州慎縣主簿敕下數日卒朴善歌詩每乘牛往來郭店自稱東里遺民常杖策入嵩山窮絶處苦思為歌詩數年得百餘篇而已誥歷城人好著述聚徒數百人頗有舉進士顯達者稱其師名聞於朝中宋維翰許袞皆其弟子誥所著書百餘篇世亦傳之大率迂濶每注思必匿深草中絶不聞人聲俄自草中躍出則一篇成矣楊文公王文正公旦與楊文公億為空門友楊公謫汝州公適當軸每音問不及他事惟談論真諦而已余嘗見楊公親筆與公云山栗一稱聊表村信蓋汝惟産栗而億與王公忘形以一稱栗遺之斯亦昔人雞黍縞紵之意也見青箱雜記張宗晦慶厯中張宗晦以祕書監致仕居洛陽一日謁留守其子庚言唐賀監知章以道士服歸會稽明皇賜以鑑湖今洛中嵩山雖非朝廷所賜大人可衣羽服優遊其間何必事請謁宗晦曰吾作白頭老監枕書而眠何必學賀老作道士服耶時以為名言宗晦英公齊賢子見澠水燕談杜五郎潁昌陽翟縣有一杜生者不知其名邑人但謂之杜五郎所居去縣三十餘里唯有屋兩間一間自居一間其子居之前有空地丈餘即是籬門杜生不出籬門凡三十年矣黎陽縣尉孫軫嘗往訪之見其人頗瀟灑自陳村民無所能何為見訪孫問其不出門之因其人笑曰以告者過也指門外一桑曰十五年前亦曾到此桑下納涼何謂不出門也但無用於時無求於人偶自不出耳何足尚哉問其所以為生曰昔時居邑之南有田五十畝與兄同耕後兄之子娶婦度所耕不足贍乃以田與兄攜妻子至此偶有鄉人借此屋遂居之惟為人擇日又賣一藥以給饘粥亦有時不繼後子能耕鄉人見憐與田三十畝令子耕之尚有餘力為人傭耕自此足食鄉人貧以醫卜自給者甚多自食既足不當更兼鄉人之利自爾擇日賣藥一切不為又問常日何所為曰端坐耳無可為也問頗觀書否曰三十年前亦曾觀書問觀何書曰曾有人惠一册書無題號其間多説淨名經亦不知淨名經何書當時極愛其議論今亦忘之并書亦不知所在久矣氣韻間曠言詞精簡有道之士也盛寒但布袍草履室中枵然一榻而已問其子之為人曰村童也然質性甚淳未嘗妄言未嘗嬉遊惟買鹽酪則一至邑中可數其行迹以待其歸徑往徑還未嘗旁逰一步也豫時方有軍事至夜半未卧疲甚與官屬間話因遂及此不覺蕭然頓忘煩勞見夢溪筆談种放景德中种放賜號先生暫還嵩山真宗治酒資政殿餞放當直者四人預焉時所司不宿具皆相顧不敢坐上乃親定位次翰林學士朝迥西向資政殿學士王欽若東向知制誥朱選西向次回待制戚綸東向次欽若放北面對上特示客禮酒半上賦七言詩一首賜放放和侍臣皆賦士大夫榮之見澠水燕談二种放明逸少舉進士不第希夷先生謂之曰此去逢豹則止他日當自出於衆人初莫知其意放隱終南山豹林谷真宗召見寵遇非常拜工部侍郎皆符其言澠水燕談三种放别業在終南山放學行高古後生從之學者甚衆性頗嗜酒躬耕種秫以自釀所居有林泉之勝殊為幽絶真宗聞之遣中使攜畫工圖之開龍圖閣召輔臣觀焉上歎賞之其後甘棠魏野郊居有幽致帝亦遣人圖之故野詩云幽居帝畫看澠水燕談四初种隱居少時與弟汶往拜陳希夷摶陳宿戒厨僕來日有三客來可膳於廊才旦果至惟邀放升堂殷勤睥睨以一絶贈之曰鑑中有客白髭多鑑外先生識也麼只少六年年六十此生隂德莫蹉跎种視之不曉但屈指以三語授之曰子貴帝友而無科名晚為權貴所陷种又乞素履之術陳曰子若寡欲可滿其數种因而不娶而年夀六十一五种放字明逸河南洛陽人父故吏部令史滿調補長安簿卒於官种七嵗能屬文既長父昻令赴舉放辭以業未成不可妄動父卒數兄皆干進放與母隱終南山豹林谷結草茅為廬日以講習為業後生多從之學問得其束修以自給著書十卷人多傳寫之為歌詩亦播人口宋維翰為陜西轉運使表薦之太宗令本州給裝錢三萬遣赴闕量才收用放詣府受金治行素與張貨善貨適自秦州從事公纍免官居京兆放詣貨謀其事貨曰君今赴召不過得一縣尉耳不如稱疾候再召而往當得好官放然之即託貨為奏章稱疾太宗曰此山野之人亦安用之令本府嵗時存問不復召其母甚賢聞有朝命謂曰嘗勸汝勿聚徒講學身既隱矣何為名為果為人知而不得安處我將棄汝深入窮山矣放既辭疾母悉取其筆硯焚之與放轉詣窮僻人迹罕至後卒無以葬遣僮奴持書於錢若水宋湜若水湜同上言以為先朝嘗加召命今貧不能葬其母欲以私覿是掠朝廷之美詔京兆府賜錢三萬帛三千匹粟三千石咸平末張齊賢知京兆府表薦召為左司諫直昭文館賜五品服六真宗初召种隱君放至闕以敷對稱旨日高中人送中書膳諸相皆盛服俟其來种隱君幅巾韋布長揖而已楊大年聞之頗不平以詩嘲之曰不把一言禆萬乘祗義雙手揖三公上聞之獨召楊曰知卿有詩戲种某楊汗浹股栗不敢匿避上曰卿安知無一言禆朕乎出一皂囊內有十軸乃放所奏之書也其書曰十議所謂議道議德議仁議義議兵議刑議政議賦議安議危俾大年觀之從容奏曰臣當别日負荆謝罪見湘山野録石曼卿石曼卿磊落奇才知名當世氣雄貌偉飲酒過人有劉潛者亦志義之士也嘗與曼卿為酒敵聞京師沙行王氏新開酒樓遂往造焉對飲終日不交一言王氏怪其所飲過多非常人之量以為異人稍獻肴果益取好酒奉之甚謹二人飲啖自若傲然不顧至夕殊無酒色相揖而去明日都下喧傳王氏酒樓有二酒仙來飲久之乃知劉石也見歸田録二石曼卿一日謂祕演曰館俸清薄不得痛飲且僚友擾之殆遍奈何演曰非久引一酒主人奉謁不可不見不數日引一納粟牛監簿者高資好義宅在朱家曲為薪炭市評别第在繁臺寺西房緡日數十千嘗謂演曰某雖薄有資産而身迹塵賤難近清貴慕師交遊盡館閣名士或遊奉有闕無吝示及演因是攜之以謁曼卿使令置官醪十擔為贄列醖於庭演為傳刺曼卿愕然問曰何人演曰前所謂酒主人者不得已因延之乃問甲第何許生曰一别舍介繁臺之側其生亦翔雅曼卿間語演曰繁臺寺閣虛爽可愛久不一登其生離席曰學士與大師果欲登閣乞預寵諭下處正與閣對當具家蔬在閣迎候石因諾之一日休沐約演同登演預戒生生至期果陳具於閣器皿肴核冠于都下石演高歌褫帶飲至落景曼卿醉喜曰此遊可紀以盆漬墨濡巨筆以題云石延年曼卿同空門詩友老演登此生拜叩曰塵賤之人幸獲陪侍乞挂一名以光賤迹石雖大醉猶握筆沉思慮無其䇿以拒之遂目演醉舞佯聲諷之曰太牢生捧硯用事可也竟不免題云牛某捧硯永叔後以詩戲曰捧硯得全牛見湘山野録三石曼卿居蔡河下曲鄰有一豪家日聞歌樂之聲其家僮僕數十人常往來曼卿之門曼卿呼一僕問豪為何人對曰姓李氏主人方二十嵗並無昆弟家妾曳羅綺者數十人曼卿欲求見之其人曰郎君素未嘗接士大夫也他人必不可見然喜飲酒屢言聞學士能飲酒意亦似欲相見待試問之一日果使人延曼卿即衫帽往見之坐于堂上久之方出主人者頭巾繫勒帛不具衣冠見曼卿全不知拱揖之禮引曼卿入别室供帳赫然坐良久有二鬟妾各持一小盤至曼卿前盤中紅牙牌十餘其一盤是酒凡十餘品令曼卿擇一牌其一盤肴饌名令擇五品既而二鬟去有羣妓十餘人各執肴果樂器粧服入人品皆艷麗燦然一妓酌酒以進酒罷樂作羣妓執果肴者萃立其前食罷則分立左右京師人謂之軟盤酒五行羣妓皆退主人亦翩然而入略不揖客曼卿獨步而出曼卿言豪者之狀懵然愚騃殆不分菽麥而奉養如此極可怪也他日試使人通鄭重則閉門不納亦無應門者問其近鄰云其人未嘗與人往來雖鄰家亦不識面古人謂之錢癡信有之見筆談張乖崖張乖崖少時任俠擊劔心溢六合將遺世仙去始與逸人傅霖者同學霖隱不仕公中第日先顯散遣親密四方求霖者三十年不可得嘗作憶霖詩寄語巢由莫相笑此生終不羡輕肥晚嵗罷成都轉運守宛丘詞訟簡稀一日卧鈴閣有被褐騎蹇驢氣貌高勝者叩門大呼曰尚書青州傅霖來閽吏異之走白公聞驚且喜倒屣出迎召吏責曰傅先生天下賢士太守不得友何人敢姓名乎霖即從容笑曰别子一世尚爾童心是豈知世間有我耶公道舊且問何昔隱今出霖曰子將去矣來報子耳曰詠亦自知之霖曰知復何言翊日而去後一月公薨于鎮云乖崖事迹滿世咸謂公弄九霞酌天醴出入清都者久矣及得傳傅霖事然後知其為真仙無疑余謂子房於黃石公武侯於龎德公李藥師於虬髯客顔魯公於張志和李太白於賀知章少陵於司馬子微文章誇古今功業蓋後世者未嘗不遇寰宇外士摩發激勵而後光華烜赫名動千古者又豈特乖崖而已世不尚師友而聞道者鮮矣西清詩話邢惇邢惇雍丘人以學術稱于鄉曲家居不仕真宗末以布衣召對問以治道惇不對上問其故惇曰陛下東封西祀皆已畢矣臣復何言上恱除試四門助教遣歸惇衣服居處一如平日鄉人不覺其有官也既卒人乃見其敕與廢紙同束置屋梁間見涑水紀聞張俞康定間益州書生張俞嘗獻書于天子由是朝廷知其名然不喜仕宦常隱於青城山白雲溪時樞密使田况守成都日與詩曰深慙蜀太守不及採芝人又謂僚佐曰斯人用之使作王言司諫不用之則巖谷之病叟耳有文三十卷行于世見雲溪新話事實類苑卷四十四

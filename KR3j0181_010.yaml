body:
  text: 事實類苑卷十宋江少虞撰名臣事迹大官髙夀者夲朝大官最享髙夀者凡三人曰太傅張公士遜樞相張公升少師趙公槩皆夀至八十六又二人次之曰陳文惠公堯佐至八十二杜祁公衍至八十二又一人次之曰富文忠公弼夀至八十餘皆不及焉故文惠致政以詩寄退傳曰青雲岐路遊將遍白髮光隂得最多蓋謂是也仁宗篤師傳恩遇公特厚致政後每大朝會常令綴兩府班公時已八十餘而拜跪輕利仁宗晚乃飛白百嵗二字賜之公遂進歌以謝優詔褒答此雖漢顯宗之遇桓榮不過是也出青箱雜記將相世家李密學濬與李昌武宗諤同宗同嵗月後一日而生二人者畢生休戚慘舒一與之同及昌武死濬亦後一日卒昌武即司空昉第三子在玉堂真宗召公同丁晉公侍宴玉宸殿上曰朕嘗思國朝將相之家世緒不墜者惟曹彬耳聞卿家尤更雍睦有法朕繼二聖基業亦如卿家保守閥閲東軒筆録大臣奢儉不同鄧州花蠟燭名著天下雖京師不能造相傳云是寇萊公燭法公嘗知鄧州而自少年富貴不點油燈尤好夜宴劇飲雖寢室亦燃燭達旦每罷官去後人至官舍見厠溷間燭淚在地往往成堆杜祁公為人清儉在官未嘗燃燭油燈一炷熒然欲滅與客相對清談而已二公皆為功臣而奢儉不同如此祁公夀考吉終萊公晚有南遷之禍遂歿不返雖其不幸亦可以為戒也歸田録貴門子弟初翰林學士彭闕不訓子弟文學參軍范宗翰上啓責之曰王氏之琪圭玘瓘器盡璠璵韓氏之綜絳縝維才皆經緯非蔭而得由學而然謂王氏皆以玉為名韓氏亦皆以系為名故云璠璵經緯大抵天下之衣冠子弟取髙科者惟王韓二族為盛故於其命名舉之以訓子弟焉出名臣傳陳恭公陳恭公初罷政判亳州年六十九遇生日親族往往獻老人星圗以為夀獨其姪世修獻范蠡遊五湖圗且贊曰賢哉陶朱霸越平吳名遂身退扁舟五湖恭公甚喜即日上表納節明年纍表求退遂以司徒致仕矣二陳恭公事仁宗兩為相悉心盡瘁百度振舉然性嚴重語言簡直與人少周旋接賔客以至親戚骨肉未嘗從容談笑尤靳恩澤士大夫多怨之惟仁宗嘗曰不昧我者惟陳執中耳及其薨也韓維張洞諡之曰榮􅀢仁宗賜諡曰恭薨後月餘夫人謝氏繼卒一子才七嵗會葬日門下之人惟解賔三至墓所世人嗟悼之梅堯臣作挽詞兩首具載其事曰位至三公有恩加錫諡無再調金鼎鉉屢刻玉麟符已歎鸞同穴還悲鳯少雛擁圗看鹵簿誰為畢三虞公在中書日朝廷百事崇王官多不喜天子以為忠富貴人間有恩榮歿後隆若非笳鼓咽寂寞奈秋風東軒筆録文潞公至和初陳恭公罷並用文富二公彥博弼正衙宣麻之際上遣小黃門密於百官班中聽其議論而二公久有人望一旦復用朝士往往相賀黃門具奏上大恱余時為學士後數日奏事垂拱殿上問新除彥博等外議如何余以朝士相賀為對上曰自古人君用人或以夢卜茍不知人當從人望夢卜豈足憑也故余作文公批答云永為商周之所記至以夢卜而求賢孰若用縉紳之公言從中外之人望者其述上語也廬陵居士集又文彥博知永興軍起居舍人母湜鄠人也至和中湜上言陕西鐵錢不便於民乞一切廢之朝廷雖不從其鄉人多知之爭以鐵錢買物賣者不肯受長安為之亂民多閉肆僚屬請禁之彥博曰如此是愈使惑擾也乃召絲絹行人出其家縑帛數百匹使賣之曰納其直盡以鐵錢勿以銅錢也於是衆曉然知鐵錢不廢市肆復安並見涑水紀聞厠上讀書錢思公雖生長富貴而少所嗜好在西洛時嘗語僚屬言平生惟好讀書坐則誦經史卧則讀小説上厠則閲小詞蓋未嘗頃刻釋卷謝希深亦言宋公垂同在史院每登厠必執書以往諷誦之聲琅然聞於逺近其篤學如此余因謂希深曰余生平所作文章多在三上乃馬上枕上厠上也蓋惟此尤可屬思耳已上並廬陵居士集張文定張僕射齊賢體質豐大飲食過人尤嗜肥豬肉每食數斤天夀院風藥黑神丸常人所食不過一彈丸公常以五兩為一大劑夾以胡餅而頓服之淳化中罷相知安州安陸山郡未嘗識達官見公飲啖不類常人本郡驚駭常以賓客會食厨史置一金漆大桶於廳側窺公所食如其物投桶中至暮酒漿浸漬漲溢滿桶郡人嗟愕以謂享富貴者必有異於人也然而晏元獻公清瘦如削其飲食甚微每析半餅以筯卷之抽去其筯內捻頭一莖而食此亦異於常人也廬陵歸田録李文定李文定公為參知政事時仁宗為皇太子文定兼賓客一日召對滋福殿欲相之固辭俄而太子出謝曰蒙恩以賓客為宰相真宗顧謂曰尚可辭耶乃拜吏部侍郎兼太子少傅同中書門下平章事久之與丁謂爭事罷天下之人皆以寬直許之東齋記事二李文定公迪罷陜西都轉運使還朝是時真宗方議東封西祀修太平事業知蔡州曹瑋奏羌人潛謀入寇請大益兵為備上大怒以為瑋虛張虜勢恐嚇朝廷以求益兵以迪新自陕西還召見示以瑋奏問其虛實欲斬瑋以戒妄言者迪因奏曰瑋良將必不妄言臣觀陛下意不欲從鄭州門出兵耳秦之旁郡兵數為小册常置鞶囊中以自隨今未敢以進上曰趣取之迪取於鞶囊以進上指曰某州某州兵若干戌秦州卿即傳詔於樞密發之既而虜果大至入寇瑋迎擊大破之遂開山後之地奏到大喜謂迪曰山後之捷卿之功也及上將立章獻后迪為翰林學士屢上疏諫以章獻起於寒微不可母天下由是章獻深銜之周懷政之誅上怒甚欲責及太子羣臣莫敢言迪為參知政事候上怒稍息從容奏曰陛下有幾子乃欲為此計上大寤由是獨誅懷政等而東宫不動迪之力也及為相時真宗已不豫丁謂與迪同奏事退既下殿謂矯書詔欲為林特還官迪不勝怒與謂爭辨引手板欲擊謂謂走獲免因相論奏詔二人俱罷宋鄭公宋鄭公初名郊字伯庠與其弟祁自布衣時名動天下號為二宋其後為知制誥仁宗驟加奬眷便欲大用有忌其先進者譛之謂其姓符國號名應郊天又曰郊者交也交者替代之名也宋郊其言不祥仁宗遽命改之公怏怏不獲已乃改名庠字公序後更踐二府二十餘年以司空致仕兼享福夀而終而譛者竟不見用而卒足可以為小人之戒也歸田録二宋丞相庠早以文行負重名於時晚年尤精字學嘗手校郭忠恕佩觽三篇寶玩之其在中書堂吏書牒尾以俗體書宋為宋公見之不肯下筆責堂吏曰吾雖不才尚能見姓書名此不是我姓堂吏惶恐改之乃肯書名出歸田録錢文僖錢文僖若水嘗率衆過河號令軍伍分布行列悉有規節深為戌將所服上知之謂左右曰朕嘗見儒人談兵不過講之於樽俎硯席之間於文字則引孫吳述形勢皆間暇清論可也責之於用則罕見有成效者若水亦儒人曉武事深可喜也時邉警猶擾上密以手札訪之公奏曰制邊滅戎之策無他臣聞唐室三百年而魏北一鎮敵人甚少不及今日之盛所以未嘗侵境者蓋幽薊為唐北門命帥屯兵以鎮之稍有侵軼則呼吸應敵時言者請城綏州積兵禦黨項詔公自魏疾乘傳往按至則乞罷時論韙之上嘗語左右曰朕觀若水風骨秀邁神仙姿格茍用之材力有餘朕止疑其算部蹙隘若至大用恐愈迫之其後果然出玉壺清話鄭毅夫鄭毅夫為翰林學士數月今左揆王相國繼入玉堂故事以先入者班列居上鄭公奏曰臣德業學術及天下士論皆在王某之下今班列驟居其上實不遑安欲乞在下主上面諭之揆相固辭曰豈可循鄭某謙抑而變祖宗典故耶又數日鄭公乞罷禁林以避之主上特傳聖語王某班列鄭某之上不得為永例後揆相為鄭父某志其墓語筆優重至挽辭有欲知隂德事看取玉堂人之句佳其謙也唐質肅唐質肅介一日自政府歸語諸子曰吾備位政府知無不言桃李固未嘗為汝等栽培而荆棘則甚多矣然汝等窮達亦莫不有命惟自勉而已湘山野録張文節天聖中張文節在政府國封嵗入見莊獻母儀天下見其二侍婢老且陋怪其過自貶納對以丞相不許市妙年者因敕國封密市二婢或丞相問但言吾意國封遂買二女奴首飾服用不啻三十餘萬一日文節歸第二婢拜於庭文節詢其所自國封具以告從容指旁侍二姬謂夫人曰此二姬乃夫人昔之媵侍今出之亦無所歸固當終身於此耳若二姝齒未踰笄將嫁少年子後日之事固不可知若今守一老翁甚無謂也雖蒙太后聖慈垂念某之志豈可踰也他日入見宜以此懇敷奏遽召宅老呼二婢之父兄對之折劵并衣服首飾與之俾為嫁資謂曰若更雇於人必當送府勘問澠水燕談二桑贊以旄節鎮古城張文節在幕下桑月給幕職厨料人十五以下文節家貧食甚衆命倍給之文節亦止取其半或不得已過有所用即其所用之因聞於桑歸其餘於帑藏贊雖武人嘗謂文節曰公異日必大用恨吾老不能見也祥符中文節為京東轉運使奏稱昔在桑贊幕下知臣最厚今贊死葬濟州子弟悉官於外臣乞每遇寒節暫至贊墓拜掃詔可之自是嵗一往祭奉之禮如在相府凡桑氏子孫來見者待之有如骨肉出廬陵歸田録楊文公楊文公億以文章擅天下然特剛徑寡合有惡之者以事譖之大年在學士院忽夜召見於一小閣深在禁中既見賜茶從容顧問久之出文藁數篋以示大年云卿識朕字迹乎皆朕自起草未嘗命臣下代作也大年惶恐不知所對頓首再拜而出乃知必為人所譛矣由是佯狂奔於楊翟真宗好文初待大年眷顧無比晚年恩禮漸衰亦由此也出廬陵歸田録劉溫叟祕書監劉溫叟父嶽退居河隂劉溫叟方七嵗嘗謂客曰吾老矣他無覬覦得世難消息與兒偕為溫路之叟耕釣煙月為太平之漁樵平生足矣後記父語因名為溫叟後仕為學士晉少帝時又為學士當世榮之受命之日抱敕立堂下其母未與之見隔簾聞魚鑰聲俄而開篋二青衣舉一箱至庭則紫袍闕衣也母始捲簾見之曰此則汝父在禁林內庫所賜溫叟捧號開影寢列祀以文告其先方拜母又以父名嶽終身不聽樂大朝會有樂亦以事辭之客有犯其諱則慟哭急起與樂俱絶太宗聞之喜歎益久溫叟時為中丞家貧太宗致五百緡以贈之拜祝訖以一匱置於御史府西楹令來使緘鐍而去至明年端午以執扇角黍賜之視其向時封宛然所親諷之曰晉邸賜緡恤公之貧盍開扄以濟其乏溫叟曰晉王身為京兆兄為天子吾為御史長拒之則似鮮敬受之則何以激流品於後太宗聞之益加歎重見東軒筆録張鄧公退傳張公光化軍生百日始能啼襁褓中喪其父母少孤貧讀書武當山有道士見而異之曰子有道骨可隨我學仙公不欲道士亦弗強曰即不然亦位極人臣公以淳化三年孫何榜下及第久困未調年幾五十始轉著作佐郎邵武縣還朝以文贄楊公大年比二日至門下連值楊公與同輩打葉子門吏不敢通公亦弗去楊公忽自窗隙目之知非常人也延入欵語又觀所為文以為有宰相器未幾薦為御史尋充夀春王友由此際會遂登台輔然公寬厚長者記存故舊嘗與邵武姓魚一僧相善及貴猶不忘為魚奏紫方袍弟子守仙亦沾錫服晚年致政猶時時遺守仙物不絶答書皆親筆而詩語用稠疊勤處其敦篤如此並見青箱雜記又淳化中張鄧公為射坡令會嵗旱禱於白崖山陸使君祠遂雨立廷下若聽命然雨足乃退蜀人刻石記其祠中真宗時為廣東轉運使會詔天下置天慶觀公曰請即舊規為之以舒天下土木之勞湘山野録杜祁公杜祁公衍越州人父早卒遺腹生公其祖愛之初時祖父脫帽使公執之會山水暴至家人散走其姑投一竿與之使挾以自泛公一手挾竿一手執帽漂流久之救得免而帽竟不濡前母有二子不孝悌其母改適河陽錢氏祖父卒公十五六其二兄以為其母匿私財以適人執公按之不得實劔斫之傷腦走歸其姑姑匿之重橑上出血數升僅而得免乃詣河陽歸其母繼父不能容往來道路間貧甚傭書以自資嘗至濟源富民相里民竒之妻以女由是資用稍給舉進士殿試第四及貴其長兄猶存待遇甚有恩禮二兄及錢氏姑氏子孫受公補蔭官者數人乃皆為之婚嫁出東軒筆録二杜祁公以宫師致仕於南都時新榜一巍峩者出倅巨藩道由應天太師王資政舉正以其少年髙科方得意於時盡假以牙兵寶轡旌鉞導從呵擁特盛祁公遇於通衢無他路可避乘款段裘帽暗弊二老卒斂馬側立於旁舉袖障面新貴人頗恚其立馬而避問從者曰誰乎卒對曰太師相公湘山野録三杜正獻公為相蔡君謨孫之翰為諫官屢乞出仁宗云卿等審欲得郡當具所欲乞奏來於是蔡除福州孫除安州正獻公曰諫官無故出終非美事乞且如舊上可之退書聖語時陳恭公為參政不肯書曰某初不聞正獻懼遂焚之由此遂罷相議者謂正獻當明日奏審不當遽焚其書也正獻言始在西府時上每訪以中書事及為相雖中書事亦不以訪公因言君臣之間能全終始者蓋難也蘇子瞻云出東軒筆録事實類苑卷十

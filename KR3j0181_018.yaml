body:
  text: 事實類苑卷十八宋江少虞撰典禮音樂皇后合食太廟仁宗皇帝將祫饗韓持國為禮官建言皇后廟孝章淑德章懷神主不當合食於太廟下待制以上議議者凡十七人自夢得武平仲祖楊侍講向龍圖原甫景彜聖從八人以為當食太廟永叔楊叔子華長文子方包希仁錢資元盧公彥并鎮九人以為當從持國論卒為二議以上朝廷以為日近且依舊合食須後别議而武平仲當草詔其詞大主其所議自後亦不復議皇后别廟者以其不可入太廟也合食而入太廟又何必為别廟哉其議論之難合也若是出東齋記事僖祖廟為始祖熙寧五年十月太常禮院言奉旨詳定僖祖主祧遷者切以聖王用禮固有因循至於順逆之大倫非敢違天而廢古請僖祖為太祖始祖遷順祖神主藏之夾室依禮不諱孟夏祀感生帝以僖祖配詔恭依先是中書言萬物本乎天人本乎祖故先王廟祀之制有疏而無絶有逺而無遺西周之王斷自后稷以下者非絶其以上而遺之以其自有本承之故也若尊卑之佐先後之序則子孫雖齊聖有功不得以加其祖考天下萬世之通道也本朝自僖祖以上世次不可得而知則僖有廟與稷契宜無以異今毀其廟而藏其主於夾室替祖宗之尊而下附於子孫非所以順祖宗孝心事亡如事存之義求之在前載雖或有然考合於經乃無成憲因而制禮實在聖時乞以所奏付之兩府詳議而擇取其當詔合宫廟祧之廬蓋有典彜所以上承先王下法後世朕嗣守大統獲奉宗祀而世次遷毀禮或未安討論經常薦我哲輔於以佐朕不逮而仰稱祖宗追孝之心朕覽之瞿然敢不祇服宜依所請於是元絳等議云詩序生民曰尊祖也文武之功起於后稷故推以配天焉蓋言尊祖不言尊有功言文武之功而不言后稷之功則知后稷配天者以尊祖而非以尊有功也從之熙寧八年五月禮院言今年四月太廟禘祭排列神位已依敕命尊始祖居東向之位自順祖而下昭穆各各以南北為序自今如遇禘祫著為定禮詔恭依藉田元豐二年七月詳定禮文所言國語云王耕一畝庶人終於千畝廩於藉東南鍾而藏之自漢迄唐皆有帝藉神倉今久廢不設凡祭祀之所用皆索諸市中非以致潔誠也乞於京城東南度田千畝置藉田仍徙先農壇於其中立神於東南五谷之外並植菜蔬各種藏氷一嵗祠祭之用取具焉并從之祀明堂元豐三年七月詔曰逺而尊者祖則祀於郊之圜丘而配天邇而親者禰則祀於國之明堂而配上帝天足以及上帝未足以盡天故圜丘配天則對越諸神明堂則上帝而已歷代以來合宫所配既紊於經乃至雜以先儒六天之説此皆固陋昧古以失情文之宜朕甚不取其將來祀英宗於明堂推以配上帝餘從祀羣臣悉皆罷祀郊祀四月詔親祀北郊依南郊議如不親祀則上公攝事見是奉祀禮文所言天地合祭自漢元始間以禮樂既合有合而祖夫婦共牢於是合祭天地以隆一體之誼後漢光武魏文帝晉元帝唐武德以來皆因之殆非求神以類之意本朝上帝既設天皇地祗位稽之祀典有所未合於是翰林學士張璪言陽生於十一月隂生於五月則隂陽之生天地致用之始先王於是順隂陽之義以冬至祀天於地上之圜丘夏至祭地於澤中之方丘以至牲幣器服詩歌樂舞形色度數莫不倣其象類故天神地祗可得而禮由此觀之夏至祭地於方丘而天子親涖之此萬世不易之禮也議者以當今萬乘儀衛加倍於古方盛夏時不可以躬行乃欲改用他月無所據依又失所以祀地順隂陽之義必不得已臣以為宜即郊祀之嵗夏至之日盛禮容具樂舞遣冢宰攝事雖未能皆當於禮庶幾先王之遺意有存焉禮官請如璪議上批張璪之議在今所宜固無可易元豐六年冬至祭上帝昊天於圜丘以太祖配始罷合祭天地也制曰永惟五聖之烈必躬三嵗之祭祀以禮意寢而不明樂文雜而未正故刺六經之説考諸儒之言廣緝衆議是正巨典陟配烈祖對侑昊穹於時建太常之旗備金玉之駕乃垂冕旒以昭萬國之觀瞻乃服大裘以考前代之故事袞冕行事至是始加服大裘而被以衮冕元豐聖訓封程嬰公孫杵臼立廟神宗朝皇嗣屢闕余嘗詣閣門上書乞立程嬰公孫杵臼廟優加封爵以旌忠義庶幾鬼不為厲使國統有繼是時適值鄆王服藥上覽之矍然即批付中書授臣將作監丞敕河東路訪尋二人遺迹乃得其家於絳州太平縣詔封嬰為誠信侯杵臼為忠智侯因命絳州立廟嵗時致祭余所上書略曰豫嘗讀史記世家考趙氏廢興之本末惟程嬰公孫杵臼二人各盡死不顧難以保全趙氏孤兒最為忠義乃知國家傳祚至今皆二人之力也蓋下宫之難屠岸賈殺趙同趙括趙朔趙嬰齊已赤族無噍類惟朔妻有遺腹匿於公宫既而免身生男屠岸賈聞之索於宫中甚急於是朔妻置兒袴中祝曰趙宗滅乎若則號不滅若無聲及索兒竟無聲乃得脫然則兒之無聲蓋天有所祚且天方啓趙氏生聖人以革五代之亂極天下於湯火之中而奄有焉使聖子神孫繼繼承承而不已則兒又安敢有聲蓋有聲則不免不免則趙氏無復今日矣然雖天祚亦必賴公孫杵臼謬負他嬰匿於山中卒與俱死以絶其後患又必賴程嬰保全真孤遂至成人而立之以續趙祀即趙文子也於是趙宗復盛傳十世至武靈王而遂以胡服與秦俱伯其後為秦所併則子孫蕩析散居民間今常山中山真定則古之趙地故趙氏世為保州人而僖祖順祖翼祖宣祖皆生於河朔以至太祖啓運太宗承祧真宗紹體仁宗守成英宗繼統陛下纘業嚮使趙氏無此二人以力衛襁褓孑然之孤使得以全則承祀無餘育矣又豈能昌熾以至於此故臣深以為國家傳祚至今皆二人之力也二人死皆以義甚可痛悼雖當時趙武為嬰服喪三年為之祭祀春秋祀之世世勿絶然今不知其祀之所在竊慮其祠或廢而復舉或舉而弗葺或葺而弗封三者皆闕典也左氏曰鬼有所歸乃不為厲自宋有天下凡兩周甲子百二十二年於兹矣而二人忠義未見褒表廟食弗顯故仁宗在位歷年至多而前星不耀儲嗣屢闕雖天命將啓先帝以授陛下然或慮二人精魄久無所歸而亦因是為厲也何哉蓋二人能保趙孤使趙宗復續其德甚厚則趙宗之有繼皆自二人為之也何况二人皆精誠忠剛洞貫天地則其魂常遊於太虛而百世不滅故乞朝廷指揮下河東北晉趙分域之內訪求二人墓廟特加封爵旌表如或自來未立廟貌即速令如法崇建著於令甲永為祀典如此則忠義有勸亦可見聖朝不負於二人者矣青箱雜記嫡孫傳重服自唐開元時父卒衆子在嫡孫不傳重以其不襲封也然不知至後倫紀則有所不齊國朝亦著於禮令景祐中右資政中立卒衆子在嫡孫不傳重未幾而衆生子卒其家奏嫡孫合與不合傳重下禮院議於是宋景文公判太常不疑次道與豫為禮官景文遂令三人各為議狀不疑曰初常傳重誤也宜改正之使遣為服次道則用江都集禮以為當接服若曰父死衆子在嫡孫不傳重衆子嫡孫死衆孫接服是一尊親而為兩等服也豫謂石氏子孫宜依禮令不得傳重且為本服自今而後别著令父死衆子在嫡孫傳重然後得禮之正又為不疑難曰石氏子當傳重就令石氏子於服中犯刑如何處之必以見行法見行禮令處之也豈可嫡孫接服嫡孫死衆孫接服是何異家人共犯止坐尊長方決而乃令次家長接續足其杖數耶是無此理也然景文從次道議仍請著為令其後衆子在嫡孫請傳重者聽傳重其不請者則不傳重豈禮之意哉武臣持服故事武臣不持喪韓琦奏請持喪下兩制臺議官議唐子方為諫官與諸御史皆不與令持喪是時會議於玉堂後署唐子方曰今日不可髙論也永乃勃然曰父母死而令持服安得為髙夢得坐子方旁不覺歎曰俊也卒然一言亦中於理兩制於臺諫官竟為兩議以上遂詔閣門祗候內殿崇班以上持服供奉官以下不持服是則官髙者得為父母服官卑者則不為無官者將何以處之乎金龍玊簡道家有金龍玉簡學士院撰文具一嵗中齋醮故投於名山洞府天聖中仁宗皇帝以其險逺窮僻難齊送醮祭之具頗為州郡之擾乃下道籙院裁度才留二十餘處餘悉罷之河南府平陽洞台州赤城山玉京洞江寧府華陽洞舒州潛山司真洞杭州火滌洞鼎州桃源洞常州張公洞南康軍廬山詠真洞建寧武夷山升真洞南嶽朱陵洞江州馬當山上水府太平州中水府潤州金山下水府杭州錢塘江水府河陽濟瀆北海水府鳳翔府聖湫仙遊潭河中府百丈泓龍潭杭州天目山龍潭華州車湘潭所罷處不可悉數豫常於學士院取金龍玉簡視之金龍以銅玉簡以階石制東齋記事婚禮坐鞍劉嶽書儀婚禮有女坐壻之鞍馬父母謂之合髻之禮不知用何經義據嶽自敘云以時之所尚者益之則是當時流俗之為爾當五代干戈之際禮樂廢壞之時不暇講求三王之制度茍取一時世俗所用吉凶儀式略整齊之固不足為後世之法矣然而後世猶不能行之今嶽書儀十已廢其七八其一二僅存於世者皆茍簡粗略不知本書就中轉失乖謬可為大笑者坐鞍一事爾今之士族當婚之夕以兩椅相背置一馬鞍令壻坐其上飲以三爵女家遣人三請而後下乃成婚禮謂之上髙坐凡婚家舉族內外姻親與其男女賓客堂上堂下竦立而視者惟壻上髙坐為盛禮耳或有偶不及設者則相與悵然皆咨嗟以闕禮其轉失乖謬至於如此今雖名儒巨公衣冠舊族莫不皆然嗚呼士大夫不知禮義而與閭閻鄙俚同習見而不知為非者多矣廬陵歸田録蠟臘建隆四年太常博士和峴奏唐以前寅日蠟百神卯日祭社宫辰日臘饗宗廟開元定禮三祭皆於臘辰以應土德聖朝火德合以戌日為臘而以前土日辛卯便行蠟禮恐未為宜下太常議而謹請蠟百神祀社稷饗宗廟同用戌臘日正冬朝賀上夀淳化三年正月朔太宗御朝元殿受賀禮畢改服通天冠絳紗袍升殿羣臣上夀國朝以來正冬朝賀御正殿即以退御大明殿羣臣常服上夀奏教坊樂至是始約開元禮皆以法服設官奏萬舞酒三行而罷宣祖配天淳化四年正月辛卯合祭天地於圜丘以宣祖皇帝配有司因請常祀祈榖神州明堂以宣祖崇配圜丘北郊雩祀以太祖崇配奏可彗星見罷祀南郊太宗將南郊彗星見宰相趙普召檢討杜鎬問之鎬曰當祭日食猶廢祭鎬見如此罷祀不疑遂從其説至熙寧五年將郊而河決神宗問輔臣曰議者以河決地震不當郊王安石曰古者年不順成八蠟不通八蠟小祭也或可以變異廢上帝之祭乃祭之大者恐不宜如此上以為然出事實祭大社太祖初有事於大社時國初墜典多或未修大祝文亦亡舊式詔辭臣各撰一文謄録糊名以進上覽之謂左右曰皆輕重失中獨御筆親點一文曰惟此庶乎得體開視之乃竇儀撰者文曰維某年太嵗月朔日宋天子某敢昭告於大社謹仲秋仲春祇率常禮敬以玉帛一大武柔毛剛鬛明粢香箕嘉薦醴殽備兹庶品用伸報本敢以后土勾龍氏配神作主惟神品物賴之載生庶類資以含𢎞方直所以著其守博厚所以兼其德有社者敢忘報乎尚饗遂詔議定其儀制公以開元禮參酌於三代之典繼以進祭之際作雍和樂大社之饌自正門入配坐之饌自左闥入凡薦奠尊罍之儀並如圜丘事具本式請大社所執樽者舉幕贊酌醴太常卿引皇帝於大社神座前捧爵跪奠太祝持板進於神座之右西向跪讀祝文玉壺清話兩制攝事京師春秋社祭多差兩制攝事王僕射圭為內外制十五年祭社者屢矣熙寧四年復以翰林承旨攝太尉因作詩曰雞聲初動曉驂催又向靈壇飲福杯自笑怡聲不辭醉明年強健更須來是冬遂參知政事東軒筆録祀太一太宗時建東太一宫於蘇村遂列十殿而太一五福二太一處前冠通天冠服絳紗袍餘皆道冠霓裳天聖中建兩太一宫前殿處五福君太一太逰三太一並用通天冠絳紗服之制餘亦道冠霓裳熙寧五年建太一宫內侍主塑像乃請下禮院議十太一冠服禮院乃具狀請如東西二宫之制太一盡服通天絳紗有言亳州太清宫有唐太一塑像上遣中使視之乃盡王者衣冠遂詔如亳州之制九宫貴神九宫貴神始天寶初術士蘇嘉慶上言請置壇明皇親祠及王璵為相又勸肅宗親祀太和中監察御史舒元輿論列遂降為中祀會昌中李德裕為相復為大祀宣宗時又降為中祀乾符中宰相崔彥昭因嵗旱禱雨獲應又升為大祀郊廟讀册回班故事知廟祀讀册官至御名必起上至郊宫更衣詣壇下百官皆回班迎向英宗皇帝初告廟詔讀册官毋起及詣壇下又詔百官勿回班所以見事郊廟之精意也澠水燕談醮祀御寶真宗皇帝嚴於醮祀之事其奏章則用昭受乾符之寶其後御寶止用御前之寶慶厯中下學士院别置其文曰皇帝欽崇國祀之寶醮祀則用之東齋紀事朝獻朝饗上親郊廟册文皆曰恭薦嵗事先景靈宫謂之朝獻次太廟謂之朝饗末乃有事於南郊豫集郊式時曽預討論常疑其次序若先為尊則郊不宜在廟後若後為尊則景靈宫不宜在太廟之先求其所從來蓋有所因按唐故事凡有事於上帝則百神皆預遣使祭告唯太清宫太廟則皇帝親行其册祝皆曰取某月某日有事於某所不敢不告宫廟謂之奏告餘皆謂之祭告唯有事於南郊方為正祠至天寶九載乃下詔曰告者上告下之詞今後太清宫冝稱朝獻太廟稱朝饗自此遂失奏告之名册文皆為正祠筆談雲韶部開寶中平嶺表有廣州內臣聰慧者數十人於教坊令習樂之簫韶部後改名雲韶部內宴則用之鈞容直太平興國中擇軍之善樂者名曰别龍直遊幸則騎而導駕後改曰鈞容直取鈞天之義焉河市樂駙馬都尉髙懷德以節制領睢陽嵗久性頗侈靡而洞曉音律故聲伎之妙冠於當時法部中精絶者殆不過之宋城南抵汴渠五里有東西二橋舟車交會民居繁夥倡優雜户厥類亦衆率多俚鄙為髙之伶人所輕誚每宴飲樂作必效其朴俚之態以為戲玩謂之河市樂迄今優俳常有此戲王沂公筆録拱辰管鼓吹部有拱辰管即古之義手管也太宗皇帝賜今名事實類苑卷十八

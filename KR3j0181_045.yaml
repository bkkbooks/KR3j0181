body:
  text: 事實類苑卷四十五宋江少虞撰仙釋僧道申國長公主入道大宗第七女申國大長公主生不茹葷端拱初達延夀寺對佛願捨為尼真宗即位遂乞削髮上曰朕之諸妹皆願賜湯沐邑築外館以居之因酬先帝之愛也汝獨願出家可乎申國曰此先帝之願也堅乞之遂允之進封吳國賜名清裕號慈報正覺大師建寺都城之西額曰宗直藩國近戚及掖廷嬪御願出家者若密恭懿王女萬年縣主曹恭王惠安縣主凡三十餘人皆願出家詔普度天下僧尼申國俗夀止三十八尼闕十有六人見湘山野録二初申國長公主為尼掖廷嬪御隨出家者二十餘人詔兩禁送於寺賜齊饌各令作詩送之惟文僖公彭年詩尚有記者云盡出花鈿散寶津雲鬟初剪向殘春因驚風燭難留世遂作池蓮不染身貝葉乍翻疑蜀錦梵聲才舉誤梁塵從兹艷質歸空後湘浦應無解佩人或云作詩之說恐都下好事者為之耳吕先生宿州天慶觀有神仙題詩二絶於五星門扉之上俗傳云吕先生神篆其詩曰秋景蕭條葉亂飛庭松影裏坐移時雲遊鶴駕何方去仙洞朝元失我期又曰手傳丹篆千年術口誦黃庭一卷經鶴觀古壇槐影裏悄無人迹户長扄後為人刮去墨迹猶存乃知非常人書也二潭州士人夏鈞罷官過永州謁何仙姑而問曰世人多言吕先生今安在何笑曰今日在潭州興化寺設齊鈞專記之到潭日首於興化寺取齊厯視之果其日有華州回客設供頃年滕宗亮謫守巴陵郡有華州回道士上謁風骨聳秀神氣清邁滕知其異人口占一詩贈之曰華州回道士來到嶽陽城别我遊何處秋空一劔橫回聞之憮然大歎而别莫知所之見東軒筆談三吕洞賔者多遊人間頗有見之者丁謂通判饒州洞賔往見之語謂曰君狀貌頗似李德裕他日富貴皆似之謂咸平初與豫言其事謂今已執政張洎家居忽外有一隱士通謁乃洞賔姓名洎倒屣見之洞賔自言吕渭之後渭四子溫恭儉讓終海州刺史洞賔系出海州索紙筆八分書七言四韵詞一章留與洎頗言將佐鼎席之意其末句云功成當落破瓜年俗以瓜字為二八洎年六十四卒乃其䜟也洞賔詩什人間多傳寫有自詠云朝辭百越暮三吳袖有青蛇膽氣粗三入嶽陽人不識朗吟飛過洞庭湖又有飲海龜兒人不識燒山符子鬼難看一粒粟中藏世界二升鐺內煮山川之句大率詞意多竒怪類此世所𫝊者百餘篇人多誦之見楊文公談苑養素先生尚書郎李觀自言為進士時往遊南嶽道過潭州聖旗亭買酒忽有一人荷竹奩持釘鉸之具徑至問觀曰聞君將之南嶽頗識養素先生藍方否觀曰固將往見之其人曰奉煩寄聲云劉處士奉問先生十月懷胎如何出得言訖徑出不顧觀至南嶽訪方具道其語方惄然驚異因問曰其人眉間得無有白志乎觀曰然方大驚曰吾不遇此人命也此所謂劉海蟾者也吾養聖胎已成患無術以出之念非斯人不足以成吾道今聲聞相通而不得接吾之道不成矣觀急回訪於潭州已亡所在是年方卒見東軒筆録劉遁晉公舊有園在保康門外園內有仙遊亭仙遊洞景趣瀟灑有道士劉遁相往來遁作仙遊亭詩贈公云屢屢仙遊亭上醉仙遊洞裡杳無人他時鶴駕游滄海同看蓬萊島上春公莫曉其詩公南遷遁往見公於崖公方思其詩乃知遁異人也與之泛舟海上而飲公曰今日之遊誠子之詩意也見名賢詩話華隂隱人華山南有川廣袤數百里連山洞壑不知其極人有登蓮花峰絶頂俯瞰人烟舍屋相望四時嘗有花木疑靈仙之窟宅又云秦人避難者居此其後裔也開寶中有數人衣服異制出華隂市中語人曰我居華隂川因採藥迷路至此何地也後不知所詣疑其地仙見楊文公談苑峨眉山佛現太平興國七年嘉州通判王衮奏往峨眉山提點白水寺忽見光相寺西南瓦屋上山皆金色有丈六金身次日山間有羅漢二尊空中行坐入紫色雲中見玉壺清話曇穎機辨錢子高明逺始中大科知潤州值上元於因勝寺法堂設戲幄庭下以花磚遍甃儼雅如新子高飭役徒掘磚埋柱時長老達觀師曇穎者法辨速敏度其氣驕難諷但佯為語曰可惜打破八花磚錢然之謹不敢動契嵩師吾友契嵩師熙寧四年沒於餘杭靈隱山翠微堂火葬訖不壞五物晴舌鼻耳毫數珠完好不燬以烈火重煆煆之愈堅嵩之文可參韓栁之間治平中以所著書曰輔教編攜詣闕下大學者若今百揆王相歐陽諸公皆低頭以禮焉王仲儀公素為京尹特上殿以其編進呈許附教藏賜號明教大師嵩重體完潔至死無犯火訖張器不壞此節可高天下之士余昔怪其纍多講談音若清磬未嘗少輟及終方得其驗嵩字仲靈藤州人詩類老杜楊公濟裒收全集公濟深服其才答嵩詩有十年尤可照吳邦之句無名高僧成都無名高僧者誦法華經有功雖王均李順兩亂於蜀亦不敢害一旦有一山僕至寺言先生來晨請誦經在藥室奉候至明已在外引入溪嶺數重嵐中有一跨溪山閣先生所居也僕傳其語曰先生請師誦經老疾起晚誦至寶塔品願見報欲一聽至此品處報之果出野服藜杖兩眉垂肩但拱揖焚香而聽聽已遂入不復出將齊以藤盤竹箸秫飯一盂芑菊數甌不調鹽酪甚甘美食訖僕持襯一鍰敬施之曰先生寄語上人逺到山舍不及攀送遣僕送出路口因中途問僕曰先生何姓曰姓孫曰何名僕於僧掌中書思邈二字僧因大駭欲再往僕遽失矣凡山中尋三日竟迷舊路歸襯資皆良金也中五六金一半尚鐵由兹一膳身輕無疾天禧中已一百五十嵗長遊都市後隱不見羅真人太平興國四年綿州羅江縣羅公山真人羅公逺舊廬有人乘車往來山中石上有新轍迹深三尺餘盡五色知州种士衡緣轍迹至洞口聞雞犬聲見湘山野録畨僧法調西晉時畨僧法調至洛陽見晉家宫門歎曰此正是兜率天宫但生死之力營建非道力所成耳將終與徒衆别謂之曰山河天下皆變滅而况人身而得久長但能專心清淨屏除三毒形骸雖乖其㑹必同言訖而終佛經佛經之入中國自竺法蘭摩騰二師以後漢明帝時至白馬寺首譯四十二章經歷晉及十六國南北暨唐皆梵僧自三天竺來自華人之善竺音者迭相翻譯為開元録凡大小乘經律論聖賢集共五千四十八卷至貞元又别録新經二百餘卷元和之後譯經遂廢太宗太平興國初有梵僧法賢法天施護三人自西域來雅善華音太宗宿授佛記遂建譯經院于太平興國寺訪得鳯翔釋清照深識西竺文字因盡取國庫新貯西來梵夾首令三梵僧檢擇未經翻譯者各譯一卷集兩街義學僧評議論難蜂起三梵僧以梵經華言對席誦衆僧無以屈譯事遂興後募童子五十人令習梵學獨得惟淨者乃江南李王之子慧悟絶異能通天竺文字今上即位初陳恕建議以為費國家供億願罷之上以先朝所留意不許及今所譯新經論學凡五百餘卷自至道以後多惟淨所翻也大中祥符四年釋衆上言請如貞元造録詔令潤文官參知政事趙安仁與翰林學士楊億同編修凡為二十卷乃降賜太宗所作釋門文字令編其名題入録安仁等及釋衆又上表請御製釋門文字許之六月三日賜御製法因前集七卷共論次其文理以附於先皇之次而冠於東土聖賢集之上釋經院置潤文官嘗以南北省官學士充中使一人監院使釋經常以梵僧後令惟淨同釋經梵學並受譯綴文以一人評議二人皆選名德有才學為之喻浩造塔錢鏐曰釋迦真身舍利塔見於明州鄞縣即阿育王所造八萬四千闕得十九之一也鏐造南塔以奉安俶在國日所屢作延燒此塔一人奮身穿烈焰登第二級持之而下衣裳膚體多被燒太平興國初俶獻其地太宗命取塔禁中度闕開寶寺西北闕地造浮圖十一級下作天宫以葬舍利葬日上肩輿微行自安置之有日光由塔一角而出上兩闕其外都人萬乘皆灑泣燃指焚香于臂掌者無數內侍數十人願出家灑掃塔下悉度為僧上謂近臣曰我曩世嘗親佛座但未通宿命不能了了見之耳初造塔得浙東匠人喻浩不茹葷性絶巧先作塔式以獻每建一級即設帷幕但聞椎鑿之聲凡一月而一級成其有梁柱齟齬未安者浩周旋視之持槌撞擊數十即皆牢整自云此可七百年無傾動人或問其北面稍高浩曰京城多北風而此數十步乃五丈河潤氣津浹經一百年則北隅微墊而塔正矣而浩求度為僧不數月死世頗疑其異見楊文公談苑吳長文吳長文博學通古今尤不善釋氏其父卒不召僧不作佛事居嘗閭巷細民與其父相往來者人贈二縑子華為長史作墓銘都不及之蓋子華信奉釋氏韓魏公亦曰此事親之際尤為難也死後出家熙寧十年王禹玉丞相奏王妻慶國夫人鄭氏臨終遺言乞度為女真敕特許披戴賜名希真仍賜紫衣號沖靜大師見倦逰雜録建寺太平興國寺舊龍興寺也世宗廢為龍興倉國初寺主僧屢擊登聞鼓求復為寺上遣中使持劔以詰之曰此寺前朝所廢為倉厫以貯軍糧何故煩瀆也朝廷命斷取汝首仍戒之曰倘偃蹇怖畏即斬之臨刑無懼即未可行既訊其僧神色自若引頸就戮中使以聞上大感歎復以為寺官為營葺極於宏壯又修舊封禪寺為開寶寺前臨官街北鎮五丈河屋數千間連數坊之地極於巨麗西域僧覺稱大中祥符初有西域僧覺稱來館於傳法院其僧通四十餘本經論年始四十餘嵗丁謂延見之嘉其敏遣人送至豫處與譯同來設茶問之譯云入此國見屠殺猪羊懸肉市肆甚不忍觀見此方人心頗惡彼西土或一國人全不食肉豫問能留此土否覺稱云願至五臺謁文殊即還乃心思戀本國不樂居此因索紙以竹筆作梵字橫行數十字請淨公譯云稽首催伏諸魔力我智者本名覺稱出家至今十九臘渠眂褐句議能說後作聖德頌以上文理甚富上問其所欲但求金爛袈裟歸至金剛坐而已詔尚書造以給之覺稱自言酤蘭左國人剎帝利性善畫於譯堂北壁畫釋迦面與北方絶異雲豁入定吉州西峰寶龍院僧雲豁常入定嵗餘一出大中祥符三年上遣中使趙履信取至闕下宣於北御園舍中扄鐍之月餘始出定苦告求歸厚賜以遣之見楊文公談苑王中正汀州王健少商江淮間咸平初遇一人於南康逆旅衣道士服儀狀甚偉後屢見之授以黃金術仍付以神劍且戒之曰非遇人君不可妄泄後徉狂叫呼上饒市中配流嶺南逃歸京師撾登聞鼓自陳上召與語恱之命之官更名中正寓居中官劉承圭家承圭上言數聞中正與人語聲如童子云我司命真君也中正後遷神武大將軍康州團練使嘗以藥金銀獻上以助國費卒賜嶺南節度使世謂之燒金王先生建祠永寧院西至今御府猶有中正所獻金及爐鉗殘藥見澠水燕談王參政王參政伯庸得疾既委頓是夕有靈鶴十餘隻空中嘹唳八月二十日夜三更月甚明其弟純臣差知亳州公人來迎候者皆以為怪訝須臾聞宅中慟哭羣鶴遂散時人以為伯庸當作仙日本僧景德三年豫知銀臺通進司有日本僧入貢遂召問之僧不通華言善書劄命以牘對云往天台山延厯寺寺僧三千人身名寂照號圓通大師國王年二十五大臣十六七人郡僚百餘人每嵗春秋二時集貢士所試或賦或詩凡及第者常三四十人國中專奉神道多祠廟伊州有大神或託三五嵗童子降言禍福事山州有賀茂明神亦然書有史記漢書文選五經論語孝經爾雅醉鄉日月御覽玉篇將魴歌老列子神仙傳朝野僉載白集六帖初學記本國有國史祕府略日本記文觀祠林混元録等書釋氏論及疏抄傳集之類多有不可悉數寂照領徒七人皆不通華言國中多習王右軍書寂照頗得其筆法上召見賜紫衣束帛其徒皆賜以紫衣復館於上寺寂照願遊天台山詔令縣道續食三司使丁謂見寂照甚悅之謂姑蘇人與言其山水奇秀寂照心愛因留止吳門寺其徒不願往者遣數人歸本國以黑金水瓶寄謂并詩曰提攜三五載日用不曾離晚井斟殘月春爐釋夜澌鄱銀難免化采石易成虧此器堅還實寄君應可知謂分月俸給之寂照漸通此方言特見精律至通內外學三吳道俗以歸向寂照東遊豫遺以印本圓覺經并詩送之後寄書於豫詩中兩句云身隨客槎逺心與海鷗親不可忘也圓覺固目不暫舍云後南海商人船自其國王弟與寂照書稱野人若遇書云嗟乎絶域殊方雲濤萬里昔日芝蘭之志如今胡越之身非歸雲不報心懷非便風不傳音問人生之恨何以過之後題寬𢎞四年九月又老大臣藤原道長書略云商客至通書誰謂宋逺月慰馳結先巡禮天台更可攀五臺之遊既果本願甚恱甚恱懷土之心如何再㑹塞馬猶向北風土人莫忘日本後題寬𢎞五年七月又治部鄉原從英書略云所咨唐厯以後史籍及他內外經書未來本國者因寄便風為望商人重利惟載經貨而求上國之風絶而無聞學者之恨在此一事末云分手之後相見無期生為兩鄉之身死㑹一佛之土書中報寂照俗家及墳墓事甚詳悉後題寬𢎞五年九月凡三書皆二王之迹而野人若遇章草特妙中土能書者亦鮮及紙墨尤精老大臣乃國之大相治部九卿之列見楊文公談苑郭忠恕郭忠恕字恕先以字行能屬文善史書周廣順中纍為周易博士貶乾州司户秩滿遂不復仕多遊岐雍虢略間縱酒逢人無貴賤常口稱闕遇山水佳處絶糧數日不食盛夏暴於日中體不沾汗窮冬大寒鑿河氷而浴浴傍氷皆澌釋太宗召授國子監主簿縱酒自肆謗讟時政太宗怒決配登州至齊州臨邑謂部送吏曰我逝矣因掘地窟才容面而卒遂藁葬於道左後數日欲取其尸改葬視之空空若蟬蛻然許旌陽家田夫洪州西山有異人常見夫婦出入山中相傳許旌陽家田夫也旌陽使取米及歸拔宅升仙矣遂止為地仙夫寄妻詩曰自從明府升仙後出入塵寰直至今不是藏名渾時俗賣柴沽酒貴安心妻寄于夫詩曰昨日因行過翠微醮壇風冷杏花稀碧桃為我傳消息何事人間去不歸至今有見之者朱池寺僧余往嵗侍親睦州夀昌縣朱池寺寺僧卒方數日弟子出卒前一日手寫一頌云孤燈寂寂夜堂深寒雨瀟瀟響竹林大抵浮生總如此不須哀怨動悲音字甚端謹斯亦異矣見李希聲詩話事實類苑卷四十五

body:
  text: 事實類苑卷四十一宋江少虞撰文章四六盧多遜盧多遜為學士時太祖至西洛郊祀手詔多遜所草曰定鼎洛邑我之西都燔柴郊壇國之大事錢若水為學士一日太宗自作祝辭文而不成令左右持詣翰林命即草之若水對使者換成其句云上帝之體雖𦕈躬是荷下民之命乃明神所司上喜曰朕閣筆思之不能措辭尤激賞其才美吳處厚余皇祐壬辰歲取國學解試律設大法賦得第一名時樞郡闕公尤翰林賈公黙密直蔡公杭修注江公材並為考試官内江公尤見知語余曰滿塲程試皆使蕭何唯足下使蕭規對漢約足見追琢細膩又所問春秋策對答詳備及賦押秋茶之密用唐太宗赦受縑事諸君皆不見云只有秦繁於秋茶家於凝然則各何出余遜席斂袵自陳逺方寒士一旦程文詔中甄抺因對曰文選策秀才文有解秋茶之密網唐太宗赦授縑事出杜佑通典唐書即不在公大喜又曰滿塲使次骨皆作刺骨對凝脂唯足下用杜周傳作次骨又對吹毛只此亦堪作解元余再三遜謝士舉登第名在行間授江獄掾公作詩送余曰太學魯書生南州漢掾卿故鄉千里小丹桂一枝榮莫數科名屈難將力命生他年期射策調筆任縱横葢公欲激余應大科故也二小説載盧樵貌陋嘗以文章謁韋宙韋氏子弟多肆輕侮宙語之曰盧雖人物不揚然觀其文章有首尾異日必貴後竟如其言本朝夏英公亦嘗以文章謁盛文肅曰子文章有館閣氣異日必顯後亦如其言然予嘗究文章雖皆出於心術而實有兩等有山林草野之文有朝廷臺閣之文山林草野之文則其氣枯槁憔悴乃道不得行著書立言者之所尚也朝廷臺閣之文則其氣温潤豐縟乃得位於時演綸視草者之所尚也故本朝楊大年宋宣獻宋莒公胡武平所撰制誥皆婉美淳厚過於前世燕許韋楊逺甚而其為人亦各類其文章王安國常語余曰文章格調須是官様豈安國言官様亦謂有館閣氣耶又今世樂藝亦有兩般格調若教坊格調則婉媚風流朝廟供應則忌麄野嘲折至於村歌社舞則又喜焉兹亦與文章相類范文正公范文正公幼孤隨母適朱氏因冒朱姓名説後復本姓以啓謝時宰曰志在投秦入境遂稱於張禄名非伯越乘舟乃效於陶朱以范雎范蠡亦甞改姓名故也又偽蜀翰林學士范禹偁又甞冒姓張後復姓有啟謝郡守云昔年上第誤標張禄之名今日故園復作范雎之裔然不若文正公之精巧楊文公楊文公為執政所忌母病謁告不候朝㫖徑歸韓城與弟同居踰年不調公有啓謝朝中親友曰介推母子願歸綿上之田伯夷弟兄甘受首陽之餓後除知汝州而看㫖事者攻擊不已公又有啓與親友曰已擠溝壑猶下石而未休方困蒺藜尚闗弓而相對二真宗甞以御製釋典文字法音集三十卷天禧中詔舉僧二十一人於傳法院箋註楊大年充提舉注釋院事製中有六種震動之説一僧採而箋之唶碎繁駮將三百字大年都抹去自下二句止八字曰地體本静動必有變其簡當若此三楊大年每欲作文則與門人賔客飲博投壺奕碁語笑喧嘩而不妨諦思以小方紙細書揮翰如飛文不加㸃每盈一幅則命門人傳録門人疲於應命頃刻之際或可千言真一代之文豪也胡武平胡武平甞奉勅撰温成皇后哀冊文闕以温成甞因禁卒竊發揮禦有功而秉筆者不能文其實胡乃用西漢莽何羅觸瑟馮媛當熊二事以狀其意曰在昔禁圍誰何弛衛觸瑟方驚當熊已厲覽者無不歎服王元之王禹偁尤精四六有同時與之在翰林而大拜者王以啓賀之曰三神山上常陪鶴駕之遊六學士中獨有漁翁之嘆以白樂天甞有詩云元和六學士五相一漁翁故也林逋錢塘林逋亦著高節以詩名當世名公多與之游天聖中丞相王公隨以給事中知杭州日與唱和親訪其廬見其頽陋即為出俸錢新之逋乃以啓謝王公其略曰伏䝉府主給事差人送到留題唱和詩石一片并剏軒榮以庇風日衡茅改色猿鳥交驚夫何極陋之窮居獲此不朽之奇事竊念頃者清賢鉅公出鎮藩服亦甞顧丘樊之側微軫土木之衰病不過一駐駕一式廬而已未有迂廻玉趾厯覽環堵當纓㽔之盛集攄風雅之秘思率以賡歌殆成編軸且復韞他山之堅潤刋羣言之鴻麗珠聯綺錯雕縟相照輦置植立賁於空林信可以奪山水之清暉發斗牛之寳氣者矣迨景祐初逋尚無恙范文正公亦過其廬贈逋詩曰巢由不願仕堯舜豈遺人又曰風俗因君厚文章到老醇其激賞如此見青箱雜記終慎思終慎思大名人家貧苦學衣冠故弊風貎寢陋始來應舉魏之舉人視之蔑如也既就試遂為觧首其謝啓曰三年於此衆人悉指於毛生一舉皆驚文將各歸於韓信又董儲郎中愍其窮甞以書薦於士人之富者庶濡涸轍而士人殊無哀王孫之意終復取書歸具啓納於董曰魯箭高飛謂聊城之必下秦都不割懷趙璧以空歸人多嘉其切當見倦遊雜録宋湜真宗即位之次年賜李繼遷姓名而復進封西平王宋湜宋白蘇易簡張洎在翰林俾草詔冊皆不稱㫖惟宋公湜知上意必欲推先帝欲封之意因進辭曰先皇帝早眷西顧欲議真封屬軒鼎之俄遷建漢壇之未逮故兹遺命屬在𦕈躬爾宜望弓劍以拜恩守疆垣而效節上大喜不數日㕘大政夏英公夏英公竦舉士子本無科名以父没王事授潤州丹陽簿即上書乞應制舉其略曰邊障多故羽書旁午而先臣供傳遞之職立矢石之地忘家徇國失身行陣陛下哀臣孤幼任之州縣唯陛下辨而明之若陛下以枕石潄流為達則臣世居市井若陛下以鳩杖鮐背為德則臣始踰弱冠若陛下以荷戈控弦為勇則臣生不知兵若陛下令臣待詔公車條問急政對揚紫宸指陳時事猶可與漢唐諸儒方轡並驅而較其先後矣英廟再三激賞詔赴中書試論六首一曰定四時别九州聖功孰大論二曰考定明堂制度論三曰光武二十八將功業先後論四曰九功九法為國何先論五曰舜無為禹闕功業孰優論六曰曾參何以不列四科論是歲遂應中制科二夏英公竦父官於河北景德中契丹犯河北遂没於陣後公有辭使契丹表云義不戴天難下穹廬之拜禮當枕塊忍聞夷樂之聲當時以為四六偶對最為精絶丁晉公丁晉公貶崖時權臣實有力焉後十二年丁以秘監召還光州致仕時權臣出鎮許田丁以啓謝之其略曰三十年門館遊從不無事弊一萬里風波徃復盡出生成其婉約如此又自䕫漕召還知制誥謝兩府二星入蜀雖分按察之權五月渡瀘皆是堤封之地後云謹當揣摹徃行軌躅前修效縝密於孔光不言温樹體風流於謝傅且詠蒼苔二丁晉公之南遷也行過澤州自作齋僧䟽云補仲山之衮雖曲盡其巧心和傅說之羮實難調於衆口其少以文稱晚年詩筆尤精在海南吟詠尤多如草觧忘憂憂底事花名含笑笑何人尤為人所𫝊誦見歸田録凌俶余頃與凌俶華郎中景陽登襄陽東津寺閣凌博雅君子也蔡君謨吳春卿皆嘗師之素稱翰林之妙時寺閣有舊題二十九字闕其字可三寸餘其法類顔而勢格清美無一㸃俗氣其語數句又簡而有法云陶糓陶糓晉開運中為詞臣時契丹來侵而楊光逺以青州叛而大將軍馬闕卒少帝為召糓草文以祭之糓立具草以奏曰漢北有不賔之國山東屯代叛之師敵陣未收將星先落少帝甚激賞潘佑太祖甞諭㫖江南令遣使說嶺南歸順後主令近臣數人作書惟潘佑所作千餘言詞闕麗遂用之江南莫不傳寫諷誦中朝士人多藏其本甚重之真一時之名輩也趙鄰幾趙鄰幾善屬文有名於時太宗用之知制誥未數旬卒中使䕶葬淳化末蘇易簡上言鄰幾有子東之亦好學善屬文任北地邑佐部送芻粟死塞下家睢陽鄰幾平生多著文家有遺藁上遣直史館錢熙徃訪之得補㑹昌以來厯二十六卷文集三十四卷所著鯫子一卷六年帝略一卷史氏懋官志五卷及他書五十餘卷來上皆鄰幾㸃竄之迹令宋州賜其家錢十萬徐鍇徐鍇仕江左至中書舍人尤嗜學該博領集賢殿學士校秘書時闕俶為校理右樂府中有摻字者俶多改為操盖章草之變鍇曰非可以一例若漁陽摻者音七鑿反三撾鼓也禰衡作漁陽三撾鼓詞云邊城晏開漁陽摻黄塵蕭蕭白日暗俶歎服之又甞召對於清暑閣閣前地悉布塼經雨草生縫中後主曰累遭薙者雨潤復生鍇曰吕氏春秋云桂枝之下無雜木盖桂味辛螫故也後主令於醫院取桂屑數斗徧布縫中經宿草盡死其博物多識如此甞欲注李商隱樊南集悉知其用事所出有代王茂元檄劉積言云闕躋陵飛走之期既絶投戈散地灰釘之望斯窮獨恨不知灰釘事乃後漢杜篤闕都賦云焚康居灰珍奇推鳴鎬釘庶蠡商闕事實類苑卷四十一

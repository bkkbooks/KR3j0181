body:
  text: 事實類苑卷四十三宋江少虞撰曠達隱逸真宗召隱士真宗祀汾隂召河中府處士李瀆劉巽拜大理評事致仕仍賜緋瀆以疾辭又召華山鄭隱敷求李寧對於行宫隱賜號正晦先生又召陜州魏野亦以疾辭不應命出聖經録陳希夷陳摶譙郡真源人與小聃同鄉里生嘗舉進士不第去隱武當山九室巖辟榖鍊氣作詩八十一章號指玄篇言修養之事後隱華山雲臺觀多閉門獨卧經纍月至百餘日不起周世宗召至闕下令於禁中扄户以試之月餘始開摶熟寐如故甚異之因問以神仙黃白修養之事飛升之道摶曰陛下為天下君當以蒼生為念豈宜留意於金乎世宗弗之責放還山令長吏嵗時存問訖太祖朝未嘗召太宗即位再召之雍熙初賜號希夷先生為修所居觀留闕下數月多延入宫中書閣內與語頗闕和詩什謂宰相宋琪等曰陳搏獨善其身不干勢利真方外之士入華山已四十年記其年近百歲且言天下治安故未朝覲此意亦可念也遣中使送至中書琪等問曰先生得玄默修養之道可以授人乎曰摶闕迹野無用神養之事皆所不知亦未嘗習鍊吐納化形之術無可傳授假如白日升天亦何益於治吏哉今主聖上龍顔秀異有天人之表洞達古今治亂之旨真有道仁聖之主正是君臣合德以治天下之時勤行修鍊無以加此琪等表上其言上覽之甚喜未幾放還山端拱二年夏令其徒賈德於張超谷鑿石室成手書遺表曰臣摶大數有終聖朝難戀於七月二十九日化形於蓮花峰下張超谷中緘封如法至期卒於石室中啓封視之乃預知也死七日支體猶溫有五色雲閉塞洞口終月不散見楊文公談苑二陳摶周世宗嘗召見賜號白雲先王太平興國初召赴闕太宗賜御詩云會向前朝號白雲後來消息杳無聞如今若肯隨徵召總把三峯乞與君先生服華陽巾草屨垂縚以賔禮見賜坐上方欲征河東先生諫止會軍已興令寢御園百餘日方起兵還果無功恩禮特異賜號希夷久之辭歸進詩以見志云草澤吾皇詔圖南摶姓陳三峯千載客四海一間人世態從來薄詩情自得真乞全麞鹿性何處不稱臣上知不可留賜宴使宰相兩禁傳坐為詩以寵其歸見澠水燕談三真宗時陳摶被詔赴闕下間有士大夫詣其所止願聞善言以自規誨陳曰優好之所勿久戀得志之處勿再往聞者以為至言見倦遊雜録四華陽隱士李奇自言開元中郎官年數百歲人罕見者開元中吕洞賔有劍術年百餘歲貌如嬰兒行步輕疾皆嘗至摶齋中奇以朱書青紙詩令小童齎寄摶摶與唱和交往五興國中太宗召陳摶赴闕摶隱華山雲臺觀百餘歲闕世宗拜諫議不受始四五歲戲水渦側一青衣媪抱置懷中乳之曰令汝更無嗜欲之性聰悟過人先生有髙識嘗戒門人种放子他日遭逄明主不假進取迹動闕廷名馳寰宇名者古今之美器造物者深忌之天地間無完名子名將起必有物敗可戒之放至晚節侈飾過度營産滿豐鎬間門人戚屬亦怙勢強併歲入益厚遂喪清節時議凌忽王嗣宗京兆醉嫚罵條奏於朝會赦方止祥符八年一旦山齋晚起服道衣聚諸生列飲取平生文藁悉焚之酒數行而逝奇男子也見玉壺清話江直木江直木隱居廬山有至行一夕有盜入齋中直木假寐不動清貧無他物惟持藥鼎而去遺其蓋直木俟其出户擲蓋與之來日謂人曰器不全成得之安用報曉雞為狸所食直木悵然將有報雞之寃者來日持百錢坐路隅以俟有持者過即買之割以祭雞人或謂直木曰此非狸直木曰亦是其類也見楊文公談苑劉孝叔劉孝叔吏部公述深味道腴東吳端清之士也方強仕之際已恬於仕進撰一闋以見志曰挂冠歸去舊煙蘿間身健養天和功名富貴非由我莫貪他這岐路足風波水晶宫裡家山好物外勝遊多晴溪短棹時時醉裡唱稜羅天公奈我何後將引年方得請為三茆宫僚始有養天和之漸夫何已先朝露歌此闋幾三十年信乎一林泉與軒冕難為期必見湘山野録王昭素王昭素先生酸棗人博學通九經尤長於易作易論二十三篇學者稱之李穆薦之太祖召見年已八十貌不衰太祖問何不求仕致相見之晚也對曰草野陋儒無補聖化賜坐講易帝嘉之以為國子博士逾月賜茶藥遣還先生善攝養年九十餘方卒見澠水燕談魏野魏野居於陜郊其地頗有竹木之勝客至必留飲酒真宗時聘召不起天僖中卒贈祕書省著作郎野子間有父風皇祐中天章閣待制李闕言於朝號清逸處士二魏野字仲先陜府人不巾幘無貴賤皆紗帽白衣以見之跨白驢真宗祠汾隂召不起能詩有唐人風格卒贈著作郎蠲其家役李瀆之中表兄也瀆卒野哭之慟謂其子曰吾不可往爾宜去奠之才六日而野亦卒人以為異春明退朝録田聘君田聘君吉字象宜篤學好文理致高古嘗學詩於希夷先生先生以詩評授之故詩尤清麗平居寡薄志在經世太祖建國思得異人詔詣公車會奔父喪久之東遊過濮止王元之舍元之貽書勉進其道會大河決溢君推明鯀禹之所治著禹元經三篇將上之不果既而得水桁於濟南明水將隱居焉因致書徐常侍鉉質其去就鉉答曰負鼎扣角顧廬築岩各因其時不失其道在我而已何嘗之有遂決髙蹈之計發易筮之遇暌因自號暌叟從之學者嘗數百人宋維翰許衮最其髙弟二子登朝盛稱其師淳化中韓丕言於天子召赴闕詔書入門而卒其後文多散墜皇祐中濟南崔書耽伯裒其遺逸得四十八篇析為二卷又次其出處為暌叟别傳云見澠水燕談麻先生麻先生仲英幼有俊才七歲能詩隨侍父官酈州時宋翰林白方謪酈時聞而召之坐中賦詩十篇宋大稱賞翌日宋以浣溪箋李廷圭墨諸葛氏筆遺之仍贈以詩曰宣毫歙墨川箋紙寄與麻家小秀才七歲能吟天骨異前生已折桂枝來十七一試禮部歸以二親喪祿不及養無仕進意退居臨淄辨士里别墅久而記覽該洽行義髙潔鄉黨化服鄰里有爭訟者不決於有司而聽先生辨之雖凶歲盜不入其家富韓公文潞公守青州皆嘗致書幣龎莊敏公出鎮遣其子奉書召至府中禮之極厚纍以詩遺之薦其行義於朝詔以為國子四門助教州學教授逺方學者爭師之卒年九十先生余祖母長安君兄也或以為宋詩云前生已折桂枝來先生一試不第終身罷舉宋詩已讖之矣李昭君陜郊魏處士野蒲中李昭君瀆乃中表也俱有髙節以吟詠相善於東郊鑿石方丈蔭以修竹泉流其前曰樂天洞瀆結茆中條之隂曰浮雲堂皆有瀟灑之趣每乘輿相過賦詩飲酒纍日乃去一日瀆過野曰前夕恍惚如夢中床下有人曰行到水窮處未知天盡時即正語曰盍云坐看雲起時對曰浮雲安能起耶瀆水命此必死期故來訪别還家未幾卒史延壽史延壽嘉州人以善相遊京師貴人爭延之視貴賤坐輒箕踞稱我人號曰史不拘史我吕文靖公嘗邀之延夀至怒閽者不開門叱之閽者曰此相公宅雖侍臣亦就客次延夀曰彼來者皆有求於相公我無求於相公開門延之延夀挾術以遊於世無心於用舍故能自重如此聱隅子建安黃晞慶厯中遊京師髙文古學為世稱重著書數萬言自號聱隅子晞家貧有守不干科舉而貌寢氣寒不自修飾石守道在太學率學官生員厚禮聘晞為學士晞踰垣而避之故歐陽文忠公詩曰羔雁聘黃晞晞警走鄰家近臣連年薦其道義詔授京秩將以為國子司業拜命數日一夕暴卒於景德僧舍士大夫惜之五老會慶厯末杜祁公告老退居南都與太子賔客致仕王渙光祿卿致仕畢世長兵部郎中分司米貫尚書郎致仕馮平為五老會吟醉相勸士大夫髙之祁公以故相耆德尤為天下傾慕故兵部詩云九老且無元老貴莫將西洛一般看五人年皆八十餘康寧爽健相得甚歡故祁公詩云五人四百有餘歲深稱分曹與挂冠而畢卿年最髙時已九十餘故其詩云非才忝預最髙年是時歐陽文忠公留守睢陽聞而歎慕借其詩觀之因次韻以謝卒章云聞説優遊多唱和新篇何惜盡傳看見澠水燕談江鄰幾江鄰幾善為詩清淡有古風蘇子美坐進奏院事謫官後死吳中江作詩云郡邸獄寃誰與辨臯橋客死世同悲用事甚精當嘗有古詩云五十踐衰境加我在明年論者莫不謂用事能令事如已出天然渾厚乃可言詩江得之矣江天質淳雅善飲酒鼓琴圍碁人以酒召之未嘗不往飲未嘗不醉已醉眠人強起飲之亦不辭也或不能歸即留宿人家髙度風韻陶靖節之比江嘗通判廬州有酒官善琴以坐局不得出江且就之郡中沙門羽士及里氓能碁者數人呼與同往郡人見之習熟因畫為圖前列騶導有一人騎馬青蓋其後沙門羽士衣褐數人葛巾芒履纍纍相尋意思蕭散惜時無名手此畫不足傳後何必減嵇阮也見劉貢父清話司馬溫公司馬溫公優遊洛中不屑世務齊物我一窮通自稱曰齊物子元豐中秋典樂全子訪親洛泗並轡過韓城抵登封憩峻極下院趨嵩陽造崇福宫紫極觀至紫虛谷尋會善寺過軒轅遽達西洛留廣度寺厯龍門至伊陽以訪奉先寺登華巖閣觀千佛巖躡山徑瞻髙公真堂步潛溪還寶應觀富文二公闕之廣化寺拜汾陽祠步伊水登香山到白公影堂詣黃龕院倚石樓臨節灘還伊口凡所經遊發為詠歌歸序之以為洛遊録士大夫爭傳之劉孟節劉孟節先生概青州夀光人少師种放篤學好古酷嗜山水而天姿絶俗與世相齟齬故久不仕晚乃得一名亦不去為吏慶厯中朝廷以海山岠嵎山震逾年不止遣使訪遺逸安撫使以先生名聞詔命之官亦不就青之南有冶源昔歐冶子鑄劍之地山奇水清旁無人煙叢筠古木氣象幽絶富韓公之鎮青也知先生久欲居其間為築室泉上為詩并序以餞之曰先生已歸隱山東人物空且言先生有志於民不幸無位不克施於時將著書以見志謂先生身雖隱其道當與日月雷霆相震耀其後范文正公文潞公皆優禮之欲薦之朝廷先生懇辭二公亦不敢強以成其高尚先生少時多寓居龍興僧舍之西軒往往憑欄靜立慨想世事戲吁獨語或以手拍欄杆常有詩曰讀書誤人四十年幾回醉把欄杆拍司馬溫公詩話所載者是也王樵王樵字肩望淄川人性超逸深於易善擊劍有概世志廬梓桐山下稱淄右書生不交世務山東賈同李冠皆尊仰之咸平中契丹內寇舉族北俘潛入彼中訪其親纍年不獲乃歸持諸喪刻木為親葬山東立祠奉祀終身太守劉通詣樵居樵踰墻遁去其後高辨為知州事范諷為通判相與就見之李冠以詩寄之曰霜臺御史新為郡棘寺廷評繼下車首謁梓桐王處士教風從此重詩書晚自號贅世翁為贊其門曰書生王樵薄命寡志無益於人道號贅世預卜地為窖名繭室中置石榻刻銘其上曰生前投軀以虞不備殁後寄魄以備不虞後感疾即入卧室中自掩户乃卒命以古劍從葬著遊邊集三卷安邊三策説史十篇皆散失濟南李芝為贅世先生傳載其事後有淄川僧文幼募資即其地復為繭堂并起堂祠樵文幼博雅能為詩精隂陽地理李續處士蒲中李續處士富榮國初為侍御史有直聲續少好學有髙志長廬中條山下以泉石琴吟自樂未嘗造州縣真宗祠汾隂詔赴行在續不起有表稱謝云十行溫詔初聞丹鳳銜來一片間心已被白雲留住真宗製詩以賜之時有同郡留巽治三傳年老博學躬耕不仕以講授為業真宗亦以一絶句賜之見澠水燕談孫集賢孫集賢冕天禧中直館幾三十年江南端方之士也節概清直晚守姑蘇甫及引年大寫一詩於廳壁詩云人生七十鬼為鄰已覺風光屬别人莫待朝廷差致仕早謀泉石養間身去年河北曾逄李今日淮西又見陳寄語姑蘇孫刺史也須抖擻老精神題畢拂衣歸九華以清節高操羞百執事之顔朝廷高其風許再任詔下已歸竟召不起王冀公欽若里閈素交也冀公天禧中罷相以宫保出鎮餘杭􅋈舟蘇臺歡好欵洽醉與孫曰老兄淹遲日久且寬衷當别致拜問公正色答曰二十年出處中書一素交潦倒江湖不預一點化筆逮事權他屬去廟堂數千里為方面始以此語見悅得為信乎冀公愧謝舟遂行見湘山野録孫宣公孫宣公奭以太子少傅致仕居於鄆一日置宴御詩廳語客曰白傅有言多少朱門鎖空宅主人到老不曾歸今老夫歸矣喜動於色復顧石守道講易離卦九三爻辭且曰樂以忘憂自得小人之志歌而鼓缶不興大耋之嗟公以醇德奧學勤講禁中二十餘年晚節勇退優遊里中始終全德近世少比麻希夢端拱初太宗詔訪高年前青州録事參軍麻希夢年九十餘居臨淄召至闕下延見便殿賜坐語極從容及詢人間利害對之甚詳多蒙聽納他日訪以養生之理對曰臣無他術惟清心寡欲節聲音薄滋味故得致此詔以為尚書工部郎中致仕賜金紫工部好學善訓子孫太宗興國中登進士甲第孫溫基溫舒祥符中相繼舉進士第為天下第三人而天下稱麻氏教子有法張乖崖楊文公由禁林為汝守張尚書詠移書云張老子今年七十矣血氣衰劣湎然昏沈入靜自守以真排邪忽睹來緘當審大年官若是而守若是又思大年氣薄多病應遂移疾之請盛年辭榮是名高格若智不及氣屑屑罹禍者自古何恨大年素養道氣宜終窶以掃地莫致潤屋得君得時無害生民大年知張老子乎老子心無藴蓄絶情絶意顧身若脫屣豈能念他人乎大年自持不宜詠白其語真氣徑如乖崖之在目見寶晉書稱王獻之嘗歎云吾於文章書禮識人之形貌性情真所謂也事實類苑卷四十三

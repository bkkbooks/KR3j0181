body:
  text: 事實類苑卷九宋江少虞撰名臣事迹王沂公王文正公曾為人方正持重在中書最為賢相嘗謂大臣執政不當收恩避怨嘗謂尹師魯曰恩欲歸已怨使誰當聞者歎服以為名言廬陵居士集二景福中朝廷始與契丹通好詔遣使將以北朝呼之王沂公以為太重請止稱契丹夲號可也真宗嘆賞再三朝論韙之三祥符中王沂公奉使契丹館伴邢祥頗肆談辨深自衒鬻且矜賜鐵劵公曰鐵劵蓋勳臣有功髙不賞之懼賜之以安反側耳何為輒及邢祥大沮已上見涑水紀聞四王沂公曾青州發解及南省廷試皆為首冠中山劉子儀為翰林學士戲語之曰狀元試三場一生喫著不盡沂公正色答曰曾平生之志不在溫飽范魯公范質初作相與馮道同堂道意輕其新進潛視所為質初知印當判事語堂吏曰當判之事並施籖表得以視而書之慮臨文失誤貽天下笑道聞歎曰真識大體吾不如也質後果為名相楊文公談苑又范魯公質早輔周室及太祖受禪不改其任兩朝翊戴嘉謀偉量時稱名相然自以執政之地生殺慘舒所繫茍不能早夜兢畏悉心精慮敗事覆餗憂患畢至加之道有枉直時有夷險居其位者今古所難嘗謂同列曰人能鼻吸三斗醇醋即可為宰相矣出涑水紀聞范文正范文正公仲淹少貧悴依睢陽朱氏家嘗與一術者遊會術者病篤使人呼文正公而告曰吾善鍊水銀為白金吾兒幼不足以付今授子即以其方與所成白金一斤封志納文正懷中文正方辭避而術者已絶後十餘年文正為諫官術者之子長呼而告曰而父有神術者之死也以汝尚幼故俾我收之今汝成立當以還汝出其方并白金授之封志宛然筆録二景祐中范文正公知開封府忠亮讜直言無回避左右不便因言公離間大臣自結朋黨乃落天章閣待制出知饒州余靖安道上疏論救以朋黨坐貶尹洙師魯上言靖與仲淹交淺臣於仲淹義兼師友當從坐貶監郢州稅歐陽永叔貽書責司諫髙若訥不能辨其非辜若訥大怒繳奏其書降授夷陵縣永叔復與師魯書云五六十年來此輩沉默畏懼布在世間忽見吾輩作此事下至竈間老婢亦相驚怪時君謨為四賢一不肖詩播於都下人爭傳寫鬻書者市之頗獲利後北使至密市以還張守庸奉使過幽州館中有書永叔詩在壁者四賢希文安道師魯永叔也一不肖若訥也涑水紀聞三晏丞相殊留守南京仲淹遭母憂寓城下晏公請掌府學仲淹嘗宿學中訓督學者皆有法度勤勞恭謹以身先之夜課書生讀書寢食皆立時刻往往潛至齋舍詗之見有先寢者詰之其人紿云適疲倦暫就枕耳仲淹問未就寢之時觀何書其人亦妄對仲淹即取書問之其人不能對即罰之出題使諸生作賦必先自為之欲知其難易及所當用意亦使學者凖以為法由是四方從學者輻輳其後諸人以文學有聲名於場屋朝廷者多其教也服除至京師上宰相書言朝廷得失及民間利害凡萬餘言王曾見而偉之時晏殊亦在京師薦一人為館職曾謂殊曰公知范仲淹捨而薦斯人乎已為公置不行宜更薦仲淹也殊從之遂除館職頃之冬至立仗禮官定議欲媚章獻太后請天子率百官獻夀於庭仲淹以為不可晏殊大懼召仲淹怒責之以為狂仲淹正色抗言曰仲淹受明公誤知常懼不稱為知已恥不意今日更以正論得罪於門下也殊慚無以應湘山野録四初范文正公貶饒州朝廷方治朋黨士大夫無敢往别王待制質獨扶病餞於國門大臣責之曰君為長者何自陷朋黨王曰范公天下賢者故質敢望之若得為黨人公之賜質厚矣聞者為之縮頸五范文正公守邠州暇日帥僚屬登樓置酒未舉觴見衰絰數人營理喪具者公亟令詢之乃寄居士人卒於邠將出殯近郊賵斂棺槨皆所未具公憮然即徹宴席厚賙給之使畢其事坐客感歎有泣下者並涑水紀聞六慶厯中范希文以資政殿學士判邠州豫中途止謁翌日召食侍李郎中丁固席范與丁同年進士也因述舊日方修學時最貧窶與劉某同止長白山僧舍惟煮粟米二合粥一器經宿遂凝以刀劃四塊早晚取二塊斷虀十數莖酢水汁半盂入少鹽暖而啖之如此者三年湘山野録曹武毅曹翰以罪謫為汝州副使凡數年一日有內侍使西京朝辭日太宗密諭之曰卿至汝州當一訪曹翰問其良苦然慎勿泄我意也內侍如旨往見因敘其遷謫之久翰泣曰罪犯深重感聖恩不殺死無以報敢訴苦耶但以口衆食貧不能度日幸內侍哀憐欲以故衣質十千以繼粥飯可乎內侍曰太尉有所須敢不應命何煩質也翰固不可於是封裹一復以授內侍收復以十千答之洎回奏翰語直言質衣事太宗命取其復開視之乃一大幅畫障題曰下江南圖太宗惻然念其功即日有旨召赴闕稍復金吾將軍蓋江南之役翰為先鋒也東軒筆録王參政王參政化基興國二年及第於吕蒙正榜釋褐授贊善知州趙韓王學術平淺議以新進少年無益於治抽詔改淮幕公歎曰不幸丞相以舊勳自恃時忘晚進男兒既逢明時豈能事幕府承迎於婉媚之末乎抗疏自薦表稱真定男子公嘗慕范滂有攬轡澄清天下之志遂撰澄清王路論皆切於時要太宗壯之曰化基自結人主慷慨之士也亟用之由著作郎三司判官左拾遺召試中丞補闕知制誥狄武襄天聖五年王文安公堯臣狀元及第釋褐將作監丞通判湖州是年狄武襄公青始投拱聖營為卒晚年同入樞密院武襄為使文安副焉並東軒筆録魏咸熙魏咸熙仁浦之子性寬厚任太僕少卿纍典籓郡知杭州日晨起視事掌舍卒挂油缸於簾鈎上平中其額翻汙冠綬咸熙戒左右勿得輒言使老卒驚懼亟還卧內易衣甲而出歸朝大治酒具賓友集饌陳越中銀缸陶器僮僕數人共舉食案而前相嘲誚蹉跌盡碎之坐客皆失色咸熙殊不變容但令易他器别具蔬果亦不加笞責人以為劉寬之比王文正王文正太尉局量寬厚未嘗見其怒飲食有不精潔者但不食而已家人欲試其量以少埃墨投羮中公惟啖飯而已家人問其何以不食羮曰我偶不喜肉一日又墨其飯公視之曰吾今日不喜飯可具粥其子弟訴於公曰庖肉為饔人所私食肉不飽乞治之公曰汝輩人料肉幾何曰一斤今但得半斤其半為饔人所廋公曰盡一斤可得飽乎曰盡一斤固當飽曰此後人料一斤半可也其不發人過皆類此嘗宅門壞主者徹屋新之暫於廊廡下啓一門以出入公出側門門低據鞍俯伏而過都不問門畢復行正門亦不問有控馬卒嵗滿辭公公問汝控馬幾時曰五年矣公曰吾不省有汝既去復呼回曰汝乃某人乎於是厚贈之乃是逐日控馬但見背未嘗視其面因去見其背方省薛簡肅薛簡肅公天禧初為江淮發運司始辭王文正公王無他語但云東南民力竭矣薛退而謂人曰真宰相之言也二王文康公薛簡肅公俱嘗鎮蜀而皆有名章獻時同為執政一日奏事已因語蜀事文康曰臣昔在蜀時有告戌卒反執斬之於營門遂無事簡肅曰臣在蜀時亦有告戌卒反者叱出之亦無事並湘山野録吕文靖景祐末西鄙用兵大將劉平死之議者以朝廷委宦者監軍主帥節制有不得專者故平失利誅監軍黃德和或請罷諸師監軍仁宗以問宰相吕文靖公曰不必罷但擇謹厚者為之仁宗委公擇之對曰臣待罪宰相不當與中貴私交何由知其實否願詔都知押班保舉有不稱職者與同罪仁宗從之翌日都知叩頭乞罷諸監軍宦士大夫喜公之有謀二慶厯初仁宗服藥久不視朝一日聖體康復思見執政坐便殿促召二府宰相吕許公聞命移刻方赴詔比至中使數輩促公同列亦贊公速行公愈緩步既見上上曰久病方平喜與卿等相見而來之遲何也公曰陛下不愈中外頗憂一旦聞急召近臣臣等若奔馳以進慮人心驚動耳上以為深得輔臣之體已上出涑水紀聞三吕許公夷簡為郡守上言乞不稅農器真宗知其可為宰相記名殿壁後果正台席梁莊肅為郡守上言應天下疑獄並具事節奏取敕裁仁宗知其有仁心後至龍圖閣直學士王安石為翰林學士亦因萊州阿藝謀殺夫以為案問欲舉免所因之罪主上決意用為輔相自莊肅之説進歷仁宗英宗神宗三朝之中凡有奏疑未始不免死案問之律行凡臨劾而首陳者皆得原減所謂仁人之言其利溥哉東軒筆録李公擇李常公擇少讀書於廬山五老峰白石庵之僧舍書幾卷公擇既貴思欲遺之後學者不欲獨有其書乃藏於僧舍其後山中之人思之目其居曰李氏藏書山房而蘇子瞻為之記涑水紀聞張乖崖王均李順亂後凡官於蜀者多不挈家以行至今成都知府猶有此禁張詠知益州單騎赴任是時一府官屬憚張之嚴峻莫敢蓄侍婢者張不欲絶人情遂自置侍婢以侍巾幘自此官屬稍置姬侍矣張在蜀四年被召還闕呼婢父母出資以嫁之仍處女也張在蜀一日有術士上謁自言能煆汞為白金張曰若能一火煆百兩乎術士曰能之張即市汞百兩俾煆一火而成不耗銖兩張歎曰若之術至矣然此物不可用之私家立命工煆一大香爐鑿其腹曰充大慈寺殿上用公尋送寺中以酒榼遺術者而謝絶之人服其不欺也二張乖崖性剛多躁蜀中盛暑食錢鉏頂中末頂屢垂於碗闕納之頗煩急取投器中曰但請與因搶而起少年慷慨學擊劍善立竒節謂友人曰張詠賴生明時讀詩書以自律不爾則為何人也李順之亂益州大將王繼恩上官正輩頓師逗遛不進邀使行盛陳供帳郊燕以餞之舉爵謂軍校曰爾曹蒙國厚恩無以塞責當勉力蕩平寇壘以手指其地曰若老師曠日即爾輩死所也徐謂繼恩曰朝廷始若許僕參後騎豈至今日醢賊以噉師久矣自是士氣果振獲捷而還見玉壺清話三初蜀新亂張尚書至公宇襲舊制周列更鋪凡數百所公即日命罷之人心大安及代去留一卷實封文字與僧正希白且云候十年觀此後十年公薨於陳州訃至希白為公設大會齋請知府凌諫議策發所留文字乃公畫像衣兔褐繫絛草裹自為贊曰乖則違俗崖則絶物乖崖之名聊以表德因號乖崖公遂畫於天慶觀仙遊閣又九曜院皆畫像公府衙之東南隅又有祠堂皆後人思公而為之也初蜀人雖尚學而不樂仕宦公察其有聞於鄉者得張及李畋張逵間召與語民間事往往延入卧內從容欵曲故公於民情無不察者三人佐之也其後三人者皆薦之於朝皆為員外郎而蜀人寖多仕宦矣公每斷事有情輕法重情重法輕者必為判語讀以示之蜀人鏤板謂之戒民集大抵以敦風俗篤孝弟為本也湘山野録四張乖崖未第時嘗遊湯隂縣令賜束帛萬錢張即負之於驢與小僮驅而歸或曰此去遇夜道店波澤深人煙踈濶可俟徒伴偕行張曰秋深矣親老未授衣安敢少留即但淬一短劍而行去三十餘里日已宴止一孤店惟一翁洎二子見詠來甚喜密相謂曰今夜好箇經紀張心動竊聞之因斷栁之若合拱者為一棒置室中店翁問公持此物何用張曰明日早行聊為之備耳夜始分翁命其子呼曰雞已鳴秀才可去矣張不應即來推尸張先以床拒左扉以手拒右扉店夫既呼不應即再三推闔張忽縱之退立其人躲身而入張摘其手斃之曳入閫少時其子又至入門復殺之又持劍拒翁方燎火爬闕即斷其手老幼數人併命其室呼僮牽驢出門乃縱火行三十餘里始曉後來者曰前店失火舉家被焚倦遊録五故尚書張詠嘗謂人曰吾榜中得人最多慎重有雅望無如李文靖深沉有德鎮服天下無如王公面折庭諍素有風采無如寇公當方面寄則詠不敢辭出名臣遺事丁文簡丁文簡公嘗言舉進士時以制誥為贄卷既而復自笑曰是不揆已然其後為知制誥翰林學士參知政事亦見其所存有素矣初舉人居鄉必以文卷投贄先進自糊名後寖衰賈許公為御史中丞又奏罷公卷而士子之禮都亡矣湘山野録二丁度字公雅開封府祥符人祖顗盡其家聚書至八千卷室以貯之曰吾聚書多雖不能讀必有好學者為吾子孫矣父逢吉以醫事真宗於藩邸官至將作監丞致仕度以祀汾隂嵗舉服勤辭學第二人登科解褐大理評事通判遷太子中允直集賢院今上即位度上書請博延儒臣觀講道誼增置諫官切磨治體墾闢荒萊安集流離以為州縣殿最章獻皇后善之遷太常博士賜緋俄出知湖州事徙兩京轉運使以祠部員外知制誥遷翰林學士久之兼侍講學士又加承旨又兼端明殿學士國朝故事中書制民政樞密專兵謀及趙元昊逆命朝廷多事度建言古之號令皆出於一今二府分兵民之政若錯置異同則下無適從非為國體於是始詔軍族重務二府通議度在兩禁十五年性寬厚真率不修威儀流輩多易之上嘗從容問度用人資序與才器孰先度對曰天下無事則循守資序有事則簡拔才器上甚善之會諫官有言度丞相問求進者上以度言諭執政且曰度侍從十有五年而應對如是不自為地真淳美長者也尋以度為工部侍郎樞密副使逾年參知政事頃之衛士為變事連宦官楊懷敏樞密使夏竦上言請使御史與宦官同於禁中鞫其獄不可滋蔓使反側者不自安度曰宿衛有變事關社稷此可忍孰不可忍固請附外臺窮黨與持論堅決然卒從竦議未幾度求解政事時特置紫宸殿學士以度為之起兼侍讀學士尋因避紫宸改為觀文殿學士後數年薨贈吏部尚書諡文簡度蚤喪妻晚年學修養之術常獨居靜室左右給使惟老卒三人而已洓水紀聞歐陽文忠公歐陽文忠公自歷官至為兩府凡有所建明於上前其詞意堅確持守不變且勇於敢為王荆公常期其可任大事及荆公輔政多所更張而同列少與合者是時歐陽公罷參知政事以觀文殿學士知蔡州荆公乃進為宣徽使判太原府許朝覲意在引之執政以同新天下之政而歐陽公懲濮邸之事深畏多言遂力辭恩命繼以請老而去荆公深歎惜之東軒筆録二歐陽文忠公使遼其主每擇貴臣有學者押宴非常例也但公名重當代故其為外國敬服如此也涑水紀聞太宗知人太宗時賈黃中宋白李至吕蒙正蘇易簡五人同時拜翰林學士承旨扈蒙贈之以詩曰五鳳齊飛入翰林其後吕蒙正為宰相黃中李至蘇易簡皆至參知政事宋白官至尚書老於承旨皆為名臣廬陵居士集不信異端李司空家纍世不置佛堂不畜內典經文王似宗家不燃楮鏹祀其先人酒炙而已楊文公談苑事實類苑卷九

body:
  text: 事實類苑卷二十四宋江少虞撰衣冠盛事呂文靖慶厯二年十二月詔拜呂文靖公司空平章軍國重事元祐三年四月正獻公又以司空平章軍國事父子相繼以三公平章軍國古所未有也澠水燕談竇尚書晉公言竇儀尚書本燕人為性嚴重家法整肅尚書嘗與客坐即二侍郎三起居四㕘政五補闕皆侍立焉晉公談録王相國先公嘗言同人相國王公溥二十六歳状元及第後六年拜相時年三十二又四年加守司空時年三十六一品罷相守太子太傅時年四十二歸班在具慶下每先太傅見客公以前宰相兢兢侍側略無惰容客不能安席引去者甚衆當時縉紳之士無不以為美談云在相府時恩門少保田在公以機務少暇每遇沐浴方得使謁田門人之敬於少保嘗有詩寄相國云一戰文塲㧞趙旗便調金鼎佐無為白麻驟濟恩何極黄髪無聞喜可知䟦勅案前人到少築沙堤上馬歸遲立班始得遙相見親洽争如未遇時春明退朝録陳諫議諫議大夫陳省華三子皆登進士第而伯仲為天下第一晚年與燕國夫人馮氏俱康寜長子堯叟知樞密院事二子堯佐直史館少子堯咨知制誥每對客三子列侍客不能安求去省華曰學生輩耳立侍常也士大夫以陳氏為榮張文孝張文孝公觀以真宗幸亳歳狀元及第仕至樞密副使而其父尚無恙父召歸業周易學究及第選滯調三十餘年年六十餘始轉京秩以主客員外郎致仕見其子入踐樞宻府受太師卿夀九十餘卒未逾年張公亦捐舘故諡文孝乃知張公貴達皆其父慶福之所致也澠水燕談宋太師宋偓後唐明宗之外孫漢太祖之駙馬歴累鎮節度檢校太師同中書門下平章事有女十五人開寶皇后最居長韓樞宻崇訓寇莱公王武恭公皆其壻也多享國封春明退朝録王文正王文正公旦釋褐知臨江縣時獄有合死囚公一夜不寐思以計活之方五鼓空中人喝直更速起相公將出㕔来斯須開堂門升㕔急呼死囚出問公之父中令晉公祐嘗曰此兒異日必為三公因手植三槐於庭以待之有作詩紀其事者甚多晉國知制誥二十餘年最號淹滯文正知制誥與父相去不數年入西掖牆壁間其父翰墨手澤猶在坐卧不易處長城錢公若水風鑑最髙與公同直史舘謂人曰王子明既貴且夀吾進用雖在其先皆所不及也果長城公纔四十卒湘山野録國朝歴三公三師者國朝歴三公三師者三太祖即位天雄節度符魏王彦卿王守太尉太師定難節度西平王李中令彝興相守太傅太尉荆南節度南平王髙中令保融自守太保為太傅國朝宰相為僕射國朝宰相為僕射魏公仁浦趙令薛文惠沈恭惠宋惠安李文正呂文穆呂正惠李文靖張司空王文正向文簡王冀公寇莱公呂許公王沂公賈魏公陳恭公韓魏公文潞公富鄭公曽魯公二十二人樞相為僕射陳文忠曹襄悼張榮僖王康靖四人樞宻使為僕射石元懿一人李相四美先公嘗言致政之明年正月十五夜上御乾元門樓觀燈先公預焉初夕樂作酒三行上起凭欄四顧見燈燭士庶之盛詔移先公近御座别賜一榻在丞相上上自取御樽斟酒親賜菓餌因問先公晉漢朝舊事久之聖意甚歡謂左右曰帝都人物騈闐閭里道途非復昔時之隘陋也方之晉漢則繁富百倍矣惟此李卿宿舊尚可紀耳上又目視先公語侍臣曰李卿可謂善人君子矣侍朕十年兩在相位未嘗有傷人害物之事餘可知也先公但俯伏拜謝至中夜方退先公歸舍謂諸子曰吾䇿名仕版僅五十年内省生平所為雖不能見竒功異勲以耀簡册然不蔽人之善不忘人之德度德守分不愧屋漏今聖君奬拔兩王相伍又保全老朽令退其身顧盼恩意甚厚于徃者又對羣臣言目之為善人君子惟四者有一足為幸吾何人哉而享是四美昔仲尼有言曰善人吾不得而見之矣又謂子貢曰女為君子儒今上金口崇奬訓諭曲加於老朽吾何以稱之知己尚思殺身以報况辱斯言哉爾曹勉勵忠孝之節思聖君之所言念吾身之所行則庶幾無忝爾祖矣已上並春明退朝録同甲㑹文潞公保洛日年七十八同時有中散大夫程珦朝議大夫司馬旦司封郎中致仕席汝言皆年七十八嘗為同甲㑹各賦詩一首潞公詩曰四人三百十二歳况是同生丙午年招得梁園為賦客合成商嶺採芝仙清談亹亹風盈席素髪飄飄雪滿肩此㑹從容誠未有洛中應作畫圗傳筆談三學士兩閒人少師趙公概字叔平為人寛厚長者留滯内相十餘年晚始㕘政治平中退老睢陽而歐陽文忠公亦退居東潁吕正獻公以翰林學士出守潁一日文忠公同叔平訪之吕公喜二公之来特為展宴文忠乃自為口號一聯云金馬玉堂三學士清風明月兩閒人謂公與文忠也倦逰録倂青箱襍紀未五十登庸國朝宰相趙令盧相文潞公四十三登庸寇莱公四十四王沂公四十五賈魏公四十八未四十入兩府樞宻副使趙令三十九寇莱公三十一晏元獻公三十五韓魏公三十六參知政事蘇侍郎易簡三十六王沂公三十九少年掌詞翰知制誥蘇侍郎二十六王沂公二十七盧相楊文公晏元獻公宣獻公今宣徽使王拱辰皆二十八夏文莊公三十學士蘇侍郎二十八晏元獻公宣徽王公皆三十宣獻公三十五王沂公李邯鄲三十六楊文公錢子飛皆三十三盧相今㕘政王禹玉皆三十八父子掌誥父子掌誥自國初至熈寜元年凡九家李文正昌武王兵部文正王惠獻安簡晁文元文莊錢希白修懿梁翰林莊肅吕文靖仲裕宋宣獻敏求蘇儀甫子容宰相三入宰相三入者趙中令太祖朝初相太宗朝兩入吕文穆太宗朝再相真宗朝一入吕許公張鄧公在仁宗朝皆三入學士三入學士三入李文正劉中山子修中山三入玉堂集云三入翰林皆待詔學士四入宋景文范景仁四入學士五入李邯鄲五入而一不拜侍中不珥貂丁晉公馮魏公位三公侍中而未嘗冠貂蟬為相而冠貂杜祁公相府百日當慶厯四年郊祀貂冠公衮又升輅奉册改諡諸后並春明退朝録為相具慶國朝宰相最少者惟王溥罷相時父母皆在以為榮宰相丁憂富丞相弼入中書時年五十二太夫人在堂康强後三年太夫人薨有司議贈䘏之典云無見任宰相丁憂例是歳三月十七日春宴有司已具前一夕有㫖富某母䘮在殯特罷宴此事亦前世未有宰相侍立宰相王溥父祚少為太原掾属累宿州防禦使既老溥勸其退居洛陽居常怏怏及漙為相客或候祚溥常朝服侍立客不安席求去祚曰學士勞賢者起避耶同時學士繼登二府嘉祐八年上元夜賜中書樞宻院御筵于相國寺羅漢院國朝之制歳時賜宴多矣自兩制以上皆與惟上元一夜祗賜中書樞宻院雖前兩府見任使相皆不得與是嵗昭文韓相集賢曽公樞密張公皆在假不赴惟余與西㕔趙侍郎槩樞宻胡諫議宿呉諫議奎四人在席酒半相顧四人者皆同時翰林學士相繼登二府前此未有也因相道玉堂舊事為笑樂遂皆引滿劇飲亦一時之盛事也並廬陵居士集世代尚主王承衍尚秦國賢肅大長公主至曽孫師約又尚惠和大長公主子植又選尚惠闕公主昔東漢竇氏一門三公主於時親戚功臣莫與為比唐薛敬與其子鏽相繼尚睿宗明皇女獨稱盛于唐氏而尚三公主又父子相繼惟王氏一門澠水燕談不墜閥閱李宗諤之子昉卒年四十九真宗甚悼之謂宰相曰國朝將相家能以身自立不墜門閥者惟昉與曹彬耳又嘗謂曰聞卿至孝宗族頗多長幼雍穆朕嗣守二聖其業亦如卿輩之保守門户也范蜀公䝉求子弟五人同日登科慶厯五年仁宗臨軒賜進士第闕刑詳議官祝諫侍庭中男唐中甲科次男虞弟詔一壻忘其姓名皆擢第季弟許得皆同出身每唱一名則稱謝是日諫五拜殿下仁宗以問近臣對以皆子弟也仁宗嘉賞之澠水燕談父子狀元及第祥符二年真宗東封岱山六月放梁固以下進士三十一人及第四年祀后土于汾陽十一月放張師德以下三十一人及第固雍熈二年状元梁灝之子師德建隆二年状元去華之子兩家父子状元當時士大夫榮之甘棠魏野處士聞而以詩賀之曰封禪汾陽連歳榜状元俱是状元兒洛陽耆英㑹富鄭公熈寜四年以司徒歸洛陽時年六十八是時司馬端明不拜樞宻副使求判西臺時年五十三二公安閒冲黙不交世務後十一年當元豐五年文潞公留守西都慕唐白樂天九老㑹於是悉聚洛中士大夫賢而以老自逸者於鄭公第置酒相樂凡十二人既又命鄭奐圖形妙覺僧舍各賦一詩時人目之曰洛陽耆英㑹而司馬公為之序其相聚也因洛中舊俗序齒不尚官時鄭公年七十九潞公與司封郎中席汝言皆七十七朝議大夫王尚恭七十六太常卿趙丙秘書監劉幾衛州防禦使馮行已皆七十五天章閣待制楚建中七十三朝議大夫王慎言七十二大中大夫張問龍圖閣直學士張燾七十司馬公六十四故潞公詩云當筵尚齒尤多幸十二人中第一人鄭公贈潞公詩云顧我齡年須第一在公勲德自無雙潞公再答曰惟公福夀并勲德合是人間第一流是時宣徽使王拱辰年七十一留守大名貽書二人願預其數凡十三人也登第踐歴相繼王文正公曽李文定公廸咸平景德間相繼狀元及第其後更踐政府及罷相鎮青又為交承故文正送文定移鎮兖海詩有錦標得雋曽相繼金鼎調元亦踐更之句又云并土兒童君再見㑹稽章紱我偏榮葢文定再鎮兖而青社文正鄉里澠水燕談入參父在參知政事父見其進拜者盧朱崖闕正肅與尚書張公安道樞府陳堯叟張文孝呉文肅由登用而朝廷多峻加其恩命春明退朝録科第爵位皆同范質初舉進士時和凝知貢舉凝常以宰輔自期登第之日名第十三人及覽質文尤加嘆賞即以第十三名處之塲屋間謂傳衣鉢若禪宗之相付授也後質果繼凝相位亦以太子太傅封魯國公縉紳以為美談質自從事未嘗釋卷人或哂之質曰昔常有異人與吾言他日必當大任茍如其言無學術何以處之澠水燕談美事三者并集和峴字晦仁父凝晉宰相太子太傅魯國公峴生之年㑹凝入翰林加金紫知科貢舉凝喜曰我平生美事三者并集此子足繼我矣且名之曰三美范蜀公蒙求禮闈之盛嘉祐二年余與端明韓子華翰長王禹玉侍講范景仁龍圖梅公儀同知禮部貢舉辟梅聖俞為小試官凡鎻院五十日六人者相與唱和為古律歌詩一百七十餘篇集為三卷禹玉與余為校理時武成王廟所解進士也至此新入翰林與予同院又同知貢舉故禹玉贈余云十五年前出門下最榮今日預東堂余答云昔時叨入武成宫曽看揮毫氣吐虹夢寐閒思十年事笑談今日一樽同喜君新賜黄金帶顧我宜為白髮翁天聖中余舉進士國學兩省皆忝第一人薦名其後景仁相繼亦然故景仁贈余云淡墨題名第一人孤生何幸繼前塵聖俞自天聖中與余為詩交余嘗贈云猶喜共量天下士亦勝東野亦勝韓而子華筆力豪贍公儀文思温雅而敏捷皆勁敵也前此有南省試官者多窘束條制不少放懷余六人者懽然相得羣居終日長篇險韻衆製交作筆吏疲於冩録僮使奔走徃来間以滑稽嘲謔多加於風刺更相酬酢徃徃哄堂絶倒自謂一時盛事前此未之有也榜首三人皆登兩府自太宗崇興儒學驟擢髙科至輔弼者多矣盖太平興國二年至天聖八年二十三榜由吕文穆公蒙正而下大用者二十七人而三人并登兩府惟天聖五年一榜而已是歳王文安公堯臣第一外昭文相公韓僕射琦西㕔㕘政趙侍郎槩第二第三人余忝與公同府每見語科塲盛事自景祐元年以後至今治平三年三十餘年十二榜五人以上未有一人登兩府者亦可怪也一榜之盛咸平五年陳恕知貢舉選士最精所解七十二人王沂公曽為第一御試又選其半而及第者三十八人沂公又為第一故京師為語曰南省解一百依除殿前放五十省陌也是歳取人雖少得士最多宰相三人乃沂公與王公隨章公得象㕘知政事一人韓公億侍讀學士一人李仲容御史中丞一人王臻知制誥一人陳知微而汪白青楊楷二人雖不達而皆以文學知名當世歸田録閥閱之盛慶厯中一日丞相將出中書俟午漏未上因從容聚㕔閒話評及本朝文武之家箕裘嗣續閥閱之盛諸公屈指若文臣惟韓大㕘億之家武臣惟夏宣徽守贇之家堂吏馳白韓夏二宅以為美談湘山野録賜錢贖第李謙溥太祖朝名將也在汾晉二十餘年大小百餘戰未嘗小衂每廵邊老少拜望呼以為父晚治第於道德坊中為小圃植花木竹石頗與朝士游久之以從弟謙昇女適王子陳王貧無資用遂以所居之第質於宋延偓後子允正為通事舍人侍太宗問曰爾父邊陲三十年止餘一第忍属他姓耶允正具對所以太宗即遣中使出内府錢付延偓購還之王禹偁作記美其事名二亭曰克家肯構宰相畢士安而下及諸名公賦詩紀述自成一編澠水燕談玉堂之盛國朝自建隆初至天聖四年入院凡四十七人大拜者十人李昉盧多遜吕蒙正李沆畢士安王旦王欽若李廸王曽錢惟演樞密使二人王欽若錢惟演㕘政十五人李昉盧多遜李穆賈黄中吕蒙正李至蘇易簡李沆張洎王旦王欽若趙安仁陳彭年王曽李廸樞密副使六人錢若水宋湜闕王旦晏殊承㫖六人陶穀李昉宋白晁迥蘇易簡李維三入院一人李昉再入院七人竇儀李穆宋白錢惟演楊億劉昺李維父子入院一家昌武父子兄弟入院三家二竇二李二錢弟拜相兄草麻錢希白闕為從父兄也天闕三年十二月子㕘軍衡之命時希白當制也稱弟拜相兄草麻自古未有惟座主拜相門生草麻前代有之矣賜宴觀御書淳化元年八月一日李聖召右僕射李昉吏部尚書宋闕左散騎常侍徐鉉及翰林學士諸曹侍郎給事諫議舍人等詣闕觀御書圖畫帝知之即闕内品闕就賜御筵出書令縱觀盡醉而罷二日又召御史中丞王化基及三舘學士縱觀賜宴如前御書扇賜舘閣學士太宗每當暑月御書團扇賜舘閣學士並蓬山誌事實類苑卷二十四

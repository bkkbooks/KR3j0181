body:
  text: 事實類苑卷五十一宋江少虞撰占相醫藥貴人識貴人馬尚書亮以尚書員外御史直館使淮南時吕許公夷簡尚為布衣方侍其父罷江外縣令亦至淮甸尚書求見馬公一閲知其必貴遂以女妻之後公果為宰相馬公知江寧府時陳恭公執中以光祿寺丞經過馬接之極厚直謂曰寺丞他日必至真宰令其數子出拜曰願以老夫之故他日得在陶鑄之末曾諫議致堯性剛介少許可一日在李侍郎虛已坐上見晏元獻公晏李之壻也時方為奉禮郎諌議熟視之曰晏奉禮他日貴甚但老夫耄矣不及見子為相也吕許公夷簡為相日文潞公來謁許公改容禮接因語之曰太博去此十年當踐某位夏英公竦謫守黃州時龎頴公司理參政英公曰龎司理他日當貴逺過於我既而四公皆至元宰古云貴人多識貴人信有之也狀元多同歲本朝狀元多同歲此於星厯必有可推者但數問術士無從而曉之爾前徐奭梁固皆生於乙酉王曾張思得皆生於戊寅吕泰楊置皆生於甲寅賈黯鄭獬皆生於壬戌彭汝礪許安世皆生於辛巳陳堯咨王整皆生於庚午擇壻晏元獻判西京范希文以大理寺丞丁憂推掌西監一日晏謂范曰吾一女及笄仗君為擇壻范曰監中有二舉子富臯張為善皆有文行他日皆至卿輔並可壻也晏曰然則孰優范曰富修謹張疏俊晏曰唯即取富臯為壻臯後改名即丞相鄭國公富弼也擇妻龍圖劉公煜未第前妻趙尚書晃之長女早亡而趙氏猶有二妹皆未適人既而劉公登科晃已捐館夫人復欲妻之使媒妁通意劉公曰若是武有之德則不敢為姻如言禹别之州則庶可從命蓋劉公不欲七姨為匹意欲九姨議姻故也夫人詰之曰諺云薄餅從上揭劉郎才及第豈得便簡點人家女劉曰非敢有擇但七姨骨相寒薄非某之匹九姨乃宜匹遂娶九姨後生七子凡忱皆至大官七姨後適關生竟不第落薄寒餒暮年劉氏飬之終身見青箱雜記年命同太尉程公戡侍郎掌公禹錫俱以庚寅三月十日生程子時掌午時二公同年及第程作樞副使晚年帥安建節而掌以工部侍郎致仕位不逮於程而二公享年不差程以治平三年二月薨掌以其年三月捐館二翰林王公洙修撰錢公延年俱以丁酉八月巳時生王十九錢二十日錢以嘉祐二年六月卒卒時王公已病或謂王公起於寒素早歲蹇剝庶可以免乎侍郎闕公曰錢雖少年榮進晚節滯留王雖早歲奇蹇晚節遷擢長短比析禍福均王公竟不起三梁少卿吉甫宋郎中咸俱以乙未八月二日生梁申時宋巳時梁年二十八已為太子中舍通判饒州而宋猶未第客遊鄱陽有日者妙於星術宋往叩之日者曰秀才命似本州通判他日官職亦相類壽則過之後皆如其言四王端明素盧太尉政俱以丁未八月二十四日辰時生而王出於貴胄盧起于軍伍王卒于邊藩盧薨於殿帥事皆略同亦可怪也但盧之壽考有過於王得非少年微賤耶五張尚書方李給事徽之王祕監端俱以丁未九月二十三日生張酉時李卯時王戌時迄今皆致政康強六劉忱過鳴犢嶺見所由張秀問其年甲與忱同辛酉八月二十四日生劉午時秀巳時張後陜西郊用有功纍官至團練使卒卒之年忱任利路運使因出巡乘轎撲落崖亦幾於死寇萊公骨似盧多遜初寇萊公年十九擢進士第有善相者曰君相甚貴但及第太早恐不善終若功成早退庶免深禍骨類盧多遜耳後果如其言澠水燕談録卜者一日閲四宰相張鄧公嘗謂豫曰某舉進士時寇萊公遊相國寺詣卜肆卜者曰二人皆宰相也既出逢張相公齊賢王相公隨後往詣之卜者大驚曰一日之內而有四宰相四人相顧而笑以退因是卜者日消聲譽不復有人問之卒窮餓以死而四人者其後皆為宰相公欲為之作傳未能也是時鄧公已致仕猶能道其姓名今豫久則又忘其姓名矣其人亦可哀也哉官不可妄得豫姻家朝散郎王九齡嘗言其祖貽永侍中有女嫁諸司使夏偕因病危甚服醫朱嚴藥遂差貂蟬喜甚置酒慶之女子於坐間求為朱嚴奏官貂蟬難之曰今歲恩例已許門醫劉公才當候明年女子乃哭而起徑歸不可留貂蟬追謝之遂召公才諭以女子之意轉是歲恩命以授朱嚴制下之日而嚴死公才乃屬王公曰朱嚴未受命而法容再奏公然之再為公才請及制下公才之尉氏縣使人召之公才方飲酒聞得官大喜遂暴卒一四門助教而死二醫官不可妄得況其大乎柏繼雍柏繼雍者善為小兒醫學月餘皇女疾呼繼雍切脈皇女遙見衣緑官人以緋袍蒙之而入以白上即賜緋袍艾謂之一壯醫用艾一灼謂之一壯以壯人為法其言若干壯壯人當依此數老幼羸弱量力減之沈括筆談分曹圍碁四人分曹共圍碁者有術可令必勝以我曹不能者立於彼曹能者之上令求急先攻其所必應則彼能者為其所制不暇恤局則可以我曹能者當彼不能者此虞卿鬭馬術也沈括筆談鬚髮眉所主臟醫者所論人鬚髮眉雖皆毛類而主五臟各異故有老而鬚白眉髮不白或髮白而鬚眉不白者臟氣有所偏故也大率髮屬於心稟火氣故上生鬚屬於腎稟水氣故下生眉屬肝故側生男子腎氣外行上為鬚下為勢故女人宦人無勢亦無鬚而眉髮無論男女則知不屬腎也沈括筆談雞卜史記稱四夷各異卜漢書亦稱粵人以雞卜信有之矣元豐中豫為大理丞斷嶺南奏案韋庶為人所殺尸在潭中求之弗獲庶妻何以鐺就岸㸑煮雞子卜之呪曰儂來在個澤裏來在别處少頃雞子熟剖視則儂韋全曰雞卵得儂尸在潭裏果得之然不知所謂得儂者其兆何如也見青箱雜記羊卜西戎用羊卜謂之跋焦卜師謂之厮乩堅奚反以火灼羊髀骨間視其兆謂之死跋焦其法兆之上為神明近脊處為坐位坐位者主位也近旁處為客位蓋西戎之俗所居正寢常留中一間以奉鬼神不敢居之謂之神明主人乃坐其旁以此占主客勝負又有先呪粟以食羊羊食粟則自搖其首乃殺羊視其五臟謂之生跋焦其言極有驗委細之事皆能言之生跋焦土人尤神之沈括筆談服石醫之為術茍非得於心而恃書以為用者未有見能臻其妙如术能動鍾乳石按論曰服鍾乳當終身忌术五石諸散用鍾乳為主復用术理極相反不知何謂豫以問老醫皆不能言其義按乳石論云石性雖溫而體本冷重必待其相蒸薄然後發如此則服石多者勢自能相蒸若更一藥蒸之其發必甚五石散雜以衆藥用石殊少勢不能蒸須藉外物激之令發爾如火少必因風氣所鼓而後發火盛則鼓之反為害此自然之理也故孫思邈云五石散太猛毒寧食野葛不服五石遇此方即須焚之勿為含生之害又曰人不服石庶事不佳石在身中萬事休泰惟不可服五石散蓋以五石散聚其所惡激而用之其發暴故也古人處方大體如此非此書所能盡也況方書乃多偽雜如神農本草最為舊書其間差舛尤多醫不可以不知也沈括筆談服芎藭暴死豫一族子舊服芎藭鄭叔熊見之云芎藭不可多服多服人暴死後族子果無疾而卒又豫姻家朝士張子通為因病腦氣服芎藭甚多亦一旦暴亡豫皆目見者沈括筆談苦參損腰豫嘗苦腰重久坐則旅距十餘步然後能行有一將佐見豫曰得無用苦參潔齒否豫時已病齒數年笑曰此病由也苦參入齒其氣傷腎能使人腰重後有太常少卿舒昭亮用苦參揩齒歲久亦病腰自後悉不用苦參腰病皆愈此皆方書舊不載者沈括筆談長松治大風釋普明齊州人久止靈巖晚遊五臺得風疾眉髮俱墜百體腐潰哀號苦楚人不忍聞忽有異人教服長松明不知識復告之云長松生古松下取根餌之皮色如薺苨長三五寸味微苦類人參清香可愛無毒服之益人兼解諸毒明採服不旬日毛髮俱生顔貌如故今并代間士人多以長松雜甘草乾山藥為湯煎服甚佳然本草及諸方書皆不載獨釋慧祥作清涼傳始序之然失於怪誕見澠水燕談丹砂豫中表兄李善勝曾與數友輩鍊朱砂為丹經歲餘因沐砂再入鼎誤遺下一塊入他丸服之遂發感冒一夕而斃朱砂至良藥初生嬰子可服因火力所變遂能殺人以變化相對言之既能變而殺人則宜有能生人之理但未得其術耳以此知神仙羽化之方不可謂之無然亦不可不戒也筆談治面瘍楊嵎為光祿寺丞直史館瘍生於頰連齒輔車外腫若覆甌內潰出膿血不輟吐之甚痛楚醫為療之百方彌年不差或語之曰天官瘍醫中有名方何不試用嵎乃案瘍醫療瘍必攻以五毒合黃堥實石膽丹砂雄黃碁石其中燒之三日三夜煙上著以雞羽掃取以注創惡肉破骨盡出嵎即依方注藥瘡中少頃朽骨速潰出疾遂愈至今十五年嵎見任主客員外郎見談苑療齒瑩丙午歲訪辰師張不疑帥正時不疑方五十齒少疏搖咀嚼頗艱後熙寧丁巳不疑師鼎復見招為武陵之遊凡巨臠大胾利若刀截時已六十二矣余怪而詰焉得藥固之時豫滿口搖落危若懸帶謾以此藥試之輒爾再固求此方以療病齒者凡用之皆效題曰西嶽蓮花峰神傳齒藥方序曰凡亨在天聖中結道友登嶽頂齋宿祈祠方已遍遊三峰酌大工泉至明星館於故基下得斷碑數片髣佛有古文洗滌而後可辨讀之乃治口牙烏髭藥歌一首慮歲浸日久剝裂不完遽録以歸而後朝之名公巨卿訪山中故事語及者皆傳之修製以用其效嘗應歌曰豬牙皂角及生薑西國升麻蜀地黃木律旱蓮槐角子細辛荷葉要相當青鹽等分同燒煅研煞將來使最良揩齒牢牙髭髮黑誰知世上有仙方不疑晚學益深經史沿革講摩縱橫文章歌詩舉筆則就著括異志數萬言倦遊録八卷觀其餘藴錯於胸中與余武陵之别慨然口占二詩云憶昔荆州屢適從當時心已慕冥鴻渚宫禪伯唐齊已淮甸詩豪宋惠崇老格疏間松倚潤清談把酒坐生風史官若覔高僧事莫把名參技術中又云碧嶂孤雲苒苒歸相攜情密異常時餘生歲月能多少此别應難後約期風義見於詩焉玉壺清話進火杴草方表臣聞食石飲水可作充腸之饌餌松食柏亦成拯病之方是以療飢者不假於珍羞愈病者何煩於異術既獲濟時之藥敢陳被物之形不恥管窺輒干天聽臣誠惶誠恐稽首頓首臣謂四時推運負陰陽者必有可觀萬彚發生吐風雲者寧無所益俱承帝力咸荷天休或叨摘採之知願試苦辛之效伏惟崇文廣武儀天尊道應真祐德上聖欽明仁孝皇帝陛下慈深憫物道切憂民行百王久墜之文納羣后可言之事以至恩沾兆庶信及豚魚風雨順而災沴不生天地和而黎元盡泰宸衷不倦聖意難窮臣因聽政之餘備閲古方之祕盡醫民瘼遍計物情唐太宗輕剪龍鬚唯恩一將宋高祖碎舂琥珀止慰三軍焉能並吾皇廣添歷代之寶書甄别三王之闓澤咸蘇萬有溥活羣生日月久照之方明幽罔間華夏升平之俗造次奚論臣遭逢盛時歌謡景泰知皇風之下逮極聖慮之猶勞下惡緘言常思報效既服唐虞之教尚乖葵藿之能渺渺羣流已遂朝宗之望茫茫列曜既諧拱極之誠是以不度僣渝輒形簡牘事稍同於葑菲理切近於芻蕘臣所聞奏者因換當州龍興觀元始天尊三皇大帝殿基掘得一小石碑內説修養氣術并草藥方二件臣依方差人訪問採覔其草頗有其異金銀線素根紫䇿對節而生蜀號為火杴草莖葉頗同蒼耳不費登高厯險每常求少獲多急採非難廣收甚易倘勤久服旋見神功誰知至賤之中乃有殊常之效微臣自喫至百服眼目輕明即至十朝髭鬚烏黑筋力頗健其效多端臣本州右都押衙羅一守曾因中風墜馬失音不語臣與十服其病立愈又太惠寺中和院僧司副正明數天師智嚴年垂七十忽患偏風行履妨廢臣與十服旬日病瘳又有玉局化主道士皇甫因上元日與合城奏醮中風口眼喎斜時時吐瀑臣與十服立便得瘥今輒修合一百劑謹差本畨職貢吏元龜奉表奉進臣無任瞻望聖恩激切屏營之至謹奏見忠定公語録事實類苑卷五十一

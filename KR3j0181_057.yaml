body:
  text: 事實類苑卷五十七宋江少虞撰將帥才略田重進田重進范陽人不識字忠朴有守太宗在藩邸以酒餌賜之拒而不受使者曰晉王賜汝重進曰我只知有官家誰能喫他人酒食乎太宗極愛之後鄭文寳出漕陜右上嘱付曰田某先帝宿將勇毅宣力卿善待之李繼隆李繼隆善馳驛日走四五百里征江南往來覘兵勢中途遇虎射殺之與呉人戰流矢中額胄堅不傷太祖欲使用謂曰昇州平時獻書來當厚賞汝時軍中内侍數皆伺城陷事來獻捷有機㑹時當入奏皆不願行繼隆奏曰金陵破在旦夕上問安知對曰臣在途中遇大風天地晦㝠城破之兆也翌日捷至太祖召謂曰果如汝所料是夜城陷均其賞在獻捷之上遂除莊宅使曹武毅曹武毅翰魏人也曹武惠彬真定人也二曹皆著名謂之同宗翰有宏傑偉特之度能詩有玉關集領金吾日當直太宗詔與語笑曰曾覽卿詩曾因國難披金甲不為家貧賣寳刀他日燕山磨峭壁定因光勒大名曹頗佳朕每愛之翰因叩謝征幽州為東路總管善風角一夕角聲逆風至帳翰促令擐甲曰寇至之兆也未㡬果然大敗其寇於城下從征幽州率所部分攻城忽得一蠏翰曰水物而陸棲失依據也而足多有救又蟹者解也其將班師乎果然其精敏率如此並玉壺清話范文正仁宗時西戎方熾韓魏公琦為經略招討副使欲五路進兵以襲平夏時范文正公仲淹守慶州堅持不可是時尹洙為秦州通判兼經略判官一日將魏公命至慶州約范文正公以進兵范公曰我師新敗士卒氣沮當自謹守以觀其變豈可輕兵深入即以今觀之但見敗形未見勝勢也洙歎曰公於此乃不及韓公也韓公嘗曰大凡用兵當先置勝敗於度外今公乃區區過慎公所以不及韓公也范公曰大軍一動萬命所懸而乃置於度外仲淹未見其可洙議不合遽還魏公遂舉兵入界而師次好水川元昊設伏全師陷沒大將任福死之魏公遽還至半途而亡者父兄妻子號於馬首㡬千皆持故衣帋招魂而哭曰汝昔從招討出征今招討歸而汝死矣汝之魂識亦能從招討以歸乎既而哀慟聲震天地魏公不勝悲憤掩泣駐馬不能前者數刻范公聞而嘆曰當是時難置勝敗于度外也東軒筆録曹瑋曹侍中將薨神宗親臨視之問以後事對曰臣無事可言固問之對曰臣二子璨與瑋材器有取臣若内舉皆堪為將上問其優劣對曰璨不如瑋已而果然瑋知秦州嘗廵城以城上遮箭板太髙召主者令下之主者對曰舊如此乆矣瑋怒曰舊固不可改耶命遣出斬之僚佐以主者老將諳兵事罪小宜可赦皆諫瑋瑋不聽卒誅之軍中懾伏西番犯塞候騎報敵將至瑋方飲啗自若頃之報敵去城數里乃起貫戴以帛纒身令數人引之身停不動上馬出城望見敵陣前有僧奔馬往來於陣前檢校瑋問左右曰彼布陣乃用僧耶對曰不然此敵之貴人瑋問軍中誰善射者衆言李超瑋即呼超指示之曰汝能取彼否對曰憑太保威靈願得十五騎裹送至敵陣前可以取之瑋以百騎與之敕曰不獲而返當死遂至敵陣前騎左右開超射之一發而斃於是敵鳴笳嘯而遁瑋以大軍乘之敵衆大敗出塞窮追俘斬萬計改邊鑿壕西番由是慴伏至今不敢犯塞每言及瑋則加手於頂呼之為父云瑋在秦州有士卒十餘人叛赴敵中軍吏來告瑋方與客奕棋不應軍吏亟言之瑋怒叱之曰吾固遣之去汝再三顯言耶敵聞之亟歸告其將盡殺之涑水記聞李繼倫端拱中或言威逺軍糧運而不續敵乗其虚將欲窺取朝廷急遣天府李繼隆發鎮定卒萬餘䕶送芻粟數千輜重得實其廩敵諜報之率精銳萬餘騎邀於中道時李繼倫為沿邊都巡檢領步騎千巡徼邊野忽當敵鋒蔑視而不顧勁欲前掠繼倫謂麾下曰敵氣銳於進吾當捲甲銜枚掩其後以擊之彼但勇行必忘其後豈虞我之至耶遂飽秣飲膳餌其夕懐短兵嘿逐其後至唐河天未明敵騎去我軍將近遂釋鞅㑹食罷將戰舉兵一鏖如拉枯折朽于越且舉七方食短兵擊折一臂乗馬先遁一皮室擊死皮室者敵相也分飛潰亂自相蹂踐闕之意遂已繼倫面色黎黒邊人相誡曰黑大王不可當後淳化中著作孫崇諌陷敵北歸太宗召見面詰邊廷事崇諫備奏唐河之役上始盡知之嘆曰奏邊者忌其功不狀其實以昧朕非卿安知遽加防禦使許驤許驤知益州歸首奏乞預為劍外之備上怪問之驤曰臣解任時實無烽警富民浮窳易擾難安以物情料之但恐嘯聚不可測耳既而李順果叛時皆服其先見張鑑李順叛朝廷王繼恩討之既平除張尚書詠知益州繼恩等素失督御之略師旅驕狠詠宻奏乞命近臣分屯師旅以殺其勢朝廷命張鑑往之上召對後苑門鑑雖進士本出將家奏曰成都新服軍旅未和聞使命遽至變易戎伍慮有猜懼變生不測乞假臣安撫之命臣至彼自措置上嘉納果以川峽分為益持利夔四路代還拜諫議並玉壺清話武行徳武行徳太原榆次人身長八尺餘絶有膂力以負薪自給里人號為一各柴晉祖在鎮州日因出獵行徳方入城鬻薪避道左晉祖見其魁岸駐馬問之怪所負薪多於常令左右數人不能舉竒其材因留帳下後至節帥中書令國初終太子太傅呼延賛呼延賛以武勇為衛士直長自言受國恩深誓不與契丹同生徧刺其體作赤心殺契丹字塗以黑文及其唇内亦刺之鞍韉兵仗戎具什器皆作其字或刺繡雕刻朱熏為之召善黥之卒横劍于膝呼其妻責以受重禄無補報當黥面為字以表感恩之意茍不然者卒斷其首舉家皆號泣以為婦人黥面非宜願刺臂許之諸子及僕妾亦然嘗延一舉子亟走不敢還顧賛曰是家必與我異卒不留之矣賛作破陣刀降魔杵鞭幞頭兩旁有刃皆重數十斤烏騅馬緋抺額慕尉遲鄂公之為人自稱小尉遲母姓李拜鄭州靈王像為舅自稱甥以其子病割股肉以為羮食之數子亦有膂力日夕課其擊劍馳射槍鬭蹶張撓强持箠挺相擊撻殆無完膚幼子纔百晬服襁褓持登城樓擲于地不死人問其故曰聊試其命耳為忠佐都軍頭每至直舍中内侍近臣多環繞之賛取佩刀刺胞出血召從吏濡墨為書奏言乞捍邊殺敵内侍或戲曰何不割心明忠賛笑曰我非愛死但契丹未滅徒輕擲其軀耳出刺保州奏太宗曰臣服飾竒異所過多觀者壅遏願勅郡縣發卒遮列清道上笑而不許至團練使領軍頭郭進郭進少以壯勇依漢祖於太原開國歴刺史團練使國初選洛州防禦使為西川巡檢以鎮太原進御軍嚴而好殺部下整肅每帥師入晉境無不克捷太祖因遣卒戍西山必語之曰汝軰當謹奉法我猶赦汝郭進殺汝矣嘗擇御龍宫三十人𨽻麾下押陣頭與晉人戰多退進劍斬十餘人奏至上方御便殿故作厲聲曰御龍宫千百人中始選擇得二三而郭進小違節度遽殺之誠如此壟種健兒亦不足供矣潛遣中使諭進曰恃其宿衛親近驕倨不禀命戮之甚得宜矣進感泣由是一徃精勇無敵上為治第令㕔堂悉用􅝕瓦有司言親王公主始得用此進何得用之上曰進事國盡忠我得之豈不似吾子有何不可哉太祖征太原北戎自右嶺關入援進大破之獻俘行在暴於城下并人䘮氣遂約降以功髙負氣監軍田欽祚所為不法進屢以語侵之欽祚心銜之因誣以他事進不能甘自縊死太宗微知之黜欽祚終其身不復用楊文公談苑曹太尉曹太尉瑋知秦州立遵内寇是時公方灼艾才數壯猝起應敵指揮號令及事定灸瘡愈瘢大數寸盖用力氣使然也曹公在邊藩部有過惡者皆平定之毎以餞將官為名出郊而兵馬次序以食品為節若曰下某食即某隊發比至水飯則捷報至矣大帥料敵當如此東齋襍亊筆紀二唃嘶囉唐吐蕃賛普之後據邈川之宗哥城盡有河隍之地祥符中用番僧立遵之䇿將衆十萬穿古渭州入寇時曹瑋以引進使知秦州領騎卒六千守伏羌城聞賊已過畢利城瑋率諸將渡渭逆之遂合戰於三都谷賊軍雖衆然器甲殊少在後者所持皆白棓毛連以備刼虜而已瑋知其勢弱不足畏欲以勢凌之自引百騎穿賊陣出其後升髙指揮軍中鼓譟夾攻賊大潰斬首二千級明日視林簿間中傷及投崖死者萬計瑋之威名由是大震唃氏自此衰弱矣楊無敵楊業麟州人倜儻任俠以射獵為事所獲比同輩嘗倍謂人曰我他日為將用兵亦如用鷹犬逐雉兔耳仕太原劉氏至建雄軍節度頻立戰功國人號為無敵太原平太宗得之甚喜釋縛授大將軍數月擢為防禦使以其知邊事俾為三交部署知代州敵寇雁門北日南鄉業從後擊之敵大敗以功遷雲州觀察使雍熙中副潘美進討自雲應路以王侁劉文裕監其軍連㧞雲應寰朔四州次築乾羽㑹政溝大軍不利班師詔四州民遷於内地擄齊妃耶律漢寧北皮室五押惕隠衆十萬餘復陷寰州業謂美等曰賊盛未可戰朝廷止令取四州民令保願兵出大石路先遣告雲朔守將俟大軍離代州即雲州之衆先出我師次應州敵必悉衆來拒即令朔州吏民忿入石褐谷分强弩千人規谷口騎士援于中路三州之衆萬全矣侁沮之曰今精兵數萬何畏懦如此趨雁門北川中鼓行而徃可也文裕亦賛成之業曰不可必敗之勢也侁曰使君素號無敵逗撓不戰豈有他志乎業泣下曰業非愛死也但時有未利殺傷士衆而功不立今君責業以不死當為諸君先死耳即部帳下騎兵數百人自石帳路趨朔州將行泣謂美曰業本太原降將當死上不殺寵以爵禄委我以兵柄顧願立尺寸功為報豈可縱敵不擊而懐他志哉今諸君責以避敵當先死於敵因指陳家谷口曰公於此張步兵分强敵為左右翼為援業轉戰至此以步兵擊之不然無遺類矣美如其言與侁等陳於谷口自寅至巳侁使人登托邏臺望之以為敵兵遁走欲爭其功領兵離谷口美不能制乃沿灰河而西南行二十里聞麾業兵却走業暮至谷口引望見無人撫膺大哭再率帳下决戰身被十數創業撫下有恩時從卒尚百餘人業謂曰汝等各有父母妻子倘鳥獸散尚有得還報天子者毋與我俱死軍士皆泣不肯去其子延昭死之業獨手殺百餘人後就擒太息曰上遇我厚為奸臣所逼致敗何面目敵中求活哉遂不食三日而死天下寃之聞者為流涕上聞之侁文裕並除名配𨽻諸州厚贖業家錄其五子詔褒贈業太尉大同軍節度使業子延朗驍勇為邊將有威名戎人畏之楊文公談苑崔翰太原既平劉繼元降隨鑾輿將凱旋而三軍希賞諸將遽有平燕之請未敢聞之崔翰者晉朝之名將也奏曰當峻坂走丸所至必順此若不取後恐噬臍上然之鑾輿北伐功將集而班師因振旅徐還至金臺驛王師失利間或南潰者數千驛騎上遣翰以兵追之奏曰願乞陛下不問奔走之罪臣願請單騎獨往可攜之歸上許之翰箠馬獨往追及之揚鞭大呼曰諸君不須苦耳何傷勿遽主上天鑒處置將明君乆負堅執銳衛駕逺征一旦小忿豈不念父母妻子憶戀之情耶上特遣吾邀爾輩同還宜知㡬速反衆稍遂聽收身而還夜半至營各分部直雞犬亦不鳴上喜宻解金帶賜翰曰此朕藩邸時所繫者玉壺清話二崔翰風儀偉秀有勇為天武左輔主太宗親征太原而講武於西京時殿前都將楊儀失音不能言指揮非便命翰代之翰執金鼓周旋進退軍容甚整上恱遣中使宻以金帶賜之曰此我藩邸時所服者因謂左右曰若崔翰者必不事晉朝矣盖言晉政多門武經廢弛也後為殿前都虞候從平晉陽時軍士立功未行賞賚遂有平燕之議諸將莫敢言翰曰此一事不可再舉乗破竹之勢取之甚美上信然之既而范陽班師至金臺驛中黃門閻承翰馳奏大軍不整南面而潰上令翰率衛士十餘人止之翰請單騎徑往告諭衆稍稍乃定不戮一人上甚嘉之後遷領節鎮張文定皇祐末渭州熟户反增秦州戍兵甚多事平張文定悉分屯於永興涇原環慶三路期以有警急則召之以闕芻糧謂之下番兵關西震聳方平仍驛書言伏乞發京畿禁軍十指揮赴本路樞宻使張昇言於上曰臣昔在秦鳯邊人言敵欲入寇者前後甚衆皆無事寔今事未可知而發京畿兵以赴之驚動逺近非計也請少須之上從之數日方平復奏諒祚已引兵西去擊董氊矣諒祚尋復為董氊所敗築堡於古渭州之側而還侍其淵儂智髙圍廣州廣運使王罕嬰城拒守都監侍其淵晝夜未嘗眠乆之將士疲極有禆將誘士卒下城欲與之降賊而淵適遇之謂之曰汝曹降賊必驅汝為奴僕負擔歸其巢穴朝廷又誅汝父母妻子不若併力完城豈惟保汝家亦將受賞矣士卒乃復還登城罕夜寢於城上淵忽來撼徐而覺之曰公勿覺公隨身有方弩手罕曰有乃與罕帥弩手二十餘人銜枚至一處俯見賊已踰壕蟻附登城將及堞矣城上人皆不覺淵指示弩手使射之賊乃走壕外及賊退淵終不言禆將謀叛之事熙寧中致仕介甫知其為人長厚除一子官給全俸淵年八十餘氣志安强范堯夫以為隂徳之報云劉吉劉吉江右人有膂力尚氣事後主為傳詔承㫖忠於所奉歸補供奉官以習知河渠利害委以八作之務太平興國中河大决吉䕶之與丁夫同甘苦使者至訪吉不獲甚怒乃著皂幞頭短布褐獨負二三囊土為先道戒從者勿言使者宻訪得之白太宗太宗厚賜之内侍石金振者領䕶河堤性尤苛急自謂石爆烈言其性多暴怒也居常侵侮吉吉黙然不校一日與吉乗艇偕行至中流吉語之曰君恃貴近見凌已甚我不畏之當與君同見河伯耳遂欲舟覆之金振號哭搏顙求哀乞命乃止自是不復敢侵吉其父本燕翼人自受李氏恩常分禄以濟其子孫朔望必詣其第求拜後主是李氏子姓雖童稚必拜之執臣僕之禮後遷崇儀使其刺字謁吳中故舊題僧壁驛亭但稱江南人劉吉示不忘本也有詩三百首目為釣鼇集徐鉉為之叙其首篇贈隠者有一箭不中鵠五湖歸釣魚之句人多誦之以其塞决河有方路人目為劉䟦江名震河上王隠王隠本期門健步𨽻皇城司太平興國中河大决調發縁河丁夫數十萬塞之將下大楗合堤口日遣健步數輩往來偵報將合龍門凡健歩兩輩至上召問云河决已塞水復故道隠續至言其不然且云初來時頗見津流未斷恐尚煩聖念上怒令拘之少頃報至果水勢暴衝大楗復㧞水注數郡上召隠慰諭立小校自是或補擬親從列校必首記其名蒙超擢至道初東宫建擇親衛指揮使二人已得劉讓尚闕一名上曰王隠忠直不妄語可以補之後至侍衛歩軍都指揮使保順軍節度使隠無他能由一言之不欺其人主而克享世福况積德者乎張繼能内侍張繼能嘗為鎮戎軍鈐轄初古原州自唐以來陷於党項徙治平涼縣繼遷之叛李繼隆繼和建議城古原州以保障内屬藩郡併力禦賊是為鎮戎軍以隆和知軍事㡬七八年繼能為鈐轄題詩於㕔事曰夜聞磧外鈴聲苦曉聼城頭角調哀不是感恩深似鐵誰人肯向此中來繼能讀書有識略忠直好談論知治體令為大都内領郡並楊文公談苑王徳用真宗上仙時雖仲春而大雪苦寒莊獻太后詔賜禁旅衛士酒獨王徳用所轄禁旅不得飲后以問徳用徳用曰衛士荷先帝恩徳厚矣今率土崩心安忍縱飲矧嗣君尚少未親萬幾不幸一夫酗酒奮臂狂呼得不動人心耶后大嘆賞自是有意大用龎莊敏皇祐五年儂智髙陷二廣詔樞宻副使狄青督諸將討之言事者以青武人不可專用請以文臣副之仁宗以問龎莊敏公曰向者所以王師屢敗由大將不足統一偏禆人人自用故遇敵輙逃劉平以來敗軍覆將莫不由此青勇果有智略善用兵必能辦賊願勿憂仁宗乃召行營諸軍皆受青節制賊平處置民事則與孫冕余靖共議及捷報至上喜謂莊敏曰嶺表平殄皆卿之功也王武恭王武恭公徳用寛厚善撫御其下狀貌魁偉而面色正黑雖匹夫下卒閭閻小兒而外至逺夷君長皆知其名識與不識皆稱曰黑王北敵常呼其名以驚小兒其為外域畏服如此皇祐末仁宗以為樞宻使而以富韓公為宰相是冬契丹使至公與射使者曰天子以公為樞宻使以富公為相得人矣上聞甚喜狄武襄狄武襄公青初以散秩為延州指揮使是時西邊用兵公以才勇智略頻立戰功常被髮面銅具馳突賊圍敵人畏懾無敢當者公識度𢎞逺士大夫翕然稱之而尤為韓魏公范文正公所深知稱為國器文正授以春秋漢書曰將不知古今匹夫之勇不足尚也公於是博覽書史通究古今已而立大功登輔弼書勲史䇿配饗宗廟為宋名將天下稱其賢公初為延州指揮使後顯貴天下猶呼公為狄天使並澠水燕談二狄青初為延州指揮使與西賊大小二十五戰帶銅面具被髪出入行陣間凡八中箭累至涇原路招討副使上未識其面欲召見之㑹戎冦邊急上令圖其形以進後為樞宻使是時予為諫官人有歌曰夜吟漢似戎人戎似漢改頭換面總一般只在汾河川子畔以青汾河人面有刺字不肯滅去又姓狄為漢人此歌為是人作也為不疑矣欲予言予應之曰此唐太祖殺李君善事上安忍為敵以啟君臣疑心耳東齋記事三狄青之征儂智髙也自過桂林即以辨色時先鋒行先鋒既行青乃出帳受衙罷命諸將坐飲酒一巵小餐然後中軍行率以為常及頓軍崑崙闗下翌日將度闗辰起諸將立甚久而青尚未坐殆至日髙親吏疑之遽入帳周視則不知青所在諸將方相顧驚怛俄有軍候至曰宣徽傳語諸官請過闗喫食方知青以微服同先鋒度闗矣東軒筆録事實類苑卷五十七

body:
  text: 事實類苑卷三十三宋江少虞撰典故沿革皇后諡皇后有諡起於東漢自是至隋於隋皆單諡光烈隂皇后明德馬皇后和喜鄧皇后文獻獨孤皇后是也史家取帝諡冠其上以别之如云光之烈皇后隂氏明之德皇后馬氏也非謂欲連帝諡而名之也然則質家尚單文家尚復後世或用復諡如唐貞觀中長孫皇后文德後太宗諡文皇后文德自是復諡蓋取用二名偶同太宗之諡耳中宗諡孝和趙皇后諡和思言取帝諡配之其後昭成肅明元獻章敬睿真昭德莊憲諸后皆不得連帝諡國初追尊四祖三宗之后冠以帝諡及杜太后崩始諡明獻未幾欲同三祖之后遂改昭憲及太祖之后自連孝字太宗后連德字真宗后連莊字皆用復字非連帝諡為義慶厯中乃言孝字連太祖諡德字連太宗諡遂改為章以連真宗諡且祖宗諡號皆十餘字豈止配一字為義又太祖功烈豈専以孝稱太宗后連德字及在下與祖宗后諡又不對如何東漢諸后單舉之乎皇祐中余為禮官龍圖閣直學士趙周翰林奏議甚詳下禮院時新以章易莊朝廷以宗廟事重不欲數更張遂寢其所奏臣僚卒輟朝太祖時大卿監卒皆輟朝一日景德以前文武官賜三品皆不得諡曾任三品官乃得諡真宗大中祥符中命陳文僖公彭年重定以正三品尚書節度使卒始輟朝贈尚書節度使許定諡自後遵用其制而闕緣國史皆遺其事並筆談國忌行香舊制國忌迭命宰相參知政事一員率文武常參官赴佛寺行香內職不與焉景德中同知樞密院事王公欽若陳公堯叟請率內職學士諸司使軍職下逮列校同為一班先詔西上閣門近闕奉慰訖退赴佛寺行香小忌則否金坡遺事投金龍玉簡道家有金龍玉簡學士院撰文具一嵗中齊醮故投於名山洞府天聖中仁宗皇帝以其隂逺窮僻賫送醮祭文頗為州郡之擾乃下道録院裁度才留二十處餘悉罷之河南府平陽洞台州赤城山玉京洞江寧府華陽洞舒州潛三司真洞杭州火滌洞鼎州桃源洞常州張公洞南康軍廬山詠真洞建州武夷有升真洞南嶽朱陵洞江州馬當山上水府太平州水府潤州金山下水府錢塘江水府河陽濟瀆北海水府鳳朔府聖水仙游潭河中府百丈泓龍潭杭州天目山龍潭華州車湘潭所罷處不可悉記余嘗於學士院取金龍玉簡視之金龍以銅制玉簡以階石制出東齊記事給金寶牌祥符中詔以聖祖神化金寶牌分給京城寺觀及外州名山福地牌長三尺濶一尺文曰玉清昭應宮城天尊萬夀金寶其背文曰永鎮福地敕四周皆隱起虯龍花卉之狀盛以絳紗囊體塗金御題其上應天院建聖像殿西都北市應天禪院乃太祖誕聖之地國初為𫝊舍真宗幸洛陽顧瞻遺跡徘徊感愴乃命建為僧舍功成賜額奉安御容命知制誥劉筠為之記仁宗初又建别殿分二位塑太宗真宗聖像丞相王欽若為之記後圃植牡丹萬本皆洛中尤品慶厯八年仁宗御篆神御三殿牌藝祖曰興先太宗曰帝華真宗曰昭孝今為忌日行香之地去留府甚逺故詩有正夢寐中行十里謂此也並澠水燕談罷睦親神御殿嘉祐中修睦親宅神御殿歐陽永叔言祖宗廟貌非人臣私家所宜有者劉貢父亦謂為然詔下兩制臺諫官禮官議而引漢韋元成議春秋之義父不祭於支庶之室君不祭於臣僕之家王不祭於下土諸侯遂罷郡國廟於是修神御殿降青詞降青詞每進天度天祺先天降聖三元節及皇帝本命各預先一月降入焉遞兖州會真宮太極觀景靈宮亳州明道宮本清宮慶成軍太寧宮西凉上清宮嵩嶽崇福宮升州茅山鳳翔府太平宮中嶽天封宮泗州延祺觀杭州天柱山大滌洞霄宮五嶽真君觀內中延真殿天符觀會慶殿天安殿滋福殿玉清昭應宮景靈宫會靈觀祥源觀上清宮金明池水殿等非時建道場即當直日草詞或急者學士未入亦就宅草自大中祥符每立春立秋醮真君觀惟有東西北中四嶽而南嶽真君獨闕其禮惟演天禧二年再入翰林當草七月詞見闕此嶽惟演乃入劄子奏乞檢會事下禮儀院所司以從初漏闕懼罪久而不奏及立春將近惟演再上言以南嶽闕醮蓋有司之誤然屢經大宥免乞免有司之罪但依例添入御筆可其奏遂轉報中書門下自此五嶽皆備矣蓬山志勘箭勘契太祖初郊凡闕典大儀修講或未全備至於勘契之式次郊方舉大禮畢鑾輅還至闕門則行勘箭之儀勘箭者以銅為鏃長三寸形若鑿柄其箭香檀木為之長三尺金線飾之絳羅泥金囊韜之金吾仗掌焉其鏃以紫羅泥金囊置之駕前司掌焉每大駕還闔中扉駐蹕少候有司聲之云南來何之駕前司告云大宋皇帝行大禮畢禮儀使疏奏曰請行勘箭金吾司取其箭駕前司取其鏃兩勘之罷即奏曰勘箭訖有司齊聲曰是不是贊喝聲者齊聲曰是如是三方開扉列班起居迎駕大輅方進勘契者以檀刻魚形金飾鱗鬛别以香檀板象魚形坎而為範其魚則駕前掌焉其範則宮殿門司掌焉鑾輿過宮殿門以魚合範然後開扉迎駕其贊唱喝迎拜一如勘箭之式玉壺清話二大駕鹵簿中有勘箭如古之勘契也其牡謂之雄牡箭牝謂之闢仗箭本胡法也熙寧中罷沈括筆談街鼓京師街衢置鼓於小樓之上以警昏曉太宗時張公洎製坊名列牌於樓上按唐馬周始建議置鼓鼕鼓惟兩京有之後北都亦有鼕鼓是則京師之制也二紀以來不聞街鼓之聲金吾職廢矣倦游録禁衛五重禁衛凡五重親從官為一重文武官為一重御龍為箭直弩直為一重御龍骨朵子直為一重御龍直為一重凡入禁圍自一重徒一年至三年上誤者減二等傳下嘗誤入禁圍定私罪永叔再為論奏為公罪得應制舉東齊記事駕頭扇筤正衙法座香木為之加金飾四足墮角其前小偃織藤冒為之每車駕出幸則使老內臣馬上抱之曰駕頭輦後曲蓋謂之筤兩扇夾心通謂之扇筤皆繡亦有銷金者即今之華蓋也喚仗入閣唐日御宣政殿中設仗兵部旗幡等立於庭朝官退皆賜食自開元後朔望宗廟上牙盤石明皇意欲避正殿遂御紫宸殿喚仗入閣門遂有入閣之名在唐時殊不知為盛禮唐未嘗御殿更無仗御朔望時設之趨朝者仍給廊下食所以鄭谷輩多形於詩詠歎美而五代因不絶故祖宗數御文德殿入閣之禮熙寧二年豫被詔修閣門儀制以為文德入閣非是當喚仗御紫宸殿請下兩制與太常議之學士承㫖王公圭等以為入閣是唐時坐朝之儀不足行削去之豫與閣門諸君同請如唐御宣政禮量設仗衛之儀詔乃可仐朔望御文德殿始於此也閣門有舊入閣圖頗約其禮而簡便之凡文武官百人執仗四百人其五龍五鳳五嶽五星旗御焉皆立殿門之外沈括筆談洞案豫昔領門下省會天子排正仗吏供洞案者設於前殿兩螭首間案上設燎香爐修注官夾案立豫詰吏何名洞吏辭不知豫思之通朱漆為案故名洞案耳丞相公序宋庠字謂然唐人鄭谷嘗用之景文公筆記接伴遼使遼使韓祀者始修聘好獷悍無檢命趙文忠公接伴公旋教習覲見之儀方漸馴擾及將辭嫌朝服太長步武縈足欲從其俗公謂之曰君將入陛殿受還書去天顔咫尺可乎剛折之才不敢明年遼選姚東之翹者至闕復接伴東之者輕捷善辨坐則談兵公徐謂之曰君號多聞者豈不聞兵者不祥之器聖人不得已而用之今得已之時也二國始以禮義修好非君所談之事方此少戢酬對得體玉壺清話交州進奉授官交州進奉使多遣兵馬使或攝管內刺史或靜海節度賓幕之職及其歸多加檢校官或遷其職如行軍司馬副使之類近皆自稱土官又近時有以王官命之者春明退朝録北朝官北朝書白詔紙寫用御寶印橫金鍍匣子盛錦托裏渾金鍍鎖鑰請御寶印並紅絲絲重錦黃襆白面籖云書至大契丹皇帝闕下云太宗皇帝封國后即云嬸大契丹大皇后籖云覲致書下云謹封再用紅羅襆封畢用詔紙封帶復用御寶印大中祥符正月契丹太后喪弔慰書用黃羅襆乾興元年二月告哀亦用黃羅襆當十月與契丹皇后生辰書却用紅羅襆外國書外國書白詔紙寫亦用御寶印間金鍍匣子盛錦托裏間金鎖鑰封一同前錦裹用黃絹襆封面籖云敕其國王或某王並蓬山志仙源積慶圖趙文定拜宗正掌玉牒屬籍國初梁周翰劄宗籍之制不辨宮邸公裁酌得宜又造仙源積慶圖盡列長幼親疏之目以進於便坐張之為盛事也置宗正及教授等官豫嘗修玉牒知國家慶緒之繁衍治平中宗室四十餘人男女相半存亡亦相半親王置翊善侍講記室餘則闕官院置都講教授時嵗有喜慶則燕崇政殿或太清樓命之射課其書禮或賦以歌詩擇其能者而推賜器幣以旌勸之景祐三年始置大宗正司以濮王及彰化軍留守趙守節領其事有所奏請不得専逹必宗正司詳酌而後以聞所以勉進其敦睦而糾愆違也其後增置講書官四員别置小學教授十二員及增同知太守正一員而置官益多其疏屬又聽其外學以自勵而向學者彌衆矣澠水燕談宗子授南班官宗子授南班官世𫝊王文正為太尉宰相日始開此議不然也故事宗子無遷官法唯遇稀曠大慶則普遷一官景祐中初定祖宗並配南郊宗室欲緣大禮乞推恩使諸王官教授刁約草表上之後約見丞相王沂公公問前日宗室乞遷官表何人所為約未測其意答以不知歸而思之恐事窮且得罪乃再詣相府沂公問之如前約愈恐不復敢隱遂以實對公曰無他但愛其文詞耳再三加獎徐曰已得㫖别有措置更數日當有指揮自此遂有南班之授近屬自初除小將軍凡七遷則為節度使遂為定制諸宗子以千縑謝約約辭不敢受豫與刁親舊刁嘗出表藁以示豫沈括筆談諸王公主制中稱呼近世諸王公主制中稱皇子皇弟皇女疑皇字相承為例止合云第幾子第幾弟第幾女云退朝録燕王贈天䇿上將軍慶厯中皇叔燕王元儼薨仁宗追悼尤深詔有司擇位號之尤美尊者以追榮之乃特贈天䇿上將軍非常典也王之嚴毅威望著于天下民間識與不識咸畏憚之親王公主封國淳化五年九月真宗封壽王詔壽國封為大國在晉國之下諸王之上景德三年二月二十二日奉聖㫖壽梁趙宋四國今後更不得封大中祥符六年正月十九日降制衛國長公主特進國封徐國長公主楚國長公主報慈正覺大師特進封頒國長公主越國長公主特進封宿國長公主所有徐頒宿三國特升為大國在衛楚越國之上蓬山志歷代用厯上古以來逐朝厯名黃帝起元辛卯厯顓帝用乙卯厯虞用戊午厯夏用丙寅厯湯用甲寅厯周用丁巳厯魯用庚子厯秦用乙卯厯漢用太初厯四分厯三統厯魏用黃初厯景初厯晉用𤣥昭厯合元厯萬分厯宋用大明厯嘉元厯齊用天保厯同章厯正象厯後魏用興和厯正兀厯正象厯梁用大同厯乾象厯永昌厯後周用天和厯丙寅厯明𤣥厯隋用甲子厯開皇厯皇極厯大業厯唐用丙寅厯麟德厯神龍厯大衍厯元和觀象厯長慶宣明厯寶應厯正元厯景福崇賢厯天福用調元厯周顯德用欽天厯本朝太祖用應元厯太宗用乾元厯真宗用宣天厯仁宗用崇天厯英宗用明天厯已而復用崇天厯退朝録併省州縣熙寧中廢併天下州縣迄八年凡廢州軍監三十一儀滑慈鄭集萬乾儋南儀復䝉㫪陵憲遼竇璧梅漢陽通利寧化清平永康荆門廣濟髙郵江隂富順漣水宣化廢縣一百二十七晉州趙城杭州南新普州普康磁州昭德華州渭南德州德平陵州貴平藉縣忠州桂溪兖州鄒縣廣州信安四㑹陜州胡威峽石河中河西永樂巴州七盤其章坊州升平春州銅陵北京大名洹水經城永濟莫州鄚長豐梧州戎城縣邛州臨溪梓州永泰河陽汜水滄州饒安臨津融州武陽羅城象州武化歸州興山汝州龍興懷州修武武涉道州營道慶州樂蟠華池瀛州東城景城順安髙陽澶州頓邱洛州曲周臨洛丹州雲巖汾川潞州黎城瓊州舍城火山火山橫州永定宜州古陽澧丹金城述昆汾州孝義延州金明豐林延水太原平晉隨州光化邢州堯山任縣平鄉秦州長道達州三山石鼓蜀揚州廣陵趙州柏平柏鄉贊皇雅州百文榮經祁州保澤同州夏陽嘉州平羌河南洛陽福昌潁陽緱氏伊闕濵州相安慈州文城吉鄉成都犀浦戎州宜賔綿州髙昌榮州公井寧化寧化乾寧乾寧真定靈夀井陘荆南建寧支江辰州麻陽招化陳州南頓桂州修仁永寧安州雲夢欣州定襄劔門關劔門漢陽漢川恩州清陽熙州狄道河州枹罕衛州新鄉衛渝州南川虢州玉城果州流溪利州平蜀許州許田岢嵐嵐谷蓬州蓬山良山冀州新珂涪州溫山閬州晉安岐坪復州王涉潤州延出筆陵談事實類苑卷三十三

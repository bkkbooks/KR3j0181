body:
  text: 事實類苑卷十二宋江少虞撰名臣事迹石守道石守道學士為舉子時寓學於南都其固窮苦學世無比者王侍郎聞其勤約因會客以盤餐遺之石謝曰甘脆者亦某之願也但日享之則可若止修一餐則明日何以繼乎朝享膏粱暮厭粗糲人之常情也某所以不受賜便以食還王益重之倦遊雜録韓丕廬山白鹿觀有道士王某通五經結茅廬數十區講授生徒幾百人韓丕亦嘗從之學王間遣生徒往近村沽市酒一日命韓挈榼以往王謂諸生曰韓秀才風骨粹重向去進士不可量也然到山嵗餘未嘗見其所業命破扄索其寢室中於席下得槲葉厚四寸或二三葉或十數葉以細梗貫之乃韓之著述也王見之驚駭自此加禮待之其後官至二卿翰林學士倦遊雜録曹侍中曹利用以蔭補殿前承旨嘗陳備邊之策契丹南侵六師薄伐至於澶淵契丹遣使求和真宗曰須忠義識略之人可以入敵境觀其誠偽不必限以位秩高下二府薦利用可使真宗曰是嘗陳邊事者召見首陳和戎息民為便上問家所在利用曰臣盡節得死為幸豈顧家耶乃假崇儀副使將命至大名路梗不通縋城而下晝夜兼行抵其帳彼主請割關南地利用慷慨宣國威靈稱朝廷嵗以繒帛為遺可也遂與韓祀同還以書詞未遜復與祀往敵遣王繼忠與利用言兩朝歡好實為美事我主年少願兄事南朝又遣姚柬之俱來講解遂北歸李詢李詢授龍圖閣學士知開封府詢嗜酒常早朝上奏事宿酲未解酒氣薰然衝於御座上謂曰開封府煩卿宜節酒詢再拜謝罪然不飲酒不樂竟以過度而卒韓忠獻臣唐英嘗聞縉紳先生言故太師許國公在中書日嘗見天下諸路有司托拾官吏小過輒顔色不懌曰今天下太平主上之心雖蟲魚草木皆欲得所夫仕者大則望為公卿次亦望為侍從職司二千石其下亦望京朝幕職奈何錮之於聖世持心如此昔袁安不以贓罪鞠人其韓公之謂乎上嘗思之命張方平撰神道碑夲朝名臣傳王文正祥符初趙德明上言本國飢求粟百萬斛大臣皆請以違誓責之王魏公旦獨請具粟如數於京師詔德明來取真宗大喜德明得詔大慙且歎朝廷有人澠水燕談二王魏公與楊文公大年友善疾篤延大年於卧內記草遺奏言忝為宰相不可以將盡之言為宗親求官止敘平生遭遇之意表上真宗歎惜之遽造就第取名數録進涑水紀聞三王旦字子明大名人祖徹進士及第官左拾遺父祐以文學知名知制誥二十餘年至兵部侍郎風鑑精審旦少時祐嘗明以語人謂旦必至公輔手植三槐於庭以識之旦幼聰悟寬裕精粹太平興國中一舉登進士除大理評事知嶽州平江縣事徙監潭州酒稅知州事何承矩薦其行太宗召除著作佐郎是時方興文學修二館建祕閣求文籍旦以選與校正遭父喪逮出供職端拱中通判鄭州事月餘徙濠以旦為玉清昭應宫使鑄天尊銅像成旦為迎奉聖像大禮使寶符閣成又為天書刻玉使車駕幸亳以旦為奉祀大禮使上以兖州壽丘為聖祖降生之地於是處建景靈宫以旦為朝修使宫成拜司空國史成進拜司徒天禧元年進拜太保並同平章事聖祖上尊號以旦為太極觀奉上寶册使旦在政府十有八年以疾辭纍章不許及自兖州還懇請備至乃詔册拜太尉兼侍中五日一起居因入中書遇有軍國重事不以時日並入參決旦聞之惶恐拜章乞寢息合門俟命乃止增封邑而優假之數率如前詔既而疾甚求對便殿扶杖以升殿上見其癯瘠惻然許之旦退復上奏明日册拜太尉依前玉清昭應宫使罷知政事特給宰臣月俸之半仍令禮官尚書省都堂署事之儀未及行其年九月己酉薨册贈太師尚書令諡文正上出次發哀羣臣奉慰擢其弟度支員外郎旭為司封貟外郎子大理評事睦為衛尉寺丞兄子大理寺丞弟子衛尉寺丞質為大理寺丞外甥韓綱蘇舜元范禧並同學究出身子素弟子徽俱官素補太常寺太祝徽祕書省校書郎初旦與錢若水同直史館知制誥有僧善相謂若水曰王舍人他日位極人臣富貴無與為比若水曰王舍人面偏而喉骨高如何其貴也僧曰作相之後面當自正喉骨高者主自奉薄耳後果如其言旦以寬厚清約為相幾二十年遭時承平人主寵遇至厚公廉自守中外至今稱之事寡嫂謹撫弟妹有恩祿賜所得與宗族共之家事悉委弟旭一無所問遇恩蔭補遍於羣從身殁之日諸子猶有布衣者性好釋氏臨終遺命剃髮著僧衣服棺中勿藏金玉用茶毗火葬法作塔而為墳其子弟不忍但置僧衣於棺中不藏金玉而已旦久疾不愈上命肩輿入禁中使其子雍與直省吏扶之見於延和殿勞勉數四問曰卿今疾亟萬一有不諱使朕以天下事付之誰乎旦謝曰知臣莫若君惟明主擇之再三問不對是時張詠馬亮皆為尚書上曰張詠何如不對又言馬亮如何不對上曰卿試以意言之旦強起舉笏曰以臣之愚莫若寇準上憮然又曰寇凖性剛褊卿更思其次旦曰他人臣所不知也臣病因不任久待遂辭退旦薨嵗餘上卒用準為相涑水紀聞四真宗時以任中正知成都代張尚書言者以為不可是時王文正公為相上問之對曰非中正不能守詠之規他人狂妄有變更矣上是之言者亦服王之能用人也湘山野録五王文正公旦相真宗僅二十年時值四夷納欵海內無事天書薦降祥瑞沓臻而大駕封岱祠汾皆為儀衛使扈蹕處士魏野獻詩曰太平宰相年年出君在中書十四秋西祀東封俱已畢可能來伴赤松遊世傳王公嘗記前世為僧與唐房太尉事頗相類及將捐館遺命剃髮以僧服斂家人不欲止以緇衣一襲納諸棺然公風骨峭峻項微結喉有僧人相皆謂其寒薄獨一善相者曰公名位俱極但祿氣不豐耳故旦雖位極一品而飲啖全少家亦不蓄聲伎晚年移疾在告真宗嘗密賚白金五千兩旦謝表曰已恨多藏况無用處竟不之受其清苦如此東齋記事六本朝眷待舊德於儀物之盛惟王文正公病深屢乞骸不允扶掖求對於便坐面懇之真宗遣皇太子出幕拜留曰吾方以卿翼吾兒卿瘦瘠如此朕安敢強翌日册拜太尉詔禮官草儀就都堂赴上五日一起居起居日入中書預參決遇軍國重事不限時日並入至病之革公召楊文公於卧內囑以後事曰吾深厭煩惱慕釋典願未來世得為苾芻林間宴坐觀心為樂將易簀之時君為我剃除鬚髮服緇色衣勿以金銀之物置棺內用荼毗火葬之法藏骨先塋之側起一茒塔用酬夙願吾雖深戒子弟恐其拘俗託子叮寧告之又曰仗子撰遺表但罄敘感恩而已慎毋及姻戚大年謂之餘事敢不一一拜教若剃髮緇衣之事此必難遵公三公也萬一薨奄鑾輅必有祓祧之臨自當斂贈衮衣豈可加於僧體乎至薨大年與諸孤協議但以緇衣置柩中不藏寶貨而已壽六十一配享真宗廟廷湘山野録七王文正公一日諭諸公曰上官泌差知河陽乃批署之諸公復曰公泌欲一轉運使會京東有闕諸公曰可差上官泌也公不答因奏對言上官泌向日議差河陽亦合入一職司會京東轉運使闕吏稟上旨上閲泌歷曰與轉運使諸公歸以相語曰王公無私如此八王文正公為兖州景靈宫朝修使時被手詔採察河北京東兩路公言當官有才者十餘人皆降詔奬諭有以問公曰為元宰將命出使而所舉不一恩止得詔奬毋乃輕耶公曰既薦之又力行之是上恩皆出於已矣此人臣之大嫌也九王文正公或歸私第不去冠帶入靜室中默坐家人惶恐不敢復前不知其意後公弟問趙公安仁曰家兄歸時有如此何也趙公曰見議事公不欲行而未決此必憂朝廷矣十王文正公晚年官重每人家出賀立令止之因語弟曰遭遇如此愈增憂懼何可賀也公每有賜豫見家人置於庭下乃瞑目而嘆曰生民膏血安用許多十一王文正公門庭未嘗接客公薨上諭近臣曰王某家不覺冷寂緣當國日亦門庭清肅吕文靖夷簡魯簡肅宗道初參預政事二人妻謝章獻太后語之曰爾各歸語其夫王某在政府多年終始一節先帝以此重之宜為師範也十二東封二府議道飾車服以盛法從諸公令人於公第日伺之而無所為王冀公欽若繡韉以送公曰前議我恐已令為之公使還其直而置之冀公見其不乘而訝之公曰常所跨者君上所賜非不華也豈可更奢僭以隳制度十三王冀公欽若自江寧歸再執魁柄魯公時參知大政凡聚議冀公不堪語諸公曰掌武相公在政府時參政豈敢如此魯公笑曰王文正先朝重德豈他人可企茍相公執政平允宗道安敢不服馮文懿拯為侍中有問之者曰向與掌武相公同在政府盡見國體今異於昔何也馮曰王公德業孰可同乃彼一時此一時也並見名臣遺事事實類苑卷十二

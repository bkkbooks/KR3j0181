body:
  text: 事實類苑卷六十宋江少虞撰廣知博識論地動儀地動儀候地震之器也續漢書張衡字平子作此儀也以精銅鑄之其器圓徑八尺形似酒樽中有都柱旁行八道施關發外有八龍首銜銅丸每龍作一蟾蜍仰首張口而承之機關巧制皆樽中龍首以置九州地分如過某分州地動則龍銜之丸即墜蟾蜍口中乃鏗鏗然有聲司候者占視之知某州分地震也嘗有丸落久無奏報未幾龍石地震也此法久亡更無補續矣又按張衡靈憲云元氣剖判清濁異位地定於內而體於陰地有九域山川聖人始紀綱而後經緯也春秋元命苞曰天左旋地右轉也河圖云地恆動不息譬如人在大舟上開牖而坐舟行覺矣詳其地右動非震也旋行而動亦人所不知者也若舟中不窺崕開牖而坐定不知舟行也張衡竊物理之極致而謂其右旋地道壅塞之時乃氣凌此州之分機關阻滯地則為之動焉如人中息氣晝夜從頭至足周身一萬三千五百息具會寸口其或營行壅滯不通行處便成癰癤瘡疱者譬之丸落處也故漢翼奉云人氣尚逆則感天地天變見星氣日蝕地變見奇物震動所以然者陽用其精陰陽之形猶人之有五臟六體五臟象天六體象地臟病則氣色發於面體病則穴中動於貌也又易云天地之數五十有五所以成變化而行鬼神也或曰為張衡得以匿思而作為傳習乎通曰厥疑有三必難盡驗也一如嶺表兼海中洲渚頻動居人以為常也此儀可驗則揚州之分日日時時落丸也二張衡不教子孫後無述焉三於國家無所利也故不行於世矣論取火古法用火隨時不同人免疫氣矣或曰火是一氣豈同水有山井雨川不同也通曰火以木為母母木有異故也周書月令有改火之文終而復始也鄒子曰春取榆栁之火蓋食榆栁之火也孟夏取棗杏之火季夏取桑柘之火秋取柞楢冬取槐檀也此乃四時五取也以季夏取桑柘則益脾也或曰古之取火必以所利者何通曰火亦氣也久食此氣五臟迭休囚王相是以春宜榆栁之氣冬宜槐檀之氣則百疾不生茍此道不行人嬰逆氣犯乎厲也此改火之法豈可輕易漢武置别火官令丞專掌司四時取火之事也此五常之闕設五行之官火官之職司四時五變之術是以共工祝融為火正焉或曰火之為氣可堪食乎通曰火以食為氣人之食熱豈非食乎故易有水火既濟則水本寒為火之奪彌久成熱矣人利於熟則成濟用焉豈不見爇勞薪為味味必不正若正則荀公不别矣又有誤以巴豆木入爨令人泄痢不止其如乾糞苑草炊爨令物味惡是火官不得不重慎與昔并州之俗為介之推禁火此疑古人託以鬼神為名得以盡禁然後用鑽燧出之得變新象也并州之俗又誠太過冷食斯久民有餒死者故魏武帝出罰令甚嚴故止周舉為荆州刺史移書介推止禁三日後國家賜羣臣火沿之為禮式焉今大宋應乎火德若按法取之則宜於清明日賜百官火四時唯取食餌供具太官御膳用之其利深博哉論正朔昔者皇王受命必改正朔示不相沿而革人視聽之故一曰天統謂周以十一月建子為正天始施之端也二曰地統謂商以十二月建丑為正地始化之端也三曰人統謂夏以十三月建寅為正人始成之端也蓋三者法天地人故曰三統也觀古之三統循環終始文質不同用捨有異其如秦變周制以十月建亥為正此三統之外除三才外為法何耶所以後代史家為閏秦者猶十二月外加一月歸餘于終爾漢高祖得天下以滅學坑儒之後尚行秦制至孝武帝方用夏正必用夏后氏之正者緣孔子曰行夏之時左傳夏數得天也至唐武后永昌元年以十一月建子為嵗首後復用夏正肅宗上元元年用建子為正三年還以今正月為嵗首矣並湘山野録論太平帝王受命化成乃登岱封勒成頌以紀太平之功焉太平者天下之人家給民足路無􅐁􅔯時康榖稔物無疵癘刑罰措置之謂也故太階六符相對而平正乃曰太平也唐太宗即位與羣臣議宜行王道霸道耶有言宜行帝王道封德彛復沮其議帝王之道行之遲效請以霸道魏杜堅請行王道數年之間天下治太宗曰恨封德彛不見今日之太平也今聖上初即位以此紀年號俾紀致其太平也贊寧要言蛇雉遺卵千年而為蛟龍唐陸􅀈續水經嘗言蛇雉遺卵於地千年生而為蛟龍漢武帝元封中潯陽江中親射蛟於江中獲之乃是也其蛟出殼之日害於一方洪水漂蕩吳人謂之發洪余少時嘗逰杭州西城之伊山目擊此事日晚忽茂草中一雌雉飛起丈餘翅翼零亂又復入草中數四不絶久而不出余竊怪之剃草往觀果一巨蛇雌雉蟠結糾纒津沫狼籍斯雉驚而飛蛇入草始驗􅀈之説玉壺清話見龍張洎使高麗方泛舟海中因問舟人龍可識乎對曰常因雲起多見垂尾於波瀾間動搖伸縮良久雨大作未嘗見其全體及頭足也洎因冠帶焚香祝以見真龍時天晴霽忽有龍見於水際少頃漸多以至彌望矗然無數洎甚震駭良久而沒楊文公談苑氏族士人以氏族相高雖從古有之然未嘗著盛自魏氏銓總人物以氏族相高亦未嘗專任門地惟四夷則全以氏族為貴賤如天竺以剎利婆羅門二姓為貴種其餘皆為庶姓如毗舍首陀是也其下又有貧四姓如工巧純陀是也其他諸國亦如是國主大臣各有種姓茍非貴種國人莫肯歸之庶姓雖有勞能亦自甘居大姓之下至今如此自後魏據中原此俗遂盛行於中國故有八氏十姓三十六族九十二姓凡三世公者曰膏粱有令僕者曰華腴尚書領護而上者為甲姓九卿方伯者為乙姓散騎常侍太中大夫者為丙姓吏部正員外郎為丁姓得入者謂之四姓其後遷易紛爭莫能堅定遂取前世仕籍定以博陵崔范陽盧隴西李滎陽鄭為甲族唐髙宗時又增太原王清河崔趙郡李通謂七姓然地勢相傾互相排詆各自著書盈編連簡殆數十家至於朝廷為之置官撰定而流習所徇扇以成俗雖國勢不能排奪大率高下五等通有百家皆謂之士族此外悉為庶姓婚宦皆不敢與百家齒隴西李氏乃皇族亦自列在第三其重族望如此一等之內又如岡頭盧澤底李土門崔靖恭王之類自為鼎族其俗至唐末方漸衰息筆談記里鼓西京記云記里鼓者車上有二層皆有木人行一里則下層擊鼓行十里則上層擊鐘其機法皆妙絶焉隋開皇九年平陳得此車法得而用焉今公亮重修此車古制或記里鼓也今皇朝蘇弼重修焉銅渾儀司天監銅渾儀景德中厯官韓顯符所造依倣劉曜時孔挺朝崇斛蘭之法失於簡略天文院渾儀皇祐中冬官正舒易簡所造乃用唐梁令瓚僧一行之法頗為詳備而失於難用熙寧中豫更造渾儀并創為玉壺浮漏銅表皆置天文院别設官領之天文院舊銅儀送朝服法物庫收藏以備講求魚尾鴟吻漢以宫殿多災術者言天上有魚尾星宜為其像冠於屋以禳之今自有唐以來寺殿宫觀守舊有為飛魚形尾底上指者不知何時易名為鴟吻狀亦不類魚尾磁石指南柏指西方家以磁石磨針鋒則能指南然常微偏東不全南也水浮多蕩搖指爪及碗唇上皆可為之運轉尤速但堅滑易墜不若縷懸為最善其法取新纊中獨繭縷以芥子許蠟綴於針腰無風處懸之則針常指南其中有磨而指北者豫家指南北者皆有之磁石之指南猶柏之指西莫可原其理沈括筆談金雞放赦杜鎬言肆赦樹金雞不知起於何代關中風俗傳云宋孝王問司馬膺之後魏北齊赦日樹金雞事膺之曰按海中星占云天雞星動為有赦蓋王者以天雞為度隋書刑法志北齊赦日武庫令設金雞及鼓於關門右撾鼓千聲宣鼓建金雞或云起於西涼吕光未知孰是究其旨蓋西主兑兑為澤金者巽之神巽為號令故合是二物制其形揭于長竿使人覩之也楊文公談苑延州五城延州今有五城説者以為舊有東西二城夾河對立髙萬典郡始展東北南三關城豫因讀杜甫詩曰五城何迢迢迢迢隔河水延州秦北戶關防猶可倚乃知天寶中已有五城矣以下並筆談石油墨鄜延境內有石油舊説髙奴縣出脂水即此也生於水際沙石與泉水相雜惘惘而出土人以雉尾裛之乃採入缶中頗似淳漆然之如麻但煙甚濃所霑幄幕皆黑豫疑其煙或可用試掃其煤以為墨黑光如漆松墨不及也遂大為之其識文為延州石液者是也此物後必盛行於世自豫始為之蓋石油至多生於地中無窮不若松木有時而竭今齊魯間松林盡矣漸至太行京西江南松山大半皆童矣造煤人蓋未知石煙之利也石炭煙亦大墨人衣豫戲為延州詩云二郎山下雪紛紛旋卓穹廬學塞人化盡素衣冬木老石煙多似洛陽塵鹽南風解州鹽澤之南秋夏間多大風謂之鹽南風其勢發屋拔木幾欲動地然東與南不過中條西不過席張鋪北不過鳴條縱廣止於數十里之間解鹽不得此風不氷蓋大滷之氣相感莫知其然也又汝南亦多大風雖不及鹽南之厲然亦甚於他處不知緣何如此或云自城北風穴山中出今所謂風穴者已夷矣而汝南自若了知非有穴也方諺云汝州風許州蔥其來素矣跳兔契丹北境有跳形皆兔也但前足才寸許後足幾一尺行則用後足跳一躍數尺止則蹶然仆地生於契丹慶州之地大漠中豫使北日捕得數兔持歸蓋爾雅所謂蟨也亦曰蛩蛩巨驉也螓蟭蟟之小而緑色者北人謂之螓即詩所謂螓首蛾眉者也取其頂深且方也又閩人謂大蠅為胡螓亦螓類也白雁謂之霜信北方有白雁似雁而小色白秋深則來白雁至則霜降河北人謂之霜信杜甫詩云故國霜前白雁來即此也淤田熙寧中初行淤田法論者以謂史記所載涇水一石其泥數斗且糞且溉長我禾黍所謂糞即淤也豫出使至宿州得一石碑乃唐人鑿六陡門發汴水以淤下澤民獲其利刻石以頌刺史之功則淤田之法其來蓋久矣大陸豫奉使河北遵太行而北山崕之間往往遇螺蚌殼及石子如鳥卵者橫亘石壁如帶此乃昔之海濱今東距海已近千里所謂大陸者皆濁泥所湮耳堯殛鯀於羽山舊説在東海中今乃在平陸凡大河漳水滹沱涿水桑乾之類悉是濁流今關陕以西水行地中不減百餘尺其泥穢東流皆為大陸之土此理必然淮泗不入江唐李翺為來南録云自淮沿流至於高郵乃泝於江孟子所謂決汝漢排淮泗而注之江則淮泗固嘗入江矣此乃禹之舊迹也熙寧中遣使按圗求之故道宛然但江淮已深其流無復能至高郵耳雁蕩山溫州雁蕩山天下竒秀然自古圖牒未嘗有言者祥符中因造玉清宫伐山取材方有人見之此時尚未有名按西域書阿羅漢諾矩羅居震旦東南大海際雁蕩山芙蓉峯龍湫唐僧貫休為諾矩羅贊有雁蕩經行雲漠漠龍湫宴坐雨濛濛之句此山南有芙蓉峰峰下芙蓉驛前瞰大海然未知雁蕩龍湫所在後因伐木始見此山山頂有大池相傳以為雁蕩下有二潭水以為龍湫又有經行峽宴坐峯皆後人以貫休詩名之也謝靈運為永嘉守凡永嘉山水逰歷殆遍獨不言此山蓋當時未有雁蕩之名豫觀雁蕩諸峰皆峭拔險怪上聳千尺窮崕巨谷不類他山皆包在諸谷中自嶺外望之都無所見至谷中則森然干霄原其理當是為谷中大水衝激沙土盡去惟巨石巋然挺立耳加大小龍湫水簾初月谷之類皆是水鑿音漕去聲自下望之則高巖峭壁從上觀之適與地平以至諸峯之頂亦低於山頂之地面世間溝壑中水鑿之處皆有植土龕巖亦此類耳今成皋陜西大澗中立土動及百尺迥然聳立亦雁蕩具體而微者但此土彼石耳既非陡出地上則為深谷林莽所蔽故古人未見靈運所不至理不足怪也屯羅島嘉祐中蘇州崑山縣海上有一船桅折風飄抵岸船中有三十餘人皆衣冠如唐人繫紅鞓角帶短皂布衫見人皆慟哭語言不可曉試令書字字亦不可讀行則相綴如雁行久之自出一書示人乃唐天祐中告授屯羅島首領陪戎副尉制又有一書乃是上高麗表亦稱屯羅島用漢字蓋東夷之臣屬高麗者船中有諸穀惟麻子大如蓮的蘇人種之初嵗亦如蓮的次年漸小數年後只如中國麻子時贊善大夫韓正彥知崑山縣事召其人犒以酒食食罷以手捧首而囅意如歡感正彥使人為其治桅桅舊植船上木不可動工人為之造轉軸教其起倒之法其人又喜復捧首而囅珠輦國入貢撒殿熙寧中珠輦國使人入貢乞依本國俗撒殿詔從之使人以金盤貯珠跪捧於殿楹之間以金蓮花酌珠向御座撒之謂之撒殿乃其國至敬之禮也朝退有司掃撒珠得十餘兩分賜是日侍殿閣門使副內臣嵗首畫鍾馗於門嵗首畫鍾馗於門不知起自何時皇祐中金陵發一冢有石志乃宋宗慤母鄭夫人宗慤有妹名鍾馗則知鍾馗之説亦逺雀舌茶芽茶芽古人謂之雀舌麥顆言其至嫩也今茶之美者其質素良而所植之土又美則新芽一發便長寸餘尖細如針惟芽長為上品以其質幹土力皆有餘故也如雀舌麥顆者極下材耳乃北人不識誤為品題豫山居有茶論嘗茶詩云誰把嫩香名雀舌定來北客未曽嘗不知靈草天然異一夜風吹一寸長焦核荔枝閩中荔枝核有小如丁香者多肉而甘土人亦能為之取荔枝木去其宗根乃火燔令焦復種之以大石抵其根但令旁根得生其核乃小種之不復芽正如六畜去勢則多肉而不復有子耳子方蟲元豐中慶州界生子方蟲方為秋田之害忽有一蟲生如土中狗蝎其喙有鉗千萬蔽地遇子方蟲則以鉗搏之悉為兩段旬日子方蟲皆盡嵗以大穰其蟲舊曽有之土人謂之傍不肯養鷹鸇法謂之𠯑潄養鷹鸇者其類相語謂之𠯑潄𠯑音以麥反三館書有𠯑潄三卷皆養鷹鸇法度及醫療之術芋梗治蜂螫處士劉易隱居王屋山嘗於齋中見一大蜂罥於蛛網蛛搏之為蜂所螫墜地俄頃蛛鼓腹腹欲裂徐徐行入草蛛嚙芋梗微破以瘡就嚙處磨之良久腹漸消輕躁如故自後人有為蜂螫者挼芋梗傅之即愈油煎蛤蜊宋眀帝好食蜜漬鱁鮧鱁鮧乃烏賊腸也如何以蜜漬食之大業中吳郡貢蜜蟹二千頭蜜擁劍四甕又何嗣嗜糖蟹大抵南人嗜鹹北人嗜甘魚蟹加糖蜜蓋便於北俗也如今之北方人喜用麻油煎物不問何物皆用油煎慶厯中羣學士會於玉堂使人置得生蛤蜊一簣令饔人烹之久且不至客訝之使人檢視則曰煎之已焦黑而尚未爛坐客莫不大笑豫嘗過親家設饌有油煎鯉魚鱗鬛虬然無下箸處主人則捧而橫嚙終不能咀嚼而罷烏腳溪漳州界有一水號烏腳溪涉之者足皆如墨數十里間水皆不可飲飲則病瘴行人皆載水自隨梅龍圖公儀宦州縣時公牒至漳州素多病預憂瘴癘為害至烏腳溪使數人肩荷之以物蒙身恐為毒水所霑兢惕過甚睢盱矍鑠忽墜水中至於沒頂乃出之舉體黑如崑崙自謂必死然自此宿疾盡除頓覺康健無復昔之羸瘵又不知何也並筆談事實類苑卷六十

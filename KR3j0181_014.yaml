body:
  text: 事實類苑卷十四宋江少虞撰德量智識王文正諫議大夫張師德謁向文簡敏中曰師德兩謁王相公門皆不得見恐為人輕毁望公從容明之一日方議知制誥公曰可惜張師德向公曰何謂公曰纍於上前說師德名家子有士行不意兩及吾門狀元及第榮進素定但當靜以待之耳若復奔競使無階而進者當如何也向公方以師德之意啓之公曰某處安得有人敢輕毁人但師德後進待我淺也向公固稱師德設有闕望公勿遺公曰苐緩之使師德知聊以戒貪進激薄俗也二東封車駕在道夜有堂吏被酒忿爭皆愴惶入白公卧不答夜入對上曰臣僚奏狀千乘萬騎在外可斬首以令衆公曰此正小人一時醉毆若斬之是禁人飲酒令飲酒者皆懼車駕在外人情焉得安已捕歸京繫後府申府公曰若從輕斷亦恐縱人令大赦可赦之矣三公為朝修使自禁中乘輅車出都門百官餞於道乃憩於傳舍兩禁請見叩公榮遇之盛公曰但覺愧及自不安耳四臣僚上言諸司人吏公送名入仕上令遍閲之了無一人其言者日有數輩上謂曰是人謗卿也公曰臣為宰相或令百司補者吏人不為過也臣親舊亦多恐假以臣名送去亦不可知言者必不妄終不自辨五中書有事關送密院事礙詔格寇萊公準在樞密府特以聞上曰中書行事如此施之四方得非不便公見之拜於上前曰此實中書之失堂吏皆遭責罰密吏惶恐白寇公曰中書密院日有相干自來止送房改易不期奏白而使宰相謝罪不踰月密院有事送中書亦違舊詔堂吏得之欣然而呈公公曰却送與密院吏出白寇公寇公大慚翌日見公曰同年甚得許大度量六有貨玉帶者持以及門弟因呈公公曰如何弟曰甚佳公命繫之曰還見佳否弟曰繫之安得自見公曰玉名石也得不重乎自負重而使觀者稱好無乃勞耶我腰間不稱此物亟還之故平生所服止於賜帶七太宗皇帝一日命蘇公易簡曰卿看兩制中誰當大用蘇公云臣見同年王某有器識逺大不可量也太宗曰朕志亦先定矣公知之以女適蘇公之子耆時蘇公母太夫人薛氏在堂每公至出拜叙同年之契嘗語薛氏曰使女子在夫人之左右乃報同年之知也已上見名臣遺事王冀公王欽若為亳州判官監㑹亭倉天大雨倉司以榖濕不為受納民自逺方來輸將者食榖且盡不能得輸欽若悉命輸之倉奏請不拘年次先支濕榖不至朽敗奏至太宗大喜手詔答許之因識其名任滿擢為朝官李允則李允則知雄州十八年初朝廷與契丹和親約不修河北城隍允則欲展雄州城乃置銀器五百兩於城北神祠中或曰城北孤回謂多以人守之允則不許數日契丹數十騎盜取之允則大怒移牒涿州捕賊因令急築其城契丹內慙不敢止也並涑水記聞燕龍圖燕龍圖肅有巧思初為永興推官知府寇萊公舞柘枝有一鼓甚惜之其環忽脫公悵然以問諸匠皆莫知所為燕請以鐶腳為鎖簧內之則不脫矣萊公大喜燕為人寬厚長者博學多聞其漏刻法最精今州郡往往有之見廬陵居士集張師正英宗即位赦天下凡內外將校廂軍皆加恩是時荆南所給縑帛皆故惡不堪既陳於庭中軍士睨之失色揚言曰朝廷大恩而乃以此給我自旦至午不肯受賜而偶語紛紛不已轉運使劉述大懼不知所為居民往往奔出城外且言變起矣是時張師正為州鈐轄馳入軍資庫呼將卒前曰朝廷非次之恩州郡固無預備今帑中所有止如此汝輩不肯拜賜將何為也必欲反則非殺我不可遂擲劍於庭下披胸示之羣校茫然自失遽聲喏受賜而去東軒筆録魏丕魏丕作坊使舊制床子弩止七百步上令丕增造至千步求規於信信令懸弩子架以重墜其兩端弩勢圓取所墜之物較之但於二分中增一分以墜新弩則自可千步矣如其制造果至千步雖百試不差魏王别録寇萊公寇萊公之貶雷州也丁晉公遣中使齎敕往授之以錦囊貯劍揭於馬前既至萊公方與郡官宴飲驛之吏言狀萊公遣郡官出迎之中使避不見入傳舍中久之問其所以來之故不答上下皆惶恐不知所為萊公神色自若使人謂之曰朝廷若賜準死願見敕中使不得已乃以敕授之萊公乃從録事參軍借緑衫著之短才至膝拜受敕於廷升階復宴飲至暮乃罷二寇準從車駕幸澶淵每夕與楊億痛飲謳歌戲謔喧譁常達旦上使人覘之喜曰得渠如此吾何憂矣敵兵既退求和親詔劉仁範往議之仁範以疾辭乃命曺利用代之利用與之約嵗給余繒二十萬敵嫌其少利用復還奏之上曰百萬以下皆許也利用辭去準召利用至幄次語之曰雖有敕㫖汝往所許毋得過三十萬過三十萬勿來見準準將斬汝利用至其帳果以三十萬成約而還車駕還自澶州畢士安迎於半道既而至京師士安罷相寇準代為首相王化基王化基為人寬厚嘗知某州與寮屬同坐有卒過庭下為化基拜而不及幕職怒退召其卒笞之化基聞之笑曰我不知其欲得一拜如此之重也向或知之化基無用此拜當以與之人皆服其雅量官至參知政事禮部尚書諡曰安簡王濟張稷景德初契丹寇澶淵樞密使陳堯叟奏請江河皆撤去浮橋舟船皆泊南岸敕下河陽陜府河中府如其奏百姓大驚擾監察御史王濟知河中府獨不肯撤封還敕書且奏以為不可陜州通判張稷時以公事在外州中已撤浮橋稷還聞河中不撤乃復修之寇相時在中書由是知此二人明年召濟為員外郎兼侍御史知雜事方且進用濟性鯁直衆多嫌之及寇相出濟遂以郎中知杭州徙知洪州而卒張稷以此為三司判官轉運使並見涑水紀録張乖崖乖崖公鎮蜀時主帥平賊如風悸草亂久不寧息公謂主帥曰有平民無告者在黨中亦宜治之翌日帥送賊二十餘人請公治之公悉給公憑遣之曰各著去帥怒曰何擅縱賊人公曰昨日李順脅民為賊今日僕與足下化賊為民用固邦本二主帥帳下寵一虞候卒頗恃勢嚇民暴取財物皆吞聲與之因民有訴其強奪者彼知公怒乃縋東城夜遁公差衙校往捕之約曰爾於擒得處則渾衣撲入井作逃走投井申來是時羣黨恟恟知彼已投井故浮議杜絶又免與主帥有不協之名三川界既安兵未凱旋頗有驕色食必肥鮮衣必華焕而妻子是戀公慮其回兵日有顧望心遂密奏乞差上前心腹近臣可以彈壓得主帥者分其權勢然後抽兵即無虞矣尋詔崇義副使入內內侍押班衛紹欽光同西川捉賊招安使衛風儀峻整詞氣讜直折衝行事帥不能違幕下軍吏悉皆畏憚遂旋抽兵赴闕一無顧戀者改元至道春二月衛入覲奏劔門署上官正守關有功遂詔授峰州團練使充西川招安使替主帥歸京公與上官氣義相得謀無不臧由是川路無拾遺矣公乃作撫蜀詩二十韻見本集四平李順賊明年有廣武揮卒劉旰者自懷安軍劫巡檢使率衆叛金帶衣甲衝破漢州西往彭州路去公日與上官正及僚屬往大慈寺奕碁飲射民間憂喜相半不知其由公料賊經永康軍將至蜀州謂上官正曰請行公約曰此去新津抵方井必遇賊彼疲我鋭擊之必克翌日至方井果與賊相遇掩殺殆盡上官凱旋公迎之歡宴盡日或謂公曰賊襲破數郡不逐之何也公曰彼賊勢方盛三日而四郡不守五日而兩川震驚若襲之與鬭必彼勇而我怯曷若待其氣衰擊之則勢如破竹五討劉旴兵士回有以帶賊首級而來欲謀為戰功者公曰當奔突交戰之際豈暇獲其首耶此必戰後剪來知復是誰殿直段倫曰如學士之言果神明矣當時隨倫為先鋒入賊用命者皆中傷被體主帥令付營切要將理公曰豈若是耶遂遣令悉擡舁來既至公先録傷兵士功以帶首級來者次之是時軍情仰公賞罰至當相顧歡躍公先於㕔前分垜錢絹充卸甲例物公遂出迎上官燕於衙署引甲士坐於東廂勞之曰喜汝等殺賊勝回各各缷下衣甲領取例物歸營去衆皆肩抱錢絹歡躍盈衢百姓不限親疏迎之相賀六景德中敵人犯邊河朔州郡多罹其毒兵士將深溝高壘以自固未有議其出者時有一班行李居正避廟諱者榷征賦於一鑊疾其凶橫若是哀其老幼無辜鳩集市人召募丁壯出其不意邀以擊之奪其老幼婦女援送其家有位者雖壯其勇無與議其功者公時判三班院聞其名而不識其面乃嗟稱曰下位中有如此者而不預旌賞何以勸士大夫耶於是録其壯跡條奏以聞特與遷官仍充閣門祗候既而不使知之李承恩之後夙夜念之莫知其由有人謂之曰所舉者乃張尚書也因詣謝之不得見閽者通榜子得字數行云公臨陳勇臨財廉涖事勤臨民仁加之畏慎此報國大效也所謝近私不及相見李既得之愈勝一見捧玩佩服不離於懷李一旦推例有剩總計士衡訪其履歷李以前事對即嗟嘆久之曰古人弗及也因命立石於三司廡下以備史之闕文七李畋苦痁既瘳請謁公曰子於病中曽得移心法否對曰未也公曰人能於病中移其心如對君父畏之慎之靜久自愈八公視事退屏後有一㕔子熟睡公詰之汝家有甚事對曰母久病兄為客未歸訪之果然公翌日差場務一名給之且曰吾㕔上有敢睡者耶必心極幽悶使之然耳故憫之九張乖崖守成都兵火之餘人懷反側一日合軍旅大閲始出衆遂嵩呼者三乖崖亦下馬東北望而三呼復攬轡行衆不敢歡趙濟畏之龍圖乖崖孫壻也嘗以此事告於韓魏公公曰當是時某亦不敢措置已上並見忠定公語録文潞公文潞公知益州喜遊宴嘗宴鈐轄廨舍夜久不罷從卒輒拆馬庌為薪不可禁遏軍校白之座客股栗公曰天實寒可拆與之神色自若宴飲如故卒氣沮卒無以為變出涑水紀聞二文公為相龎公為樞密使以國用不足同議省兵於是㨂放為民者六萬餘人減其衣糧之半者二萬餘人衆議紛紛以為不可施昌言李昭亮尤甚皆言衣食於官久不願為農又皆習弓刀一旦散之閭閻皆為盜賊上亦疑之以問二公公曰今公私困竭上下皇皇其故非他正由蓄養見兵太多故也今不省去無由蘇息萬一果有聚為盜賊者二臣請以死當之既而昭亮又奏兵人揀放所以如是多者大抵皆縮頸曲身詐為短小以欺官耳公乃言兵人茍不樂歸農何為詐欺如此上意乃決邊儲由是稍蘇後數年王德用為樞密使許懷德為殿前都指揮使復奏選廂軍以補禁軍增數萬人東軒筆録韓魏公韓魏公在大名日有人獻玉盞二隻云耕者入壞冢而得表裏無纎瑕可指亦絶寶也公以百金答之尤為寶玩每開宴召客特設一桌覆以錦衣置玉盞其上一日召漕使且將用之酌酒勸座客俄為一吏誤觸倒玉盞俱碎坐客皆愕然吏懼伏地待罪公神色不動笑謂座客曰凡物之成毁亦自有數俄顧吏曰汝誤也非故也何罪之有坐客皆嘆服公寬厚不已公帥定武時夜作書令一侍兵持燭於旁侍兵他顧燭燃公鬚公遽以袖摩之而作書如故少頃回視則已易其人矣公恐主吏鞭之亟呼視之曰勿易渠已解持燭矣軍中感服二孫和甫嘉祐治平間在中書編排文字嘗言公當昭陵未復土英廟未親政朝廷多故中書文字日盈於前一一從頭看看了即處置了接人更久處事更多精神意思定而不亂靜而不煩如終日未嘗觸事者殊不似議了一件事讀了一紙文字精神意思半日不來三歐陽永叔在政府時每有人不中理者輒峻折之故人多怨公則不然從容喻之以不可之理而已未嘗峻折之也四公言司馬君實初除樞密副使竟辭不受時公在魏聞之亟遣人齎書與潞公勉之云主上倚重之厚庶幾行道道或不行然後去之可也似不須堅讓潞公以書呈君實云自古被這般官爵引得壞了名節為不少矣凡人語及其不平則氣必動色必變辭必厲唯韓魏公不然更說到小人忘恩背義欲傾已處辭氣和平如道尋常事公曰某平生仗孤忠以進每遇大事則以死自處幸而不死皆偶成實天扶持非某所能也五仁宗朝李都尉喜延士大夫盡聲色之樂一時館閣清流無不往者公於其間最為年少獨未嘗造焉李數召而公數以事辭人有強之者公曰固欲往但未有名耳公處之不失和李莫能致怨同時諸公亦不以為介也六吳長文璟素以徑挺有器節稱公亦稱之及幕府有闕門下有以璟為言者公曰此人氣雖壯然包蓄不深發必暴且不中節當以此敗置而不言不踰年璟罪敗皆如其言七定州西北近邊山林舊禁斬伐其後楊懷敏言并以近裏淺山耕藝之地槩行禁止督州縣自枯河北巡邏日益嚴犯者輒致於法邊人或徙居失業公乃遣官行視去北境尚五六十里足為防别定禁地揭榜諭之非令所禁者縱民採伐由是邊地六百餘里莫不感悅八禁卒有私逃數日而負其母以至者軍中執之以見公按法當死卒曰母老且病近在數舍間常恐不復見誠知擅去當誅得一見死無恨公惻然考按得實即以情放軍中感激有垂涕者並見魏王别録王沂公王沂公當軸以重厚鎮天下尤抑奔競張師德久次館閣博學有時望而不事造請最為魯簡肅所知一日中書議除知制誥一人魯盛稱張才德沂公以未識為辭魯密諷張見沂公張辭不往魯屢諷之張重違其意始緣職事一往沂公辭不見張大悔恨他日中書復議魯曰無以易張向已為公言之矣沂公曰張君器識德行足以當此但尚有請謁耳逾年方命掌誥沂公之取人如此故當時士大夫務以沖晦自養澠水燕談二韓魏公言王沂公德器深厚而寡言當時有得其品題一兩句者人皆以為榮琦為諫官時因納劄子忽云近日頻見章疏甚好只如此可矣向來如高若訥輩多是擇利范希文亦未免近名要須純意於國家事爾公聞此言益自信也狄武襄韓魏公言狄青作定帥一日宴公惟劉易先生與焉易性素疏訐時優人以儒為戲易勃然謂黥卒敢如此詬詈武襄不絶口至擲樽俎以起公是時觀武襄氣殊自若不少動笑語益溫次日武襄首造劉易謝公於是時已知其有量並見魏王别録范文正慶厯中余靖歐陽修蔡襄王素為諫官時謂之四諫四人力引石介執政欲從之時范仲淹為參知政事獨謂曰石介剛正天下所聞然性亦好竒異使為諫官必以難行之事責人君以必行少拂其意則引裾折檻叩頭流血無所不為主上雖富有春秋然無失德朝廷政事本自修舉安用如此諫官也諸公服其言而罷東軒筆録事實類苑卷十四

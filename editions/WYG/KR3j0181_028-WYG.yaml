body:
  text: 事實類苑卷二十八宋江少虞撰官職儀制武臣賜笏頭帶太宗命創方圓毬路帶亦名笏頭帶以賜二府文臣明道初徐公為樞密使兼侍中獨得賜之皇祐初李侍中用和以叔舅獲賜時王侍中貽永為樞密院遂併賜之其後曹侍中亦以叔舅而賜焉對賜凡拜賜職入朝多有對賜拜官加勲封謝恩雖二府亦無有景徳初王冀公以㕘知政事判大名用召還加邑封時契丹方講好真宗欲重其事冀公入謝特命以衣帶鞍馬賜之自後二府轉官加階勲封邑入謝並有對賜郊禮召耆徳侍祠皇祐二年仁宗始祠明堂范文正公時守杭州而杜正獻公致政居南都蔣侍郎希魯致仕居蘓州皆年老體尊范公建言朝廷盛禮宜召元老舊徳陪祀供帳都亭敦遣就道二公卒不至加賜衣帶器幣賜一子出身自是前兩府執政者大禮前闕有詔召之然亦無至者禮畢皆賜衣帶器幣焉二府拜恩詣景靈宮謝文穆王冀公天聖初再為相既拜命謝恩即請詣景靈宮奉真殿朝謝真宗皇帝冀公仍以五百千建置道塲説先公為齋文其畧曰奉諱之初謝病於外臨西宫而莫及企南狩以方遥失其本餘不盡記自後二府初拜恩入謝即詣景靈踵冀公故事也都省議事儀式先公嘗言自太祖臨御以來百司人吏艱於選補由是臺省舊規漸成空墜吾前嵗罷右僕射省中並非舊吏權私名散官三數人主掌按籍而已其舉措祗應山野樸陋詢省中故事則懵然莫知也適會勅下集五省官議事省吏以狀白吾詢之三省官議事僕射入省乎曰不知也臺省官與承郎尚書雜坐乎曰不知也又掌名表名郎官與諫議御史何向而坐曰不知也左右丞與尚書坐孰為主曰不知也吾為主客郎中掌誥是時吏部尚書張公昭兵部尚書李公濤左丞趙公上交中丞劉公温叟致仕楊尚書昭以耆儒碩徳俱在班列委陪諸公於都省議事大凡在内廷論職不論官入都省論官不論職如翰林學士文明學士樞密直學士三司副使並同上帶兩省官及都省官遇議事之日入都省並綴本班坐此論官不論職也如郎中則向郎中坐諫議則向諫議坐也每議事所司於都堂上陳帟幕具酒饌設左右丞坐於堂之東北面南向設御史中丞坐於堂之西北面南向設六部尚書侍郎坐於堂之東廂面西向設兩省尚侍給事諫議坐於堂之西廂面東向如兩省有侍郎則改左在尚侍坐設知名表郎官坐於堂之東南面北向設諫議御史坐於堂之西南面北向設左右司郎中員外坐於左右丞後設三院御史坐於中丞之後設諸行郎中員外坐於尚書侍郎之後設左右司諫正言坐給舎諫議之後並重行異位故事左右僕射與侍中中書令是為四廂自唐開元之後僕射㕘知政事然非軍國大事本朝會議事之日三省官早赴省次就所司先以議論呈諸官畧知大義然後所司引知名表郎官執闕春黄卷即所議事升㕔就本位次引小兩省官就本位次引郎中員外就本位次引三號御史就本位次引兩省官次引尚書侍郎次引御史中丞各就本位然後左右丞升㕔所司抗聲曰揖羣官對揖訖各就本位知名表郎官以黄卷授所司所司捧議左右丞如左右丞闕即次判都省官一人事左右丞執卷展讀訖然後授於中丞於尚書侍郎迤邐展讀訖復授於名表郎官始命茶酒進食再行酒進食所司抗聲曰揖訖羣官方飲酒爵止於三行後以諠談不設食飲畢所司捧筆硯立於左右丞之前一吏抗聲曰讀定訖左右丞捧筆叩首所司曰揖左右丞與羣官揖訖後以一幅紙寫所議事即署名於其下迤邐於四坐諫議御史命一吏抗聲曰有所見不同者請不押字在坐如有異議不問官位高卑並得進前論列候進止設食訖所司復抗聲曰食畢揖羣官對訖各降階出就本次以所議事可否共列狀進入以髙者為表首如諸司三品以上並入省議事即諸司三品坐于尚書侍郎之東南官一品坐于尚書侍郎之前武班二品坐於給舎之南並同席異位如議大事僕射御史大夫入省惟僕射鞍轡至㕔下馬餘官至門下馬設僕射大夫位於左右丞之前並行異位揖畢押字皆僕射専之矣故徐騎省鉉博古之士多知典故亦言在江南見舊儒所説議事次第與吾畧同命寫一圖字授與省吏但不知此輩能遵行否已上並見春明退朝錄南郊執仗兵士梁開平二年南郊執儀仗兵士計二千九百七十人建隆四年南郊執儀仗兵士一萬三千六百人太常寺鼔吹等二千六百四人太僕寺擁駕兵士六百八十二人六軍執擎人員兵士五百五十二人左右金吾衞仗各一百二十五人左金吾仗一百五十八人右金吾仗三百五十九人殿中省押番人員並執擎兵士共五百三十一人司天臺一百六十二人八同都司四千三百七十三人合兵部一萬七千四百三十三人出金坡遺事中書密院執政官非假日不得私第見客慶厯二年九月丁丑知諫院蔡襄上言自今中書樞密院執政官非休暇日私第不得見客欲詢訪外事聽呼召從之見涑水記聞太祖令文武臣入見謝畢乃得入正衙舊制文武羣臣由一命而上自外至者必先詣正衙見訖乃得入辭謝亦如之太祖皇帝御極之初親總庶務常驛召一邊城入對將以方畧訝其到闗已數日而未見左右或奏以未過正判衙太祖意不平之乃令自今皆入見謝畢乃得詣正衙遂為定制出涑水記聞樞密院别撰時政記左右史所以記言動也然則王者之密畫切問弼臣之僉諧獻納外庭分職莫克與聞則中書有時政記得以詳述焉近制㕘知政事二員共掌其任復有羣司上殿奏事及親奉徳音或出宸㫁可以訓俗示後者月中録送中書同編纂編記奏御宣付史館景徳祥符中知樞密院王公欽若陳公堯叟請自今樞密院所覩嘉言美徳更不録送中書願别為時政記從之出金坡遺事譯經潤文使太平興國中始置譯經院於太平興國寺延梵學僧入院繙譯新經始以光禄卿湯悦兵部員外郎張公潤色之後趙文定楊文公晁文莊李尚書絳組皆為譯經潤文官天僖中宰相丁晉公始為使天聖三年又以宰相王冀公為使自後宰相繼領之然降麻不入御又以㕘政樞密為潤文其事浸重每嵗誕節必進新經前兩月三府皆集以觀翻譯謂之閒堂亦唐之清流盡在也前一月譯經使潤文官集以新經進謂之開堂慶厯三年呂許公羅相以司闕為譯經潤文使明年致仕章郇公代之自後乃降麻入御太常寺官太常寺國初以來皆禁林之長主判而禮院自有判院司判院大中祥符中符瑞繁縟闕建禮儀院輔臣主判而兩制為知院天禧末罷知院天聖中省禮儀院向寺與院事舊不相兼康定元年置判司同判司寺並兼禮儀寺近有置六七人者按太常置卿一員少卿二員博士四員祥符中博士二員後加至四員今若置判寺一員同判寺二員合唐之卿數矣天聖元年改同判院為知院即博士也宰相帶館職唐制宰相四人首相帶太清宮使次三相皆帶館職𢎞文館大學士監修國史集賢殿大學士以此為次序本朝置三相昭文修史首相領焉集賢次相領焉三館職惟修史有職事而頗以昭文為重自次相遷首相乃得之趙令拜及獨相領集賢殿大學士續兼監修國史久之還昭文館薛文惠與沈恭惠並相薛自㕘政領監修相仍舊而沈領集賢畢文簡與寇忠愍並相而畢領監修寇領集賢王太尉相並止領集賢近時王文惠龎莊敏初拜及獨相悉兼昭文修史二職非舊制也文臣自使相除樞相罷節還舊官文臣自使相除樞相罷節而還舊官景祐元年王沂公自使相帶檢校官復為吏部尚書同平章事充樞密使慶厯七年夏鄭公自使相入樞相仍帶節度使亦非舊例也文臣為使相節度使太祖太宗時文臣為使相唯趙令一人真宗時寇萊公王冀公二人節度使李南陽一人乾興後難遽數矣文臣換武唐文臣武㕘用衰滋自尚書右丞出華州刺史召為左金吾衞大將軍如是者數人本朝頗循其制工部侍郎王公明兼黄州刺史給事喬公維嶽換海州刺史三司使尚書左丞李公士御換同州觀察使翰林學士工部侍郎陳公堯咨換宿州觀察使如錢鄧州及慶厯初韓范龎王四公皆換觀察使以用兵擢之也龍圖閣直學士為李公良換奉州防禦使非闕譽也武臣換文武臣換文資者太宗時白州刺史錢昱換秘書監選工部侍郎復換觀察使王冀公為大資政請鑄印不許真宗復侍郎王冀公景徳中罷㕘知政事始置資政殿學士以命之宰相冦萊公頗抑之班翰林之下乃命為大學士冀公請鑄印不許遂領尚書省自有印也太尉在三司之下太尉舊在三司之下由唐以來以上公為重李光弼自司空為太尉薨贈太保郭子儀自司徒為太尉薨贈太師李徳裕自司徒為太尉皆以超拜李載儀自司徒為太保王智闕自司徒為太傅二人卒俱贈太尉是以上公寵待宗臣餘雖有功可遷保傅而韋武之尊不可得也五代及國初節度皆自檢校太傅遷太尉太尉遷太師然無升秩明文不歴郎官為大監唐姚南仲不歴尚書侍郎而入府使為僕射邇世鄭文肅列丞相張尚書方平王宣徽拱宸滕侍讀甫呂給事中惠卿鄧中丞潤父皆不歴郎中員外而便為諫議大夫遷郎曹尚書省二十四司唐世以事簡者兼學士舍人本朝唯重左曹名曹館職提㸃刑獄例得名曹而開封府判官轉運使得名曹右遷左曹學士舍人待詔遷二資𢃄史館撰史得優遷如王原叔自工部郎中遷吏部郎中是也朝官帶史館亦得優遷李邯鄲自博士為禮部員外郎賈魏公自司封員外郎為禮部郎中是也本朝故事如此以上春明退朝録宣徽使位樞密使下宣徽使舊亞樞密使在樞密副使同知樞密院之上咸平中周營拜宣徽使有所畏避因陳願居其下先帝從之遂為常例自營始也出沂國文正公筆録駕親臨問臣僚邢昺常被疾請告真宗親臨問賜藥一奩銀器千兩練千疋國朝故事非宗戚將相問疾臨奠帝不親行惟昺與郭贄以恩舊特用此禮儒者榮之邢上問疾上復臨喪楊文公談苑兩府親戚迴避國朝舊制父子兄弟及親之在四府者與侍從執政之官必相迴避熙寧初呂公弼為樞密使其弟公著除御史中丞制曰久欲登於近用尚有避於當塗公弼聞之義不能安遂乞罷樞密府久之以觀文學士知并州二韓魏公掌誥妻父入㕘大政引唐獨孤郁權徳輿故事懇求解職太宗覽奏稱賞除集賢殿修撰趙公罷公復職闕入兩掖親擇牯犀帶賜之今丞相陳公堯叟作相壻主舉正殊伯相壻楊察忠獻韓公執政壻學淑皆引公之請為法改以他職見忠獻公魏王别録具員具員冊小方冊子可五六寸葢置懷袖也每官位以黄紙標格之一親二中三樞密四使相節度使五僕射尚書六三司使七翰林侍讀侍講密直龍圖閣學士八中丞丞郎給舍諫議待制九留後觀察防禦使出蓬山志軍巡馬歩院用文史先是軍巡及馬歩院判官皆用郡府吏建隆元年始詔兩京軍巡州諸馬歩院判官令吏部流内銓擇選入無遺省聽減兩選補之始用文吏也定合班儀建隆三年重定合班儀升六曹侍郎在給事舍人之上郎中補闕之上員外郎在拾遺之上節使在六曹侍郎之上中書侍郎之上故事北省官為侍從班五品押南省四品六品押南省五品節使在諸司五品之下至是改焉賜百官冬服建隆三年十月賜文官常㕘官冬服累朝止賜將相翰林學士諸軍大校至是太祖曰冬服不及百官甚無謂也故賜之一品致仕官綴班建隆四年詔一品致仕官曾帶同平章事者每遇朝會宜綴中書門下班是時太子太師致仕使益寄來陪祀故不足記罷代判官乾徳三年詔諸州長吏或有闕籍人代判者即於賓佐中擇公幹者闕不得吏任尤從人先闕承五代以來領節旄為郡守者多武皆不知書所至必自置吏謂之代判政事一以委之用權不法太祖知其弊至是罷之臺省寺官以三周轉官乾徳四年詔御史臺吏部流内銓南曹刑部大理寺自少卿郎中員外郎知雜侍御史以下及丞簿司直評事等並以三周年為滿須常在大司蒞事者至月限滿即與轉官常㕘官朝官詔京朝官從今出入及受代歸者宜令中書舍人郭贊善部知雜事滕中正户部郎中雷徳驤同考校勞績及銓量材器候有闕中書類能以授之先是常㕘官自一品以下皆謂之京官未嘗㕘官謂之未曾㕘官近代以常官為朝官未嘗㕘官為京官故有朝官之目登聞檢院雍熙元年改匭院為登聞檢院東延恩匭為崇仁檢南招諌匭為思諫檢西申寃匭為申明檢北通𤣥匭為招賢檢選人赴調求官職淳化五年十一月詔吏部選人赴調並須於京朝内求一人為職官用府縣諸司監印詔勅藏勅書樓六月詔天下前後詔勅並藏於勅書樓著以籍受代日交相付仍於印紙厯及南曹厯内批書羣臣入閣十二月朔太宗御文徳殿羣臣入閣禮畢百官疑下飱唐制州望天子御宣政殿授百官起居諸司奏事仗衞如式敬宗時於紫宸為入閣之儀五代以來禮容多闕至是始復舊以上見國朝事實事實類苑卷二十八

body:
  text: 事實類苑卷五宋江少虞撰祖宗聖訓仁宗英宗神宗仁宗天聖七年曹侍中利用因姪汭聚無賴不軌獄既具有司欲盡劾交納利用者憸人幸其便隂以文武四十餘人諷之俾深治仁宗察之急出手詔其文武臣僚内有先曾與曹利用交渉徃還曾被薦舉及嘗親暱之人並不得節外根問其中雖有渉汭之事者恐詿誤亦不得深行鍜鍊其仁恤至此是年聖夀方二十皇祐中楊待制安國邇英閣講周易至節卦有慎言語節飲食之句楊以語朴仁宗反問賈魏公曰慎何言語節何飲食魏公從容進其説曰在君子言之則出口之言皆慎入口之食皆節在王者言之則命令為言語燕樂為飲食君天下者當慎命令節燕樂上大喜後講論語當經者乃東北一明經臣講至自行束脩以上之文忽進數語殆近乎戲曰至於聖師訓誨人尚得少物况餘人乎侍筵羣臣驚愧汗流明日傳宣經筵臣寮各賜十縑諸公皆恥之方議共納時宋莒公庠留身奏曰臣聞某人經筵進鄙猥之説自當深譴反以錫賜誠謂非宜然餘臣皆已行之命拜賜可也若臣弟祁以臣在政府於議非使令謹獨納上笑曰若卿弟獨納不特妨諸臣亦貽某人之羞但傳朕意受之並湘山野録魯人李廷臣頃官瓊管一日過市有獠子持錦臂鞲粥于市者織成詩一聨取視之乃仁廟景祐五年賜新進士詩也云恩袍草色動仙籍桂香浮嗚呼仁宗文章掞麗固足以流播荒服盖亦仁徳醇厚有以深浃夷獠之心故使愛服如此也廷臣以千錢易得之帖之小屏致几席間以為朝夕之玩出澠水燕談十一月癸巳以皇子生燕宗室於太清樓讀三朝寳訓賜御書又出寳元天子詳異書示輔臣其書帝所集天地辰緯雲氣襍占凡七百五十六分三十六門為十卷慶厯元年七月戊申朔出御製觀文覽右圗記以示輔臣天章閣侍講林瑀上周易天人㑹元紀御史賈昌朝言瑀以隂陽小説上惑天聴不宜在勸講之地帝諭輔臣曰人臣雖有才學若過為巧佞終有形迹乃落瑀職通判饒州寳元二年三月壬寅編修院與三司上歴代天下户數前漢千二百二十三萬三千六十二後漢千六百七萬七千九百六十魏九十四萬三千四百二十三晉二百四十五萬九千八百宋九十萬六千八百七十後魏三百三十七萬五千三百六十八北齊三百三萬二千五百二十八後周三百五十萬隋八百九十萬七千五百三十六唐九百六萬九千一百五十四國朝太祖朝二百五十萬八千九百六十五太宗朝三百五十七萬四千二百五十七真宗朝八百六十六萬九千七百七十九寳元元年千一十一萬四千二百九十先是邇英閣讀真宗正説養民篇見歴代户口登耗之數帝顧侍讀臣曰天下户口幾何侍讀學士梅詢對曰先帝所作盖述前代帝王恭儉有節則户口充美賦歛無制則版圖衰耗自五代之季生齒耗太宗受命而真宗繼聖承祧休養百姓天下户口之數盖倍于前矣因詔三司及編修檢閲以上之見帝學仁宗時宦官雖有甚蒙寵信者臺諫言其罪輙斥之不吝也由是不能弄權仁宗萬㡬之下無所好玩惟親翰墨而飛白尤為神妙凡飛白以㸃畫象物形而㸃最難又致和中有書待詔李唐卿撰飛白三百㸃以進自謂窮盡物象上亦頗嘉之乃特為清浄二字以賜之其六㸃尤為竒絶更出三百㸃外出廬陵歸田録仁宗皇帝暑月不揮扇毎侍邇英閣常見左右以拂扇驅蚊蠅而已冬月不御爐以禦寒氣甚則於殿之兩隅設之醫者云體中和之氣則然東軒筆録慶厯四年八月乙夘上曰近觀諸提舉所按舉官吏務為苛刻不存逺大可降詔約束嘉祐中蘇轍舉賢良對極言闕失其略曰聞之道路陛下宫中貴妃至於千數歌舞飲酒歡樂失節坐朝咨謨便殿無所問考官以上初無此事轍妄欲黜之仁宗曰朕設制科本求敢言之士轍小官敢如此極言特與科名仍令史官編録文正公筆録孔道輔以剛毅直諒多聞天下知諫院日請明肅太后歸政天子為中丞日諫廢郭后其後知兖州日近臣有獻詩百篇者執政請除龍圖閣直學士仁宗曰是雖多不如孔道輔一言乃以公為龍圖閣直學士見倦遊襍録玉清昭應宮使王曾請命舘閣校道藏經仁宗因言其書多載飛鍊金石服餌之事不如老氏五千言清浄簡要也宰相張知白曰老氏五千言道徳之本非同方士一曲之説也慶厯二年正月光禄寺丞盛中甫馬直方在舘讀書自陳嵗久請以帖職仁宗曰舘儒之職豈可求耶止令大官給食後三年與試因詔罷舘閣讀書武寧軍節度使兼侍中夏竦武勝軍節度使同平章事程琳薦尚書屯田員外郎張願秘書丞蔡抗太子中舍李仲昌節度堂書記李師錫等試舘職仁宗曰舘職當用文學之士名實相等稱者居之近時所多學薄之人朕甚不敢取也於是等送審官院與記名而已見蓬山志英宗治平三年英宗改清居殿曰欽明殿命直龍圗閣夏廣淵書洪範於屏謂廣淵曰先帝臨御四十二年天下承平得毋以為朕方属多事其敢自逸故改此殿名因訪廣淵先儒洪範得失廣淵對以張景所得最深以景論七篇進翌日上復召對延和曰景所説過先儒逺矣以三徳為馭臣之柄尤為善論朕遇臣下嘗務謙柔聽納之間則自以剛斷此屏置之坐右豈特無逸之戒耶英宗謂輔臣曰諫官御史貴通達大體如任已憎愛以中傷善民或繩治細故希圗且塞言責此何足以補職卿等亦當察之英宗謂輔臣曰舘閣所以育俊才欲選入出使無可者豈乏才耶參知政事歐陽修曰今取才路狹舘閣止用編校書籍選人進用稍遲當廣任才之路漸入此職庶幾可以得人趙槩曰養育人才當試其所長而用之上曰卿等為朕各舉才行兼善者數人雖親戚世家勿嫌朕當親問可否宰相曾公亮對曰使臣等自薦而自用之未免於嫌也韓琦曰臣等所患人才難于中選果得其人議論能否何可嫌也上因使薦之於是琦公亮修槩所舉者凡三十人皆令召試琦等又以人多難之上曰既委公等舉薦賢才豈患多也乃先詔尚書度支員外郎蔡延慶尚書屯田員外郎葉均太常博士劉汾王效夏倚太子中允張公裕大理寺丞季常光禄寺丞胡宗愈雄武軍節度推官章惇闕宻州觀察推官王存等十人餘復試之治平三年龍圖閣直學士馬光集戰國下及五代君臣事迹可監戒者為編年書名曰通志八卷上之英宗覧而善之又詔光置局秘閣辟官二人續其後事候書成取㫖乃賜名英宗初即位輔臣請如乾興故事日詔侍臣講讀上旣御經筵諭任守中曰方日求講官久待對未食必勞倦自合視事畢不候進食即經筵故事講讀畢而拜上命毋拜遂以為常治平元年詔葬皇后乳母永嘉郡夫人賈氏而開封府言徙掘民墓不易上曰豈宜以此擾民耶命勿徙是嵗京東西路水灾而陳蔡宿毫州尤甚上旣遣三司副使李肅之等分視被水州畢又命三司上上供米三萬石振濟之已上兩朝實訓諫官陳升之言比来舘閣遷任益輕非所以聚天下賢才彰成就之意請約今在職者之數著為定員有論薦者中書籍其名若有闕即取其文學行義傑然為衆所推者取㫖召試詔從之見國朝事實神宗熙寧五年六月上曰人有才不可置之閒處因言漢武亦能用人才王安石曰武帝所見下故所用將帥止衛霍輩至天下户口減半然亦不能滅匈奴上曰漢武帝至不仁以一馬之故勞師萬里侯者七十餘人視人命如草芥然此天下户口所以減半也人命至重天地之大徳曰生豈可如此安石曰不仁如此非特人禍隂陽之報此豈可逃耶上又曰有政事則豈特人得其所鳥獸魚鱉亦咸若上曰堯舜之時鳯凰来儀亦不足怪熙寧六年十一月吏有不附新法介甫欲深罪之上不可介甫固爭之曰不然法不行上曰聞民間亦頗苦新法介甫曰祁寒暑雨小民猶有怨咨者豈足為慮耶上曰豈若并祁寒暑雨之怨亦無耶熙寧二年上曰朕每思祖宗百戰得天下今以九州生靈付一庸人嘗痛心疾首上事慈聖至誠極孝所以娱悦后無不至在宫中從后行必自扶掖視膳定省惟謹后嘗幸金明池豫為百寳船手持觴上夀上謙沖退讓去華務實終身不受尊號帝王之盛徳也熙寧三年上謂執政曰尊號於朕亦無加省雖加百字奚益元豐三年詔曰朕惟皇以道帝以徳王以業各因時制名用配其實朕承祖宗之緒居士民之上凡虛名繁禮悉以革去而近思羣辟猶或以稱號見請雖出於歸美報上之忠然非所以仰承先王之意自今每遇大禮罷上尊號元豐元年十一月宰臣吳珪等云功臣非古陛下即位上徽號至數十而方許臣等何功力例蒙恩數乞於即位中減罷詔如其請元豐四年五月有上書乞慎擇守令者上謂輔臣天下守令衆至千餘人其才難以徧知立法於此使象之於彼從之則為是背之則為非以此進退方有凖的所謂朝廷有政也如漢黄覇妄為條教以干名譽在所當治而反增秩賜金家自為俗先王之所必誅變風變雅詩人所刺朝廷為一好惡定國是守令雖衆沙汰數年自當得人也五年二月上曰刺史縣令治民為最近漢自刺史有入三公者蓋重其任耳今之藩郡不過數十姓多不得人縣令可知也自今便宜慎擇元豐五年五月上謂輔臣曰雖周之盛時亦以為才難惟能以道汎觀不拘流品隨材任使則取人之路廣茍不稱職便可黜退不可謂已與之官䘵反以繫吝而難於用法如臣下有勞朝廷見之雖有過失亦當寛貸如吳居厚使京東治財數百萬設有失䧟官錢二三千緡其功自可除過故律有議勞議賢之法亦周之八柄武王之遺意然也有司議罪自當守誅宥則繫主斷如此則用人之道勿難矣一日宰執對畢樞宻退富彦國召留之因奏臣前蒙宣諭當君臣相體悉心盡節無嫌疑形迹隠避臣以為此誠堯舜盛徳然獨臣蒙此宣諭臣以為中書樞宻臣寮皆宜知陛下聖意如此上曰每如此宣諭諸人弼又奏大臣惟和乃能成事若懐私意則相諉而廢事上曰朕夙夜焦勞正期大臣堅白一心共成國家之務執政須是不執已見務求當而已朝廷事君捨却義理何所考據弼曰今大臣各有藴蓄豈不願盡心以事陛下但其間或恐上忤聖意或恐為小人所攻或以事大難行惟是彼此一心則事無不濟臣衰老不才然蒙陛下見遇殊異有所見不敢避忤㫖理須極言上曰相公言及此能用心如此則天下不勝幸甚朕無適莫惟義理所在與大臣共之耳弼又曰陛下臨御以来内則講求典禮繼一制度興利剔弊總核庻獄外則團結兵將討伐違命開拓疆境經制邊用凡所措置悉皆聖慮一有奏禀皆出宸斷上曰朕觀三代以至唐未有百年之間無患難者國家承祖宗之業升平如此朕嗣守大器日夜恐懼以思為治之道無如擇人又曰難得人唐三百年中惟一郭子儀朕觀其人本應武舉因誦杜牧詩云未知終始郭汾陽嗟歎久之元豐中輔臣論及人才上曰人才固有大小若古之立功名者管仲之於齊商鞅之於秦吴起之於楚皆使政令必行若於道則未也傅說之於商周公之於周可謂尚道徳而兼功名者也人臣但能言道徳而不以功名之實亦無補於世事諫官楊繪言向傅範后族不當守鄆領安撫使彦博曰傅範屢典郡非縁外戚上曰得諫官如此敢言甚好可以多言妄求耶九月輔臣有言將帥宜制副佐者上曰人之忌能者衆今舉所知不過取其出已下者非有至誠惻怛之心為朝廷立事也神宗英文烈武聖孝皇帝嘉祐八年五月始聽講於東宫天資好學尋繹訪問至日昃或侍言恐饑當食上曰聽講甚樂豈覺饑耶英宗以上讀書太多嘗議事茍見其有理何所不從但恐或有㣲詞諷㫖不肯盡言之耳曰臣等奏事言一不從或至再三陛下未嘗有不從者上曰惟先格王正厥事天地人變惟有正厥事乃所以應之也弼又進言今所進用或是小材刻薄之人恐須多進用醇厚敦實之人小材雖似可喜然害事壊風俗不可表章之慮犯奸邪故害事上曰大臣正要與天下圖治三相旣如此則參樞皆宜如此用心務相協和每事求義理所在朕與卿等終身共守於是皆拜以上熙寜奏對熙寧四年王荆公當國欲以朱東之監左藏庫東之辭曰左帑有大禁而年髙宿直非便欲除某人幹當進奏院忘其人名實願易之荆公許諾翌日於上前進某人監左藏庫上曰不用朱東之監左藏庫何也荆公震駭莫測其故上之機神臨下多知外事雖纎微莫可隱也熙寧十年王荆公初罷相以吏部尚書觀文殿學士知金陵薦呂惠卿為参政而去旣而呂得君怙權慮荆公復進因郊禮薦荆公為節度使平章事方進上察見其情遽問曰王安石去不以罪何故用赦復官呂無以對明年復召荆公秉政而王呂益相失矣神宗皇帝在東宫時極沖幼孫思恭為侍讀一日講孟子多助之至天下順之寡助之至親戚畔之思恭汎引古今助順之事而不及親戚畔之者上顧曰㣲子紂之諸父也抱祭器而入周非親戚畔之耶思恭釋然駭伏上之明睿可謂聞一知十矣事實類苑卷五

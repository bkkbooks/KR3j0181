body:
  text: 事實類苑卷六十一宋江少虞撰廣知博識北嶽北嶽恒山今謂之大茂山者是也半屬契丹以大茂山分脊為界嶽祠舊在山下石晉之後稍遷近裏今其地謂之神棚祠在曲陽祠北有望嶽亭新晴氣清則望見大茂祠中多唐人故碑殿前一亭中有李克用題名云太原河東節度使李克用親領步騎五十萬問罪幽陵回師自飛狐路却歸雁門今飛狐路在茂之西自銀冶寨北出倒馬闗度東界却自石門子冷水鋪入缾形梅回兩寨之間至代州今此路已不通惟北寨西出承天闗路可至河東然路極峭狹太平興國中車駕自太原移幸恒山乃由土門路至今有行宫海子園鎮陽池苑之盛冠於諸鎮乃王鎔時海子園也鎔甞館李正威於此亭館尚是舊物皆甚壯麗鎮人喜大言矜大其池謂之潭園盖不知昔甞謂之海子矣中山人常好與鎮人相雌雄中山城北園中亦有大池遂謂之海子以壓鎮之潭園余熙寧中奉使鎮定時薛師正為定帥乃與之同議展海子直抵西城中山王塚悉為稻田引新河水注之清波瀰漫數里頗類江鄉矣並筆談雨盤治鹽井陵州鹽井深五百餘尺皆石也上下甚寛廣獨中間稍狹謂之杖鼓腰舊自井底用栢木為幹上出井口自木幹垂綆而下方能至水井側設大車絞之嵗久井幹摧敗屢欲新之而井中陰氣襲人入者輒死無縁措手惟候有雨入井則陰氣隨雨而下稍可施工雨晴復止後有人以木盤滿中貯水盤底為小竅釃水一如雨㸃設於井上謂之雨盤令水下終日不絶如此數月井幹為之一新而陵井之利復舊筆談䂍槊宣獻宋公著鹵簿記云䂍槊不能得其始徧問諸儒無知者予後十餘年方始得其義故顔之推説云江左有瓝槊以首大如瓝故云字學唐末文籍亡故諸儒不知字學江南惟徐鉉徐鍇中朝郭恕先此三人信甚博也鍇為説文繫傳恕先作汗簡佩觿時蜀有林氏作小説然狹於徐郭太祖朝句中正亦頗留意予頃請刻篆楷二體九經於國學予友高敏之笑之二李陽冰深於篆隷而名作冰音凝故㕘政王公堯臣但讀陽冰予曰陽冰無義唯陽氷有不冶之語三周大臣王朴名朴平豆反而自謂樸案説文朴無樸音俗以朴為樸耳四唐𤣥宗改尚書古文作今字學者始不識古文予見秘閣學士校書有乩音稽字以墨㸃其處曰疑已上見文公筆記百藥枕益州有藥市期以七月七日四逺皆集其藥物多品甚備凡三服而罷好事者多亦為之淳化中有右正言崔邁任峽路轉運邁苦多病素有栢枕方合齊萬錢遍取藥百餘品各少許置栢枕中周環鑽穴以徹其氣卧數月得癩疾鬚眉盡落投江水死說者以為藥力薫發骨節間疾氣濕紙化為茵錢若水言壬午年洛中大水室廬多漂没太師之第屋木猶在者視書屋牀榻尚在無復卷冊悉化為茵熟視尚有墨痕文字若可識盖楮之變也並楊文公談苑疥有五徳世言疥有五徳不上面仁也善得於人義也令人兩手揩擦禮也生指隙骨間知也癢必以時信也予甞患此自十一嵗至於十九嵗方愈今六十有六復患知五徳為最詳故録之皂筴壊鐵猫壊鞭鐵碪以鍜金銀雖百十年不壊以椎皂筴則一夕破碎鞭以策馬愈久而愈潤澤堅勁以擊猫則隨節折裂矣並東齋記事葉縣石刻汝州葉縣大井涸忽有一石上刻四句云葉邑之陰汝潁之東兹有國寶永藏其中葉人大惑謂之神石置於縣祠中享禱日盛貪夫至有浚井掘田願求此國寶者累嵗不已忽一客因逰仙島觀北極殿有一礎為柱搘壓柱稜外鐫四句猶可見曰賦世永算享國巨庸子賢而嗣命考而終其客徐以廟中神石之句合之其韻頗協量之復長短無差白邑宰取其礎觀之乃唐開成中一中郎将墓誌爾安礎時欲取其方因裁去餘石棄井中後得之遂解惑焉湘山野録熊館山民云熊於山中行數十里悉有跧伏之所必在石巗枯木之間山民謂之熊館惟虎出百里外則迷失道路慎火木酉陽雜俎云廣州有慎火木三四圍慎火本草一名景天俗亦名䕶火多以盆缶植之置屋上其花紅白細錯如錦予甞兩至畨禺段成式所謂慎火乃降火木耳又名龍骨其餘葉枯慎火斷之有白汁著人肌膚遂成瘡痏亦無花盖不識者誤傳也並倦逰雜録末厥歐陽公記陶尚書詩語末厥兵不曉其義予謂今人呼秃尾狗為厥尾衣之短後者亦呼曰厥然則此兵正謂其末賤耳但今人不以末厥相連言之其義則是也不然亦不可以對卑凡字何樓世人語虛偽者為何樓似是沽濫之稱其實不然國初京師有何家樓其下賣物皆行濫者故人以此目之今樓已廢語又相傳俳優人言何市樂說者謂起石駙馬在京都其家樂甚詆誚南市中樂人故得此名其實不然唐元和燕吳行役記其中已有何市字大都市不隷名軍中在河中市者散樂名也音韻之學音韻之學自沈約為四聲及天竺梵學入中國其術漸宻觀古人諧聲有不可解者如玖字有字多與李字協用慶字正字多與章字平字協用如詩或羣或友以燕天子彼留之子貽我珮玖投我以木李報之以瓊玖終三十里十千維耦自今以始嵗其有君子有榖詒孫子在帝左右令聞不已膳夫左右無不能止魚麗于罶鰋鯉君子有酒㫖且有如此極多又如孝孫有慶萬夀無疆黍稷稻粱農夫之慶維其有章矣是以有慶矣則篤其慶載錫之光我田既臧農夫之慶萬舞洋洋孝孫有慶易西南得朋乃與類行東北喪朋乃終有慶積善之家必有餘慶積不善之家必有餘殃班固東都賦彰皇徳兮侔周成永延長􅀆膺天慶如此亦多今廣韻中慶一音卿然如詩之未見君子憂心怲怲既見君子庶㡬有臧誰秉國成卒勞百姓我王不寧覆怨其正亦是怲正與寧平協用不止慶而已恐别有理也筆談二豩字呼闗切頑也當在山字韻劉夢得有杯前膽不豩趙勰有吞船酒膽豩之句而禮部韻畧不收唐韻亦無何也漢皋詩話三今之姓胥姓雍者皆平聲春秋胥臣漢雍齒唐雍陶皆是也蜀中作上聲去聲呼之盖蜀人率以平為去出筆談瓉今人謂事之陳久為瓉本縁五代時有馬瓉者為使幕官其人魯戅有所聞見他人已厭熟而瓚覺以為新奇而道之故時人見陳乆者輒號為瓉云宋景文公筆談老杜詩杜子美和裴迪早梅詩有還如何遜在揚州之句注云梁史何遜𫝊不見揚州事盖遜早梅詩云兔園標物序驚時最是梅銜霜當路發應雪擬寒開枝横却月觀花遶凌風臺應知早飄落故逐上春来漢皋詩話二老杜云長鑱長鑱白木柄我生託子以為命黄獨無苗山雪盛短衣數挽不揜脛往時儒者不解黄獨是何義改為黄精學者承之以予攷之盖黄獨是也本草赭魁注黄獨肉白皮黄巴漢人蒸食之江東謂之土芋余求之江西謂之土卵煮食之類芋魁云三往年有人於洞庭湖中得一石刻一詩云蛟室圍靑草龍堆隠白沙䕶江蟠古木迎棹舞神鴉破浪南風正收㠶畏日斜雲山千萬疊底處上仙槎或持問諸作者云此老杜詩也近有管城士大夫家藏本題唐杜東美一卷皆子美詩其中一首云聞恵二過東溪因詩以送恵子白駒瘦歸溪惟病身皇天無老眼空谷滯斯人崖蜜松花熟山杯竹葉春柴門了無事黄綺未稱臣今子美集中所無而用字亦多不同如故園楊栁今揺落何事愁中曲盡生作却盡生意味逺矣邵謁詩余亡友李秉􅃔徳叟甞謂余曰家藏唐邵謁詩八十篇甚工謁選於吏部中榜此詩曰有能過此者當先注官衆無間言如李太白云今人不見古時月今月曽經照古人世以為工矣謁詩云不知天上月曽照㡬多人造語尤更省力今欲借傳因循不果此事不載於唐書野史小説中皆未甞見之唐文藝傳中有邵説無邵謁也李希聲詩話僧贊寧僧錄贊寧有文學洞古博物著書數百卷王元之禹偁徐騎省鉉疑則就質焉二公皆拜之栁仲塗開因曰余頃守維陽郡堂後菜圃纔雨隂則清燄夕起觸近則散何耶寧曰此粦力振切火也兵戰血或牛羊馬血著地則凝結遂為此氣雖千載不散栁遽拜之曰掘之皆斷鎗折鏃乃古戰地也因贈以詩中有空門今日見張華之句二江南徐知諤為潤州節度使温之少子也美姿度喜畜奇玩蠻商得一鳯頭乃飛禽之枯骨也綵翠奪目朱冠紺毛金嘴如生正類大雄雞廣五寸其腦平正可為枕諤償錢五十萬又得畫牛一幅晝嚙草欄外夜歸卧欄中知諤獻後主煜煜持貢闕下太宗張後苑以示羣臣俱無知者惟僧錄贊寧曰南倭烏和反海水或減則灘磧微露倭人拾方諸蚌脂中有餘淚數滴者得之和色著物則晝隠而夜顯沃焦山或風撓飄擊忽有石落海㟁得之滴水磨色染物則晝顯而夜晦諸學士皆以為無稽寧曰見張騫海外異記後杜鎬撿三館書目果見於六朝舊本書中載之並湘山野録三徐常侍鉉江南日甞直澄心堂毎襆被入直至飛虹橋馬輒不進裂鞍斷轡箠之流血掣繮却立鉉遺書於餘杭沙門贊寧答曰下必有海馬骨水火俱不能毁唯漚以腐糟隨毁者於是鉉斸之去土丈餘果得巨獸骨脛而上長五尺膝而下長三尺腦骨石斷柱積薪焚三日不動以腐糟纔漚之遂爛焉楊文公談苑熊萬卷餘杭熊萬卷者浮圖之真儒介然持古人風節有奥著典類一百二十卷天禧中秘閣求書王冀公欽若特請附焉冀公尤所禮重其居延慶寺在大慈塢時儒皆抱經授業師居甞喜閱唐韻諸生甞竊笑一日出題於法堂曰楓為琥珀賦其韻曰脂入於地千載成琥珀諸生皆不諭因請之不說凡月餘撿經史殆百家㑹聚小說俱無見者閣筆以聽教師曰聞諸君笑老僧酷嗜唐韻兹事止在東字韻第三板請詳閱諸生撿之果載楓字注中云黄帝欲殺蚩尤棄其桎梏變為楓木脂入地中千年化為琥珀始敬此書又有云松液入地為琥珀者唐李嶠詠琥珀詩有曽為老茯苓本是寒松液蚊蚋滿其中千年猶可覿之句未知孰是余頃見琥珀中蚊蚋數枚凝結在内信嶠詩不誣湘山野録錢昱錢昱獻王長子也讀書强記在故國與贊寧僧録迭舉竹數束得一事抽一條昱得百餘條寧倍之昱著竹譜三卷寧著笋譜十卷昱輕便美秀太祖受禪伯父俶遣持貢入閣賜後苑宴射時江南使者已先中的令昱解之應弦而中賜玉帶旌賞之歸朝願以刺史求試乞換臺閣送學士院試制誥三篇格在優等改秘書監尤善吏牘太宗取閱深愛之謂左右曰諸錢筆札多學浙僧亞栖書體格浮軟其失乃俗獨此兒不類以御書金花扇及行草急就章賜之後南郊當増秩上曰丞郎應星象昱王孫也操撿無守不宜應之授郢團盖惜名器也杜文正長安一巨塚壊得古銅鼎狀方而闕是古文十六字人莫知曉命句中正辨其篆曰此禹迹文也其詞曰岐豐錫公秦之幽宫鼎藏於中命杜鎬攷其事曰武王克殷都於豐鎬以雍州為王畿及平王東遷洛邑以岐豐之地賜秦哀公墓中正有字學篆隷行草盡精與徐鉉校定說文闕楊文舉吳楊文舉撰雍熙廣韻遂直館太祖神主藏太室西壁及篆字寶遂賜金紫益州華陽人也陶尚書乾徳三年再郊范魯公質為大禮使以鹵簿青油隊舊有甲騎盡取於武庫磨鑄堅厚精明可畏謂於禮容有所不順陶榖尚書為禮儀使出意繪之以青緑畫黄絁為甲紋青布裹之縁青絁為下裙絳皮為絡長短至膝如珂紋銅鈴逸前膺及後鞦至今用焉榖本姓唐避晉祖諱易之明博該敏尤工厯象時為普軍勢方熾謂所親曰五星數夜連珠於西南已累累大明吾輩無怪兵革之憂有真主已在漢地觀敵帳騰蛇氣纒之其主必不歸國未㡬徳光薨於漢又孛東起芒侵於北谷曰邉患不乆當息太平可望矣後皆盡然竇仁惠公竇禹鈞生五子儀儼侃偁僖相繼登科馮瀛王贈禹鈞詩有靈椿一枝老丹桂五株芳時號五龍昆仲材業儀儼尤著儀為禮部侍郎太祖欲相之趙韓王自以寡學忌儀該博極引薛居正㕘大政以塞之弟儼素藴六學為周世宗所重判太常寺校管籥鐘鼓辨清濁上下之類分律吕還相為宫之法去京房清官一筦調之三年方合天律又善樂章九絃之阮七絃之琴十二絃之筝二十五絃之瑟三漏之籥八漏之篪十七筦之笙二十三筦之簫皆立譜調按通而合之器雖異而均和不差編於厯代樂章之後曰大周正樂譜樂官掌之依譜教習尤善推步星厯與盧多遜楊徽之同在諫垣預謂二公曰丁夘嵗五星當連珠於奎奎主文又在魯分自此天下始太平二拾遺必見之老夫不與也果至乾徳丁夘嵗五星連珠於奎太宗時鎮兖海致仕於家八十三終諡仁惠公玉壺清話二太祖欲改元謂宰相等曰今改年號須古來未有者時宰相以乾徳為請且言前代所無三年正月平蜀蜀宫人有入掖廷者太祖因開其奩具得鑑背字云乾徳四年鑄大驚曰安得四年所鑄乎出鑑以示宰相皆不能對乃召學士陶穀竇儀奏曰蜀少主曽有此號鑑必蜀中所鑄太祖大喜因歎曰作宰相須是讀書人自是大重儒臣矣劉貢父詩話胡秘監夏英公鎮襄陽遇大赦賜酺宴詔中有致仕髙年各賜束帛時胡秘監旦瞽廢在襄英公依詔㫖選精縑十疋贈之胡得縑以手捫之笑曰寄語舎人何寡聞至此奉還五疋請撿韓詩外傳及服䖍賈誼諸儒所解束帛戔戔賁于丘園之義自可見証英公撿之果見三代束帛束脩之制若束脩十脡之脯其寔一束也若束帛則卷其帛屈為二端五疋遂見十端表王者屈折於隠淪之道也夏亦少沮湘山野録二楊庶㡬孜言胡秘監旦退居襄陽鑱大硯以著漢春秋書成𦵏其硯毎大臣名士薨卒必作傳以記其善惡然世不傳庶㡬亦有所述春明退朝録韓溥韓溥長安人唐相休之裔孫博學善持論詳練臺閣故事多知唐朝氏族與人談亹亹可聽為近世肉譜王貽孫王貽孫字衆賢溥之子太祖甞問趙普拜禮何以男子跪婦人不跪徧問禮官無有知者貽孫曰古詩云長跪問故夫即婦人古亦跪也唐天后朝始拜而不跪普問何所出對曰太和中幽州從事張建章渤海國紀以溥藏書萬卷貽孫遍覽之劉吉劉吉䕶治京東河決時張去華任轉運使巡視河上方㑹食坐客數十人膾鯉為饌去華顧謂四座曰南人在水鄉多魚為食殊不厭其腥也意若輕鄙南士吉奮然對曰運使本進士狀元曽不讀書何自彰其寡學尚書禹决九州有魚鱉使民鮮食淮夷蠙珠暨魚易姤之九二包有魚又有庖犧氏以佃以漁盖取諸離周官􅈄人掌以時獻為梁辨魚物供王膳脩詩載嘉魚魚藻九罭之篇小雅云炰鱉膾鯉張仲孝友國風云豈其食魚必河之魴又曰誰能亨魚溉之釡鬵戴記云水潦降不獻魚鱉魚鱉不中殺不粥於市居山者不以魚鱉為禮三月天子乗舟薦鮪于寢廟孟秋天子食稻與食魚又食魚者去乙孔子魯人云魚餒不食趙盾晉人魚飱田文齊人其上客皆食有魚子産鄭人而人饋生魚子公亦鄭人染指於鼎公父文伯魯人羞鱉致客怒而出大舜漁於雷澤吕望釣於渭濱又何必皆南州之人况今大官之盛饌宗祀之備物皆薦是品而周旋販鬻閭閻啖食其濟民食廣矣何談之容易去華色沮不能酬其言楊文公談苑事實類苑卷六十一

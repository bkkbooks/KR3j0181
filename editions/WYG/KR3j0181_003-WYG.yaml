body:
  text: 事實類苑卷三宋江少虞撰祖宗聖訓真宗龍圗閣直學士陳彭年因次對論儒術汚隆君臣難易之要上曰朕毎念太祖太宗丕變衰俗崇尚斯文垂世教人實有深㫖朕謹遵聖訓紹繼前烈庶警學者人君之所難在於聽受人臣之不易在於忠直其或君以寛大接下臣以誠明奉上君臣之心皆歸於正上下之際靡失厥中直道而行至公而遇此天下之逹理先王之闕猶指諸掌孰曰難哉因作二論示之出守突右正言知制誥朱巽上言朝廷命令不宜屡改自今應陳述利害更張法制請委官司議其可否如經乆可行者行之不可者止之真宗謂羣臣曰命令屡改甚失治體卿等識之且事有可否執政者所宜盡心無有隠也三朝聖政録石熈正知寧州上言昨靖逺軍失守盖朝廷素不留意因調兵三五萬太宗曰西邊事吾未嘗敢忘之石熈乃敢如此不遜必罪之上曰羣臣敢言者亦甚難得其言可用則用之不可用置之若必加罪後復誰敢有言者因賜詔書褒嘉焉秦國長公主嘗為子莊宅使世隆求正刺史真宗曰正刺史繫朝廷公議不可魯國長公主為翰林醫官使趙自化求尚食使兼醫官院事上謂王繼英曰雍王元份亦為自化求遥郡朕以遥郡非醫官所領此固不可也駙馬都尉石保吉自求見上言僕夫盗財乞特加重罪上曰有司自有常法豈肯以卿故亂天下法耶又請於私第决罰亦不許真宗即位每旦御前殿中書樞宻院三司開封府審刑院及請對官以次奏事辰後入宫上食少時出坐後殿閱武事至日中罷夜則召侍講侍讀學士詢問政事或至夜分還宫其後率以為常真宗初即位以工部侍郎郭贄知天雄軍贄自陳戀闕泣下不肯去真宗曰全魏重地委任於卿亦非䡖也宜去贄退召輔臣問之輔臣對以近例亦有已受命而復留者曰朕初嗣位命贄知大藩而不行則何以使人卒遣之羣臣皆畏服見國朝事實五年講春秋畢邢昺曰春秋一經少有人聽多或中輟帝曰勤學有益最勝他事且深資政理無如經書朕聴政之暇惟文史是樂講論文藝以日繫時寧有倦耶十月召近臣觀書龍圗閣帝曰朕自幼至今讀經典其間有聽過數四在東宫時惟以聚書為急其間亡佚者多方捜求頗有所得今已類成正本除三舘秘閣外又於後苑龍圗閣各有一本但恨校對未精如青宫要紀繼體治民論此一書二名並列篇目盖收書之初務於數多不嫌複無謂也景徳四年三月召近臣觀書玉宸殿即帝偃息之所茵幃皆絹為之無文綵之飾聚書八千餘卷天禧四年二月詔太子中允直龍圗閣馮元講易於宣和門之北閣待制預焉自是聽政之暇遂以為常三年九月召宰相樞宻兩制及東宫僚屬於清景殿觀書帝以青宫要紀事有未備因博采羣書廣為承華要略十卷毎篇以賜皇太子至是書成故召近臣咸聚觀焉時帝雖政務繁劇亦中夕披閱條其舛誤纎毫窮究諸儒疲於應對為文務求温雅製述尤多外書奏歌謡無不重複省覧暑月或衣單絺流汗浹體而詳覧不輟文史政事之外無他玩好帝讀經史摭其可以為後世法者著正就五十篇其後仁宗御經筵命侍臣日讀一篇已上見帝學景徳元年十二月契丹使韓祖奉書於行宫請息兵納和與曹利用偕来初議求關南地真宗曰為民屈已誠所不辭但關南地極無名朕守祖宗基業不敢失墜必若固求當决一戰所念河南重擾倘歳以金帛濟其不足於體無傷利用言國母一車别無供帳親與利用飲食軛上横板布食器主及其臣重行而坐語云私語左右曰爾見北塞兵否勁卒利器與前聞不同臣熟察之倘求割地必請㑹即蕩平及通好二年十一月癸酉國母國主各遣使来賀承天節致御衣十二襲皆裘細繡刻絲透背紗縠貯以金玉水晶鞍勒馬八散馬四百弓矢鑌鐵刀鷹鵲粆腊契丹新罷酒青白鹽果實百品貯以練􅃭器使人以戎禮見賜氊冠窄袍金鞾初時見李宗鶚引令式不許佩刀玉至上閣門欣然解之上曰戎人佩刀是其常禮傳詔許其自便副使劉經曰聖上推心置人腹中足以示信遐邇也真宗覽兩浙提㸃刑獄皇甫選獄空奏因謂近臣曰聞選務欲所部獄空常戒諸州毋得濫受詞訟夫禁止告辨則人之曲直邪正無以辨明當諭轉運使飭止之因道諸非法栲訊恐致非辜近覧其獄尚復逾越當申明前詔戒之已上見三朝訓鍳真宗好文雅以文辭取士然必視其器識每御崇政殿賜進士及第必召其高第三四人並列於廷更察其形神俊朗者始賜第一人及第或取其所試文詞有理趣者孫奭鑄鼎象物賦云足為下正詎聞公餗之欹傾鉉乃上居實取王臣之威重遂以為第一蔡齊欹器賦云安天下於覆盂其功可大遂以為第一出廬陵歸田録真宗喜談經一日命馮元談易經筵之常講也謂元曰朕不欲煩近侍久立欲於齋亭閣選純學之士三四人止如同人便裘頂帽横經並坐暇則薦茗果盡已論削去進說之儀遇疲則罷元薦查道李虛巳李行簡三人入奏曰道欽州人母病常思鱖魚羮方冬無魚黙禱河神於水中得鱖魚一尺者以歸虛巳母䘮明醫者曰須以舌䑛勿藥自痊虛已䑛睛二年遂明行簡父患癰嘗吮其敗膏不唾於地父疾遂平元薦倍侍真宗喜曰朕得人矣玉壺清話上嘗謂近臣曰朕樂聞朝臣讜議近羣僚奏章多自是陳等績過行國家政事自有大體使期不嚴闕豈可慘虐剋剝邀為已功使之臨民徒傷和氣此軰真酷吏也上嘗謂近臣曰朕聼政之外未嘗虚度時日探討簡編素所耽玩古聖賢奥㫖有未曉處不免廢忘昨置侍讀侍講學士自今令秘閣官每夕具名奏聞朕欲召見得以訪問其後每當直或召對多至二三鼓方退上嘗謂王旦等曰經史之文有國家之龜鑑保邦治民之要盡在是矣然三代之後典章文物制度聲名參今古而適時用莫若史漢學者可不盡心焉旦曰孔子於衰周歴聘諸國退而刪詩書定禮樂以五常之道垂萬世法後之王者雖上聖必師範之古人云生民以来未有如夫子者盖以此也如云志在春秋者誠欲以褒貶極筆於終古誅賞之法使亂臣賊子觀而知懼兹立教之深㫖為國家之大要自司馬遷為一家之書盖知春秋凡例不可記故曰紀曰書曰世家曰列𫝊勸懲之微㫖在焉班固而下不出其意但謂詞采而已上曰夫子之道不可斯須而舎迂儒或言堯舜之時無夫子亦治此淺説之甚殊不知夫子之道堯舜之道也故曰祖述堯舜憲章文武又曰惟天為大惟堯則之其推尊而宗奉彌至所謂夫子之道與堯舜無異也上嘗謂侍臣曰古人多言禱神可以延福未必如此能行好事神必福之如禮記世子篇注云文王以憂勤損夀武王以快樂延年其聖經之㫖必不如此盖注皆不思之甚也文王焦思勞神以憂天下豈得減夀耶夏禹焦勞有錫圭之瑞而享國永年大約帝王能憂人之憂不自暇逸豈無感應鄭康成注此頗不近理安足為之鑒戒朕常與邢昺論之昺不能對已上出事實咸平初修太宗實録命錢若水主其事若水舉給事中柴成務起居舎人李宗諤侍御史宗度洎予及職方員外郎吴淑上指宗諤曰自太平興國八年已後皆昉在中書日事史策本憑直筆倘子為父隐何以𫝊信於後代乎除宗諤不許餘悉可之楊文公談苑太宗善草𨽻行八分篆飛白六體皆極其妙草書尤竒絶今上悉各求編次凡三十餘卷于闐玉水晶檀香為軸素紫綾標文錦條黄絹帕金漆櫃作圗閣於含元殿之西南隅以藏之頻召近臣觀覽稱歎上自作太宗聖文神筆頌親書刻碑以美其事碑隂列其部秩名題以墨本賜近臣焉楊文公談苑祥符中諸王有以翰林使醫有效乞除遥郡真宗曰醫工為郡非治朝美事厚賜之可也仍令宰臣面諭此意真宗一日晚坐承明殿召學士對既退中人就宣諭曰朕適忘御袍帶卿無訝焉學士將降謝中人止之曰上深自愧責有㫖放謝真宗禮遇詞臣厚矣出澠水燕談真宗嘗諭宰相闕補郎官稱其行甚美俟罷郡来朝與除監司及還帝還詰及之執政擬奏將以次日上之晚歸里第其父来謁明日乃以名薦上黙然不許退察所以乃知已為伺察者宻報矣終真宗之世其人不復進用真宗之惡奔競如此真宗詔諸儒編君臣事迹一千卷曰冊府元龜不欲以后妃婦人等厠其間别有纂彤管懿範七十卷又命陳文信公裒歴代帝王文章為宸章集二十五卷真宗時京師民家子有與人鬪者其母追而呼之不從母顛躓而死㑹闕决法官處其罪當笞上曰母言不從犯教令當徒二年何言笞也羣臣無不驚服涑水紀聞真宗嘗謂李宗諤曰聞卿能敦睦宗族不隕家聲朕今保守祖宗基業亦猶卿之治家也咸平三年大理寺上言曰本寺案牘未决者常幾百事言近日踰月並無公案漢文决死刑四百闕唐太宗决下罪三百死闕之以刑措今以四海之廣而刑奏不聞動輙踰月是以知民識禮義而不死於有司也請載之史筆景徳初契丹冦澶車駕議幸是時曺武公瑋及秦翰為澶駐泊詔許便宜軍馬事不由申覆二將議曰戎輅不過河則已敵騎萬一度橋奈澶州素不設備遂督士卒深濶渠以遶城旋開旋闕以枯蒿襍草覆渠面使敵不測其深淺駕至澶臣僚乞駐蹕澶南寇凖固請過河以取威髙殿前瓊力挽鑾駕以進揚其聲曰儒人之言多二三願陛下莫遲疑不渡河無以安六軍之心御駕方渡橋時士卒不山呼左右頗異之瓊曰乞急張黄屋使逺近認之既張繖果齊聲呼萬嵗士氣歡振是時車駕次澶北匃奴毳帳前一黒星隕若沉石其聲鳴吼移刻始盡此最為澶淵之先吉也皇弟雍王元份留守東京暴中風眩急詔王文正旦代司留守出湘山野録真宗西祀回召臣寮赴後苑宣示太清樓聚書記朝拜諸陵自幸西京記西京内東門彈丸壁記皆御筆書也笑謂近臣曰雖不至精優盡是朕親撰不假手於人此語盖指在楊大年也歸田録述之湘山野録真宗嘗面諭宰臣以河東之役兵力十倍謂當一舉克捷良由上黨發兵之時左右有聞之者賊聞此語知神兵自戢堅守不即下至煩再舉東軒筆録真宗聴政之暇惟務觀書每觀畢即有篇詠使近臣從之和故有御製看尚書三章看春秋三章㸔周易三章㸔禮記三章看孝經三章後有御製讀宋書闕首讀闕書二首讀後魏書三首讀北齊書二首讀後周書三首讀隋書二首讀唐書三首讀五代梁史二首讀五代後唐史二首讀五代晉史二首讀五代漢史二首讀五代周史三首可謂近時好學之主也青緗襍記真宗幸崇文院閱新編君臣事迹門楊億修撰條例真宗曰著書難事非精敏詳實後無取信億曰史臣記事誠合備書然事有依據可載簡冊者方得紀録修書景徳二年詔國子監直講孔奭龍圗閣待制杜鎬等同校定莊子鎬等以莊子序非郭象之文因刪去真宗嘗出序文謂宰相曰觀其文理可尚但𫝊寫訛舛耳乃命翰林學士李宗諤楊億直學士陳彭年龍圗閣待制等别加讐校冠篇首直史舘陳靖言吉州陸􅈌被疾狂噪迭相論訴不可治民望寘諸文館以鉛槧供職真宗曰國家文舘以待天下賢俊豈養疾之所耶陳靖妄有陳述當謹戒之見蓬山志景徳四年朝陵次鞏縣監軍康繼彬獻洛鯉三十尾上曰朕見其生不忍食之又玉宸殿養魚垂釣得亟令放之顧左右曰萬類一死無再生不欲殺也右正言知制誥宋巽轉對言朝廷命令不可屡有改更自今應陳述利害改張法制者望先委有司詳議其經乆可行者行之不可行者止之庶張紀綱以絶分争上顧宰相曰此甚識體且事之可否執政之地所宜盡言無隠惟貴君臣道合若上下同心何憂不治今四方無虞頼卿等慎守經制若一事遽行則攀援徼訐詞說競起處置頗難是命令所施不可不慎至若言事利病䡖為釐革初則皆以為當後則翻成有害及復正其事乃是朝令夕改此事尤當執守書云慎乃出令令出惟行此之謂也上又曰涖官之人不可太寛致成弛慢亦不可過求人之罪務於煩擾王旦曰古人有法出而弊作令下而奸生寛則民慢䧟法者多極則民殘無所措手足正謂此也上深然之已上見事實事實類苑卷三

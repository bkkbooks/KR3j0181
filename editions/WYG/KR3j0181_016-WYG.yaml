body:
  text: 事實類苑卷十六宋江少虞撰顧問奏對盛文肅景祐中王沂公曽吕許公夷簡為相宋綬盛度蔡齊為㕘知政事沂公素喜蔡文忠吕公喜宋公垂惟盛文肅不得志於二公晚年王吕相失交章乞退一日盛文肅致齊於中書仁宗召問曰王曾吕夷簡乞出甚堅其意安在文肅對曰二人腹心之事臣亦不能知但陛下各詢以誰可為代者即其情可察矣仁宗果以此問沂公公以文忠薦一日又問許公公以公垂薦仁宗察其朋黨於是四人者俱罷政事而文肅獨留焉廬陵歸田録孫籍真宗東封還羣臣獻歌頌稱贊功徳者相繼惟進士孫籍獻書言封禪帝王之盛事然願陛下慎於盈盛不可遂自滿假上善其言即詔試中書賜同進士出身趙韓王趙普嘗奏太祖與某人為官太祖不用普明日復以其人奏太祖亦不用普又以其人奏太祖怒即碎其奏紙擲於地普顔色不動乃跪地拾之歸他日取所裂奏劄用糊粘綴復以奏太祖乃悟卒用其人二太祖時嘗以羣臣立功當遷官上素嫌其人不與趙普堅以為請上怒曰朕固不為遷官將若何普曰刑以懲惡賞以酬功古今之通道也且刑賞者天下之刑賞非陛下之刑賞也豈得以喜怒專之上怒甚起趙普亦隨之上入宫普立於宫門久之不去上悟乃可其奏竇偁竇偁字日彰與賈琰同事太宗府中琰性便佞太宗嘗與諸王府射琰侍側稱贊徳美而多矯誕偁叱之曰賈氏子巧言令色豈不愧我心哉坐中失色太宗亦為之不樂因罷㑹太宗出偁涇州後為㕘知政事太宗謂卿何以至此曰陛下以藩邸舊恩至此太宗曰卿嘗面折賈琰之直耳范蜀公蒙求畢士安咸平二年十月詔選官校勘三國志晉書唐書或有言兩晉事多鄙惡不可流行者真宗以語宰相畢士安曰惡以誡世善以勸後善惡之事春秋備載帝然之故命刋刻蓬山志忠言讜論李懐忠太祖幸西京將徙都羣臣多不欲留時有節度使李懐忠乘間諫曰東京有汴渠之漕坐致江淮之粟四五千萬以贍百萬之軍陛下居此將安取之且府庫重兵皆在東京陛下誰與居此乎上乃還三朝聖録王元之太祖時王禹偁上言請明數繼遷罪狀募諸部殺之真宗即位詔羣臣論事禹偁上疏陳五事一曰謹防邊通盟好因嗣統之慶赦繼遷復與夏彼必感恩内附且使天下知屈已而為人也二曰減冗兵併冗吏使山澤之饒稍流於下開寶前諸國未平而賦足兵威強由所蓄之兵銳而不闕所用之將專而不疑設官至簡而事皆舉興國後増官太冗皆不如制三曰難選舉使入官不濫先朝登第僅萬人乃紀以舊制還舉塲於有司吏部銓擇官非帝王躬親之事宜依格勅注擬四曰澄僧尼疲民無耗罷度人修寺一二十載容自銷鑠亦救弊之一端五曰親大臣逺小人懐忠蹇諤之士知進而不疑奸憸傾巧之徒知退而有懼其後潘羅支射死繼遷平夏欵附卒如禹偁䇿而嵗限度僧尼之數及病囚繫輕得養治於家至今行之二王禹偁為諫官上禦邉十䇿大㫖以為外任人内修徳則可以彌之外則合兵勢以重將權罷小臣詗邏邊事行問諜以離其心遣保御卿率所部以張犄角下詔感勵邊人取燕薊舊疆盖弔晉遺民非貪其土地内則省官以寛經費抑文士激武夫信用大臣以資其謀不貴虛名以戒無益禁游惰以厚民力端拱久旱禹偁上疏請節用省役薄賦緩刑並涑水紀聞楊蟫時辟楊蟫為益倅奏名上太宗不識蟫音尋字亟召問立名之因奏曰先臣命之不知其由兄蚡弟蛻盡從虫臣家漢太尉震之後今已孤不敢輙更上曰蟫有何義奏曰臣聞出羽陵蠧書曰白魚蟲也上嘆曰古人名字不以日月山川隱疾尚恐稱呼有妨今以細碎㣲例名其子未知所謂也以御筆特去虫上賜名覃覃弟蛻之女妻夏英公閫範嚴酷聞於掖廷因率命婦朝後宫莊獻后苛責之方少戢玉壺清話趙元老元豐中高麗使朴寅亮至明州象山尉張中以詩送之寅亮答詩序有花而艷吹媿鄰婦青唇之動桑間陋曲續郢人白雪之音之語有司劾中小官不當外交夷使奏上神宗顧問左右青唇何事皆不能對乃問趙元老元老奏不經之語不敢以聞神宗再三諭之元老誦太平廣記云有覩隣夫見婦吹火贈詩曰吹火朱唇動添薪玉腕斜遥看烟裡面大似霧中花其妻告其夫曰君豈不能學也夫曰君當吹火吾亦效之夫乃為詩曰吹火青唇動添薪黒腕斜遙看烟裡面恰似鳩盤茶元老之強記雖怪僻小說無不該覽范文正慶厯中議弛茶鹽之禁及減商稅范文正以為不可茶鹽商稅之入但分減商賈之利耳行於商賈未甚有害也今國用未減嵗入不可闕既不取之於山澤及商賈須取之於農以其害農孰若取之於商賈今為計莫若先省國用國用有餘當先寛賦役然後及商賈今為計所當先也其議遂寢以上出筆談二范文正仲淹為右司諫章獻太后聴政忽遣一巨璫諭之曰今後凡有大號令不須強抝三五年為一宰相不難致公覺其言甘必有所謂果誕告冬至日大㑹前殿仁宗率羣臣為壽有司將期公上疏曰臣聞王者尊極儀法配天故齒輅馬踐廄芻尚皆有誅况屈萬乘之重垂冕旒行北面之禮乎此乃開後世弱人主以強母后之漸耳陛下果欲為之太后賀於閨掖以家人承顔之禮行之可也抑又慈慶之容御軒陛使百官瞻奉於禮不順事遂已又獨銜乞皇太后還政疏曰陛下擁扶聖躬聴㫁大政日月持久今上皇帝春秋已盛睿哲明發握乾綱而歸坤紐非黄裳之吉象也豈若保慶壽於長樂卷收大權還之真主以享天下之養云疏入不報湘山野録龎莊敏狄武襄既平儂智高仁宗欲以為樞宻使平章事龎莊敏公曰太祖遣曹彬平江南止賜錢三十萬其慎重名器如此今青功不迨曹彬逺矣若用為平章事富貴已極後肯為陛下用耶萬一復有寇盜青更立功陛下以何官賞之乃以青為䕶國軍節度諸子皆遷官厚賜金帛吕文靖初真宗上仙莊獻攀慕深切凡喪祭之禮務極崇厚吕文靖奏曰太后為先帝喪紀之數宗廟之儀不忍裁減曲盡尊奉此雖至孝之道以臣所見尚未足報先帝恩遇之厚惟是逺奸邪奬忠直愛惜民財㧞擢時彦使邊鄙寧靜人物常安皇帝徳業日茂太后壽樂無憂此報先帝之大節也二祥符中玉清昭應等宫成大臣率兼使領天聖中玉清宫災莊獻泣曰先帝遵道奉天故大建珍館以盡祗肅之道今忽焚燬何以稱先帝遺意吕文靖恐后復議繕完因推洪範灾異之端特請罷營建遂懇讓使名玉清遂不葺司馬温公嘉祐中内臣凌允言死以其常有軍功勅給鹵簿司馬温公言古不以名器假人允言近習之人非有大勲大功而贈以一品給以鹵簿不可為法仁宗嘉納之二仁宗朝司天奏月朔日當食而隂雲不見事同不食故事當賀司馬温公曰日食四方皆見而京師獨不見天意若曰人君為隂邪所蔽天下皆知而朝廷獨不知其為災尤甚不當賀詔嘉納其言後以為例賈先生臨淄賈岡公竦先生以著書扶道為己任著山東野錄七篇頗類孟子嘗奏諫書四篇謂丁謂造作符瑞以誣皇天欺先帝今幸謂奸發請明告天下白其事使後世無譏焉又謂謂既竄逐寇萊公猶在雷州請還萊公以明忠邪先生終以孤直不偶既晚得進士出身亦不樂為吏久之李文定公竊其告勅送吏部先生勉就之官至殿中丞卒後門人李冠元伯劉顔子望相與諡曰存道先生初先生得出身真宗賜名同改字希徳云夏文莊夏竦薨仁宗賜諡曰文正公劉原父判考功上疏曰諡者有司之事且竦行不應法今百司各得守其職而陛下侵臣官疏三上是時司馬温公知禮院上書曰諡之美者極於文正竦何人可以當此書再上遂改賜諡文獻知制誥王原叔曰此僖祖皇帝諡也封還其目不為草辭於是太常更諡竦曰文莊趙禹景祐中趙元昊尚修職貢萊州進士趙禹庶明上書言元昊必反請治兵為邊備宰相以為狂言流禹建州明年元昊果反禹逃歸京師上言自理宰相益怒下禹開封獄是時陳希亮為司録言禹可賞不可罪宰相不從希亮爭不已卒從希亮言以禹為徐州推官徂徠先生石守道有詩曰萊牧男兒忽議兵謂禹也孫冕咸平中孫冕言乞放江淮荆湖通商賈鹽許商人於邊入闕糧草或京師納錢帛一年之内國家預得江淮荆湖三路賣鹽課范蜀公范内翰景仁以宏才碩學時所推仰始立朝或不以鯁直許之仁廟春秋高少陽虛位首拜䟽乞擇宗室親賢為皇嗣熙寧初將推行新法獨不肯阿比附議知不可爭即告老歸第天下士大夫始知仁者必有勇也倦遊雜錄陳晉公尚書左丞陳公恕峭直性靡阿順總領計司多歴年所每便坐奏事太宗皇帝或未深察必形誚讓公歛板踧踖退至殿壁負牆而立若無所容俟上意稍解復進慤執前奏終不改易或至三四上察其忠亮多從其議故當時言稱職者公為之首沂公筆錄王昭明韓魏公嘗稱内侍王昭明絶不類内官徃年執政賈昌朝陳執中惡歐陽公欲因張氏深治之令蘇安鞫獄不成蘇云不如鍛鍊成就乞不錄問昭明為監勘官正色曰上令某為監勘正欲盡公道鍛鍊何等語也歐陽遂清脫魏王别錄余襄慶厯中開寶寺塔災國家遣人鑿塔基得舊瘞舍利迎入内庭送還本寺令士庶瞻禮闕言在内庭頗有光怪將復建塔余襄曰彼塔不能自衛何福可及於民凡腐草皆有光水精與珠之圓者夜亦有光烏用異也梁武帝造數千塔舍利嘗有光臺城之敗何能致福其塔乞更不營造仁宗從之二乾道中天下蝗旱范文正公安撫江淮回以太平州貧民所食烏昧草進呈乞宣示六宫戚里抑奢侈澠水燕談李宗諤咸平初脩太宗實録命錢若水主其事若水舉給事中柴成務起居舍人李宗諤侍御史宗度洎予及職方員外郎呉淑上指宗諤曰自太平興國八年已後此時在中書日事史䇿本憑直筆儻子為父隱何以傳信於後代乎除宗諤不許餘悉可之楊文公談苑王沂公真宗初上仙丁晉公王沂公同在中書沂公獨入劄子乞於山陵已前一切内降文字中外並不得施行又乞今後乞兩府行下文字中書候宰相㕘政密院樞密副使簽書方可許中外承受兩宫可其奏晉公聞之愕然自失由是深憚沂公矣二真宗晏駕二府同受遺詔輔立仁宗及皇太后權聴㫁軍國事宰相丁謂欲去權字王沂公時㕘大政獨執之曰皇帝沖年太后臨朝斯非國家常典稱權猶足示後况言猶在耳何可改也謂雖深憾其言然權字遂不敢去魏王别録張乖崖忠定公後自金陵入苦腦疽未陛見御史閣門累有奏上寛其告俾養疾公恨不得面陳所懐乃抗論近年以來虛國家帑藏竭生民膏血以奉無用之土木者皆丁謂王欽若啟上之侈心也不誅死無以謝天下章三上不報出知陳州澠水燕談薛簡肅明肅太后從謁太祖詔禮官草儀時學臣闕周官后服進議闕佞者密請曰陛下垂簾聴大政號兩宫尊稱山呼及輿御皆王者制度入太室豈當以后服見祖宗耶遂下詔服衮冕諫疏交上後宰相執議俱不聴之不得已將誕告類薛簡肅公以闗右人語氣明直不文其談簾外口奏曰陛下大謁之日還作漢兒拜耶女兒拜耶明肅無荅是夕報罷事實類苑卷十六

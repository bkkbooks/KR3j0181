body:
  text: 事實類苑卷三十五宋江少虞撰詩歌賦詠林和靖處士林逋居於杭州西湖之孤山逋工筆畫善為詩云草泥行郭索雲木呌鈎輈頗為士大夫所稱又梅花詩云疎影横斜水清淺暗香浮動月黄昏評詩者謂前世咏梅者多矣未有此句也又其臨終為句云茂陵他日求遺稿猶喜曾無封禪書尤為人稱誦自逋之卒湖山寂寥未有繼者見廬陵歸田録二林和靖梅詩云疎影横斜水清淺暗香浮動月黄昏大為歐陽文忠公稱賞大凡和靖集中梅詩最好梅花詩中此兩句尤奇麗東坡和少游詩云西湖處士骨應槁只有此詩君壓倒僕意東坡亦有㣲意也然和靖詩屬對親切如贈煅藥秀才詩云鵾鵬懶擊三千水龍虎閒封六一泥歐陽文忠公歐陽公頃謫滁州一同年忘其名將赴閬倅因訪之即造為一曲歌以為送曰記得金鑾同唱第春風上國繁華而今薄宦老天涯十年岐路辜負曲江花聞説閬山通閬苑樓髙不見君家孤城寒月等閒斜離愁無盡紅樹逺連霞其飄逸清逺皆太白之品流也公不幸晚為憸人撰􅁋艷數曲附之以成其毁於皇祐中都下已聞此闋歌於人口者二十年矣嗟哉不能為之力辨公尤不喜浮屠文瑩頃持蘇子美書薦謁之殆還亦䝉詩見送有孤閒竺乾格平淡少陵才及聯句有林間著書就應闕日邊來句人皆怪之二趙叔平罷㕘政致仕居濉陽歐陽永叔罷㕘政致仕居汝隂叔平一日乘安輿來訪永叔時吕晦叔以金華學士知潁州啟宴以召二公於是歐陽自為優人致語及口號髙誼清才縉紳以為美談口號曰欲知盛集繼荀陳請看當筵主與賓金馬玉堂三學士清風明月兩閒人紅芳已過鶯猶囀青杏初嘗酒正醇好景難逢良㑹少乘歡舉白莫辭貧三慶厯中西師未解晏元獻公殊為樞宻使㑹大雪歐陽文忠公與陸學士經同往候之遂至於西園歐陽公即席賦晏太尉西園賀雪歌其斷章曰主人與國共休戚不唯喜悦將豐登須憐鐵甲冷徹骨四十餘萬屯邊兵晏深不平嘗語人曰昔日韓愈亦能作言語每赴裴度㑹但云園林窮勝事鐘鼔樂清時却不曾如此作閙梅聖俞景祐末元昊叛夏鄭公出鎮長安梅送詩云亞夫金鼔從天落韓信旌旗背水陳是時詩甚多獨刻此於石文瑩頃遊潁中二邑見僧壁問尚有之書郢城新亭曰每到新亭即厭歸野香經雨長松圍四簷山色消繁暑一局棋聲下翠微水片角聲爭澗月錦文拳石砌苔磯近來學得籠中鶴囘避流鶯笑不飛寒食云客舍愁驚百五春雨餘溪竹緑無塵金花觸處闕鞦鼓粉頰誰家鬭草人水上碧桃流片段梁間新燕語逡巡髙僧不飲客攜酒來勸先朝放逐臣篇篇精絶不能盡録公聞靈州緇衣戎服引單騎冒雪間道走清逺故城得其實奏請班師見玉壺清話二梅聖俞嘗於范希文席上賦河豚魚詩云春洲生荻牙春岸飛楊花河豚於此時貴不數魚蝦河豚嘗出於春暮羣遊水上食柳絮而肥南人多與荻牙為羮最美知詩者謂祗破題兩句已道盡河豚好處聖俞平生苦於吟詠以閒逺古淡為意故其締思極艱此詩作於樽俎之間筆力雄贍頃刻而成遂絶唱三蘇子瞻學士蜀人也嘗於涓闕監得西南夷人所賣蠻布弓衣其文織成梅聖俞春節雪詩在聖俞集中未為絶句蓋其名重𫝊落外蕃子瞻以余尤知聖俞因以見遺余家舊蓄琴一張乃雷㑹所斵其聲清越如擊金石遂以此布更為琴嚢二物真余家之寶玩也四晏文獻公文章擅天下尤喜為詩而多稱引後進一時名士往往出其門聖俞平生所作詩多矣然獨愛其兩聯云寒魚猶見底白鷺已飛前又絮暖鱖魚繁波添蓴菜紫余嘗於聖俞見公自書手簡再三稱賞此二聯云余疑而問之聖俞曰此非極致豈公偶自得意於其間乎乃知自古文字不獨知己難得知人亦難也五宋元獻公庠初罷參知政事知揚州嘗以雙鵝贈梅堯臣作詩曰昔居鳳池上曾食鳳池萍乞與江湖走從教養素翎不同王逸少辛苦寫黄庭宋公得詩殊不悦六梅聖俞於謝氏中外親謝師直少名錦衣奴聖俞作詩戯之曰古錦裁詩句斑衣戲坐隅木奴今正熟肯效陸郎無師直時十餘歲讀詩而悟劉貢父詩話蘇子美松江新作長橋制度宏麗前世所未有蘇子美新橋對月詩所謂雲頭艶艶開金餅水面沈沈卧綵虹者是也時謂此橋非此句雄偉不能稱蘇子美兄舜元字才翁詩亦遒勁多佳句獨罕𫝊其與子美紫閣寺聯句無愧韓孟也恨不盡見之耳二尚書郎周越以書名盛行於天聖景祐間然筆軟殊無古氣梅堯臣作詩務為親切閒淡近代詩人罕及也皇祐以後時人作詩尚豪放甚者粗俗強惡遂以成風蘇舜欽喜為健句草書猶俊嘗曰不幸寫字為人比周越作詩為人比梅堯臣尤良可歎也見東軒筆録三蘇子美謫居吳中欲遊丹陽潘師旦深不欲其來宣言於人欲拒之子美作水調歌頭有擬借寒潭垂釣又恐鷗猜鷺忌不肯傍青綸之句蓋為是也晏元獻晏元獻公喜詩嘗曰老覺腰金重慵便玉枕涼未是富貴詩不如笙歌歸院落燈火下樓臺此善言富貴者也人皆以為知詩二晏元獻公雖起居田里而文章富貴出於天然嘗覺李慶孫富貴詩軸裝曲譜金書字樹記花名玉篆牌公曰此乃乞兒相未嘗語富貴者故公每吟咏富貴不言金玉錦繡而惟説其氣象若曰樓臺側畔楊花過簾幕中間燕子飛梨花院落溶溶月柳絮池塘淡淡風之類是也故公自以此句語人曰窮兒家有這景致也無三晏相國今世之工為詩者也末年見編集諸篇乃唐人以來所未有然相國不自貴重其文凡門下客及官屬解聲韻者悉與酬和丁晉公真宗朝歲歲賞花釣魚羣臣應制嘗一歲臨池久之而仰釣不食丁公為應制詩云鶯驚鳳輦穿花去魚畏龍顔上釣遲真宗稱賞羣臣皆自以為不及也范補之范諷自給事中謫官濟南城有張氏園亭數泉上出有金錦真珠之句水木環合乃歴下之勝景園亭主人乃張寺丞聦也嘗邀范宴飲於亭范題二韻詩於壁云園林再到由身健官職今抛夢乍醒唯有南山與君眼相逢不改舊時青二鼎州甘泉寺介官道之側嘉泉也便於潄酌行客未有不舍車而留者始寇萊公南遷日經此酌泉誌壁而去未㡬丁晉公竄朱崖復經此禮佛留題而行天聖中范諷以殿中丞安撫湖南至此寺覩二相留題徘徊慨歎留詩於寺曰平仲酌泉囘北望公言禮佛向南行烟嵐翠鎖門前路轉使髙僧厭寵榮詩碑至今猶存已上並湘山野録鍾離權邢州開元寺一僧院有五代時隠士鍾離權草書詩二絶筆勢遒逸詩句亦佳詩曰得道真僧不易逢幾時歸去願相從自言住處連滄海别是蓬萊第一重其二曰莫厭追歡笑語頻尋思離亂可傷神閒來屈指從頭數得見昇平有幾人後從廣知邢州訪此寺遂命刋刻此詩於石張宗永張宗永華州人倜儻不羈善為詩寶元中以職官知長安縣時鄭州陳相尹京兆宗永嘗以事失公意公有别業在鄠杜縣間宗永知公好絶句詩乘間詣之於㕔大書二韻云喬松翠竹絶纎埃門對南山盡日開應是主人貪報國功成名遂不歸來莊督録以聞公覽而善之待之如初宗永嘗有詩云大書文字隄防老剰賣峯嵐准備閒佳句甚多往往膾炙人口馮太傅馮太傅端嘗書一絶云鳴鶻直上一千尺天靜無風聲更乾碧眼健兒三百騎盡提金勒向雲㸔顧坐客曰此可畫於屏障乃柳如金塞上之作見倦游雜録吕文穆洛陽龍門有吕文穆公讀書龕云文穆昔嘗棲息於此初有友二人一人則温尚書仲舒一人則忘其姓名而三人誓不得狀元不仕及唱第文穆狀元温已失意然猶中甲科遂釋褐其一人徑拂袖歸隠文穆作相太宗問昔誰為友文穆即以歸隠者對遽以著作佐郎召之不起故文穆罷相尹洛作詩曰昔作儒生謁貢闈今提相印出黄扉九重鴛鷺醉中别萬里烟霄達了歸隣叟盡垂新鶴髪故人猶著舊麻衣洛陽謾道多才子自歎遭逢似我稀所謂故人盖斥其友歸隠者也王荆公王丞相初得請於金陵出東府寓定力院自題於僧壁云溪北溪南水暗通隔溪聞得夕陽舂當時諸葛成何事只合終身作卧龍二王荆公初罷相知金陵作詩曰投老歸來一幅巾君恩猶許備藩臣芙蓉堂上疎秋水聊為龜魚作主人乃再罷相遂乞宫觀以㑹靈觀使居鍾山又作詩云乞得膠膠擾擾身鍾山松竹替埃塵只將鳬雁同為客不與龜魚作主人三熙寧中詔王荆公及子雱同修經義成加荆公左僕射兼門下侍郎雱龍圖閣直學士同日受命故元㕘政絳賀詩曰陳前輿服同桓傅拜後金珠有魯公四熙寧初張侍郎核以二府成詩賀王公公和曰功謝蕭規慚漢第恩從隗始愧燕臺示陸農師曰蕭規曹隨髙帝論功蕭何第一皆摭故實而請從隗始初無恩字笑曰子善問也韓退之鬭雞聯句感恩慚始若無據豈當對功字耶乃知前人以用事一字偏枯為倒置眉目返易中裳其慎之如此五荆公愛㸔水中影亦性所好如秋水寫明河迢迢藕花底又桃花詩云晴溝漲水緑週遭俯視紅影移魚舠皆觀其影也其後云攀條弄芳畏晼晚已見黍雪盤中毛事見儀禮王平甫王平甫學士碩學髙才勁正不附麗熙寧中判官告院忽於秋日作宫詞㸃絳唇一闋其㫖蓋有所刺以示其友魏泰泰曰公之詞美矣然斷章乃流離之鬼何也明年平甫竟以䜛得罪廢金陵其詞曰秋氣微涼夢囘明月穿簾幕井梧蕭索正遶髙枝鵲寶瑟塵生金雁空零落情無託鬢雲重掠不似君恩薄二熙寧中髙麗遣使入貢且求王平甫學士京師題詠有㫖令權知開封府元厚之内翰抄録以賜時厚之自詣平甫求新著平甫以詩戲厚之曰誰似詩仙來鳳詔欲𫝊賈客過雞林三王安國俊邁而貌陋黒肥熙寧中余與同官於洛下嘗謂予曰子可作詩贈我余因援筆戲之曰飛卿素號温鍾馗思道通脱還魁肥江淹善啖筆五色庾信能文腰十圍只知外貌乏粉澤誰料滿腹填珠璣相逢把酒洛陽社不管淋漓身上衣安國由此不悦蔡子正蔡子正久在邊任晚年以龍圖閣直學士再守平涼作喜遷鶯詞一闋以闕曰霜天清曉望紫塞古壘寒雲衰草漢馬嘶風邉鴻叫月隴上鐵衣寒早劍歌騎曲悲壯盡道君恩須報塞垣樂盡櫜鞬錦領山西年少談笑刁斗静烽火一把長報平安耗聖主憂邉威懐遐逺驕蹇尚寛天討歳華向晚愁思誰念玉闗人老太平也且歡娛莫惜金樽頻倒此曲成大𫝊都下倦游襍録二蔡挺自寶元以後歴邊任至於熙寧初徇師平涼㑹邊無事因作樂歌以教邊人有誰念玉關人老之句此曲盛𫝊都下未幾召為樞宻副使三熙寧六年有司言日當食四月朔上為撤膳避正殿一夕㣲雨明日不見日食百官入賀是日有皇子之慶蔡子正為樞宻副使獻詩前四句曰昨夜薫風入舜韶君王未御正衙朝陽輝已得前星助隂沴潛隨夜雨消其叙四月一日避正殿皇子慶誕隂雲日蝕四句盡之當時無能過之事實類苑卷三十五

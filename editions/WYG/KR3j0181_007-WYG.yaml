  text: 欽定四庫全書事實類苑卷七宋江少虞撰
  hash: sha256:f9d0d0fc6302b08631c6bee854545c34e0ee130c04367f7be781cf58433aae49
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0181_WYG_007-1a, image: WYG0874/WYG0874-0054a.png}
body:
  text: 君臣知遇王元之王元之嘗草李繼遷制繼遷送馬五十匹潤筆公却之後守永陽閩人鄭褒有文行徒歩謁公及還公買一馬遺之或謗其虧價者太宗曰彼能却繼遷五十匹顧肯虧一匹馬價耶見澠水燕談二王禹偁濮州人生十餘嵗能屬文太平興國八年進士及第補成武主簿改大理評事知長洲縣太宗方奨㧞文士聞其名召拜拾遺直史舘賜緋給銀帶上特命以文犀帶錫之禹偁獻端拱箴以為戒尋以左司諫知制誥上嘗稱之曰王禹偁文章當今天下獨歩判大理寺散騎常侍徐鉉為妖巫道安所誣謫官禹偁上䟽訟之請反坐尼罪由是貶商州團練副使無禄種蔬自給徙解州團練副使上思其才復召為左正言仍命宰相以剛直不容物戒之真宗初即位召王禹偁於揚州復知制誥脩太宗實録執政疑禹偁輕重其間落職出知董州州境有二虎鬬食其一冬雷羣雞夜鳴禹偁上䟽引洪範陳戒且自劾上以問司天官對以守臣任其咎移知蘄州尋召還朝禹偁已卒三禹偁之卒諫議大夫戚綸誄曰事上不邪曲居下不諂佞見善若已有疾惡過仇讐世以為知言祥符中真宗觀書龍圖閣得禹偁奏章歎美切直因訪其後宰相稱其子嘉言以進士第為江都尉即召對擢大理評事並涑水紀聞四王元之在翰林太宗恩遇極厚嘗侍宴瓊林獨召至御榻顧問帝語宰相曰王某文章獨歩當代異日垂名不朽故元之有詩云瓊林侍逰宴金口獨褒揚見澠水燕談杜文正真宗重禮杜鎬鎬直龍圖閣上嘗因沐浴罷飲上尊酒封其餘遣使賜鎬於閣下鎬素不飲得賜喜飲之至盡因動舊疾忽僵不知人上聞之驚步行出至閣下自調藥飲之仍詔其子津入侍疾少頃鎬稍蘇見至尊在欲起上撫令卧鎬疾平然後入宫方鎬疾亟時上深自咎責為由已賜酒致鎬病也楊礪真宗判開封府楊礪為府寮及登儲貳因為東宮官即位為樞宻副使病甚真宗幸其第問疾所居在隘巷中輦不能進左右請還上不許因降輦步至其第存勞甚至楊礪太宗建隆初状元及第在開封府真宗問礪何年及第礪唯唯不對真宗退問左右然後知之自悔失問礪不以科名自伐由是重之已上出涑水紀聞董遵誨董遵誨父宗本為隨州將太祖微時徃依宗本與遵誨游常共臂鷹逐兎小不如意為遵誨所辱太祖遂辭去宗本固留厚給遺之即位之初訪求遵誨欲自殺其妻止之曰等死亦未晚矣萬乘之主豈念舊惡將因禍致福豈可測哉遵誨感其言幅巾見於便殿叩頭請死上曰汝昔日豪蕩太過我方將任汝事即命左右掖起賜冠帶設食案賜食上前語及舊故歡笑以為通逺軍使專委一面之事賦入悉以給軍用不藉於有司每嵗賜予無數幕府許自辟署選精甲數千人𨽻麾下不復更代隔嵗以春夏令歸營省妻子遵誨至申嚴邊候鎮撫蕃部號令如一戎族之强盛者倚為腹心有謀為㓂者必立以告發所部襲之剪滅無焦類凡在出師大克㨗党項諸羌畏威惕息養馬數千匹擇其良以入貢親僕數百人皆厚給衣食日夕馳射田獵擊鞠呼盧飲食作鼔吹為樂羌中動靜即時知之朝廷不復西顧嵗時其親表押馬来獻上必召問遵誨晨夕所為擊節大喜曰是能快活耶多解服御衣物珠貝珍異以為賜遵誨捧之未嘗不泣下每數嵗一来朝賜食御前笑語移晷賜御膳羊上樽酒皆五百數金帛累萬復遣去終太祖朝不易其任末年稍遷羅州刺史有判官者因朝廷訪利害上言通逺軍養兵每嵗轉運使調發地錢勞費民力本軍關𣙜之入自可市糴給用上遣録判官所奏下本軍及申約外討凡嵗調入如故不得竊議市租徙判官於他郡遵誨感激流涕左右皆泣楊文公談苑种放真宗優禮种放近世無比一日登龍圖閣放從行真宗垂手援放臂上以顧近臣曰昔明皇優待李白御手調羮今朕以手援放登閣厚賢之禮無愧於前代矣故蔣穎叙薦放姪孫誼云放早以逸民被遇帝有握手登樓之眷真宗屢欲大用放固辭乃止惜哉澠水燕談張乖崖乖崖公曰吾河曲一書生爾猥自出身遭逢聖主太平興國中進士及第屢親民政自太常博士罷荆湖北路轉運使入覲時太宗皇帝御長春殿召對數刻上曰卿奏事精審可信特賜金紫降虞部郎中旋授樞宻直學士知益州面奉聖㫖西川經賊後民頗傷殘不聊生卿去後可便宜行事欽哉君不疑臣委任至重乃感恩泣下到川後奉詔條之外事有大可苹者奏後始行其有從權而合義者先行後奏上悉允之故能展微效立功名誠由上信不疑下讒不入見忠定公語録二忠定公為御史中丞一日於行香所見宰相張齊賢呼㕘知政事温仲舒為鄉弟及他語鄙甚公以非所宜言失大臣體遂彈奏之齊賢深以為恨後於上前短公曰張詠本無文凡有章奏皆姻家王禹偁代為之禹偁前任翰林作齊賢罷相麻其詞醜詆及再入中書禹偁亦再知制誥故兩中傷之公聞自辨曰臣苦心文學縉紳莫不知齊賢以臣假手於人是掩上之明誣臣之非罪也上曰卿平生著述幾多可進来公遂以所著進上閲於龍圖閣未竟賜坐曰今日暑甚顧黄門於御几取常所執紅綃金龍扇賜公且稱文善公起再拜乃納扇於几上曰便以賜卿美今日獻文事也出澠水燕談張文定太祖幸西都肆赦張文定公齊賢以布衣獻策太祖召至便坐令面陳其事文定以手畫地條陳十䇿内四説稱㫖文定堅執其六説皆善太祖怒令武士拽出及車駕還京語太宗曰我幸西都惟得一張齊賢耳我不欲爵之以官異時汝可收之使輔汝為相也至太宗即位放進士榜必欲置於髙等而有司偶失遴選在第三甲之末太宗不恱及注官有㫖一榜盡與京官通判文定釋褐將作監丞通判衡州不十年果作相東軒筆録栁仲塗栁開知潤州有監兵錢供奉者亦忠懿之近屬也其父方奉朝請在京師開乘間来謁造其書閣見壁有繪婦人像甚美詰以誰氏監兵對曰某之女弟也旣笄矣栁喜曰開喪偶已踰期願取為繼室錢曰候白家君敢議姻事栁曰以開之才學不辱於錢氏之門遂强委禽焉不旬日而遂成禮錢不敢拒走介白其父其父上殿面訴栁開刼取臣女仁宗問曰卿識栁開否曰不識上曰竒傑之士也卿家可謂得佳婿矣吾為卿媒可乎錢父不敢再言但拜謝而退見倦遊襍録袁廓袁廓梓潼人敢大言太祖竒之太祖即位遷殿中丞掌市征嵗終增緡錢數萬特賜錢百萬㑹錢俶納土詔廓按行府庫倉廩所至公宴令别席而坐以寵之錢俶錢俶太宗即位来朝宴後苑泛舟池中太宗親酌酒以賜俶俶跪而飲每貢乘輿服物器玩制作精妙遣使修貢必羅於庭㷊香再拜並見范蜀公䝉求呂正惠呂正惠公端使髙麗遇風濤恍惚間檣折舟人大恐公恬然讀書若在齋閣時首台吕文穆公蒙正吿老甚切上宴後苑作釣魚詩獨賜公斷章云欲餌金鈎深未到磻溪須問釣魚人以首相屬公公和云愚臣鈎直難堪用宜問濠梁結網人文穆得謝果冠台席見玉壺清話趙􅍬趙􅍬字仲微單父人登進士第累為兵部員外郎益州路轉運使真宗謂曰逺方之事朕皆欲聞一一奏来朕當為卿行之􅍬至蜀奏利害最詳及後益州闕守乃自三司鹽鐵副使授諫議大夫集賢院學士知益州天聖中以工部侍郎知并州廻上殿奏事上曰先帝時嘗詔益州市錦六千匹時有姓趙者知州止市千匹還是卿否􅍬曰是上曰卿如此恤民誠至公嘗聞先帝言卿朴厚可任未幾為刑部侍郎樞宻副使以先帝所委故也見本朝名臣𫝊晏元獻晏元獻公為童子時張文節薦之於朝廷召至闕下適值御試進士便令公就試公一見試題曰臣十日前已作此賦有賦草尚在乞别命題上極愛其不隠及為館職時天下無事許臣僚擇勝宴飲當時侍從文館之士大夫各為燕集以至市樓酒館徃徃皆供帳為游息之地公是時貧甚不能出獨家居與昆弟講習一日選東宫官忽自中批出除晏殊執政莫諭所因次日進覆上諭之曰近聞館閣臣僚無不嬉游宴賞彌日繼夕惟殊杜門與兄弟讀書如此謹厚正可為東宫官公旣授命得對上面諭除授之意公語言質雅則曰臣非不樂宴游者直以貧無可為之具臣若有錢亦須徃但無錢不能出耳上益嘉其誠實知事君體眷注日深仁宗朝卒至大用見筆談晁迥大中祥符元年冬行升中之禮駐蹕岱宗晁迥當草赦書之詞例先進呈裁定凖舊儀學士當直日或遇宣召即繫鞋赴戴㡌子見之迥入對度今皇上以封祝大禮方在致齋之中必加嚴肅不同常時乃袍服秉笏造行宫門有中使入奏俄出報云上適問之聞學士穿袍服起入内矣可止此祇伺暨中使復入迥佇立移晷中使來召引至幄次而上已改御巾幘而坐起居訖升詣帝所望之儼然即之也温進呈詞稿省覽稱善怡顔俯問有加常等既而賜坐令飲茶而退因思古之帝王優禮節行之臣不冠不見則有之矣内愧孱瑣何以當聖君體貌之重乎茲惟先皇帝恭己待士之盛徳度越千古歟二大中祥符天禧之間忘其年月暮春之月閣門傳宣布告令赴池苑逰宴之㑹法從旣集俄而陰雲興宻雨降有詔罷後苑之逰上賜宴飲上御承明殿面北而坐預侍者翼列如儀既而執事之臣捧金盤進名花有牡丹重台千房者并諸竒花首置御座前餘皆散布諸臣雕俎之上内臣先供奉至尊戴御花以及親賢宰執亦如之以賜諸臣皆戴焉上忽乃眷西顧宣言曰與學士戴花内庭侍従唯學士不呼名俄有中使數人遽至與迥及一二同僚戴之觀者無不竦動也前代加寵詞臣有以寶裝方丈賜食於前則嘗聞之矣豈謂臣荷日月之照待以王公之禮何幸㑹之深歟三大中祥符天禧之間忘其年日迥當宿直方深夜奉召赴内東門上御面東閣子坐起居訖升進次宣索坐物執事者叠青墩於御坐之北隅方命坐而上語及遽起側立以聽焉示諭令草詔今忘其所詔之事恭受宸㫖畢命復坐賜茶而退却行纔踰閾上宣言曰將蠟燭與學士照路俄有中使就御前拔取列置宻炤之其一圍徑甚大中使執之前引内東門赴於本院引接人吏古之取金蓮燭其若是乎上周知故事善視侍臣多此類也並金坡遺事王文正上宣諭曰舊尹京薦卿弟旭宰屬邑有亷幹之稱可委以繁使公對曰臣待罪宰府恐公議非便上曰前代父子兄弟並處貴位者多不可以卿故滯其才公曰今省府乃士人要職若論平進遷擢又得孤寒者一人臣弟陛下知名望他日出於宸衷且乞一閒局遂判吏部南曹公歸喜語弟曰上知爾之才必有任使而終不言所得之㫖翌日被命乃知銓管入引對上見公弟賜與緋魚公因對感謝恩被上曰不知尚著緑因朕失照管二王沂公曾張文節知白陳彭年㕘預政事因白公曰曾等拔擢至此亦公之力然願有禆補公曰願聞其説沂公等曰每奏事其間亦有不經上覽者公但批㫖奉行恐人言之以為不可公遜謝而已一日奏對公退諸公留身上驚曰有何事不與王某同来諸公以前說聞於上上曰誰所行諸公曰皆公上曰王某在朕左右多年朕察之無毫髪之私自東封後朕諭王某令小可事一面奉行卿等當謹奉之退而謝於公曰上之委遇非曾所知也公曰向蒙諭及不可自言曾得上㫖今後更賴諸公規益文正每休暇多與二府徃還莱公出鎮㑹宿私第翊日公入朝上顧公曰昨日知有客甚歡朝廷無事大臣和睦誠可喜也三上宣示公曰聞卿居甚陋宻令更易之官為修營其間更以卿意增益之公頓首曰臣所居乃先父舊廬當日止庇風雨令葺已過甚矣每思先人嘗有愧色豈煩朝廷上再三諭之公力辭乃止並見名臣遺事禮遇詞臣真宗好文待學士尤重王欽若召見最頻其後晁迴李宗諤陳彭年王曾李繼數人皆被恩遇惟演再入院天禧四年間屢蒙召對或龍圖閣滋福殿承明殿并宣和門之北閣子皆從容賜坐移刻而出其言議及奏對此略而不書又常令中使宻至院門詢吏人云今日誰直然後召之見金坡遺事御書碑額仁宗天縦多能尤精書學凡宫殿門觀多帝飛白題榜勲賢神道率賜篆螭首王曾之碑曰旌賢㓂凖曰旌忠李迪曰遺直晏殊曰舊學丁度曰崇儒王旦曰全徳元老文彦博曰效忠積慶李用和曰親賢范仲淹曰褒賢曹利用曰旌功吕夷簡曰懐忠張士遜曰舊徳狄青曰旌忠元勲其餘不可悉記或云初王子融守河闕唐明皇題裴耀卿碑額獻之仁宗乃賜文正碑曰旌賢大臣碑額賜篆盖始於此其後英廟神考亦屢有賜者澠水燕談事實類苑卷七

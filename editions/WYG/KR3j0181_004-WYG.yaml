body:
  text: 事實類苑卷四宋江少虞撰祖宗聖訓仁宗富鄭公弼慶厯中以知制誥使北庭仁宗嘉其有勞命為樞宻使鄭公力辭不拜乃改資政殿學士王拱辰言於上曰富弼亦何功之有但能添金帛之數厚契丹而弊中國耳仁宗曰不然朕所愛者土宇生民耳財物非所惜也拱辰曰財物豈不出於生民耶仁宗曰國家經費取之非一日若終歳出以賜契丹亦未至困民若兵興調發歳出不貲非若今之可以緩取也拱辰曰敵人無厭好窺中國之隙且陛下只有一女萬一欲請和親則如之何仁宗憫然動色曰茍利社稷朕亦豈愛一女耶拱辰言塞且知譛之不行也遽曰臣不知陛下能屈已愛民如此真堯舜之主也灑泣再拜而出仁宗聖性仁恕尤恐深文獄官有失入人罪者終身不復進用至於仁民愛物孜孜唯恐不及一日晨興語近臣曰昨日因不寢而饑甚思食燒羊侍臣曰何不降㫖取索仁宗曰比聞禁中每有取索外面遂以為例誠恐自此遂夜宰殺以備非時供應則歳月之乆害物多矣豈可不忍一夕之餒而啓無窮之殺也時左右皆呼萬歳至有感泣者見東軒筆録仁宗嘗春日步苑中屢囬顧皆莫測聖意及還宫中顧嬪御曰渇甚可速進熟水嬪御進水且曰大家何不外面取水而致乆渇耶仁宗曰吾屢顧不見鐐子茍問之即有抵罪者故忍渇而歸左右皆稽顙動容呼萬歳乆之聖性仁恕如此東軒筆録仁宗讀五代史至周髙祖幸南莊臨水亭見雙鳬戱於水出沒可愛帝引弓射之一發疊貫從臣稱賀仁宗掩卷謂左右曰逞藝傷生非朕所喜也内臣王昭信掌内饔十五年嘗面戒曰動活之物不得擅烹深惡於殺也慶厯二年五月旱丁亥夜雨戊子宰相章得象等入賀上曰昨夜朕忽聞㣲雷因起露立於庭仰天百拜以禱須臾雨至朕及嬪御衣皆沾濕不敢避去移刻雨霽再拜而謝方敢升陛得象對曰非陛下至誠何以感動天地上曰比欲下詔罪已避寢徹膳又恐近於崇飾虚名不若夙夜精白一心宻禱為佳爾慶厯三年九月知諌院王素余靖歐陽修蔡襄以言事不避並改章服十月王素除淮南轉運使將之使官入辭上謂曰卿今便去諫院事有未善者可盡言之右正言余靖請奉使契丹入辭書所奏事於笏各用一字為目上顧見之問其所書者何靖以實對上指其事一一問之盡而後已上之聽納不倦如此涑水紀聞慶厯中滕子京守慶州屬羌數千人内附滕厚加勞遺以結其心御史梁堅言滕妄費公庫錢仁宗曰邊帥以財物㗖蕃部此李牧故事安可加罪出澠水燕談劉沆為集賢相欲以刁約為三司判官與首台陳恭公議不合劉言之再三恭公始見允一日劉作奏劄子懐之與恭公上殿未及有言而仁宗曰益州重地誰可守者二相未對仁宗曰知定州宋祁其人也陳恭公曰益俗奢侈宋喜游耍恐非所宜仁宗曰至如刁約荒飲無度猶在舘閣宋祁有何不可知益州也劉公惘然驚懼於是宋知成都而不敢以約薦焉東軒筆録仁宗聖性恭儉至和二年春不豫兩府大臣日至寢閣問聖體見上器服簡質用素漆唾壺盂子素甆盞進藥御榻上衾褥皆黄絁色已欲暗宫人遽取新衾覆其上亦黄絁也然外人無知者惟兩府視疾因見之爾出廬陵歸田録慶厯中郎官李覺者勘公事因自陳緋衣已乆乞改章服仁宗曰待别差遣與卿換金紫朕不欲因鞫獄與恩澤慮刻薄之徒望風希意加人深罪耳帝寛厚欽恤之意如此廟號曰仁不亦宜乎仁宗朝南劔州上言石碑等銀鑛可發上謂三司使曰但不害民則為利國或於民有害豈可行也上之愛惜元元至矣澠水燕談仁宗朝流内銓引改京官人李師錫上覧其薦者三十餘人問其族系乃知是王徳用甥婿上曰保任之法欲以盡天下之才今但薦勢要使孤寒何以進止與師錫循資後翰林學士胡宿子宗堯磨勘以保官多亦令循資帝之照見物情抑權勢進孤寒聖矣夫澠水燕談温成皇后乳母賈氏宫中謂之賈婆賈昌朝連結之謂之姑姑臺諌論其奸吴春卿欲得其實而不可近侍進闕對曰近日臺諫言事虚實相半如賈姑姑事豈可是哉上黙然乆之曰賈氏實曽薦昌朝非吾仁宗之盛徳豈肯以實語臣下耶出東坡集秘書監侍講陳堯俞始召赴資善堂對邇英閣堯俞致謝上遣人宣召曰卿以博學參預經筵宜尊所聞多所發揮良足深喜是日上朝讀三朝寳訓至天禧中有二人犯罪法當死真宗皇帝惻然憐之曰此等安知法殺之則不忍舍之則無以勵衆乃使人持去笞而遣之以闕訖奏又禮汾隂日見一羊自擲道左怪問之曰今日尚食殺其羔真宗慘然不樂自是不殺羊羔資政殿學士韓維讀畢因奏言此特真宗皇帝小善耳推其心以及天下則仁不可勝用也真宗自澶淵之役却敵之後十九年不言兵天下富庶其原盖出於此昔孟子論齊王不忍一牛之死以為是心足以王矣今陛下恩足以及禽獸見昆蟲螻蟻逺而避之且勅左右勿踐履此亦仁術也臣願陛下推此心以及百姓則天下幸甚闕時為右史奏曰臣今十五日侍邇英閣竊見資政殿學士韓維因讀三朝寳訓至真宗皇帝好生惡殺因論皇帝陛下在宫中不忍踐履蟲蟻其言論深切可以推明聖徳益増福夀臣忝備位右史謹書其事於冊又録一本進呈意日望陛下采擇無忘此心以廣好生之徳臣不勝大願已上見東坡集明道二年二月十一日仁宗籍田禮上就耕位侍中奉耒進上搢圭三推禮儀使奏禮成上曰朕既躬耕不必泥古願終畆以勸天下禮儀使復奏上遂耕十有二畦翊日作籍田禮畢詩賜宰臣以下和進尋詔吕文靖公等編為籍田記時許開封國學舉人陪位因得免解出澠水燕談寳元康定間西方用兵急於邊用言利者多摭拾微細頗傷大體仁宗厭之乃詔曰議者並須究知本末審可施行若事已上而騐無狀事效不著者當施重罰於是矜肆者知畏而不敢妄述利害澠水燕談宋鄭公庠初為翰林學士仁宗嘗對執政講其文學才望可大用者云俟兩府有闕進名是時曽魯公公亮為舘職在京師𫝊聞上有此言遽過鄭公而賀之鄭公蹙額曰審有是言免禍幸矣曽公惘然不測而退明年赴闕執政進名仁宗熟視久之徐曰詔張觀執政曰去年曽得㫖欲用宋庠仁宗曰觀是先朝狀元合先用也又嘗對執政曰三司使楊察判開封府王拱辰族望履歴時来兩府有闕進此二人既而梁莊肅公通罪罷相兩府推遷執政以二人名聞仁宗曰可召程戢執政復以異時上語奏陳仁宗曰若遂用察是二人之䇿得行也執政遂不敢復言盖梁公之出或闕等所擠上之英鑒皆此類也見東軒筆録帝於邇英閣出危竿論一篇述居髙慎危之意又出御書十有三軸凡三十五事一曰遵祖宗訓二曰奉真考業三曰祖宗艱難不敢有墜四曰真宗愛民孝思感噎五曰守信義六曰不巧詐七曰好碩學八曰精六藝九曰慎言語十曰嗜老成十一曰進静退十二曰求中正十三曰懼貴闕十四曰保勇將十五曰尚儒籍十六曰議釋老十七曰重良臣十八曰廣視聽十九曰功無迹二十曰戒喜怒二十一曰明巧媚二十二曰分希㫖二十三曰從民欲二十四曰慎滿盈二十五曰傷暴露二十六曰哀鰥寡民二十七曰訪屠釣臣二十八曰講逺圗術二十九曰辨朋比三十曰斥謟佞三十一曰察不忠三十二曰鑑迎合三十三曰罪已為民三十四曰損闕換軍三十五曰求一善可録小瑕不廢顧丁度等曰朕觀書之暇取臣寮言及進對事目可施政治者書以分賜卿等度及曽公亮楊安國王洙等拜賜因請注釋其義帝許之丙戌丁度等上答邇英閣聖問一卷帝覽之終篇指其中體大者六事付中書樞宻院令奉行之答聖問者即所釋前所賜三十五事也其序曰伏奉宣示御書文字十三軸仰窺聖㫖皆陛下上念祖宗下思政治述安危敗闕忠邪善惡之事詢謀臣下使進補敢不竭忠竊思自古求治之事靡不興理道安邦國納忠正退奸邪廣聰明致功業然明此數事在明與威斷爾明則不惑威則善柄斷則能行縂是三者守而勿失非聖人孰能為臣等嘗讀唐書見憲宗英悟留心庶政宰相陳説政要必徃復詔誥既書則曰凡好事口説則易躬行則難卿等既為朕言之常須行之勿空陳而已李絳對曰非知之艱行之惟艱陛下處分可為至言然臣絳亦以天下之人從陛下所行不從陛下所言惟願每言之則必行之憲宗欣然嘉納今臣等親承聖諭敷明至要亦願陛下日與輔臣舉此事自推而行之毋使唐之君臣専美前代也帝謂趙師民曰以水喻政其有指哉對曰水性順故通通則清逆故壅壅則敗喻用賢則王政通而世清用邪則王澤壅而世濁幽王失道絀正用邪正不勝邪雖有善人不能為治亦將相牽淪於汙濁也丁未講詩至巷伯篇曰哆兮侈兮成是南箕注有魯男子獨處之事帝曰嫌疑之際古人之所慎也此不著魯人姓氏豈聖人特以設教耶乙未講詩之都人士篇帝曰古人冠服必稱其行今冠服或過之未必如古人也讀三朝經武聖略至真宗朝李繼和上言國初李漢超在關南以私錢貿易以佐公用之闕或繩奏之太宗反令盡除所過税帝曰任人如此孰不盡力哉四月己巳讀賈誼𫝊論三公三少皆天下之端士與太子居處出入故少成若天性習慣如自然帝曰朕昔在東宫崔遵度張士遜馮元為師友此三人者皆老成至於遵度尤良師傅也辛未讀貞觀政要唐太宗曰今所仕人必以徳行學識為本王珪曰人臣若無學業豈堪大用漢有詐稱衛太子者雋不疑斷以春秋蒯聵之事宣帝與霍光嘉之曰公卿大臣當用經術帝曰大臣須是知書宰相尤須有學也楊安國對曰漢儒多引經决事宰相必通一經帝謂宋祁曰近代士人多不務通經但用一時之藝尚取富貴盖取進用髙科者不十年便居顯位所以不勸也七月壬子帝朝拜真宗神御因幸資善堂作詩先皇家善厰東闈菲徳承宗頼慶暉為感儲筵驚嵗月目瞻臺像駐驂騑楹書下啟欽遺澤一堂中藏北朝賜書庭樹重攀記舊幃疇日學文親政地仰懐恩訓倍依依戊辰御邇英閣内出一欹器陳於御座諭丁度等曰朕思古欹器之法試令工人制之以示卿等帝命以水注之中則正滿則覆虚則欹率如家語荀卿淮南之説其法度精妙度等列侍視之帝曰日中則昃月盈則虧聖人有持滿戒慎之守正欲以中正臨天下當與列辟共守此道度等拜曰臣等亦願以中正事陛下因言太宗時嘗作此器真宗制欹器論演先儒之義以垂戒曰然四月戊寅御邇英閣帝作欹器論後述一篇以申存亡成敗之鍳侍講讀官丁度等請宣布中外使知聖心之所存帝曰朕但欲使卿等見之不須宣布度曰臣等欲各書一本以彰榮遇帝曰可便以此夲賜卿等皆拜而受之六月壬寅御延和殿侍講學士上五經精義周易節解二十卷因言尚書顧命禮記䘮禮春秋家語闕亂臣舊所不講今纂集精義所當去留上繫宸㫖帝曰先王吉凶之制百代所遵不可俗忌而簡去至於春秋䘮亂之事皆有善惡鍳戒人主宜聞之亦須存録先儒於經籍有一字之誤者朕嘗不敢改易但注以辨之况正經之義可轉芟去耶己巳講尚書洪範五事帝曰王者之用五事皆夲於五行乎王洙對曰王者治五行得其性則五事皆善故五事得則有休五事失則有咎徴是以聖人克謹天戒以修其身帝曰人君奉天在於修徳夙夜兢兢戒懼於未形尚恐不至必候天有譴告然後修徳此豈畏天之道耶十月戊寅詔侍講講尚書畢講周禮令侍講以下與賈昌朝先修節解以備講説十一月甲辰講尚書無逸帝曰朕深知享國之君宜戒逸豫楊安國曰舊有無逸圗䟽於屏間帝曰朕方欲坐席皆聖人之言當盡置之左右又命丁度取孝經之天子孝治聖治廣要道四章對為右圗因令王洙書無逸蔡襄書孝經又命翰林學士承㫖王拱辰為王圗序而襄書之五年四月丁酉御邇英閣講冏命侍御僕從罔匪正人帝曰君臣之際必誠意相通而後治道成楊安國對曰陛下聰明文思從諌弗拂如水之走下視羣臣若友自古盛主未之有也帝曰臣下能進忠言何惜夏禹之拜仁宗十月乙酉監修國史王曾言唐史官吴競於正史太宗羣臣問對之語為貞觀政要今欲采太祖太宗真宗實録日厯時政記起居注其間事迹不入正史者别為一書從之帝每遇經筵以象架書策外向以便侍臣講讀天聖末孫奭年髙視昏或其時遇隂晦即為徙御坐於閣外奭每講論至前世亂君亡國必反復規諫帝意或不在書奭則拱黙以俟帝為之竦然改容所書無逸圗上之帝施於講讀閣明道元年二月癸夘監修國史吕夷簡上三朝寶訓三十卷即王曾所請也十月闕戌讀五說慎罰篇述後漢光武罷梁統從重之奏帝曰深文峻法誠非善政宋綬對曰王者峻法則易寛刑則難夫以人主得専生殺之權怒則如雷如霆是以峻易而寛難也已上見帝學治平二年八月三日大雨一夕都城水深數尺上降詔責躬求直言學士草詔有大臣惕思天變之語上夜批出云淫雨為災専戒不徳遽令除去大臣思變之言上之恭已畏天自勵如此見廬陵歸田録仁宗在位四十二年賜詩尤多然未必盡上所作景祐元年賜詩末句云寒儒逢景運報國合如何論者以為渾厚完壯真詔㫖也仁宗皇帝時學士書詔未嘗有所増損慶厯七年春旱楊億再當制降詔中書門下既進草上以為罪已之詞未至也令更撰之其詞有乃自去冬時雪不降今春大旱赤地千里天或震動以戒朕躬兹用屈已以悔愆歸誠而上叩冀上穹之降監憫下民之無辜與其降疾於民不若移殃於朕自三月十九日避殿減膳許中外實封言事從王旦賈魏相吴春卿闕樞宻副使令詔罷出獵明日詔南郊毋得上尊號二十七日幸西太一宫祈雨日色方熾上命徹盖既還宫乃雨又明日宰相參知政事降官是日遂大雨上作喜雨詩賜二府至和初京師疫太醫進方者用犀角内出二株解之其一株乃通天犀内侍舉犀請以為御所服上謂曰豈重於御服而不以療民乎命工碎之仁宗初逐林瑀一日執政奏事罷因談時政而共美上以聪明睿知洞察小人情狀仁宗曰卿等謂林瑀去而朝廷遂無小人耶執政曰未諭聖㫖不識小人為誰仁宗從容曰蘓紳可侍讀學士知河陽出東軒筆録仁宗退朝嘗命侍臣講讀於邇英閣賈侍中昌朝時為侍讀講春秋左氏𫝊每至諸侯淫亂則略而不說上問其故賈以實對上曰六經載此所以為後王鍳戒何必諱出廬陵歸田録事實類苑卷四

body:
  text: 事實類苑卷四十九宋江少虞撰休祥夢兆夢遊亢宫李至陽嘗作亢宫序略曰予少多疾羸不勝衣庚寅歳一夕忽夢遊一道宫金碧明煥一巨殿一寶床巋然於中一金龍蟠踞於床之上碧髯金鬛光耀天地旁有道士轉盼若電謂予曰此亢宿之宫也大象無停輪宜速拜之汝將事龍積疾亦消予將拜龍輒先拜至道初太宗立真宗為皇太子命公與李沆並相為賓客太宗戒真宗曰二臣皆宿儒重徳不可輕待吾選正人輔導汝宗基國本吾無慮矣真宗恭稟皇訓見必先拜符亢宫之兆也銅碑記梁沙門寶誌銅牌記多䜟未來事云有一真人在冀川開口張弓在左邊子子孫孫萬萬年江南中主名其子曰𢎞兾吳越錢鏐諸子皆連𢎞字名以應之而宣祖諱正當之也昇元寺石記江南將亡數年前修昇元寺殿掘得石記視之詩也其辭云莫問江南事江南事可憑抱雞昇寶座趂犬出金陵子建居南極安仁秉夜燈東鄰嬌小女騎虎踏河氷王師以甲戌渡江後主寔以丁酉年生曹彬為大將列柵南為子建也潘美為副將城䧟恐有伏兵命卒縱火即安仁也錢俶以戊寅年入朝盡獻浙右之地秦淮石記江南保大中浚秦淮得石誌案其刻有大宋乾徳四年凡六字他皆磨滅不可識今諸儒㕘騐乃輔公祐反江東時年號後太祖受命國號宋改元乾徳江左始衰弱豈非威靈將及而符䜟先著耶天水碧金陵將亡前數年宫中人按薔薇水染生帛一夕忘收為濃露所漬色倍鮮翠因令染坊染碧必經宿露之號為天水碧宫中竟服之識者以為天水趙之望也金陵石記開寶中新修營得一石記數百字𨽻書從頭去從他痛如此連冩至末云不為石子盡更書千萬箇從他痛不知其䜟己未王師渡江云氷稼山頽熙寧三年京輔猛風大雪草木皆稼厚者氷及數寸既而華山震阜頭谷圯折數十丈蕩搖十餘里覆壓甚衆唐天寶中氷稼而露王死故當時諺曰冬凌樹稼達官怕又詩有泰山其頽哲人其萎之說衆謂大臣當之未數年而司徒侍中魏國公韓琦薨王荆公作挽詞略曰氷稼嘗聞達官怕山頽今見哲人萎盖謂是也名亭檢正官張諤家起亭名曰允中盖取易允升義後諤遷太子中允停官陳有方知蘄水縣剏亭名必觀盖取荀況君子必觀於水之義或者解曰必觀亭者必停官也後有方竟以罪免官而去見青箱雜記駕幸東府初作東府望氣者曰異哉乃有天子氣及府成車駕果臨幸時龍圖張校以詩慶兩府諸公而王丞相和曰曽留主上經過迹更費高人賦詠才東嶽受冊之異向大資敏中祥符四年十月為東嶽奉冊使奏奉冊事前十日雨雪日甚至十一月五日謁本廟奉冊忽然景風晴和宛若春煦又得兖州狀稱據黄現鋪人員夏興狀今月四日將兵巡至馬嶺見五人各服黄紫衣執幡盖興等恐是冊使向前迎接忽然霧氣漸起即不見又得天貺觀道士孫守一狀冊使詣本殿燒香畢有皂鶴兩隻至殿盤旋飛翥甚久詞臣各進頌見湘山野録􅃉清殿學士治平三年予為知制誥夏六月夢丞相遣朱衣吏召命草某人為􅃉清殿學士制既寤不能記其姓名及其文詞也明年五月甲辰丞相遣朱衣吏召當制學士吕縉叔草制除闕不疑為寶文閣學士後數日得承㫖張公所作詔云迺規層築􅃉在西清然記去歳之夢與詔文離合其名若符契焉見退朝録軌策李璋太尉罷郢州入朝至襄陽疾病止驛舍兩月餘璋嘗命蜀人費孝先作軌策卦影先畫一鳳止於林上有闗焉又畫一鳳立於臺又畫衣紫而哭者五人盖襄州南數里有鳳林闗傳舍名鳳臺驛始璋以二子侍行三子守官於外聞璋病甚悉來奔視至之翊日璋乃卒果臨喪者五人見倦遊襍録二術士李某忘其名亦傳管輅軌䇿法畫卦影頗有驗今丞相頃嘗問之卦影畫水邊一月中有古字未幾除知湖州又盧龍圖秉使占卦影亦同乃除知渭州雖不同而其影皆符見澠水燕談夢名孫夢得初名貫字道卿嘗語予曰某舉進士過長安夢登塔見持一大文卷者問之云來年春榜索而視之不可問其間有孫貫否曰無惟第三人有孫抃既寤遂改名抃因字夢得又數日至華隂與數人同詣金天帝廟乞靈且求夢夜中夢明忩下草制誥諸同人相慶曰他日為知制誥翰林學士矣雖未以為信然乃隂自喜明年第三人及第其後為直集賢院知制誥如其夢云又云其初得此夢甚喜及才作翰林學士頗嫌之矣人心自無足耳是時夢得已為㕘知政事月俸祿差厚耳學士亦不甚相逺但清優不如學士而勞貰過之又有堂吏嘗夢火山軍姓劉人作狀元閲火山軍解文無姓劉人明年劉煇作狀元能作賦有聲塲屋人不以行許之歴江寧河中簽判卒見秉齋記事二元豐中汶上梁逖一夕夢奏事殿中見御座前揭一牌金箔大書黄裳二字意必貴兆也因改名黄裳明年御前賜進士第劔南黄裳為天下第一三王彦祖初名元宗慶厯二年方勝冠廷試應天以實不以文賦罷寢旅舍夢一人告之曰君今年未當中第彦祖甚不平且責之曰子未嘗見予程文又未始知予生年月日時何從而知未中第其人笑曰君中選賦題天字在下君當三中選皆然今題天字在上第二字是以知其未也及唱名果不預選次舉春試不利於禮部八月再預廷試盖軫象天地賦又復見黜至皇祐五年免解赴禮部前以感疾困眠夢至一大府見二人因懇求生平禄命二人笑不答再叩來年得失其人指面前池水曰待此分流君即登第覺以水分流而池不能流決無中第望矣乆之乃寤即更名汾以符水分之兆及試禮部嚴父莫大於配天廷試圓丘象天皆中高選其後召試學士院又賦明王謹於事天得帖館職皆符夢中之言角聲元祐四年夏予初至河東一日與郡僚旅見提刑孫亞夫孫曰近日府中角聲不和咎在太守時蒲資政方到府未逾月落職知虢州數日獨見孫曰角聲愈不和矣未幾王震待制自同復鎮蒲七日丁母夫人憂去至九月中孫復語郡官曰角聲不和尤甚前日尋報闕中行龍圖自襄移蒲十月到官明年暴病卒其驗如此不知何術也占星景徳四年司天監史序奏今年太歳丁未六月二十五日五星當聚於周既而重奏臣尋推得五星自閏五月二十五日近太陽行度按甘氏星經曰五星近太陽而輙見者如君臣齊明下侵上之道也若伏而不見即臣讓明於君此千百載未有也但恐今夜五星皆伏真宗親御禁臺以候之果達旦不見大赦天下加序一官羣臣表賀見湘山野録千葉牡丹李司空昉淳化中家園牡丹一歳中有千葉者五苞特為繁艶李公置酒張樂召賓客以賞之自是一歳内長㓜凡五喪盖地及物之驗見楊文公談苑改恩州慶厯七年貝州卒王則據城叛召明鎬加討久無功參知政事文彦博請行於是仁宗欣然遣之且曰貝字加文敗卿敗賊必矣未逾月以捷報聞詔拜平章事曲赦河北改貝為恩見澠水燕談蛇精魚諫議周詢知安州一日園中園吏見大蛇乘欄楯上熟視之乃周詢醉而假寐也子壽亦嘗言周詢於相法為蛇形蔡君謨知福州以疾不視事者累日每夜中即夢登鼓角樓凭鼓而睡通判有怪鼔角將累日不打三更者因對數夜有大蛇盤據鼔上不敢近君謨既與通判言所夢正與鼔角將所說同人遂以君謨為蛇精見東齋記事彭蠡湖神張洎嘗涉彭蠡湖一夕夢古衣冠候之禮甚恭且言居止在側他日願為整葺洎既寤訪於舟人云湖畔有左蠡里祠至則神像如夢中所見洎歸中朝參大政至道中里民將葺廟廟側有人夢神云自有人治之汝不當因遣人崇飾吳俶為記木中有文木中有文多是柿木治平初杭州南新縣民家析柿木中有天上火國四字予見之書法類顏真卿極有筆力國字中間或仍挑作尖口全是顏筆知其非偽者其横畫即是横理斜畫即是斜理其木直剖偶當天字中分而天字不破上下兩畫并一脚皆横挺出半許如木中之節以兩木合之如合契焉雹作人面形熙寜中河州雨雹大者如雞卵小者如蓮芡悉如人頭耳目口鼻皆具無異鐫刻次年王師平河州蕃戎授首者甚衆豈克勝之符預告耶見沈存中筆談五來子建隆初京城唱五來子新番之曲其後下荆州克湖南平西蜀收嶺表復江左凡五國來朝乃其䜟也崇文院詩淳化中崇文院西序直肆廬絶高處有人題兩句詩云秋風送炎去庭樹葉齊落是年立秋日史館檢討宋炎罷軄來年立秋日葉齊黜馬相蹄踶至道二年四月内丞相暮歸將至西掖門參政張洎李昌齡馬相踶斷轡二人皆墜地冦準馬驚躍幾墜六月大雨泥濘洎晚歸馬渡橋墜前足没泥中折巾一角塗潦被體是秋洎被病明年罷政事卒其年七月準罷來年夏昌齡坐交通内侍王繼恩下獄貶許州行軍司馬酒病殿中丞王全吳人嗜酒常沉醉為嶺南知州日縱酒忽一日臍裂有聲以榼承之得清酒斗餘後數日乃卒見澠水燕談蜀中桃符辛寅遜仕偽蜀孟昶為學士王師致討之前歳除昶令學士作書兩句寫桃符上寅遜題曰新年納餘慶佳節契長春明年蜀亡吕餘慶以參知政事知益州長春乃太祖誕聖節名寅遜歸朝為太子中允上疏諫獵詔褒之見楊文公談苑唱第日五色天聖五年三月二十四日唱進士第於崇政殿甲科未絶而日五色于上羣臣皆賀後議者以為韓魏公同升諸公雖多至二府而終福社稷則属公焉見魏王别録駕幸汾陰祥符四年車駕幸汾陰起偃師駐蹕永安天文院測驗渾儀杜貽範奏卯時一刻日有赤黄輝氣變為黄珥又變闕氣已時後輝氣復生見湘山野録事實類苑卷四十九

body:
  text: 事實類苑卷五十宋江少虞撰占相醫藥陳希夷祖宗居潜日與趙韓王遊長安市時陳摶乘一驢遇之下驢大笑巾簪幾墜左手握太祖右手挽太宗曰可相從市飲乎祖宗曰與趙學究三人並遊可當同之陳睥睨韓王甚久徐曰也得也得非渠不可預此席既入酒舍韓王足疲偶坐席左陳怒曰紫微帝垣一小星輒據上次可乎斥之使居席右見湘山野錄二錢文僖公若水少時謁陳摶求相骨法陳戒曰過半月請子却來錢如期而往至則邀入山齋地爐中一老僧擁衲瞑目附火於爐旁錢揖之其僧開目稍視失遇待之體錢頗嫌之三人皆嘿坐特久陳發語問曰如何僧搖頭曰無此骨既而錢公先起陳戒之曰子三兩日却來錢曰唯後如期謁之摶曰吾始見子神氣清粹謂子可學神仙有昇舉之分然見之未精不敢奉請將召此僧決之渠言子無仙骨但可作貴公卿耳問其僧何人曰麻衣道者見湘山野録三王克正仕江南厯貴官歸本朝直舍人院及死無子其家修佛事為道塲唯一女十餘歳縗絰捧爐跪像前㑹陳摶入弔出語人曰王氏女吾雖不見其面但觀其捧爐手相甚貴若是男子當白衣入翰林女子嫁即為國夫人矣後數年陳晉公恕為參知政事一日便殿奏事太宗從容問曰卿娶誰氏有幾子晉公對曰臣無妻今有二子太宗曰王克正江南舊族身後唯一女頗聞令淑朕甚念之卿可作配晉公辭以年高不願娶太宗敦諭再三晉公不敢辭遂納為室不數日封郡夫人如陳之相也異僧太宗八子真宗為第三已封壽王詔一異僧忘其名入禁中遍相諸王已見七王已惟真宗時方寢息未得見之僧奏曰遍觀諸邸皆不及壽王上曰卿未見安得知僧曰見三僕立其門皆將相材器其僕既爾主可知矣三僕者乃張相耆楊相崇勲郭太尉承祐王冀公王冀公欽若鄉薦赴闕張僕射齊賢時為江南漕以書薦謁錢公希白公時以才名方獨步館閣適㑹延一術士以考休咎不容通謁冀公喝促門下厲聲詬閽人術者遙聞之謂錢曰不知何人也若聲形相稱世無此貴但恐形不副聲耳願邀之使某獲見希白召之冀公單微逺人神貌踈瘦復贅於頸而舉止山野希白蔑視之術者悚然側目瞻視冀公起術人稽顙稱嘆曰人中之貴有此十全者錢戲曰中堂内便有此等宰相乎術人正色曰公何言歟且宰相何時而無此君不作則已若作之則天下康富而君臣相得至死有慶而無弔不完者但無子而已錢戲曰他日將陶鑄吾輩乎術者曰恐不在他日即日可待願公無忽後希白方為翰林學士冀公已大拜夏侯嘉正夏侯嘉正荆南人劉童子者幼瞽善聲骨及命術謂公曰將來須及第亦有清職惟得聲貴其餘俱無已俸外有百金横入不病則死後至正言直命充益王生辰使得金幣方輦歸私第欲留之為潤屋忽一緡自地起立久而方仆遂感疾月餘而卒僧化成熙寧八年吕恵卿為㕘知政事權傾天下時元㕘政絳為翰林學士判郡牧常問三命僧化成曰吕㕘政早晚為公化成曰吕給事中為㕘政譬草屋上置鴟吻耳元曰然則其不安乎成曰其黜免可立而待也是時春方半元曰事應在何時有消息成曰在今年五月十七日元憮然不測潜記之既而吕權日盛臺諫噤口無敢指議之者㑹五月十七日元退朝因語府界提學蔡確曰化成言吕㕘政禍在今日真漫浪之語也二公相視而笑遂同還郡牧促召化成而謂之成曰言必無失姑夕候之二公愈歎其術之非既而化成告去蔡亦上馬是時曽待制孝寛同判牧薄晚來㕔方即坐元因訪今日有何事曽曰但聞御史蔡承僖入劄子不知言何等事也語未已内探報今日蔡察院言吕㕘政兄弟元聞之大駭乃以化成之言告曽公既而吕罷政事實始此也費孝先唐坰知諫院成都人費孝先為作卦影畫一人其衣紫持弓箭射落一雞坰語人曰持弓者我也王丞相生於辛酉即雞也必因我射而去位則我亦從而貴矣翊日抗䟽以彈荆公又乞留班頗諠於殿陛上怒降坰為太常寺太祝監廣州軍資庫以是八月被責坰歎曰射落之雞乃我也東軒筆録二自至和嘉祐以來費孝先以術名天下士大夫無不作卦影而應者甚多獨王平甫不喜之嘗語人曰占卜本欲前知而卦影驗於事後何足稱耶章郇公章郇公慶厯中罷相知陳州􅋈舟蔡河上張方平宋子京俱為學士同謁公公曰人生貴賤莫不有命但生年月日時胎有三處合者不為宰相亦為樞密副使張宋退召術者泛以朝士命推之惟得梁適吕公弼二命各有三處合張宋歎息而已是時梁吕二公皆為小朝官既而梁為相皇祐中熙寧中吕為樞密使皆如郇公之言陳恭公陳執中好閱人而解賓王最受知初為登州黄縣令素不相識執中一見即用大勅舉京官及後作相又薦館職賓王仕至工部侍郎致仕家雄於財諸子皆京秩年七十餘卒賓王為人方頭大口敦龎重厚左足下有黑子甚明大寔亦福人也馬尚書馬尚書亮知廬州見翰林王公洙為小官馬公曰子全似宋尚書異日官至八座日加異待通判嫉之後羅織王公遂以罪免乃曰你這囬更作宋尚書其後王公竟登近侍及卒贈尚書吳處厚予嘗謂風鑒一事乃昔賢甄識人物㧞擢賢才之所急非市井間卜相之流用以賈鬻取資者故春秋單襄公成肅公之徒毎遇㑹同則先觀威儀以省禍福而前世郭林宗裴行儉又考器識以言臧否然亦粗知大槩嘗與富文忠公論之文忠曰觀子之論多取豐厚者是則屠兒䬪飥斯皆貴矣余復思之大凡相之所先全在神氣與心術更或豐厚其福十全固語曰今王逺角犀豐盈而此頑童窮固則豐盈固賢哲相也楊文公楊公大年尤負藻鑑在翰林日與章郇公共事常言郇公異日作相己所不及又見著作佐郎張士遜知其有宰相器即薦之由此大拜又鄉人吳待問嘗從公學公語其徒曰汝輩勿輕小吳異日須登八座亦有年壽後皆如其言待問即春卿沖卿父也錢副樞若水嘗遇異人𫝊相法其事甚怪錢公後𫝊楊大年故世稱此二人有知人之鑒仲簡𫝊州人也少習明經以貧傭書大年門下大年一見竒之曰子當進士及第官至清顯乃教以詩賦簡天禧中舉進士第一甲及第官至正郎天章閣待制以卒謝希深為奉禮郎大年尤喜其文每見則欣然延接既去則歎息不已鄭天休在公門下見其如此怪而問之大年曰此子官亦清要但年不及中壽爾希深官至兵部員外郎知制誥卒年四十六皆如其言謝希深初以奉禮郎鎖㕔應進士舉以啟事謁見大年有云曳鈴其空上念無君子者解組不顧公其如蒼生何大年自書此四句於扇曰此文中虎也由是知名張堯封張堯封者南京進士也累舉不第家甚貧有善相者謂之曰視子之相不過一幕職然君貴骨必享王封人初莫曉其㫖其後堯封舉進士及第終於幕軄堯封温成皇后父也后既貴堯封累贈太師中書令兼尚書令封清河郡王由是始悟相者之言見歸田録李文靖文靖李公沆布衣時先正端公炳知舒州属因事涉江公寔侍行俄而風濤暴作舟幾覆時有大校王某者善風鑑曰此有真相孰敢為害何懼之有是日果利涉無虞衆皆神其事及公之貴王校尚存焉魏王語録張永徳周朝駙馬都尉張永徳輕財好施喜延接方士嘗遇異人言及時事且曰天下將太平真主已出永徳曰其誰乎曰天意所兆安能識諸然而有事庶幾可驗公或覩紫黑色属猪人善戰果於殺伐者善待之永徳常陰自求訪及太祖皇帝勲位漸盛永徳因潛識帝之英表問其生歳在亥永徳駭歎其事乃傾身親附相得甚歡凡己之所有玩好資用子女玉帛必先恣帝擇取有餘乃以自奉至國初乃以舊恩禮貌富貴與佐命勲戚同等終太祖世無替焉丁晉公晉公言趙普初罷隴州判官到京至日者王勛卜肆問命次簾下㸔范魯公質騶從稍盛歎似此大官修個甚福來得到此勛曰員外即日富貴更强於此何足歎羡往往便為交代亦未可知後果如其言晉公談録僧奉真四明僧奉真良醫也天章閣待制許元為江淮發運使奏課於京時方欲入對而其子疾亟瞑而不食惙惙欲死逾宿矣使奉真視之曰脾已絶不可治死在明日元曰觀其疾勢固知其不可救今方有事須陛對能延數日之期否奉真曰如此似可諸臟皆已衰而肝臟獨過脾為肝所勝其氣先絶一臟絶則死若急㵼肝氣令肝氣衰則脾少緩可延三日過此無術也乃投藥至晚乃能張目漸蘇而能食元甚喜奉真曰此不足喜肝氣暫舒耳無能為也後三日果卒閩王延政閩中王氏兄弟尋干戈之釁延政以建汀二州稱帝國號大殷郊壇於郎山以延平縣為鐸州以將樂縣為鏞州凡四州焉立三年為江南所滅延政歸金陵至鄱陽有一僧求見且言大王此去當有三大厄過是無咎矣因饋之藥凡大赤丸二小緑丸十云毎晨起即服大赤丸一至暮以五小丸下之復滌洗以寘鞶囊以備迭餌時中主多置鴆内宴獨賜巵酒延政既飲便已昏醉坐不安席而起趨出使人視之至宫外大嘔吐通夕無恙又月餘復宴苑中如前賜酒便已昏醉如是者三即時吐無所苦中主謂其有天助不敢復圖之建饒州為永平軍以延政為節度使封光山王延政祖潮光州故也延政至鄱陽泊船故處復見其僧云當以藥見還三厄無憂矣在鎮數年以壽終陳昭遇陳昭遇者嶺南人善醫隨劉鋹歸朝後為翰林醫官所治疾多愈世以為神醫純朴不讀書詰其所習不能答嘗語所親曰我初來都下持藥囊抵寧壘中日閱數百人其風勞冷氣之候皆黙識之然後視老幼虛實按古方用湯劑鮮不愈者實未嘗尋脉訣也莊周所謂懸解董遇以為讀書百遍義自見豈是謂歟吳越王錢鏐世言錢鏐年老一目失明聞中朝國醫胡某者善醫上言求之晉祖遣醫泛海而往醫視其目曰尚父可無療此當延六七歳壽若决瘼去内瘴眼即復舊但慮損福耳鏐曰吾得不為一目鬼於地下足矣願醫盡其術以療之當厚報醫為治之復故鏐大喜丸賂醫金帛寶帶計五萬緡具舟送醫歸京師醫至鏐卒年八十一矣醫之孫收得鏐與其祖書數幅曽孫惟演贖得親見焉太宗校醫人賈黄中為禮部侍郎兼起居監察中風眩卒太宗悼惜之切責諸醫大搜京城醫工凡通神農本草黄帝難經素問及善針炙藥餌者校其能否以補翰林醫學及醫官院祗候王繼忠真宗為開封尹呼道衢中鐡盤市卜一瞽者令張耆夏守贇楊崇勲左右數輩揣聽聲骨日因以為娛或中或否獨相王繼忠瞽者駭之曰此人可訝半生仕中朝半生事外國真宗笑而遣去繼忠後為觀察使高陽搃管咸平六年敵冦望都與敵酣戰至一夜敵騎合圍數十重徐戰徐行欲傍西山而遁至城陷被俘上聞之甚嗟悼景徳初敵人乞和繼忠與撰奏章而諷勸誘掖大有力焉朝廷方知其存後每歳遣使真宗手封御帶藥茗以賜焉繼忠服漢章南望天闕稱未死臣哭拜不起聖體起居下避敵嫌以其姿儀雄美敵以女妻之封偽吳王改姓耶律卒於外國為陷畨王氏也見玉壺清話史炤母張氏史中暉之母張氏能知人觀其所為而知其貴賤貧富文潞公張杲卿高敏之吕公初舉進士時皆館其家極禮待之言潞公杲卿敏之大貴公初有名而不達後皆如其言中暉名炤為光禄卿公初終於大理寺丞國子監直講見東齋記事寇忠愍寇忠愍初登第授大理評事知歸州巴東縣時唐郎中謂方為郡夕夢有人告云宰相至唐思之不聞朝廷有宰相出鎮者晨興視事而疆吏報寇廷評入界唐公駭喜出迎郊勞見其風神秀偉便以公輔待之且出諸子羅拜唐新飾􅀈勒置㕔之左寇既歸船其子極白其父曰適者寇屢目此宜即送之寇果詢牙校何人知吾欲此對以十四秀才既而力為延譽遂於孫漢公榜中甲第成名見倦遊雜録事實類苑卷五十

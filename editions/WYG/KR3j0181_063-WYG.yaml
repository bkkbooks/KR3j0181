body:
  text: 事實類苑卷六十三宋江少虞撰風俗雜誌犀犀之類不一生邕管之内及交趾者角文如蔴實理燥少温潤來自船上生大食者文如茱茰理潤如綴光彩瑩徹甚類犬鼻若傅以膏甚有花文而尤異者曰通天犀或如日星或如雲月或如葩花或如山水或成飛走或成魚龍或成神仙或成宫殿至有衣冠睂目杖履羽毛鱗角完具若繪畫然為世所貴其價不貲莫知其所以然也或以犀愛一物玩之之久則物形潜入角中是又不可以理推之者其文有正挿者有倒挿者有腰鼓挿者其類不一方其角之未解也雖海人亦未知其為異也故波斯以象牙為白暗犀角為黒暗以其難别識也犀之有通天花文者自顧其影則怖常飲濁水不欲照見其角也海人之取犀也多於山麓植木如列羊棧久則木朽犀前足短止則依木而立朽折犀倒不能自立因格殺之犀嵗亦退角培土埋僻處海人偵知為木角易取之西域謂犀為竭伽角為毗沙拏言一角也澠水燕談酒令唐人飲酒喜以令為罰韓吏部詩曰令徴前事為白傅詩云醉翻襴衫抛小令今人以絲管歌謳為令者即白傅所謂大都欲以酒勸故始言送而繼承者辭之搖首按舞之属皆却之也至八遍而窮斯可受矣其舉故事物色則韓詩所謂耳近嵗有以進士為舉首者其黨人意侮之㑹其人出令以字偏旁為率曰金銀釵釧鋪次一人曰絲綿綢絹網至其黨人曰鬼魅魍魎魁俗有謎語曰急打急圎慢打慢圓分為四段送在窰前初以陶元乃為令耳劉貢父詩話二酒令謂飲酒有舞手者逺起于堯民也既醉以酒浩然陶情不覺鼔腹手舞盖無事醉飽樂極則然也嘗聞風俗聞言飲酒欲勸無由自醉得飲則沈湎矣乃有設舞手即解之時欲以酒属前人則舞手招之前人辭之則舞手拂為又以手作期刻之勢以恤其不飲前人不受作叩頭之状如是則有招也拂也期也刻也而後機巧生焉以四字合為章段伺其手舞不及樂拍不合律者皆為犯酒家令也主者以分數罰之然詩中稱取彼兕觥又云不醉無歸不醉而出是不親也其來不近矣東漢賈景伯著酒令九篇始形載籍然終尋求未見唐高宗鄧宏慶以平素有精為令始也及天寶以來海内無事京師人家多聚飲樂歌令新奇故穆宗好聲技觀教坊樂問丁公著曰比聞公卿云庶俗為酣燕皆極歡娛亦可為慰公著曰此事誠不可嘉且言賓燕之禮不繼以淫前代名士或清談雅論詠歌獻酬不至於亂天寶之末風俗奢靡沈醉諠譁由是官務多廢聖心求理安得不勞神慮帝深嘉其言後皇甫松撰醉鄉日月一卷言醉樂如入壺中天也亦無舞手飲酒之法其次有崔端已著庭萱譜令之所出象有漸然也言萱草一名忘憂也謂始解體恣其放縱則忘憂也然則賈逵濫觴于其前皇崔波瀾于其後梁元帝宴集屬不二為酒令規曰江左以來未有此舉蕭探傳詔謂為知言也吳都賦曰里讌巷飲飛觴舉白凡犯令者罸之詩曰振振鷺鷺于下鼓咽咽醉言舞于胥樂兮贊寧要言採珠嶺南襍録曰海灘之上有珠池居人探而取之予甞知容州與浦宻近頗知其事珠池凡有千餘處皆海也非在灘上自某縣岸至某處是某池若靈漉􅇸材田場條樓斷望皆其名也悉相接在海中但因地名而殊矣斷望地接交趾界産大珠而蜑往採之多為交人所掠海水深數百尺以上方有珠往往有大魚䕶之蜑亦不敢近倦逰襍録二劉鋹據嶺南置兵數千人以採珠為事目曰媚川都每以石硾其足入海至五七百人溺而死者相屬也久之珠璣充積内府所居殿宇梁棟簾箔率以珠為飾窮極華侈及王師入城一火而盡藝祖詔廢媚川都㸃其壯者為軍老者放歸田里仍詔百姓不得以採珠為業於是俗知務農矣澠水燕談鴿寄書古詩云袖中有短書欲寄雙飛燕詩意以燕春去秋來似可寄書故偶然耳今人則養鴿通信皆非虛言也雖至外數千里縱之輒能還家蜀人有事至京師者以鴿寄書不旬日皆達及賈人船浮海亦以鴿通信陸機使黄耳寄書此殆不然自洛至吳更歴江淮犬何能浮水必從舟楫犬豈能喻意渉事也若此犬通神不可測度則不從言説耳或者陸氏有奴名黄耳因此以為真狗也劉貢父詩話俗謂州郡事簡者為道院江陰軍北距大江地僻鮮過客無將迎之煩所𨽻一孤公事絶少通州南阻江東北瀕海士大夫罕至居民以鹽魚自給不為盜賊訟稀事簡仕宦二州者最為安逸故士大夫謂江陰為兩浙道院通州謂淮南道院澠水燕談仕宦嶺南嶺南諸州多瘴毒嵗閏尤甚近年多選京朝官知州及吏部選授三班使臣生還者十無二三雖幸免死亦多中風氣容色變黒數嵗發作頗難治療舊日小縣及州郡官率用士人攝官涖之習其水土後言事者以為輕逺任朝廷可其言稍益俸入加以時養貪冒之徒多亦願往雖喪軀亦不悔也舉子投䞇國初襲唐末士風舉子見先達先投刺字謂之請見既與之見他日再投啟事謂之謝見又數日再投啟事謂之温卷或先達以書謝或有稱譽即别裁啟事委曲叙謝更求一見當時舉子之於先達者其禮如此之恭近嵗不復行此禮而上官亦鮮有延譽後進者澠水燕談二先公嘗言近日舉子多紫衣皂衫乘馬以虎豹皮裝飾鞍韉謁見士大夫並不以箋啟為先容往往仍不具襴鞹甚無謂也吾不敢以逺事言之只記後唐明宗朝公卿大僚皆唐室舊儒務以禮法相尚其時進士明經皆衣紵布襴衫藍鐵帶着靴乘驢䮴角木不施􅙧􅴿重帶書筒照袋書筒貯門狀照袋貯筆硯紙墨照見前製説毎見公卿門並數步外下驢整衣冠歛樸然後躬趨門下求執事者通箋啟刺字請見既得他日復投啟事謂之謝見又數日如袖文卷授以執事閽者不更求見又數日後投啟事謂之温卷大都見不可數數則黷黷則見待之禮懈矣或大僚有書題詩卷他處聞有稱譽之言則别裁啟事委曲叙感不可更求一見當時進士各以所業止投一卷至兩卷但于詩賦歌篇古調之中取其最精者投擲兩行卷號曰雙行謂之多矣故桑魏公維翰只行五首賦白少李椇愚只行五首闕但取大名以至大位豈必以多為貴哉裴説補闕只行五言十九首至來秋復行舊巻人有譏之者裴曰只此十九首者今尚未有人見知何暇别行卷哉識者以為知言故兵部侍郎祐狀元轍之子其父與桑魏公同年祐既幼孤文章有天才祐纔冠以啓投桑公其文約數千字桑公一見大驚賞由是聲價溢于輦下以此言之益知惬心貴當文愈以見不在多行之驗也明宗晚年重榮為羣小所悞稱兵向闕洛下震驚憂患方寧靖而市肆未開居人閉門不敢出時有舉子數人乘驢並著大袴白衫戴皂紗帽往來于通衢間居人見者無不笑之是知敦尚儒雅乃昇平之美事耳開關之際猶以此卜治亂況他事乎李學士叢談泉水河中府舜泉坊二井相通所謂匿空旁出者也祥符中真宗祀汾陰駐蹕蒲中車駕親臨賜名廣孝泉井以名其坊御製贊紀之蒲瀕河地鹵泉鹹獨此井甘美世以為異二皇祐中范文正公鎮靑龍興僧舎西南洋溪中有醴泉湧出公構亭泉上刻石記之其後靑人思公之徳目之曰范公泉環泉古木䝉宻塵迹不到去市㕓纔數百歩而若在深山中者自是幽人逋客往往賦詩鳴琴烹茶其上日光玲瓏珍禽上下真物外之逰似非人間世也歐陽文忠公劉翰林貢父及諸名公各賦詩刻石而文忠公及張禹功蘓唐卿篆石榜之亭中最為營丘佳處元祐中靑守以其地與民為水磑稍復完葺三靑州城西南皆山中貫洋水限為二城先時跨水植柱為橋每嵗六七月間山水暴漲水與柱鬭率常壊橋州以為患眀道中夏英公守靑思有以捍之㑹得守城廢卒有智思叠巨石固其岸取大木數十相貫架為飛橋無柱至今五十餘年橋不復壊慶厯中陳希亮守宿州以汴橋壊率常損官舟害人命乃法靑州所作飛橋至今沿汴皆飛橋為往來之利俗曰虹橋並澠水燕談四齊州城西張意諫議園泉有金線泉甃方池廣袤丈餘泉亂發其下東注城濠中澄徹見底池心南北有金線一道隠起水面以油滴一隅則線文逺去或以杖亂之則線輒不見水止如故天陰亦不見齊為東方名郡而張氏濟南盛族園池乃郡之勝逰泉之出百年矣士大夫過濟南至泉上者不可勝數而無能究其所以然亦無一人題咏獨蘇子瞻有詩曰槍旗攜到齊西境更試城南金線奇然亦不辨泉之所以有金線也五雍熙二年鳯翔秦政山縣周公廟有泉湧舊老相傳時平則流時亂則竭安史之亂其泉竭至大中年復流賜號潤徳泉後又涸今其泉復湧澄甘瑩澈太宗嘉之湘山野録芋蘿蔔江東居民嵗課程藝初年種芋三十畆計省三十斛次年種蘿蔔二十畆計益米三十斛可知蘿蔔消食也爾雅葖蘆萉郭璞注萉宜為菔蘆菔蕪菁屬紫花大根俗呼雹葖更始敗掖庭中宫女數百人幽閉殿門内掘庭中蘆菔食之今蘿蔔也小窰李許州小窰出好李太常少卿劉蒙正有園在焉多植之每遣人負擔歸京師以遺貴要竊得嘗之絶大而味嘉所謂小窰李也並楊文公談苑蓬莪荗嶺南靑薑根下如合捧其旁附而生者狀如薑往往如大芋南人取其中者乾之名蓬莪术北人則呼為蓬莪荗字書亦無荗字名之為术乃是有人病淺痢者取青薑磨酒煑服之多愈蓋蓬莪术和氣耳魚河豚魚有大毒肝與卵人食之必死每至暮春栁花飛墜此魚大肥江淮人以為時珍更相贈遺臠其肉襍䕡蒿荻芽瀹而為羮或不甚熟亦能害人嵗有被毒而死者南人嗜之不已嶺南有五臠魚五百斜紋色如虹或云與蛇為牝牡春時如食其卵亦能殺人㗖其肉襍䕡必致嘔洩又有抱石魚狀類科斗生急灘石上凡廬陵南康雄韶人皆取食之釀䰻瀹羮以為奇味今之通逺軍乃古渭州之地渭源出焉中有水蟲類如鳥作覔覔之聲見者即以挺刃擊之多化為石可以為礪石曰覔石長尺餘直一二千兵刃經其磨者青光而不繡亦奇物也菩薩石嘉州娥睂山有菩薩石人多採得之色瑩白若太山狼牙石上饒水晶之類日光射之有五色如佛頂圓光出楊文公談苑鳯凰南思州北甘山壁立千仞有瀑水飛下猿狖不能至鳯凰巢其上彼人呼為鳯凰山所食以魚蟲遇大風雨或飄墜其雛小者猶如鶴而足差短南人截取其嘴謂之鳯凰盃古詩謂鳯凰生于丹穴即南方也盖此禽出塵寰之外能逺羅弋以為羽族之長者以其智能逺害逢時而出也本朝嘗集清逺合歡之樹鴆鳥至和中予赴任邕至金城馹一郵置早膳聞如以手答腰鼓者問郵卒曰何處作樂曰非也乃鴆鳥禁蛇耳並出倦逰襍録物性相感金橘産於江西以逺難致都人初不識明道景祐初始與竹子俱至京師竹子味酸人不甚喜後遂不至金橘香清味美置之尊俎間光彩灼爍如金彈丸誠珍果也都人初不甚貴其後因温成皇后尤好食之由是價重京師余世家江西見吉州人甚惜此果其欲久留者則于菉豆中藏之可經時不變云橘性熱豆性涼故能久也凡物有相感出于自然非人智慮所及皆因其舊俗而習知之今唐鄧間多大柿其初生澀堅實如石凡百十柿以一榠樝置其中榅桲亦可則紅熟爛如泥而可食土人謂之烘柿者非用火乃用此耳淮南人藏鹽酒蟹以皂莢半挺置其中則可藏經嵗不沙至于薄荷醉猫死猫引竹之類皆世俗常知而翡翠屑金人氣粉犀此二物則世人未知者余家有一玉罌制作甚古而精巧始得之梅聖俞以為碧玉在潁州時常以示僚属坐有兵馬鈐轄鄧保吉者真宗朝老内臣也識之曰此寶器也謂之翡翠云禁中寶物皆藏宜聖庫中有翡翠盞一隻所以識也其後予偶以金環於罌腹信手磨之金屑紛紛而落如硯中磨墨始知翡翠之能屑金也諸藥中犀最難搗必先鎊屑乃入衆藥中搗之衆藥篩羅已盡而犀屑獨存偶見一醫僧元達者解犀為小塊子方半寸許以極薄之紙裹置於懐中近肉以人氣蒸之候氣薰蒸浹洽乘熱投臼中急搗應手如粉因知人氣之能粉犀也然今醫工皆莫有知者歸田録沈香木沈香木嶺南諸郡悉有之瀕海諸郡尤多柯葉交䕃崗嶺相接數千里不絶葉如冬靑大者合數人抱木性虛柔山民或以創茒廬或為橋梁為飯甑尤佳有香者百無一二盖木得水方結香多在折枝枯榦中或為沈或為箋其黄熟自枯死者謂之水盤今南息髙竇等州惟産生結香盖山民入山見山木之曲榦斜枝必以力折之成坎經年得雨水所漬遂結香復鋸取之刮去白木其香結為班㸃亦曰鷓鴣班燔之極清烈沈之良者惟在瓊崕等州俗謂角沈乃生木中取者宜用薰衣黄沈乃枯木中所得者宜入藥用依木皮而結謂之靑桂氣尤清山中嵗久不待刻剔而精者謂之龍鱗亦有削之自卷咀之柔軟者謂之黄蠟沈尤難得倦遊雜録二嶺南雷州及海外瓊崕中多香樹山中夷民折采賣與人其一樹出香三等曰沈香曰箋香曰黄熟香沈箋皆二品曰熟結曰生結熟結者樹自枯爛而得之生結者伐仆之久爛脫而剔取黄熟有三品曰莢曰箋其破者為黄散香夷民率以香樹為槽以飼雞犬未嘗珍惜足貴也麝裂臍狨犛牛斷尾公嘗言商汝山多羣麝所遺屎嘗就一處雖逺近食必還走之不敢遺迹也所慮為人獲人反以是求得必掩羣而取之麝絶愛其臍毎為人所逐勢且急即自投髙巗舉爪裂出其香就縶而死猶抱四足保其臍李商隠詩云投巗麝退香許渾云尋麝殺生香是也狨類鼠而大尾長而金色生川峽深山中人以藥矢射殺之取其尾以擲之惡其為身患杜甫詩云狨擲寒條馬見驚盖輕捷善縁木猿猱之類也犛牛出西域尾長而脛短中國以為纓人或射之亦自斷其尾而莊周以牛白顙豚之亢鼻與人有痔病者巫祝不以適河乃無用之為大祥也鼃變為鶉至道二年夏秋間京師鬻鶉者積于市諸門皆以大車載而入鶉纔直二錢是時雨水絶無鼃聲人有得於水次者半為鶉半為鼃乃鼃之變也列子天瑞篇曰鼃變為鶉張湛注云事見墨子斯不謬矣又田鼠變為鶉盖物之變非一揆也猩猩猩猩南中獸山海經云如豕而人面汲冢周書云狀如黄狗人面頭如雄雞酈元水經云形如黄狗而面目端正善與人言聲音妙麗如婦人對語聞之無不酸楚其血可以染紈素尤為絶好太宗平嶺南求得猩猩如雞鴨而大取其血以染色如渥丹與傳記所載不類鸕鷀捕魚士人劉克博觀異書杜甫詩有家家養烏鬼頓頓食黄魚世之説者皆謂䕫峽間至今有鬼户乃夷人也其主謂之鬼主然不聞有烏鬼之説又鬼戸者夷人所稱又非人家所養克乃按䕫州圖經稱峽中人謂鸕鷀為烏鬼蜀人臨水居者皆養鸕鷀繩繫其頸使之捕魚得魚則倒提出之至今如此予在蜀中見人家養鸕鷀使捕魚信然但不知謂之烏鬼耳筆談病癭夫頸處嶮而癭今汝洛間多而浙右閩廣山嶺重阻人鮮病之者按本草海藻昆布主癭瘤注云凡海菜皆療瘤結氣青苔紫菜亦然盖瀕海之邦食其惟錯之味能療之也土厚水深無病公嘗言春秋傳曰土厚水深居之無病言其為燥予往年守郡江表地氣卑濕得痔漏下血之疾垂二十年不愈未嘗有經日不發景徳中從駕幸洛前年從祀汾陰往還皆無恙今年退卧潁陰濱嵩少之麓井水深數丈而絶甘此疾遂已都城土薄水淺城南穿土尺餘已沙濕盖自武牢已西接秦晉之地皆水土深厚罕發痼疾白鹿洞藏書江州廬山白鹿洞李公擇嘗聚書籍以招徠四方之學者有膳田數十頃給之選大學中庸者授以他官領洞事以職教授自江南北為學者争凑焉常數百人厨廩置給太平興國初有王明起諫議以田入官而齒仕籍得蔡州褒信簿既乏供餽學徒日散室廬隳壊因而廢焉建州多佛刹人言吾鄉建州山水奇秀江淹為建安令以為碧水丹山靈木珍草皆平生所至愛不覺行路之逺即吾邑也而巖谷幽勝上人多創佛刹落落相望闕曰州所領十一場縣後分置邵武軍割𨽻劍州今所管六縣而建安佛寺三百五十一建陜二百五十七浦城一百七十八崇安八十五松溪四十一關𨽻五十二僅十區而杜牧江南絶句云南朝四百八十寺六朝帝州之地何足多也並楊文公談苑少虞自幼喜雜覽家居摘諸史雜記闗於風化者纂成此編題曰皇宋事實類苑始於本朝祖宗聖訓終于風土雜誌搃六十三卷少虞不敏豈敢有著述但傳舊而已考之嵗月越十四寒暑更俟博洽君子訂焉紹興戊寅九月日江少虞志事實類苑卷六十三

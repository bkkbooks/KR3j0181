body:
  text: 事實類苑雜家類五雜纂之屬提要臣等謹案事實類苑六十三卷宋江少虞撰少虞字里未詳據序首自題稱左朝請大夫權發遣吉州軍州事而江西通志亦未載其履貫盖其事蹟己不可復考矣其書成於紹興十五年以宋代朝章國典見於諸家記録甚多而畔散不屬難於稽考因為選擇類次之分祖宗聖訓君臣知遇名臣事迹徳量智識頋問奏對忠言讜論典禮音律官政治績衣冠盛事官職儀制詞翰書籍典故沿革詩賦歌詠文章四六曠逹隠逸仙釋僧道休祥夢兆占相醫藥書畫技藝忠孝節義將相才畧知人薦舉廣知搏識風俗雜誌凡二十四門自序作二十八門盖𫝊録之訛也所引之書悉以類相從全録原文不加増損而以書名注明毎條之下共六十餘家凡用功十四年而成故徵採極為浩博至其雜摭成編有一事為兩書所載而先後並存者又如邉鎬稱邉和尚等事及諸家詩話所摘唐人詩句皆與宋朝事實無闗亦槩録之未免有汜濫之失然北宋一代遺文逸事畧具於斯實可資於辨証王士禎居易録稱為宋人説部之宏偹而有禆於史者良非虚語至其間若國朝事始三朝聖政録三朝訓鑒蓬山志忠言讜論元豐聖訓傅商公佳話兩朝寳訓熈寧奏對劉真之詩話李學士叢談等書俱已久佚無𫝊均藉此足以考見一二是尤説家之總彚矣王士禎又載此書四十卷而今本寔六十三卷檢勘諸本皆合並無同異疑亦士禎筆誤之失云乾隆四十四年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀事實類苑原序古之史者載籍極博其所表見皆不虚書其軼乃時時見於他說不可不知也太史公網羅天下放失舊聞至於分散数家之事則甚多䟽略後世猶或非之然則自漢以来千有餘嵗君臣善惡治亂之外紛紛籍籍日有日繁使論著之人随世裒掇有所未盡况軼入他説者歴年浸乆踈殘之餘不少槩見則史失其傳矣史冊所無有學者不道也錯亂磨滅不可復知者可勝計耶我宋肇興聖神克繼垂二百年太平憲物容典踵古治而増華未有緝熈炳煥可考如今者也不刋信史誠足以表覈萬代然而秘省䆳嚴非外學所得見若其遺文逸説事羙一時語流千載者縉紳先生尚能言之徃徃皆前日今世巨公名卿老師宿儒以其所接於耳目可以警憲於世者筆之載録𫝊紀無慮數十家嘗惜其畔散不屬難以稽考曩因餘暇備極討論自一話一言皆比附倫類而整齊之去其文不雅馴或有牴牾者自餘據實條次不敢以一字増損總凡㑹目合為一書名曰皇宋事實類苑聖謨神訓朝事典物與夫勲名賢逹前言徃行藝術仙釋神怪之事異域風俗之殊纎悉備有釐為二十八門選義按部考詞就班如出一家語不待旁捜逺覽而太平遺逸之羙麗具在足以觀見當時風政庶幾乎尚有典刑哉此學士大夫之所欲聞亦喜𫝊而樂道也深愧識見淺陋擇焉不精取焉不詳故於毎門之末不敢斷以已意録而存之將以有望於後之君子云紹興十五年五月十七日江少虞謹序

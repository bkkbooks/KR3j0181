body:
  text: 事實類苑卷四十宋江少虞撰詩歌賦詠沈存中論文韓退之集中羅池神碑銘有春與猿吟兮秋與鶴飛今驗石刻乃春與猿吟兮秋鶴與飛古人多用此格如楚詞吉日兮時良又蕙肴蒸兮蘭藉奠桂酒兮椒漿盖欲相錯成文則語勢矯健耳杜子美詩紅稻啄餘鸚鵡粒碧梧棲老鳯凰枝此亦語反而意全韓退之雪詩舞鏡鸞窺沼行天馬度橋亦効此體然稍牽強不若前人之語渾成也二唐人以詩學主人物故雖小詩莫不埏蹂極工而後已所謂旬鍛月鍊者信非虚語小説崔䕶題城南詩其始曰去年今日此門中人面桃花相映紅人面不知何處去桃花依舊笑春風後以其意未全語未工改第三句曰人面祇今何處在至今所傳此兩本唯本事詩作祇今何處在唐人工詩大率多如此雖有兩今字不惜也取語意為主耳後人以其有兩今字只行多前篇三小律詩雖末技工之不造微不足以名家故唐人皆盡一生之業為之至於字字皆鍊得之甚難但患觀者滅裂則不見其工故不惟為之難知音亦鮮設有苦心得之者未必為人所知若字字皆是無有瑕疵語音亦掞麗但細論無功景意縱全一讀便盡更無可諷味此類最易為人激賞乃詩之折楊黄華也譬若三館楷書作字不可謂不精不麗求其佳處到死無一筆此病最難為醫也四晚唐士人專以小詩著名而讀書滅裂如白樂天座隅詩云俱化為餓莩作孚字押韻杜牧之秋娘詩云饜飫不能飴飴乃餳耳若作飲食當音飤又陸龜䝉作藥名詩云鳥啄蠧根回乃是鳥喙非鳥啄也又斷續玉琴哀樂上有斷絃無斷續此類極多如杜牧阿房宫賦誤用龍見而雩事宇文時解斯椿已有此謬盖牧未嘗讀周隋書也五古人文章自應律度不以音韻為主自沈約增崇韻學其論文則曰欲使宫羽相變低昂殊節若前有浮聲則後須切響一簡之内音韻盡殊兩句之中輕重悉異妙達此㫖始可言文自後浮巧之語體制漸多如旁犯蹉對假對雙聲叠韻之類詩又有正格偏格類例極多故有三十四格十九圖四聲八病之類今畧舉數事如徐陵云陪逰馺娑騁纎腰於結風長樂鴛鴦奏後聲於度曲又云厭長樂之踈鐘勞中宫之緩箭雖兩長樂意義不同不為重複此類為旁犯如九歌蕙肴蒸兮蘭藉奠桂酒兮椒漿當以蒸蕙肴對奠桂酒今倒用之謂之蹉對如自朱耶之狼狽致赤子之流離不唯朱對赤耶對子兼狼狽流離乃獸名對鳥名又如㕑人具雞黍穉子摘楊梅以雞對楊如此之類皆為假對如幾家村草裡吹唱隔江聞幾家村草對吹唱隔江皆雙聲如月影侵簮冷江光逼履清侵簮逼履皆叠韻詩第二字側入謂之正格如鳳暦軒轅紀龍飛四十春之類第二字平入謂之偏格如四更山吐月殘夜水明樓之類唐名賢輩詩多用正格如杜甫律詩用偏格者十無一二香奩集和魯公凝有艶詞一編名香奩集凝後貴乃嫁其名為韓偓今世傳韓偓香奩集乃凝所為也凝生平著述分為演綸游藝孝弟疑獄香奩籝金六集自為游藝集序云予有香奩籝金二集不行於世凝在政府避議論諱其名又欲後人知故於游藝集序實之此凝之意也予在秀州其曾孫和惇家藏諸書皆魯公舊物末有印記甚完見筆談大言賦蘇易簡為學士承㫖日太宗親書宋玉大言賦錫之易簡因効玉亦作大言賦以獻曰皇帝書白龍箋作大言賦賜玉堂易簡御筆煌煌雄辭洋洋瓖瑺博澾不可備詳詔易簡升殿躬指其理歎宋玉之奇怪也因伏而奏言恨宋玉不與陛下同時帝曰噫何代無人耶卿為朕言之易簡曰聖人興兮告成功登崑崙兮展升中地為席兮饗祖宗天起籟兮調笙鏞日烏月兔耀文明麾龍旗兮嚴武御也執北斗兮奠𤣥酒也削西華兮為石䃭也迅雷三發山神呼也流電三激烽火舉也禮冊獻兮淳風還君百拜兮天神歡四時一周兮萬八千年太山夷兮溟海乾圓盖空兮方輿穿君王之夀兮無窮焉殿上皆呼萬歲上覽之大喜又作小詩四句以褒之易簡刻石於院内之壁見楊文公談苑漁家傲范文正公守邊日作漁家傲歌數闋皆以塞下秋來為首句頗述邊疆之勞苦歐陽公嘗呼為窮塞主之詞及王尚書素出守平凉文忠亦作漁家傲一詞以送之其斷章曰戰勝歸來飛㨗奏傾賀酒玉階遥獻南山夀顧謂王曰此真元帥事也因詩起獄苖振以列卿知明州熈寧中致仕歸鄆州多置田産又自明州創材為堂舟載歸鄆時王逵亦致仕作詩嘲振曰田從汾上天生出堂自明州地駕來此句傳至京師王荆公大怒即出御史王子韻使兩浙亷其事子韻又言知杭州祖無擇亦有奸利之迹於是明州秀州各起獄鞫治振與無擇貶斥熈寧以後數以謡言起獄皆自逵詩為始也鳳棲梧詞蜀路泥溪驛天聖中有女郎盧氏者隨父徃漠州作縣自蜀歸題於驛舎之壁其序畧云登山臨水不廢於謳吟易羽移商􅂓縁於覊思因成鳳棲梧曲一闋􅂓書於壁後之君子覽之者無以婦人竊弄翰墨為罪詞曰蜀道青天烟藹藹帝里繁華迢遞何時至回望錦川揮粉淚鳳釵斜軃烏雲膩鈿𢃄雙垂金縷細玉佩珠璫露滴寒如水從此渺然添逺意畫眉學得遥山翠見倦遊録大小孤山宋景文言大小孤山以孤獨為字有廟江壖乃為婦人狀龍圖閣學士陳公簡夫留詩曰山稱孤獨字廟塑女郎形過客雖知誤行人但乞靈時稱佳句登吹臺詩先生嘗言恩門王公終於太子少保七十後精力猶不衰每天氣和暖必乘小駟從三四老蒼頭攜照袋照袋以皮為之四方有盖其中可容中貯筆硯韻畧刀子礪石牋紙數十幅并小樂器之類别置遊春盒隨事置酒炙三五人之具門生在京者多侍行每出郊野遇有園亭及竹樹之處必賞燕終日賦詩品小管色盡歡醉而歸吾忝左拾遺日適暮春與同門生五六人從公登繁臺佛舍繁臺即梁孝王吹臺也公是日飲酒賦詩甚歡抵夜方散嘗記得公詩曰桞隂如露絮成堆又引門生上吹臺淑氣即隨風雨去芳尊宜命管絃催謾誇列鼎鳴鐘貴寧免朝烏夜兎推爛醉也須詩一首不能空放馬頭回其天才縱逸風韻閒適皆此類也王彦威詩先公嘗言唐朝長安士大夫重内官而輕外任及兩制尤為華貴故自從郎或從翰苑出領節制者皆以為失意當方面者目為粗材自以張燕公有言愧無通材供國麄使又薛許昌謝茶詩云麄官乞與真抛却㑹有詩情合得嘗東京明德門今為乾元門即唐時汴州宣武軍鼓角樓至朱梁建都不遑改作因而號曰建國樓其上有節度使王彦威詩今尚在彦威明于典禮仕貞元元和間為太常博士累官至大寮其詩曰貔貅十萬擁雄姿正是酬恩報國時沛水波濤喧鼓角隋堤楊柳拂旌旗前驅紅斾闗西將列坐青娥趙國姬為報長安冠盖道麄官到底是男兒即彦威麄官男兒之言亦有恨爾其後至太祖重修官職不復存矣禪理詩楊文公深達性理精悟禪觀捐館時作偈曰漚生復漚滅二法本來齊要識真機處趙州東院西丞相王公隨亦悟性理捐館時知河陽作偈曰畫堂燈欲滅彈指向誰說去住本尋常春風掃殘雪是夕薨凌晨天大雪實正月六日二曹司封修睦深達性理知邵武軍時甞以竹簟贈僧仁因作偈與之曰翠筠纎簟寄禪齋半夜秋從枕底來若也此時人問道凉天捲却暑天開三張尚書方平尤達性理有人問祖師西來意張以偈答之曰自從無始千千刼萬法本來無一法祖師來意我不知一夜西風掃黄葉四陳文惠公亦悟性理甞至一古寺作偈曰殿古寒爐空流塵暗金碧獨坐了無人又得真消息五富文忠尤達性理熙寧中余守官洛下公時為守遺余書託為訪荷澤諸禪師余因以偈􅃧之曰是身如幻泡盡非真實相况兹紙上影妄外更生妄到岸不須船無風休起浪唯當清浄觀妙法了亡象公答偈曰執相誠非破相亦妄不執不破是名實相既又以手筆貺余曰承以偈見警美則美矣理則未然所謂無可無不可者畫亦得不畫亦得就其中觀像者為不得不觀像者所得如何禪在什麽處以不以有無為礙者近乎道也思之思之見青箱雜記淵明詩陶淵明意趣真若清淡之宗詩家視淵明猶孔門視伯夷也其集屢經諸儒手校然有問來使篇世盖未見獨有唐時晁文元家二本有之詩云君從山中來一作南山早晚發我目我屋一作家南窗下今生幾叢菊薔薇葉已抽一作茁秋蘭一作春蘭氣當馥歸去來山中山中酒應熟李太白潯陽感秋詩陶令歸去來田家酒應熟詩有變態薛許昌答書生贈詩百首其一首卷初如卷終譏其不能變態也大抵屑屑較量屬句平勻不免氣骨寒儉殊不知詩家要當有情致抑揚髙下使氣沉㧞聳秀凌紙又用事能破觚為貟剉剛成柔始為有功此昔人所謂縛虎手也如蘇子美窮居和長安師業清有句云玉帳夜寒兵似水茅齋春静草如烟東坡甞作詩天邊鴻雁不易得便令作對隨家雞又有驅猛虎如羣羊曰真佳話也王蘇更相是非王文公見東坡醉白堂記徐曰此非是韓白優劣論東坡答之曰不若介甫度州學記乃學校策耳二公相誚或如此然勝處未甞不相傾慕元祐間東坡奉祠西嶽一見公舊題楊桞鳴蜩緑暗荷花落日紅酣三十六陂春水白頭想見江南炷目久之曰此老野狐精也見西清詩話王蘇更相稱譽元豐中王文公在金陵東坡自黄北遷日與公遊盡論古昔文字閒則俱味禪悦公歎息謂人曰不知更幾百年方有如此人物東坡渡江至儀徴和遊蔣山詩巴陵守王勝之盆城公亟取讀至峯多巧嶂日江逺欲浮天乃撫几曰老夫平生作詩無此二句又在蔣山時以近製示東坡云若積學分縞夜崇桃分炷晝自屈宋没世曠千餘年無復離騷句法乃今見之荆公曰非子瞻見諛自負如此耳亦未甞許俗子道子是時相見俗子掃軌矣目前之景吟不到張天覺云遊魚幾隊子隨母啄木數聲雌喚雄古子通云楊花入竹静鳥影渡塘稀而歸來詩曰馬憶曾行處連嘶渡晚河忽驚鄉樹出漸識路人多皆因目前之景吟者多不到也前輩務求博約二宋俱為晏元獻門下士後雖甚貴顯為文必手抄寄公懇求雕潤甞見景文寄公書曰莒公兄赴鎮圃田同遊西池作詩長楊獵罷寒熊吼太一波閒瑞鵠飛語意警絶又作一聯云白雪久殘梁複道黄頭閒守漢樓船仍注空字於閒字之旁批云二字未定更望指示晏公書其尾曰空優於閒且見雖有船不御之意又字好語健盖前輩務求博約情實純至如此太白傳神李太白歴見司馬子微謝自然賀知章或以為可與神遊八極之表或以為謫仙人其風神超邁英爽可知後世詞人傳者多矣然吾於丹青見之俱不若少陵云落月滿屋梁猶疑照顔色熟味之百世之下想見風采此與李太白傳神詩也集句集句自國初猶未盛也至石曼卿人物開敏以文章為􅃧然後大著甞見手書下第偶成一生不得文章力欲上青雲未有因聖主不勞千里召姮娥何惜一枝春鳳凰詔下雖沾命豹虎叢中也立身啼得血流無用處著朱騎馬是何人乞食歌姬院韓熙載仕江南每得俸給散後房歌姬熙載披衲持鉢就諸姬乞食率以為常東坡以玉帶贈了元酬以衲裙坡作詩謝曰病骨難堪玉𢃄圍鈍根仍落箭鋒機欲教乞食歌姬院故與雲山舊衲衣江南野録亦載韓事與此小異韓文公華山女詩退之見神仙亦不伏云我能曲屈自世間安能從汝巢神仙賦謝自然詩則曰童騃無所識作誰氏子詩則曰不從而誅未晚耳惟華山女詩頗假借不知何以得此堆垜死屍魯道善用事若正爾填塞故實舊謂之㸃鬼簿今謂之堆垜死屍如詠猩猩毛筆詩云平生幾兩屐身後五車書又云管城子無食肉相孔方兄有絶交書精妙隱密不可加矣當以此語反三隅也文章傳襲司馬池文正公之父仁宗時待制作詩云冷於波水淡於秋逺陌初窮見渡頭賴得丹青無盡處不成應遣一生愁又黄魯直之父作大孤山詩云長江巨浪獨夫險比干一片崔嵬心文公清夷剛正而作小詞云相見争如不見有情還似無情笙歌散後酒初醒深院月明人静魯直作詩用事押韻皆超妙出人意表盖其傳襲文章種性如此見三居士詩話用字音詩人不以字害意古者用字簡而當亦不以字害句故韻清濁隨時措意流在束薪中入張韻留晏汾隂西入先韻直取意順而已唐人以律格自拘不復敢用唯居易作詩疑易其音於語中如照地麒麟用信音麟袍雪擺胡用鶻音杉紅欄三百九十橋用諶音十往往有之晏丞相殊甞評之曰詩人乘語後當如此用字用字意晏丞相甞問曾明仲云劉禹錫詩有瀼西春水綾文生此生字作何意明仲云作生育之生丞相曰非也作生熟之生語乃捷西都詩宋次道甞為西都詩以野孤落對五鳳樓言野孤落唐時名宦所聚也見劉貢父詩話制科無登第三等者宋興以來御試制科無登第三等者惟有第四等不一余皆四等而上並為及第此則落之三諫官詩慶厯初永叔方平素俱除諫官君謨作詩以賀曰御筆新除三諫官喧騰朝野競相歡當時流落丹心在自古忠良得路難必有謨猷禆帝右直須風采動朝端世間萬事俱塵土留取功名久逺看三人以其詩薦於上尋亦除諫官詩句作圖古今人掇取好詩句作圖此特小巧美麗可喜一曲之智則能之故句圖多歌詠風景形似百物將以觀雄材逺思不可得也然雄材逺思人亦自多好句可入句圖梅聖俞愛嚴維詩柳塘春水漫花塢夕陽遲則善矣然細察之夕陽遲則繫花春水慢不須柳也如杜工部云深山催短影喬木易高風此了無瑕累又杜云蕭條九州内人少虎豹多少人慎莫錯多虎信所苛饑有易子食獸猶畏虞羅如此等句其含蓄深逺殆不可模倣西山詩洪州西山與滕王閣相對客多留詩於壁嘗有僧來讀之已而告郡守曰詩盡不佳何不除去守諤然詰之曰僧詩能佳乎僧因即吟曰洪州太白方積翠倚穹蒼萬古遮新月半江無夕陽守異之遣去奏獻浼瀆太祖親征北庭師還途中御製詩有鑾輿臨紫塞朔野凍雲飛遂仝何蒙進鑾輿臨紫塞朔野凍雲飛詩召對嘉賞授贊善詩有塞日穿痕斷邉雲背影飛縹緲隨黄屋隂沈䕶紫微俄一縣尉宋揵督䕶輦道倚其姓名之識旋覬一官因而草䟽歌頌進不已諸科亦叩行在乞免文觧其表面籖題云進上官家趙浼瀆旒扆有司亟請至銀臺應奏御文字先經本臺對駮方進因而少戢章樞宻喜養生章樞密惇少喜養生性尤真率嘗云若遇饑則雖不相識處亦須索飯若食飽時見父亦不拜在門下省及樞密益喜丹竈餌茯苓以却粒骨氣清粹真神仙中人蘇子瞻贈之詩云鼎中龍虎黄金賤松下龜蛇緑骨輕盖謂是也見東軒筆録事實類苑卷四十

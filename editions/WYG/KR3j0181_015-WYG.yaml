body:
  text: 事實類苑卷十五宋江少虞撰顧問奏對雷徳驤雷徳驤判大理寺因便殿奏事太祖方燕服見之因問曰古者以官奴婢賜臣下遂與本家姓其意安在徳驤曰古人制貴賤之分使不可瀆恐後世譜牒不明有以奴主為婚者太祖喜曰卿深得古人立法意由是嘆重久之自後每徳驤奏事雖在燕處為御袍帶以見東軒筆録王貽孫太祖嘗問趙韓王曰男尊女卑何以男跪女不跪歴問羣臣無有知者惟貽孫曰古者男女皆跪至天后始拜而不跪韓王曰何以為質貽孫曰古詩云長跪問故夫遂得振譽玉壺清話种司諫真宗西祀回蹕次河中時長安父老三千人具表詣行在乞臨幸且稱漢唐舊都闗河雄固神祇人民無不望天光之下臨也上意未果召种司諫放以决之時种持兄喪於家既至行在真廟攜之登鸛鵲樓與决雍都之幸种懇奏曰大駕此幸有不便者三陛下方以孝治天下翻事秦漢侈心封禪羣嶽而更臨游别都久抛宗廟於孝為闕此其不便一也百司供擬頓仗事繁晚春蠶麥已登深費農務此不便二也精兵重臣扈從車蹕京國一空民心無依况九廟乎此陛下深宜念之乃其三也上悚然曰臣僚無一語及此者放曰近臣但願扈清蹕行曠典文頌聲以邀已名此陛下當自寤於清衷也翌日傳詔鸞輿還闕臨遣雍人請幸宜不允真宗便欲邀放從駕至京放乞還家林上曰不久即當召卿湘山野録王彦超太祖㣲時嘗游鳳翔從王彦超遺十千遣之後即位悉徵藩侯入覲宴苑中縱酒為樂諸帥競論疇昔功勲惟彦超獨言久忝藩寄無功能可紀願納符節入備宿衛上喜曰前朝異世事安足論彦超之言是也從容謂彦超卿當日不留我何也對曰蹄涔之水豈足容神龍萬一留止安得有今日之事帝之受命非細事也楊文公談苑趙韓王太祖初即位趙韓王為相顧趙曰汝雖為相見舊相班立坐起也須且讓他趙奏曰陛下初創業以臣為相正欲彈壓四方臣見舊相須在上不可更讓也太祖嘉之後因奏事忤㫖上怒就趙手掣奏劄子挼而擲之趙徐拾起以手展開近前復奏上愈怒拂袖起趙猶奏曰此事合如此容臣進入取㫖其膽量如此一日因大宴雨驟至太祖不悅少頃雨不止形於顔色以至叱怒左右趙近前奏曰外面百姓久望雨官家大宴何妨只是損得些陳設濕得些樂官衣裳但令樂官雨中做雜劇此時雨難得當百姓得雨快活之際正好喫酒娯樂太祖於是大喜宣樂人就雨中做雜劇奏樂於是屢勸近臣百官軍員喫酒盡醉而散趙之為相臨時機變能回上心也如此晉公談録二弭徳超起自冗列為諸司使雍熙中因奏事稱㫖驟加委遇時侍中曹公彬勲望特隆徳超陰以計中傷誣其不軌太祖疑之拜徳超樞宻副使不數月屬趙公普再相秉鈞軸因為辨雪保證事狀明白上乃大悟即時竄逐徳超而待彬如初自是數日上頗不懌從容謂普等曰朕以聴㫁不明幾悞大事夙夜循省内愧於心普對曰陛下知徳超才幹而任用之知曹彬無罪而昭雪之有勞者進有罪者誅物無遁情事必立㫁此所以彰陛下之至美太平興國中朝士祖吉歴典方郡奸贓事覺下獄案劾欵尚未具時郊祀將近太宗怒其貪墨遣中使諭㫖於執政曰祖吉特俾郊赦不貸翊日宰相趙公普奏曰敗官抵罪宜正刑辟然而國家卜郊肆類所以對越天地告於神明而吉本何人亦安足以􅈥陛下赦令哉上善其對而止沂國文正公筆録三太祖一日召趙中令出取幽州圖以示之趙中令詳觀稱嘆曰必是曺翰所為也帝曰何以知之普對曰方今將帥材謀無出於翰此圖非翰他人不可為也翰徃必得幽州然既取幽州陛下遣何人代翰帝黙然持圖歸内春明退朝録僧贊寧太祖皇帝初幸相國寺至佛像前燒香問當拜與不拜僧録贊寧奏曰不拜問其何故對曰見在佛不拜過去佛贊寧者頗知書有口辯其語雖類俳優然適㑹上意故㣲笑而頷之遂以為定制至今行幸焚香皆不拜也議者以為得禮廬陵歸田録沈文通英宗素憤戚里之奢僭初即位殿前馬步軍都指揮使李璋家犯銷金即日下有司必欲窮治知開封府沈遘從容奏曰陛下出繼仁宗李璋乃仁宗舅家也英宗惕然曰初不思也學士為我平之沈退坐府召衆匠出衣示曰此銷金乎銷銅乎匠曰銅也沈即命火焚之而罷東軒筆録竇儀陶糓竇儀在翰林乾徳二年正月范質王溥魏仁浦俱罷相傳趙韓王登庸制既下而韓王綸誥無宰相署勅詔問學士陶榖建議云自古輔臣未嘗有虛位者惟唐大中甘露事後數日絶班當是時僕射令狐楚鄭覃奉行制書今南省官亦可署勅儀曰榖之所陳非承平之時不足援據今皇弟開封府尹同平章事即宰相之任也可以署勅太祖聞之喜曰儀之言是也即令太宗署勅以賜之金坡遺事范文正慶厯四年四月戊戌上與執政論及朋黨事㕘知政事范仲淹對曰方以類聚物以羣分自古以來邪正在朝未嘗不各為一黨不可禁也在聖鑒辨之耳誠使君子相朋為善其於國家何害涑水紀聞劉煜王文康治蜀頗以法御下有謗之者㑹劉煜召還為左正言真宗召問凌策王某治蜀孰優曰凌策在蜀值嵗豐故得以平易治之王某值嵗少歉慮民為盜故以法治之使之易治則皆然真宗善其言本朝名臣傳蘇易簡太宗命蘇易簡詳講文中子有素遺子食多經羮黎糗之說上因問曰食品珍琛何物為最易簡對曰臣聞物無定味適口者琛臣止知虀汁為美太宗笑問其故曰臣憶一夕寒甚擁爐燒火乘興痛飲大醉就寢四鼓始醒以重衾所擁咽吻燥渇時中庭月明殘雪中覆一虀盎不暇呼僮披衣掬雪以兩手滿引數缶連沃渇肺咀虀數莖燦若金脆臣此時自謂上界仙厨鸞脯鳯脂殆恐不及屢欲作氷壺先生傳記其事因循未暇也太宗笑然之丁晉公真宗嘗曲宴羣臣於太清樓君臣懽悅談笑無間忽問市沽尤佳者何處中貴人奏有南仁和者亟令進之遍賜宴席上亦頗愛之問其直中貴人以實價對之上遽問近臣曰唐酒價幾何無能對者惟丁晉公奏曰唐酒每一升三十上曰安知丁曰臣嘗記杜甫詩曰速須相聚飲一斗恰有三百青銅錢是知一升三十上大喜曰甫之詩自為一時之史並出玉壺清話魏諫議魏諫議常出守利州兼轄一路巡檢使尋加户部員外郎未幾㑹卭蜀順賊作孽就差陜西至益州轉運使鈐轄一路兵車公事委寄之重時議榮之凡百運籌洞明利害於是徑馳單騎入詣雙闕既而闕門宣㫖曰若有事即與中書評議公覆奏曰臣逺持國家機事取㫁於宸衷致於獲罪而乃甘心匪為宰相而來日方午太宗召對曰臣僚上言草寇些少兼將寧靜公對曰臣之所見誠恐上昧天聴今賊徒控扼藩方刼掠郡縣然上憑聖算剋日剪除其如朝廷為之貽憂軍民為之騷動且西蜀阻險地逺王化更慮向此㐫䜿遺類接跡草莽未可詳焉太宗英悟從容聴納賜錢五十萬假甲第一區以安其家仍給公人警喝前後乘傳復徃餘孽悉平咸平中王鈞盜發果符公先見之明也見聞見録李侍讀李侍讀仲容魁梧善飲兩禁號為李萬回真宗飲量近臣無擬者欲敵飲則詔公公居嘗寡談頗無記誦酒至酣則應答如流一夕真宗命巨觥俾滿引欲劇觀其量大醉起固辭曰告官家撤巨器上乘醉問之何故謂天子為官家遽對曰臣嘗讀蔣濟萬機論言三皇官天下五帝家天下兼三五之徳故曰官家上甚喜從容數盃上又曰真所謂君臣千載遇也李亟曰臣惟有忠孝一生心也縱㝠搜不及於此並見湘山野錄劉綜劉綜名臣也少孤依外兄通逺軍使董遵誨以從學遵誨遣齎貢見上綜時年十六嵗奏曰臣外兄止以方物脩貢人臣之常節陛下解寶勒賜之臣别立殊績陛下當何以賜之敷奏清雅辭容秀徹太祖愛之謂左右曰兒非常材從容謂之曰吾委遵誨以方面不謂爾善之涑水紀聞李南陽李至為㕘知政事今上初即位朝士韓見素彭繪淳于雍等數人連乞致仕上頗訝之謂宰相曰縉紳中多求退迹何也至對曰退迹者幾何躁進者盖甚衆矣上黙然後或引疾者皆遂其請亦仁者之言也二禮記月令篇舊第四鄭𤣥注孔穎達作疏皆依此篇自開元中李林甫受詔學者重加增損多所改易舊文其篇居第一至今用之李至任秘書監日因召對其事遂下館閣議胡旦草議狀取鄭李二家對較之凡數千言攻林甫之失兼云貢舉試用孔疏而文注乃用林甫甚相矛盾請復用鄭注為是宰相吕端不能决報罷之後至㕘政亦不能釐整其事已上並楊文公談苑唐質肅熙寧以來大臣盡學術該貫人主明博議政罷每留之詢講道義彌日論及近代名臣始終大節時宰相有舉馮道者盖言歴事四朝不渝其守㕘政唐公介曰兢慎自全道則有之然歴君多未可謂完節宰相曰借如伊尹五就湯五就桀非歴君之多乎唐公曰有伊尹之志則可况擬人必於其倫以馮道竊比伊尹則臣所未諭也始平公始平公自鄆徙并過京師上謁是時上新用文富為相自以為得人謂公曰朕新用二相如何公對二臣皆朝廷高選陛下㧞而用之甚副天下之望上曰誠如卿言但彦博多私至於富弼則萬口同詞皆云賢相也始平公曰文彦博臣頃與之在中書詳知其所為實無所私但怨之者毁之耳况前日被謗而出今當愈畏慎矣富弼為樞宻副使未執大政朝士大夫未有與之為怨者故交口譽之兾其進用而已有所利焉若富弼以陛下之爵禄樹私恩則非忠臣何足賢也若一以公議槩之則向之譽者將轉而為謗矣此陛下所以宜深察也且陛下既知二臣之賢而用之則當信之堅任之久然後可以責成功若以一人之言進之未幾又以一人之言疑之臣恐太平之功未易可致也上曰卿言是也見涑水紀聞張昭劉鋹至闕下欲獻俘太廟莫知其儀時張昭以户部尚書致仕於家深識典故國初規制皆張昭與竇儀所定太宗遣學士李澣就問俘廟之儀庶同㕘酌張昭臥病口占其式以授澣不遺一字澣遂心伏昭之該博玉壺清話文潞公元豐中文潞公自北都召對上問以至和繼嗣事公對曰臣等備位兩府當此之際議繼嗣乃職分耳然亦幸值時無李輔國王守澄之徒用事於中故臣等得效其忠懇耳上憮然有感寇萊公澶淵之役王超傅潛兵力不支遂致中外之議不一至有以契丹狃開運之勝聞於上者惟寇萊公準首乞親征李沆宋湜賛之然而臣下終以未必勝為言時陳堯叟請幸蜀王欽若乞幸江南真宗一夕召萊公語曰有人勸朕幸江南與西川者卿以為如何萊公答曰不知何人發此二謀真宗曰卿姑㫁其可否勿問其人也萊公曰臣欲得獻策之人斬以釁鼔然後北伐耳真宗黙然而悟遂决澶淵之行吕許公寶元中御史府久闕中丞一日李淑對仁宗偶問以憲長久虚之故李奏曰此乃吕夷簡欲用蘇紳臣聞夷簡已許紳矣仁宗疑之異時因問許公曰何故久不除中丞許公奏曰中丞者風憲之長自宰相而下皆得彈擊其選用當出聖意臣等豈敢銓量之仁宗頷之自是知其直矣並見東軒筆録司馬温公熙寧二年十一月庚辰司馬光讀資治通鑑漢紀至曺參代蕭何為相國一遵何故事因言參以無事鎮撫海内得守成之道故孝惠高后時天下宴然衣食滋給上曰使漢常守蕭何之法久而不變可乎光曰何獨漢夫道萬世無弊夏商周之子孫茍能常守禹湯文武之法雖至今存可也武王克商乃反商政政由舊雖周亦用商政書曰毋作聰明亂舊章然則祖宗舊章何可變也漢武帝用張湯之言取高帝法紛更之盜賊半天下宣帝用高帝舊法但擇良二千石使治民而天下大治元帝初立頗改宣帝之政丞相衡上疏曰竊恨國家釋樂成之業虛為此紛紛也陛下視宣帝之為政何如荀卿曰有治人無治法故為治在得人不在變法也上曰人與法亦相表裏耳光曰茍得其人則無患法之不善不得其人雖有善法失先後之師矣故當急於求人而緩於立法也二壬午吕惠卿講咸有一徳因言法不可不變先王之法有一嵗一變者正月始和置於魏象是也有五嵗一變者五載一巡守考制度於諸侯是也有一世一變者刑罰世輕世重是也有百世不變者父慈子孝兄友弟恭是也前日司馬光言漢守蕭何之法則治變之則亂臣竊以為不然惠帝除三族罪妖言令挾書律文帝除收孥令安得謂之不變哉武帝以窮兵黷武奢淫厚歛而盜賊起宣帝以綜覈名實而天下治元帝以任用恭顯殺蕭望之而漢道衰皆非由變法與不變法也夫以弊則不必變安得坐視其弊而不變耶書所謂無作聰明亂舊章者謂實非聰明而妄作之非謂舊章不可變也光之措意盖不徒然必以國家近日多更張舊政因此規諷又以臣制置三司條例及看詳中書條例故發此論也臣願陛下深察光言茍光言為是則當從之若光言為非陛下亦當播告之使不匿厥㫖召光詰問使議論歸一上召光謂曰卿聞吕惠卿之言如何光對曰惠卿之言有是有非惠卿言漢惠文武宣元治亂之體是也言先王之法有一嵗一變則非也正月始和置於象魏乃舊章也非一嵗一變也亦猶州長黨正族師於四孟月朔属民而讀邦法也豈得為時變即天子恐諸侯變禮易樂故五載一巡守有變亂舊章者則削黜之非五嵗一變法也刑罰世輕世重者盖新國亂國平國隨時而用非一世一變也且治天下譬如居室弊則修之非大壊不更造也大壊更造必得良匠又得美材今日二者皆無有臣恐風雨之不庇也講筵之官皆在此乞陛下問之三司使掌天下財不才而黜可也不可使兩府侵其事今為制置三司條例司何也宰相以道佐人主安用利乎茍用利而已則胥吏足矣今為㸔詳中書條例司何也惠卿曰司馬光備位侍從見朝廷事有未便即當論列有官守者不得其職則去豈可但已光曰前者詔書責侍從之臣言事君嘗上疏指陳得失如制置條例司之類盡在其中未審得進達聖聴否上曰見之光曰然則臣不為不言也至於言不用而不去此則臣之罪也惠卿責臣實當其罪臣不敢逃上曰相與共講是非耳何至乃爾王珪進曰司馬所言盖以朝廷所更之事或為利甚少為害甚多者亦不必更矣因目光令退王珪進讀史記光進讀資治通鑑畢降堦將退上命遷坐墩於門内御榻之前皆命就坐王珪禮辭不許皆再拜而坐左右皆避去上曰朝廷毎更一事舉朝士大夫洶洶皆以為不可又不能指名其不便者果何事也珪對曰臣疏賤在闕門之外朝廷之事不能盡知借使聞諸道路又不能知其虚實也上曰據所聞言之光曰朝廷散青苗錢兹事非便今閭里富民乘貧者困乏之際出息錢以貸之候其收穫責以榖麥貧者寒耕熱芸僅得斗斛之收未離場圃已盡為富室奪去彼皆編户富民非有上下之勢刑罰之威徒以富有之故尚能蠶食細民使之困瘁况縣官督責之嚴乎臣恐細民將不聊生矣吕惠卿曰司馬光不知此事彼富室為之則害民今縣官為之乃所以利民也昨者青苗錢令民願取者則與之不願不強也光曰愚民知取債之利不知還債之害非獨縣官不強富民亦不強也臣聞作法於貪弊將若何昔太宗平河東立和糴法時米斗十錢草束八錢民樂與官為市其後物貴而和糴不解遂為陜西河東之病上曰行之久矣民不以為病也光曰臣陜西人也見其病不見其利朝廷初不許也而有司尚能以病民况今立法許之乎上曰坐倉糴米何如王珪等皆起對曰坐倉甚不便朝廷近罷之甚善上曰未嘗罷也光曰京師有七年之儲而錢常乏若坐倉錢益乏米益陳奈何惠卿曰坐倉得米百萬石則嵗減東南百萬之漕以其錢供京師何患無錢光曰東南錢荒而米狼戾今不糴米而納錢棄其有餘取其不足農末皆病矣侍講呉申起曰光言至論也光曰皆細事不足煩聖慮陛下但當擇人而久任之有功則賞有罪則罰此則陛下職也上曰然文王罔攸兼於庶言庶獄庶慎惟有司之牧夫正謂此也上復與衆人講論治道至晡後王珪等請起上命賜湯濩謂光曰卿勿以嚮者吕惠卿之言遂不慰意光對曰不敢遂退三七年十二月戊辰端明殿學士司馬光上資治通鑑五代紀三十卷資治通鑑自治平三年置局毎修一代史畢奏上書成總二百九十四卷目録考異各三十卷上諭輔臣曰前代未嘗有此書過荀恱漢紀逺矣輔臣請觀之遂命付三省仍令速進入以為資政殿學士降詔奬諭出涑水紀聞事實類苑卷十五

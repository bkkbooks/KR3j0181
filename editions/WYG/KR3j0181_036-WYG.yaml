body:
  text: 事實類苑卷三十六宋江少虞撰詩歌賦詠張鄧公退傅張鄧公士遜晚春乗安輿出南薫遶都城遊金明抵暮指宜秋而入閽兵捧牌請官位退傅即書一絶於牌云閒遊靈沼送春囘關吏何須苦見猜八十衰公無品秩昔曾三到鳳池來二退傳張公性喜山水宰邵武時多遊僧舍至則吟哦忘歸嘗至西庵題詩曰西庵深入西山裏算得當年少客遊宻宻石叢盤水徑涓涓雲竇瀉寒流松皆有節垂青蓋僧盡無心也白頭欲制粉牌書姓字調官官冗不堪留又公嘗至寶蓋巖亦留題曰身為冠冕流心是雲泉客每到雲泉中便擬忘歸迹況兹寶蓋巖天造清涼宅脱車官道旁誰知願言適又公嘗沿牒至建寧縣過洛陽而山路險峭穹絶不可名狀亦題二韻於村寺曰金谷花時醉幾場舊游無日不思量誰知萬水千山裏枉被人言過洛陽楊文公談苑稱楚僧惠崇詩於近代釋子中為傑出而歐陽少師歸田録亦紀其佳句則不甚多余嘗見惠崇自撰句圖凡一聯皆平生所得於心而可喜今試録之書楊雲卿别墅云河分岡勢斷春入燒痕青長信詞云隂井生秋早明河轉曙遲送達上人西遊云地形吞蜀盡江勢抱蠻囘江行晚泊云嶺暮清猿急江寒白鳥稀上相公池上作云歸禽動疎竹落果響寒塘贈陳少師云野人𫝊相鶴山吏學彈琴夜坐云春淺水生井宵分月上軒贈凝上人云掩門青檜老出定白髭長送遷客云浪經蛟浦濶山入鬼門寒經縁公舊寺云遺偈𫝊諸國留真在一峰塞上云河氷堅渡馬塞雪苦藏鵰喜長公至云乆别年顔改相逢夜話長隠者云多年不道姓近日旋移家宿東林寺云鳥歸松墮雪僧定石沈雲上翰林王學士云露寒金掌重天近玉繩低柳氏書齋云著書經日短彈劔惜春深上王太尉云探騎通蕃壘降兵逐漢旗田家秋夕云露下牛羊靜河明桑柘空舟行云林斷城隍出江分島嶼􅂞寄梅蘇州云鏁城山月上吹角海鷗驚宿楊侍郎東亭云卷幔來風逺移床得月多送程至云白浪分吳國青山隔楚天遊隠靜寺云空潭聞鹿飲疎樹見僧行送錢供奉巡警云劍佩明山雪旌旗濕海雲梅鼎臣河亭云曠野行人少長沙去鳥平宿肇公山齋云月髙山舎迥霜落石門深送盧經西歸云霜多秦木落雲盡漢山孤壕梁夜泊云夜䦨潮動舸秋迥月臨城崔仰秋居云葉影風中盡蟲聲月下多贈裴使君云行縣山迎舸論兵雪繞旗早行云繁霜衣上積殘月馬前低秋夕云磬斷蟲聲出燈飛鶴影沈書韓退之屋壁云移家臨醜石租地得靈泉秋夕懐長公云秋近草蟲亂夜遥霜月低觀宴鄉老云海鷗聽舜樂山老醉堯觴贈素上人云中食下林狖寒禪移塚狐晚夏夜云扇聲猶泛暑井氣忽生秋江行早發云殘月楚山曉孤烟江廟春宿翻經館靖少卿房云梵容分古像唐語入新經題王太保道院云鶴傳滄海信僧和白雲詩秋夕懐汪白云寒禽棲古柳破月入微雲贈白上人云花漏沈山月雲衣起海風喜陳助至云樓中天姥月坐上杜陵人冬日野望云人歸岡舍迥雁過渚田遥送人牧榮州云山色臨巴迥江流入漢清春早道中云湘雲隨雁斷楚路背人遥贈李道士云松風吹雪亂巖溜濺碁寒栖霞寺云境閒僧渡水雲盡鶴盤空林逋河亭云古路隨岡起秋帆轉浦斜楊秘監池上云寒禽時動竹露重忽翻荷魏野山亭云嵐重琴棋濕風長枕簟寒塞下云夜梵通雲竇秋香滿石叢陜西道中云關河雙鬢白風雪一燈青送防秋楊將軍云殺氣生龍劍威風動虎旗𤓰州亭子云落潮鳴下岸飛雨暗中峯賀劉舍人云日躔黄道迥春入紫微深除夜云寒燈催臘盡曉角喚春囘幽并道中云雁行沈古戍鵰影轉寒沙送僧歸天台云景霽雲迴合秋生樹動搖過陳摶舊宅云亂水僧頻過荒松鶴不還宿江館云露館濤驚枕空庭月伴琴維邢道中云馬渡氷河濶鵰盤積右髙國清寺秋居云驚蟬移古柳鬭雀堕寒庭書平上人山房云松風傳夕磬溪霧擁春燈觀南郊天仗云霓旌搖曙景鳳吹繞春雲贈義省上人云坐石雲生衲添泉月入缾昇平詞云萬國無刑治三邊不戰爭國清寺云暝鶴栖金刹秋僧過石橋吕氏西齋云雪殘僧掃石風動鶴歸松劉參幽居云風煖鳥巢木日髙人灌園楊都官池上云竹風驚宿鶴潭月戲春魚書矯方屋壁云圭竇光先曉盆池别見天送陳舍人巡撫云月露踈寒柝雲濤閃畫旗宿齊上人禪齋云鶴驚金刹露龍蟄玉缾泉春日寇宫贊池上云暄風生木末遲景入泉心七夕云河來天上濶雲渡月邊輕贈道士云海人來相鶴山鳥下聽琴送孫荆州云畫鷁浮秋浪金鐃響夕雲江城晚望云丹楓映郭迥緑嶼背江深題王太保山亭云危溜含清瑟飛花㸃玉觴送李秦州云朱旗凌雪捲畫角入雲吹書上人西齋云孤雲還靜境逺籟發秋空李太傅山莊云圍棋分雪石汲井動金沙宫中詞云井含春氣碧樓轉夕陽遲送吳袁州云鳥暝風沈角天清月上旗寄肇公云斜吹鳴金錫歸雲擁石床塞上云古戍生烟直平沙落日遲贈嗣上人云掃石雲離箒嘗茶月入鐺舟行云逺嶼迎檣出寒林帶岸廻送延上人云來時雲擁衲别夜月隨笻馬蠙淮亭云路横岡燒斷風轉浦帆斜上戴殿前太保云劍靜龍歸匣旗閒虎繞竿髙諲書齋云品畫逢名嶽横琴憶古賢太一山云雲隂移漢塞石色入秦天塞上送人云地遥羣鳥小天濶一鵰平范溶園池云江花凌霰發山溜入池深獵騎云長風躍馬路小雪射鵰天髙略書院云古木風烟靜寒潭星斗明送段工部河北轉運云渡河風動斾巡部雨霑車三張退傅相公與陳文惠公同秉政張既以帝傅闕政有詩寄文惠曰赭按當年並命時蒹葭衮佩倚瓊枝皇恩乞與桑榆老鴻自髙冥鳳在池張公既退居年七十八歲有除夜詩八十光隂有二年烟蘿門户喜開關近來無奈山中相頻寄詩來許綴班退傅以八十二歲薨年八十有二之䜟也倦遊雜録韓魏公韓魏公在北門重陽燕諸曹於後園有詩一聯云不羞老圃秋容淡且看閒花晚節香公居嘗謂保初節易保晚節難故晚節事功著效所立特完又作喜雪詩一聯云危石蓋深鹽虎䧟老枝擎重玉龍寒人謂公身雖在此自任以天下之重如此公為詩用意深非詳味之莫見其指皆此類也見魏王别録李師中唐介為臺官廷疏宰相之失仁廟怒謫英州别駕仍命中官乗驛押赴任時朝中士大夫以詩送行者頗衆獨李師中待制一篇為人𫝊誦曰孤忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千古重如山並遊英俊顔何厚已死奸雄骨尚寒天為吾皇扶社稷肯教夫子不生還二唐子方始彈張堯佐於諫官皆上疏及文公貶吳奎畏縮不前當時謂拽動陣脚及唐爭論於上前遂并及奎之背約執政又黜奎而文公益不安遂罷政事時季師中作詩送唐略曰並遊英俊顔何厚已死奸雄骨尚寒厚顔之句為奎發也龔穎龔穎自負文學少許可又談論多所折難太宗朝知朗州士罕造其門獨丁謂贄文求見穎倒屣延迓酬對終日以至忘食曰自唐韓柳後今得子矣翊日丁獻詩於穎穎次韻酬和云膽怯何由帶鐵冠祗縁昭代􅅄孤寒曲肱未遂遺前志直指無聞是曠官三署每𫝊朝客語五溪閒凭郡樓㸔祝君早得文場雋况值天堦正舞干馮瀛王馮瀛王詩雖淺近而多義理若但知行好事莫要問前程須知海岳歸明主未省乾坤陷吉人之類世雖盛𫝊而罕見其全篇今並録之詩曰窮達皆由命何勞發歎聲但知行好事莫要問前程冬去氷須泮春來草自生請公觀此理天道甚分明又偶作云莫畏危時便愴神前程往往有期因須知海岳歸明主未省乾坤陷吉人道徳幾時曾去世舟車何處不通津但教方寸無諸惡狼虎叢中也立身杜祁公杜祁公酷嗜吟咏致政後林下書懐曰從政區區到白頭一生寧肯顧恩讎雙鳬乗雁常深媿野馬黄羊亦遇憂豈是林泉堪佚老只縁蒲柳不禁秋始終幸㑹承平日樂聖誰能擊壤謳然余不見野馬黄羊亊後讀唐張説𫝊乃見之則所謂吾肉非黄羊必不畏喫血非野馬必不畏刺是也邵樞宻樞宻邵公亦䝉見知屢加論薦嘗謂余詩淺近有似白樂天一日閲相國寺書肆得馮瀛王詩一帙而歸以語之公曰子詩格似白樂天今又愛馮瀛王將來捻取箇豁達李老慶厯中京師有自號豁達李老好吟而詞甚俚故公以戲之遂皆大笑然余賦才鄙拙不能強為豪英今齒已老而詩格定時時遣興實有李老之風足見公之知也余辟定武主管機宜文字公時牧鄆州附所作詩一大軸并寄余詩曰流年真似隙中駒别後情懐懶更疎天下又頒新歲厯牀頭喜達故人書慇懃羔雁功曹檄狼藉盃盤上客魚好在仲宣家萬里從軍苦樂定何如未幾公即捐館迄今追念知己每增感愴劉昌言劉昌言極有才思嘗不第作詩落句云唯有夜來夢蝴蝶翩翻飛入刺桐花後為商丘記室王禹偁贈詩曰年來拓落事堪嗟載筆商丘髮欲華酒好未陪紅杏宴詩狂多憶刺桐花蓋為是也刺桐花深紅色一枝數十蘲而葉頗大類桐故謂之刺桐惟閩中有之潘逍遥昔王維愛孟浩然吟哦風度則繪為圖以翫李洞慕賈島詩名則鑄相以師之近世又有好事者以潘閬遨遊浙江詠潮著名則亦以輕綃寫其容形謂之潘閬詠潮圖閬酷嗜吟咏自號逍遥子嘗自咏苦吟詩曰髮任莖莖白詩須字字清又貧居詩曰長喜詩無病不憂家更貧又峽中聞猿云何須三呌絶已恨一聲多哭髙舍人云生前是客曾闕卷死後何人為撰碑寄張詠云莫嗟黑髮從頭白終見黄河到底清皆佳句也故宋尚書贈詩曰宋朝歸聖主潘閬是詩人又王禹偁亦贈詩曰江城賣藥常將鶴古寺㸔碑不下驢其為名公賞激如此王章惠王公隨惟嗜吟咏有宫詞云一聲啼鳥禁門靜滿地落花春日長又野步云桑斧利春色漁歌唱夕陽皆公應舉時行卷所作也曾武毅曹翰嘗平江南有功後歸環衛數年不調一日内宴太宗侍臣皆賦詩翰以武人不預乃自陳曰臣少亦學詩亦乞應制太宗笑而許之曰卿武臣宜以刀字為韻翰援筆立進因以寄意曰三十年前學六韜英名嘗得預時豪曾因國難披金甲不為家貧賣寶刀臂健尚嫌弓力軟眼明猶識陣雲髙庭前昨夜秋風起羞見盤花舊戰袍太宗覽之惻然即自環衛驟遷數級蘇為蘇為酷嗜吟咏知湖州日有詩數十首唯一篇最為絶唱曰野艇閒撐處湘天景亦㣲春波無限緑白鳥自由飛柳色濃垂岸山光冷照衣時攜一壺酒戀到晚涼歸在宣城有詩十首皆以宣城為目題内宣城花一首尤為清麗曰宣城花叠嶂樓前簇綺霞若非翠露陶潛柳只是紅藏小謝家又嘗知邵武軍亦有小詩十首唯一篇最善曰愛重八九月登臨髙下樓紅雲白處起寒瀬泊漁舟事實類苑卷三十六

body:
  text: 事實類苑卷二宋江少虞撰祖宗聖訓太宗太宗嘗謂皇屬曰朕即位以来十三年矣朕守儉素外絶游觀之樂内郤聲色之娱真實之言固無虚飾汝等生於富貴長自深宫民庶艱難人之善惡是必未曉略說其體豈盡余懐夫帝子親王先須克己勵精聽言納誨毎著一衣則憫􅅙婦每飡一食則念耕夫至於聼斷之間勿先恣其喜怒朕每親臨庶政豈敢憚於焦勞禮接羣臣無非求於啟沃汝等勿鄙人短勿恃己長乃可求永乆富貴以保終吉先賢有言曰逆吾者是吾師順吾者是吾賊不可不察也淳化三年太宗謂宰相曰治國之道在乎寛猛得中寛則政令不成猛則民無所措手足有天下者可不慎之哉吕蒙正曰老子稱治大國若烹小鮮夫魚擾之則亂近日内外皆来上對求更制度者甚衆望陛下漸行清浄之化上曰朕不欲塞人言路至若愚夫之言賢者擇之亦古典也趙昌言曰今朝廷無事邊境寜謐正當力行好事之時上喜曰朕終日與卿等論此事何愁天下不治茍天下親民之官皆如此留心則刑清訟息矣太平興國九年太宗謂宰相曰朕每日所為有常節自凌晨視事既罷便即觀書深夜就寢五鼓而起盛暑晝日亦未嘗寢乃至飲食亦不過度行之已久甚覺得力凡人食飽無不昏濁倘四肢無所運用使就枕血脉凝滯諸病自生欲求清爽其可得乎老子云我命在我不在乎天全係人之調適卿等亦當加意無自輕於攝養也上嘗御便座録京城繫囚至日昃近臣或以勞苦過甚上曰不然倘罪及無辜使獄訟平反不致枉撓朕意深以為適何勞之有因謂宰相曰國家設官分職本為治民耳如受任悉能盡公决斷焉有不治之事古人宰一邑治一郡致飛蝗避境虎渡鳳集臣下為政尚能致兹感應若帝王用意恵民申理寃滯豈不感召和氣朕孜孜求治今得天下安泰亦其效也宋琪曰天下治亂係在一人陛下臨御十年勤勞致治隂陽和順寰宇寜謐毎日前殿所談止在刑政退朝惟觀古史究歴代興亡善惡之事以準古成憲上資神聖中外甚幸上謂侍臣曰法律之書甚資政理人臣若不知法舉動是過茍能讀之益人知識比来法寺斷案多不識治體侍臣曰今天下所上案牘獄情已定法官上閱宰執定刑事之虚實不可改也當在精擇知州通判庶知清獄訟若州縣得良吏一二其下必無寃人上然之靈州河外寨主李瓊以城降賊有司將坐其家屬上曰窮邊孤壘又無援兵縁坐之法朕不忍行也二年契丹冦邊邊將言文安大成二縣監軍棄城遁走請以軍法論上遣軍吏誅之既行謂之曰此奏尚有疑得毋所部召之耶當詳而後决使至部之闕乾寧軍令部送民入城非擅離所部遽釋之上之明察如此上嘗謂宰相曰朕於黎民孜孜訪問務欲令其得所感悅人情亦不難致且虎狼之性最是難禦然而能畜虎者以時飼之使知養育之意伏牙藏爪而况於人乎因思君臣之間要在上下情通即事無凝滯若稍間隔豈能盡致理之道古人有言君視臣如手足則臣視君如腹心君視臣如草芥則臣視君如冦仇此言甚有理致宋琪曰易卦乾在上坤在下謂之否此天氣不下降地氣不上騰之謂也坤在上乾在下謂之泰此天地交泰之象也則知君臣之道必在情通乃能成天下之務上恱上聞汴水輦運卒有私貿市者謂侍臣曰市門如䑕穴何可塞之但去其尤者可矣篙工楫師茍有少販鬻但無妨公不必究問冀官物之大無至損折可矣吕蒙正曰水至清則無魚人至察則無徒小人情偽在君子豈不知之若大度兼容則萬事兼濟曹參不擾獄市者以其兼受善惡窮之則奸慝無所容故慎勿擾也聖言所及正合黄老之道並事實至道二年夏大旱遣中使分詣五嶽祈雨學士草祝上自書名隨其名設香再拜而遣之王禹偁時在翰林上言五嶽視三公從前祝版御署已踰禮典固無君上親書之理上署之紀尾云昔成湯剪爪斷髪禱桑林之社尚無愛矧為百姓請命豈於筆札而有所惜哉内侍王繼恩平李順之亂中書議以為宣徽使太宗曰宣徽者執政之階也朕覽前籍多矣皆不欲宦者預政可授以他職宰相懇言繼恩有大功合任昭宣使河州團練使非此拜不足以為賞上不恱因召翰林學士張洎錢若水議置宣政之名班在昭宣使之上以授之加領順州防禦使登州海岸林中常有鷹自髙麗一夕飛渡海岸未明至者絶俊號曰海東青淳化中夏帥趙保忠得獻上上歎曰朕乆罷畋游盡放鷹犬無所事此今即以賜卿當領之也並楊文公談苑興國中張觀樂史鎖㕔合格不得進士及第祗以為幕職官太宗之愛惜科名如此出澠水談苑史闕唐貞觀三年闕以宰相監修復有修國史史舘修撰直舘之員集賢院自開元五年置麗正修書院於集仙殿十三年改為集賢殿以麗正書院為集賢書院有學士侍講學士之名後置大學士以宰相領之并有修撰校理直院之職貞元中増置校書正字梁氏都汴貞明中以今古長慶門東北小屋十數間為三舘湫隘卑庳周廬徼道在旁衛士騶卒喧雜毎受詔有所撰述徙他所以就之太宗即位因臨幸周覽曰若此之陋何以待天下賢俊耶即日詔有司度左昇龍門東北車府地為三舘棟宇宏大自舉役車駕再臨視勞賜工卒又令作園囿植卉木引金水河以注焉西序啟便門通乾元殿以行幸三年春新舘成賜名崇文院悉遷西舘書分布西廊為集賢書庫南廊為昭文書庫西廊分經史子集南廊為史舘書庫初平蜀得一萬三千卷平江左得三萬餘卷參以舊書為八萬卷凡四庫皆用雕木架青綾帕幕之昭文舘集賢殿大學士監修國史常以宰相兼領此外有史舘修撰直史舘集賢院直學士檢理之名淳化中復置直昭文舘直集賢院亦有修國史崇文院檢討編修祇候皆無定員不常置太宗詔諸儒編故事一千卷曰太平總類文章一千卷曰文苑英華小說五百卷曰太平廣記醫方一千卷曰神醫普救總類成帝日覽三卷一年而讀週賜名曰太平御覽太平興國八年日本國僧闕然至言其國𫝊襲六十四世矣文武寮吏皆是世官上顧宰臣等曰此蠻夷耳而嗣世長乆臣下亦世官頗有古道中國自唐季海内分裂五代世數尤促大臣子孫鮮能繼述父祖基業朕雖徳不及徃聖然而孜孜求治未嘗敢自暇逸深以畋遊聲色為戒所冀上穹降鑒亦為子孫長乆計使皇家運祚乆長而臣僚世襲禄位卿等各思盡心輔朕無使逺夷獨享斯美太宗尤重内外制之任每命一舎人必咨詢宰輔求才實兼美者先召與語觀其噐識然後授之嘗謂近臣曰詞臣之選古今所重朕嘗聞人言朝廷命一舎人六姻相賀諺以為一佛出世豈容易哉郭鷙南府人朕初即位以其樂在詞筆遂命掌記頗聞制書出人或哂之亦且素無時望不稱厥位朕亦為之靦顔業已進用亦終不令入翰苑後因覽唐書故事見其多自卑位作學士者遂令杜鎬檢閱録唐朝學士不拘品秩自校書正字畿尉至尚書皆得為之㑹光禄丞尹少連上書引馬周遇太宗事其詞多捭閤上異其才召試何以措刑論文理可觀即欲超擢詢及樞宰無有知少連名者慮不協時望遂止蘓易簡薦吴人浚儀尉周亨俊㧞可任因御試首舉人遂令亨考校臨觀與語以察其噐局俾易簡索其文章得白花鷹賦以比張茂先鷦鷯之作文彩亦可尚上意其非大器也語易簡曰且可令序遷京秩更餘觀之改光禄寺丞月餘暴遇疾卒上之衡鍳精審如此楊文公談苑太宗嘗謂侍臣曰國若無内患必有外憂若無外憂必有内患外憂不過邊事皆可預為之防惟奸邪無狀若為内患深可懼焉帝王當合用心於此太宗初即位幸左藏庫視其儲積語宰相曰此金帛如山用何能盡先皇居常焦心勞慮以經費為念何其過也薛居正等聞上言皆喜其後征晉陽討幽薊嵗遣戌邊用度寖廣鹽鐵𣙜酤關市礬茗之禁踰峻太宗嘗謂近臣曰俟天下無事當盡蠲百姓租税終以多故不果故錢若水言至道中嘗掌樞宻太宗嘗至玉華殿議邊事議既定向敏中取紙筆將批之上曰卿大臣不當自作文李揆在外否耶召入授其意令其草之時揆承㫖也太宗留心政事淳化五年自署一幅云勤公潔已奉法除奸恵愛臨民始可稱良吏本官有俸並給見緡凡闕三十餘通命有司擇京朝官之有課最者賜之殿中丞李虚已以循良清白預其選得知遂州虚已作叙感詩以獻自陳祖母年八十餘喜聞其孫中循吏之目上喜甚批紙尾云吾真得良二千石矣賜錢五百緡以遺祖母翌日對宰相言及之已云與五十緡丞相曰前日所賜五百緡上曰此誤也不可以追改虚已父寅舉進士年六十餘以母老求致仕得署著作佐郎有詞學清闕虚已亦純學篤慎家極貧雖至尊之誤筆乃天之所賜如郭巨得黄金尋飛錢之比歟然自是詔閣門不得受羣臣詩賦襍文之獻欲自薦者投文於中書宰臣第其臧否上之並楊文公談苑太宗淳化五年月厯載上謂侍臣曰聽斷天下事直須耐煩盡臣下之情者莊宗百戰得中原之地然而守文之道可謂懵然矣終日湛飲聽鄭衛之聲與伶官等嘲謔自昏徹旦謂之聒帳半酣之後至略酒箆沈醉闕至夜不已招箭者但以物擊其銀磬聲音中的與俳優軰結十弟兄每略與近臣商議事必𫝊語於人叙相見遲晚之由縱兵出獵渉旬不反於優倡蹂襍之中復自矜冩春秋不知當時州政何如也蘓易簡書於時政曰上自潜躍以来多詳延故老問以前代興廢之由銘之於心以為鍳戒上来數事皆史𫝊不載秉筆之臣以記録焉太宗將討太原選軍中驍勇趫㨗者數百人教以舞劔皆能擲劔髙文餘袒裼跳躍以身左右承之妙絶無比見者莫不震懼㑹北庭使至宴便殿日令劔舞者數百人科頭露股揮劔而入跳擲承接霜鋒露刄飛舞滿空北使懼形於色淮海國王錢俶等驚懼不敢仰視俶言於上曰此尚書所謂如虎如貔如熊如羆者也上甚恱及親征毎廵城督戰必令前道逞技賊乗城望之破胆太宗詔作上清宮謂左右曰朕在藩時太祖特鍾友愛賞賚不可勝紀今悉貿易以作一宫為百姓請福不令費庫物王沔曰土木之作必有勞費不免取百姓之脂膏耳上嘿然既營繕命中人董役役夫常不滿三千人三司率多移撥三五百人給他作中人言於上上曰有司所須之人皆要切汝自當與計議圎融勿令有妨既而數年功不就言事者多指之遂令罷役嵗餘内道塲與道流言及之上即令出南宫舊金銀器數萬兩粥於市以給工錢訖其後宫成常服一詣焚香而已至道初李繼遷遣其大校張浦入貢上御便殿召衛士百軰習射御前所挽弓皆一石五斗以上先是賜繼遷一弓皆一石六斗繼遷但以朝廷威示虜謂非人力所能挽至是衛士皆引滿平射有餘力上問浦戎人敢敵否浦曰蕃部弓弱矢短但見此長大固已逺遁豈敢拒敵上恱後以浦為鄭州防禦使留京師有司嵗請竹索以修河橋其數至廣太宗曰渭川竹千畆與千户侯等自河渠之役嵗調寖廣民間竹園率皆荒廢為之奈何吕端曰芟葦亦可為索後唐莊宗自楊留口渡河為浮梁用葦索上然之分遣使臣詣河上列葦為索皆脆不可用遂寢當莊宗渡河盖暫時濟師也並見楊文公談苑兖王宫翊善姚坦好直諌王常作假山所費甚廣既成召其屬置酒共觀之衆皆褒歎其美坦獨俛首不視王強使視之坦曰但見血山耳安得假山王驚問其故坦曰在舎時見州縣督稅上下相驅峻急里胥臨門捕人父子兄弟送縣鞭血流身愁苦不聊生此假山皆民租税所為非血山而何是時太宗亦為假山亟命毁之王每有過失坦未嘗不盡言規正宮中自王以下皆不喜左右乃教王詐稱疾不朝太宗曰使視之逾月不瘳上甚憂之召王乳母入宮問王疾増損狀乳母曰王本無疾徒以翊善姚坦檢束王居曽不得自便王不樂故成疾耳上怒曰吾選端士為王僚屬者固為輔佐王為善耳今王不能用規諌而又詐疾欲使朕逐去正人以自便何可得也且王年少未知出此必爾軰為之謀耳因命捽至後園杖之數十召坦慰諭之曰卿居王宫為羣小所嫉大為不易卿但能如此毋患䜛言朕必不聼田錫好直諌太宗或時不能堪錫從容奏曰陛下日徃月来養成聖性上恱益重之出聖政録太宗銳意文史太平興國中詔李昉扈蒙徐鉉張洎等門類羣書為一千卷賜名太平御覽又詔昉等撰集野史小說為太平廣記五百卷類選前代文章為一千卷曰文苑英華太宗閱御覽日三卷有闕則暇日追補之嘗曰開卷有益朕不以為勞也澠水燕談太宗常謂侍臣曰朕萬幾之暇不廢觀書見前代帝王行事多矣茍自不能有所剽裁全倚於人則未知措身之所因言宋文帝恭儉而元凶悖逆及隋楊素邪佞唐許敬宗謟諛之事侍臣聳聽蘓易簡曰披覽舊史安危治亂盡在聖懐斯社稷無窮之福也上覽兵法隂符經歎曰此皆詭詐竒巧不足以訓盖奸雄之忠也至論道徳經則曰朕毎讀至兵者不祥之器聖人不得已而用之未嘗不三復以為規戒王者雖以武功克受終須用文徳致治朕每日退朝不廢觀書意欲酌先王成憲而行之以盡闕意也太宗親征太原次澶淵太僕寺丞宋㨗者掌出納行在軍儲迎謁道左太宗見姓名喜以為我師必有㨗之之兆車駕將至令語攻城諸將曰我端午日置酒髙㑹於太原城中至癸未繼元降乃五月五日也太宗謂曹彬曰朕令潘美出雁門先取靈應卿以大軍聲言取幽州而持重緩行敵聞之必聚勁兵於彼不復出援山後矣既而美果下寰朔靈應重進得山後要害地上親録京師繫囚謂近臣曰為君勤政即得感召和氣如後唐莊宗不恤國事惟務畋游動經浃旬每出大傷苖稼及還蠲其租税此甚不君也張尤曰莊宗兼惑於音律縱酒自放中官典郡者數人上曰大凡人君以節儉為本仁恕為念朕在南衙時亦常留心聲律今来非朝㑹未嘗張樂每旦下藥多以鹽湯代酒鷹犬之娛素所不好且多殺飛走真闕不許朕常以此為戒已上見事實帝語宰相曰史舘所修太平總類自今日進三卷朕常覽宋琪曰陛下好古不倦觀書為樂然日覽三卷恐至罷倦帝曰朕性喜讀書開卷有益每見前代興廢以為監雖未終盡記其未聞未見之事固已多矣此書千卷朕欲一年讀徧因思好事之士讀萬卷亦不為難大凡讀書惟性所好若其不好讀書亦不入昨日讀書從已至申有鶴飛上殿砌至罷方去左右曰昔楊震講學有鸛銜鱣墜堂下亦此類也見帝學上讀老子語侍臣曰伯陽五千言讀之甚有益治身治國之道並在其内至云善者吾亦善之不善者吾則不善之此云善惡無不包容治身治國者其術如是若每事不能容納則何以治天下哉太平興國八年上顧宋琪李昉等曰朕因思閭里間毎日焚香祝天子萬嵗次大臣同夀朕與卿等焉得不日思善事以副億兆之禱宋琪曰臣等蒙陛下不次擢用又承戒諭豈敢為不善之事以負宸恩惟思公勤庶幾萬一咸再拜謝並事實太宗喜奕碁諌臣有乞貶竄碁待詔賈𤣥相南州者且言𤣥毎進新圗妙勢悅惑明主而萬機聼斷大致壅遏復恐坐馳霄襟神氣滯鬰上謂言者曰朕非不知聊避六宫之惑耳卿等不須上言出湘山野録太宗作九絃琴七絃阮嘗聞其琴盖以宫絃加二十絲號為大武宫絃減二十絲號為小武其大絃向下宫徽之一徽定其聲小絃向上宫徽之一徽定其聲太宗嘗酷愛宫調中十小調子乃隋賀若弼所撰其聲與意及用指取聲之法古今無能加闕者十調者一曰不博金二曰不換玉三曰夾泛四曰越溪吟五曰越江吟六曰孤猿吟七曰清夜吟八曰葉下聞蟬九曰三清外一調最古忘其名琴家祗命賀若弼太宗嘗謂不博金不換玉二調之名頗俗御改不博金為楚澤涵秋不換玉為塞門積雪命近臣十人各探一調撰一詞蘓翰林易簡探得越江吟曰神仙神仙瑶池宴片片碧桃零落春風晚翠雲開處隠隠金轝挽玉鱗背冷清風逺文瑩京師徧尋琴阮待詔皆云七絃阮九絃琴藏秘府不得見出相山野録太宗善飛白其字大者方數尺善書者皆伏其妙又小草特工語侍臣曰朕君臨天下亦何事筆硯但心好之不能捨耳江東人多稱能草書累召詰之殊未知向背但填行塞白裝成卷帙而已草字學難完飛白筆勢難二無亦恐自此廢絶矣以數十軸藏於秘府上嘗作奕碁三勢使内侍裴愈持以示舘學士莫能曉者其一曰獨飛天鵞勢其二曰對面千里勢其三曰大海取明珠勢皆上所製上親指授喻令語諸學士始能曉之皆歎伏神妙前後召待詔等對奕多能覆局為圗藏於秘閣古碁圗之法以平上去入分四隅為記交襍難辨徐鉉改為十九字一天二地三才四時五行六官七斗八方九州十日十一冬十二月十三閏十四雉十五望十六相十七笙十八松十九客以此易古圗之法甚為簡便並楊文公談苑賈黄中字媧民滄州人耽之四代孫太宗時以給事參知政事召見其母王氏命坐與語曰教子如此此今之孟母矣作詩美之未幾罷知澶州太宗戒之曰小心翼翼君臣皆當如此矣太過則失大臣之體太宗謂其母有賢徳年七十餘未衰與之語甚敏因謂近臣曰黄中多憂畏必先其母死及其卒母尚無恙出范蜀公蒙求太宗曰古者一夫耕三人食尚有受其餒者今殆二十人矣東南之俗連村跨邑去為僧者盖慵稼穡而避征役耳泉州奏未剃僧尼係籍者四千餘人其已剃者數萬人尤可驚駭見事實六月命内供奉官藍敏正賫御草書五軸藏秘閣史舘修撰張佖直秘閣朱昂率三舘之士登閣以觀之信神筆也敏正仍言上雖盛暑之時筆札未嘗釋手服勤樂闕前代帝王皆所不及佖等相謂曰萬乘之尊尚勤篤若此臣子當何如哉各瞻翫移時而退淳化三年九月太宗新修祕閣帝登閣觀羣書整齊喜形於色謂侍臣曰䘮亂以来經籍散佚周孔之教將墜於地朕即位之後多方收拾抄寫廣募今方及數萬卷千古治亂之道並在中矣即召侍臣賜坐仍命酒召三舘學士領焉日晚還宫顧昭宣使王繼恩曰亦可召傅潜戴興令至閣下恣觀書籍給御酒諸將飲宴潜等皆典禁兵帝欲其知文儒之盛故也已上見蓬山志事實類苑卷二

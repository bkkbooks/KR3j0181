body:
  text: 事實類苑卷四十六宋江少虞撰仙釋僧道趙自然趙自然太平州人夢一人綸巾素袍鬂髮頒白自云姓隂引出登山曰汝有道氣教汝辟榖之法乃出青栢枝令㗖夢中食之及覺遂不食又夢老人教以傳書數百字寤記之冩以示人皆不能識或云天象也乃道家符籙耳太宗召賜道服後因病食榖如故神仙二事神仙之說傳聞固多予之目覩者二事供奉官陳允任衢州監酒稅日允已老髮秃齒脫有客候之稱孫希齡衣服甚襤褸贈允藥一刀圭令揩齒允不甚信之暇日因取揩上齒數揩良久歸家家人見之笑曰何為以墨染鬚允驚以鑑照之上髯黑如漆矣急去巾視童首之髮已長數寸脫齒已隠然有生者予見允時年七十餘上髯及髮盡黑而下髯如雪又正郎蕭渤罷白波輦運至京師有黔卒姓石能以瓦石沙土手挼之悉成銀渤厚禮之問其術石曰此真氣所化未可遽傳若服丹藥可呵而變也遂授渤丹數粒渤餌之取瓦石呵之皆成銀渤乃丞相荆公姻家是時丞相當國予為宰士目覩此事都下士人求見石者如市遂逃去不知所之石纔去渤之術遂無驗石齊人也時曾子固守齊聞之亦使人訪其家了不知石所在渤既服其丹亦宜有補年夀然不數年間渤乃病卒疑其所化特幻耳筆談佛牙熈寧中余察訪過咸平是時劉定子先知縣事同謁佛寺子先謂余曰此有一佛牙甚異予乃齋潔取視之其牙忽生舍利如人身之汗颯然湧出莫知其數或飛空中或墮地人以手承之即透過或著床榻摘然有聲復透下光明瑩徹爛然滿目予到京師盛傳於公卿間後有人迎至京師執政官取入東府以次流布士大夫之家神異之迹不可悉數有詔留入相國寺創造木浮屠以藏之今相國西塔是也筆談吳僧文捷吳僧文捷戒律精苦奇迹甚多能知宿命然罕與人言予羣從遘為知制誥知杭州禮為上客遘嘗學誦揭諦呪都未有人知捷一日相見曰舍人誦呪何故闕一句既而思之果少一句浙人多言文通不夀一日齋心往問捷曰公更三年為翰林學士夀四十嵗後當為地下職任事權不減生時與楊樂道待制聯曹然公此時當衣縗絰視事文通聞之大駭曰數十日前曽夢楊樂道相過云受命與公同職事所居甚適慎勿辭也後數年果為學士而丁母憂年三十九矣明年秋㨗忽使人與文通訣别時文通在姑蘇急往錢塘見之文捷驚曰公大期在此月何用更來宜即速還屈指計之曰急行尚可到家文通如其言馳還徧别骨肉是夜無疾而終文捷與人言多如此不能悉記此吾家事耳捷常持如意輪呪靈變尤多瓶中水呪之則湧出畜一舍利晝夜轉於瑠璃瓶中捷行道遶之捷行速則舍利亦速行緩則舍利亦緩士人郎忠厚事之至謹就捷乞舎利捷遂與之封䕶甚嚴一日忽失所在但空瓶耳忠厚齋戒延文捷加持少頃見觀音像衣上一物蠢蠢而動疑其蟲也試取乃所亡舍利如此者非一忠厚以予愛之持以見歸予家至今嚴奉蓋神物也筆談金剛題誌郢州漁人擲網于漢水至一潭底舉之覺重得一石長尺餘圓直如斷椽細視之乃羣小蛤鱗次相比綢繆鞏固以物試抉其一端得一書卷乃唐天寶中所造金剛經題誌甚詳字法奇古其末云醫博士攝比陽縣令朱均施比陽乃唐州屬邑不知何年墜水中首尾畧無霑漬為土豪李孝源所得孝源素奉佛寶藏其書蛤復養之水中客至欲見則出以示之孝源因感經像之勝異施家財萬餘緡寫佛經一藏於郢州興陽寺特為嚴麗筆談鴈蕩山老人熈寧七年嘉興僧道親號通照大師為秀州副僧因遊温州鴈蕩山自大龍湫回欲至瑞麗院見一人衣布􅃭行澗邊身輕若飛履木葉而過葉皆不動心疑其為異人乃下澗中揖之遂相與坐石上問其氏族閭里年齒皆不答鬚髮皓白靣色如少年謂道親曰今宋朝第六帝也更後九年當有疾汝可持吾藥獻天子此藥人臣不可服服之有大責宜善保守乃探囊出一丸指端大紫色重如金錫以授道親曰龍夀丹也欲去又謂道親曰明年嵗當大疫吳越尤甚汝名已在死籍今食吾藥勉修善業當免此患探囊中取一栢葉與之道親即時食之老人曰定免矣慎守吾藥至癸亥嵗自詣闕獻之言訖遂去南方大疫兩浙無冨貧病死者十有五六道親殊無恙至元豐六年夏夢老人趣之曰時至矣何不速上闕獻藥夢中為雷霆驅逐惶懼而起徑詣秀州具述本末謁假入京詣尚書省獻之執政親問以為狂人不受其獻明日因對奏知上急使人追尋付内侍省問狀以所遇對未數日先帝果不豫乃使勾當御藥院梁從政持御香賜裝錢百千同道親乘驛詣雁蕩山求訪老人不復見乃於所遇處焚香而還先帝尋康復謂輔臣曰此但預示服藥兆耳問其藥至今在彰善閣當時不曾進御見筆談廬山錢文廬山太平觀乃九天採訪使者祠自唐開元中創建元豐二年道士陶智仙建一舍令門人陳若拙董作發地忽得一瓶封鐍甚固破之中皆五色土惟有一銅錢文有應元保運四字若拙得之以歸其師不甚為異至元豐四年忽有詔進號九天採訪使者為應元保運真君遣内侍廖維持御書殿額賜之乃與錢文符同時知制誥熊本提舉太平觀具聞其事召本官主首推詰其詳審其無偽乃以其錢付廖維表獻之見筆談趙抱一秦州趙抱一者初嘗牧牛田間一夕有人叩門召之以杖引行杖端有氣如烟其香可悅俄至山崖絕頂數人㑹飲音樂交奏抱一駭莫能測㑹巡檢過其下聞樂聲以為羣盗懽集令呼民梯山而上至則無所覩惟抱一獨在援以下之自是不食大中祥符四年至京師猶强健詔賜名為道士見談苑賀蘭捷真賀蘭捷真不知何許人為道士自言百餘嵗善服氣不畏寒暑往來不食或時縱酒遊市㕓啖醋腐數斤後召至闕下真宗賜之以詩禮法師明州天台教主禮法師高僧也聚徒四五百衆以往生凈土訣勸衆修行晚闕僧修三年懴燒身為約楊大年慕其道行以書留之云曾聞我師此修千日之懴特捨四大之軀結淨社之十僧生樂邦之凡品竊曽具懇冀徇羣情乞畢世以為期廣傳道以與衆願希岳諾冀獲瞻風後禮師終不諾又詒書州天竺式懴主託渡江留之云億再拜為明州禮教主宏發願心精修懴法結十人之淨侣約千日之近期決取樂國之徃生並付久先之正受再懷景重切欲欵留誠以天台大教宗師海國羣倫之歸嚮傳演秘詮之學増延慧命之期冀期往世之悠長廣作有情之饒益遂形邈請罄叙誠言得其報音確乎不奪慮喪人天之眼目孰為象教之津梁懴主大師同稟哲師並化本國可願涉錢塘之巨浪造鄞水之淨居善恱無窮宜伸於理奪真機相契須仗於神交是年延節邈永興冠相國薦紫衣留之馬樞副知節請大年撰其父全義神道碑潤筆一物不受止求薦一師號為樞奏臣撰碑况辭臣潤筆國之常規乞降聖㫖俾受臣所贈真宗召大年問之因得以其事言真宗深嘉歎重謂大年曰但傳朕意留之住世若師號朕與之潤筆卿宜無讓遂賜號法智大師住世七年方入滅錢希白碑其異於塔光梵大師譯經鴻臚少卿光梵大師惟淨江南李王從謙子也通敏有先識解五天竺國梵語慶厯中朝廷百度例務減省惟淨知言者必廢譯館不若預奏乞罷之臣聞在國之初大建譯園逐年聖節西域進經合㑹新舊何啻萬軸盈函溢屋佛語多矣又况鴻臚之設虛費廩禄恩賜用給率養尸位欲乞罷廢仁宗曰三聖崇奉朕焉敢罷且又賝貢所籍名件皆異域文字非鴻臚安辨因不允未幾大中丞孔道輔果乞廢罷上因出惟淨疏示之方已景祐中景靈宫公館傭解木木既分中有蟲鏤紋數十字如梵字傍行之狀因進呈仁宗遣都知羅宗勳譯經潤文使夏英公竦詣傳上意特詔開堂遵譯凡詔譯經即謂之開堂冀得祥異之語以識國瑞淨焚天香遵譯踰刻方曰五竺無此字不通辨譯左璫恚曰諸大師且領聖意若稍成文譯館恩例不淺而英公亦此意諷之淨因曰某等幸若蠧紋稍可箋辨誠教門之殊光恐致日彰謬誕之迹雖萬死何補二官竟不能屈遂稱非字惟淨皇祐三年入滅碑其塔者即此二節特不書惜哉趙山人趙山人景趙昻學士之親弟子熟識之善導引煉藥向為東陽簿棄官歸似有所遇八十餘落魄在塵中未嘗騎馬逺近攜一枝拄杖而去皇祐初至虞城旅邸翹一足坐于牀倚杖而終其屍不壊于今在虞城尼寺安厝謝仙火歐陽永叔侍郎說永州有一亭為火所燒獨存一柱柱根不倒刻三字云謝仙火好事問何仙姑仙姑永州之異人也仙姑曰雷部中有此姓名夫婦二人身長纔三尺潔白如玉其名謝仙主行火者見趙康靖公聞見録行火真君内中舊有玉石三清真像初在真逰殿既而大内火遂遷於玉清昭應宫已而玉清又火遷於洞真洞真又火遷於上清上清又火皆焚蕩無餘遺遂又遷於景靈而宫司道官相與惶恐上言真像所至輙火景靈必不免願遷他所遂遷於集禧宫迎祥池水心殿而都人謂之行火真君見歸田録黄覺黄覺善詩梅昌言出鎮并州覺贈詩曰五馬雍容出鎮時都人曾㸔好風儀文章一代喧高價忠直三朝受聖知帳下軍容森劍㦸門前行色擁旌旗雲籠古戍黄榆暗雪滿長郊白草衰出去暫閒貔虎幕歸來須占鳯凰池鬚間未有一莖白陶鑄蒼生固不遲梅雅自修飾容狀偉如得詩大喜之覺仕宦不遂嘗送客都門下至則客已逺不及旅舍中見一羽士在側因取所攜酒炙呼道士共飲食之既罷道士舉盃挹水冩吕字覺始悟其為吕洞賓也道士又曰明年江南見君覺果得江南官及期見道士懷中大錢七其次十又三小錢曰數不可益也予藥可數寸許告曰嵗旦以磨酒服之可保一嵗無疾覺如其言至七十餘藥亦垂盡作詩曰牀頭厯子無多日屈指明年七十三果以是歳終見劉貢父詩話許昌齡潁陽石唐山一峰特峙勢雄秀獨迢遙通絶頂有石室邢和璞筭闕處也治平中許昌齡者安世諸父早得神仙術杖策來居天下傾焉後遊太清宫時歐陽文忠公守亳社公生平不肯信老佛聞之邀致州舍與語豁然有悟贈之詩曰緑鬂青瞳瘦骨輕飄然乘鶴去吹笙郡齋坐覺風生竹疑是闕公集中載許道人石唐山隠者皆昌齡也一日公問術許告以宫室已壊難復語此但明了前竟猶庶幾焉與遊嵩山見神清洞事公默有所契語秘不傳後公歸汝隂臨行以詩寄之云石唐仙室紫雲深潁陽真人此等心真人已去昇寥廓嵗嵗巖花自開落昔公曾為洛陽客偶向岩前坐磐石四字丹書萬仞崖神清洞壑鎻樓臺雲深路絶無人到鸞鶴今應待我來公又嘗手書昌齡詩南莊相見北莊居更入深山十里餘幽谷毎尋樵徑上真心還與世情疎雲中犬吠流星過天外雞鳴曉日初昨日有人相問訊旋將落葉冩回書讀此想見其人矣神清洞世固詳其事而昌齡尤瑰異信公真神仙中人也見西清詩話正覺禪師僧本逸俗姓彭氏福州閩人也幼不茹葷九嵗出家年十五辭普度恩不受後四年以試經中第遊方至廬山依開元寺暹禪師一日入室舉達磨傳法偈於此穎悟住饒州薦福院凡十年學徒寖盛至元豐六年詔住大相國寺智海禪院賜以紫衣號正覺禪師自王公至士庶皆敬慕之於紹聖三年六月中升堂舉手示衆曰撒手那邊千里外迴頭堪作大中闕衆莫之測翊日沐浴更衣升堂集衆而逝衆乃號呼曰師慈為人今日何不留一言而去須臾師復開目伸手索筆作頌曰七十四年如掣電臨行為君通一線鐵牛勃跳過新羅撞破虛空七八片遂擲於地復儼然而逝方暑經三日體色不變都人敬禮者雲集衆乃葬師於東郊之塔張乖崖乖崖公在蜀設厨刲羊及百口具毛角召行人估價納錢送一僧院令與羊子轉經有一學禪僧得錢來謝公與之坐且曰微生向來不轉經昨日亦為羊子轉經兩卷公厲聲曰和尚轉則便轉和尚如轉不得便莫轉為甚恰為羊子轉呵起之公動不容佞皆若此類二乖崖公言未第時至鄭州有一山人氣貌甚古同宿旅中與之語皆塵外之事問不言姓氏自稱神和子而已質明為别語吾云異日相㑹於西川吾稍異之昨因患頭瘡未愈蒙聖恩差人内侍省高班羅自賓到川奉傳聖㫖撫問卿治郡不易頭上瘡子痊否某感君父至恩遂於龍興觀設醮乞保殘軀以期報國是夕吾坐寐中夢昔神和子謂吾曰頭上瘡公勿疑不是死病及覺語與道士王文正文正云曽收得鄭韶州處士贈神和子歌索而䦧之益異其事乃建大閣上下十四間號曰仙逰閣吾故曰神仙既便於西遊士庶不妨於登覽其歌先在觀内五靈院刻石存焉三乖崖公在成都府嘗夜夢謁紫府真君接語未久吏忽報請到西門黄兼濟承事兼濟以幅巾道服而趨真君降堦接之禮頗隆盡且揖張公坐承事之下詢顧闕似有欽歎之禮意公翊旦即遣典客詣西門請黄承事者戒令其常所衣服來比至果如夢中所見公即以所夢告之問平日有何隂德蒙真君厚遇如此且居某之上座邪兼濟云無他長惟毎嵗遇未麥熟時以錢三萬緡收糴至明年禾麥未熟小民艱食之際糶之價且不増升斗亦無高下在我者初無所損而小民得所濟急公曰此承事所以坐某之上即索公裳令二吏掖之使端受四拜嗚呼古先賢聞一善言見一善行若决江河沛然莫之能禦而公以夢中所得屈巳一封部中人夫豈詐善以要譽哉欲使人知神明有以勸察而不敢私耳然則公之所積又當如何二公名字固在仙籍而黄君後裔繁衍至今在仕路者比比青紫建炎四年十一月一日闕開封劉靖子直書于妙嚴院有樂道積善者為我刻板以廣其傳冀其聞黄氏之風而恱之者推賞善救物之心膺天道好還之德神明共善福夀無量豈曰小補之哉見忠定公語録風和尚邢州開元寺僧法明落魄不檢嗜酒好博毎飲至大醉惟唱栁永詞由是邢人莫不侮之或有召齋者則不赴有召飲者則欣然而從酒酣乃謳栁詞數闋而後已日以為常如是者十餘年里巷小兒皆目以風和尚一日忽謂寺衆曰吾明日當逝汝等無出觀吾往焉僧笑曰豈有是哉翊日晨起法明乃攝衣就座遽呼衆曰吾往矣當留一頌而去衆僧驚愕急起以聽法明曰平生醉裏顛蹶醉裏却有分别今宵酒醒何處楊栁岸曉風殘月言訖趺跏而逝衆嘆異之因以厚葬焉黑殺將軍開寶中有神降於終南道士張守真自言我天之尊神號黑殺將軍與𤣥武天蓬等列為天之三大將言禍福多驗毎守真齋戒請之神必降室中風肅肅然聲如嬰兒獨守真能曉之太宗不豫驛召守真至闕下館於建隆館令下神神言天上宫闕已成玉鎻關晉王有仁心言訖不復降太宗以其妖將加誅㑹晏駕真宗即位築宫於山隂將塑像請於神神曰我人形怒目披髮騎龍按創前指一星如其言造之六年宫成封神為翊聖將軍每嵗春秋遣中使祈醮立碑記其事守真時來京師得召見至道三年春太宗弗豫召見真至令為下神守真屢請神不降歸纔至而卒後數日宫車晏駕此事異也見楊文公談苑僧無夢有僧法名無夢自云鄯州人多敎化村落間手持一木牌上書詩二首一云身為車兮心為軾隨何所徃無休息交梨火棗是誰無自是不除荆與棘二云身為客兮心為主主人平和客安堵若還主客不康寧精神管定隨君去後至封丘縣富固村曰一片地可以寄吾身乃坐化去見名賢詩話僧惠圓僧惠圓俗姓于氏開封酸棗人也本田家子幼出家於本邑建福寺德禮光為師性樸魯寡語言衆以奴𨽻畜之然執勤不解久之主僧乃出鬻度牒俾為僧居數嵗乃辭師出遊師初不許已而諾之惠圓幼依佛教未嘗知有禪宗故聞南方禪刹甚盛乃詣江州東林欲學其道而至惠圓舉止山野辭語鄙俚貌極不揚衆莫不指以為笑一日乘間問衆曰如何是禪衆見其愚長嘯戲之曰對門鳴者乃禪也惠圓不悟其㫖遂面壁深思至于骨立後數月出行殿庭間忽足顛而仆起乃釋然有悟乃謂一行者曰吾不習字欲作一頌汝能書乎為我題之壁間行者笑而許之其詞曰這一交這一交萬兩黄金也合消頭上笠腰下包一輪明月杖頭挑翌日延請東林長老法聰因過惠圓留題之所驚謂左右曰誰作此頌一人前白曰向一村僧題之於此法聰曰又被這漢打了一竅乃迹其所往莫能知之後紹聖間有鄉人見之於餘杭視容貌無驚人處真得道之士也見雲齋廣記事實類苑卷四十六

body:
  text: 事實類苑卷二十五宋江少虞撰官職儀制樞密使唐以中官為樞密使與中尉謂之内貴梁為崇政殿院使後唐舊有帶相印者分東西二院晉廢國初復置中書為二府亦曰二院但行東院印耳其後除授不常以檢校官不帶餘使正官自趙普始使帶節鉞自曹彬始使簽書院事自石熈載始以文資官充使亦自熈載始知院自張士遜始以文臣知院兼使相自王欽若始簽書兼藩鎮自曹瑋始今官制復古而樞宻之職舊與三省長官同通謂之執政官矣三司使唐末始分鹽鐵度支户部專領財賦後唐明宗始號一司總以二使國朝或曰判三司或曰權判或曰㸃檢三司開寶中以參知政事二人提㸃三司既而更用宰相為都提舉興國中分二使同判三司逾年復析為三使淳化中又合為三司既而又以天下為十道二京為左右計置二計使分判十道别命三司縂計使判左右計事所謂三司如故咸平末三司各置副使其官輕則曰發遣迄元豐初不廢今悉歸尚書省矣司理㕘軍五代以来諸州馬步軍院都虞候以牙校為之太祖慮其任私髙下其手乃置司寇㕘軍以進士九經及第人充之河東栁開先生初及第為宋州司寇㕘軍後又改曰司理㕘軍至今俚俗猶以司理院為馬步院選朝官知縣建隆中擇才能之士出宰大邑大理正奚璵知大名府舘陶縣監察御史王祐知魏縣選朝官知縣自璵等始太祖重縣令之任至矣參知政事國初趙普為朝相欲用薛居正吕餘慶同政而不欲令與普齊難其名號詔問陶穀曰唐有參知政事知機務下宰相一等故以命居正等參知政事然不押班不知印按唐裴寂以僕射參知政事郭待舉以資政任闕於中書門下同受承進止平章事然則平章大於參政穀乃以為㕘政下宰相一等失之逺矣其後因之不改迨官制更革始罷進奏院國初州郡各自置邸吏散在都下外州將吏不樂久居京師又移符行下率多稽滯或漏泄宻事太平興國中起居郎何保樞以為非便奏置鈐轄諸道都進奏院以革其弊人給以銅朱印一紐起居王沂公外祖而予妻之曽祖也發運使至道初朝廷始遣洛陽苑使楊允恭作闕副使李延遂太子中書舍人王子輿為江淮兩淛發運使并置制茶鹽就江南劍南局後兼領荆湖南路旋又加都大字後廢景德中復置迨今猶存提㸃刑獄景德中真宗御筆六事以示近輔三曰提㸃刑獄可於朝臣及武臣使副中選清幹者使提㸃一路刑獄按舉官吏賢否後又加權使迨今不廢而武臣廢置不常糾察在京刑獄祥符二年朝廷以京師獄訟之繁懼有寃滯始置糾察在京刑獄司以省寃濫命知制誥周起侍御史趙緗為之凡在京師刑獄御史開封府皆得察之起慮屈抑者不能盡知許令糾察陳狀從之但非鞫獄耳宣徽使宣徽使位在樞宻使之下副使之上咸平初周營為宣徽使有所避乞居其下亦從之遂以為例以上並澠水燕談中書五房中書有制勅院院内有五房第一曰孔目房次吏房户房刑房禮房舊每房堂後第一人主生事第二人主熟事第三人發勅向下逐房只置堂後堂一人闕行遣文書至道中逐房只置堂後堂一人却置主事録事各一人仍别置提㸃五員一員迄今行之察院一司四房察院所管一司四房一司曰院襍司第一房曰兵房次吏房户房禮房逐房有副承旨一人次有主事令史書令史貼房之人並行遣公事有都承㫖副承旨諸房副承旨諸人並都管一院之事所置名目不定三司子司三司子司三部各有計院都磨勘司支收司拘取司開拆司憑由司理欠司三計院各一人判之磨勘支收一人判之開拆衙司一人判之憑由理欠一人判之刑部主判詳覆法直官刑部主判官或一員兩員不定詳覆官六員主詳覆天下斷訖大辟奏案法直官一員以流内人任之年滿得京官審刑院審刑本中書刑房宰臣所領之職淳化中析出置審刑院每大奏案須經審刑詳覆判院官同詳議官一人進呈得旨後批送中書降勅始以樞宻直學士李昌齡知院使置詳議官六員以京朝官並賜緋御史臺御史自大夫至主簿並存六典舊式今只置中丞臺端各一員共判臺事外有推直言或以他官充左右廵使各一御史充主簿一員與推直同管刑獄公事舊更有推官勘主外勘公事今竝存大理寺官大理寺判官或一員兩員不定少卿一員以他官權詳斷官十二員法直官一員以流内人任之年滿得京官三班院國初承舊制有東頭供奉官左右班殿直殿前承旨凡三班𨽻宣徽院第其任使熈寜四年始别置三班院以崇儀副使尉進掌之効其勞績授以内外之任其名籍仍𨽻宣徽後又増置左右班改殿前承旨為三班奉職舊有借職承旨改為三班借職復有殿侍𨽻焉自供奉官至殿侍凡六等此亦必白之三署郎漢百官表屬光禄勲有儀郎中郎侍郎郎中之類無員數所謂縂領從官預聞政事者也騏驥院在京有騏驥院舊名天廏坊左右天駟各二監此外又有毛馱峝退馬務駞坊養駞致逺務養牛驢中貴帶將仕郎祥符以前中貴人盡帶將仕郎階若太尉秦翰者左璫之名將累立戰功始以將仕郎内侍省内府承局今則不問翰建彰國軍節湘山野録禮部郎官予治平初同判尚書禮部掌諸處納到廢印極多率皆無用按唐舊說禮部郎中掌省中文翰謂之南宫舍人百日内須知制誥王元之與宋給事詩云須知百日掌絲綸又謂員外郎為瑞錦窠員外郎㕔前有大石諸州府送到廢印皆於石上碎之又圖冩祥瑞亦員外郎㕔所掌令狐楚元和初任禮部員外郎有詩曰移石幾廻敲廢印開箱何處送新圖是也今之廢印宜準故事碎之春明退朝録南郊置五使每南郊大禮循唐制命五使宰相為大禮使學士為禮儀仗使知開封府為橋道頓逓使而禮儀使本太常卿事主事圖鹵簿使是其職也儀仗使排列之而鹵簿使督攝之其職頗相通資政殿學士大學士景德中上欲優寵王欽若乃特置資政殿學士以處之既而有司定議班在翰林學士下尋又置資政殿大學士亦以王欽若爲之而班在翰林承㫖之上則資政殿學士與大學士皆自王欽若始也端明殿學士後唐明宗不知書每四方章奏止令樞宻使安重誨讀而重誨亦了曉大義宰相孔循特置端明殿學士二員班在翰林學士上以馮道趙鳳為之則端明殿學士自馮道趙鳳始也國初亦嘗制此職而班在翰林學士之下尋改爲文明殿學士以侍郎程羽爲之序立乃在樞宻副使之下逮明道初復改承明殿為端明殿再置端明殿學士自宋綬始也二端明殿學士五代後唐時置國朝尤以為貴多以翰林學士兼之其不以翰院兼職及換職者百年間纔兩人特拜程戡王素是也御史言事不白長官御史臺故事三院御史言事必先白中丞自劉子儀為中丞始榜臺中今後御史所言不須先白中丞至今如此龍圖閣官本朝太宗御書及典籍圖書寶瑞之物並藏於龍圖閣而閣有學士直學士待制直閣故景德初杜鎬戚綸為龍圖閣待制不數年鎬遷龍圖閣直學士班在樞宻直學士下至祥符中鎬又遷龍圖閣學士而班在樞宻直學士上則本朝龍圖閣待制龍圖閣直學士龍圖閣學士皆自杜鎬始也又祥符末以崇文院檢討馮元為太子中允直龍圖閣則本朝直龍圖閣自馮元始也天章閣官本朝真宗御集御書並藏於天章閣天聖末始置待制以范諷為之景祐中又置侍讀以賈昌朝趙希言王宗道為之則本朝天章閣待制及侍讀自范諷賈昌朝等始也並青箱雜記三舘唐兩京皆有三舘兩各爲之所以逐舘命修撰文字而本朝三舘合焉並在崇文院中景祐中命修總目則在崇文院餘各置局他所葢避衆人所見太宗實録在諸王賜食㕔真宗祥符中修冊府元龜王文穆為樞宻使領其事乃就宣徽南院使㕔以便其事自後遂修國史㑹要名曰編修院又修仁宗實録而英宗實録同時並修遂在慶寜宫使舘領厯日周置修撰二員宰相爲監修自置編修院以修撰一人主之而厯日等書皆歸編修院三衙官舊制侍御親軍與殿前分爲兩司自侍衛司不置馬步軍都指揮使止置馬步軍指揮使以来侍衛一司自分爲二故與殿前司列爲三衙也五代軍制非無典法而今又非其舊制者多矣同三品同二品唐時始有同中書門下三品時中書令侍中皆正三品大厯中並升為二品晉天福五年升中書門下平章事為正二品國初樞宻使呉延祚以父諱璋加同中書門下二品用外品也觀文殿丁文簡公度罷參知政事爲紫宸殿學士即文明殿學士也文明本有大學士爲宰相之兼職又有學士爲諸學士之首後以文明者真宗之諡號也遂更曰紫宸近世學士皆以殿名爲官稱如端明殿資政殿是也丁既受命遂曰丁紫宸議者又謂紫宸之號非人臣之所宜更曰觀文然又是隋時殿名理宜避之盖當時不知然朝廷之事不可以不學也知州判州節度使爲三品刺史州為五品唐内臣爲中尉唯屬大都督國初曹翰觀察司判頴州是以四品臨五品也品同爲知隔品爲判自後唯輔臣宣徽使太子太保僕射為判餘並為知州通判國朝自下湖南置諸州通判院非副貳又非屬官故常與知州爭權每云我是監郡朝廷使我来監汝舉動為其所制太祖聞而患之下詔書戒勵使與長吏同押文書非與長吏同簽書者不得承受施行自此至今州郡徃徃與通判不和徃時有錢昆少卿者家世餘杭人也杭人嗜蟹昆嘗求補外郡人問其所欲何州昆曰但得有螃蟹無通判處則可矣至今士人以為口實並廬陵居士歸田録東西頭供奉官東西頭供奉官本唐從官之名自永徽以後人主多居大明宫别置從官謂之東頭供奉官西内具員不廢則謂之西頭供奉官蛾眉班唐制兩頭供奉官東西對立謂之蛾眉班國初供奉班於百官前列王溥罷相為東宫一品班在供奉班之後遂令供奉班依舊分立慶厯中賈安公為中丞以東西班對拜為非禮復令横行至今初叙班分立百官班定乃轉班横行㕘罷復分立百官班退乃出㕘用舊制也筆談賜裌公服文武陛朝官遇郊廟展禮諸大朝㑹並朝服起居並公服今百執事用常服上每歳誕節端午初冬各賜時服有差凡公服舊制雖冬賜亦祗單製至太祖皇帝在位訝其方冬而单衣詰諸有司對以遵用古法盖前代之闕典上於是特命改製今公卿大夫之有裌公服自此始也賜狀元金吾衛士蔡文忠公自為布衣時固已恢廓有大志而姿表秀異見者聳動祥符中擢進士為天下第一人真宗臨軒望其堂堂英偉進退有法大悅之顧冦莱公曰得人矣特詔給金吾衛士七人清道以為榮尋詔自今第一及第給金吾七人當直許出兩對引喝上聞公單貧傭僦僕𨽻故有此詔特詔佩魚陳堯咨以龍圖閣學士換觀察使自陳臣本儒生少習俎豆今荷聖恩易以武弁願佩金魚以示優異特詔從之澠水燕談兄弟封贈天聖中詔每遇恩霈朝臣中兄弟俱該封贈者許列狀陳乞特比常制例加優封叙從王子融請也賜衣服國朝之制文武官諸单闕在京者端午十月及聖誕節皆賜衣服其在外者賜冬衣袄遣使將之舊制在内者中書樞宻察院節度使至刺史諸軍列校以上學士金吾駙馬各給袍有差而學士給黄獅子錦品極貴淳化中改給盤鵰法錦之衣暈錦之袍凡袍錦之品四曰天下樂暈錦以給樞宰親王皇族觀察使以上侍衛步軍都虞候以上節度使盤鵰法錦衣給學士中丞三司使觀察使以上軍頭團練使以上皇族將軍以上駙馬都尉舊宰相翠毛鋼錦以給防團刺史軍主軍頭領刺史者黄獅子以給三司副使知開封府審刑登聞龍圖直學士簇欄錦之品十曰天下闕節度觀察使領部署者次暈錦以賜尚書以上學士管軍者盤鵰以賜觀察使丞郎翠毛以賜閣門使以上防團刺史管禁軍者倒仙丹以賜刺史以上方勝宜男賜諸司使領郡以上盤毬雲雁賜諸司使方勝練雀賜河北河東陕西轉運使副使餘軍校復有黄獅子寶照之品焉賜帶腰帶凡金玉犀銀之品自樞宰節度使賜二十五兩金帶舊用荔枝帶松花倒子寳照之品作瑞草地毬路文方圓胯帶副以金魚賜中書樞宻其武臣有宣徽樞宻使者仍舊制學士三司使中丞觀察使管軍四廂主而下賜二十兩金帶知制誥賜犀帶塗金魚亦嘗賜金飾牯犀副金魚非常例凡面賜紫者給犀帶塗銀寳瓶帶其賜伎術官雖紫緣皆給金銀帶使出賜金束帶兩數如其秩刺史而上受邊計者辭日亦賜二十兩金束帶其赴任者出賜塗金銀帶諸司使至崇班出為邊城鈐轄者亦賜金束帶十五兩二十兩凡二等惟駙馬都尉初選尚賜白玉帶自親王皇族皆許通服士大夫金帶雕玉白玉犀通牯犀帶賜鞍轡鞍轡除乘輿服黄金白玉雕玉玳瑁珍寶等鞍垂去鞘轡有三領諸王或賜金鞍者得乘之宰相使相賜寳相花韀八十兩金塗銀裝銜鐙㕘政副樞宣徽節度使駙馬繡盤鳳襍花韀七十兩陷銀銜鐙學士中丞三司使觀察使麻皮錦韀五十兩撒星素銜鐙復有三十兩决束鞍以賜東宫官属重戴重戴者大裁帽也本野夫巖叟之服以皂為之後魏孝文帝自雲中徙代以賜百僚五代以来惟御史服之淳化初宰相學士御史臺北省官尚書省五品以上皆令服之憲銜唐德宗幸奉天還京諸州郡闕例得假憲銜後至有郡王者迄今用之勅書樓太祖朝令天下置勅書樓並見楊文公談苑賜飲宰相第真宗朝歳時賜飲於宰相第兩省待制以上赴林尚書以諫議大夫爲三司副使亦預既而并諸副使遂以為常王太尉闕㑹惟用大官之膳少加堂餐自丁晉公助一家饌今皆踵之賜金帶國朝翰林學士得服金帶朱衣吏一人前兩府則朱衣吏兩人金笏頭帶佩金魚謂之重金居兩制久者則曰眼前何日赤腰下甚時黄處内廷久者又曰眼赤何時兩腰黄甚日重真宗幸吕文穆宅文穆有大第在洛中真宗祀汾時常駕幸正㕔其後人不敢復坐閑以䦨干設御榻焉即今張文孝公宅是也並見倦逰襍録事實類苑卷二十五

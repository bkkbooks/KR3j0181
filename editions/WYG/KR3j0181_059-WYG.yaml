body:
  text: 事實類苑卷五十九宋江少虞撰知人薦舉吕申公吕申公累乞致仕仁宗倚眷之重乆之不允他日復叩於便殿坐上度其志不可奪因詢之曰卿果退當何人代申公曰知臣莫若君陛下當自擇仁宗再三問之申公遂引陳文惠公堯佐曰陛下欲用英俊經綸之材臣所不知必欲圖任老成鎮靜百度周知天下良苦無如陳某者仁宗深然之遂大拜後文惠公極懐薦引之徳無以形其意因撰詞一闋攜觴相舘使人歌之曰二社良辰千家庭院翩翩又見新歸燕鳯凰巢穏許為隣瀟湘煙㝠來何晚亂入紅樓低飛緑岸畵梁時拂歌塵散為誰歸去為誰來主人恩重珠簾捲申公聽歌醉笑曰自恨捲簾人已老文惠應曰莫嫌調鼎事無功老於巖廊藴藉不減湘山野録章郇公寳元中河東闕漕使堂上議難得可任者章郇公言聞縉紳間説文彦博者磊落有稱時吕許公曰恨不識也召來試面詢之明日召至堂上許公都不交一談但睥睨不已郇公强問其鄉曲從次第因問河東事曰其鄉里無所不知郇公喜之文退許公嘆曰此大有福人何所任用不可遂自殿中侍御史差委明年就遷待制不出十年出將入相趙康靖公録陳恭公真宗時或薦梅詢可用者上曰李沆嘗言其非君子時沆之歿二十餘年矣歐陽文忠公等皆是後進雖貴顯而眷盼亦衰故學士王平甫撰胥公神道碑略曰諸孤幼甚歸於閩州公平日湔濯相踵而材勢大顯者無一人相助獨宋鄭公䘏其家甚厚盖兹事也南宫誠馮大㕘當世公始求薦於武昌㑹小宗者庸繆寡鑒堅欲黜落又欲置於末綴時鄂倅南宫誠監試當拆封定卷大不平奮臂力主之須俾魁送小宗者理沮不免以公冠於鄉闕果取大魁釋褐除荆南倅南宫遷譚倅以詩寄謝曰嘗思鵬海隔飛翻曾得天風送羽翰恩比丘山何以戴心同金石欲移難幾年空歎音題絶千里長思道義懽每向江陵訪遺治邑人猶指縣題看箋云江陵縣額即君臨治時親墨也並湘山野録孫參政孫㕘政抃為御史中丞薦唐介呉中復為御史人或問曰聞君未嘗與二人相識而遽薦何也孫答曰昔人耻呈身御史今豈求識面臺官也後二人皆以風力稱於天下孫晚年執政嘗嘆曰吾何功以輔政唯薦二臺官為無媿耳盧士倫張待問為淄川長山縣主簿縣有盧伯達者與曹侍中利用通婚復憑世䕃大為一邑之患累政憚其勢莫敢與之較張一日承令乏適㑹伯達以訟至庭即數其累犯杖之未㡬伯達之姪士倫來為本路轉運使衆皆為張危之或勸以自勉而去張曰盧公果賢者安肯銜隙以害公正之吏乎了不嬰意一日士倫巡按至邑召張語之曰君健吏也吾叔父賴君懲之今變節為美矣為發薦章而去並東軒筆録和凝和魯公凝梁貞明三年薛廷珪下第十三人及第後唐長興四年知貢舉獨愛范魯公質程文語范曰君文合在第一輙屈第十三人用傳老夫衣鉢時以為榮其後相繼為相當時有贈詩者曰從此廟堂添故事登庸衣鉢盡相傳澠水燕談孫宣公宋尚書祁為布衣時未為人知孫宣公奭一見竒之遂為知己後宋舉進士驟有時名故世稱宣公知人公嘗語其門下客曰近世諡用兩字而文臣必諡為文皆非古也吾死得諡曰宣若戴足矣及公之卒宋方為禮官遂諡曰宣成其志也廬陵歸田錄張乖崖轉運黄虞部好舉恃才之士乖崖公勸曰大凡舉人須舉好退者㢘慎知恥若舉之則志節愈堅少有敗事莫舉奔競者能曲事諂媚求人知已若舉之必能務才好利累及舉官故不少矣其人既解奔競又何須舉他忠定公語錄二張尚書鎮蜀時承㫖彭公乘始冠欲持所業為贄求文鑒大師者為之容鑒曰請君遇旌旄遊寺具襴􅀈懐文候之老僧先為持文奉呈果稱愛始可出拜葢八座之性靡測一日果來鑒以彭文呈之公黙覽殆遍無一語褒貶都擲於地彭公大沮後將赴闕臨期託鑒召彭至語之曰向示盛編心極愛嘆不欲形言者子方年少若老夫以一語奬借必凌忽自墮故擲地以奉激他日子之官亦不减老夫而益清近留鐵緡鈔二百道為縑緗之助勉之後略盡然湘山野録三蜀中士子好古文不事舉業迨十五年無一預解名者景徳元年李畋與同門生張及張達詣州請解先於承引司通姓名桑梓狀云公列云入試一日前陳桑梓二拜旁小語云不得唱畋與張却入客次其襴􅀈各贄事業十卷啟狀一通公坐所衣朝服輭履客將著衫鞾遣接事業公過開啟狀迴報公承見示至業未試公來謝尋差節度使推官韋宿充試官試官申乞差監試官判云知州親監一日前承引司復桑梓狀判云亦免桑梓客將至上㕔客禮及試日公送牌印付通判㕔曰今為國家試舉人如有生事則報來臨試時始問韋宿曰今日試何題目對曰試上善若水賦秋風生桂枝詩公曰詩題陳熟改試朝日蓮詩次日又問曰今日試何論對曰試禹稷之功公曰禹稷之功王者事業州郡豈合問他吾曾見州郡中䇿舉人問國家時務事此亦非宜乃改試文行孰先論公曰祗此亦可見二三子於文行中所存之心也三人俱獲解送鹿鳴筵前三日公率郡僚各賦送三秀才應舉詩公首唱五言古調詩并序曰益部去帝鄉四千里平昔英俊於進趨更賦之餘例乏資生之計鄉老之薦聲響久絶今年華陽邑大夫以三進士為請試官誦其文閭里稱其行又嘉其迹忘遐濶心戀明皇有以彰人文之盛朝廷徳澤流被於無窮也近世取鹿鳴之什以貢士斯筵之啟迨若是乎舉送官老不勝酒亦醉且嘉因歌詩以將之衆君子辭學先鳴請為賡歌之詩云公詩見本集是嵗仍奏給三人驛劵赴京西川士子目為盛事方奮起身鄉榮之志忠定公語録王沂公王沂公曾當國屢薦吕許公夷簡是時明肅太后聽政沂公奏曰臣累言夷簡才望可當政柄而兩宫終未用以臣度之太后之意不欲其班在樞宻使張旻之上耳且旻一赤脚健兒豈容妨賢如此太后曰固無此意行且用夷簡矣沂公曰兩宫既已許臣臣請即令宣召學士草麻太后從之及許公大拜漸與沂公不叶吕許公仁宗以西戎方熾歎人才之乏凡有一介之善必致録之杜丞相衍經撫闗中薦長安布衣雷簡夫才器可任遽命賜對於便殿簡夫辨給善敷奏條列西事甚詳仁宗嘉之即降㫖中書令檢真宗召种放事是時吕許公當國為上言曰臣觀士大夫有口才者未必有實効今遽薦之以美官異時用有不周即難於進退莫若且除一官徐觀其能果可用遷擢未晚仁宗以為然遂除耀州幕官簡夫後累官至員外郎三司判官而才實無大過人者王化基鞠詠為進士以文受知於王公化基及王公知杭州詠擢第釋褐為大理評寺知杭州仁和縣將之官先以書及所作詩寄王公以謝平昔奬進今復為吏得以文字相樂之意王公不答及至任略不加禮課其職事甚急鞠大失望於是不復兾其相知而專修吏幹矣其後王公入為㕘知政事首以詠薦人或問其故答曰鞠詠之才不患不達所憂者氣峻而驕我故抑之以成其徳耳鞠聞之始以王公為真相知也並東軒筆録李文靖寇萊公與丁晉公始甚相善李文靖公為相丁公尚為兩制萊公曰屢以丁薦而公不用何也文靖答曰今已為兩制矣稍進則當國如斯人者果可當國乎寇曰如丁之才相公自度終能抑之否文靖曰唯行且用之然他日勿悔也既而二公秉政果傾軋竟如文靖之言出倦逰襍録朱翰林太宗詔卿士舉賢良翰林朱公昂舉陳彭年陳彭年家貧無贄編可投之備入削奏乞終任不願上道杜龍圖鎬刁秘閣衍列章奏曰朱公端介厚重不妄舉人况彭年寔有才譽幼在江左已為名流所重乞不須召備試請問可也乃以本官直史舘玉壺清話王章惠王章惠公隨知揚州許元以舉子上謁自陳世家乃唐許逺之後章惠率同僚上表薦其忠烈之家乞朝廷推恩而通判已下皆不從章惠遂獨狀薦之朝廷以為郊社齋郎元有材謀曉錢榖為江淮置制發運判官以至為使凡十餘年號為能臣終天章待制涑水紀聞謝諫議謝泌諫議居官不妄薦士或薦一人則焚香捧表望闕再拜而遣置所薦雖少而無不顯者泌知襄州日張密學逸為鄧城縣令有善政鄧城去襄城渡漢水纔十餘里以暇日多乘小車從數吏渡漢水入郡城界以觀風謠或載酒邀張野酌吟嘯終日而去其高逸樂善如此張亦其薦也東軒筆錄二謝泌名知人少許可平生薦士不過數人而後皆至卿相每發薦牘必焚香望闕再拜曰老臣又為陛下得一人王文正公即其所薦士也倦遊襍錄三謝史館泌解國學舉子黜落甚衆羣言沸搖懐甓以伺其出泌知潛由他道投史館宿數日太宗聞知笑謂左右曰泌職在考校豈敢濫收小人不自揣分反怨主司然亦須避左右奏曰惟臺省知襍呵擁難近遂授知襍以避擲甓之患公深慕𤣥虚朴素恬簡病革盥沐衣服焚香端逝首不少欹王文正上宣諭曰聞趙安仁在中書絶不親事每奏對亦未嘗有一言可罷之王文正公對曰趙安仁居常有體凡有進擬皆同列議定方敢取㫖臣每見臨時變易於上前者皆迎合陛下之意安仁無異議是有執守上曰能如此朕不知也卿可諭以委任之意更令宣力公乃語趙趙曰上誤有拔擢以不才罷去宜矣使與衆人騁辨以合上意安仁不敢為也公喜曰吾適保安仁於上前不誤知人矣二王文正公一旦病謁告不入政府議知制誥盛度改諫議大夫知開封府上曰更問王某如允當入文書來中書座聖語問公公曰度必不樂此任政府召問之度曰幸以文進不願親吏事中書以度意聞上上曰王某銓量才品直是精當必使人各得其所向道須問王某度此命遂罷三㕘知政事李公穆之子行簡為將作監丞不復仕進杜門燕居而有儒雅之舉一日上召對賜坐撫御之改太子中允賜錢三百萬初令中使出召不知居處上曰去中書問王某時人方知公言之並名臣遺事四真宗時王文正旦為相賔客雖滿座無敢以私干之者既退旦察其可與言者及素知名者使吏問其居處數月之後召與語從容久之詢訪四方利病或使疏其所言而獻之觀其才之所長密籍記其名他日其人復來則謝絶不復見也每有差除旦先密疏三四人姓名請於上上所用者輒以筆㸃其首同列皆莫知明日於堂中議其同列爭欲有所引用旦曰當用某人同列爭之莫能得及奏入未嘗不獲可同列雖疾之莫能間也丁謂數毁旦於上上益親厚之曹瑋久在秦州累章求代上問旦薦樞密直學士李及上即以及知秦州衆議皆謂及雖謹厚有行檢非守邊之才不足以繼瑋楊億以衆言語旦旦不答及至秦州將吏心亦輕之㑹有屯駐禁軍白晝掣婦人銀釵于市吏執以聞及方坐觀書召之使前畧加詰問其人服罪及不復下吏亟命斬之復觀書如故將吏皆驚服不日聲譽達於京師億聞之復見旦具道其事謂旦曰向者相公初用及外廷之議皆恐及不勝其任今及材器乃如此信乎相公知人之明也旦笑曰外廷之議何其得也夫以禁軍戒邊白晝為盜於是主將斬之事之常也烏足以為異政乎旦之用薦者其意非為此也夫以曹瑋知秦州七年羌人讋服邊境之事瑋處之已盡其宜矣使他人往必矜其聰明多所變置變壞瑋之成績旦所以用及者但以及重厚必能謹守瑋之規模而已矣億由是益服旦之識度涑水紀聞事實類苑卷五十九

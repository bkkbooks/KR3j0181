body:
  text: 事實類苑卷四十八宋江少虞撰休祥夢兆原國公仁皇朝原國公承炳之姪侍宴於崇政殿仁皇數以酒屬之不敢辭遂醉即廷中賜輿親視其升勅衞士送還邸明日遣内人問起居以輩行呼而不名公好老氏之學一夕夢青衣執雉扇前導寤而告家人曰吾數盡矣具冠帶將朝而卒王文穆公王文穆公作舉人時謁南頓喬給事喬晝寐夢有人告云相公來謁喬戒閽者曰有賓客來悉通報闕次有一舉人投刺乃文穆也喬引入卧内見其容貌磊落以家人禮待之洎公作相喬之子孫俱拔擢見康靖公聞見録歐陽文忠公歐陽永叔侍郎說頃年知南譙日忽夢授潁州又夢公僕輩具帳明日與幕中㑹計什物於㕔下夢中問主者曰何用對曰此宴相公物令交割與新知州明日與幕中㑹因說此夢必當移潁州未幾移揚州又數年果差知潁州人云食禄有地信前定之不可移也李文定公李文定公迪美髭髯未御試前一夕夢被人剃削俱盡迪惡之有解者曰秀才須作狀元縁今嵗省元是劉滋已替滋矣非狀元而何是嵗果第一人劉相國相國劉公沆累舉不第天聖中將辦裝赴省試一夕夢被人斫落頭心甚惡之有鄉人為之解曰狀元不到十二郎做劉公第十二只得第二人劉公因詰之曰雖斫却頭留沆在裏盖南音謂沆為項留劉同音後果第二名見青箱襍記元厚之元厚之少時曽夢人告之曰異日當為翰林學士須弟兄數人同在禁林厚之自思素無兄弟疑此夢為不然熈寧中厚之除學士同時相先後入學士院一韓持國維一陳和叔繹一鄧文約綰一楊元素繪并厚之名絳五人名皆從糸始悟兄弟之說筆談辛文恱辛文恱嘗以五經教授太祖幼時從之肄業周顯德中太祖為殿前都檢點久不獲見一日夢邀車駕請見既下拜乃太祖也太祖亦夢其來謁因令左右尋之文恱果自至後累至員外郎凌侍郎張乖崖鎮益州屢乞代當蜀難已平願均勞逸王文正旦舉凌侍郎䇿且言性稟純懿臨涖强濟無所曠上喜遂除之凌公少年嘗夢人以六部印懸劍以授之後在劍外六年見蜀苑䝉求謝濤太子賓客謝濤生平清慎恬於榮利晚節乞知西臺尋分務洛中不接賓客日覽舊史一編以代賓話將終前一日夢中得詩一章覺呼其孫景初録之曰百年事業半張紙千古英雄一窖塵唯有炳然周孔教至今仁義浸生民足以見篤於仁義著於神明至死而不亂也見澠水燕談懿德皇后懿德皇后符氏陳州宛丘人彦卿之女太宗之后后生之夕有大星出光掩衆宿識者以為貴兆楊礪楊礪字汝礪京兆人嘗寓僧舍夢一人衣冠甚古謂曰若能從我遊乎隨之至一宫大殿其人服王者服秉珪南向凡三十餘人礪即禮謁之最上者前有案置籍記人姓名礪見己名冠首因請指休咎一人示曰此來知天尊異日為汝主礪問功名曰此去四十年汝成功名乃顯寤而志之初名礪後改名從夢中見者至是為襄王記室謂諸子曰即夢中所見來知天尊盧秉盧秉元豐間有能詩名嘗卧疾夢入古祠祠有大池島嶼森列錦衣綉幘者襍焉繽紛數十百人問之曰未央宫也頃一緑衣中使亟召盧過池至大殿坐土木偶數十闕餘丹緑陳暗而笑語高徹旁一人引盧就席給筆札命賦宫詞既寤記其半是日向午復昏絶又續其夢中夜而興乃盡得其詩絮撲芙蓉苑花開太液波黄頭吹月笛櫂影落天河草染天邊碧荷舒日脚紅應知親帝澤不必藉春工花蕚絳光影簾旌燕子風遊絲避金葆吹過紫垣東翠環䨇鳯帶小隊五行啼十二龍鉤捲棃花爛熳時苑帶水流逺閒從秘苑來春風如解意不敢起纎埃粉蝶飛仙骨隨風過苑牆穿花不敢採應怯内家香沉沉水過宫槐緑寂寂春殘輦路香細想人間無此景夜來魂夢到昭陽迎春新燕尾纎纎拂栁穿花掠翠簷聞道蕚華三十六美人爭為捲珠簾蓬萊風蹙水文斑月甃風廊四百間雲外蹕聲穿嶺去行宫簇馬望驪山落月濛濛立夏天樓前槐葉影初團傳聞紫殿深深處便有薰風入舜絃明年病夢如乍聽霓裳三獻覺而語家人曰霓裳聲絶人世矣又三獻吾能久乎已而果卒今觀前人辭章不正者類託之夢兆此詩明白怪奇如是殆不可理推也見西清詩話趙閱道治平初龍圖閣直學士趙公抃鎮成都有張山人者不知所居數至李道士舍一日語李曰為我白龍圖公促治裝行當入覲且㕘知大政矣趙聞而異之喻李令與俱來及再至李欲邀之同見公張固辭曰與公相見自有期今未可也李具以告公公曰候其再至密令人來白公當屏去導從默往見之他日又至李方遣人白公而張遽求還留之不可曰龍圖且來矣公方命駕聞其去乃止益奇之未幾果膺召命乃貳政柄及出鎮青社熈寧五年張遺公書云當來相見公大喜語賓僚曰張山人且來矣久之無耗至秋公奉詔再鎮成都方悟曰山人言來乃吾當往也故將行先寄張詩有不同叅政初時入謂李餘慶也也學尚書兩度來謂張乖崖公也到日先生應笑我白頭猶自走塵埃之句見渑水燕談邊鎬江南邊鎬初生其父忽夢謝靈運持刺來謁自陳永嘉守修髯秀彩骨清神疎所披衣巾輕若烟霞曰欲托君為父子頃寄游西飛來峰番譯金剛經然其疏分中有未合佛㫖者願寄君家刋正無他祝慎勿以葷羶噉我及七嵗放我出家為真僧以畢前經夢訖鎬生眉顔高古類夢中者父愛之小字康樂成童聰敏好文字盡若夙誦堅求出家其親不肯以葷逼之初不能食後亦稍進及冠翹秀議姻者衆雙親强而娶焉後嗣主璟愛其博雅累用之然而柔懦寡斷唯好釋氏初從軍平建州凡所克捷惟務全活建人德之號為邊羅漢及克湘潭鎬為統軍諸將欲縱掠獨鎬不允軍入其城巷不改市潭人益嘉之謂之邊菩薩及帥於潭政出多門絶無成斷惟事佛僧楚人失望謂之邊和尚艾侍郎艾侍郎穎少年赴鄉舉逆旅中遇一村儒狀極闒茸顧謂艾曰君此登第必矣艾曰賤子家於鄆無師友加之汶上少典籍今學問疎寡聊觀場屋爾安敢俯拾耶儒者曰吾有書一卷以授君宜少俟於此詰旦奉納翌日果持至乃左傳第十卷也謂艾曰此卷書宜讀取富貴後四十年亦有人因此書登甲第然齡禄俱不及君記之艾頗為異時亦諷誦來㑹李愚知舉試鑄鼎象物賦事在卷中一揮而就愚愛之擢甲科後四十年當祥符五年御前放進士亦試此題徐奭為狀元後艾果以戸部侍郎致仕七十八薨於汶徐嵗四十四翰林學士卒見玉壺清話胡旦胡旦為兵部郎中知制誥將獲罪前數日禁中忽報云召對賜鞭馬𫝊者悉白有位邸吏傳報四方既而詰之虚也並不知所得之自數日貶安州行軍司馬此事目所覩焉富鄭公富鄭公早年嘗夢青州王相公以後事相託鄭公曰相公德被生民當得遐夀何遽及此後二年罷相知鄆州辟鄭公為倅到任嵗餘有大星墜於宅園東北角家人怪之相公曰後月當見至後月薨鄭公為主喪事故鄭挽詞曰遺德被生民正與當年夢中符契吕端公吕誨端公先朝為御史直言正色傾動朝野以言事出知安州一日獨坐瞑目忽見一碧衣童云非久玉帝南游炎州命子隨行闕正羣仙炎州苦􅉯上帝賜公清涼丹一粒公拜賜因而吞之若氷雪下咽乃覺公頗異其事亦為所親者言之不久公捐館進士朱明復登第自湖北渡湘江道見有擁兵數百人前導次見公跨玉角青鹿左右皆青衣闕明復雅與公善乃降騎拜曰公何之也公其已仙乎公笑而不答公曰吾侍上帝南游不得叙欵曲口占一篇為别詩曰功行偶然書玉闕衣冠無限葬塵埃我今從帝為司紏更有何人値栢臺乃南去後數日方聞公謝世云鍾輻金陵才士鍾輻少年氣豪一老僧相之曰君及第則家亡時樊若水愛輻之才以女妻之及燕爾應詔洛中果中科甲由是攜一女僕青箱過華洲蒲城其宰乃故人延留數日一夕盛暑追凉縣樓痛飲而寢是夕夢樊氏出一詩示生怨責頗深詩云楚水平如練雙雙白鷺飛金陵幾多地一去不言歸夢中恍謝戲答一篇曰還吳東下過蒲城樓上清風酒半醒想得到家春已暮海棠千樹必凋零既寤因趣裝歸至采石渡青箱心疼數刻暴卒生為藁葬於一新墳之旁洎至家門巷空寂聞妻妾已亡數月詢之親隣樊亡之日乃夢於縣樓之時也青箱葬處乃樊之塋地也不植他樹惟海棠數枝葉蕚凋謝正合詩意鍾歎曰浮圖老僧之說信哉竟不仕隠于鍾山著書養氣夀八十餘王素王素待制乃丞相旦之子自筮仕所至稱為能吏既升臺憲風力愈勁嘗與同列奏事上前事有不合衆皆引去公方論列是非俟得㫖乃退帝曰真御史也議者目公為獨擊鶻一日欲作奏論亊方據几案則瞑目思睡乃就枕夢至一處若瓊瑶世界殿上有紺服翠冠與公對揖紺服者謂公曰公棄去仙局下謫塵世未久也吾即玉京黄金闕東門侍郎也公向以奏牘玉帝語傷鯁訐暫謫下世今公欲作奏論事事有大利害容更審之而後諍也公曰諾上顧左右送公歸乃寤夜已三鼓乃索筆書一絶於牕云似至華胥國裏來雲霞深處見樓臺月光冷射雞鳴急驚覺游仙一夢回後出鎮定武亦以惠政稱晚嵗思玉京之夢乃為詩曰虛碧深藏白玉京夢魂飛入黄金城何時再步煙霞外皓齒青瞳已掃㕔石曼卿石曼卿天聖寶元間以詩歌豪於時嘗於平陽㑹中作代意寄尹師魯一篇詞意深美曰十年一夢花空委依舊山河損桃李鴈聲北去燕西飛高樓日月春風裏眉北石州山對起嬌波泪落粧如洗汾河不見天南流天色無情淡如水曼卿死後數年故人闗詠字永言忽夢曼卿曰延年平生作詩多矣獨常以為平陽代意一篇最為得意而世人罕稱之能令此詩盛傳於世在永言耳詠覺後増演其詞隠度以入迷仙引聲韵於是天下爭歌之他日復夢曼卿致謝見名賢詩話韓魏公魏公治維揚日有一異人相訪云公之名位當如州東闕官至公師而憂責過之候某年某月日可見但一生為丘八所攖耳既而潜去不復見嘉祐中自樞密使拜集賢相有來賀者乃當時維揚所見之人也語公曰記當時所道月日否乃今日也公此去方任重責山野之人今將永托門下公喜留之㑹客至先起尋失所在二元絳與堂叔來赴省試既至都下叔因疾委頓厚之已為營幹凶具矣經久復蘇乃云𠖇中曾到一官府殿閣甚多金碧相照俄過一堂上有榜云侍中堂俯而窺則字皆黄金又以青紗覆之其人姓名有四曰趙普曰丁謂曰馮拯曰韓某厚之即書其事於紙公時未第人亦莫知有公姓名後省榜出忽見之人猶戲相謂曰元氏之夢非此人乎既而唱名公亞榜首聞時事者固己異之既授監丞通判詣朝堂過正衙時朝堂中數朝士見一衣朱少年同坐未甚禮焉及相問姓名乃云近有人夢君為侍中知否公遜謝不敢當後推考本朝為真侍中者惟此四人而已魏王别録後山居士夢中賦詩往往有之宣和己亥嵗僕在洪州宿城北鄭和叔家夜夢行一大路中寒沙没足其旁皆田苗丘隴一婦人黄衣紫裳行田間因曰此中無沙易行僕從之不能登婦人援僕手登焉月明無樹彌望皆野田麥婦人求詩引僕籍草坐有短磚臺一上有紙筆僕題詩四句云閒花亂草春春有邊鴻社燕年年歸青天露下麥苗濕古道月寒人迹稀拍筆磚上有聲驚覺宛然記憶是嵗大病幾死後亦無他江子之予友江子之夢與余同登樓飲酒送客子之夢中作詩云晚風殘日下危樓斜倚闌干滿眼愁休唱陽闗催别酒春愁離恨總悠悠見李希聲詩話夢中賦詩昔士人忘其姓名夢到一處與客泛舟環水皆奇峰可愛賦詩云山色濃如滴湖光平如席風月不相識相逢更相得既寤而言之後數日卒詩䜟范魯公之孫令孫也有學行登甲科闕公輔器之王魏公旦妻以息女令孫嘗以登覽有詩曰孤雲不為雨盡日却歸山識者謂不極進用之兆令孫官止右正言年五十卒士大夫哀而惜之二濮州人李植成伯與張續禹功師事徂徠石守道為門人高弟歐陽文忠讀徂徠集詩常續最高弟騫淅各名科成伯少首被名當嘉祐中詔舉天下行義之士敦遣詣闕成伯前被此舉詔書方下而卒士大夫痛惜之時禹功居南曹成伯卒前數日以詩寄禹功其句曰野堂吹落讀殘書禹功怪其語不祥逕往訪之未至濮成伯已卒矣見澠水燕談三詩以言志言以知物信不誣矣江南李觀通經術有文章應大科召試第一嘗作詩曰人言日落是天涯望極天涯不見家已恨碧山相掩映碧山還被暮雲遮識者曰觀此詩意有重重障礙李君恐時命不偶後竟如其言陳文惠公未達時嘗作詩曰千里好山雲乍歛一樓明月雨初晴觀此詩意與李君異矣然則文惠致位宰相夀八十餘不亦宜乎見青箱雜記四宋莒公庠知許州開西湖作詩曰鑿開魚鳥忘情地展盡江湖極目天識者觀詩意則知公位極一品矣孟郊下第詩曰棄置復棄置情如刀劔傷又再下第詩曰兩度長安陌空將泪見花其後及第詩曰昔日齷齪不足嗟今朝放蕩思無涯青春得意馬蹄疾一日㸔盡長安花大凡進取得失蓋亦常事而郊器宇不宏偶一下第則其情隕穫如傷刀劍以致下泪暨後登科則其志充溢若無所容一日之間花即㸔盡何其速也後郊授溧陽尉竟死焉見青箱雜記五丞相劉公沆廬陵人少以義氣自許嘗詠牡丹詩云三月内方有百花中更無又述懐詩曰虎生三日便窺牛獵食寧能掉尾求若不去登黄閣貴便湏來伴赤松逰奴顔婢舌誠堪恥羊狠狼貪自合羞三尺太阿星斗煥何時去取魏齊頭皇祐中公初出鎮豫章轉運使潘公素有詩名乃以小孤山四十字示公公即席和呈文不加㸃詩曰擎天有八柱一柱此焉存石聳千尋勢波留四面痕江湖中作鎮風浪裏蟠根平地安然者饒他五嶽尊覽者皆知公有宰相器矣未㡬㕘大政遂正鼎席六冦萊公少時作詩曰去海止十里過山應萬重及貶至雷州吏至呈州圖問州去海㡬里對云十里則南遷之禍前詩已預䜟矣見青箱雜記七乖崖張公詠晚年典淮陽郡遊趙氏西園作詩曰方信承平無一事淮陽閒殺老尚書後一年捐館亦詩䜟也見青箱雜記八蘇緘字宣甫性忠義喜功名皇祐中以秘書丞知英州值儂賊作亂他州皆不能守獨緘捍禦有功恩授閣職尋坐事貶房州司馬嘉祐中復官權知越州諸暨縣余與之同僚嘗贈緘詩曰燕頷将軍欲白頭昔年忠勇動南州心如鐵石老不挫功在桑榆晚可收後十有八年緘知邕管交趾叛攻城力戰陷没朝廷憫之贈奉國軍節度使賜諡忠勇則所謂忠勇之諡已先於余詩䜟之矣見青箱雜記九蘇子羙慶厯末謫居姑蘇以詩酒自放一日觀魚滄浪亭有詩曰我嗟不及遊魚樂虛作人間半世人識者以為不祥未㡬果卒年四十一天下士大夫咸嗟惜之見澠水燕談十鄭毅夫詩格飄放晚年為遇雨詩曰老天燒空未肯休忽驚快雨破新秋晚雲濃澹白日下只在楚江南岸頭未㡬自杭移青道病􅋈舟髙郵亭下乃卒何自䜟之明也見澠水燕談十一丁晉公在中書總領真宗山陵事李維在翰林援其親識為挽郎有懇請於謂曰更在陶鑄丁應聲曰陶鑄復陶鑄齋郎更挽郎李繼曰自然堪下淚何必更斜陽未㡬丁敗見名賢詩話十二晉公從駕東封與顯官聚話因話及東嶽有奈何黑水乃人間隂獄也晉公感其事而成詩焉黑水溪旁􅂓駐馬奈何岸上是回頭髙崖昏處是隂獄須信人生到此休公後貶崖州亦前定也事實類苑卷四十八

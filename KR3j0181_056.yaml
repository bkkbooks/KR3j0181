body:
  text: 事實類苑卷五十六宋江少虞撰忠孝節義栁仲塗河東先生栁仲塗少時縱飲酒肆坐側有書生接語乃以貧不能葬其父母將謁魏守王公裕求資以辦事先生問費幾何曰得錢二十萬可矣先生曰子姑就舍吾且為子謀之罄其資得白金百兩錢數萬以遺之議者以郭代公之義不能逺過澠水燕談死婦阿毛愍説者不知何人所撰偶一弊册中録之云熙寧丙辰四月二十六日襄州通衢一死婦阿毛其夫楊金配𨽻房陵既死本州請陳願負夫骨歸葬故鄉遭時大疫遂斃于道嗚呼轅門之匹婦豈不知改從於人免凍餒以茍餘生乎翻能以義藏中毅然不憚數千里之逺負夫骨以歸此節婦義女之為及斃于道天乎福善助順之理信所以難忱也膏粱士俗之家夫始屬纊即括奩結橐求他耦而適者多矣宜將何理以殛之玉堂嘉話馮守信馮守信事真宗為步軍指揮會郊禮其弟欲以其子冒為守信子取髙蔭守信曰吾自行伍主上拔擢至此每愧無以報稱奈何欺之耶是嵗并巳子無所蔭以明於弟無所愛田元均慶厯中田元均帥秦鳯喪其父乞解官奔喪仁宗纍降手詔乂遣中使勉諭元均既葬託邊事求見上曰陛下以孝治天下方邊隅無事而區區之心不得自從因泣下上視其貌乃許終喪其後富韓公以宰相丁母憂仁宗詔諭數十竟終喪乃起蓋大臣終喪自二公始澠水燕談相州部民張某張洎言典相州日有部民張某殺一家六人詣縣自陳縣上州洎詰之曰某家之姻貧困常取息少有所負被其詬辱我熟見而心不平思為姻家報仇幸畢其志然所恨七口而遺其一使有噍類私仇已報願公執法洎曰殺人一家寧無黨乎對曰某既出身就死肯復連及同謀又曰汝何不亡命對曰姻家即某鄰茍不獲盜豈得安堵又曰汝不即死何就縲絏曰我若滅口誰當辨吾姻之不與謀乂孰與暴其事於天下等死死義可乎洎曰吾將聞上赦汝之死曰殺人一家而茍活且先王以殺止殺若殺人不誅是殺人終無已豈願以一身亂天下法哉速死為幸洎嗟歎數四卒案誅河朔間無不傳其事者楊文公談苑龔穎龔穎邵武人先仕江南歸朝為侍御史嘗憤臣盧絳殺其叔慎義文害其家後絳來陛見舞蹈次穎遽前以笏擊而踣之太祖驚問其故穎曰臣為叔父復讎非有他也因俯伏頓首請罪極言絳狼子野心不可畜太祖即下令誅絳義穎而赦之劉溫叟劉溫叟父名嶽終身不聽樂不遊嵩峰每赴內宴聞鈞奏回則號泣移時以謂若非君命則不至于是此與唐李賀父名晉肅賀不敢舉進士事頗相類並青箱雜記張藴咸平中契丹舉國入寇南至淄青淄川小郡城壘不完刺史吏民咸欲棄城奔於南山兵馬監押張藴按劍厲聲曰今何去城隍委府庫大衆一潰更相剽奪敵未至而民已殘矣刺史若出吾當斬以徇由是無敢動者後為環州馬嶺鎮監押雖處窮塞猶建孔子祠刻石為記慶厯中范文正公適其地書其碑隂以美之藴二子揆掞以文學才行有名于世皆登侍從劉輝鉛山劉輝俊敏有詞學嘉祐初連冠國庠及天府進士四年崇政殿試又為天下第一得大理評事簽書建康判官喪其祖母乞解官以嫡孫承重服國朝有諸叔而嫡孫承重服者自輝始輝哀族人之不能為生者買田數百畝以養之四方士人從輝學者甚衆乃擇山谷勝處以處之縣大夫易其里曰義榮社名其館曰義榮齋未終喪而卒大夫惜之初范文正公吳文肅公皆有志置義田及後登二府祿賜豐厚方能成其志而輝于初仕家無餘資能力為之士君子尤以為難富大監王郎中扈郎中褒嘗言昔知蘇州吳縣蘇州士大夫寓居者多然無不請託州縣獨致仕富大監嚴三年無事相委又丘太傅舜元言嘗知洪州新建縣洪之右族多撓官政但致仕王郎中述安貧杜門衣食不足而未始苦人斯二人者固未嘗知其亷節也倦遊録劉煥康定中趙元昊既獲劉平遂約吐蕃毋與中國通隂相為援朝廷患之擇能使絶域者將以恩信喻唃氏尚書屯田員外郎劉煥上書請行間道馳至青唐城誚讓唃氏皆頓首悔謝請以死捍邊因盡畫其地形并誓書還奏仁宗嘉歎進直昭文館俄而元昊臣服再加刑部郎中賜金紫煥之奉使也或數日不得食於佩囊得藥數粒咀潤咽喉唃嘶囉吐蕃呼啼曰唃嘶囉諀烏兒子二字稱為佛之兒子也更鼓自昏逹旦三撾而已每有公事量大小以綿綺裹其訟牒物多者為有理澠水燕談王逵王逵屯田郎中李曇僕夫也事曇父親信之既而去曇應募兵以選入櫸目軍十餘年會曇以子學妖術妄言事父子械繫御史臺獄上怒甚治獄方急曇平生親友無一人敢問之者逵旦夕守臺門不離給飲食候信問者四十餘日曇坐貶南思州别駕仍即時監防出城諸子皆流嶺外逵追送之防者逼之逵曰我主人也豈得不送之乎曇河朔人不習嶺南水土其從者皆辭去曰某不能從君之死鄉也數日曇感患自死旁又無家人逵使母守其尸出為之治喪事朝夕哭如親父子見者皆為流涕殯曇於城南佛舍然後去嗚呼逵賤𨽻也非知有古忠臣烈士之行又非矯節求令名以取祿士也獨能發於天性至誠不顧罪戾以救其故主之急於終始無倦如此豈不賢哉嗚呼彼所得於曇不過一飯一衣而已今世之士大夫因人之力或致位公卿已而故人臨不測之患屏手側足戾目窺之猶懼其禍之延及己也若畏猛火逺避去之或從而擠之以自脫敢望其憂恤拯救耶彼雖巍然衣冠類君子哉稽其行事則此僕夫必羞之涑水紀聞潘盎謝福皇祐四年五月廣原蠻儂智髙率衆陷雍又將襲廣至梧州有潘盎者棄妻子儒衣常持一大翣行坐獨語南粵謂愚為盎儂賊聞其異召而問曰吾形貌如何盎曰汝一賊耳他無所類又問曰梧州幾日可陷曰百年亦不可陷又曰吾欲據此城以為南粵如何曰汝將斬首豈能有粵耶賊遂害之一日城西有人疾呼曰城中將士宜無懈賊計窮矣明日當燒西門急備水以滅之問曰汝何人曰虎翼兵謝福也先為賊虜今不忍負國故以死告語罷賊殺之明日果以硫黃聚草燒西門賴水撲滅賊乃解去湘山野録將相才略曹武惠曹武惠彬始生周嵗日父母以百玩之具羅于席觀其所取武惠左手持干戈右手取爼豆斯須取一印餘無所視後果為樞密使相卒贈濟陽王配饗帝食雖兼領將帥不以爵祿自大造門者皆降廡而揖不名呼下吏吏之稟白者雖劇暑不冠不與見平江南西蜀二國諸將皆捆載而歸惟公但圖史衾席而已為藩帥途中遇朝紳必引車回避過市戢其傳呵戒導吏云馬不得越十輪恐壅遏市井性仁恕清慎無撓強記善談論清白如寒儒宅帑無十日之蓄至坐武帳正衣冠綈紵素而已征幽州偶失律于涿鹿素服待罪趙參政昌言請案朝廷察之止貶右騎衛上將軍未幾趙𠫭政自延安還因事被劾於尚書省久不許見時公方復樞密使三抗疏力雪之方許朝謁士論歎服天禧三年授使相拜制未久而卒玉壺清話二曹彬事太祖時將討金陵責後主稱疾不朝之罪以彬長者令為統帥以保全其城彬纍遣告城中大軍決取十一月二十七日破城宜早為之圖後主將遣其愛子清源郡公仲寓入覲至仲冬下旬日日克期仲寓將出彬屢遣督之言郎君到寨即四面罷攻終惑左右之言以為堅壘如此天象無變豈可計日而取蓋敵人之言豈足為信但報言行李之物未備宫中之宴餞未畢將以二十七日出彬又令懇言至二十六日亦無及矣果以是日城陷整軍成列至其宫城門後主方開門奉表納降彬答拜為之盡禮先是宫中預積薪後主誓言若社稷失守當攜血屬以赴火既見彬彬諭以歸朝俸賜有限費用至廣當厚自齎裝既歸有司之籍則無及矣遣後主入治裝禆將梁迥田欽祚皆力爭以為茍有不虞咎將誰執彬但笑而不答迥等切諫彬曰非爾所知觀煜神氣懦夫女子之不若豈能自引決哉煜果無他彬遣五百人為搬致輜重登舟有一卒負下道回旋彬立命斬之負擔者罔敢蹉跎後主既失國殊無心問家計既升舟隨軍官吏入宫觀屏幃几硯什器皆設不動所賫持鮮矣後賈黃中知州因領賔客厯覽宫內見一斜門封鎖甚固即召官吏同啓鎖視之得金寶受用物言直三百萬緡城之陷也有淨德尼院近四十餘衆皆宫中人出家者也城危亦積薪于院庭後主悔之約如有不虞宫中舉火為應當皆焚死是日浙兵縱火淨德遙觀其焰起一院四十人皆赴火死無一人肯脫者楊文公談苑三曹冀王彬前後受命帥師征討諸國凡降四國主江南西川廣南湖南也未嘗殺一無辜功名顯著為諸將之首諸子皆賢令瑋琮璨繼領旄鉞陶弼觀王畫像有詩曰搜兵四解降王縛教子三登上將壇其後少子玘追封王爵實生光獻慈聖太后輔佐仁宗母儀纍朝聖功仁德天下懷慕以至濟陽生享王爵子孫昌盛近世無比非元功隂德饗報深厚何以至此雖漢馬唐郭殆無以過嗚呼盛哉澠水燕談四曹武惠王彬國朝名將勳業之盛無與為比嘗曰自吾為將殺人多矣然未嘗以私喜怒輒戮一人其所居堂室弊壞子弟請加修葺曰時方嚴冬牆壁瓦石之間百蟲所蟄不可傷其生其仁心愛物蓋如此既平江南回詣閣門入見榜子稱奉敕江南幹當公事回其謙恭不伐又如此辛仲甫太祖問趙韓王儒臣中有才勇兼人者何人趙以辛仲甫為對曰仲甫才勇有文頃從事於郭崇文教其射法後崇文反師之贍辨該博縱橫可用遂召見時太祖方以武臣戡定寰宇更不暇他試使令武庫以為新漆徑弓令射仲甫輕挽即圓破的而中又取堅鎧令擐之若披單衣太祖大稱愛仲甫奏曰臣不幸本學先王之道願致陛下於堯舜之上臣惟遇昌時陛下止以武夫之藝試臣一弧一矢其誰不能上慰之曰果有竒勳用卿非晚後􅏡歷險易雍熙三年參大政公嘗為起居舍人使契丹敵主曰中朝黨進者真驍將也如進輩有幾敵所以固矜者以為進本北人中國無也公對若進輩鷹犬駑材耳行伍中若進者不可勝數敵主少沮以維縶意中之辛曰兩朝以誠講好今渝約見逼臣有死而已嘗笑李陵輩茍生甘耻于荒遠之城無足取也契丹厚賂遣之度其志必不可奪也折御卿折御卿淳化中拜永安節度使府總管契丹萬餘騎忽入寇御卿一擊遂敗斬五千級獲馬千匹擒司徒舍史數十人敵中號為突厥太尉太宗大賞之自後世襲其爵子孫世為府州總管治其郡夏倚中立常言嘉祐中為麟倅公牒至府州其時乃御卿四世孫不類武夫雖為雲中北州大族風貌龎厚揖讓和雅其子弟亦粗知書留州中凡數日出圖史器玩琴樽弧矢之具雖中州縉紳家止于是耳信乎文德之遐被也數馬于庭雖上間殆少嵗仲春縱遊牝于燕山孕歸于櫪任自産其種必渥窪也然其牝闕有歸者馬太尉真宗車駕在澶淵大將王超擁兵十萬屯真定逗留不進馬太尉知節移書詬讓復辭以中渡無橋徒涉為患公命工度材一夕而就始肯出兵知節全義之子七嵗父卒太祖軫念曰真羽林孤兒也召入內送國子學列青襟胄子之間御賜今名彼果有立才三十餘為樞密使咸平初帥秦號為善政奏質羌酋支屬二三十輩殆二紀公悉遣歸諸蕃懷感終其任不敢犯邊水泉銀緋纍嵗不發嵗課不除主吏破産鞭撲纍世公三奏悉已之知延州或人將謀入鈔值上元令大張燈纍夕大開諸門敵不測即皆引去李士衡李士衡少時有一俠者遺一劍囑之曰若他日發迹在於劍記之後為祕書丞知劍州王均亂成都陷漢州進攻綿不下因趨劍門士衡預度寇至城必不能守縱全綿居民保劍閣焚其倉庫厚募軍卒之流迸者得數千人賊果至公與監軍裴臻據關禦之倉庫既焚數夕大氷雪均衆食敗槽木皮臻與再戰斬凍餒者三千級墮崖壑者無算賊宵遁保益州馳奏既上除士衡度支員外郎臻崇義使公果因劍發迹以至貴顯逮卒劍亦失之雷宣徽雷宣徽有終李順亂為峽漕調發兵食規畫戎事大有紀律至廣安軍賊勢充斥公瀕江之南樹柵一夕隂晦賊衆掩至鼓譟舉火公安坐自若賊既合公引竒兵出其後擊之賊驚亂赴水火死者無算遷右諫議知益州寓佛舍度賊必至命左右重關召土人嚴更警備初夕間道而出賊圍寺闕得擊柝者公喜施豫豐於宴犒費不足則頃私帑給之奉身止銅鞍勒而已頗涉道因讀史廢書流涕曰功名者貪夫之釣餌橫戈開邊拔劍討叛死生食息之不顧及其死也一棺戢萬事已悲夫景德初卒王顯王顯太宗在藩與周榮為給事赤腳道者相顯曰此兒須為宰相但無隂德耳及長太宗愛之曰爾非儒家奈寡學問他日富貴不免面牆取軍誡三篇令誦之咸平三年以使相出帥定州便宜從事忽一旦道士投刺進謁破冠褐自稱酆都觀主笑則口角至耳亂鬢若剛鬛謂顯曰昨日上帝牒蕃魂二萬至末觀未敢收於冥籍死於公之手者公果殺之則功冠於世然減公算十年二端請裁之顯謂風狂叱起後日契丹引數萬騎獵於威逺軍境而梁門也會雨敵弓皆皮弦緩弱不可用顯引兵徑襲大破之梟名將王貴輩十五輩獲偽羽林印二組斬二萬級築京觀於境上露布至闕朝以樞相詔歸赴道數程而卒楊信楊信髙陽人忠朴善御士卒開寶三年為散指揮廨居直大內之北一夕終夜忽夢巨龜銜敕叩其寢信驚起披衣曰大廷必有警果太祖開玄武門急召信入禁中擒叛黨杜庭等十九人隂以姓名授之離明盡為信所捕上擒至便殿不用吏鞠面詰得實悉戮於市信忽患瘖太祖惜其善撫轄以重兵之柄委之雖不能語而申呵紀律嚴肅有度有女童曰玉奴者天賦其慧善揣信意凡奏事及指揮賔客語論但回顧女奴盡掌其字悉能代信語輕重緩急便否避坐盡協其意病將革忽能語太祖親幸其第信力疾扶於榻感步敘謝音詞明徹至死猶叩頭乞嚴邊備無忽邊障信泣太祖亦泣之翌日卒賜端玉小玦為含並玉壺清話事實類苑卷五十六

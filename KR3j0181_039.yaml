body:
  text: 事實類苑卷三十九宋江少虞撰詩歌賦詠王建宫詞王建宫詞一百首多言宫禁中事皆史𫝊小說所不載者徃徃見於其詩如内中數日無呼喚搨得滕王蛺蝶圖滕王元嬰髙祖子新舊唐書皆不著其技能惟名畫録畧言其善畫亦不云其工蛺蝶也惟見於建詩耳或謂今人家亦有得其圖者唐世一藝之善如公孫大娘舞劔器若曹剛琵琶米嘉榮歌皆見於唐賢詩句遂知名于世當時山林田畆潜德隱行君子不聞於世者多矣而賤工末藝得所附託乃垂於不朽盖各有幸有不幸焉錢文僖鄭工部題詠西洛故都荒臺廢沼遺迹依然見於詩者多矣惟文僖公一聯最為警絶云日上故陵烟漠漠春歸空苑水潺潺裴晉公緑野堂在午橋南時適張僕射齊賢家僕射罷相歸終日與賔客吟宴於其間惟鄭工部文寳一聯最為警絶云水煖鳬鷗行哺子溪深桃李卧開花人謂不減王維杜甫也錢公好句尤多而鄭句不惟當時人莫及而其集中能及者亦少韓吏部退之筆力無施不可而嘗以詩為文章末事故其詩曰多情怯酒伴余豈作詩人然其資談笑工諧謔叙人情狀物態一寓於詩而曲盡其妙此在雄文大手故不足論而予獨愛其工於用韻也盖其得韻寛則波瀾横溢泛入旁韻乍還乍離出入回合殆不可拘以常格如此日足可惜之類是也得韻窄則不復旁出而因難見巧愈嶮愈奇如病中贈張十八之類是也余因與聖俞論此以為譬夫善馭良馬者通衢康陌縱横馳逐惟意所之至於水曲蟻封疾徐中節而不差跌乃天下之至工也聖俞戲曰前史言退之為人木强若寛韻可自足而輙旁出窄韻難獨用而反不出豈非其拗强而然歟坐客皆笑之也白雲樓郢州白雲樓素多題詠一日郡守倅燕集是樓方命坐客賦詩劉木𫝊賔以心恙覊置是郡不得預㑹遂使人持誦以獻才致蕭散盡江山之勝一座為之閣筆詩曰江上樓髙十二梯登臨偏與白雲齊人從别浦經時去天向平蕪儘眼低寒色不堪長黯黯秋光無奈更凄凄欄杆曲盡愁無盡水正東流日正西華清宫臨潼縣靈泉觀即唐之華清宫也自唐迄今題詠者不可勝紀自老杜五言長韻并三絶洎鄭嵎津陽門詩外少得佳者本朝張文定陳文惠洎前進士楊正倫雖非綺靡而義理可取文定詩曰當時不是不窮奢或樂昇平少歎嗟姚宋未亡妃子在塵埃那得到中華文惠詩曰百首新詩百意精不尤妃子即尤兵争如一句傷前事都為明皇恃太平正倫詩曰休罪明皇與貴妃大都衰盛兩隨時惟憐一派温泉水不逐人心冷煖移又鄭文寳詩只見開元無事乆不知貞觀用功深皆為知音所賞酒帘王逵以祠部員外郎知福州尚氣自矜福州有當壚老媪常釀美酒士人多飲其家有舉子謂曰吾能與媪致數千媪信乎媪曰倘能之敢不奉教因俾媪市布為一酒帘題其上曰下臨廣陌三條濶斜倚危樓百尺髙太守若出喝道者必令媪卸酒帘但佯若不聞俟太守行馬至帘下即出卸之如見責稽緩即推以事故謝罪而已必問酒帘上詩句何人題寫但云某嘗聞飲酒者好誦此二句言是酒望子詩媪遂丐善書者題於酒帘上適王經此對如其言大喜媪至府與錢五千酒一斗曰賜汝作酒本詩乃王詠酒旗詩生平最為得意者相思河鄜州東百里有水名相思河岸有郵置亦曰相思舖令狐挺題壁以詩曰誰把相思號此河塞垣車馬徃來多只應自古征人泪洒向空川作浪波賡張文定詩張齊賢嘗作詩自警兼遺子孫雖詞語樸質而事理切當足為規戒其詩曰慎言渾不畏忍事亦何妨國法須遵守人非莫舉揚無私仍克己直道更和光此個如端的天應降吉祥余嘗廣其意就每句為一篇命曰八詠警戒詩其一云慎言渾不畏言出患當隨須信樞機發寧容駟馬追三緘事可見兩舌業當知口是起羞本慿君且再思其二云忍事亦何妨勿令心火揚火揚猶可滅心忿固多傷堪嘆波羅密釋氏有忍辱波羅密可憐歌利王出金剛經從心更從刃字意可消詳其三云國法須遵守金科盡詔條一毫如有犯三尺不相饒豈用誇奸黠何須恃貴驕自然逄吉慶神理亦昭昭其四云人非莫舉揚萬事且包荒殿上便猶掩車中吐不妨在他誠所短於已有何長須是常規檢回頭自忖量其五云無私仍克己克己以無私二事兼修飭終身在省私公清無歛怨髙亢易招危更切循謙退方應履坦夷其六曰直道更和光雙修學乃章直須和輔助和頼直交相好直終多訐偏和又少剛能和又能直行已自芬芳其七云此個如端的除非六句修永為几杖誡更作子孫謀本立方生道農勤乃有秋兹詩雖淺近至理可推求其八云天應降吉祥天理本茫茫舒慘雖無定榮枯却有常益謙尤効騐福善更昭彰籠絡無踈漏恢恢網四張青箱雜記題淮隂廟淮隂侯廟題者甚多惟諫議錢公最為絶唱曰築壇拜處恩雖厚躡足封時慮已深隆準若知同鳥喙將軍應有五湖心題歌風臺徐州歌風臺題者甚多惟尚書張公方平最為絶唱曰落魄劉郎作帝歸樽前一曲大風辭才如信越猶葅醢安用思他猛士為題朝元閣臨潼縣華清宫朝元閣題者亦多惟陳文惠公二韻為絶唱曰朝元髙閣迥秋毫無隱情浮雲忽已蔽不見漁陽城歌曲艶麗文章純古不害其為邪文章艶麗亦不害其為正然世或見人文章鋪陳仁義道徳便謂之正人若言及花草月露便謂之邪人兹亦不盡然也皮日休曰余甞慕宋璟之為相疑其鐵腸石心不解吐婉媚詞及觀其文而有梅花賦清便富麗得南朝徐庾體然予觀近世所謂正人端士者亦皆有艶麗之詞如前世宋璟之比今並録之如乖崖公張詠席上贈官奴小英歌曰天教摶百花作小英明如花住近桃花坊北面門庭掩映如仙家美人宜稱言不得龍腦薰衣香入骨維揚軟縠如雲英亳郡輕紗若蟬翼我疑天上婺女星之精偷入筵中名小英又疑王母侍兒初失意謫向人間為飲妓不然何得膚如紅玉初碾成眼似秋波雙臉横舞態因風欲乘去歌聲遏雲長且清有時歌罷下香砌幾人魂魄遥相驚人㸔小英心已定我見小英心未足為我髙歌送一盃我今贈爾新翻曲二韓魏公晚年鎮北都一日病起作㸃絳唇小詞曰病起懨懨畫堂花謝添憔悴亂紅飄砌滴盡胭脂淚惆悵前春誰向花前醉愁無際武陵回睇人逺波空翠司馬温公亦嘗作阮郎歸小詞漁舟客易入春山仙家日月閒綺忩紗幌映朱顔相逄醉夢間松露冷海霞殷匆匆整棹還落花寂寂水潺潺重尋此路難又曹修古立朝最號剛方蹇諤嘗見池上有所遇者亦作小詩寓意曰荷葉罩芙蓉圓青映嫩紅佳人南陌上翠盖立春風詩人使酒樓語王安國作詩多使酒樓語嘗語余曰楊文公詩有江南一酒樓堤桞拂人頭李白題詩遍酒樓錢昭度詩亦有一酒樓長憶錢塘江上路酒樓人散雨千絲今子詩有幾酒樓余答曰吾詩有二酒樓安國曰足矣盖余有題九江琵琶亭小詩云夜泊潯陽宿酒樓琵琶亭畔荻花秋雲沉鳥没事已徃月白風清江自流又余昔年嘗送客西陵亦作小詩曰若耶溪畔醉秋風獵獵船旗照水紅後夜錢塘酒樓上夢魂應遶浙江東贈孫可久詩仁宗朝内臣孫可久賦性怙淡年踰五十乞致仕都下有居第堂北有小園城南有别墅每良辰美景以小車載酒優㳺自適石曼卿長過其居題詩曰南北沾河潤幽深在禁城叠山資逺意讓俸買閒名閉户斷蛛網折花移鳥聲誰人識髙趣朝隱石渠生屯田員外郎桞永亦贈詩曰故侯幽隱百城東草木扶踈一畆宫曾珥貂璫為近侍却紆絛褐作閒翁高吟擁鼻詩懷壯雅論持衡道氣充厭盡繁華天上樂始將踪跡學冥鴻可久好吟詠効白樂天格嘗為陜西駐泊為樂天造祠堂於郡城大阜之頂中安繪像仍繕寫平生歌詩警䇿之句徧於四墉晚年著歸休集行於世年七十餘卒肯堂集内臣裴愈字益之亦好吟詠真宗朝奉命江南搜訪遺書名畫歸奏稱㫖用是累居三館授秘閣職任有詩送魯秀才南逰句云東呉山色家家月南楚江聲浦浦風又聞蟬詩云楊桞影踈秋霽雨梧桐葉墜夕陽天皆其佳句有子曰湘字楚老亦有詩名明道中仁宗御便殿試進士房心為明堂賦和氣致祥詩亦命湘賦之湘舞蹈再拜數刻而成仁宗嗟賞左右中人為之動色其和氣致祥詩曰君徳承天道沖融協太和卿雲呈瑞早膏澤應時多煦集連枝木嘉扶異穎禾五星還聚井丹鳳更巢阿藪澤無遺士邊方久息戈黔黎逄至化稽首拜賡歌他詩亦多類此有肯堂集行於世翰林學士李公俶為之作序曰予嘗嘉河東公父子起銀璫右貂能以屬詞㧞其倫益之三朝内侍老不廢學又課勵二子使皆有立約已慎履如周仁石慶而楚老孳孳嗜書克自淬琢云湘又善為小詞嘗任河東路走馬承受有詠并門浪淘沙小詞云鴈塞說并門郡枕西汾山形髙下逺相吞十四樓臺依碧嶂烟景還分晉廟鎻溪雲簫鼓仍存牛羊斜日自歸村惟有古城禾黍地前事消魂後有詠汴州浪淘沙小詞仁宗命録進亦嘉之其詞曰萬國仰神京禮樂縱横匆匆佳氣鎖龍城日御明堂天子聖朝㑹簪纓九陌六街平萬物充盈青樓絃管酒如澠别有隨堤烟桞暮千古含情程文五代之際天下剖裂我太祖啟運雖則下西川平嶺表收江南而吳越荆閩歛籍歸覲然猶有河東未殄其後太宗在駕乃始克之海内自此一統故因御試進士乃以六合為家為賦題時進士王世則遽進卷有曰照盡乾坤作我之龍樓鳯閣開窮日月為君之玉户金闗帝覽之大悦遂擢為第一人二王沂公有物混成賦云不縮不盈賦象寧窮於廣狹匪雕匪琢流形罔滯於盈虚則宰相陶鈞運用之意已見於此賦矣又云用我之小者散而為草木得我之大者聚而為山川則宰相擇任羣材使小大各得其所又見於此賦矣三宋莒公兄弟平時分題課試莒公多屈於子京及作鷙鳥不奴賦則子京遜兄逺甚莒公遂擅塲賦曰天地始肅我則振羽而獨來燕雀焉知我則凌雲而自至又曰將翺將翔詎比海鵾之翼自南自北若專霜隼之誅則公之特立獨行魁多士登宰相俱見於此矣四李度顯德中舉進士工詩有醉輕浮世事老重故鄉人之句人多誦之王朴為樞密止以此一聨書於文申炳知舉遂推為第三人人嘲云主司只選一聯詩見玉壺清話五歐陽文忠公年十七隨州取解以落官韻不收天聖已後文章多尚四六是時隨州試左氏失之誣論文忠論之條列左氏之誣甚悉内有石言於晉神降于莘外蛇闘而内蛇傷新鬼大而故鬼小雖被黜落而奇傑之句大傳於時今集中無此論頃見連庠誦之耳見東軒筆録六龎淳之初為舉人時趙文定作試官見其惟幾成天務賦云當羣形未屯已為造物之權大象賦形遂握上民之柄曰此必為宰相及為黄州司理夏英公見之亦以公輔稱焉後果為首輔七自唐以來試進士詩號省題近年能詩者亦時有佳句蜀人楊諤宣室受釐落句云願前明主席一問洛陽人滕甫西旅來王云寒日邊聲斷春風塞草長博文漢都䕶歸奉萬年觴諤有詩名題驪山云行人問宫殿耕者得珠璣最為警策文城縣名江西洪郎中亶娶文城縣君李尚書公擇姊也治春秋博學能文所作詩甚多公擇挽詩云久歴金門貴未酬黄閣知如聞天禄客抱恨作銘詩不減前人傳詩訛謬唐人詩流傳訛謬有一詩傳為兩人者如漠漠水田飛白鷺隂隂夏木囀黄鸝既曰王維又曰李嘉祐以全篇考之摩詰詩也又楚鄉寒食梅花時野渡臨風駐采旗草色連天人去住水紋如轂燕差池既見杜牧之集中又見劉夢得外集作八句其末云朱轓尚憶羣飛雉青綬初聯左顧龜非是湓城白司馬水曹何事與新詩考其全篇夢得詩也然前四句絶類牧之吏人詩衛縣舊市易務壁間題字數行乃舊吏人詩也云罷樹猿辭檻歸耕馬脫銜傭錢貧易舎官事老難擔亦意之可取者見李希聲詩話老兒詩唐路德延有孩兒詩五十韻盛傳于世近代洛中致仕侍郎張公師錫追次其韻和成老兒詩亦五十韻今録之曰鬢髪盡皤然眉分白雪鮮週遮延客話傴僂抱孫憐無病常供粥非寒亦衣綿負暄衾擁背借力杖齊肩貎比三峰客年過四皓仙喚方離枕上扶始到門前每愛烹山茗常嫌飣石蓮耳聾如塞纊眼暗似籠烟宴坐羸慿几乘時困掣鞭頭揺如旋轉唇動若抽牽骨冷愁離火牙疼怯潄泉形骸將就木囊槖尚貪錢膠睫乾眵綴粘髭冷涕懸披裘腰嬾繫濯手䄂慵揎擡舉衣頻曳扶持藥屢煎坐多茵易破行少履難穿喜婢裁裙布嗔妻買粉鈿房教深下幕床遣厚鋪氊琴聽憐三樂圖張笑七賢㸔經嫌字小敲磬喜聲圓食罷羮沾杖盃餘酒𢃄涎樂來須遣罷醫到久相延裹帽縱横束梳頭取次纒長吁思徃事久感聽哀弦氣注腰還重風牽口更偏墓松先遣種碑石預教鐫客到惟求藥僧來或問禪焙茶懸竈壁曝艾曬簷椽怒僕輕挣眼嗔童謾握拳心驚嫌蹴鞠脚軟怕鞦韆局縮同寒狖摧豗似飽鳶觀瞻多目眩舉動屢頭旋女嫁取紅燭男婚乞綵箋已聞頒杖几寧更佩韋絃賔客身非與兒孫事已傳養和屏作伴如意拂相連久棄登山屐惟存負郭田呻吟朝不樂展轉夜無眠呼稚臨床畔看書就枕邊冷疑懷貯水虚訝耳聞蟬束帛非無分安車信有縁伏生甘坐末絳老讓行先拘急將風夜昏沉欲雨天雞皮塵旋潰馬齒食頻填每憶居郎署常思釣渭川喜逄迎佛㑹羞赴𢃄花筵徑狹容移檻堦危索減塼好生焚鳥網惡殺拆魚船既感桑榆日常嗟蒲桞年長思當弱冠悔不賸狂顛吕公贈李公詩李方公吕端公同踐文館後各登台輔吕公贈李公詩曰憶昔僦居明徳坊官資俱是校書郎青衫共直昭文館白首同登政事堂佐國廟謨君已展避賢榮路我猶妨主恩至重何時報老眼相㸔淚兩行草陳恭公麻陳恭公拜集賢殿大學士賈文元公昌朝當國張方平草麻有萬事不理賴胡廣之能言四夷未平藉陳平之達識賈公深惡之評詩沈括存中吕惠卿吉甫王存正仲李常公擇治平中日在館中談詩存中曰韓退之詩乃押韻之文耳雖健美富贍而終不近古吉甫曰詩正當如是我謂有詩人以來未有如退之也正仲是存中公擇是吉甫四人者交相詰難久而不决公擇忽正色而謂正仲曰君子羣而不黨君何黨存中也正仲勃然曰我所見如是耳顧豈黨即以我偶同存中遂謂之黨然則君非吉甫之黨乎一坐更大笑余每評詩亦多與存中合頃年常與王荆公評詩余謂凡為詩當使挹之而源不窮咀之而味愈長至如歐陽永叔之詩才力敏邁句亦健美但恨其少餘味耳荆公曰不然如行人仰頭飛鳥驚之句亦可謂有味矣然余至今思之不見此句之佳亦竟莫曉荆公之意信乎所言之殊不可强同也鸛雀樓河中府鸛雀樓三層前瞻中條下瞰大河唐人留詩者甚多惟李益王之渙暢當三篇能狀其景李益曰鸛雀樓西百尺牆江湖雲樹共茫茫漢家簫鼓隨流水魏國山河半夕陽事去千年猶恨速愁來一日即為長風烟併在思鄉處逺目非春亦自傷王之渙詩曰白日依山盡黄河入海流欲窮千里目更上一層樓暢當詩曰迥臨飛鳥上高出世塵間天勢圍平野河流入斷山改王公詩工部侍郎王公召試學士院王荆公為考官於簾下見其試畢就壁間題字荆公使人録之乃一詩也詩云古木隂森白玉堂長年來此試文章日斜奏罷長楊賦閒拂塵埃㸔畫牆荆公改奏罷長楊賦作奏賦長楊罷元豐末荆公在金陵好事求書猶多寫此詩事實類苑卷三十九

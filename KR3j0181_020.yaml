body:
  text: 事實類苑卷二十宋江少虞撰典禮音律笛馬融笛賦云裁以當簻使易持李善注謂簻馬策也裁笛以當馬簻故使易持此說謬也笛安可為馬策簻管也古人謂樂之管為簻故潘嶽笙賦云修簻內辟餘簫外逶裁以當簻者餘器多裁衆簻以成音此笛但裁一簻五音皆具當簻之上不假繁猥所以便而易持也二笛有雅笛有羌笛其形制所始舊說皆不同周禮笙師掌教篪笛或云漢武帝時丘仲始作笛又云起於羌人後漢馬融所賦長笛空洞無底剡其上孔五孔一孔出其背正似今之尺八李善為之注云七孔長一尺四寸此乃今之橫笛耳太常鼓吹部中謂之橫吹非融之所賦者融賦云易京君明識音律故本四孔加以一君明所加孔後出是為商聲五音畢而沈約宋書亦云京房備具五音周禮笙師注杜子春云笛乃今時所吹五空竹笛以融約所紀論之則古笛不應有五孔則子春之說亦未為然今三禮圖畫笛亦橫設而有五孔又不知出何典據審聲五音宫商角為從聲徴羽為變聲從謂律從律吕從吕變謂以律從吕以吕從律故從聲以配君臣民尊卑有定不可相踰變聲以為事物則或遇於君聲無嫌六律為君聲則商角皆以律應徴羽以吕應六吕為君聲則商角皆以吕應徴羽以律應加變徴則從變之聲已瀆矣隋柱國鄭譯始條具之均展轉相生為八十四調清濁混淆紛亂無統競為新聲自後又有犯聲側聲正殺寄殺偏字傍字雙字半字之法從變之聲無復調理矣外國之聲前世自别為四夷樂自唐天寶十三載始詔法曲與北部合奏自此樂奏全失古法以先王之樂為雅樂前世新聲為清樂合胡部者為宴樂古詩皆咏之然後以聲依永為成曲謂之協律其志安和則以安和之聲詠之其志怨思則以怨思之聲詠之故治世之音安以樂則詩與志聲與曲莫不安且樂亂世之音怨以怒則詩與志聲與曲莫不怨且怒此所以審音而知政也詩之外又有和聲則所謂曲也古樂府皆有聲有詞連屬書之如曰賀賀賀何何何之類皆和聲也今管絃之中纒聲亦其遺法也唐人乃以詞填入曲中不復用和聲此格雖云自王涯始然貞元元和之時為之者已多亦有在涯之前者又小曲有咸陽沽酒寶叉空之句云是李白所製然李白集中有清平調詩三首獨無是詩而花間集所載咸陽沽酒寶叉空乃是云張泌所為莫知孰是也今聲詞相從惟閭巷間歌謠及陽關搗練之類稍類舊俗然唐人填曲多詠其曲名所以哀樂與聲尚相諧㑹今人則不復知有聲矣哀聲而歌樂詞樂聲而歌怨詞故語雖切而不能感動人情由聲與意不相諧故也二古樂有三調聲為清調平調側調也王建詩云側商調裏唱伊州是也今樂部中有三調樂品皆短小其聲噍殺惟道調小石法曲用之雖謂之三調樂皆不復辨清平側聲但比他樂特為煩數耳三虞書曰戞擊鳴球搏拊琴瑟以詠祖考來格鳴球非可以戞擊和之至詠之不足有時而至於戞且擊琴瑟非可以搏拊和之至詠之不足有時而至於搏且拊所謂手之舞之足之蹈之而不自知其然和之至則宜祖考之來格也和之生於心其可見者如此後之為樂者文備而實不足樂師之志主於中節奏諧聲律而已古之樂師皆能通天下之志故其哀樂成於心然後宣於聲則必有形容以表之故樂有志聲有容其所以感人深者不獨出於器而已四髙郵人桑景舒性知音聽百物之聲悉能占其災福尤善樂律舊傳有虞美人草聞人作虞美人曲則枝葉皆動他曲不然景舒試之誠如所傳仍詳其曲聲曰皆吳音也他日取琴試用吳音製一曲對草鼓之枝葉亦動乃謂之虞美人操其聲調與虞美人曲全不相近始末無一聲相似者而草輒應之與虞美人曲無異者律法同管也其知音臻妙如此景舒進士及第終於州縣官今虞美人操盛傳於江湖間人亦莫知其何如者為吳音五前世遺事於古人文章中見之元稹詩有琵琶宫調八十一三調絃中彈不出琵琶八十四調蓋十二律各七均乃成八十四調稹詩言八十一調人多不諭所謂豫於金陵丞相家得唐賀懷智琵琶譜一册其序云琵琶八十四調內黃鍾太簇林鍾宫聲絃中彈不出須管色定絃其餘八十一調皆以此三調為準更不用管色定絃始喻元詩言如今之調琴須先用管色合字定宫絃乃以宫絃下生徴徴絃上生商上下相生終於少商凡下生者隔二絃上生者隔一絃取之凡絃聲皆當如此古人仍須以金石為準商頌依我磬聲是也今人茍簡不復以絃管定聲故其髙下無準出於臨時懷智琵琶譜調格於今樂全不同唐人樂學精深尚有雅律遺法今之燕樂古聲多亡而新聲大率皆無法度樂工自不能言其義如何得其聲和六今教坊燕樂比律髙二均弱合字比太簇微下郤以凡字當宫聲比宫之清宫微髙外方樂尤無法度律又髙教坊一均以來唯北部樂聲比教坊樂下二均大凡北人衣冠文物多用唐俗此樂疑亦唐之遺音也七今之燕樂二十八調布在十二律唯黃鍾中吕林鍾三律各具宫商角徴四音其餘或有一調至二三調獨蕤賓一律都無內中管仙吕調乃是蕤賓聲亦不正當本律其間聲音出入亦不全應古法略可配合而已如今之中吕宫郤是古夾鍾宫南吕宫乃古林鍾宫今林鍾商乃古無射宫今大吕調乃古林鍾羽雖國工亦莫能知其所因十二律并清宫當有十六聲今之燕樂止有十五聲蓋今樂髙於古樂二律以下故無正黃鍾聲只以合字當大吕猶差髙當在大吕太簇之間下四字近太簇高四字近夾鍾下一字近姑洗髙一字近中吕上字近蕤賓勾字近林鍾尺字近夷則工字近南吕髙工字近無射六字近應鍾凡字為黃鍾清髙凡字為大吕清下五字為太簇清髙五字為夾鍾清下法雖如此然諸調殺聲不能盡歸本律故有偏殺側殺寄殺元殺之類雖與古法不同推之亦皆有理知聲者皆能言之此不備載也八古法鐘磬每簴十六乃十六律也然一簴又自應一律有黃鍾之簴有大吕之簴其他樂皆然且以琴言之雖皆清實其間有聲重者有聲輕者材中自有五音古之人名琴或謂之清徴或謂之清角不獨五音也又應諸調豫友人家有一琵琶置之虛室以管色奏雙調琵琶絃輒有聲應之奏他調則不應寶之以為異物殊不知此乃常理二十八調但有聲同者即應若遍二十八調而不應則是逸調聲也古法一律有七音十二律共八十四調更細分之尚不止八十四逸調至多偶在二十八調中人見其應則以為怪此常理耳此聲學至要妙處也今人不知此理故不能極天地至和之聲世之樂工絃上音調尚不能知何暇及此筆談九元豐三年七月命劉凡范鍾定樂八月凡言太常鐘聲三等王朴一李照二胡瑗阮逸三王樂之太髙太祖皇帝所常言不待論而後明仁宗皇帝景祐中命李照定樂乃下律法以取黃鍾聲見時人習舊疑其太重照樂由是不用皇祐中阮逸定樂比王朴微下而聲律相近及鑄大鐘或議其鬱弇內亦不用於是郊廟依舊用王朴樂然王朴鐘磬太髙聖人作樂必紀中和之聲所以道中和之氣清不可太髙重不可太下使八音協諧歌者從容而能永其言乃中和之謂也乃請下朴樂二律以定中和之聲又禮官楊傑言金聲闕容失之則重石聲溫潤失之則輕土聲函胡失之則下竹聲清越失之則髙絲聲纎微失之則細革聲降天失之則洪匏聲闕聚失之則長木聲無餘失之則短惟人禀中和之氣而有中和之聲足以權量八音使律吕皆以人聲為度以聲歌一言言雖永不可過其聲故先儒云依八音而制樂託樂器以寫音樂本倣樂清詳人樂以歌為本聲必依永律必和聲元豐聖訓乾德樂乾德四年闕禮樂節刋正闕備有司奏其詞典但少宗廟殿庭宫懸三十六架加鼓吹熊羆十二年按樂禮朝㑹登歌用吾闕郊廟闕瑞回伏至樓前奏采茨之曲御樓奏隆安之曲各用樂章闕八佾之舞以象文德武功請用𤣥德升聞天下大定之舞率從其請玉壺清話二乾德四年詔太常寺太廟㑹復用二舞先是晉天福末契丹之亂中朝多事遂廢之至是始復是嵗冬至御乾元殿始用雅樂登歌國朝聞見録馮言善琵琶馮瀛王道德度凝厚事纍朝貌山立其子言時浮俊無檢為少卿善琵琶妙出樂府世無及者父貽書戒之略不少悛一日家宴因欲辱之處賤伶之中執器立於庭奏數曲罷則以纒頭縑繦隨衆伶給之言置縑繦於左肩抱琵琶按膝長跪厲聲呼謝而退家人大笑於箔回告於父曰能為言進此伎於天子否凡賓僚飲聚長為不速酒酣即彈琵琶罷作詩侃然而自謂曰馮三絶及撰昭憲太后諡議舉歎服玉壺清話律中生六事律管假氣之管以銅為之古則以銅玉為者防人增減令法有失耳用十二管始以黃鍾之律是十一月子律長九寸十分之一圍九分黃鍾帝使伶倫斷解谷之竹而吹之為黃鍾之宫制十二筒以聽鳳鳴雌雄各六故十二律吕也一於律中且歷所數二律中生聲樂三律中生禮四度其長短生分寸尺丈引也其法本取律管中容黍之廣度九十分黃鍾之長一為一分十分為寸十寸為尺十尺為丈十丈為引也五量多少生其量者籥合升斗斛也先黃鍾之籥實黍中者一千二百粒盛籥中以井水凖其槩十籥為合十合為升十升為斗十斗為斛五量嘉矣其器用銅方內而圓其外有􅂒音桃其上為斛其下為斗左耳為升右耳為合籥狀似爵以麋爵祿上三下二參天兩地圓而函方左一右二隂陽之象也六稱法生平律中取黃鍾之重籥容一千二百粒黍重一十二銖兩之為兩二十四銖為一兩十六兩為一鈞四鈞為石也古之為鍾之法形如環珠為肉孔為好肉厚而好少也鍾者稱之權也都謂之權衡衡即稱衡凡律度量衡用銅者名同名也取同之名以合於同也所以同天下齊風俗也銅為物至精不為燥濕變其節不為風雨暴露改其形是以用銅焉是以帝王和如聲律謹於三量慎於法度惟今聖朝能行焉諸國之異制則不混同也隂陽既和時序大順不外於物必納於歸故也曰以利兆民正天下於一同四海之歸也贊寧要言嘉量周之用深尺內方尺而圓其外不實六十四升積百三分六千八百分千二百八十籥之實也深尺十寸之尺也內方尺者八寸之尺也圓其外者圓闕相往來之數也其臀一寸者深也其耳三寸者深也由是而規圓之以圓函方之法也必以圓而函方者欲其聲圓也必為耳於左右者欲其聲闕韻也亦猶鍾之有乳也漢斛之法方內而圓其外其旁九釐五毫其實十斗積百六十二萬分二千籥之實也不言深而言方者無尺寸之别也圓其外者亦相生之數也其上為斛其下為斗左耳為升右耳為合夫耳者謂升合耳形附於斛之左右也今之升合皆方制之而斛方寸深一凡六寸二分是一方分置算而然也籥其狀似爵者謂如爵也今之所闕深八分一釐亦一方分置算上下二者謂斛在上并升合為三也斗在下升合為二也圓而函方斛之形也上下皆同也今上以圓函方下為升斗而已左一右二者升在上而左合在下籥在下而俱右也今合籥俱右上而升在左下崇義失之於前而胡瑗阮逸踵之於後也夫斗斛非是而欲考正黃鍾安可得也東齊紀事九鼎九鼎國之厚寶也古之帝王必鑄鼎然有多例一鑄鼎煉丹以求仙去如黃帝是也一以為烹熟品飪如陪鼎以食是也一鑄鼎象物以作國圖而天下之美惡如大禹鑄九鼎是也一奉供宗廟如祭器是也然其取出五金如東漢漅湖黃金鼎黃帝煉昔山之銅以鑄鼎則清金也其次鐡鼎尊卑共用唯白金無聞焉爾雅白鼎絶大謂之鼐圓合上謂之闕注鼎斂上而小口附耳外謂之鈛注鼎耳在表也斂足者謂鬲注鼎曲腳也夏是則成竭郢天子位還遷九鼎於亳都至大闕而有惡德蓋以品代君也殷亡遷鼎於洛也夏都平陽及安邑如夏桀亡鼎遷於亳乃闕也此來論是殷凡幾遷都鼎遷來其地多不明白惟周遷商鼎分曉焉禹鼎制度則左傳所謂夏方有德逺方圖物貢金九牧鑄鼎象物百物為之備使民知神奸者圖鬼神百物之形使民逆知之故民人入川澤山林不逢不若魍魎莫能逢之則於揚州鼎象章江怪物牛渚磯水府􅀈鰐蛇蟲蜮皆鑄形書處令揚州之民懸防也故王子年拾遺云上古鑄鼎器皆圖鸐形出幽州羽山之北人面鳥喙八翼一足毛色如雄行不踐他其聲似鍾磬笙竽也然鸐不聞灾害圖之奚利郭通曰此不害物蟲入必兆灾福得民預知茍鑄幽鼎必圖辨山之暴器也詳其禹鼎不止圖山川鬼神猛鷙之物抑又每州民户地里寬狹皆可知也故後語云九鼎寶器必由據九鼎按圖籍注云秦據得周九鼎自然業次如九州户籍圖書也或問鼎之大小郭通曰昔周微弱秦武王以兵臨周以求九鼎王患之顔率說齊來救及秦兵退顔率謂齊曰夏亡鼎歸商商滅歸周其數九一鼎九萬人挽之九九八十一萬人也鼎未入齊必經魏魏豈不愛鼎耶由是觀之鼎大可知也周威烈王二十二年九鼎震及秦武王有闕好力士及平韓取置陽遂窺周室與孟說舉龍文之鼎武王絶臏而卒可以對舉之者知其小也或問曰周武王遷商鼎闕有今及郡知渡何河耶通曰如顔率言一鼎用九萬人士卒師徒器械備具焉詳闕時造舟馬梁越明泮而至洛必矣雖遷徙至河南時安置未得所成王定鼎於郟鄏城也或問為在朝廟耶通曰雖云左宗廟右社稷凡宫室有東西廟曰廟置在宫闕廟也是以後語謂之發器後世謂之大寶之器言龜與鼎也或問曰二周鼎何所通曰帝王世紀中秦昭襄王自稱西帝攻周廢赧王取九鼎事頗蒙昧或問曰漢桓平何言鼎沒泗水耶通曰秦本記亦云二十八年使千人沒泗水求鼎不獲已而漢武汾隂獲鼎東漢漅湖獲黃金鼎焉纍朝所得皆制度輕小鼎也梁書何豫李隱逸武帝闕之請更鑄九鼎曰鼎者神器有國之先也唐貞觀二十一年六月遂州涪水中獲古鼎受五石三斗至天后朝梓橦縣江中獲鼎受十六斛篆文曰王李五百代至萬嵗通天二年四月敕鑄九鼎成計用青金五十六萬七百一十二斤焉豫州鼎名永昌髙一丈八尺受一千八百斛莫州名武興雍州名長安兖州名目觀青州名少陽徐州名車原揚州名江都制州名金陵梁州名成都惟豫州鼎大八州各髙一丈四尺受一千二百斛鼎上各圖寫本州産物之象鍾紹京等題請各鼎用十萬人牛象等自𤣥武門外曳入置於明堂之庭各依方向安置焉𤣥宗開元薛謙光獻九鼎銘宰臣以豫州鼎銘武后所製有𤣥宗御名便為符瑞請付史館明皇甚悅焉乾元中三殿上安銅鼎上津汚流占曰必雨之候果信矣此又小鼎也贊寧要言事實類苑卷二十

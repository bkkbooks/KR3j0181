body:
  text: 事實類苑卷二十三宋江少虞撰宦政治績文潞公文潞公在成都米價騰貴因就諸城門相近院凡十八處減價糶賣仍不限其數張榜通衢翌日米價遂減前此或限斗以糶或抑市井價直適足以增其氣焰而終不能平其價大抵臨事須當有術也記事二傅永曰皇祐二年詔陜西揀閲諸軍及新保捷年五十以上若短不及四指者皆免為民紛然以為邊事未可知不宜減兵又曰停卒一旦失衣糧鄉間閭閻必相聚為盜賊緣邊諸將爭之尤甚是時文公執政龎公為樞密使固執行之不疑是時陜西所免新保捷凡三萬五千餘人皆歡呼返其家其未免者尚五萬餘人皆悲恨已不得去傅永曰陜西緣邊計一歲費七百萬貫錢養一保捷是歲邊費凡減二百四十五萬陜西之民由是稍蘇洓水記聞王文康王文康治蜀頗以法御下有謗其太苛會劉曄召還為右正言真宗召問凌䇿王某治蜀孰優曰凌䇿在蜀值歲豐故得以平易治之王某值歲小歉慮民為盜以法治之易治則皆然真宗善其言程文簡程林知益州治大體略細務嚴肅簡重蜀民畏而愛之蜀川有不逞者聚惡少百餘人作灌口二郎神像私立官號作士卒衣裝鐃鼓簫吹日椎牛為會民有駿馬者遂遣人取之神欲此馬民拒之其馬遂死又率良民有不願往者尋得疫病蓋亦有妖術耳有白其事林捕而戮之後李順由此而起今鋤其根本且使蜀中數十年無恙本朝名臣傳二夏秋公納之物如鹽麴錢之類名件頗碎慶厯中有司建議並合歸一多以省鈔鐵程文簡為三司使獨以為仍舊為便若沒其舊名異日不知或再敷言鹽麴則致重復此亦善慮思也東齋記事田况田况移守成都其在蜀治尚和易法去苛細奬進儒素禁戢姦暴以德化人人不忍欺時謂張乖崖之明王文康之平程文簡之肅韓忠獻之愛公皆兼而有之入為三司使金穀利害纎悉罔不備舉時有副使不甚曉事京師號為皮燈毬以况處事通明號為照天蠟燭議者謂三司使自陳恕李士衡之後惟况為稱職也本朝名臣傳張客省瀛州城本隘狹景德中幾為北敵所破自請和之後居民軍營悉在南開張客省元守郡日召郡中髙資戶謂之曰聞君等産業多在南開吾欲城入之然而計二城樓櫓之費非十萬緡不可咸曰茍得圍入大城願備所用工公令富民自均其數未經旬日不督而集乃命官籍其數目廂軍禁率以先後既成始奏取旨或曰不俟朝命罪必及焉公曰茍俟中覆而為城必不立矣今興工而後奏俟朝旨允與不允吾築城已過半矣或偶得罪不過斥張元耳民獲百世之利又何疑焉其後城垂就而公坐不先上聞過被左遷漕司或疑有乾沒俾官窮究無毫釐之欺治平中治河朔地震瀛之中城圯因而欲去之今為大郡寇戎茍至亦不可坎閨矣公西守陜川有兩城守居北城上佐廨宇器甲軍需之帑皆在南城渡一小澗幾百步方入北城北城可容南城三四公亦先定謀然後奏並南入北省守陴者十之三朝廷亦不之罪近時聞邊患水利繕城壘必先計已之恩賞厚薄然後為之校乎張公之心抑何異哉倦逰雜録趙閲道趙閲道抃熙寧中以大資政知越州兩浙旱蝗米價踊貴餓死者十五六州飭衢路立賞禁人增米價閲道獨榜衢路令有米者任增價糶之于是諸州米商輻輳詣越米價更賤民無餓死者閲道治民所至有聲在成都杭越尤著楊文公談苑王宣徽王拱辰以宣徽使尹南都外郛之外築一道通中出入朝廷聞而俾毁之奏曰臣所治當水陸衝要往來賔客旁午或開筵過夜城門已闔不敢輒啓恐冒干法臣開此門道亦設關鍵以備賔客夜出然踰城甚於啓關矣韓稚圭河東人衆而地狹民家有喪事雖至親悉燔爇取骨燼寄僧舍中以至積久棄捐乃相習以為俗韓稚圭鎮并州以官鏹市田數頃俾州民骨肉之亡者有安葬之地古者反逆之人乃有焚如之刑其士民則有斂殯附葬之禮惟外夷洎僧尼許從夷禮而焚柩齊民則一皆禁之今韓公待俗以禮法真古循吏之事也倦遊雜録韓忠獻韓忠獻公億知洋州日有大校李甲以財豪於鄉里誣其兄之子為他姓賂里嫗之貌類者使認之為己子又醉其嫂而嫁之盡奪其奩槖之蓄嫂姪皆訴於州又提刑轉運司每勘核為多行賄賂胥吏其嫂姪被笞掠反自誣服受杖而去積十餘年矣洎韓至又出訴韓察其寃因取前後案牘視之皆未嘗引乳醫為證一日盡召其黨立庭下出乳醫視之衆皆伏罪子母復歸如初東軒筆録楊談林特至道中國家征夏虜調發陜西芻粟隨軍至靈武陜西騷動民皆逃匿賦斂不肯供給有詔督運者皆聽便宜從事不牽常法吏治率皆峻急而京兆府通判水部員外郎楊談大理寺丞林特尤甚長安人歌之曰楊談見手先教鎖林特逢頭便索枷長安多大豪又有蔭户尤不可號令有見任知某州妻清河縣君者不肯運糧談録而杖之于是民莫敢不趨令談特令民每驢負若干每人擔若干仍賫糧若干官為計之須取足乃聽食怒詈之聲滿道既而京兆最為先辦民無逃棄者諸州皆稽留不能辦此事人畜皆死者十八九由是人始復稱之二人以是得顯官談終諫議大夫特至尚書三司使胡順之胡順之為闕梁縣令民有臧金者素豪橫不肯出租畜犬數十頭里正近其門輒噬之繞垣密植橘柚人不可入每嵗里正常代之輸租前縣令有不肯禁順之至官里正白其事順之怒曰汝輩嫉其富欲使我與之為仇耳安有王民不肯輸租者苐往督之及里正白不能督順之使快手繼之又曰不能入使押司録事繼之又曰不能順之悵然曰然則此租必使令自督耶乃命里正聚藁自抵其居以藁塞門而焚之臧氏人皆逃逸順之悉令掩捕驅至縣其家男子年十六以上盡痛杖之乃詔謂曰胡順之無道既焚爾宅又杖爾父子兄弟可速詣府自訟矣臧氏皆懼服無敢詣府者自是臧氏租常為一縣先府嘗遣教練使詣縣順之聞之曰是故欲來煩擾乃微使人隨之隂記其人驛舍及受驛吏供給之物既皆入謁色甚倨順之延與坐徐謂曰教練何官耶曰本州職員耳曰應入驛乎教練踧踖曰道中無邸居暫至驛中耳又曰應受驛吏供給乎曰道中無芻糧故受之又曰應與命官坐乎教練使趨下謝罪順之乃收械繫獄置暗室中以糞十甕環其側教練使不勝其苦因順之過獄呼曰令幸不問我罪順之笑謝曰教練幸勿訝其苦今方多事未暇問也繫十日然後杖之二十教練使不服曰我職員也有罪當受杖於州順之笑曰教練久為職員殊不知法豈杖罪必送州耶卒杖之自是府吏無敢擾縣者州雖惡之然不能罪也後為青州幕僚發麻氏罪破其家皆順之力也真宗聞其名召至京師除著作佐郎張齊賢張齊賢真宗時為相戚里有爭分財不均者更相訴訟又因入官自理於上前更十餘斷不能決齊賢曰是非臺府所能決也臣請自治之上許之齊賢坐相府召訟者曰汝非以彼所分財少乎皆曰然即命各供狀給定乃召兩吏趨徙其家令甲入乙舍乙入甲舍貨財皆安堵如故分書則交易之訟者乃止明日奏狀上大悅曰朕固知非君莫能定者陳堯咨長安多士族子弟恃廕縱橫二千石者鮮能治之陳堯咨知府有李大監者堯咨舊交其子尤為強暴一旦有事至公府堯咨問其父兄宦遊何方得安信否語言勤至既而讓曰汝不肖亡賴如是汝家不敢與汝言官法又不能及汝恃贖刑無復恥耳我與爾父兄善義猶骨肉當代汝父兄訓之乃引於便坐手自杖之數十下由是子弟亡賴者皆惕息然其用刑過酷有博戲者杖訖桎梏列於庭置死馬於旁腐臭氣中瘡皆死後來者繫於先死者之足其殘忍如此向文簡向相在西京有僧暮過村民家求寄止住主人不許僧求寢於門外車廂中許之夜中有盜入其家自牆上挾一婦人并囊衣而出僧適不寐見之自念不為主人所納而強求宿而主人亡其婦及財明日必執我入縣矣因夜亡去不敢循故道走荒草中忽墮井則婦人已為人所殺先在其中矣明日主人搜訪亡僧并子婦尸得之井中執以詣縣掠治僧自誣云與子婦有姦誘與俱亡恐為人所得因殺之投井中暮夜不覺失足亦墜井中贓在井旁亡失不知何人所取獄成縣府皆不以為疑獨敏中以贓不獲疑之引僧詰問數四僧服罪但言某前生當負此人死無可言者敏中故問之僧乃以實對敏中故密使吏訪其賊吏食於村店店嫗聞其自府中來不知其吏也問之曰僧某者其獄何如吏紿之曰昨日已笞死於市矣雖獲賊亦不敢問也嫗曰然則言之無傷矣婦人者乃此村少年某甲所殺也吏曰其人安在婦指示其舍吏就入舍中掩捕獲之案問具服并得其贓一府咸以為神並涑水記聞包希仁嘉祐七年五月辛未樞密副使包拯薨車駕臨幸其第拯字希仁廬州人進士及第以親老侍養不仕宦且十年人稱其孝後歷監察御史為天章閣待制知諫院遷龍圖閣直學士知瀛州又遷樞密直學士知開封府為人剛嚴不可干以私京師為之語曰關節不到有閻羅包老吏民畏服逺近稱之歷御史中丞三司使樞密副使薨拯為長吏僚佐有所關白喜面折辱人然其所言若合於理亦幡然從之剛而不愎此人所難也二王禹玉曰包希仁知廬州廬州即鄉里親舊多乘勢擾官府有從舅犯法希仁撻之自是親舊皆屛息孔中丞李明公曰孔中丞趙輔知仙源縣諸孔犯法無所容貸王立王立字成之維州渤海人咸平三年進士及第補寧化軍判官天聖四年為夔州路轉運使施州徼外蠻夷利得賜物每歲求入貢者甚衆所過煩擾為公私患立奏令以貢物代為轉輸上嘉之歷陜西河北河東路轉運使并州有羣盜攻劫行旅州縣不能制立行部至并州選巡檢軍士五十人自隨陽云以護行裝微詢知盜處掩捕盡獲之五日中獲十八人盜賊遂息自河東徙知揚州明道二年以太常少卿為户部副使尋以足疾出知廬州遷右諫議大夫徙知密州秩滿歸卒王居卿市易司法聽人賒貸縣官貨財以田宅或金帛為抵當三人相保則給之皆出息十分之三過期之三不輸息每月更加罰錢百分之三貪人及無賴子弟多取官貸不能償積息罰愈滋囚繫督責徒存虛數實不可得刑部郎中王居卿初提舉市易司奏以田宅金帛抵當者成其息抵當徒相保者不復給自元豐二年正月七日以前本息之外所負法錢悉蠲之凡數十萬緡負本息者延期半年衆議頗以為愜李南公李南公知長沙縣有鬭者甲強乙弱各有赤青南公使前自以指揑之曰乙真甲偽也詰之各服蓋南方有櫸栁以葉塗膚則青赤如毆傷者剝其皮橫置膚上以火尉之則如掊傷者水洗不落南公曰毆傷者血聚肉硬偽者不然故知之有一村多豪户稅不可督所差户長輒逃去南公曰然則此村無用户長知縣自督之書其村名帖于柱豪户皆懼是歲初限未滿此村稅最先集又村多詭名稅存户亡每歲户長代納亦不可督南公悉召其村豪户謂之曰此田不過汝曹所典買耳與爾期一月為我推究否則汝曹均分輸之及期盡得冒佃之人使各承其稅河北提點刑獄有班行犯罪下獄按之不服閉口不食百餘日獄吏不敢考訊甚患之南公曰吾立能使之食引出問曰吾欲以一物塞君鼻君能終不食乎其人懼即食且服罪人問其故南公曰彼必善服氣者以物塞鼻則氣結故懼並楊文公談苑王罕王罕知漳州素號多事知州多以威嚴取辦罕獨以仁恕為之州事亦治有老嫗病狂數邀知州訴事言無倫理知州却之則悖詈先後知州以其狂但命徼者屛逐之罕至嫗復出左右欲逐之嫗訴本為人嫡妻無子其妾有子夫死為妾所逐家資妾盡據之嫗纍訴為官不得直因憤急發狂罕為直其事盡以家資還之吏民服其能洓水記聞顧方丹陽顧方獨行君子也皇祐末登進士第再調明州象山令涖事之日召邑中父老詢究民間利害及境內士民之善惡善者召而勸之使勿怠惡者諭而戒之使自修又為建學舍率其子弟之秀者教之暇日親為講解誘掖使進於善逾年民皆化服俄而方病邑民相率出錢詣塔廟祈禱者千人焉臠股者十三人方竟不起百里之內號泣思慕如失父母相與立祠以歲時祀方余觀近世為縣者類以簿書期會為急務鮮有能及教化者而方獨以仁義禮教治其民使民之愛慕如此丹陽錢君以毗陵胡完夫皆為方記其事刻石祠中而士夫以詩頌方之遺美者不可勝記余賤不得列其事史官傳為循吏每以為悵江翶江翺建安人文蔚之兄子也為汝州魯山令邑多曠土連歲枯旱艱食翺自建安取早稻令種此稻雖旱繁實可久蓄宜髙原至今邑人多種之歲歲足食楊文公談苑范諷御史有閽吏𨽻臺中四十餘年事二十餘中丞矣頗能道其事尤善評其優劣每聲喏之時所執之挺視中丞之賢否中丞賢則橫其挺中丞不賢則直其挺此話傳於縉紳凡為中丞者唯恐其挺之直也范諷為中丞聞望甚峻閽吏每聲喏必橫其挺一日范視事次閽吏執事范視之其挺直矣范大驚立召問曰爾挺忽直豈視我之失耶吏初諱之再問乃言曰昨日見中丞召客親諭庖人以造食中丞指揮者數四庖人去又呼之復丁寧教戒者又數四大凡役人者受以法而觀其成茍不如法有常刑矣何事喋喋之煩若使中丞宰天下之事不止一庖人之知任皆欲如此喋喋不亦勞而可厭乎某心鄙之不知其挺之直也范大笑慚謝明日視之挺復橫矣劉彝劉彝所至多善政其知虔州也會江西飢歉民多棄子於道上彝揭榜通衢召人受養日給廣惠食米一升每月一次抱至官中看視又推行于縣鎮細民利二升之給皆為字養故一境生子無失闕者一日曽魯公公亮語公曰久知都官法狀屢欲進擢然議論有所未合姑少遲之吾終不忘也彝曰人之淹詘速伸亦皆有命今姓名已蒙紀録而尚屈於不合之論亦某之命也魯公嘆曰比來士大夫見執政未始不有求求而不得即多歸怨而君乃引命自安吾待罪政府行十年未見如君之言者東軒筆録劉稱祥符中有劉稱者久困銓調為陜州司法參軍亷慎至貧乃罷官無以為歸計賣所乘馬辦裝跨驢以歸魏野以詩贈行曰誰似甘棠劉法掾來時騎馬去騎驢未幾真宗祀汾隂過陜徵野赴行在野避不奉詔上遣中使就野家索其所著得贈稱詩上嘆賞久之語宰臣曰小官有亷貧如此者使召之稱方為江南幕吏至以為京官知青州博陵縣後每有差除上曰得如劉稱者可矣未數年遷主客郎中三司户部判官真宗之奬拔亷吏如此然由野以詩發之也韓魏公皇祐三年本路八州之民合數千人撾登聞鼓願不以三年代韓魏公上自以中山地重輟公未可及遷觀文殿學士再任其制略曰領定武之雄塞控燕垂之巨方克宣壯猷有嚴武服戎落畏附師屯肅和思代爾庸艱難其付且惟進律之寵宜懋增職之留中山之民又嘗相率走闕下願得生祀公以廟天子皆嘆焉故龍圖閣李公詢序閲古堂嘗紀其事後公薨士民追思不已相與立祠以成其志魏王别録事實類苑卷二十三

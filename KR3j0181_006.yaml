body:
  text: 事實類苑卷六宋江少虞撰君臣知遇文太師元豐七年春文太師告老奏乞赴闕親辭天陛庶盡臣子之誠旣見神宗即日對御賜宴顧問温渥上酌御盞親勸數日朝辭上遣中使以手札諭公留過清明勅有司為公備二舟泝汴還洛清明日賜宴玉津園公作詩示同席將行特命三省已上赴瓊林苑宴錢復賜御詩送行公留京師一月凡對上者五賜宴者三賜詩者再顧問不名稱曰太師寵數優異近代無比見澠水燕談王冀公王冀公罷參政真宗朝夕欲見擇便殿清近惟資政為優因以公為本殿大學士公奏曰臣雖出於寒賤不能獨宿欲乞除一臣僚兼之遂以陳文禧彭年並直一夕公攜一巨榼入宿方與陳寒夜間飲遽中人持鑰開宫扉獨召公匆匆而入謂陳曰請同院不須相候獨酌數盃先請睡至行在真宗與公對飲飲罷持禁燭送歸繁若列星陳危坐伺之已四鼓笑曰同院尚未寢乎陳曰恭候司長豈敢先寢公喜笑倒載解襪褫帶幾不能支坦腹自矜曰某江南一寒生遭際真主適主上以巨觥敵飲僅至無算抵掌笑語如僚友之無間已而遂寢殆曉盥櫛罷與陳相揖覺夜歸數談頗踈漏自言夜来沉湎殊不記歸時之早晚毋乃失容於君子乎陳曰無之但殷勤愧謝旣辨色將赴班同趨出殿門執其手以語文禧曰夜来數事止是同院一人聞之文禧歸謂子弟曰大臣慎宻體當如此見湘山野録杜祁公皇祐中明堂大享時世室亞獻無官僚惟杜祁公衍以太子少師致仕南京仁宗詔加太子太保召陪杞明堂仍詔應天府敦遣就道趣亭驛設供帳具几杖待之稱疾固辭進太子太傅又進太子太師知制誥王洙謁告歸應天府有詔撫問封祁國公李漢超太祖時以李漢超為關南廵檢使捍北邉與兵三千而已然其齊州賦税最多乃以為齊州防禦使悉與一州之賦俾之養士而漢超武人所為多不法久之關南百姓詣闕訟漢超貸民錢不還及掠其女以為妾太祖召百姓入見便殿賜以酒食慰勞之徐問曰自漢超在關南契丹入㓂者幾百姓曰無也太祖曰徃時契丹入㓂邊將不能禦河北之民嵗遭刼虜汝於此時能保其貲財婦女乎今漢超所取孰與契丹之多又問訟女者曰汝家幾女所嫁何人百姓具以對太祖曰然則所嫁皆村夫也若漢超者吾之貴臣也以愛汝女則取之必不使失所與其嫁村夫孰若處漢超家富貴於是百姓皆感悦而去太祖使人語漢超曰汝須錢何不告我而取於民乎乃賜以銀數百兩曰汝自還之使其感汝也漢超誓以死報見廬陵歸田録蘇内翰蘇内翰易簡在禁林八年寵待之深夐出夷等李相沆入玉堂後於公一旦先除參政以公為承㫖賚賜與參政等蘇不甚恱上謂公曰朕欲正舊典先合卿即正台宰然欲令卿延厚夀基乃先用沆卿宜無嫌盖知齡促也公以母老急於進用因乾明聖節進内道塲醮歩虗十首中云玉堂臣老非仙骨猶在丹臺望泰階上悉其意俾參大政未幾遂卒年三十九上嗟悼為之洒涕賜挽詞斷句云時向玉堂尋舊迹八花磚上日空長見玉壺清話二蘇易簡一日直禁林得江南徐邈所造欹器遂以水試於堂上傳宣於公見之不識其名因宻奏旣晚太宗召對問曰卿所玩者得非欹器乎公奏曰然亟取進之於便坐上親試之其于水或增損一絲許器則遂欹其中則凝然不揺上歎曰真聖人之器也公奏曰願陛下執大寶神器持盈守誡皆如此器則王者之業可以與天地同久上徐笑謂公曰若人之容酒得此器以節安有沈湎之過耶葢易簡嗜飲過中故託此規之易簡泣謝慚佩上又撰欹器銘及草書誡酒詩以賜焉三蘇易簡為學士最被恩遇初與賈黄中李沆同時上擢黄中沆參政事以易簡為中書舍人旣承㫖並賜白金三十兩諭㫖曰朕之待卿非必執政而為重矣上作五言七言詩各一首賜之為真草行三體刻於石又飛白書玉堂之署四字以賜本院令龕於堂南門之上易簡以御書三體十本分遺秘書監李至及從祖修撰江陵公伯梁周翰知制柴成務吕祐之錢若水王旦直秘閣潘慎修翰林侍書王著侍讀吕文仲等凡十五人及至等宴於翰林以觀神筆之迹上遣内司拱擬坐客賦詩宰相李昉等亦以詩貽易簡悉以奏御上謂李昉等曰易簡以卿等詩来上有以見儒墨之盛而學士之光也可别録一本進入以其本賜易簡楊文公談苑陳執中世傳陳執中作相有婿求差遣執中曰官職是國家底非房廏籠箧中物婿安得有之竟不與故仁宗朝諫官累言執中不學無術非宰相器而仁宗注意愈堅其後諫官面論其非曰陛下所以眷執中不替者得非以執中嘗於先朝乞立陛下為太子耶且先帝止二子而周王已薨非陛下而誰執中何足眷仁宗曰非為是但執中不欺朕耳然則人臣事主宜以不欺為先也劉昌言劉昌言泉州人先任陳洪進為幕客歸朝不願授官舉進士三上始中第後判審官院未百日為樞宻副使時有言太驟者太宗不聽言者不已乃謂昌言閩人語頗獠恐奏對間陛下難㑹太宗曰我自㑹得其篤眷如此並見青箱雜記郭進太祖時郭進為西山廵檢有吿其隂通河東劉繼元將有異志者太祖大怒以其誣害忠臣命縛其人予進使自處置進得而不殺謂曰爾能為我取繼元一城一寨不止贖爾死當請賞爾一官嵗餘其人誘其一城来降進具其事進之於朝請賞以官太祖曰爾誣害我忠良此纔可贖死耳賞不可得也命以其人還進進復請曰使臣失信則不能用人矣太祖于是賞以一官君臣之間盖如此見廬陵歸田録二郭進少以壯勇依漢祖於太原開國歴刺史團練使國初遷洛水防禦使為西山廵檢以并太原進御軍嚴而好殺部下整肅每帥師入晉境無不克㨗太祖因遣戍西山語之曰汝輩當謹奉法我猶赦汝郭進殺汝矣嘗擇御龍宮三十人𨽻麾下押陣適與晉人戰多退却進斬三十人奏至上方御便殿閲武厲聲曰御龍宫千百人中始選得一二而郭進小違節遽殺之誠如此襲踵健兒亦不足供潜遣中使諭進曰恃其宿衛親近驕倨不稟命戮之甚得宜矣進感泣由是一年精勇無敵上為治第令㕔堂悉用㼧瓦有司言親王公主始得用此上曰進為國盡忠我待之豈不比吾子有何不可哉太宗征太原北敵由石嶺關入援大破之獻俘行在暴於城下并人喪氣遂約降進功髙負氣監軍田欽祚所為不法進屢以語侵之欽祚心銜因誣以他事進不能甘自縊死太宗微知之絀欽祚終其身不復用已上並楊文公談苑梁丞相梁丞相適始任詳刑一旦隨判院盧南金上殿進劄子奏案中偶有臣僚名次公者仁宗忽問曰因何名次公判院以明法登仕不能即對時梁代對曰臣聞漢黄霸字次公必以霸之字而為名也上遂問曰卿是何人對曰臣秘書丞審刑詳議官梁適又問卿是那个梁家對曰先臣祖顥先臣父固俱中甲科獨臣不肖於張唐卿榜及第上曰卿面酷肖梁固又他日上殿對罷適袍笏俯躬奏曰向蒙陛下金口親諭臣面貌類先臣伏念先臣祖父頃事太宗真宗皆祥符之前不知陛下何以知之上曰天章閣有名臣頭子觀之甚熟適因下殿謝音儀堂堂上頗愛之有用之之意一旦中書進擬除一臣僚為益漕凡進擬例更無改批但紙尾書可而已忽特批云差梁適未幾又除修記注以合洛臣僚進之復批梁適自後知制至翰林學士除目凡上皆批於尾公由秘丞至台輔不十年石元懿石元懿熙載西洛人家貧游學事母以孝聞嵩陽道中遇一叟熟視之稽顙曰真太平良弼也吾幼為唐相房𤣥齡檢書蒼頭公酷似房公囑之曰見子意氣相投者即真主也善事之語旣訖即滅後國初太宗建寧軍節公謁之傾意投為掌書記情禮深厚公長於太宗間侍樽俎嘗以兄呼之然亦得事上之體不諂不凟故免數入聲辱云殆踐祚七年為右僕射平章事卒太宗幸其第臨喪哭之哀謂近侍曰石某以純正事朕自幕府至台席朕窺之無纎瑕累方思委用朕不幸也戴恩戴恩為御龍弓箭直都虞候一日西蜀進青龍城道觀長夀仙人圖其本吴道子之迹太宗閱之酷肖戴恩又恐所見有殊亟召數班軍校近侍内臣遍視之曰汝輩且道此圖似何人合辭奏曰似戴恩上笑而異之因是擢用後至建寧逺軍節舉朝呼戴長夀邢尚書邢尚書昺曹州田家子深曉播殖真宗每雨雪不時憂形於色責曰官所定雨澤豐凶之兆多或不中昺進来嵗占大有稽驗皆收童老嵗月於畎畆間揣摩占得者咸平二年置經筵侍讀首命公為之昺初應五經廷試昇殿講師比二卦取羣經發顯太宗嘉其精博擢九經第一真宗晚年多召於禁寢従容延對忽一日見公衰甚御袖掩目泫然曰宫邸舊僚淪謝殆盡存者惟卿耳遽賜銀千兩繒千匹昺康裕無恙果非乆感疾將易簀車駕臨問公施紳整巾歴叙遭際上為之流涕旣終又為之臨喪惟將相喪疾方有此幸竇偁諫議竇偁為晉府賔佐後至諫議大夫㕘知政事僖起居郎儼文甚髙皆有集在秘閣偁亦有文為晉府記室賈琰為判官每諸王宗室宴集琰必怡聲下氣勃息褒讃諂詞㨗給偁叱之曰賈氏子何巧言令色之甚獨不愧於心耶太宗甚怒白太祖斥出為涇州節判後即位思之召為樞宻直學士數月㕘政進謝語之曰汝知何以及此偁曰陛下以臣徃年晉府遭逢所至耳上曰不然以卿嘗面折賈琰故任卿左右思聞直言耳見楊文公談苑李文正至道元年燈夕太宗御樓時李文正昉以同司空致仕於家上亟以安輿就其宅召至賜坐於御樓之側敷對明爽精神剛勁上親酌御樽飲之選餚饌之精者賜焉謂近侍曰昉可謂善人君子也事朕兩入中書未嘗有傷人害物之事宜其有今所享也又從容語及平日藩邸唱和之事公遽離席歴歴口誦御詩七十餘篇一句不遺上問曰何其記之精耶公奏曰言不敢妄臣自得謝每晨起盥櫛坐於道室㷊香誦詩每一詩日誦一遍或間却誦道佛書上喜曰朕亦以卿詩别笥貯之每愛卿翰墨也楷字老来筆力在否公對曰臣不善書皆㹠犬宗訥所寫耳上即令六品正官與之遂除國子監丞玉壺清話唐質肅潭州一巨賈私藏蚌胎為闗吏所捜盡皆南海明珠蚌胎也在任無不垂涎而愛之太守而下輕其估悉自售焉唐質肅公介時以言事謫潭倅分珠獄發奏方入仁宗預料謂近侍曰唐介必不買案具奏覆上覧之果然真所謂知臣莫若君也見湘山野録趙韓王太祖初登極時杜太后尚康寧嘗與上議軍國事猶呼趙普為書記嘗撫勞之曰趙書記且為盡心吾兒未更事也太祖寵待趙韓王如左右手御史中丞雷徳驤劾奏普强市人第宅聚財賄上怒叱之曰鼎鐺有耳汝不聞趙普吾之社稷臣乎命左右曳於庭數匝徐使復冠召升殿曰今後不宜耳赦汝勿令後人知也王光禄光禄王濟刑部詳覆官屢上封事是時道置提舉茶鹽酒稅一官朝廷因令訪察民間事吏之能否甚重其選㑹京西道闕官太宗問左右刑部有好官者為誰左右以濟對上即以授之㓂莱公太宗時㓂凖為員外郎忤上㫖拂衣起欲入禁中凖手引上衣令復坐决其事然後退上由是嘉之太宗器重凖嘗曰朕得㓂凖猶唐文皇之得魏鄭公也凖為禮部員外郎言事召對稱㫖太宗謂宰相曰朕欲擢用㓂凖當授以何官宰相請為開封府推官上怒曰此官豈所以待凖耶宰相請用為樞宻直學士上沉思乆之曰且使此官可也李尚書李穆字孟雍陽武人幼沈謹忠厚好學問聞酸棗王昭素善易徃師之昭素嘉其聰敏謂人曰觀李生材能器度他日必為卿相昭素先時著易論三十三卷秘不傳人至是盡以授穆由是知名舉進士翰林徐台符知貢舉擢之上第驗郢州軍事判官遷汝州防禦判官周世宗即位求文學之士或薦穆擢拜右拾遺太祖登極遷殿中侍御史屢奉使偽國平蜀之初通判洋州又通判陕州坐有罪復免一官久之召為中允尋以左拾遺知制誥太宗即位累遷至中書舍人宰相盧多遜得罪穆與坐以同年登進士第降授司封員外郎上惜其材尋命之考校貢院及御試進士上見其顔色憔悴憐之復以為中書舍人職任皆如故尋命知開封府事有能名遂擢㕘知政事穆性至孝母病累年穆身扶持起居能適其性或通夕不寐未嘗有倦惰之色母卒哀毁過人朝命起復固辭不得已視事然終不飲酒食肉米終䘮而卒年五十七上甚惜之謂宰相曰李穆國之良臣奄爾淪沒非穆之不幸乃國之不幸也贈工部尚書孫奭孫奭以儒素稱詞科及第數上書直諫真宗末侍東宫天聖初為侍講學士十年奭固請去乃遷禮部尚書知兖州上宴太清樓下以餞之又詔兩朝三館餞於秘閣先是宴兩制者中丞不預王隨時為中丞恥之曰朝廷盛事也吾不可以不預上䟽請行詔許之上又賜御書以寵之卒於兖州事實類苑卷六

body:
  text: 事實類苑卷五十八宋江少虞撰將帥才略秦再雄武陵辰陽澧陽清湘邵陽五州各有蠻猺保聚依山阻江逮十餘萬在馬希範周行逢時數出冦邊以至圍逼辰永二州殺掠民畜嵗嵗不寧太祖既下荆湖思得通蠻情習險扼而勇智可任者以鎮撫之有辰州猺人秦再雄者長七尺武健多謀在周行逢時屢以戰鬭立功蠻黨服之太祖召至闕下察知可用面以一路之事付之起蠻酋除辰州刺史官其一子為殿直賜豫甚厚仍使自辟吏屬盡豫一州租賦再雄感戴厚恩誓死報效至州日訓練士兵得三千人皆能披甲渡水歷山飛塹捷如猿猱又選親校二十人分使諸蠻以傳朝廷懷綏之意莫不從風而靡各得降表以聞太祖大喜再召至闕面加奬激再雄伏地流涕嗚咽不勝改辰州團練使又以其門客王允成為本州推官再雄盡瘁邊圉故終太祖之世無蠻貊之患五州連袤數千里不增一兵不費帑庫而邊境安妥由神機駕馭用一再雄而已魏能楊延朗敵犯澶淵傅潛堅壁不戰河北諸郡城守者多為蕃兵所陷或守城或棄城出奔當是時魏能守安肅軍楊延朗守廣信軍乃世所謂梁門遂城者也二軍最切敵境而攻圍百戰不能下以至賊退出界而延朗追躡轉戰未嘗衄敗故時人目二軍為銅梁門鐵遂城蓋由二將善守也王觀文王觀文韶始為建昌軍司理參軍時蔡樞密挺提㸃江西刑獄一見知其必貴顧待甚厚數年蔡知慶州王調官關中遂謁蔡於慶陽且言將應制科欲知西事本末蔡遂以前後士大夫之言及邊事者皆示之其間有向寶議洮河一說王悅之以為可行後至掌秦州機宜遂乞復洮河故地朝廷命韶兼管勾番部自是其謀侵廣欲進取蘭州鄯廓知秦州李師中以為不可而言事者亦多非沮朝廷令王克臣乘驛驗其事克臣亦依違兩可既而郭逵等又劾韶侵盜官物興起大獄俾蔡確推劾蔡明其無罪自是君相之意斷然不疑不數年克青唐武勝城熙河取洮岷壘岩西潭為熙河一路由上意不疑所致也翟守素翟守素北海人太宗時以闕使憲州刺史往征梅山洞夷人值霖雨弓弩箭筋角解弛守素令削木為弩平旦敵奄至衆弩盡發賊走平其巢穴李仲貴李仲貴孟州人五路討繼遷為麟府州濁輪塞路都部仲貴對因言賊居砂磧逐水草便於戰鬭利則進不利則退今五路齊入彼聞兵勢不能接戰欲追則人馬困乏將守則城無堅壘賊若未平仲貴等何顔復見陛下太宗喜出御劍賜之後果無功追念其言命為并代副都部署並東軒筆録王漢忠王漢忠字希傑徐州人真宗嘗曰漢忠知書好學帥臣不易得也纍為保靜軍節度使每行師詰旦必焚香祝曰願軍民無犯吾令違者一毫無貸故所部無盜賊性剛果不務小節好為詩慕賈島李洞之體以故羣帥不恱後為祁寧環慶部署坐違詔無功責為左屯衛上將軍襄州安置郭遵康定元年三月癸酉韓琦奏昨者夏虜寇延州有西路都巡檢使侍禁閣門祗候郭遵從劉平與賊戰跨馬舞二劔以出大呼云欲鬬將者乎問諸將無敢過敵者遵獨請行自上馬舞二鐵簡與賊格鬬賊應手腦碎餘衆遂却頃之遵又橫大掘刀率百餘人進陷虜陳至其帳前而還凡三出三入所殺者幾百人遵馬倒為賊所害聞賊中皆嘆服其勇也乞優賜褒贈及録其子孫詔贈遵果州團練使母妻皆封郡君諸子悉除供奉官侍禁殿直兄弟以差拜官文潞公樞密直學士明鎬討貝州久未下上深以為憂問於兩府參知政事文彥博請往督戰八年正月丁丑以彥博為河北宣撫使監諸將討貝州時樞密使夏竦惡鎬所請多從中沮惟恐其功成彥博奏今在軍中請得便宜從事不申覆上許之閏月庚子朔克貝州擒王則初彥博至貝州與明鎬督諸軍築距闉以攻城旬餘不下有牢城卒董秀劉炳請穴地以攻城彥博許之貝州城南臨御河秀等夜於岸下潛穿穴棄土於水晝匿穴中城上不之見也久之穴穿自教場中出秀等以褐袍塞之走白彥博選敢死二百命指使將之銜枚自穴中入有虞候楊遂請行許之遂白軍士中有病咳者數人不可去請易之從之既出穴登城殺守者垂絙以引城下之人城中驚擾賊以火牛突登城者不能拒頗引却楊遂力戰身被十餘鎗援鎗賊牛牛却走至村舍官軍追圍之則猶著花幞頭軍士爭趨之部署王信恐則死無以辨以身覆其上遂擒之闕吉死於亂兵不知所在彥博請斬則於北京夏竦奏言所獲賊魁恐非真遂檻車送京師斬於馬市董秀劉炳並除內殿崇班种世衡初趙元昊既陷安逺塞門塞朝廷以州堡塞多徒分兵力其逺不足守有悉棄之而虜盜內侵為邊患大理寺簽書保大軍節度判官事种世衡建言州東北二百里有故寬州城修之東可通河運路北可以扼敵要衝詔從之命世衡率兵董其役且城之城中無井鑿地百五十尺始遇石而不及泉工人告不可鑿衆以為城無井則不可守世衡曰安有地中無水者耶命工鑿石而出之得石屑一器酬百錢凡過石數重水乃大發既有且甘城中牛馬皆足自是邊城之無井者效之皆得水詔命其城曰青澗以世衡為內殿承制知城事二世衡字仲平放之兄子衡少尚節以䕃補將作監主簿纍遷太子中舍嘗知武功縣用刑嚴峻杖人不使拘縶之使自憑欄立磚上受杖杖垂畢足或落磚則更從一數之人亦從其威信或有追呼不使人執帖入鄉村但以片紙榜縣門云追某人期某日詣縣庭其親識見之驚懼走告之皆如期而至三後通判鳯陽知州王蒙章獻太后姻家也嘗以私干世衡不從乃誘王和謙使詣闕訟寃而隂為之內助世衡坐流竇州章獻崩龍圖閣直學士李紘奏雪其罪復衛尉寺丞後知澠池縣葺館舍計什器乃至砧臼匕筯無不備客至如歸由是聲譽大振自見縣旁山上有廟世衡葺之其梁重大衆不能舉世衡乃令縣幹剪髮如手搏者驅數對於馬前云欲詣廟中教手搏傾城人隨往觀之既至而不教謂觀者曰汝曹先為我致廟梁然後觀手搏衆欣然趨下山共舉之須臾而上其權數皆此類四初至青澗城逼近虜境守備單弱芻糧俱乏世衡以官錢貸商旅使致之不問所出入未幾倉廪皆實以教吏民習射雖僧道婦人亦習之以銀為射中的者輒與之既而中者益多其銀重輕如故而的漸厚且小矣或爭徭役優重亦使之射射中者得優處或有過失亦使之射射中則釋之由是人人皆能射士卒有疾者常使一子視戒以不愈必治之撫養羌親屬人得其歡心爭為之用寇至屢破之待部落家人遇有功者或解所服金帶或撤席上銀器以遺之比數年青澗城遂成富强於延州諸寨中獨不求益軍中芻糧五洛苑副使知青澗城世衡為屬吏所訟不法事按驗皆有狀鄜延路經略使龎公奏世衡披荆棘立青澗城若一一拘以文法則邊將無所措手足詔勿問頃之世衡徙知環州將行别龎公拜且泣曰世衡心腸鐵石也今日為公下淚矣六慶厯三年春范文正公巡邊至為環慶經略使知環州以屬羌多懷二心密與元昊通以种世衡素得羌屬心而青澗城已完因奏徙世衡以鎮撫之有牛奴訛素倔强未嘗出見州官聞世衡與約明日當至其帳慰勞部落是日雪深三尺左右曰奴訛凶詐難信且道險不平世衡曰吾方以信結諸部可失期耶遂冒雪而往既至奴訛尚寢世衡蹴起之奴訛大驚曰吾世居此山漢官無敢至者公乃不疑我耶帥部落羅拜皆感激心服七羌酋蘇慕恩部落最强世衡皆撫而用之嘗與恩飲出侍姬以佐酒既而世衡起入內潛於壁隙窺之慕恩竊與侍姬戲世衡遽出掩之慕恩慚懼請罪世衡笑曰君欲之耶即以遺之由是得其死力諸郡有二者使慕恩討之無不克八世衡嘗以罪怒一番落將杖其背僚屬為之請莫能得其人杖已奔趙元昊甚親信之得出入樞密院嵗餘盡伺得其機事以歸衆乃知世衡用為間也九環原之間屬羌有明珠滅藏康奴三種最大素號橫猾撫之則驕不可制攻之則險不可入嘗為原州患其北有二川通于下慮三川之間有古細腰城慶厯四年參知政事范文正公宣撫陜西命世衡與知原州將皆共城之世衡先遣人誘說夏虜以故及出兵爭之世衡以錢募戰士晝夜板築旬日而成乃召三種酋長諭以官築此城為汝禦冦三種既出其不意又援路已絶因而服從世衡在役所得疾明年正月甲子卒屬羌朝夕聚哭其柩者數日青澗環州吏及屬羌皆畫像事之八子詁診詠咨諤欣記誼十初洛范副使种世衡在青澗城欲遣僧王嵩入趙元昊境為間召與之飲謂曰虜若得汝考掠求實汝不勝痛當以實告耶嵩曰誓死不言世衡曰先試之乃縛僧於庭而掠之數百嵩不屈世衡曰汝真可也時元昊使其妻子兄弟寧令之舊野利旺榮及剛浪峻公將左右廂兵公最用事世衡使嵩齊為民服書詣旺榮且遺之棗及畫龜旺榮鎖嵩囚地牢中且半嵗矣㑹元昊欲復歸中國而先耻自言乃釋嵩囚使旺榮遺邊將書復遣教練使李文貴送嵩還曰向者种略書意欲更求通和耶邊將送文貴及嵩詣延州時龎公為經略使已奉朝㫖招納元昊始遣文貴往來議其事奏嵩除三班借職王罕王罕儂智髙犯廣州罕為轉運使出巡至梅州聞之而還仲簡使人間道以蠟丸告急且召罕罕從者才數人問曰圍城何由得入曰城東有賊所不到處可以夜縋而入罕曰不可進至惠州廣民躍馬求救曰賊圍城急縣人皆反相殺掠死傷蔽野罕曰吾聞之先父曰凡有大事必先詢識者而後行之無人則詢老者也乃召耆老問之對曰某家客户十餘人今皆亡為賊矣請集客以衛其家罕曰賊人多於莊客何以禦之乃召每村三大户與之帖使人募壯丁二百人又帖每縣尉募弓手三千人以自衛捕得暴掠者十餘人皆自要斬之又牒知州知縣縣令皆得擅斬人一夕鄉村肅然罕為募民驍勇者以自隨得三千人船百餘隻製旌旗鉦鼓長驅而趨廣州蠻兵數十人來逆戰却之蠻皆欵兵聚於城西乃開南門作樂而入罕不視闕登城子死於賊人之手而不哭樹鹿角於南門之西以拒蠻自是南門不復閉矣凡糧用皆自南門而出入東關主簿黃固知州侍其淵罕以其忠勇與之共守蠻衆數萬皆所掠二廣之民也使之晝夜攻城為火車順風以焚西門六月城上人不能立軍校請罕下城少休息罕欲從之淵奮劍責軍校曰汝曹竭力拒敵則猶可以生若欲潰去縱不為賊所殺朝廷亦當族汝全部欲何之罕乃止士氣百倍蠻軍不能克而退提刑鮑軻率其孥欲過嶺北至雄州蕭勃屇之乃自遞一奏又召罕至雄州計事罕不來又奏之諫官李兊奏罕只在廣州端坐及奏罕退走圍解罕降一官信州監視應賞不自言黃固當圍城最輸力闕而唐勘有不足亦得罪成功亦不録任福康定元年秋夏虜寇保安軍鎮戎軍九月二十日環慶路部署知慶州任福謀襲夏虜白豹城及骨咩族以牽制虜勢使來路巡簡任政華沙寨主胡永錫擊骨咩族使鳯川寨監押闕直劉世卿將廣神虎二指揮㑹華沙又使淮安鎮都監劉政監押張立將立超而谷寨與寨主簿共擊近寨諸族期以二十日丑時俱發福以十六日夜閉門後授諸軍甲十七日未明出兵城門非從行兵無得輒出一人聲言巡邊是日宿業樂鎮十八日晚入柔逺寨十九日犒設柔逺諸蕃部禁止毋得離城密部分諸將使注泊都監王懷政次白豹城西斷神樹移來路北都巡檢范全攻其東斷金湯之路柔逺寨主談嘉攻其北斷葉市之路供奉官王慶走馬承受石全攻其南擊賞渥等族駐泊都監武美主入城鬭敵福以大軍駐於城南照管䇿應是日引兵柔逺寨置蕃官等於福馬前而行凡七十里二十日丑時至白豹城各分闕時攻城卯時克之悉焚其僞置李太尉衙置酒稅務倉草場及民居室四十里內禾稼積聚諸將分彼族帳四十一擒僞署張團練殺首七人斬獲一百五十餘級虜牛馬羊槖駝七千餘頭器械三百餘事印記六面僞宣敕告身及蕃書五十通軍士死一百六十四人以范全及蕃官巡檢趙明為殿而還范雍知延州范雍奏前日趙元昊悉衆入寇陷金明寨執都監李彬父子遂攻安逺寨永平寨安逺最居極邊賊斫壞兩重門攻第三重門監押侍禁邵元吉縋下軍士斫退賊兵復奪得城門拒守數日賊遂合衆屯於州城之三川口列十餘寨二十三日賊分兵出東西之城後及兩城之間呼譟射城上人城上諸軍發矢石擊賊死者甚衆遂不敢攻賊引兵退其守城將佐轄盧守勤等謹條以其功乞超資酬賞以勵後來又奏栲栳塞主殿直髙益監甲殿直韓遂安寨主供奉官蔡詠奉職曹度借職王懿皆死於賊邵元吉及寨門寨主供奉官髙延德權押右侍禁王繼元永平寨主左侍禁郭延珍權監押右侍禁王懿皆有拒守之功詔死事者優與贈官仍賻錢絹録其子孫元吉遷西頭供奉官閣門祗候充安逺塞主王吉慶厯初趙元昊圍麟州二十七日城中無井掘地以貯雨水至是水竭知州苗繼先拍泥以塗膏積徇大箭賊有諜者潛入城中出告元昊城中水已竭不過二日當破元昊望見塗積曰城中無水何假塗積斬諜者解圍去麟州之圍苗繼先問募吏民有能通信求援於外者通引官王吉應募繼先問須幾人從行吉曰今虜騎百重無所用乃自髠髮衣服挨弓矢賫糧詐為虜人衣縋而出遇虜問則為虜語答之兩晝夜然後出虜寨入城中皆呼萬嵗及圍解詔除吉奉職本州指使二吉嘗從都監元凱及中貴人將兵數千人卒遇虜數萬騎中貴人惶恐以手帛自經吉曰官何患不得死何不且令王吉與虜戰若吉不勝死未晚也因使其左右數人守中貴人曰貴人有不虞當盡斬若屬因將所屬先登射殺虜大將虜衆大奔衆軍乘之虜墜崖死者萬餘人奏上凱自侍禁除禮賔使本路鈐轄吉自奉職除禮賔副使王吉嘗與夏虜戰其子文宣年十八從行戰罷不見文宣其麾下請入虜中求之吉止之曰此為王吉之子而為虜所獲尚何以求為頃之文宣繫二首以至吉乃喜曰如此真子也吉每與虜戰所發不過一矢即舍弓肉袒而入手殺十數人然後返及其張弓挾矢之時直往抱之使彼無以拒我則成擒矣吾前後數十戰未嘗發兩矢也時有張節與吉齊名皆不至顯官而卒趙延進趙延進屯定州契丹入冦與崔翰李繼隆將兵八萬太祖賜八陳圖使按圖從事歸次蒲城敵大至翰乃按圖布陳相去各有百步衆懼無鬭志延進曰不如合而擊之違令而獲利不猶愈於辱國乎遂改為二陳三戰大破之獲人馬牛羊鎧甲數十萬遷右監門衛將軍並涑水記聞鄭工部朝廷議城占威州遣訪鄭文寶奏曰欲城威州不若先建伯魚青門清逺三城為頓師之地俟秦民稍蘇開營田積邊粟修五原故寨之地党項之首豪為我鷹犬若爾則不獨措安西河亦可綏服河湟此定邊之勝䇿也朝廷從之建興三城之役費緡粟數千萬計西民苦之一夕盡為山水蕩去又奏減解池鹽價損課二十萬緡貶藍山枝江長夀三縣令纍年方復工部貟外郎見王壺清話二鄭工部文寶為陜運時賊遷欲侵靈武朝廷患之詔鄭便宜經度西事鄭前後自環慶親部芻粟越翰海七百里入靈武者十二次諸羌之語皆通曉鄭知靈武必不可守故參校史傳作河西隴右圖進呈極言乞棄靈武朝廷方遣大將王超援之又力諫太宗太平之時慎毋開邊疲弊百姓太宗閲奏極怒托以他事坐擅議鹽禁及建營田以積石廢壘築為清逺軍三過貶彬州藍山令王超援兵方至環州靈武果沒遂班師李順梗蜀隴賊趙包聚徒數千附之鄭知之趨棧以進分兵夜襲斬其魁殱餘黨嘗又輕車使蜀至渝涪聞廣武卒謀亂自雲安飛小楫下峽數百里一夕擒之所舉如神然太宗終怒藍山任滿更移支江京山二縣牢落五六年方復湘山野録唃嘶囉寶元二年二月甲寅保順軍節度使邈川大省領唃嘶囉遣使李波末裏瓦等入貢方物四月辛酉朔癸亥樞密院奏唃嘶囉前妻今已為尼有二子曰瞎氈磨氈唃嘶囉再娶喬氏女今為妻詔唃嘶囉前妻賜紫衣師號及法名今妻賜邑號瞎氈磨氈自請奮擊夏虜乞朝廷遣使監護乃降詔命從之八月辛丑詔屯田員外郎劉渙往秦州至邈川以來幹當公事渙晉州以自言請使外國故也楊文公談苑事實類苑卷五十八

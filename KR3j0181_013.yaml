body:
  text: 事實類苑卷十三宋江少虞撰德量智識向文簡真宗皇帝時向文簡除右僕射麻下日李昌武為翰林學士當對上謂之曰朕自即位以來未嘗除僕射今日以命敏中此殊命也敏中應甚喜對曰臣今日早俟對亦未知宣麻不知敏中何如上曰敏中門下今日賀客必多卿往觀之明日却對來勿言朕意也昌武候丞相歸乃往見丞相方謝客門闌悄然無一人昌武與向親徑入見之徐賀曰今日聞降麻士大夫無不歡慰朝野相慶公但唯唯又曰自上即位未嘗除端揆此非常之命自非勳德隆重眷倚殊越何以至此公復唯唯終不測其意又歷陳前世為僕射者勳勞德業之盛禮命之重公亦唯唯卒無一言既退復使人至庖厨中問今日有無親戚賔客飲宴會集亦寂無一人明日再對上問那日見敏中之意何如乃具以所見對上笑曰向敏中大耐官職向文簡拜僕射年月未曽考於國史熙寧中因見中書記天禧元年八月敏中加右僕射樞密院題名記天禧元年二月王欽若加僕射見筆談吕文仲吕文仲歙人為中丞有陰德咸平中鞫曹南猾民趙諫獄諌豪於財結士大夫根蒂特固忽御寶封軒裳姓名七十餘輩自中降出皆昔委誎營産買妾者悉令窮治文仲從容奏曰更請察其人密記姓名俟舉選對之日斥之未晚真宗從之李及章獻太后臨朝內侍省都知江德元權傾天下其弟德明奉使過杭州李及待之一如常時中人奉使者無所加益僚佐皆曰江使者之兄居中用事當今無比榮枯大臣反掌耳而使者精鋭復不在人下明公待之禮無加者意者明公雖不求福獨不畏其為禍乎及曰及待江使者不敢慢過如是足矣又何加焉既而德明謂及僚佐曰李公年高何不求一小郡以自處而久居餘杭繁劇之地豈能辦耶僚佐走告及曰果然使者之言甚可懼也及笑曰及老矣誠得小郡以自逸庸何傷待之如前一無所加既而德明亦不能傷也時人服其操守桑湜熙寧中王韶開熙州諸將以功遷官皇城使知原州桑湜獨辭不受曰羌虜畏國威靈不戰而降臣何功而遷官執政曰衆人皆受君獨不受何也對曰衆人皆受必有功也湜自知無功故不受竟辭之時人重其知恥涑水紀聞吕正惠晉公言凡士大夫而居大位者先觀其器度寬厚則無不中矣昔趙普在中書吕端為參政趙普覘其為事而多之曰吾嘗觀吕公奏事得聖上加賞未嘗喜遇聖上抑挫未嘗懼亦不形於言真台輔之器也見晉公談録盧億盧億字子元范陽人簡儉純素有古人風在洛陽聞其子多遜參知政事家有賜金服玩漸侈億愀然不樂謂親友曰家世儒素一旦富貴吾未知稅駕之所矣范蜀公蒙求潘承裕潘承裕建安人有才識名重於州里王延政建國欲以為相承裕力諌有僭號不受偽署延政將殺之慮失人心囚於私第江南平建州甚禮重之以偽禮部侍郎判福建道凡一道之征租獄刑選舉人物皆取決焉告老以尚書致仕歸洪州西山子慎修亦為要官臺城危入都為置宴使館懷信驛時弟從鑑光入貢亦留驛每王師克捷外庭入賀邸使督金帛之獻慎修獨建議以國將亡而旅賀非禮但奉物以待罪名斯可也太祖大喜謂使者有禮立遣易供帳物加賜牢醴深歎重之馮起馮起文炳有清節不起第嘗僦舍囿田時侍御史趙承嗣掌市征起歷任憲府承嗣以官聨素重之屢往見起因為出己俸百千市之起固辭不受未幾承嗣以姦贓敗棄市由是名聞於朝蘇易簡在翰林夜召語此事太宗因此知起名後擢知制誥已上見楊文公談苑吕許公明肅太后臨朝一日問宰相曰福州陳絳贓汚狼藉卿等聞否王沂公對曰亦頗聞之太后曰既聞而不劾何也沂公曰方外之事須本路監司發擲不然臺諌有言中書方可施行今事自中出萬一傳聞不實即所損又大也太后曰速選有風力更事任一人為福建路轉運使二相稟旨而退至中書沂公曰陳絳猾吏也非王耿不足以擒之立命進耿吕許公俯首曰王耿亦可惜也沂公不諭時耿為侍御史遂以為轉運使耿拜命之次日有福建路衙校拜於馬首云押進奉荔支到京耿偶問其道路山川風候而其校應對詳明動合旨意耿遂密訪絳所為校輒泣曰福州之人以為終世不見天日也豈料端公賜問然某尤為絳所苦者也遂條陳數十事皆不法之極耿因大喜遂留校於行臺俾之幹事既置詔獄事皆不實而校遂首常納禁器於耿事聞太后大怒下耿吏獄具謫耿淮南副使皆如許公之所料也東軒筆録澠水燕談二范文正公仲淹為參知政事建言乞立學校勸農桑責吏課以年任子等事頗與執政不合會有言邊鄙未寧者文正乞自往經撫於是以參知政事為河東陜西安撫使時吕許公夷簡謝事居圃田文正往候之許公問曰何事遽出也范答以暫往經撫兩路事畢即還矣許公曰參政此行正蹈危機豈復再入文正未諭其旨果使事未還而以資政殿學士知邠州見東軒筆録薛化光太祖征河東絳州薛化光上言凡伐木先去枝葉後取根底今河東外有契丹之助內有人户供輸切恐嵗月間未能下矣宜於太原北石嶺山及河北兩界東山靜楊林樂平鎮黃譯關百井社合建城寨扼契丹援兵遷其部內人户於西京襄鄧唐汝給間田使自耕絶其供饋如此不數年可平定矣其後果用其策而下河東化光簡肅之父後贈中書令薛長儒薛長儒為漢州通判戌卒閉營門放火殺人謀殺知州兵馬監押有來告者知州監押皆不敢出長儒挺身出營諭之曰汝輩皆有父母妻子何故作此事然不欲謀者各在一邊於是不敢動惟本謀者八人突門而出散於諸縣村野捕獲是時非長儒則一城之人盡遭塗炭鈐轄司不敢以聞遂不及賞長儒簡肅公之姪質厚人也臨事敢決如此東齋記事孔宗翰元祐中上元駕幸凝祥池宴從臣教坊伶人以先聖為戲刑部侍郎孔宗翰奏唐文宗時嘗有為此戲者即斥去之今聖君宴犒羣臣豈宜尚容有此詔付伶官於理或曰此細事何足言者孔曰非爾所知天子春秋鼎盛方且尊德樂道而賤工乃爾褻慢縱而不治豈不纍聖德乎聞者慚而歎服澠水燕談吕文穆吕蒙正相公不喜記人過初參知政事入朝堂有朝士於簾內指之曰是小子亦參政耶蒙正佯為不聞而過之其同列怒之令詰其官位姓名蒙正遽止之罷朝同列猶不能平悔不窮問蒙正曰若一知其姓名則終身不能復忘不如不知也不問之何損時皆服其量曹侍中曹侍中彬為人仁愛多恕平數國未嘗妄斬人嘗知徐州有吏犯罪既立案逾年然後杖之人皆不曉其旨彬曰吾聞此人新娶婦若杖之彼其舅姑必以婦為不利而惡之朝夕笞罵使不能自存吾故緩其事而法亦不赦也其用志如此趙槩王原叔曰趙槩與歐陽修同在史館及同修起居注槩性重厚寡言修意輕之及修同知制誥是時韓范在中書以槩為不文乃除天章閣待制槩淡然不以屑意及韓范出復除知制誥會修甥嫁為修從子晟妻與人淫亂事覺語連及修時修為龍圖閣直學士河北都轉運使疾韓范者皆欲文致修罪云與甥亂上怒獄急羣臣無敢言者槩乃上書言修以文學為近臣不可以閨房暗昧之事輕加汚衊臣與修蹤迹素疏修之待臣亦薄所惜者朝廷大體耳書奏上不悅人皆為之懼槩亦淡然如平日久之修終坐降為知制誥知滁州執政私曉譬槩復令求出乃出知蘇州遭喪去官服闋除翰林學士槩復表讓以歐陽修先進不可超越為學士奏雖不報時論美之並涑水紀聞李文靖寇萊公始與丁晉公善嘗以丁之才薦於李文靖公沆屢矣而終未用一日萊公語文靖曰比屢言丁謂之才而公終不用豈其才不足用耶抑鄙言不足聽耶文靖曰如斯人者才則才矣顧其為人可使在人上乎萊公曰如謂者相公終能抑之使在人下乎文靖笑曰他日後悔當思吾言也晚年與寇權寵相軋交互傾奪至有海康之禍始服文靖之識東軒筆録王德用叔禮為余言昔通判定州佐王德用是時契丹主有燕京朝廷發兵屯定州者幾六萬人皆寓居逆旅及民家闐塞城市未嘗有一人敢喧呼橫暴者將校相戒吾輩各當務斂士卒勿令擾我菩薩一旦倉中給軍糧軍士以所給米黑喧譁紛擾監官懼逃匿有四卒以黑米見德用德用曰汝從我當自入倉視之乃往召專副問曰昨日我不令汝給二分黑米八分白米乎曰然然則汝何不先給白米後給黑米此輩見所得米腐黑以為所給盡如是故喧譁耳專副對曰然某之罪也德用叱從者杖專副人二十又呼四卒謂曰黑米亦公家物不給與汝曹當棄之乎汝何敢乃爾喧譁四卒相顧曰向者不知有八分白米故耳某等死罪德用又叱如此欲求決配乎指揮使百拜流汗乃捨之倉中肅然僚佐皆服其能處事張齊賢張齊賢為布衣時倜儻有大度孤貧落魄常舍道上逆旅有羣盜十餘人飲食於逆旅之間居人皆惶恐竄匿齊賢徑前揖之曰賤子貧困欲就諸丈夫求一醉飽可乎盜喜曰秀才乃肯自屈何不可者顧吾輩粗疏恐為秀才笑耳即延之坐齊賢曰盜者非齷齪兒所為也皆世之英雄耳僕亦慷慨士諸君又何間焉乃取大碗滿酌飲之一舉而盡如是者三又取豚肩以指分為數段又啖之勢若狼虎羣盜視之愕然皆咨嗟曰真宰相器也不然何能不拘小節如此也他日宰制天下當念吾曹皆不得已而為盜耳願早自給納競以金帛遺之齊賢皆受不讓負重而返並涑水紀聞王文正王太尉薦寇萊公為相萊公數短太尉於上前而太尉專稱其長上一日謂太尉曰卿雖稱其美彼專談卿惡太尉曰理固當然臣在相久政事闕失必多準對陛下無所隱益見其忠直此臣所以重準也上由是益賢太尉萊公在藩鎮嘗因生日造山棚大宴又復服用僭侈為人所奏上怒甚謂太尉曰寇準每事欲效朕可乎太尉徐對曰準誠賢能無如騃何上意遽解曰然此正是騃耳遂不問及太尉疾亟上問以後事惟對以宜早召寇準為相云涑水紀聞二韓魏公言王文正母弟敖不可訓一日遇冬至祀家廟列百壺於堂前弟皆擊破之家人惶駭文正忽自外入見酒流滿路不可行俱無一言但攝衣步入堂其後弟忽感悟復為善終亦不言三契丹飛奏於嵗給外别給假金帛上以示王文正公曰東封甚近車駕將出以此探朝廷之意耳何其小哉上曰何以答之公曰立當以微物輕之也乃於嵗給三十萬外各借二萬仍諭次年額內除之契丹得之大慙次年復示有司契丹所借金帛二萬事屬小可仰依常數與之今後永不為例四寇公準在樞府上欲罷之萊公已知乃使人告公曰遭逢最久今出欲一使相望同年主之公大驚曰將相之任極人臣之貴茍朝廷有所授亦當辭豈得以此私有干於人仍白之萊公不樂後上議寇準令出與一甚官公曰寇準未三十已登樞密府太宗甚器之準有才望與之使相令當方面其風采足以為朝廷之光上然之翌日降制萊公捧使相誥謝於上前感激流涕曰茍非陛下主張臣安得有此命上曰王某知卿具道公之言萊公出謂人曰王同年器識非準可測公薨不在都下後入朝白於上前求奠哀慟久之在相府抑私逺嫌類如此五王冀公欽若陳公堯叟馬公知節同在樞府一日上前因事相忿爭上召公公至則見冀公喧譁不已馬流涕曰願與王欽若同下御史府公乃叱冀公曰王欽若對上豈得如此下去上大怒乃命下獄公從容曰欽若等恃陛下顧厚上煩陛下呵譴臣居宰府當行朝典然觀陛下天顔不怡願且還內來日取旨上許之公退召冀公等切責之上怒未解冀公等惶恐手疏待罪者相繼以聞翌日上召公曰王欽若等事何如處分公曰臣曉夕思之欽若等當黜然未知使伏何罪上曰朕前忿爭無禮公曰陛下奄有天下而使大臣坐忿爭無禮之罪恐四方聞之無以威逺上曰卿意如何曰願至中書召欽若等宣示陛下含容之意且戒約之候少間罷之未晚上曰非卿之言朕固難忍後月餘冀公等皆罷六寇萊公準在長安因生日為會有所過當轉運使以聞上以狀示公曰寇準為大臣豈得如此僭越公覽奏而笑曰寇準許大年幾尚騃耳因奏曰陛下撫服臣庶不欲令大臣被奢侈之名此奏願録付準必自改過萊公被命連表待罪而止七上出喜雨詩示二府聚看於上前公袖歸因諭同列曰上詩有一字誤擬入告改却王冀公曰此亦無害欽若沮而陰有奏陳翌日上怒謂公曰昨日朕詩有誤寫字卿等皆見何不奏來公再拜謝曰昨日得詩未暇再閲有失奏陳不勝惶懼諸公皆再拜獨樞密馬公知節不拜且言曰公欲奉白而欽若沮之又曰王某略不自辨真宰相器也上顧笑而撫諭之八張徐公耆任馬軍都帥被旨選兵下令大兵懼而欲為變有密以聞上召二府議之曰若罪張耆今後帥臣何以御衆捕之則都邑之下或至驚擾尤為不可上曰朕亦如此思之公曰纍奉德音欲任張耆在樞密府臣以未若歷事今若擢用使解兵柄謀者自安矣乃進耆為樞密副使諸帥遞遷謀者果定上語輔臣曰王某善鎮大事真宰相也九有卜者上封事語干宫禁上怒令捕之擊獄坐以法因籍其家有朝士往還書上曰此狂妄果臣僚與之從遊盡可付御史獄案公得之以歸翌日獨對曰臣看卜者家藏文字皆與之算命選日草本並無言及朝廷事臣記往年亦曽令此人推步生日星辰其狀尚存因出以奏曰行乞以臣此狀同問上曰卿意如何臣不欲以卜祝賤流纍及朝臣上乃解公至政府即時焚去繼有大臣力乞行欲因而擠之上令中使再取其狀公曰得旨已焚去矣十王沂公曽李觀察維薛尚書映一日謁公公託疾薛有不悅之色公壻韓億時在都下見之一日以此啓白公公曰韓郎未之思耳王薛皆李之壻相率而來恐有所干於朝廷事果不可沮之無害若可行答以何辭執政之大忌也韓乃謝曰非億所知後果李有所請並見名臣遺事事實類苑卷十三

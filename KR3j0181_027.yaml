body:
  text: 事實類苑卷二十七宋江少虞撰官職儀制對剔判銓吏部流内銓每除官皆去權判正衙謝後正衙前殿引選人謝辭由唐以来謂之對剔判銓與選人同入起居畢判銓於殿前近北西向立選人謝辭訖出判銓官亦謝而出近止令選人門謝辭判銓不復入罰俸例罰俸例一品八貫二品六貫三品五貫四品三貫五百五品三貫六品二貫七品一貫七百五十八品一貫三百九品一貫五十除節度使例外臣除節度使景德中以前止舍人院作制楊文公外制集載潘羅支厮鐸督朔方軍節度使數制是也其後遂學士院降麻如大禮加恩在將相後數日方下然不鎖院不宣麻近年遂同將相例鎖院告庭矣尚書以下不得靸鞋過都堂門尚書省舊制尚書侍郎官不得着靸鞋過都堂門諫議班諫議班在知制誥上若帶制則在知制誥下從職也戲語謂之帶墜並見春明退朝録五司㕔余為鄜延經略使日新一㕔謂之五司㕔延州正㕔乃都督㕔洎延州事五司㕔治鄜延路軍事如唐之使院也五司者經略安撫縂管節度觀使也唐制方鎮皆帶節度觀察處置三使今節度之職多歸縂管司觀察歸安撫司處置歸經略司其節度觀察而按并支掌推判官今皆治州事而已經略安撫司不置佐官以帥權不可不專也都縂管副縂管鈐轄都監同簽書而皆受經略使節制銀臺司銀臺司兼門下封闕乃給事中之制當𨽻門下故事乃𨽻樞宻院下寺監皆用劄子寺監具申雖三司亦言上銀臺主判不以官品初冬獨賜翠七錦袍學士以上自從本品行案用樞宻院襍司人吏主判食樞宻厨盖樞宻院子司也歩行學士叔闕鑑闕皆自左掖門下馬入舘當時謂之歩行學士嘉祐中於崇文院置編校局授官皆許乘馬至門院後其中書五房習學公事官縁例乘馬赴局衛士車駕行幸前驅謂之隊即古之清道也其次衛仗衛仗者視闕入宮門法則古之外仗也其中謂之禁圍如殿中仗天官掌舍無宫則供人門今謂之殿門天武官極天下長人之選八人上御前殿則執鉞立於紫宸門下行幸則為禁圍門行子仗馬之前又有衡門十人隊長一人選諸武士力絶倫者為之上御後殿則執撾東西對立於殿前亦古之虎賁人門之類也三司使班三司使班在翰林學士之上舊制權使即與正同故三司使結銜皆在官職之上慶厯中葉道卿為權三司使執政有欲抑道卿者降勅時移權三司使在職下結銜遂立翰林學士之下至今為例後嘗有人錯列結銜雖依舊而權三司使初除閤門取旨間有叙學士上者然不為定例三告官打杖子持藤杖三司開封府外州官長升㕔事則有衙吏前道告喝國朝之制在禁中惟三官得告宰相告於中書翰林學士告於本院御史告於朝堂皆用朱衣吏謂之三告官所經過處闇吏以挺叩地警衆謂之打杖子兩府親王自殿門打至本司及上馬處宣徽使打於本院三司使知開封府打於本司近嵗寺監長官亦打非故事前宰相赴朝亦有旨許張盖打杖子者係臨時指曯執絲梢鞭入内自三司副使以上副使惟乘紫緫暖坐從人隊長特執木挺自待制以上近歳寺監長官持藤杖非故事也百官儀範著令之外諸家所記尚有遺者雖至猥細亦一時儀物也功臣號賜功臣號始於唐德宗奉天之後自後藩鎮下至從軍資深者例賜功臣本朝惟以賜將相熈寜中因上皇帝尊號宰相率同列面請三四上終不允曰徽號正如卿等功臣何補名實是時呉正憲為首相乃請上功臣號從之自是羣臣相繼請闕遂不復次並筆談按察之職舊制轉運使官銜帶按察二字慶厯中沈邈薛坤為京東轉運使按察使欲令獲吏民之情乃請部吏之險猾者四人尚同李孝先徐九思孔宗旦俾偵伺一路而四人者怙權恣睢頗致騷擾時謂之山東四倀王達楊紈王鼎皆為轉運按察使尤苛虐多任耳目以害官吏時謂之江東三虎仁宗知其事下詔戒勅削去按察二字後澆風漸革而士大夫務崇寛厚無復暴察之名矣至熈寜中執政建言天下官吏皆持禄養交政事頽靡務相容貸盖由在上無督責之實於是出臺閣新進分按諸路謂之察訪既而又分三院御史為六察官領六察按以督舉中外事自是按察之政復行矣東軒筆錄帶侍讀學士出外故事侍讀學士無帶出外張知白罷㕘知政事授此職知大名府然非厯二府而出者不得焉寳元中梅詢始帶知鄭州自後兩制遂為例見東齋記事三司属官兼直舘韓國華字光弼相州人為右司諫鹽鐵判官每歳後苑賞花三舘學士皆預國華與潘大初封對自言任兩省清官兼計司職不得侍曲宴即日命直昭文舘後三日苑宴即命陪預三司属官兼直舘自國華等始見范蜀公蒙求罷二府大禮進官建隆至天禧每朝廷大禮二府必進官天聖二年南郊吕許公懇言之乃止自是加恩而已加食邑每大禮兩府加恩功臣階勲食邑實封内直三種學士至待制大兩府得階勲而下二種皆大卿監至少卿監一種得加食邑郎中而下京朝官一種階勲而已凡加食邑宰相千户實封四百户餘降麻官食邑五百户實封二百户舍人待制散尚書至少卿監已上食邑三百户實封二百户凡實食邑三百户封縣開國男五百户封子七百户封伯一千户封郡侯二千户封公五千户以上始加食邑封贈凡朝官父在經大禮推恩得致仕官不給俸父任升朝官以上致仕自得俸舊制若因其子更加秩即不給俸凡宰相使相母封國太夫人妻封國夫人樞宻使副使㕘知政事尚書節度使母封郡太夫人妻封郡夫人樞宻使㕘政母經南郊封國太夫人直學士以上給諫大卿監觀察母封郡太君妻封郡君舊制學士官至諫議大夫以上方得郡封天禧中改之少卿防團以下至升朝官母封縣太君妻封縣君凡輔臣宣徽初入封三代東宫三少曽祖為少保祖為少傅父為少師因進官或遇大禮進加至太師兩令國公使相節度亦封三代尚書資政殿大學士三司使封二代至太尉大學士自加兩府例學士至待制封一代至太尉餘升朝官以吏部尚書父歴兩府贈至太師令國公歴兩制大禮者贈至太尉掌選官限内不朝唐兵部吏部侍郎郎官選限内不朝今審官東西院三班院皆預内朝而流内銓止趨五日起居疑循舊制使相節度使不領京師官局祖宗朝使相節度使未嘗有領京師官局者其奉朝請必改他官多為東宫三少上將軍統軍趙中令以使相自河陽還除太子少保至明道中錢相始為景靈宫使治平中武康節度使李公端愿始為温泉觀使真宗時東封西祀奉祀皆輔臣為五使南闕用學士仁宗闕田恭謝大饗明堂祫饗上饗並循真廟之制罷相得職祖宗時宰相罷免惟趙中令得相餘多本官歸班㕘樞亦然天禧中張文節始得侍讀學士知南京天聖闕文康以資政學士知陜州自慶厯後解免罷卒皆得職焉𢃄禁職出外任祖宗時惟樞宻直學士帶出外任李尚書維罷翰林為集賢院學士知許州劉中學儀自翰林為臺丞學憲壬戌以翰林推三司使皆蘄出並以樞宻直學士判知頴州李知洪判蔡文忠以翰林兼侍讀兩學士改龍圖閣學士知宻州自翰林龍圖閣而出藩由文忠始也近歳帶侍讀及端明學士邢公昺以侍讀學士知曹州孫宣公亦以侍讀知兖州二公皆久奉勘合勸講遂聽以其職補外自張文節始舊輔臣帶侍讀出守至寳元中梅公詢始以侍讀學士知許州侍讀帶外任自梅公始也其後翰林出者率皆換此職晁文元公天禧中自翰林承旨換集賢院學士判西京普臺呉正肅公皇祐中以資政殿學士李少師公明嘉祐中以龍圖直學士並換集賢判西臺近歳皆以禁職分臺二府相壓二府舊以官相壓李文正公自文明殿學士工部侍郎為㕘知政事而宋惠安自左諫議大夫㕘知政事為刑部尚書居其上至拜王沂公與張文節公㕘知政事王轉給事中張轉工部侍郎兩班沂公下意頗不悅乃復還二卿之命止以舊官優加階邑自後第以先後入為次第未有磨勘轉官祖宗時未有磨勘每遇郊祀等恩皆轉官未滿二載者不轉官例加五階王黄州自知制誥未有勲便加柱國在滁州為散郎自承奉加朝散大夫階不隔磨勘遷官太宗時始置磨勘差遣院後改為審官真宗時京朝官四年乃得遷天聖中方有三年之制而在外任者不得遷須至京引對乃得改秩明道中始許外任歳滿亦遷時恭謝天地覃恩不隔磨勘有併進者於是朝士始多皇祐覃恩磨勘人情苦其不均英宗與神宗即位故復用恭謝之例太常卿秘書監先公嘗言太常卿不是卿秘書監不是監以其職列清重不與諸卿監侔耳唐室士大夫多尚臺省官不樂九卿故目秘書監為宰相病坊少監為給舍病坊然中秘書崇典籍有麒麟天禄二閣為藏書之所歴代名居禁中亦曰中書兩漢劉向楊雄皆典校於其内東漢班固為蘭臺令史尚為美職况監令乎故其秩甚重迄今班在太常宗正之下七寺卿之上是以名儒宿老不務趨競者多樂就此任唐白樂天劉夢得薛逢皆敡歴焉不可一一悉記吾為翰林學士承旨日厲以病嘗語同列云禁中視草非養病之地他日解職得遂大監之拜歸十數畞之園入就三品之列為國家典掌圖籍於九流百氏之中優游以為老則甚幸也寜期遭逢明聖㕘預輔相此固非平昔之覬望也諸子因上問曰太常卿班列如何公曰太常卿在六尚書之下其資望與吏部尚書同每入朝隨尚書立班與尚書承郎同幕次故太常卿舍為尚書裏行者盖為此也少卿即寄郎中幕次博士即寄員外幕次卿與少卿每入幕次皆横行獨據一榻向門而坐他卿不得並也建隆班簿建隆三年十二月班簿計二百二十四員文班一百五十人内南班一百一十人兩省二十七人學士三人留司十人武班七十四人内留司一十二人以上並春明退朝錄吏禄天下吏人素無常禄惟以受財為生徃徃有致富者熈寜三年始制天下吏禄而設重法以絶請託之弊是歳京師諸司歳支吏禄錢三千八百三十四貫二百五十四歳歳増廣至熈寜八年歳支三十七萬一千五百三十七貫一百七十八自後増損不常皆不過此數京師舊有禄者及天下吏禄皆不預焉春明退朝錄食邑滿萬户封國公舊制將相食邑萬户即封國公王太尉為相遇萬户而謙抑不受慶厯七年南郊中外將相惟夏鄭公滿萬户上書請封英國公因詔使相未滿萬户皆得封於是王康靖追封遂國公章文簡封郇國公王武恭封冀國公其後遂以邑封合萬户者徹國二國朝以封采封國者范侍中魯王文獻祁向侍中拱譙秦静難節度劉公重進燕保大節度趙公贊衛定國節度馮公繼業梁張侍中永德鄧衛張尚書詔鄭陳孟中令㫤秦王中令彥超邠趙中令梁許魏吕文穆徐許寇忠愍莱丁秩監晉馮文懿魏章文簡郇曹襄悼韓魯蘄王文穆冀張榮禧岐鄧李吕文靖申許王文正沂張文懿鄒鄧夏文莊英鄭王文康遂鄧王武恭祁魯賈文元安許魏陳恭公英岐文侍中潞杜正獻祁宋元憲莒鄭龎莊敏英韓侍中儀衛魏曽侍中英魯富相祁鄭宰相自草奏擬狀余嘗求得後唐閔帝應順元年案檢一道乃除宰相劉昫并判三司堂檢前有擬狀云具官劉昫伏以劉昫經國才髙匡君志切方属體元之運實資謀始之規宜注宸衷委司判計漸期庶富永贊聖明臣等髙闕望授依前中書侍郎兼吏部尚書同中書門下平章事充集賢殿大學士兼判三司散官勲封如故未審可否如蒙許允望付翰林降制處分謹録奏聞其後有制書曰宰臣劉昫可兼判三司公事宜令中書門下准此四月十日用御前新鑄之印與今政府行遣稍異本朝要事對禀常事擬進入書可然後施行謂之熟状事速不及待報則先行下具制草奏知謂之進草熟状白紙書宰相押字他執政具姓名進草即黄帋書宰相臣報政皆於状背押字堂押檢宰執皆不押惟宰相檢皆書押堂吏書名印用此擬状有詞宰相檢押不印此其為異也大率唐人風俗自朝廷下至郡縣决事皆有詞謂之判則書判科是也押檢二人乃馮道李愚也状檢瀛王親筆甚有改竄句抺處按舊五代史應順元年四月九日己卯鄂王薨庚辰以宰相劉昫判三司正是十日與此檢無差来次道記開元宰相奏請鄭敏鳳池藁草擬状注制集悉多用四六皆宰相自草今此擬状馮道親筆盖故事也宰相奏擬状唐宰相奉朝請即退延英止論故事大體某進擬差除但執熟状書可今所存有開元宰相奏請状二卷鄭敏鳳池藁草内載兩為相奏擬状數卷秘府有擬状注制十卷多用四六紀其人履歴往行諭請皆宰相自草五代亦然寇莱公謂楊文公曰予不能為唐宰相盖懶於詞命也今中書進呈差除退即批聖旨而因列押字國初范魯公始為之宰相上殿命坐賜茶舊制宰相早朝上殿命坐有軍國大事則議之常從容賜茶而退自謂號令除拜刑賞廢置事無巨細並熟状擬進入于禁中親覽批紙尾用御寳可其奏謂之印闕止降出奉行而已由唐室歴五代不改其制抑古所謂坐而論道者歟國朝范魯公質王宫師溥魏相仁浦皆在相位上雖傾心眷倚而質等自以前朝舊相憚太祖英武具劄子面取進止朝退各疏其事所得聖旨臣等同署字以志之如此則盡禀承之方可免妄設之失帝從之自是奏御寖或至旰昃啜茶之禮尋廢固弗暇於坐論矣于今遂為定或自魯公始也並出金坡遺事提舉宫觀天聖七年玉清宫成遂罷輔臣為宫觀事使而景靈㑹靈祥源三宫觀以學士舍人管幹康定元年李康靖公罷㕘知政事為資政殿大學士提舉㑹靈觀自後學士皆為提舉至和初晏元獻公以舊相為觀文殿大學士提舉景靈觀而當時有武臣令致政李少師端愿為觀察使止管幹祥源觀自陳於樞宻府宗衮宋元憲也謝脁謂謝安為宗衮乃加以都管當今朝官亦云提舉非故事也樞宻副使同知不並置本朝置樞宻使副或置樞宻院同知院然使副與知院不並置也熈寜元年文潞公品宣徽為使而潤州陳宰相自越州召為知院前一歳陳丞相為副使位在吕公之上故也文臣為樞宻皆帶檢校官太平興國四年石元懿始以樞宻直學士簽書院事八年張司空齊賢王公沔並以諌議大夫同簽書樞宻院事治平二年令郭宣徽為同簽書院事文臣為樞宻使皆帶檢校太尉太傅兼本官乾興元年錢文禧以兵部尚書為樞宻使不帶檢校官有司之失也相員國初范魯公王沂公魏僕射三相罷趙令獨相始置㕘知政事自是一相或二相至咸平中始有吕文穆李文靖向文簡三相又至至和中文潞公劉丞相富鄭公三相三司權使公事為兩等咸平六年併三部為三司使官輕則為權使公事慶厯中葉翰林再縂計止云權使盖中書誤也其後遂分權使與公事為兩等因例賜帶加服色李西樞憲成為知制誥尚緋衣出守荆南召為學士閤門舉例賜金帶而不可加於緋衣乃並賜三品之服事實類苑卷二十七

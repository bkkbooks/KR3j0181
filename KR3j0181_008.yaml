body:
  text: 事實類苑卷八宋江少虞撰名臣事迹韓魏公韓魏公以元勳舊德夷夏具瞻熙寧留守北都遼使每過境必先戒其下曰韓丞相在此無得過有須索遼使與京尹書故事紙尾止押字至是悉書名其為遼人敬畏如此每使至其國必問侍中安否其後公子忠彥奉使至遼問嘗使中國者曰國使類丞相否或曰類即命工圗之二韓魏公在相府時家有女樂二十餘輩及崔夫人亡一日盡厚遣之同列多勸且留以為暮年歡恱公曰所樂能幾何而常令人心勞孰若吾簡靜之樂也識者以為過人逺矣公舊有德於關中秦人愛之後子忠彥丞相出宣撫秦之父老有逺來觀於道旁者乃諤然相謂曰吾以為韓公乃非也於是相引以去遼人每見漢使必起立致恭以問曰韓公安否今在何處次問文富二老亦以公餘或以官以名而已公鎮大名四年遼使每涉臨清縣即戒其下曰此韓侍中境內慎勿亂須索以辱我也又嘗有使曰我輩在國中想望韓公名今幸過此如何得見故事惟通判攝少尹與之相見而留守不出也又嘗有諭其下者曰獻侍中馬須擇好者來既而不如㫖怒曰此豈比他處敢爾不加意遂笞其人易其馬三治平中夏國泛使將至以十事聞朝廷未知其何事也時太常少卿祝誥主館伴使既受命先見樞密府已而見丞相韓魏公曰樞密何語曰樞府云若使人議及十事苐云受命館伴不敢輒及邊事公笑曰豈有止主飲食而不及他語也公乃料十事以授祝曰彼及某事則以某詞對辨某事則以某詞折祝唯唯而退及宴使者果及十事凡八事正中公所料祝如所教答之夏人聳服祝常以為魏公真賢相非他人可及也四韓忠獻公神道牌神宗御制也中云公薨前一夕有大星殞于園中櫪馬皆鳴又曰公奉詔立皇子被顧命立英宗為皇帝立朕以承祖宗之叙可謂定策元勳之臣後銘其碑曰公行不歸中夕是悼尚想公儀淚落苑草復御篆十字填金以冠其額曰兩朝顧命定䇿元勳之碑見歸田録五熙寧初在咸秦平凉經略使蔡挺建議欲城白塔公許之及夲路兵馬丁夫既興而虜騎亦至寨下挺恐兵敗而事不濟且已任其罪乃走使京師具事勢如此及其可憂二狀請命於朝廷惟責公留下當增修保障致一路溝城懼於奔衝而不知始建謀者挺也公亦不自辨自城成無事公復奏挺之功而乞加奬諭焉六公鎮大名魏之牒訴甚劇而事無大小公親視之雖在疾病不出亦許通問請命而就决於卧內人或以公甚勞事過多勉其略于總核委于佐屬而少自便安曰兩詞在官人之大事或死或生或豫或奪至此一言而决吾將何敢略也吾恐有所不盡而未嘗輒敢有略也况其可以委之乎七公嘗在政府十有餘年贊輔三朝黜陟羣才其入踐台省外總方鎮出於門下者過半矣然其知恩感義於公者幾希人或以此為說公曰吾以至公之道薦人而不求人知以至公之道責人不避人怨但無愧於天地豈復邀譽於人也八慶厯八年大水嵗飢流民滿道公大發倉廪募人入粟分命官吏設飰粥以食民公日往按視逺近歸之者不可勝數明年皆給路糧遣歸優詔褒美其略曰河北都轉運司奏去年河北艱食人户流亡卿多方擘畫全活人命及七百萬並歸夲業蓋是卿用心拯救朕甚嘉之並見魏王别録司馬文正司馬文正公以髙才全德大得中外之望士大夫識與不識稱之曰君實下至閭閻畎畝匹夫匹婦莫不能道司馬公之退有十餘年而天下日冀其復用于朝熙寧末余夜宿青州北淄河馬鋪晨起北行見村民百餘歡呼踴躍自北而南余驚問之皆曰人𫝊司馬為宰相矣余以為雖出於野人妄𫝊亦其情之所素欲也故蘇子瞻為公獨樂園詩曰先生獨何事四海望陶冶兒童誦君實走卒知司馬蓋紀實也出澠水燕談孫威敏皇祐末契丹使請觀太廟樂仁宗以問宰相對曰恐非祀享不可以習也樞密副使孫威敏公沔曰當以禮折之謂使者曰廟樂之作皆夲朝所以歌詠祖宗功德也豈他國可用耶使人如能留助吾祭可以觀之仁宗從其議使者不敢復請陳文惠陳文惠公將終前一日自為墓志曰有宋頴川先生堯佐字希元道號餘子夀八十二不為夭官一品不為賤使相納祿不為辱三者粗備歸息於先秦國公燕國太夫人仲兄丞相棲神之域吾何恨焉並涑水紀聞王沔王沔字楚望端拱初參大政敏於裁斷時趙韓王罷政出洛吕文穆公蒙正寬厚自任中書多決於沔舊例丞相待漏於廬燃巨燭天殆曉將入朝尚有留按遣未盡沔當漏舍止燃數寸事都畢猶徘徊笑談方曉上每試舉人多令公讀試卷素善讀雖有文格下者能抑揚髙下迎其詞而讀之聼者無厭經讀者髙選舉子嘗納卷祝之曰得王楚望讀之幸也陶尚書陶尚書榖為學士嘗晚召對太祖御便殿陶至望見上將前而復却者數四左右催宣甚急榖終倣徨不進太祖笑曰此措大索事回顧左右取袍帶來上已束帶榖遂趨入並歸田録韓魏公皇祐五年韓魏公拜武康軍節度使經略河東時公在定五年矣將行定人爭欲遮留公使不得出公聞之一日僞游長春園隂由他道去民初不知至日晡時始悟奔走宿於北門門不得闔寮屬相與設祖於道鈐轄郝質壯勇士也首感泣大慟聲徹于外官吏皆泣下既而道路士庶哭聲動原野二北嶽祠在州之曲陽縣嵗久不葺守臣奉祀與執事者升降於頽垣壞廡間公以為慢神莫斯為甚乃完廟宇煥然一新每雨雪不時降公即走寮屬禱於祠下而神必應之時北道薦飢定獨屢豐故嘗有詩曰靈嶽祠官尚未回六花隨禱下瓊瑰其後公改帥并門人嘗題于廟門後每時有水旱必致禱無不響應故定人即靈居以謝並見魏王别録王荆公王丞相嘗云自議新法謂青苖免役更及法令等始終言可行者曾布也言不可行者司馬光也餘皆前叛後附或出或入澠水燕談二王荆公再為丞相黨人之後平日肘腋盡去而在者已不可信又才不足以任事平日唯與子雱謀議而雱又死知道之難行也於是慨然復求罷去遂以使相再鎮金陵未幾納節求閒地久之得㑹靈觀使居於金陵一日豫國夫人之弟吳生者謁荆公寓止於佛寺行香㕔㑹同天節建道場府寮當㑹於所謂行香㕔太守葉均使人白遣吳生不肯遷洎行香畢大㑹于其㕔而吳生於屏後嫚罵不止葉均俯首不聽而轉運毛抗判官李宗大不平之牒州令取問州遣一皂將牒逮吳生吳生奔荆公家以自匿荆公初未知其事也頃之二皂至門下云捕人而喧忿於庭荆公偶出見之猶紛紛不已叱二皂去葉均聞之遂拔二皂而與毛抗李宗大皆詣荆公謝以二皂生踈失於戒束荆公唯唯不答而豫國夫人於屛後叱均抗等曰相公罷政門下之人解體者十七八然亦無敢捕吾親屬於庭者汝等乃敢爾耶均等趨出㑹中使撫問適至而聞爭㕔事中使回日悉以此奏聞於是葉均毛抗李宗大皆罷而以吕嘉問為首又除王安上提㸃江東刑獄俾遷治所於金陵三熙寧庚戌冬荆公自參知政事拜同中書門下平章事史館大學士是日百官造門奔賀者不下數百人荆公以未謝皆不見之獨與余坐西廡之小閣荆公語次忽顰蹙取筆書窗曰霜筠雪竹鍾山寺投老歸歟寄此生放筆揖余入後二年公罷相知金陵明年復拜昭文館大學士又明年再出判金陵遂納節辭平章事又乞宫觀久之得㑹靈觀使遂築一第於西門外元豐癸丑春余謁公於第公遽邀余同游鍾山憩法雲寺偶坐於僧房余因為公道平昔之事及誦書窗之詩公撫然曰有是乎微笑而已並筆談向文簡太宗飛白書張詠向敏中二臣名付中書二人者名臣為朕記之向公自員外郎為諫議知樞密院止百餘日同平章事後坐事出永興軍駕幸澶淵手賜密詔盡付西鄙事許便宜從事公得詔藏之視政如常㑹邦人因儺有告禁卒欲倚儺為亂者密使麾兵被甲衣袍伏於簾幕明日盡召賔僚兵官置酒縱閲無一人預知其事者命儺先入令馳逞於中門外復召至階公振袂一揮伏卒齊出盡擒之各懷短刃即席誅之勦訖屏尸亟命灰沙掃庭張樂宴飲賔從股栗富文忠慶厯末富文忠公鎮青州㑹河决商胡北方大水流民坌入京東公所勸撫八州之民出粟以助賑給各因村坊擇寺廟及公私空舍又因崖為窟以處流離擇寄居官無職事者各給以俸即民所贅聚藉而授劵以時給之器物薪芻無不完具不幸死者為義塜收瘞自為文遣使祭之明年夏大稔計其道路資遣還業八州之間所全活者無慮四十餘萬人其募為兵者又萬餘人仁宗嘉之拜公禮部侍郎公曰恤災賑乏臣之職也卒辭不受澠水燕談二富公弼忠厚正直出於天性始終一節故富公之使北也朝廷以三書與之其一增物二十萬其一增十萬其一以公主妻梁王使與敵約曰能為我令元昊稱臣納欵我嵗增二十萬物不能者嵗增十萬敵曰元昊稱臣納欵我頥指之勞耳汝當以二十萬與我然須是謂之獻或謂之納然後可至於公主則不必爾也富公固爭獻納之名以尊朝廷見洓水紀聞三富公為人溫良寬厚泛與人語若無所異同者及其臨大節正色慷慨莫之能屈智識深逺過人逺甚而事無巨細皆反復熟慮必萬全無失然後行之宰相自唐以來謂之禮絶百僚見者無長幼皆拜宰相平立垂手扶之送客未嘗下階客坐稍久則吏從旁唱相公尊重客踧踖起退及公為相雖微官及布衣謁見皆與之抗禮坐語從容送之及門視其已上馬乃還自是羣公稍效之自公始也自致仕歸西都十餘年常深居不出晚年賔客請見者亦多謝以疾所親問其故曰凡待人無貴賤賢愚禮貌當如一吾纍世居洛親舊蓋以千百數若有見有不見是非均一之道若人人見之吾衰疾不能堪也士大夫亦知其心無怨也嘗欲之老子祠乘小轎過天津橋㑹府中從市於橋側市人喜公之出隨而觀之至於安門市為之空其得人心也如此及違世士大夫無逺近皆相見則以言不相見則以書更相弔唁往往垂泣其得士大夫心又如此嗚呼茍非事君盡忠愛民盡仁惻怛至誠之心充於內而見於外能如是乎四治平中公自定州歸朝既入見退詣中書白執政以求致仕執政曰康寧如是又主上意方厚而求去如此之堅何也公曰若待筋力不支人主厭棄後去乃不得已也豈得為止足哉因退歸私第堅卧不起自青州至是三年凡七上表其劄子不可勝數朝廷乃許之以太保致仕先是論者皆謂公筋力既壯必未肯告去至是乃服廬陵居士集五富韓公熙寧中罷相鎮亳常深居養疾罕出視事幕府諸君須有事必禀命者常以狀白公公批數字於紙尾莫不盡其理或事有難决諸君憂疑不能措手者相與求見公公以一二言裁處徐語他事諸君曉然率常失其所疑者退而歎服莫可及也公早使強敵以片言折狂謀尊中國及總大政視天下事若不足為者矧退處一郡乎澠水燕談梅聖俞王副樞疇之夫人梅鼎臣之女也景彛初除樞密副使梅夫人入謝慈夀宫太后問曰夫人誰家子對曰梅鼎臣女也太后笑曰是聖俞家乎由是始知聖俞名聞於宫禁也聖俞時在家甚貧余或至其家飲酒甚醇非常人家所有問其所得云皇親有好學者宛轉致之余又聞皇親有以錢數千得聖俞詩一篇者其名重於時如此廬陵歸田録吕文穆吕文穆公蒙正以寬厚為宰相太宗有所眷遇有一朝士家藏古鑑自言能照二百里欲因公弟獻以求知其弟因間從容言之公笑曰吾面不過鏡子大安用照二百里其弟遂不敢言聞者歎服以為賢于李衛公逺矣蓋寡好而不為物纍者昔賢之所難也二吕中令蒙正國朝三入中書惟公與趙韓王耳未嘗以婚戚徼寵澤子從簡當奏補時公為門下相舊制宰相奏子起家即授水部員外郎加朝階公奏曰臣昔忝甲科及第釋褐止授六品京官况天下才能老於岩穴不能霑寸祿者無限今臣男從簡始離襁褓一物不知膺此寵命恐罹隂譴止乞以臣釋褐所授官補之固讓方允止授六品京官自爾為制公生於洛中祖第正寢至易簀亦在其寢其子集賢二卿居簡平日親與文寶語此云並廬陵居士集燕王元儼燕王元儼太宗幼子也太宗子八人真宗朝已亡歿至仁宗即位獨燕王在以皇叔之親特見尊禮契丹亦畏其名其疾亟時仁宗幸其宫親為調藥平生未嘗語朝政遺言一二事皆切于理余時知制誥所作贈官制所載皆事實見廬陵歸田録陳堯叟陳堯叟字廣夫為廣西轉運使上言苧布所穅與桑柘不殊既成宿根旋報新幹枝葉繁茂則刈之周嵗之間三收其苧一固其夲十年不衰每織布一端止售百錢蓋織者多而市者少故地有遺利人無餘資固克復交市帛之數嵗萬匹自勸農廣植麻苧以鹽錢折變收市帛未及二年已得三十七萬餘匹請以苧麻允折桑柘之數合佐書厯為課範范蜀公蒙求李文靖李文靖公沆為相王魏公旦方參知政事時西北隅尚用兵或至旰食魏公歎曰我輩安能致太平得優游無事耶文靖曰少憂勤足以為警戒他日四方寧謐朝廷未必無事其後契丹講和西戎納欵而封禪祠汾搜講墜典靡有暇日魏公始歎文靖之先識過人逺矣見廬陵居士集二李文靖公沆嘗被同年馬亮責之曰外議以兄為無口匏公歎曰吾在政府雖無長才但外所陳利害一切報罷聊以此報國耳今國家防制纎悉密若凝脂茍畢狥所陳一一行之則所傷實多陸象先曰庸人擾之正此謂也憸人茍一時之進豈念于民耶公薨沐浴左脅而逝七日盛暑中方殮不聞腐氣信踐履之明效也三李丞相沆有長者譽一世僕逋宅金十千忽一夕遁去有女將十嵗美姿容自為一劵繫于帶願賣于宅以償焉丞相大惻之祝夫人曰願如已子育于室訓教婦德俟長成求夫嫁之雖止請夫人親結䄜以主其婚然而務在明潔夫人如所誨及笄擇一壻亦頗良具奩歸之女範果堅白其二親後歸舊京聞之感公刻心骨丞相病夫婦刲股為羮饋之至薨衰絰三年見湘山野録四公嘗言李丞相沆重厚淳質言無枝葉善屬文識治體樂賢好善為丞相有長譽頗通釋典尤厭榮利世務罕以攖其心自奉甚薄所居陋巷㕔事無重門逼下已甚頽垣壞壁沆不以屑慮堂前藥欄壞妻戒守舍者勿令葺以試沆沆朝夕見之經月終不言妻以語沆沆笑謂其弟維曰豈可以此動吾一念哉家人勸治居第未嘗答維因語次及之沆曰身食厚祿有時有橫賜計囊裝亦可以次苐但念內與以此世界為缺陷安得圎滿如意自求稱足今市新宅須一年繕完人生朝暮不可保又豈能久居巢枝聊自足耳安事豐屋哉後遇疾沐浴左脅而逝時盛暑停尸七日室中無穢氣亦履行之報也沆在相位接賔客常寡言馬亮與沆同年生又與其弟維善語維曰外議以大兄為無口匏維乘間嘗達亮語沆曰吾非不知也然今之朝士得升殿言事上封論奏了無壅滯多下有司皆見之矣若邦國大事北有强敵西有戎遷日旰條議所以備禦之䇿非不詳究薦紳中如李宗諤趙安仁皆時之英秀與之談皆不能啓發吾意自餘通籍之子坐起拜揖尚周章失措即席必自論功最以希寵奬此有何䇿而與之接語哉茍屈意妄行即世所謂籠罩籠罩之事僕病未能也為我謝馬君沆嘗言居重位實無補萬分唯中外所陳利害一切報罷之唯此少以報國耳朝廷防制纎悉備具或殉所陳請施行一事即所傷多矣此蓋陸象先庸人擾之之謂也楊文公談苑五真宗時或薦梅詢可用者上曰李沆嘗言其非君子時沆之沒蓋二十餘年矣歐陽文忠公嘗問蘇子容云宰相沒二十年能使主上追信其言以何道子容言獨以無心耳軾謂陳執中俗吏耳特以至公猶能取信主上况如李公之才識而濟之無心耶時元祐三年龍興節賜宴尚書省論此東坡志林事實類苑卷八

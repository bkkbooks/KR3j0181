body:
  text: 事實類苑卷十一宋江少虞撰名臣事迹元大㕘大㕘元厚之公成童時侍錢塘府君於荆南每從學於龍安僧舍後三十年公以龍圖貳卿帥於府昔之老僧猶有存者引旌鉞訪舊齋而門徑牕扉及泉池釣游之迹歴歴如昨公感之因搆一巨堂榜曰碧落手寫詩於堂詩有九重侍從三明主四紀乾坤一老臣及過廬都失眼前人之句雖向老而男子雄膽之氣殊未衰歇未幾果以翰林召歸為學士俄而又㕘熙寧大政真所謂乾坤老臣也其堂遂為後進之大觀湘山野録馮文懿仁廟初纂臨升衮纔十二嵗未能待旦起已日高時明肅太后垂箔擁佑一日遣中人傳㫖中書為官家年小起晚稽留百官班次每日祗來這裏取㫁語㑹首台丁晉公在告惟馮相拯在中書覆奏曰乞候丁謂出㕔商語殆丁㕘告果傳前語晉公口奏曰臣等止聞今上皇帝傳寶受遺若移大政於他處則社稷之理不順難敢遵稟晉公由此忤明肅之㫖復面謂同列曰此一事諸君即時自當申覆何必須候某出㕔足見顧籍自厚也晉公更衣馮謂魯㕘曰渠必獨作周公令吾輩為莽卓真乃宰臣存心也初冦忠愍公南貶日丁當秉筆謂馮曰欲與竄崖又再涉鯨波如何馮但唯唯丁乃除擬雷州及丁之貶也適當馮相秉筆謂魯㕘曰鶴相始欲貶冦於崖當有鯨波之嘆今暫屈周公涉鯨波一廵竟竄崖湘山野録二馮拯之父為中令趙普家内知盖幹當本宅事者也一日中令下簾獨坐拯方十餘嵗彈雀於簾前中令熟視之召坐與語其父遽至惶恐謝過中令曰吾視汝之子至貴人也因指其所坐榻曰此子他日當至吾位馮後相真宗仁宗位至侍中趙參政趙參政汾人太宗廷試愛其辭氣明俊擢寘中科未幾拜中丞上幸金明池舊例臺臣無從游之制太宗喜之特召與宴自公始也擢為樞密副使時陳象與董儼俱為鹽鐵副使胡旦知制誥盡同年生俱少年為一時名俊梁灝嘗又與公同幙五人者是夕㑹飯於樞第棊觴弧矢未嘗虚日無何乘醉夜分方歸金吾吏遂夜候馬首聲喏象醉鞭其吏曰金吾不禁夜玉漏莫相催都人諺曰陳三更董半夜趙公因是坐貶崇信軍淳化中以諫議起知天雄大河貫府盖豪猾輩蓄芻茭者利厚價欲售之誘奸人穴其堤防公知之仗劍露刃盡取豪芻廩積給用其蠧遂絶又忽漳河漲流入御河陵府城公籍禁卒殺羊為酒募豪右資散卒負土䕶之皆樂從不數日水退城完就加給事參政召還上召乘疾至赴京入對太宗笑謂公曰半夜之㑹不復有之公叩陛泣謝東軒筆録孫宣公孫奭字宗古博平人幼好學博通書喜講其說太宗端拱中九經及第再調大理評事充國子監直講太宗幸國子監詔奭說尚書說命三篇奭年少位下然音讀詳潤帝稱善因歎曰天以良弼賚商朕獨不得耶因以切勵輔臣賜奭緋章服累遷都官員外郎侍諸王講賜紫章服真宗即位令中書門下諭奭欲任以他官奭對不敢乃罷諸生侍讀頃之自職方員外郎除工部郎中充龍圖閣待制㑹真宗幸亳州謁太清宫奭上言切諫真宗不納真宗已封禪符瑞屢降羣臣皆歌誦盛徳獨奭正言諫諍毅然有古人丰采奭舉動方重議論有根底不肯詭隨雷同定爾雅論語孝經正議請以孟軻書鏤板復鄭氏所注月令初五日郊從祀神不設席尊不施羃七祠時饗獻神齋福止用一尊不設三登歌不雍徹冬至攝祀昊天上帝外紀上七十位享先農至祈榖之前上丁釋奠無三獻宗廟不備二舞奭皆言其謬闕並從其增改云又建言禮家六天帝止是天之六名實則一帝今位號重複不合典禮各宜罷五帝祀雩設五帝昊天帝位乞於羣臣議定時習禮者少又憚改作其議不行撰崇祀録鞶記圖五經節解五服年月傳行於時年七十卒有司諡曰宣三子瑤虞部員外郎琪衛尉寺丞早卒瑜殿中丞金坡遺事寇萊公真宗次澶淵一日語萊公曰今敵騎未退而天雄軍截在其後萬一陷殁則河朔皆敵境也何人可為朕守魏萊公曰當此之際無方略可施古人有言曰智將不如福將臣觀㕘知政事王欽若福禄未艾宜可為守於是即時進殿出勅退召王公於行府諭以上意授勅俾行王公茫然自失未及有言萊公遽曰主上親征非臣子辭難之日㕘政為國柄臣當體此意驛騎已集仍放朝辭便宜就塗身乃安也遽酌大白飲之命曰上馬杯王公驚惧不敢辭飲訖拜别萊公答拜曰㕘政勉之迴日即為同列也王公馳騎入魏方戎人滿野無以為計但屯塞四門終日危坐越數日敵騎退召同中書門下平章事集賢殿大學士如萊公之言也或云王公數進疑詞於上前故萊公因事出之以成勝敵之績耳東軒筆録二袁大監嘗言曽守官營道聞史官言寇萊公始謫衡州司馬素無公宇百姓聞之競荷瓦木不督而㑹公宇立成頗亦宏壯守土者聞於朝遂再有海康之行始戒途吏民遮道馬復䠞踖不進寇以䇿叩馬曰吾尚敢留滯耶汝何不行馬即前去寇泣曰語丁謂我負若何事致我於極地耶其後丁自朱崖移道州袁嘗接其語論遂以所聞質之丁曰寇自粗疏先朝因節日賜宴於寇相第寇好以大白飲人時曹利用為樞密副使不領其意寇曰某勸太傅酒何故不飲曹竟不濡唇寇怒曰若一夫耳敢爾耶曹厲聲曰上擢某在樞府而相公謂之一夫明日當於上前辯之自此二公不恊厥後發萊公之事者曹貂也預謂何事然中外皆知萊公之禍丁有力焉而二公之在政府也當太平之盛至於賛燮王度亦無善惡之大者至今天下識與不識聞萊公之名則許以忠藎言晉公之為則目為奸諛豈非丁以才過其實寇以誠過其才歟出倦游録三寇萊公卒於海康詔許歸葬道出荆南之公安縣邑人迎祭於道㫁竹挿地以掛紙錢竹遂不根而生滋茂迨一畆邑人神之立廟於側祠宇嚴潔祀奉甚謹侍讀王公樂道書其事於石本朝名臣傳四寇準拜中書侍郎平章事丁謂㕘知政事嘗㑹食於中書有羮汚準鬚謂與之拂準曰君為㕘政大臣而與官長拂鬚耶謂顧左右大愧恨章聖既倦政而丁謂曲意迎合太后之意有臨朝之謀準便殿請對言太子睿徳天成足以任天下之事陛下胡不恊天下人係望講社稷之大謀引望大明敷照重霄若丁謂恃力而挾奸曹利用恃權而使氣皆不可輔幼主恐亂陛下家事因俯伏嗚咽流涕真宗命中人扶起慰諭之明日謂之黨以急變聞飛不軌之語以中準坐是罷相乾興元年二月貶雷州司户㕘軍皆謂所為也赴雷州時道出公安剪竹揷於神祠之前而祝曰準之心若有負朝廷此竹必不生若不負國家此枯竹當再生其竹果生後范仲淹作藥石詩言準無辜被誣天聖元年閏九月移授銀青光禄大夫檢校祭酒衡州司馬盖上知其無辜將復其位其月死貶所年六十三尋復官爵諡忠愍及上即位北使至賜宴惟兩府預焉北使歴視坐中問譯者曰誰是無地起樓臺相公坐中無答丁謂令譯者謂曰朝廷即位南方須大臣鎮撫寇公撫南夏非久即還東軒筆録五天禧末真宗寢疾章獻明肅劉太后漸預朝政真宗意不能平寇公探此意遂欲廢章獻立仁宗策真廟為太上皇而誅丁謂曹利用等於是引李迪楊億曹偉盛度李遵朂等叶力處書已定凡誥命盡使楊億為之且將舉事㑹萊公因醉漏言有人馳報晉公晉公夜乘犢車徃利用家謀之明日利用入盡以萊公所謀白太后遂矯詔罷公政事及真宗上仙乃指萊公為反而投海上其事有類上官儀者天下寃之楊億臨死取當時所為詔誥及始末事迹付遵朂收之至章獻上仙遵朂乃抱億所留書進呈仁宗及叙陳本末仁宗盡見當日曲直感嘆再三遂下詔湔滌其寃贈中書令諡曰忠愍又贈楊億禮部尚書諡曰文凡預萊公黨而被逐者皆昭雪之故億贈官制曰天禧之末政漸中㣲能叶元臣屏儲拯危葢謂是也丁晉公丁晉公至朱崖作詩曰且作白衣菩薩觀海邊孤絶普陀山在朱崖作矜集百餘篇皆為一字題寄歸西洛又作大香傳叙江南諸香又作州郡名配古人姓名詩人集近人詞賦而為之叙及陀記之題詠各不下百餘篇盖未嘗廢筆硯也後移道州旋以秘書監致仕詔於光州居住流落貶竄十五年髭鬚無頒白者亦人服其量也在光州四方親知皆㑹至食不足轉運使以聞有㫖給東京房錢一萬貫為其子珙數月呼博而盡臨終前半月已不食但焚香危坐黙誦佛書以沉香煎湯時呷少許啟手足之際付囑後事神識不亂正衣冠奄然化去其能榮辱兩忘而不變不沮真異人也並東軒筆録陳康肅真宗欲擇臣寮善弓矢美儀彩者伴北使射時雙備者惟陳康肅堯咨可焉陳方詞職進用時晏元獻為翰林學士太子左庶子事無巨細皆咨訪之上謂晏曰陳某若肯換武當授與節鉞卿可諭之時康肅燕國馮太夫人尚在閫範嚴毅陳曰當白老母不敢自專既白之燕國命杖撻之曰汝䇿名第一父子以文章立朝為名臣汝欲叨竊寵禄貽羞於閥閱忍乎因而無報真宗遣小璫以方寸小紙細書問晏曰主皮之議何如小璫誤送中書大臣恾然不曉次日稟奏真宗不免笑而問之曰朕為不曉此一句經義因問卿等止黜其璫於前省亦不加罪湘山野録張洎張洎在圍城中作蠟丸帛書間道求北兵之援為邊候所得洎歸朝太祖召洎詰責以書示之洎神色自若徐曰此臣在國中所作太祖厲聲曰汝國稱藩事大何乃反覆如此汝實為之誰之過也洎曰當危難之際望延嵗月之命亦何計之不為臣所為帛書甚多此特一耳上喜之曰忠臣也召坐慰勞之魏王筆録崔遵度真宗為壽春郡王開府太宗詔宰執為朕選端方純明有徳學無過闕臣僚二人為王友僉擇累日惟得崔遵度張士遜耳遵度與物無競口未嘗言是非清潔完靖不喜名勢掌右史十年毎立殿墀匿身楹檻之外以避顧盼善琴得古人深趣著琴箋十篇鳴琴於室妻子殆不得見通夕只聞琴聲東軒筆録竇尚書竇儀開寶中為翰林學士時趙普專政帝患之欲聞其過一日詔召儀語及普所為多不法且譽儀早負才望之意儀盛言普開國勲臣公忠亮直社稷之臣帝不悦儀歸言於諸弟張酒引滿語其故曰我必不能作宰相然亦不詣朱崖吾門可保矣既而召學士盧多遜嘗有憾於普又喜於進用遂攻普之短果罷相出鎮河陽普之罷甚危賴以勲舊脫禍多遜在參知政事作相太平興國七年普復入相多遜有崖州之行是其言之騐也儀弟儼侃偁僖並舉進士父禹鈞范陽人為左諫議大夫致仕諸子皆成名士風家法為時之表焉馮道贈禹鈞詩云燕山竇十郎教子有義方靈椿一株老丹桂五枝芳人多傳誦儀至禮部尚書儼至禮部侍郎皆為翰林學士侃左補闕偁為晉府賔佐後至左諫議大夫㕘知政事僖起居郎儼文甚高皆有集在秘閣偁亦有文晉府記室楊文公談苑二王著既貶官内署闕人太祖謂范質等曰王著昨以酒失深嚴之地當選慎重之士處之質等對以前朝學士惟竇儀清介謹厚然須自翰林遷端明今又官為尚書難於復召太祖曰禁中非此人不可卿當諭朕意令勉赴所職即日再入翰林為學士金坡遺亊王文穆公王文穆公欽若臨江軍人母李氏父仲華常侍祖郁任官鄂渚而李氏有娠就蓐之夕江水暴溢將壊廨宇亟遷於黄鶴樓始娩身生男即公也時隔岸漢陽居人遙望樓際若有景星氣象云又公昔嵗行莆田道中宿於村舍夜起視天中有赤文成紫薇二大字光耀奪目使蜀還褒城路中有人展謁熟視刺字乃唐相裴度告公黙定之語及言公他日當貴兹亦異矣後公毎設壇禮神必朱篆紫薇二字陳於醮所又輟俸修晉公祠於莆田作記以述其肸蠁云青箱雜記二真宗封岱祀汾雖則繼述先志昭答靈貺中外臣民恊謀同欲然實由文穆之力賛焉故章聖禮畢登太平府偕近臣周覽前代碑刻内一碑首云朕欽若昊天真宗顧文穆笑曰元來此事前定只是朕與欽若此與隋史萬嵗討蠻人洞遇碑云萬嵗後過此頗相類三文穆王公不惟被章聖顧遇至於明肅太后亦深眷焉先是知邵武軍呉植餉金於文穆而誤投沂公之第沂公以聞植坐追停文穆以不知特寢不問故植之貶詞曰如何匪人瀆我元老此可見矣青箱雜記孫資政孫資政沔出師環慶宿管城值夏州進奉使至或白當避驛者公曰使夏國主自入朝亦外臣也猶當在某下况陪臣乎羌使遂宿白沙仁廟聞而嘉之倦游録事實類苑卷十一

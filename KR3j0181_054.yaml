body:
  text: 事實類苑卷五十四宋江少虞撰書畫技藝陳文惠陳文惠公善八分書變古之法自成一家雖點畫肥重筆力徑健能為文字謂之堆墨八分凡天下名山勝處碑刻題榜多公親迹世或效之而莫能及也喻浩開寶寺塔在京師諸塔中最髙而制度甚精都料匠喻浩所造也塔初成望之不正而勢傾西北人怪而問之浩曰京師地平無山而多西北風吹之不百年當正也其用心之精蓋如此國朝以來木工一人而已至今木工皆以喻都料為法有木經三卷行於世世傳浩唯一女年十歲每卧則交手於胸為結締狀如此逾年撰成木經三卷今行於世者是也吳正肅藏書畫者多取空名偶傳為鍾王顧陸之筆見者爭售此所謂耳鑒又有觀畫而以手摸之相傳以為色不隱指者為佳畫此又在耳鑒之下謂揣骨聽聲歐陽公嘗得一古畫牡丹叢下有一貓未知其精粗丞相正肅吳公與歐陽公姻家一見曰此正午牡丹也何以明之其花披哆而色燥此日中時花也貓眼黑睛如線此正午貓眼也有帶露花則房斂而色澤貓眼早暮則睛圓日髙漸狹長正午則如一線耳此亦善求古人筆意也髙益之相國寺舊畫壁乃髙益之筆有畫衆工奏樂一堵最有意人多病擁琵琶者誤撥下絃衆管皆發四字琵琶四字在上絃此撥乃掩下絃誤也豫以謂非誤也蓋管以發指為聲琵琶以撥過為聲此撥掩下絃則聲在上絃也益之布置尚能如此其匠心可知也宋迪度支員外郎宋迪工畫尤善為平逺山水其得意者有平沙雁落逺浦帆歸山市晴嵐江天暮雪洞庭秋月瀟湘夜雨煙寺晚鐘漁村落照謂之八景好事者多傳之往歲小姚村陳用之善畫迪見其畫山水謂用之曰汝畫信工但少天趣用之深服其言曰嘗患其不及古人者維在於此迪曰此不難耳汝當先求一敗墻張絹素訖倚之敗墻之上朝夕觀之觀之既久隔素見敗墻之上髙卑曲折皆成山水之像心存目想髙者為山下者為水坎者為谷缺者為澗顯者為近晦者為逺神領意造恍然見其有人禽草木飛動往來之象了然在目則隨意命筆默以神會自然境皆天就不類人為是謂活筆用之自此畫格日進徐鉉江南徐鉉善小篆映日視之畫之中心有一縷濃墨正當其中至於曲折處亦當中無有偏側處乃筆鋒直下不倒側故鋒嘗在畫中此用筆之法也鉉嘗自謂吾晚始得􅀈匾之法凡小篆喜瘐而長􅀈匾之法非老筆不能也筆談徐熙黃筌國初江南布衣徐熙偽蜀翰林待詔黃筌皆以善畫著名尤長於畫花竹蜀平筌并二子居寶居實弟惟亮皆𨽻翰林院圖畫院擅名一時其後江南平徐熙至京師送圖畫院品其畫格諸黃畫花妙在賦色用筆極新細殆不見墨迹但以輕色染成謂之寫生徐熙以墨筆畫之殊草草略施丹粉而已神氣迥出别有生動之意筌惡其勝己言其畫粗惡不入格罷之熙之子乃效諸黃之格更不用墨筆直以彩色圖之謂之沒骨圖工與諸黃不相下筌等不能復瑕疵遂得齒院品然其氣韻皆不及熙逺甚鄭工部鄭工部文寶在江南師徐鉉騎省小篆嘗篆千字文以示鉉其字字不出一中指之中騎省嘗曰篆難於小而多於大鄭子小篆李陽氷不及大篆可無爾見湘山野録陳康肅陳康肅公堯咨善射當時無雙公亦以此自矜嘗射於家圃有賣油翁瞻而視之久而不去見其發矢十中八九但微頷之康肅問曰汝亦知射乎吾射不亦精乎翁曰無他但手熟耳康肅忿然曰爾安敢輕吾射翁曰以我酌油知之乃取一葫蘆置於地以錢覆其口徐以杓酌之瀝自錢孔而入錢不濕因曰我亦無他惟手熟耳康肅笑而遣之此與莊生所謂解牛斫輪者何異二陳堯咨善射百發百中世以為神嘗自號小由基及守荆南回其母馮氏夫人問汝典郡有何異政堯咨云荆南當要衝日有宴集堯咨以弓矢為樂坐客罔不歎焉母曰汝父教汝以孝輔國家今汝不矜行仁化而専一夫之伎豈汝先人之志耶杖之碎其金魚見澠水燕談射覆丁文杲司天監丞無他學惟善射覆太宗時以為娛一日置一物器中令射之杲乃課其經曰廡下託所山中採花雖無官職一日兩衙啓之乃數蜂也又令壽王邸取一物令射之課曰有頭有足不石不玉欲要縮頭不能入腹啓之乃壓書石龜也即日賜緋并錢五萬見玉壺清話蹙融蹙融或謂之蹙戎漢書謂之格五雖止用數棊共行一道亦有能否徐德占善移遂至無敵其法以已常欲有餘裕而致敵人於險雖知其術止如是然卒莫能勝之造弓余伯兄善射自能為弓其弓有六善一者性體少而徑二者扣而有力三者久射力不屈四者寒暑力一五者弦聲清實六者一張使正凡弓性體少則易張而壽但患其不徑欲其徑者妙在治筋凡筋生長一尺乾則減半以膠湯濡而極之復長一尺然後用則筋力已盡無復伸弛又揉其材令仰然後傳角與筋兩法所以為筋也凡弓節短則和而虛虛謂挽過吻則無力節長則健而柱柱謂挽過吻則木強而不來節謂把梢禆木長則柱短而虛節得中則和而有力仍弦清聲實凡弓初射當天寒則徑強而難挽射久天暑則弱而不勝矢此膠之為病也凡膠欲薄而筋力盡強弱任筋而不任膠此所以射久力不屈寒暑力一也弓所以為正者材也相材之法視其理不因矯揉而直中繩則張而不跛此弓人之所當知也板印書籍板印書籍唐人尚未盛為之自馮􅘵王始印五經已後典籍皆為板本慶厯中有布衣畢升又為活板其法用膠泥刻字薄如錢唇每字為一印火燒令堅先設一鐡板其上以松脂蠟和紙灰之類冒之欲印則以一鐡範置鐵板上乃密布字印滿鐡範為一板持就火煬之藥稍鎔則以一平板按其靣則字平如砥若止印三二本未為簡易若印數千百本則極為神速常作二鐡板一板印刷一板已自布字此印者才畢則第二板已具更互用之瞬息可就每一字皆有數印如之也等字每字有二十餘印以備一板內有重復者不用則以紙貼之每韻為一貼木格貯之有竒字素無備者旋刻之以草火燒瞬息可成不以木為者文理有疏密沾水則髙下不平兼與藥相粘不可取不若燔土用訖再火令藥鎔以手拂之其印自落殊不沾汚升死其印為豫羣從所得至今寶藏算術算術求積尺之法如芻萌芻童方池冥谷塹堵鱉臑圓錐陽馬之類物形備矣獨未有隙積一術古法凡算方積之物有立方謂六幕皆方者其法再自乘則得之有塹堵謂如土墻者兩邊殺兩頭齊其法併上下廣折半以為之廣以直髙乘之又以直髙為勾以上廣減下廣餘者為股勾股乘弦以為斜髙有芻童謂如覆斗者四面皆殺其法倍上長加入下長以上廣乘之倍下長加入上長以下廣乘之併二位法以髙乘之六而二隙積者謂積之有隙者如纍碁層壇及酒家積罌之類雖似覆斗四面皆殺緣有刻缺及虛隙之處用芻童法求之常失於數少豫思而得之用芻童法為上行下行别立下廣以上廣減之餘者以髙乘之六而一併入上行假令積罌最上行縱廣各二罌最下行各十二罌行行罌相次先以上二行相次率至十二當十二行也以芻童法求之倍上行長得四並入下長得十六以上廣乘之得二十二又倍下二長得十六併入上長得四十六以下廣乘之得三百一十二並二倍得三百四十四以髙乘之得二千七百八十四重列下廣十二以上廣減之餘十以髙乘之則一百一十併入上行得三千八百九十四六而一得六百四十九此為罌數也芻童求見實方之積隙積求見合角不盡益出羡積也履畝之法方圓曲直盡矣未有會圓之術凡圓田既能拆之須使會之復圓古法惟以中破圓法拆之其失有及三倍者豫别無拆會之術置圓田徑半之以為弦又以半徑減去所割數餘者為股各自乘以股除弦餘者開方除為勾倍之為割田之直徑以所割之數自乘退一位倍之又以圓徑除所得加入直徑為割田之弧再割亦如之減去已割之數則再割之數也假令圓田徑十步欲割二步以半徑為弦五步自乘得二十五又以半徑減去所割二步餘三步為股自乘得九用減弦外有十六開平方除得四步為勾倍之為所割直徑以所割之數二步自乘為四倍之得為八退上一倍為四尺以圓徑除今圓徑十已足盈數無可除只用四尺加入直徑為所割之弧凡得圓徑八步四尺也再割亦依此法如圓徑二十步求弧數則當折半乃所謂以圓徑除之也此二類皆造微之術古書所不到者漫志於此造舍之法造舍之法謂之木經或云喻皓所撰凡屋有三分去聲自梁以上為上分地以上為中分階為下分凡梁長幾何則配極幾何以為榱等如梁長八尺配極三尺五寸則廳法堂也此謂之上分楹若干尺則配堂基若干尺以為榱等若楹一丈一尺則階基四尺五寸之類以至承栱榱桷皆有定法謂之中分階級有峻平慢三等宫中則以御輦為法凡自下而登前竿垂盡臂後竿展盡臂為峻道荷輦十二人前二人日前竿次二人日前絛又次曰前脅後二人曰後脅又後曰後絛末後曰後竿輦前隊長一人曰傳唱後一人曰報賽前竿平肘後竿平肩為慢道前竿垂手後竿平肩為平道此之為下分其書三卷近嵗土木之工益為嚴善舊木經多不用未有人重為之亦良工之一業也綴術審方靣勢覆量髙深逺近算家謂之術文象形如繩木所用墨斗也求星辰之行步氣朔消長謂之綴術謂不可以形察但以算數綴之而已北齊祖亘有綴術二卷厯術淮南人衛朴於厯術一行之流也春秋日蝕三十六諸厯通驗密者不過得二十六七惟一行得二十九朴乃得三十五惟莊公十八年一蝕古今算皆不入蝕法疑前史誤耳自夏仲康五年癸巳歲至熙寧六年癸丑凡三千二百一年書傳所載日蝕凡四百七十五衆厯考驗雖各有得失而朴所得為多朴能不用算推古今日月蝕但口誦乘除不差一算凡天厯悉是算數令人就耳一讀即能暗誦旁通厯則縱橫誦之嘗令人寫厯書寫訖令附耳讀之有差一算者讀至其處則曰此誤某字其精如此蹴踘蹴踘以皮為之中實以物蹴踘踏為戲樂也亦謂為毬焉今所作牛彘胞納氣而張之則善跳躍然或俚俗數少年簇圍而跳之終無墮地以失蹴為恥以不墮為樂亦謂為築毬鞠也就東方之故事習蹴踘乃習將之道後變鞠為木角者見其圓轉自若似審視其間不無法度形勢故有著蹴踘二十五篇也枚臯作賦詠之又霍去病穿城踏音踏鞠穿地作鞠室也士之言謂之論今有步打徒打不徒則馬打大有制規制體格用意竒巧取其精練者為上今聖精敏此藝置供御打毬供奉亦猶唐有後園大小毬官也然時習之不為常好也矣二顔師古注霍去病傳去病穿城踏鞠云鞠以皮為之實以毛蹙鞠而戲也顔謂鞠乃如此至晚唐已不同矣歸氏子弟嘲皮日休云八片尖斜砌作毬火中燖了水中揉一包間氣時常在惹踢招拳卒未休國朝士人柳三復最能之丁晉公亦好焉作詩敘述曰背裝花屈口易反膝白打大亷斯又曰進前行兩步蹺腳立多時初柳為進士欲見晉公無由會晉公蹴後園柳往蹴之毬果併出柳即挾取左右以告晉公亦素聞柳名即召之柳白襴懷所素業首戴毬以入見晉公再拜者三出懷中詩又再拜每拜輒轉至背臂間既起復在幞頭上晉公大竒之留為門下客世傳毬最賤藝天下萬事皆弟子拜師獨毬弟子學毬或富貴子弟而善毬者率多賤人每勞賜以酒必拜謝而去是師拜弟子也術不可不慎此亦可喻大云見劉貢父詩話圍碁圍碁博物志曰堯造圍碁以教子丹朱或云舜以子商均愚故作圍碁以教之也其法非智不能有髙下臨局下子則見其愚智也孟子曰奕秋通國之善奕者使奕秋誨二人奕其一人專心致志惟奕秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣為是其志弗若歟曰非然也注奕人名秋是謂其智弗若也曰非也以其志不致也揚雄方言關中謂奕即碁也今碁品以國手為極何謂國手耶孟子云奕秋通國之善奕者也此言一國之內更無敵者也如南朝以羊玄保為逸品梁武帝同之然南北國局俠故言通國也若孟子時六國也若天下一統殊無抗敵可稱為天下絶格也齊高弟子有曰華隨在淮陽破荻為片縱橫以為碁局指點行勢遂至名品東漢馬融著賦焉二小説唐僧一行曽算碁局都數凡若干局盡之豫嘗思之此固易耳但數多非世間名數可能言之今略舉大數凡方二路用四子可變八千十一局方三路用九子可變一萬九千六百八十三局方四路用十六子可變四千三百四萬六千七百二十一局方五路用三十五子可變八千四百七十二億八千八百六十萬九千四百四十三局方六路用三十六子可變十五兆九十四萬六千三百五十二億八千二百三萬一千九百二十六局方七路以上數無名可紀盡三千一十六路大約連書萬字五十二即是局之大數筆談彈棋西京雜記云漢元帝造蹴踘以蹴踘為勞求相類而不勞者遂為彈棋之戲豫觀彈棋絶不類蹴踘頗與擊鞠相近疑是傳寫誤耳唐薛嵩好蹴踘劉鋼勸止之曰為樂甚衆何必乘危邀頃刻之歡此亦擊鞠唐書誤述為蹴踘彈棋今人罕為之有譜一卷蓋唐人所為棋局方二尺中心髙如覆盂其巔為小壺四角微隆起李商隱詩曰玉作彈棋局中心最不平謂中央髙也白樂天詩彈棋局上事最妙是長斜長斜謂抹角斜彈一發過半局今譜中具有此法柳子厚敘棋用二十四棋者即此戲也漢書注云兩人對局黑白子各六枚與子厚所記小異如奕棋古局用十七道合二百八十九道黑白棋各百五十亦與後世法不同筆談算術算術多門如求一上驅搭因重因之類皆不離乘除惟增成一法稍異其術都不用乘除但補虛就盈而已假如欲九除者增一便是八除者增二便是但一位一因之若位數少則頗簡捷位數多則愈繁不若乘除之有常然算術不患多學見簡即用見繁即變不膠一法乃為通術也筆談事實類苑卷五十四

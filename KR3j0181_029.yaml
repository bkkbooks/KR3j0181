body:
  text: 事實類苑卷二十九宋江少虞撰詞翰書籍制詞異名學士之職所草文辭名目浸廣拜免王公將相妃主曰制賜恩闕曰赦書曰德音處分事曰敕榜文號令曰御劄賜五品已上曰詔六品已上曰敕書批敕羣臣表奏曰批答賜外國曰著書道醮青詞釋門曰齊文教方略命曰自語土木興建曰上梁文宣勞錫賜曰口宣此外更有祝文祭文諸王亦政榜號簿隊名讚文佛疏語又有别受詔旨作銘碑墓志樂章奏議之屬此外章表歌頌應制之作舊説唐朝官中常於學士取眠兒歌偽蜀學士作桃符文孟昶學士辛寅遜題桃符云新年納餘慶佳節號長春是也白麻翰林規制自妃后皇太子親王公主宰相樞密節度使並降制用白麻紙書每行四字不用印進入後降付正衙宣讀其麻即付中書門下當日本院官告院取素綾紙待詔寫官誥只用麻詞官誥所署中書三司官宣奉行並依誥身體式常用門長一人銜位並談苑西掖植紫薇咸平中翰林李昌武宗諤初知制誥至西掖追故事獨無紫薇自别墅移植聞今庭中直院老吏相傳猶是武昌手植晏元獻寫賦于壁曰得自羊墅來從名園有昔日之絳老無當時之仲文觀茂悅以懷舊指蔽芾以思人湘山野録答北敵書景德初北敵請盟欲撰答書久無體制時趙文定安仁為學士獨記太祖朝書禮規式詔撰之及修講盟好之制深得輕重朝論美之三盛清話知制誥上事閣長壓角舍人院每知制誥上事必設紫褥於庭面北拜廳閣長立褥之東北隅謂之壓角宗衮作掖垣業志而不解其事按唐書亦無聞焉惟裴瑶裕王陵遺事二舍人上事知印宰相當壓角則其禮相傳自唐也豫為舍人日邰與宗入院不疑為閣長壓角時議美之學士繫鞋翰林故事學士每退於中書皆公服靸鞋坐西堂使院吏入白學士至丞相出迎然此禮不行久矣章惇為知制誥直學士院力欲行之會一日兩制俱白事於中書其他學士皆鞹足秉笏而惇獨散手繫鞋翰林故事十廢七八忽行此禮大喧物議而中丞鄧綰尤肆抵毁既而罷惇直院而繫鞋之禮後亦無肯行之者京師春秋祭社多差兩制攝事王僕射圭為內外制十五年祭社者屢矣學士俸薄先朝翰林學士不領他局故俸納最薄楊億久為學士有乞郡表其略曰虛添甘泉之從官終作莫敖之餒鬼又有方朔飢欲死之句自後乃得判他局至元豐改官制而學士無主判如先朝矣進退宰相議論皆出學士進退宰相其帖例草儀皆出翰林學士舊制學士有闕則第一廳舍人為之嘉祐末王荆公為閣老會學士有闕韓魏公素忌介甫不欲使之入禁林遂以端明殿學士張方平為承旨蓋用舊學士也既而魏公罷政凡議論皆出安道之手東軒筆録知制誥先試後命國朝之制知制誥必先試而後命有國以來百年不試而命者才三人陳堯佐楊億及修忝預其一耳索潤筆王元之在翰林當草夏州李繼遷制繼遷送潤筆物數倍於常然用啓頭書送拒而不納蓋惜事體也近時舍人院草制有送潤筆物稍後時者必遣院子詣門催索而當送者往往不送相承既久今索者送者皆恬然不以為怪也學士朱衣雙引故事學士在內中院吏朱衣雙引太祖朝李昉為學士太宗在南衙朱衣一人前引而已昉亦去其一人至今如此學士入劄不著姓往時學士入劄不著姓但云學士臣某先朝盛度丁度並為學士遂著姓以别之其後遂皆著姓三館梁祖都汴庶事草創止明終始于今日長慶門東北創小屋數十間為三館湫隘尤甚又周廬微道咸出其旁衛士騶卒朝夕喧雜每受詔撰述皆移他所至太平興國中車駕臨幸顧左右曰若此卑陋何以待天下之賢俊哉即日詔有司規度左升龍門東北居府地為三館命內臣督役晨夜兼作不日而成尋下詔賜名崇文院以東廊為昭文館書事南廊為集賢院書庫西廊入經史子集四部為史館書庫凡六庫書籍正副本僅入萬卷斯為盛也昭文館本前世𢎞文館建隆中以其犯宣祖廟諱改焉淳化初以呂祐之趙安德裕勾中正並直昭文館則本朝直昭文館自呂祐之等始也集賢有直院有校理端拱初以李宗諤為集賢校理淳化初以和㠓為集賢院則本朝直集賢校理自和㠓李宗諤始也史館有直館有修撰有編修有校勘有檢討太平興國中趙鄰幾呂蒙正皆為直史館掌修撰而楊文舉為史館編修是時修撰未列于職至至道中始以李若拙為史館修撰雍熙中以宋炎為史館校勘淳化中以郭延澤董元亨為史館檢討則本朝直史館編修史館修撰史館檢討史館校勘自趙鄰幾呂蒙正李若拙楊文舉宋炎郭延澤董元亨等始也本朝三館之外復有祕閣圖書置直閣文置校理咸平初以杜鎬為祕閣校理皆自杜鎬始也三館名目所謂崇文館史館集賢院建隆元年二月避諱字詔易名昭文館端拱元年五月詔直祕閣于崇文院之中堂學士賜帶不佩魚國朝之制自學士以上賜金帶者例不佩魚若奉使契丹及伴北使則佩事已復去之惟兩府之臣則賜佩謂之重金得學士體仁宗初立今上為太子令中書召學士草詔學士王圭當直詔至中書諭之曰王此大事也必須面奉聖旨于是求對明白面稟得旨草詔羣公皆以王為真得學士體也咨報唐人奏事非表非狀者謂之榜子亦謂之録子今謂之劄子凡羣臣百司上殿奏事兩制已上非時有所奏陳皆用劄子中書樞密院事有不降宣敕者亦用劄子與兩府自相往來亦然若有司申中書皆用狀惟學士院用咨報其實如劄子亦不出名但當直學士一人押字而已謂之咨報今俗所謂草書名謂押字此唐學士舊規也唐世學士院故事近時隳廢殆盡惟此一事在耳學士日益自卑往時學士循唐故事見宰相不具靴笏繫鞋坐玉堂上遣院吏計會堂頭直官學士將至宰相出迎近時學士始具靴笏至中書與常參官雜坐于客位有移時不得見者學士日益自卑丞相禮亦漸薄蓋習見已久恬然不復為怪也翰林院故事唐翰林院學士中乃人主燕居之所玉堂承明金鑾皆在其間應供奉之人自學士以下工伎郡官司𨽻籍其間者皆稱翰林如今之翰林監官翰林待詔之類是也惟翰林茶酒司正稱翰林司蓋相承關文唐制宰相而下初命皆無宣召之禮惟學士宣召蓋學士院在禁中非內臣宣召無因得入故院門别設復門亦以其通禁庭也又學士院北扉者為其在玉堂之南便於應召今學士初拜自東華門入至左承天門下馬待詔院吏自左承天門雙引聖閣門此亦用唐故事也唐宣召學士自東門入者彼時學士院在西掖故自翰林院東門赴召非若今東華門也至今撓鈴故事亦緣其在禁中雖學士院吏亦止于玉堂門外則其嚴密可知如今學士院在外與諸司無異亦設鈴索悉皆文其故事而已歸田録二學士院玉堂太宗皇帝曾親幸至今惟學士上日許正坐他日皆不敢獨坐故事堂中設視草臺每草制則具衣冠據臺而坐今不復如此但存空臺而已玉堂東承旨閣子窗格上有火燃處太宗嘗夜幸玉堂蘇易簡為學士已寢遽起無燭具衣冠宮嬪自窗格引燭入照之至今不欲更易以為玉堂一盛事學士躡履見丞相衣冠故事多無著令但相承為例耳如學士舍人躡履見丞相往還祇用平狀扣階乘馬之類皆用故事也近嵗多用靴簡章子厚為學士日因論列事例今則遂為著令矣槐廳學士院第三廳學士閣當前有一巨槐素號槐廳舊傳居此閣者多至入相學士爭槐廳至有抵徹前人行李而強據之者豫為學士時日觀此事學士上日用樂舊制翰林學士地勢清切皆不兼他務文館職任自校理以上皆有職田惟內外制不給楊大年久為學士家貧請外表詞千餘言其間兩聨曰虛忝甘泉之從臣終作莫敖之餒鬼從者之病莫興方朔之飢欲死京師百官上日惟翰林學士敕設用樂他雖宰相亦無此禮優伶並開封府點集陳和叔除學士時和叔知開封府遂不用女優學士院敕設不用女優自和叔始罷潤筆內外制凡草制除官自給諫待制以上皆有潤筆物太宗時立潤筆錢數降詔刻石于舍人院每除官則移文督之在院官下至吏人院騶皆分霑元豐中改立官制內外制皆有添給罷潤筆物直院唐制官序未至而以他官權攝者為直官如許敬宗為直記室是也國朝學士舍人皆置直院熙寧中復置直舍人學士院他以資淺者為之其實正官也熙寧六年舍人皆遷罷閣下無人乃以章子平權知制誥而不除直院者以其暫攝也古人兼官多是暫時攝領有長兼者即同正官豫家藏海陵王墓志謝朓文稱兼中書侍郎出筆談制書不可稱德音本朝之制凡霑宥大赦曲赦德音三種自分等差宗衮言德音非可名制書乃臣下奉行制書之名天子自謂德音非也余按唐常衮集赦令一門總謂之德音蓋得之矣退朝録學士職任事體與外司不同先公嘗言翰林學士居深嚴之地職任事體與外司不同至于謁見相府自非朔望慶弔止公服繫鞋而已學士於內庭出入或應詔亦不具靴簡若同列齊行前此命朱衣吏雙引抗聲言學士來直至室門方止歸院則朱衣吏遞聲呼學士來者數四故事學士敘班只在宰相後今之參知政事班位即舊日學士立班處也近日以來會赴內殿起居敘班在樞密宣徽使後惟大朝會入閣聖節上夀始得級台司步武為吾曰延州歸關再奉內職與朱崖盧相同列依舊命吏前後雙引既而盧謂吾曰今府尹令尹時皇上開封府尹兼中書令親賢英傑復兼在相尚以一朱衣前導吾儕為學士而命吏雙引得毋格物議乎因而全罷雙引自是抗聲傳呼之儀後亦稍罷矣退朝録學士班次學士班舊制雖遺補府參軍亦在丞郎之上建隆中陶穀任學士自以官至尚書因上言學士官未至丞郎者並敘于丞郎之下至丞郎者在左右常侍之上至尚書者從本品序從之淳化五年六月詔曰翰林樞密直學士職參內直禮絶外司况品秩以既殊在等威而益峻頃有所易深未便安宜申明于舊章用遵行于故事自今敘立班位宜依舊在丞郎之上舊規云學士大慶賀大朝會並列于宰相之後今分付凡立在親王使相之後坐即居左重行於參知政事之後國朝侍讀侍講皆帶翰林之名在密直學士之上又置龍圖閣亦在密直學士之上龍圖閣直學士即在密直學士之下立班坐位並少退二舊制端明殿學士必於翰林中久任者遷授後改為文明殿學士皇朝惟李昉為之資政殿學士真宗特置此官以王欽若罷參知政事優禮之也時執政奏班次學士之下上不悅月餘授欽若兵部侍郎充資政殿學士班在翰林之上天禧初張知白自參知政事罷為侍讀學士以兩府舊臣詔特升在學士之上三學士入院舊不以職之高下惟以先後為班以乾德元年十一月工部尚書竇儀為學士詔議儀班次承旨陶穀天禧四年四月楊億再入翰林詔億班在錢惟演之下盛度之上惟演奏讓云竊見太祖朝竇儀自工部尚書再入翰林班在舊學士之上太宗朝王旦以禮部侍郎再知制誥在呂祐之上况楊億在景德中已為學士今來官位與臣並是丞郎伏乞聖慈特升楊億班在臣之上遂降詔從之故億謝表云緣篤相先之義俄頒得請之文學士罷晚朝舊規學士當直則趂晚朝不當直即無逐日起居國朝之制並早赴內朝而罷晚朝矣或知審官三班及判流內銓者三五日一詣承明稟奏公事即俟上再坐也舊制謂之諸司散今謂諸司公事退也已上出金坡遺事直學士院開寶二年李文公以中書舍人盧相以知制誥並命直學士院六年知制誥張公淡權直學士院太平興國元年湯率更悅徐騎省鉉直學士院王梓州克政張侍郎洎直舍人院四人皆江南文士也熙寧二年復制舊館韓丕不長應用出院韓丕有清操頗能為詩及入禁中不甚長於應用一夕須詔書甚急韓停筆既久問吏索舊草吏以本典直户出宿不可搜檢丕乃破鎖取之改易而進丕越月遂出院學士之職清切貴重淳化四年五月命張洎錢若水為學士赴之日太宗謂近臣曰學士之職清要貴重非他官可比朕常重此官故事學士赴上有敕入殿㺯獼猴之戲久罷其事然亦非宜令教坊有雜伎跳丸舞矟之類今當設之仍詔樞密直學士呂端劉昌言及知制誥紫宸預會自此學士知制密學赴會承印給諫不得預也太祖命李昉李文正公昉開寶中為中書舍人時盧多遜為兵部員外知制誥會學士闕人太祖並命更直禁林未幾昉請疾假多遜先為學士及九月九日宴大明殿太祖見昉坐於多遜之下怪而問之執政言多遜已為學士昉是更直太祖坐閣命為學士又以昉之舊德坐於多遜之上自開寶五年昉也出金坡遺事儤直例學士初入儤直例淳化二年刻石合礱于三堂復東瓦壁諸行尚書三十五直左右承郎四十直常侍諫議給事四十五直諸官知制誥五十直如諫議知印四十五直太常少卿諸行郎中五十五直諸行員外起居侍御史六十直殿中司諫六十五直未升朝一百二十直白身一百四十五直前賀各加五直初入轉官二直已後每轉一直改服色一直如知制誥二直已上俱本直便儤一日每新人入五直舊學士一點次三直一點後兩直一點亦須酌量如大儤直日數以定三等多少如兩人齊入則不點如舊官再入納計前直減半二楊巨舊規交宿吏云新人常早入舊人即輪一巡早入闕已後即晚入人待交早入人常先出早入卯時晚入趂早堂國朝學士每日趂朝故皆早入學士惟單直故無早入之事試館閣知制誥等試京官及草澤等每試人前一日學士聚廳共撰詩賦論各五題封進明日早降出有御筆點定者用之自朝直館閣京官州縣官草澤皆院中試之惟試知制誥即在中書禁門將開門三五刻下直學士即出如試未了即為拖白矣或詔兩院同試即舍人並過院其日必盛饌置酒勸飲至暮也天禧四年六月詔每遇試人令翰林御厨供酒食册皇太子舊規云唐世册皇太子學士並就班賀禮畢又上表賀並上皇太子學士就出班賀禮畢又上表賀並上皇太子箋天禧四年九月今上為皇太子學士朝公等並用此禮學士新入院舊規云學士新入院飛龍賜馬一匹鞍轡及芻粟謂之長借今則賜馬並鞍轡續翰志云舊賜白成釘口鞍太宗改賜銀閙裝又改居要職帶為金荔枝舊規云後兩三日內令就院置宴金率以上日便賜宴舊規云十月初别賜錦長襖子國初已來賜翠毛錦淳化中蘇易簡入院改賜黃盤雕輿觀察使同其諸賜賚古今小異者皆具在李武昌翰林雜記矣事實類苑卷二十九

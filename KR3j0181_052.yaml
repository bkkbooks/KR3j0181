body:
  text: 事實類苑卷五十二宋江少虞撰書畫技藝太祖賜翰林院書畫太祖平江南賜本院書三千卷皆紙札精妙多先唐舊書亦有是徐鍇手校者其後散失過半惟演再入院編排得千餘卷而不成部帙其三史三國志晉書即是朝逈李宗諤在院時奏請其書即署部帙二太祖平江南所得圖畫賜本院初有五十餘軸及景德咸平中只有雨村牧牛圖三軸無名寒蘆野鴨三軸徐熙筆五王飲酪圖二軸周文舉筆亦令重裝背焉見金坡遺事祕閣藏書端拱元年以崇文院之闕常置祕閣命吏部侍郎李志兼祕書提點并御圖書選三館書本正萬卷實之置直祕閣及校理之職命至擇其人奏置吏以內侍監之其外省自𨽻百司祕閣列於集賢之下寫御書及百餘卷即祕監以奉進御退藏於祕閣內居從中降圖畫及前賢李王迹數千軸以藏之淳化中始造閣成上飛白書額親幸召近臣縱視圖籍賜宴又以供奉僧元藹所寫御容二軸藏於閣見楊文公談苑置御書院翰林學士院自五代以來兵難相繼待詔軍習王書以院體相傳字勢輕弱筆體無法凡詔令刻石皆不足觀太宗留心筆札即位之後募求善書許自言於公車置御書院首得蜀人王著以士人任簿尉即召為御書院祇候遷翰林侍書著善草𨽻獨步一時取智永禪師真草千字文缺數百字著補之刻石但見形範而無神妙世亦寶重之修東嶽廟立碑命著書著時仕著作佐郎辭以官卑不題刻即日遷著作郎時吕文仲為翰林侍讀與著更侍禁中太宗每歲九月後至暮夜即召宿直侍書及待詔書藝於東門北偏小殿內張燭令對御書字或問以外事常至一夜而罷著善大書其筆甚大全用徑毫號散卓筆市中鬻者一管百錢初以紙一畨令書八字又一畨分書六字又一畨書四字又一畨兩字又一畨一字皆極於遒徑上稱善厚賞之著後官至殿中侍御史賜金紫太平興國中選善書者七人補翰林待詔各賜緋銀魚袋十枚並兼御書院祗候更配宿兩院餘者以次補外官自是內著書詔筆體一變燦然可觀人用傳寶逺追唐室矣見楊文公談苑祕閣畫太宗皇帝淳化元年八月內出古畫墨迹百一十四軸藏之閣上有唐太宗明皇晉王羲之獻之庾亮梁蕭子雲唐歐陽詢顔真卿桞公權懷素懷仁墨迹顧愷之畫維摩詰像韓幹馬薛稷鶴戴嵩牛及近代東丹王李贊華千角鹿西蜀黃筌白兔一時之妙也今懷仁墨迹維摩詰像韓馬薛鶴皆不存考之積年舊籍亦不復載大中祥符八年榮王宫火延燒祕閣然則書畫豈亦有亡逸耶祕書省請以祕閣所藏墨迹未經太宗廟摹刻者刋於中有旨從之至建中靖國元年四月二十二日內出緡錢十五萬趣其工以八月旦日畢釐十卷上之東丹王名突欲阿保機之長子也唐同光中從其父攻渤海扶餘城下之改為東丹國以突欲為東丹王保機死其母立其次子突數欲自以失位且畏逼遂歸中國唐明宗賜姓李氏名贊華出鎮滑州贊華尤工畫歸朝載書數千卷自隨亦能為五言詩其子尤欲亦善丹青千角鹿出塞外觀其所畫誠妙筆也五星二十八宿真形圖卷首題梁令瓉姓名而以箕宿為風星蓋避明皇諱也此雖不知畫者為誰要是唐人妙筆耳然經星惟有十二宿初疑亡去其餘徐觀其用筆次第所畫至是而止耳昔吳道子畫壁下筆未盡處後之人終莫能繼豈妙於藝者當嗇其巧而不欲盡耶傅古龍用筆簡徑雖柝縑敗裂而神氣活動曽不少虧牧羊圖品格灑落皆妙作也比於下庫故畫中得之因加整治藏之閣上牧羊圖乃曽氏子以罪籍沒然驗其印記蓋太平興國初禁印所蓄畫也不知外人何自得之千角鹿五星二十八宿真形圖傅古龍牧羊圖崇寧四年八月有旨取入內留之見蓬山志太宗碁品第一太宗碁品至第一待詔有賈玄者臻於絶格時人以為王積薪之比也楊希紫蔣元吉李應昌朱懷璧亦皆國手然非玄之敵玄嗜酒病死上痛惜之末年得洪州人李仲玄年甚少而碁格絶勝可侔於玄歲餘亦卒朝臣有潘慎修蔣居才亦善碁至三品內侍陳好玄至第四品多得侍碁自玄而下皆受三道慎修受四道好玄受五道慎修常獻詩云如今樂得仙翁術也怯君王四路饒又作碁説千餘言以獻上嘉歎之皆涉治道見楊文公談苑撥鐙法錢鄧州若水嘗言古之善書鮮有得筆法者唐陸希聲得之凡五字擫押鈎格抵用筆雙鈎則點畫遒徑而益妙矣謂之撥鐙法希聲自言昔二王皆傳此法自斯公以至陽氷亦傳之希聲以受沙門辨光入長安為翰林供奉希聲未逹以詩寄辨光曰筆下龍蛇似有神天池雷雨變逡巡寄言昔日不龜手應念江頭洴澼人辨光感其言因引薦希聲於貴幸至宰相刁衎言江南後主得此法書絶徑復增二字曰導送今待詔尹熙古亦得之而所書為時之絶李無惑工篆亦得其法查道始習篆患其體勢柔弱熙古教以此法仍用雙鈎用筆經半年始習熟而篆體勢徑直甚佳墨仁宗嘉祐中宴次羣臣於羣玉殿嘗以其墨賜之曰新安香墨其後翰林諸君承賜者皆廷圭雙脊龍尤為佳品出澠水燕談草書凡章草小草點畫皆有法不可率意輒書近年李君簡善草書太宗甚愛之以贊善大夫直御書院王詞宗亦習而不能精諺云信速不及草書家貧不辨素食言其難卒置也然小草尤難僧喜書近年釋子中多善書者廬山僧皓彬茂蔣善王書關右僧夢貞善桞書浙東僧苑基善顔書多寫碑石印板皆不下前輩壽春僧惠崇善王書又其次張維公言張維者蜀人也為沙門後反初尤善王書絶得懷素之骨世鮮能及之王嗣宗曽薦於今上召試御書院維自負其能少所可意於院內環視諸人所書不覺微笑衆怒共排之止得𨽻祕閣為稽書不就景德末扈駕謁陵還經鄭州從幸開元寺觀新塔僧前揖言聞公深信內典願為之碑因諾之後為撰碑維為真書一時之絶也維貧薄甚後寄死人家縉雲醖匠縉雲𣙜置一匠善醞經手者罔不醇美嘗令寫其方俾建安酒家造之味不佳因召匠詰傳方之謬匠曰方盡於是矣然其酘漿隨天氣溫炎寒涼量多少之數均冷暖之節攬勻洽嘗味體測此不可口授但能心曉耳家二子亦不能傳其要此亦莊子斫輪之意也見楊文公談苑王舍城寺璧北都臨清縣北有王舍城僧寺東一古殿皆吳生畫佛像旁有題記類禇河南筆法國朝已來奉使大僚皆道出寺下例往觀之題名粉板或則取一二像今且盡矣祕府書畫祕府書畫豫盡得觀之二王真迹內三兩卷有陶榖尚書跋尾者尤竒其畫梁令瓉二十八宿真形圖李思訓著色山水韓闕水牛東丹王千角鹿其江南徐熙暨蜀黃筌父子畫筆甚多畫三朝聖迹皇佑中仁宗命待詔髙堯明輩盡出三朝聖迹一百事人物才寸餘宫殿山川車馬儀衛咸具詔學士李淑等闕壽聖寺畫壁王鉷據陜州聚天下良工畫壽聖寺壁為一時妙絶畫凡二十八人皆殺之同為一坎瘞於寺西廂使天下不復有此筆其不道如此至今尚有十餘堵其間西廊迎佛舍利東院佛母壁最竒妙神彩皆欲飛動又有鬼母瘐佛二壁差次其餘亦不甚過人摹字世之摹字者多為筆勢牽掣失其舊迹惟當橫摹之泛然不問其點畫惟舊迹是循然後盡其妙也散草𨽻古人以散筆作𨽻書謂之散𨽻近歲蔡君謨又以散筆作草書謂之散草或曰飛草其法皆生於飛白亦自成一家見筆談畫廳淳化甲午李順亂蜀張乖崖平之偽蜀僣侈其宫室規模皆王建孟知祥乘其弊而為之公至則盡損之如列郡之式郡有西樓前有堂廳屏乃黃筌畫雙鶴花竹怪石甚衆名曰雙鶴廳南壁有黃氏畫湖灘山水雙鷺二般畫妙格冠於兩川賊鋒既平公自壞屋盡置畫為一堂名曰畫廳見湘山野録辨畫絹唐彥猷侍讀詢弟彥範詔俱擅一時才雅之譽彥猷知書好古彥範文章氣格髙簡不屈疏秀比六朝人物尤精翰墨遣一小札必精致成妙品忽一客擕黃筌梨花卧鶴於花中斂羽合目其態逼真彥猷蓄畫最多開篋蜀之趙昌唐之崔彜數名花較之俱所不及題曰錦江釣叟黃荃筆彥猷賞其半因暫留齋中少玩其絹色晦淡酷類縑彥猷訝其圖角有巨印徐潤揭而窺之乃和買絹印彥範知世故大笑曰和買始於祥符初因王勉知穎州歲大飢出府錢十萬緡與民約曰來年蠶熟每貫輸一縑謂之和買自爾為例黃筌唐末人此後人矯為也遂還之不受其誣也書字肥瘦唐初書字得晉宋之風故以徑健相尚至禇薛則尤極瘦硬矣開元天寶已後變為肥厚至蘇靈芝輩幾於重濁故老杜詩云書貴瘦硬方通神雖其言為篆字而發亦似有激於當時也貞元元和已後柳沈之徒復尚清徑唐末五代字學大壞無足觀者其間王凝式國初李建中妙絶一時而行草結字亦主於肥厚至李昌武以書著名而不免於重濁故歐陽永叔評書曰書之肥者譬如厚皮饅頭食之未必不佳而世命之為俗物矣亦有激而云耳江南李後主鄙之曰真卿之書有楷法而無韻處正如義手並腳田舍漢耳見東軒筆録蜀人善畫者蜀有孫太古知微善畫山水仙官星辰人物其性髙介不娶隱於大靣山時時往來導江青城故二邑人家至今多藏其畫亦嘗畫於成都今壽寧院十二曜絶精妙有先君題記在焉又有李懷襄者成都人亦善山水又能為水石翎毛其嘗所居及寢處皆置筆雖夜中酒醒睡覺得意時急起畫於地或被上運指模寫之則丘壑悉如所為也又有趙昌者漢州人善畫花每朝晨露下時繞檻欄諦玩手中調彩色寫之自號寫生趙昌人謂趙昌畫染成不布彩色驗之者以手捫摸不為采色所隱乃真趙昌畫也其為生菜折枝果尤妙三人者平生至意精思一發為畫故其為士而能名於世又有王有者漢州卒也州將每令趙昌畫則遣有服事供應是以其畫遂亞於昌其為人亦清潔有巧思非卒之流輩也見東齋記事葉子格葉子格者自唐中世以後有之説者云因人有姓葉號子青者撰此格因以為名此説非也唐人藏書皆作卷軸其後有葉子其制似今策子凡文字有備檢用者卷軸難數卷舒故以葉子寫之如吳彩鸞唐韻李郃彩選之類是也骰子格本備檢用故亦以葉子寫之因以為名耳唐世士人宴聚盛行葉子格五代國初猶然後漸廢不傳今其格世或有之而人無知者惟昔楊大年好之仲待制簡大年門下客也故亦能之大年又取葉子歌名紅鶴皂鶴者别演為鶴格鄭宣徽戩章郇公得象皆大年門下客也故皆能之豫少時亦有此二格後失其本今絶無知者見歸田録投壺格司馬溫公既居洛每對客談詩賦文或投壺以娛賓公以舊格不合禮意更定新格以為傾邪險詖不足為法而舊圖為竒箭多與之算如倚干帶劍之類合皆廢其算以罰之顛倒反覆惡之大者奈何以為上如倒中之類今當盡廢舊列壺中之算以明逆順大扺以精密者為工偶中者為下使夫用機徼幸者無所措手此足以見公之志雖嬉戲之間不忘於正也澠水燕談張僧繇畫壁保定軍東北數里闕路噇一小寺殿後照壁舊有畫水世傳張僧繇筆勢若搖動真名手也熙寧初地震壁壞好事者或取一二段藏去今無復可見矣近時名畫近時名畫李成巨然山水包鼎虎趙昌花果成官至尚書郎其山水寒林往往人家有之巨然之筆惟學士院玉堂北壁獨存人間不復見也包氏宣州人也世以畫虎名家而鼎最為妙今子孫猶以畫虎為業而曾不得其倣佛也昌花寫生逼真而筆法軟俗殊無古人格致然時亦未有其比玉堂畫壁玉堂北壁舊有董羽畫水二堵筆力甚徑勢若動搖其下三尺頗有雨壞處蘇易簡為學士尤愛重之蘇適受詔知舉將入南宫語於同院韓丕使召工完葺之蘇既去韓不擇名手呼圬者汚墁其半而用采畫檻欄以承之蘇出見之悵恨纍日命水洗滌而痕迹至今尚在時人以蘇之鑒尚韓之純朴兩重焉金坡遺事君謨潤筆蔡君謨既為余書集古目録序刻石其字尤精徑為世所珍余以鼠鬚栗尾筆銅緑筆格大小龍茶惠山泉等物為潤筆君謨大笑以為太清而不俗後月餘有人遺豫以清泉香餅一篋者君謨聞之歎曰香餅來遲使我潤筆猶無此一種物兹又可笑也清泉地名香餅石炭也用以焚香一餅之大可終日不滅見廬陵居士歸田録王揵鍊金真宗朝有王揵者汀州長汀人少時薄遊江介至星子縣夜宿逆旅遇道士授黃白術未盡其要後再遇其人於茆山相擕至歷陽指示靈草又傳以和合密訣誠皆有驗仍别付靈方環劍絨縢之書戒曰非遇人君慎勿輕述揵後以徉狂犯禁配流嶺南時供奉官閣門祗候謝德權適總兵頗聞其異揵後竄歸闕下權乃館於私第鍊成藥銀上進真宗異之命𨽻軍籍使劉承圭詰其事揵以師戒甚嚴終不敢泄唯願見至尊面陳於是承圭乃為揵改名中政俾詣登聞始得召見即授揵許州散掾留止京師尋授神武將軍致仕仍給全俸遷髙州刺史康州團練使前後貢藥金銀纍巨萬數輝彩絶異不類世寶常時賜臣下天慶觀金寶牌即其所鑄金也然中政亦不敢妄賈唯周濟貧乏崇奉仙釋而已今汀州開元寺乃其施財所建也卒贈鎮南軍節度此近古所未有也見青箱雜録雪中芭蕉書畫之妙當以神會難可以形器求也世之觀畫者多能指摘其間形像位置采色瑕疵而已至於奧理冥造者罕見其人如彥如畫評言王維畫物多不問四時如畫花往往以桃杏芙蓉蓮花同畫一景豫家所藏摩詰畫袁安卧雪圖有雪中芭蕉此乃得心應手意到便成故其理入神迥得天意此難可與俗論也謝赫云衛協之畫雖不該備形妙而有氣韻凌跨羣雄曠代絶筆又歐陽文忠盤車圖詩云古畫畫意不畫彩梅詩詠物無隱情忘形得意知者寡不若見詩如見畫此真為識畫也黃梅出山圖王仲至閲吾家畫最愛王維畫黃梅出山圖蓋其所圖黃梅曹溪二人氣韻神檢皆如其為人讀二人事迹還觀所畫可以想見其人按樂圖國史譜言客有以按樂圖示王維維曰此霓裳第三疊第一拍也客未然之引工按曲乃信此好竒者為之凡畫奏樂止能畫一聲不過金石管絃同用一字耳何曲無此聲豈獨霓裳第三疊第一拍也或疑舞節及他舉動拍法中則有竒聲可驗此亦不然霓裳曲凡十三疊前六疊無拍至第七疊方謂之疊遍自此始有拍而舞作故白樂天詩云中序擘騞初入拍中序即第七疊也第三疊安得有拍但言第三疊第一拍即知其妄也或説嘗有人觀畫彈琴圖曰此彈廣陵散也此或可信廣陵散中有數聲異他曲如潑攦之類是也沈括論畫畫牛虎皆畫毛惟馬不畫豫嘗以問畫工工言馬毛細不可畫豫難之曰鼠毛更細何故却畫工不能對大凡畫馬其大不過盈尺此乃以大為小所以毛細而不可畫鼠乃如其大自當畫毛然牛毛亦是以大為小理亦應見毛但牛虎深毛馬淺毛理有别故名筆為小牛小虎雖毛但略拂拭而已若務詳密翻成冗長約略拂拭自有神觀迥然生動難可與俗人論也若畫馬如牛虎之大者理當畫毛蓋見小馬無毛遂亦不此庸人襲迹難可與論理也又李成畫山上亭館及樓塔之類皆仰畫飛簷其説以為自下望上如人平地望塔簷間見其榱桷此謬論也大抵山水之法大觀小如人觀假山耳若同真山之法以下望上只合見一重山豈可重重悉見兼且不應見其溪谷間事又如屋舍亦不應見中庭及後巷中事若人在東立則山西便合是逺境人在西立則山東却合是逺境似此如何成畫李君蓋不知以大觀小之法其間折髙折逺自有妙理豈在折屋角也畫工畫佛身光有匾圓如扇者身側則光亦側此大謬也渠但見雕本佛耳不知此光常圓也又有畫行佛光尾向後謂之順風光此亦謬也佛光乃定果之光雖劫風不可動豈常風能搖哉出筆談事實類苑卷五十二

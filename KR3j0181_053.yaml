body:
  text: 事實類苑卷五十三宋江少虞撰書畫技藝字訛古文自變𨽻其法已錯亂後轉為楷字愈益訛舛殆不可考如言有口為吳無口為天按字書吳字本從口從夬音捩非天字也此因近世謬從楷法言之至如兩漢篆文尚未廢亦有可疑者如漢帝以隱語召東方朔云先生來來解云來來棗也按棗字從束音刺不從來此或是後人所傳非當時語如卯金為劉貨泉為白水真人此出於緯書乃漢人之語按劉字從丣音酉從金如柳留駵皆從丣非卯字也貨從貝真乃從具亦非一體不知緣何如此字書與本史所記必有一誤也韓偓墨迹唐韓偓為詩極清麗有手寫詩百餘篇在其四世孫奕處偓天福中避地泉州之南安縣子孫遂家焉慶厯中豫過南安見奕出其手迹字極醇徑可愛後數年奕詣闕獻之以忠臣得司士參軍終於殿中丞又豫京師見偓送辨光上人詩亦墨迹也與此無異畫佛圓光名畫録吳道子嘗畫佛留其圓光當大會中對萬衆舉手一揮圓中運規觀者莫不驚呼畫象為之自有法但以肩倚壁盡臂揮之自然中規其筆畫之粗細則以一指拒壁以為凖自然均勻此無足竒道子妙處不在於此徒驚俗眼耳晉宋人墨迹晉宋人墨迹多是弔喪問疾書簡唐貞觀中搜求前世墨迹甚嚴非弔喪問疾書迹皆入內府士大夫家所存皆當日朝廷所不取者所以留傳至今鯉魚鱗鯉魚當脅一行三十六鱗鱗有黑文如十字故謂之鯉文從魚里者三百六十也然井田法即以三百步為一里恐四代之法容有不相襲者沈括論書豫從子遼喜學書嘗論曰書之神韻雖得之於心然法度必資講學嘗謂世之作字分制無法凡字有兩字三字四字合為一字者須字字可拆若筆畫多寡相近者須令大小均停所謂筆畫相近如殺字四字合為一當使五木几又四者大小皆均如步字乃二字合當使止與少二者大小長短皆均若筆畫多寡相逺即不可牽強使停寡在左則取上齊寡在右則取下齊如從口從金吟即取上齋扣則取下齊如從叔從又及從口從胃三字合者多寡不同則叔當取下齊喟當取上齊如此之類不可不知又曰運筆之時常使意在筆前此古人之良法也樂毅論王羲之書舊傳唯樂毅論乃羲之親筆書於石其他皆紙素所傳唐太宗裝取二王墨迹唯樂毅論石本在其後隨太宗入昭陵朱梁時耀州節度使溫韜發昭陵得之復傳人間或曰公主以偽本易之元不曽入壙本朝入髙紳學士家皇佑中紳之子髙安世為錢塘主簿樂毅論在其家豫嘗親見之時石已破缺末後獨有一海字者是也其家數十餘年安世在蘇州石已破缺為數片以鐡束之後安世死石不知所在或云蘇州一富家得之亦不復見今傳樂毅論皆摹夲也筆畫無復昔之清徑羲之小楷字於此殆絶遺教經之類皆非其比也霜花紙致政王侍郎子融言天聖中歸其鄉里青州時滕給事步為守盛冬濃霜屋瓦皆成百花之狀以紙摹之其家尚餘數幅王祁公家書畫王祁公家有晉諸賢墨迹唐相王廣湋所寶永存珍祕閣刻閻立本畫老子西升經唐人畫鎖圖王冀公家禇遂良書唐太宗帝京篇太宗見録束贊步輦圖錢文禧書畫最多有大令黃庭經李雍雜迹錢宣靖家王維草堂圖周安惠家王獻之洛神賦蘇侍郎家魏鄭公諫太宗圖楚樞密有江都王馬王尚書仲儀有回文織錦圖以上皆録見者近人有收漢相過沛圖者畫迹頗佳而有僧為觀者所指翌日並加僧以幅巾見退朝録李無惑李無惑同安人善小篆為翰林待詔自斯公陽氷之後未見其比徐鉉鄭文寶查道髙紳申牽葛端皆江東人善篆莫能及也其徑健端好又過於陽氷士大夫家藏之以為寶錢塘人吳皓供奉造筆尤妙世莫能及無惑愛之嘗藏數十百管語人曰皓死當絶筆無惑後為常參官宰邑歲常寄萬錢市大筆於皓無惑今已死其小篆固無能嗣之者僧擇仁永嘉僧擇仁善畫松其初遍求諸家畫松采其所長而學之有善畫松身者朽皮者布枝柯者畫針者根石者擇仁盡得其意一夕夢吞數百條龍自是遂臻於神妙絶嗜酒每醉揮墨於粉堵絹之上醒乃添補之千形萬狀極於竒怪曽飲酒永嘉市肆醉甚顧新泥壁取戒盤布濡墨灑其上來日少增修為狂根枯枿善畫者皆服其神董羽董左人善畫水太宗作端拱樓命羽四壁畫龍水羽極其精思凡半年而畢羽時為翰林藝學頗用意望恩賞太宗與宫中嬪御登樓皇子尚幼遙見畫壁驚畏呼哭不敢視亟令圬墁之羽卒不獲賞朱文濟朱文濟者金陵人善鼓琴為待詔性沖淡不好榮利専以絲桐自娛太宗令待詔蔡裔增琴為九絃阮為七絃文濟執意以為不可後蔡裔以為增之善太宗曰古琴五絃而文武增之今有何不可文濟曰五絃尚有遺音兹以二絃實無所關上怒斥出從裔增琴阮絃令文濟撫之辭以不能上愈怒靣賜蔡裔緋衣文濟班衣上獨衣緑欲以此激之又遣裔使劍南兩川獲千緍裔甚富足而文濟受貧困殊不以為念上又嘗置新琴阮於前令撫之旁設緋衣金帛賞賚物以動其意文濟終守前説上令文濟及裔齎琴阮遣中使押送相府召近臣同聽文濟不得已取琴中七絃撫之丞相問曰此新曲何名文濟曰古曲風入松也上嘉其有終亦賜緋衣濟風骨清秀若神仙中人上令供奉僧元藹寫其真留禁中李成營丘李成字咸熙磊落不羈喜酒善琴好為歌詩而尤善畫山水周樞密使王朴與之友善召至京師將以處士薦之會朴卒乾德中陳守大司農衛融以鄉里之舊延之郡齋日恣飲死於酒子覺仕至國子博士直史館贈成光祿丞葬於浚儀之魏陵鄉宋翰林由為之志成畫平逺寒林前所未有氣韻瀟灑煙林清曠筆勢脫穎墨法精絶髙妙入神古今一人真畫家百世師也雖闕柏王繼李思訓之徒亦不可同日而語其後燕文貴翟院深許道寧輩或僅得一體語全則逺矣考白所作成志則成未嘗仕也而歐陽文忠公以為成仕至尚書郎按白與成同時人又與成子覺同列於朝其所紀宜不妄又不知文公以何為據也正當以志為當翟院深翟院深營丘伶人師李成山水頗得其體一日府宴張樂院深擊鼓為節忽停撾仰望鼓聲不續左右驚愕太守問之對曰適樂作以有孤雲橫飛淡行可愛意欲圖寫凝思久之不知鼓聲之失節也太守笑而釋之歐陽文忠公歐陽文忠公文章道義天下宗師凡世俗所嗜無一留意獨好古石刻自岐陽之鼓岱山鄒嶧之篆下及漢魏以來碑刻山崖川谷荒林破冢莫不皆取以為集古録因具石木軸而藏之撮其大要别為目録并載可以正史學之闕謬者以傳後學跋尾多公自題復為之序請蔡君謨書之真一代絶筆也公之守亳余主蒙城簿嘗得閲之孔仁讓杭州有雕木匠孔仁讓一時之絶手嘗於杭州菩提寺造千手千眼大悲觀音像既相度置千手不能盡凡數日沉思如醉一夕沙門語之曰何不分形於寶熖之上仁讓豁然大寤如其置列焉特為竒妙後又於明州開化造一軀如其法千手之制取於襄州畫像凡五百手各執物器五百手結印本神迹也事實類苑卷五十三

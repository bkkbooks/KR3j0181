body:
  text: 事實類苑卷四十七宋江少虞撰休祥夢兆苗訓苗訓仕周為殿前散員學星術于王慶納訓從太祖北征慶納預語訓曰庚申嵗初太陽躔亢在亢於德剛其獸乃龍恐與太陽並駕若果然則聖人利見之期也至庚申嵗旦太陽之上復有一日衆皆謂目眩以油盆俯窺果有兩日相磨蕩即太祖陳橋起聖之時也幼夢持鏡照天列宿滿中割股納之遂通星緯之學闕太祖即位樞密使王朴建隆二年辛酉嵗撰金雞厯以獻上嘉納之改名曰應天厯御製厯序慶納謂所知曰此厯更二十年方見其差闕吾不得預焉興國六年辛酉吳昭素直司天監果上言應天厯大差太宗詔修之太祖善望氣一嵗晚春幸金明回蹕至州北合歡拱聖營雨大下時有司拱闕無兩仗因駐蹕轅門以避之謂左右曰此營他日當出節度使兩人蓋二夏昆仲守恩守贇在營方闕後侍真宗於藩邸當龍飛二公俱崇高後守恩為節度使守贇知樞密院事周克明景德三年有巨星於天氐之西光芒如金丸無有識者春官正周克明言按天文録荆州占其星名周伯語曰其色金黃其光煌煌所見之國太平而昌又按元命苞曰此星一曰德星不時而出時方朝野多歡六合平定鑾輿澶淵凱旋萬民富足賦斂無橫宜此星之見也克明本進士獻文於朝召試中書賜及第畢文簡真宗尹京畢士安為府判沉毅忠厚中書將有簽除太宗令朝臣厯選不稱旨而李沆必欲用寇公上曰準少年進用才鋭氣浮為朕選河朔有重德稀姓者處其中而鎮之近臣少諭其意方以畢公進之上果喜遂用參大政時利用為樞相寇曹二人者一時酒後往往凌詬於席公處其間嘗溫容以平之不踰月與寇俱平章事嵗餘果負重望太宗謂李沆曰朕固欲相士安者頃夢類數神人擁一紫綬者令拜朕曰非久當相陛下夢中嘗熟視之乃士安也見玉壺清話鞏彥輔長沙北禪經室中懸觀音印像一軸下有文乃故待制王元澤撰鏤板者乃邵倅關蔚宗其文曰都官鞏彥輔郎中嘗魘云初夢兩緋衣召入大府嚴甚有紫衣當案者此王也堂廡下授以沙盆剔囚目使研之餘斷腕截耳不可數或恐懼失便溺少頃一官至呵鞏解衣鞏云下官無罪官怒曰此治殺生獄豈問官耶鞏窘呼觀音囚者皆和而殘者完繫者釋俱出鞏亦出乃蘇余友吳居易與鞏同官開封府性朴直不局於獄以故或忤在勢者云朱正基寶元元年朱正基駕部知峽州即江陵內翰昻之子一夕夢一吏自云城隍神遣某督修夷陵縣廨宇願速葺不宜後時朱不甚為意連三夕夢之方少異焉因語同僚亦未盡異之然亦未知修葺明日報至歐陽永叔謫授夷陵報吏云已及荆門朱感其夢待之特異將入境率僚屬逺郊迓之歐公臨邑亦以遷謫自處益事謙謹稟皆斂板于庭州將常伺之候入門先抱笏降于階至滿任不改前容歐公親語其事於其孫集賢朱初平學士焉見玉壺清話張乖崖乖崖公太平興國三年科場試筆陳成風賦蓋太宗明年將有河東之幸公賦有乘城卧鼓豈煩師旅之威雷動風行舉順乾坤之德自謂擅場欲奪大魁夫何有司以對偶失題因黜之選胡旦為狀元公憤然毁裂儒服欲學陳希夷搏闕豹林谷以弟子事之決無仕志希夷有風鑒一見之謂曰子當為貴公卿一生辛苦譬猶人家張筵方笙歌鼎沸忽中庖火起坐客無奈惟賴子滅之然祿在後年此地非棲憩之所乖崖堅乞入道陳曰子性度明躁安可學道果後二年及第於蘇易簡榜中希夷以詩遺之曰征吳入蜀是尋常鼎沸笙歌救火忙乞得江南佳麗地却應多謝腦邊瘡初不甚曉後果兩入蜀定王均李順之亂又急移餘杭有左道僧紹倫妖蠱之公至則平定此征吳入蜀之驗也纍乞間地朝廷終不允因腦邊瘡乞金陵養疾方許之二張乖崖成都召還臨行封一紙付僧文鑒大師者上題云請於乙卯嵗五月二十一日開後至祥符八年當是嵗也時凌侍郎知成都府文鑒至是日特見凌公曰先尚書向以此屬某已若干年不知何物也乞公開之洎開乃所畫野服攜笻黃短褐一小真也凌公奇之於大慈寺閣龕以祠焉蓋公祥符七年甲寅五月二十一日薨開真之日當小祥也公以劔外鐵緡輜重設質劑之法一交一緡以三年一界換之始祥符辛亥今熙寧丙辰六十一載計已二十二界矣雖極智者不可改王慶之僕射相國王公至道丙申嵗為闕因逃闕因飢而流亡者闕千户力謀安集疏奏乞貸闕糧懇訴甚闕朝廷悉可之一夕次蒙城驛舍夢中有人召公出拜空中紫綬象簡者貌度凝重如牧守赴任之儀遣一綵衣童謂公曰以汝有憂民心上帝嘉之賜此童為宰相子受訖即寤殆曉憩食於椘靈王廟作詩志於壁是夕夫人亦有祥兆而娠焉後果生一子即慶之是也器格清粹天與文性未十嵗公以貴蔭為奉禮郎恥門調止稱進士或號棲神子性喜談紫府丹臺間事有木詩不逢星漢使誰識是靈槎祥符壬子嵗謂所親曰上元夫人命我為玉童只為吾父未受相印受則吾去矣不數日公大拜慶之已疾公憶丙申之夢默不敢言不踰月慶之卒年十七真宗聞其才矜恤甚命尚官就宅加贈襚詔賜進士及第焚詔於室張密學張密學秉知冀州一日巨盜劫民之財復亂其女賊敗得贓將就戮其被盜父母以不幸之甚泣訴於公公忿極俾設架釘其手足三日醢之議者頗快焉後旬年忽痁疾一日方午劇發夢中便至宅忽宣公力疾促轡至禁門中人引至便殿疑曰爭得非法殺人公認其聲乃真宗也不知其端不敢奏辨斯須又曰張秉爭得非法殺人公方奏曰臣束髮入仕謹遵憲章豈止下筆極典雖一笞朴亦覆核精審上曰卿自與本人對辨引于殿西南隅啓一獄扉囚繫萬狀始悟非人世也引出一罪人血肉淋漓股節星散泣訴於公曰汝用非法殺我肢體零散奈何永無受托之所公方認冀賊也詬之曰汝所犯豈止一死耶縻萬軀亦不足塞其父母恥敢將更有訴乎旁有一胥容服謹嚴視之乃秉從事河陽日一幕客遇公甚勤低容曰五刑自有常典亦不得禁其訴公曰其將奈何吏曰幸公之算未盡暫迷誤至此耳但遣俾之托生可却還公怖甚窘叩其遣之術於吏曰吾念與子有河陽之舊吏曰功力之大無如法華經公但志誠誦之公連許歸召僧誦百部以至添及千部囚亦不舍公愈怖吏又曰不必多為其持誦之法但貴長久日請一僧誦一部許終其身乃可遣公如其説許之果沒不見殆三曰神方還始覺乃日召一僧誦一部至薨未嘗一日廢闕錢惟治錢惟治字和世初鎮四明常夢神人披金甲自稱西嶽神謂公面有凹文即壅土培之後領華州節鉞二十年王處訥太宗欲知古高僧事贊寧撰僧史略十卷進呈充史館編修夀八十四太監王處訥推其命孤薄不佳如三命星禽星祿仕遁俱無夀貴之處謂寧曰師生時所異者止得天貴星臨門必有烈士侯王在戶否寧曰母常謂某曰汝生時方卧草錢文穆王元瓘往臨安拜塋至門雨作避於茅簷甚久殆浣浴襁籍畢徘徊方去見湘山野録二王處訥洛陽人少時有老叟至其家煮洛河石為麵以食之又常夢人持巨鑒衆星燦然剖其腹納之後遂通星厯之學特臻其妙依漢祖于太原開國初為尚書博士判司天監事周祖素與處訥善至舉兵向闕以物色求之得之甚喜因言及劉氏祚短事處訥曰漢氏厯數悠逺蓋即位之後專以復讎殺人及夷人之族結怨天下所以社稷不得長久周祖蹶然歎息適以兵圍蘇逢吉劉銖餘悉全活國初歷司農少卿進拜司天監有子熙元今為司天少監見楊文公談苑陳洪進陳洪進與張漢思為劉從效左右將有沙門行雲者若狂人自福州來見洪進供僧有禮行雲語洪進曰汝當為山河主不出此嵗我且歸長樂秋後至此時建隆二年也是春從效卒子紹鎡典留務至秋洪進誣紹鎡附吳越執送金陵漢思為留後自為副使漢思老且懦洪進實專郡政行雲果來謂洪進曰凡世報前定但人有千錢之祿不可以圖之况將相之位豈能力取今劉公多疑人前後誅殺甚衆王者不死豈能害君哉當須坦然任運他日善終牖下子孫蕃盛茍懷疑殺人蒙不善之報鮮克令終矣洪進後廢漢思幽於别墅諸子屢勸除之終不許漢思竟以夀終行雲秃首而不衣僧服常服紫皂衫束𢃄懸銀魚為飾館於州廨十餘年忽謂人曰陳氏當有五侯之象去此五年後有戎馬千萬衆前歌後舞而入此城喜而不怒未知何故也懇求出舍外宅洪進次子文灝收漳州將歸寧行雲曰吾不及見矣遂沐浴整衣而逝語館人曰過三日乃得棺斂明日文灝至亟哭之行雲遂起坐執手談至暮乃入滅泉人疑所管二州何以容五侯當克取汀建以自益耳後洪進來朝獻其地改鎮徐州文灝通州團練使文闕文顗文􅖰三人並授諸州刺史是為五候王師入城來索作笳鼓為樂悉如其言洪進感行雲之言帥衆十六年未嘗妄殺人有犯極刑而情可恕者多貸其死危序鄉人危序應舉探省榜出門數步即逢泥濘躊躇未前有老媪指示曰秀才可低處過危即從之比看榜最末有名是嵗果及第此與托言所載後來者必得事相類韓魏公韓稚圭侍中知秦州日卧病數日冥冥無所知倐然而蘇語左右曰適夢以手捧天者再不覺驚寤其後拔英宗于藩邸戴神宗于春宫捧天之祥已兆於慶厯中因知賢臣之勳業非偶然而致也夏文莊公夏文莊公謫守黃州時龎穎公為郡掾文莊識之異禮優待而龎嘗有疾以為不起遂屬文莊後事文莊親臨之曰異日當為貧宰相亦有年夀疾非所憂龎詰之曰巳為宰相豈得貧耶文莊曰但於一等人中為貧耳故龎公晚年退老作詩述其事曰田園貧宰相圖史富書生為是故也見青箱雜記二文莊守安州宋莒公兄弟尚皆布衣文莊亦異待命作落花詩莒公一聯云漢臯佩冷臨江失金谷樓危到地香子京一聯云將飛更作回風舞已落猶成半面妝是嵗詔下兄弟將應舉文莊曰詠落花而不言落大宋君須作狀元及第又風骨秀重異日作宰相小宋君非所及然亦須登嚴近後皆如其言故文莊在河陽聞莒公登庸以别紙賀曰所喜者昔年安陸已識台光蓋謂是也青箱雜記趙世長俚諺云趙老送燈臺一去不復來不知是何等語雖士大夫往往道之天聖中有尚書郎趙世長者嘗以滑稽自負其老也求為西京留臺御史有輕薄子送以詩云此回真是送燈臺世長深惡之亦以不能酬酢為恨其後竟卒於留臺也見廬陵居士歸田録張客省張客省退夫自言應舉時因醉乘驢過市誤觸倒雜賣擔子其人喧爭不已視擔中只有樂記疏一册送五十錢市之其人乃去張初不攜文籍而行過醉醒止閲所買樂記疏無何省試黃為樂之末節論獨樂記為詳論擅場南省高等明年擢甲第賈直孺賈直孺嘗言襄州居喪時家中若有人呼侍中云一日為其父尋葬地有人前引云侍中村其後居京城之西鄰婦新恙踰牆言為其夫所苦我來告賈侍中直孺益自信未幾為侍講學士給事中卒於城西第其偶然乎果告之鬼亦善戲謔馮侍禁馮當世之父式為左侍禁以終當世幼時取其所讀書題其後曰將仕郎守將作監丞通判荆南軍府事借緋馮京式既沒十一年當世狀元及第為荆南通判視其父所題無一字差者是所謂知子者也蔡子直蔡子直識英宗皇帝於藩邸為最舊既即位久之以樞密直學士知秦州英宗上仙不及見一日夢宣召賜封又賜茶既而辭出固留之曰只在此更毋得去寤而記憶乃靈駕發引日因大慟哭遂得疾日中而卒其得幽冥之感有如此者丁晉公丁朱崖當政日置宴私第忽語於衆曰嘗聞江南國主鍾愛其女一日諭其大臣曰吾止一女姿儀性識特異於人卿等為擇佳壻須得少年美丰儀有才學而門第高者或曰洪州劉生為郡參謀年方弱冠風骨秀美大門第嘗任二卿博學有文足以充選國主亟令召至見之大喜尋尚主拜駙馬都尉鳴珂鏘玉出入禁闥良田甲第珍寶奇玩豪華富貴冠於一時未周星嵗主告殂國主悲悼不勝曰吾不欲復見劉生削其官一物不與遣還洪州生恍疑夢覺觸目如舊丁笑曰某他日不失作劉參謀也席中莫不失色未幾有海上之行籍其家子然南去何先兆之著也見澠水燕談王元規王元規景仁慶厯末時赴吏部選一夕夢一人衣冠高古若術士者因訪以當授何地官期早晚書八字與之云時生一陽體合三水既覺莫曉其意及注官果授河南府河清主簿凡三字從水到官日正冬至見澠水燕談任玠蜀人任玠溫如晚寓寧州府宅一夕夢一山叟貽詩曰故國路通歸去來玠應之曰春風天逺望不盡既覺自笑曰吾其死乎數日不疾而逝張茂直張茂直兖人家貧喜讀書少遊汶上嘗買瓜於圃翁荷鋤睥睨曰子非久當斷頸下刃之際稍速則死稍緩則生果獲免必享富貴無何慕容彥超據兖州列驅守埤周師破擁城者例坐斬之斬殆盡至茂直挾刃者語之曰汝髮甚修鬒惜為頸血所汚可先斷之茂直許焉將理髮得釋免後知制誥祕書監卒楊文公楊大年嵗二十一為光祿賜及第太宗極稱愛二月後苑曲宴求帖職不得預公以詩貽館中諸公曰聞戴宫花滿鬢紅上林絲管侍重瞳蓬萊咫尺無因到始信仙凡迥不同諸公不敢匿即時進呈上詰有司所以不召左右以未帖職為奏即日直集賢院免謝令預晚宴後修册府元龜王欽若總其事詞臣二十人分撰篇序下詔須經楊億刪定方許用之大年祖文逸偽唐玉山令大年將生一道士袖刺來謁自稱懷玉山人冠褐秀爽斯須遽失公遂生後至三十七為學士晝寐玉堂忽自夢一道士來謁亦稱懷玉山故人坐定袖中出一誥牒曰內翰加官取閲之其牒上草寫三十七字大年夢中頗驚曰得非數乎道士微笑又曰許添乎道士點頭夢中命筆止添一點為四十七至其數果卒見玉壺清話王堯臣天聖四年夏海州書表司雋宗逺嘗夢有人告曰來年狀元是王堯臣乃題司房之北壁是年秋試開封府解榜到雋見王之姓名謂同列曰此是明年狀元也洎南省榜出又見王預奏名雋愈喜應題於壁未幾果魁多士逾時授海州通判路逢前知郡事王遵度館使首語此事後到又呼雋詢之果不謬此神欲使人知魁多士者必前定矣吕文靖梅侍讀知濠州嘗夢有人通刺云相公來謁睡起通判吕丞至文靖公也梅見其語話奇特遂厚待之梅後坎坷當吕作相引為待制後至金華之拜康靖公聞見録陸經陸經慶厯中為館職一日飲於相國寺僧祕演房語笑方洽有一人箕踞於旁睥睨經曰禍作矣僅在頃刻能復飲乎陸大怒欲捕之為祕演勸勉而止薄暮飲罷上馬而追牒者已俟於門陸惶懼不知所為復見箕踞者行且笑曰無苦終復故物既而陸得罪斥廢纍年嘉祐初乃復館職見東軒筆録曽魯公曽魯公放生以蜆蛤之類以為人所不放而活物之命多也一日夢被甲者數百人前訴既寤而問其家乃有惠蛤蜊數罨者即遣人放之夜復夢披甲者來謝見東軒筆録李景初李景初自蜀浮江而下至荆湖間家人市一巨鱉而景初未知也夜中夢皂衣老姥告乞命怪問家人家人曰此必所買鱉也即遣放之亦復夢皂衣姥來謝太史公記宋元君事古常有之君子逺庖厨聞其聲不忍食其肉雖然天地間生此所以養人但不暴天地物可也見東齋記事事實類苑卷四十七

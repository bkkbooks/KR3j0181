body:
  text: 事實類苑卷五十五宋江少虞撰忠孝節義范文正景祐中范文正公以言事觸宰相黜守饒州到任謝表云此而為郡陳優優布政之方必也立朝增蹇蹇匪躬之節天下歎公至誠許國始終不渝不以進退易其守也二范文正公輕財好施尤厚於族人既貴近郭買良田數千畝為義田以給羣從之貧者擇族之長而賢者一人主其出納人日食米一升嵗衣絲一匹嫁娶喪葬皆有贍給聚族人僅百口公歿逾四十年子孫賢至今奉公之法不敢廢弛並見澠水燕談歐陽文忠公歐陽文忠公在蔡州屢乞致仕門下生蔡承禧因間言曰公德望為朝廷倚重且未及引年豈容遽去也歐陽答曰某平生名節為後生描畫盡惟有速退以全節豈可更俟驅逐乎承禧歎息無以答既而以太子少保致仕倦遊襍錄陳喬陳喬仕江南為門下侍郎掌樞密後主之稱疾不朝喬預其謀及王師問罪警以固守時張洎為喬之副常言於後主茍社稷失守二臣死之城陷喬將死後主執其手曰當與我同北歸喬曰臣死之即陛下保無恙但歸咎于臣為陛下建不朝之謀斯計之上也掣其手去入視㕔内語二親僕曰共縊殺我二僕不忍解所服金帶與之遂自經後主求喬不得或謂張洎者已詣北軍矣喬既死從吏撤屍而瘞之明年朝廷嘉其忠詔改塟後見其屍如生而不僵掘得屍以手加額上如所覩者見揚文公談苑劉温叟國初御史中丞劉温叟博學惇厚動必由禮義父諱岳叟終身不聽絲竹嘗令子和藥有天靈葢温叟見之惻然亟令致奠瘞于郊外五代士人鮮蹈禮義温叟篤行為世所推馬遂慶厯末妖賊王則盗據貝州賈魏公鎮北門倉卒發兵圍之未有破賊之計公日夜憂思有指使馬遂者白公曰堅城深池不可力取願得公一言手殺元兇餘黨可説而下也公壯其言遣行丁寧囑之曰壯士立功名在此行也遂至城下浮渡濠水呼守城者垂匹練縋身以上見賊偶坐為陳朝廷恩信爾能束身出城公為爾請於朝亦不失富貴若守迷自固天子遣一將提兵數千不日城陷血膏劔㦸肉飽犬彘悔無及矣辭甚激切賊不答遂度終不能聴乃復白曰公有宻㫖願屏左右以語賊令左右引避遂急擊賊仆地扼其喉㡬死左右兵至遂被殺聞者莫不義之是時翰林鄭毅夫方客魏特為之作傳出澠水燕談趙師旦曹覲儂賊破邕州偶江漲遂乗桴沿流入番禺時賛善大夫趙師旦知康州到任始一日賊既逼境諭官屬吏民使避謂曰吾固知斯城不可守守城而死乃監兵洎吾之職耳若曹無預禍賊既至率弱卒不滿百禦之半日城陷趙與監兵皆死之士卒得免者無一二先是一日趙方出其妻藏於山谷之間有一子棄草中賊去比三日歸視之尚生人謂忠義之感有曹覲者以太子中舍知封州賊既至乃易服遁去未十餘里為賊所擒賊酋謂曰汝乃好罵我南人作變者今日猶不拜耶曹竟不屈至晚積薪燔死于時本路至漕運者與曹有舊仍依師旦事勒書於石朝廷贈覲太子少卿子孫弟姪洎女子受官賞命服者數人趙贈衛尉少卿一子得殿直趙使君之事嶺外率知之康人為之立祠堂至今祭祀不絶劉潛劉潛以州從事官權知鄆州平隂縣事一日與客飲驛亭左右忽報夫人暴疾潛馳歸已不救矣潛抱母一慟而絶其妻見潛死復撫潜屍大號而卒時人謂之曰子死於孝妻死於義孝義之事併集于家並見倦遊録徐積山陽徐積仲車博學志行父石少亡積終身不登山行遇石必避嘗冐暑道遇奔喪者輟馬以遺之徒行還家年僅四十勉從母命作詩賦一舉登第久之喪母哀毁過人鄉里化之𦵏其母助葬者數千人支漸資州資陽縣支漸熙寧中喪母既𦵏廬墓日號躬行縢步負土成墳有雙白鶴徘徊松上狐狸馴側觀漸上土又有異鳥一目如丹每漸哭鳥亦悲鳴夜有一狐狸環呼坟側如巡警狀乆之有羣鳥翔集中一白鳥獨日至又有五色雀萬餘隨漸行哭七日而去年七十毎號慟涕淚流如雨日食脫粟不盥手洗足所衣苴麻碎爛不易鬚髮蓬亂乆皆斷落見者為之悽惻隣舍子勾氏自娶棄其父母觀漸至行感愧迎其親侍奉不衰漸後年八十餘與其妻王氏皆康寧漸白髮再黑四齒脱復生步履輕健飲食如少年人以為至孝之感神宗詔賜漸粟帛付之史官元祐八年范祖禹奏乞優與旌獎以助孝治詔為資州助教出澠水燕談朱夀昌司農少卿朱夀昌方在襁褓而所生母被出及長仕於四方孜孜訪尋不逮治平中官至正郎矣或傳其母嫁為關中民妻夀昌即棄官入關中得母於陜州士大夫嘉其孝行多以歌詩美之蘇子瞻為作詩序且譏激世人之不養者李定見其序大恚恨㑹定為中丞劾軾嘗作詩謗訕朝廷事下御史府鞫劾時至不測頼上保之止黜為黄州團練副使軾素喜作詩自是結舌不敢為一字鍾離君予為兒童時嘗聞祖母集慶郡夫人言江南有國日有縣令鍾離君與鄰縣令許君結姻鍾離女將出適買一婢以從嫁一日其婢執箕帚治地至堂前熟視地之窊處惻然泣下鍾離君適見怪問之婢泣曰幼時我父於此穴地為毬窩道我戲劇嵗乆矣而窊處未改也鍾離君驚曰而父何人婢曰我父乃兩政前縣令也身死家破遂落民間而更賣為婢鍾離君遽呼牙儈問之後質於老吏具得其實是時許令子納采有日鍾離君遽以書抵許令而止其子且曰吾買婢得前令之女吾特憐而悲之義不可乆辱當輟吾女之奩篚先求婿以嫁前令之女也更俟一年别為吾女營辦嫁資以歸君子可乎許君答言曰蘧伯玉恥獨為君子君何自專仁義願以前令之女配吾子然後君别求良門以嫁君女於是前令之女卒歸許氏祖母語畢歎曰此等事前輩之所常行今則不復見矣余時尚幼恨不記二令之名姑書其事亦足以激天下之義也見東軒筆録魯簡肅仁宗在東宫魯簡肅公宗道為諭徳其居在門外俗謂之浴堂巷有酒肆在其側號仁和酒肆有名於京師公往往易服微行飲於其中一日真宗急召公將有所問使者及門而公不在移時乃自仁和肆中飲歸中使遽先入白乃與公約曰上若怪公來遲當託何事為對幸先教莫不異同公曰但以實告曰然則當得罪公曰飲酒人之常情欺君臣子之大罪也中使嗟歎而去真宗果問使者具如公對真宗問公何故私入酒家公謝曰臣家貧無器皿酒肆百物具偹賔至如歸適有鄉里親客逺來遂與之飲然臣既易服市人亦無識臣者真宗笑曰卿為近臣恐為御史所彈然自此竒公以為忠實可大用晚年為章獻明肅太后言羣臣可大用者數人公其一也後章獻皆用之廬陵歸田録趙延嗣趙隣㡬好學善著述太宗朝權知制誥逾年卒子東之亦有文前以職事死塞上家極貧三女皆幼無田以養無宅以居僕趙延嗣者久事舍人義不忍去竭力營衣食以給之雖苦不避如是者十餘年三女皆長延嗣未嘗見其面一日至京師訪舍人之友謀嫁三女見宋翰林白楊侍郎徽之發聲大哭具道所以二公驚謝曰吾徒披儒衣冠且與舍人友而不能恤舍人之孤不迨汝逺矣即迎三女京師求良士嫁之三女皆有歸延嗣乃去徂徠先生石守道為之作傳以勵天下云于令儀曹州于令儀茗市井人也長厚不忤物晚年家頗豐富一夕盜入其家諸子擒之乃隣舍子也令儀曰爾素寡過何苦為盜盜曰廹於貧耳問其所欲曰得十千足以資衣食如其欲予之既去復呼之盜大懼語之曰爾貧甚夜負十千以歸恐為邏者所詰留之至明使去盜大感愧卒為良民鄉里稱君為善士君擇子姪之秀者起學堂延名儒以誨之子伋姪傑倣皆登進士第今為南曹令族姚栖雲唐貞元中調卒戍邊河中府永樂縣姚栖雲之父語其兄嗣未立無往某幸已有子請代兄行遂戰歿塞上時栖雲方三嵗後其母再嫁栖雲鞠於伯母如事其母伯母亡栖雲𦵏之又招魂𦵏其父廬於墓次終身哀慕不衰縣令蘇轍以俸錢買開阡刻石表之河中尹渾瑊上其事詔加優賜旌表門閭名其鄉曰孝悌社曰節義里曰敬愛栖雲生岳岳生君儒君儒生師正自岳至師正四世廬墓五世孫厚六世孫雅七世孫文八世孫敬真九世孫直十世孫宗明慶厯初本府奏自栖雲十世同居顯有孝行仁宗詔賜旌表復其徭役十一世孫和用十二世孫士明十三世孫徳自和用至徳又三世自慶厯至今又五十餘年而其家孝友不衰姚氏世為農無為學者不甚富田數十頃聚族百餘口子孫躬耕農桑僅給衣食厯三百餘年無人異辭者經唐末五代干戈亂離而子孫保守坟墓骨肉不相離散求之天下未有也永樂熙寧初𨽻河東余元祐中知河東以狀列於府乞持檄奏下其事史官重加旌表特免户役錢以旌孝義以勵風俗狀丁尚書不報見澠水燕談莫節婦翰林朱昂嘗撰莫節婦傳大為人倫之勸節婦少歸周謂謂紹州人布衣謁太祖召使殿試時務大稱上㫖擢賛善大夫當天造之初凡所任人處置從便符彦卿暴恣不法謂為屬邑求濟縣令俾繩之彦卿聞其來魂膽俱䘮鞬櫜郊迎謂但折於馬上境上數强盗刼財傷人彦卿受賂縱之使逸謂出令敢有藏盗者斬不數日獲之解府即時斬决以按具奏太祖大壯之興國二年詔移副廣南羅延㫖為轉運使以定嶺冦時奔命赴道不得與莫别後委寄繁劇嶺塞馳走不還於家二十六年父欲奪莫嫁之莫泣謂曰吾夫豈碌碌乆困者耶食貧守死以俟之父不敢强莫執禮事舅姑益謹閨閫有法家素貧莫嵗事蠶績得絲則機而為杼軸勤儉自營生計漸盛子長築舘於外置書令師教之後産業益豐舅姑將老選美丘大為夀坟松檟茂宻盡得其制又為其夫創上腴田數百頃水竹别墅髙閣相望然謂在路亦修髙節以莫二十六年間畢婚二家皆清望之族迨謂歸俱已皓首勸夫終老于家林焉張誠鄆州須城縣楊村民張誠者其家自綰至誠六代同居九百一十七口内外無間言衣裳無常主旦日家長坐堂上率子弟而分職事罔不祗勤張氏世無冠冕者不讀書耕田捕漁為業無蓄積嵗給一嵗而能人人孝弟友順六世㡬二百年百餘口無一日少異亦可尚也曹修古女曹修古明道初為御史知雜上書乞章獻太后還政謫守興化軍暴疾終於官家貧死之日無衣以歛郡之寮屬若吏民之賢者莫不號慕歎惜相與出錢帛數十萬賻其家曹女年始笄泣語其母曰先人忠節名聞天下不幸以直言謫死且君子不家於䘮安可受此以凂我先人之全徳哉哭不已謝而遣之吏民固請卒不受一錢其純孝髙識如此曹建安人四御史之一也見澠水燕談衛融衛融字明逺太原劉崇相國劉均助李筠融為王師所擒太祖責謂何故賛成劉均助李筠對曰犬各吠非其主臣四十口為劉氏温衣美食不忍負之陛下縱不殺臣臣豈為陛下用臣今得路必走河東太祖怒以鐵撾擊其首遣曳出戮之融大聲曰大丈夫死或重於泰山或輕於鴻毛太祖謂左右曰忠臣也命釋之召於御座前以萬金良藥親傅其瘡賜襲衣金帶鞍馬既而太祖欲放融歸乃先遣融為書以諭均助周先遜等即遣融去不報授融太府卿賜第京師崔輪崔輪京兆人鎮安軍節度免商陽開都部置召還以疾留京師疾間請見上曰臣以身許國不願死於家太祖壯之便令之仕輪驍勇有方略所至立功公少時不修小節頗愛飛鷹走犬太夫人性嚴嘗不勝怒舉枰槌投之中足流血由是折節從學及貴母已亡捫其痕輙哭史吉康定初夏敵冦延州永平寨主監押欲引兵匿深山候敵去復歸指揮使史吉帥所部數百遮㦸門立於馬前曰寨主監押欲何之二人以謀告吉曰如此兵則完矣如城中百姓芻糧何此往還之迹何可掩異日為有司所劾吉為指揮使不免於斬願先斬於馬前不然不敢以此兵從行也寨主監押慙懼引轡而返敵至圍城吉帥下拒守數日而敵去朝廷以寨主監押完城各遷官曰幸不䘮城寨者論功乎後官至團練女為郭進夫人亦有明識進善治生家甚富夫人嘗規之曰我與公俱老所衣食能㡬何子孫皆有官位望不輕胡為多藏以敗名也任福任福字祐之開封人少時頗涉書史咸平中應募補殿前諸班以材力例選為列校凡六遷至遥領刺史寳元初夏州趙元昊始絶朝貢朝廷選班直諸校有勇幹者除闕事實類苑卷五十五

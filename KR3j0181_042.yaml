body:
  text: 事實類苑卷四十二宋江少虞撰文章四六錢昭序錢昭序鄧王俶之族子也為闕京副使知通利軍至道初獲赤烏白昭序表獻曰烏乃陽精唯隂類告火德蕃昌之盛示金方馴服之微懿兹希世之珍罕有同時而見當時多傳誦昭序文詞作數賦自一至十凡十篇甚為蘇易簡及江陵從祖所傳誦湯悅湯悅父應舉唐末有才名悅本名崇義仕江南為宰相建隆初宣祖諱改姓楊初在吳為舍人受詔撰揚州孝先寺碑世宗親往駐驆此寺讀其文賞歎顯德中主遣悅入貢世宗為之加禮自淮上用兵凡書詔多悅之作特為典贍切於事情世宗每覽江南字形於嗟歎闕王狀元王狀元君貺天聖庚午甲科及第元豐戊午垂五十年方有重金之賜謝表載其略云黃金三紀未佩隨身之魚賜𢃄萬釘改觀在廷之目豈伊敢任得拜恩章車服以庸品儀辨等國朝故事惟二府刻毬路之花文武近班通一例號羣仙之樣特承南命越度朝規此蓋陛下寵厚老臣禮加常例憫事三朝之舊俾偕四輔之榮奉以垂腰既表重鏐之麗寶之在體更增上物之華劉貢父劉攽王介甫同為開封府試官舉人有用畜者字介謂音犯主上嫌名攽謂禮院先未嘗定此名為諱不可用以黜落因紛爭不已而介以惡語侵攽攽不較既而御史張戩程灝并彈之遂皆贖金御史中丞吕公著又以為議罪太輕遂奪其主判其實中丞不樂攽也謝表略曰彍弩射市薄命難逃飄瓦在前忮心不校又曰在矢人之術唯恐不傷而田主之牛奪之已甚蓋謂是也錢若水錢若水為學士太宗禮遇殊厚嘗草賜趙保忠詔云不斬繼遷存狡之三穴潛凝光嗣持首尾之兩端太宗覽之甚悅謂若水曰此四句正道著我意又與趙保忠詔有既除手足之親已失輔車之勢其辭甚矣太宗御筆批其後云依此詔本經好至今延平寶藏之見金坡遺事錢熙錢熙泉南雄才之士進四夷未至賦萬餘言太宗愛其才雄擢館職嘗撰三釣酸文世稱精絶略曰渭川凝碧早拋釣月之流商嶺排青不逐眠雲之客又年年落第春風徒泣於遷鶯處處羈遊夜雨空悲於斷雁鄉人李慶孫器之曰四夷妙賦無人誦三釣酸文舉世傳陳思道陳思道子昌齡醜陋吃訥聰明絶人年十七八海州試海水揚波賦即席一筆而成文不煩加點其警句披碣石之宿霧斂蒼梧之夕雲月入靈槎泛寒光而落魄波翻瀛島湛清影以遙連見名賢詩話貶錢惟演詞時錢公為樞相以非辜降節度使貶謫東會禁林有主誥者素為深仇貶語云公侯之家鮮克稟訓茅土之後多或墜涼具官某王國之衰緒孽臣之纍姻孽臣蓋晉公也時家宰謂典誥者曰萬選公其貶語太酷禁林曰當留數句以俟後乎太宰曰是尚未逞憾乎郡燕樂詞范文正公鎮餘杭日侍讀王樂道公正在幕楊內翰億甫公察謫信州未發召還赴闕過杭公厚遇之持排日遣樂吏往察判廳請樂詞樂道闕之不與來日酒數行遣吏投書於席大概言陶之學先王之道未始遊心於俳優之藝始某從事公幕天下之士類皆以陶為賀蓋今巖穴蟠潛修立之士無不由明公之門揄濯以至於華顯者獨某不幸更於左右公嘗調之以道德磨之以仁義及以佼戲之事資之非某素望也且今莘陽公以吾儒髙第之一人爾茍某始者躐巍科歷清秩過執事之境必不肯以優伶之辭為錯也公以書示隱甫隱甫曰被及當司尤無謂也公頗動容既而非久移鎮青杜樂道少安又王尚書拱辰長安上事理椽撰樂詞有人間合作大丞相天下尤呼小狀元之句又龍圖摯餘上杭事一日曹僚撰頭盞曲有黃歌方間金鼎調羮正待梅之句二吏因受知蒙二公薦擢不數年並升於臺閣皆繫乎幸不幸爾章懿太后神道碑晏元獻公撰章懿李太后神道碑破題云五嶽峥嶸崑山出玉四溟浩渺麗水生金蓋言誕育聖躬實繫后奈仁宗夙以母儀事明肅劉太后膺先帝闕之托闕然才者則愛其善比也獨仁宗不悅謂晏曰何不直言誕育朕躬使天下知之晏公具以前意奏之上曰此等事卿置之區區不足較當更别改晏曰已焚草於神寢上終不悅建升祔二后赦文孫承旨抃當筆協闕主意直敘曰章懿太后闕擁慶羡實生渺躬顧復之恩深保綏之念重神御既往仙遊斯逺嗟乎為天下之母育天下之君不逮乎九重之承顔不及乎四海之致養念言一追至慕增結帝覽之感泣彌月明賜之外悉以東宫舊玩密賚之歲餘參大政文老不衰嘗謂文老不衰誠有之今大參元厚之絳向在禁林懷荆南舊遊云去年曾醉海棠叢聞説新枝發舊紅昨夜夢回花下飲不知身在玉堂中詞氣不少衰又今曾公年八十筆力尚完時曾子宣內翰謫守鄱陽手寫一簡慰之略曰扶搖方逺六月不得不息消長以道七日自當來復又有中祕書楊經臣博贍才雅而嘗誦之經臣曾謂余曰此非知其然而為神驅氣使之然耳奬詞臣乾德九年正月乾元殿闕王朝扈蒙參定其儀有外請説之制甚繁具本文蒙繼上聖功頌次年將東封又進御札草上愛之批於紙尾奬之云聖功頌無一字可議後范詩有微臣自愧頭如雪也向鈞天侍玉皇上和之以賜曰珍重老臣純不已我慚寡昧繼三皇為之傳美玉壺清話賜恩澤出身章服誥景祐初元張唐卿榜賜恩澤出身章服等語詞略云青襟就學白首空歸屢陳卿老之書不預賢能之選靡務激昻而自勵止期華皓以見收仁宗怒曰後世得不貽其子孫之疑乎御筆抹去宋鄭公庠别進云久淪巖穴夙藴經綸鶯遷未出於喬木鶚薦屢先於鄉版縱轡誠希於逺到摶風勉屈於卑飛上頗悅見玉壺清話高麗使先狀高麗海外諸夷中最好儒學祖宗以來數有賔貢進士登第者自天聖後數十年不通中國熙寧四年始復遣使修貢因泉州黃慎者為向導將由四明登岸比至為海風飄至通州海門縣新港先以狀致通州太守云望斗極以乘槎初離下國指桃源而迷路誤到仙鄉詞甚切當使臣御事民官侍郎金第與同行朴寅亮詩尤精如泗州龜山寺詩云門前客棹洪波急竹下僧碁白日間等句中士人亦稱之寅亮為其國詞臣以罪廢久之復與金第使中國出澠水燕談音韻切韻之學本出於西域漢人訓字止曰讀如某字末用反切然語已有二聲合為一字者如不可為叵何不為盍如是為爾而已為耳之乎為諸之類以西域二合之音蓋切字之源也如軟字文從而犬亦切音也殆與聲俱生莫知從來今切韻之法先類其字各歸其母唇音舌音各八牙音喉音各四齒音十半齒半舌音二凡三十六分為五音天下之聲總於是矣每聲復有四等謂清次清濁平也如顛天田年邦降龎厖之類是也皆得之自然非人為之如幫字橫調之為五音幫當剛臧央是也幫宫之清當商之清剛角之清臧徴之清央羽之清也縱調之為四等幫滂傍茫是也幫宫之清滂宫之次清傍宫之濁茫宫之不清不濁就本音本等調之為四聲幫榜傍博是也幫宫之清平榜宫之清上傍宫之清去博宫之清入四等之聲多有聲無字者如封峰逢止有三字雍胸止有兩字竦火欲以皆止有一字五音亦然滂湯康蒼止有四字四聲則有無聲亦有無字者如蕭字肴字全韻皆無入聲此皆聲之類也所謂切韻者上字為切下字為韻切須歸本母韻須歸本等切歸本母謂之音和如德紅為東之類德與東同一母也字有重中重輕中輕本等聲盡泛入别等謂之類隔雖隔等須以其類謂唇與唇類齒與齒類如武延為綿符兵為平之類是也韻歸本等如冬與東字母皆屬端字冬乃端字中第一等聲故都宗切宗字第一等韻也以其歸精字故精徵音第一等聲東字乃端字中第三等聲故德紅切紅字第三等韻也以其歸匣字故匣羽音第三等聲又有互用借聲類例頗多大都自沈約為四聲音韻愈密然梵學則有華竺之異南渡之後又雜以吳音故音韻厖駮師法多門至於所分五音法亦不一如樂家所用則隨律命之本無定音常以濁者為宫稍清為商最清為角清濁不常為徵羽切韻家則定以唇齒牙舌喉為宫商角徵羽其間又有半徵半商者如來日二字是也皆不論清濁五行家則以韻類清濁參配今五姓是也梵學則喉牙齒舌唇之外又有折攝二聲折聲自臍輪起至唇上發如鈝字浮金反之類是也攝聲鼻音如歆字鼻中發之類是也字母則有四十二曰阿多波者那囉拖婆茶沙嚩哆也瑟吒二合迦娑麼伽他杜鎖呼拖前一拖輕呼此一拖重呼奢佉又二合娑多二合壤曷攞多二合婆上聲車娑麼二合縒伽上聲吒拏娑頗二合娑伽二合也娑二合室者二合他陀為法不同各有理致雖先王所不言然不害有此理厯世浸久學者日深自當造微耳二幽州僧行均集佛書中字為切韻訓詁凡十六萬字分四卷號龍龕手鏡燕僧智光為之序甚有詞辨契丹重熙二年集契丹書禁甚嚴傳入中國者法皆死熙寧中有人自彼中得之入傅欽之家蒲傳正帥浙西取以鏤板其序末舊云重熙二年五月序蒲公削去之觀其字音韻次第皆有理法後世殆不以其為燕人也已上見筆談歐陽文忠公歐陽公撰石曼卿墓表蘇子美書邵餗篆額山東詩僧祕演力幹欵督歐俾速撰文成演以車二兩置石於相藍南食殿礲訖白歐公寫石之日為具召館閣諸公觀子美書丹演大喜曰吾死足矣飲散歐蘇囑演曰鐫訖且未得打竟以辭翰之妙演不能却歐公忽適定力院見之問寺僧曰何得僧曰半千買得歐怒因詬演曰吾之文與庸人半千鬻之何無識之甚演滑稽特精徐語歐曰學士已多他三百八十三矣歐愈怒曰是何言演曰豈不記得作省元時庸人競摹新賦呌於通衢復更名呼之闕文來買歐陽某省元賦今一碑五百價已多矣歐陽因解頥徐又語歐曰吾友曼卿不幸早世固欲得公之文張其名自與日星相摩而又窮民售之頗濟其乏又非利乎公但笑而無語見湘山野録事實類苑卷四十二

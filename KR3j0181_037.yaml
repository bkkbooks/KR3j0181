body:
  text: 事實類苑卷三十七宋江少虞撰詩賦歌詠劉沆劉沆與鄉人尹鑑少同場屋劉已登第大拜皇祐中尹以恩榜始登第劉以詩送之曰少年相欵老相逢鄉舉雖同遇不同我已位登三事後君方名列五科中榮登莫計名髙下宦達須由善始終若到鄉關人見問為言歸思滿秋風張師錫張師錫年八十餘卒又有喜其子及第詩曰御榜今朝至見名心始安子能俱中第吾遂可休官賀客留連飲家書反覆看世科誰不繼得慰二親難寇萊公向敏中寇準同以太平興國五年登科向秉鈞寇以使相知永興軍向作絶句贈寇寇酬之曰玉殿登科四十年當時僚友盡英賢歲寒惟有君兼我白首猶持將相權見青箱雜記陳恭公陳恭公執中以衞尉寺丞知吳州驛遞上疏乞立儲貳真宗喜其敢言翊日臨朝袖其疏以示執政歎想久之召為右正言然為王冀公所忌一日真宗賦御溝柳詩宣自宰相兩省皆和進恭公因進詩曰一度春歸一度新翠光長得照龍津君王自愛天然態恨殺昭陽學舞人宋子京韓魏公知定州日作閲古堂自為記書於石後又畫公像於堂上宋子京知定州作樂歌十闋其一曰聽説山中好韓家閲古堂畫圖真宰相刻石好文章魏公聞之不喜胡恢金陵人胡恢博物強記善篆隸臧否人物坐法失官十餘年潦倒貧困赴選集於京師是時韓魏公當國恢獻小詩自達其一聯云建鄴關山千里逺長安風雪一家寒魏公深憐之令篆太學石經因此得復官任華州推官而卒魏野蜀人魏野隱居不仕宦善為詩以詩著名卜居陜州東門之外有陜州平陸縣詩云寒食花藏院重陽菊遶灣一聲離岸櫓數㸃别州山最為警句所居頗瀟灑當時顯人多與之遊寇忠愍尤愛之嘗有贈忠愍詩云好向上天辭富貴却來平地作神仙後忠愍鎮北都召野置門下時北都有妓女美色而舉止生梗土人謂之生張八因府㑹忠愍令乞詩於野野贈之詩曰君為北道生張八我是西州熟魏三莫惜樽前無笑語半生半熟未相猜吳正憲憶改郊詩云南郭迎天使東郊詔隱人謂野也野死有子閑亦有清名今尚居陜中朱台符朱台符眉州人俊邁敏博少有闕各同輩課試以尺正度其晷台符八寸而一賦已就凡有所作文字其彫篆皆類於賦章疏歌曲亦然河西作梗因上封事其略曰且夫結之以恩者彼必懐之示之以威者彼必畏之若爾則所謂繼遷者自當革面而束手款塞而來庭矣又嘗為闕數闋其略曰歌遏雲兮慘客在囘雪兮腰一搦又曰顰多而翠黛難成望闕而烏雲易散本當闕身心兮牡丹期到如今兮賜氷頒扇鄉人日錫嘗曰朱拱正一闋乃閨怨賦一首只少闕錢熙錢熙泉南才雅之士進四夷來王賦萬餘言太宗愛其才擢館職有司請試上笑曰試官前進士趙某親自選中嘗撰三釣酸文舉世稱精絶略曰渭川凝碧早抛釣月之流商嶺排青不逐眠雲之侣又曰年年落第春風徒泣於遷鶯處處羈遊夜雨空傷於斷雁其文數千言率類於此卒鄉人李慶孫為詩哭之曰四夷妙賦無人誦三釣酸文舉世𫝊汪處士文瑩至長沙首訪故國馬氏天䇿府諸學士所著文章擅其名者惟徐東野李髙𢎞邇遂得東野詩浮脆輕艶皆鉛華歌舞媚一時樽俎耳其好句不過牡丹宿醉蘭蕙春悲霞宫日城剪紅刻翠而已獨汪處士一篇庶乎可採曰門在深松裏山僧幾度過藥靈丸不大碁妙子無多薄霧濛寒徑殘風戀緑蘿金烏兼玉兎年幾奈君何又得髙𢎞雜文十卷皆搐章繪句雖齪齪者亦能道信乎文之難見玉壺清話徐鉉太祖太宗下諸國其偽命臣僚忠於所事者無不面加獎激以至棄瑕録用故徐鉉潘眘修輩皆承眷禮至如衛融張泊應答不遜獨優假之故雖陳逺寇讐無不盡其忠力太平興國中吳王李煜薨太宗詔侍臣撰吳王神道碑時有與徐鉉爭名而欲重傷之者面奏曰知吳王事迹莫若徐鉉為詳太宗未悟詔徐鉉撰碑遽請對而泣曰臣舊事李煜陛下容臣存故主之義乃敢奉詔太宗始悟讓者之義許之故鉉之為碑但推言厯數有盡天命有歸而已其警句云東鄰結禍南箕扇疑投杼致慈親之惑乞火無里婦之談始勞因壘之師終後塗山之㑹又有偃王之比太宗覽之獨稱歎異日復得鉉所撰吳王挽詞三首尤加歎賞每對宰臣稱鉉之忠義吳王挽詞今記者二首曰倐忽千齡盡冥茫萬事空青松洛陽陌荒草建康宫道徳遺文在興衰自古同受恩無補報反袂哭途窮土徳承餘烈江南廣舊恩一朝人事變千古信書存哀挽周原道旌名鄭國門此生雖未死寂寞已消魂李王葬北邙江南録乃鉉與湯悦奉詔撰故有鄰國信書之句東隣謂錢俶也黄孝先宗衮嘗賞黄子温詩子温名孝恭天聖八年登進士第為大理寺丞失官從兄子思亦善詩詠懐曰日者未知裴令貴世人爭笑禰生狂闕句曰風簾燕引五六子露井榴開三四花子思名孝先天聖二年登進士第終太常博士賈公餗蔡文忠公擢進士第一以將作丞倅兖將母之官年少氣鋭日沈酣以酒色廢務賢良賈公餗居郡中屢謁不得見因書一絶屏間聖君寵厚龍頭選慈母恩深鶴髮垂君寵母恩俱未報酒如為患悔何追文忠見之亟往泣謝自是終身不飲酒王君玉王君玉琪詩務刻琢而深醇獨至髙視古今每云初學詩易於形狀寫物而難於題贈至成一家言則反此君玉秋後蓮實詩蠶寒氷繭瘦蜂老露窠甜比興曲盡妙也他詩數百十首字字清奇讀之咀氷嚼雪若魚寒不食清池釣鷺靜頻驚小閣棋聞角詩隴㕍半驚天在水征人相顧月如霜之類是也李邯鄲李邯鄲公作詩格句自三字至九字有五字成篇者盡古今詩之格律足以資詳博不可不知也伯父娶邯鄲孫女嘗聞邯鄲公與小宋飲酒咏一物隸僻事以多者為勝飲不勝者他人莫敢造席張文定張司空齊賢致仕歸洛康寧福壽先得裴晉公午橋莊鑿渠周堂花竹照日與故舊乘小舟攜酒游釣牓於門曰老夫已毁裂冠冕或公綬垂訪不敢拜見造一卧榻舉以視田稼醉則憇於木隂酒醒則起嘗作詩戲贈故人午橋今得晉公廬花木烟雲興有餘師亮白頭心已足四登兩府九尚書公慕唐李文亮為人對上前申明律意惟務裁減又奏乞罷三班吏杖罰請從贖論皆可知見玉壺清話王化基王化基言任中丞日鞠祖吉知晉州受賕事敗詢其土豪王基者云吾小民見州將貧乏相醵率為一日之壽豈知其犯法哉悵歎不已化基詰其前後郡守王基言三十年以來唯梁都官不受一錢餘無免者乃梁朂也朂漢乾祐中司徒詡下進士及第有文詞太祖欲令知制誥為時宰所忌遂止化基言於太宗時朂以老病不任吏事特授華州行軍司馬給郎中俸料其子昭璉亦舉進士得杭州從事化基送以詩曰文章換貴雙枝秀清白𫝊家兩地貧人多傳誦見文公談苑王嗣宗种放以處士召見拜官真宗待以殊禮名動海内後謁歸終南山恃恩驕倨甚王嗣宗時知長安放至通判以下羣拜謁放小俛垂首接之而已嗣宗内不平放召其諸姓出拜嗣宗嗣宗坐受之放怒嗣宗曰向者通判以下拜君扶之而已此百十耳嗣宗狀元及第名位不輕胡為不得坐受其拜放曰以手搏得狀元耳何足道哉嗣宗怒遂上疏言放實空疎才識無以踰人専飾詐功蹈虛名陛下尊禮放擢為顯官誠恐天下竊笑益長澆偽之風且陛下召魏野閉門避匿而放隂結權貴以自薦達因抉闕放闕事數條上雖兩不之問而待放之意寢衰齊州進士李冠嘗獻嗣宗詩曰終南處士聲名滅邠土妖狐窟穴空張乖崖張忠定公詠布衣希夷先生一見奇之公曰願分華山一半居之可乎先生曰於公固可及别贈以毫褚公曰是將嬰我以世務也後公顯貴果以名徳重天下將赴劍南以詩寄先生曰性愚不肯林泉住剛要清流擬致君今日星馳劍南去囘頭慚愧華山雲及還又寄以詩曰世人大抵重官榮見我東歸夾道迎應被華山髙士笑天真喪盡得虚名見澠水燕談聱隅子黄晞閩人好讀書客遊京師數十年不歸髙文苦學貧而有守衣不蔽體得錢輒買書所費殆數百緡自號聱隅子石守道為直講聞其名使諸生如古禮執羔雁束帛就里中聘之以補學職晞固辭不就故歐陽永叔哭徂徠先生詩云羔雁聘黄晞晞驚走隣家是也著書甚多在至和中薦於朝除試太醫助教月餘未及闕緑袍遇疾暴卒有子甚愚魯所聚及自著書皆散失無存者見涑水記聞王沂公王沂公為布衣時以所業贄吕文穆蒙正中有早梅詩其警句云雪中未論和羮事且向百花頭上開文穆云此生登第已安排作狀元宰相矣已而果然見魏王語録僧有明浮圖詩者不少士大夫莫為汲引多汩没不顯嘗仕福州見山僧有明有詩百餘首其中佳句如虹收千嶂雨潮展半江天詩因試客分題僻碁為饒人下著低不減唐人花蕋夫人孟蜀時花蕋夫人能為詩而世不傳其歌詞清婉可聽他日王平甫治館中廢書得其七言詩一卷題云八十九首而存者纔三十餘篇大約似王建宫詞一篇云厨船進食簇時新列坐無非侍從臣日午殿頭宣索膾隔花催喚打魚人又云月頭支給買花錢滿殿宫娥近數千遇著唱名多不語含羞急過御床前他篇類此楊玢楊玢靖恭虞卿之曾孫也仕前偽蜀王建至顯官隨王衍歸後唐以老得工部尚書致仕居長安舊居多為隣里侵占子弟欲詣府訴其事以狀白玢玢批紙尾云四隣侵我我從伊畢竟須思未有時試上含元殿基望秋風秋草正離離子弟不復敢言孫僅孫何孫僅俱以能文馳名一時僅為陜西轉運使作驪山詩二首其後篇有云秦帝墓成陳勝起明皇宫就禄山來時方建玉清昭應宫有惡僅者欲中傷之因録其詩以進真宗讀前篇云朱衣吏引上驪山遽曰僅小器也此何足誇遂棄不讀而陳勝禄山之語卒不得聞人以為幸也見廬陵居士録王禹玉京師祭二社多差近臣王禹玉在兩禁二十年熙寧三年為翰林承㫖又膺是任題詩齋宫曰隣雞未動曉驂催又向靈壇飲福盃自笑治聾不知足明年強健更重來執政聞而憐之見倦遊雜録陳烈先生陳烈先生初嘗與蔡君謨同硯席時君謨出鎮福州束吏治民毫髮不容一日烈往見之維舟城下聞其嚴察不往謁之但留詩於庭曰溪山龍虎蟠溪水鼓角喧中宵卿雲破六月夜衾寒風雨生殘樹蛟螭喜怒瀾慇懃祝舟子移棹過前灘亭吏不敢隱録詩呈公自是公為之少霽威稜事實類苑卷三十七

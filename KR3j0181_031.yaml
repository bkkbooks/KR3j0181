body:
  text: 事實類苑卷三十一宋江少虞撰詞翰書籍藏書之府淳化元年二月二十一日李至等言曰王者藏書之府自漢置未央宫即麒麟天祿閣在其中命劉向揚雄典校皆在禁中謂之中書即內庫書也後漢藏之東觀亦在禁中至犯淵聖名帝時始制祕書監掌禁中圖書祕記謂之祕書及魏分祕書為中書而祕書監掌藝文圖籍之事後以祕書屬少府故王肅為祕書監表論祕書不應屬少府曰謂之祕書即漢之東觀因是不屬少府而蘭臺亦藏書故薛夏云蘭臺為外臺祕書為內閣然則祕閣之書藏之於內明矣晉宋以還皆有祕閣之號故晉武好覽文章敕祕書郎徐廣料祕閣四部三萬餘卷宋謝靈運為祕書監補祕閣之遺逸齊末兵火延燒祕書經籍遺散梁江子一亦請歸祕閣觀書隋煬帝即位寫祕閣之書分為三品於觀文殿東西廊貯之然則祕閣之設其來久矣及唐開元五年亦於乾元殿東廊寫四庫書以充內庫命散騎常侍褚無量祕書監馬懷素總其事至十三年乃以集仙殿為集賢殿因置集賢院雖沿革不常然祕閣之書皆置於內也自唐天寶陵夷文籍蕩然近及百年斯道幾廢國家承衰弊之末開佑文之源三館之書搜求漸備陛下復建祕閣以藏竒書况睿藻宸翰盈編積簡則其奧妙非復與羣師為比乞降明詔令與三館並列至於高下之次先後之稱亦乞著為定式其祕書省既無書籍元𨽻京百司請一如舊制八月詔曰朕肇興祕府典掌羣書仍選名儒入直於內文籍大備粲然可觀處中禁宏開非外之為比自今祕閣宜次三館其祕書省依舊屬京百司二淳化三年五月詔增修祕閣先是度崇文院之中堂為祕閣地會未立書籍止存㕔廡內至是始修文八月閣成三景德四年五月以其迫隘詔分內藏西庫地廣之大中祥符八年四月榮王元儼宮火延燒而閣後所廣地復為內庫所有建大牆以限之其後以直舍狹隘數請侵地於內庫主者所吝乃詔以大慶殿東廊二十間給崇文院復以地不方正而格其詔案其地即殿前都㸃檢廨舍太祖龍興於此國初為車輅庫今西京記所謂和鑾門內有車輅庫是也故前詔稱車府焉四景德四年五月詔分內藏西庫地廣祕閣大中祥符榮王宮火延燔詔制三館於左右掖門外以為崇文外院乃以舊地歸內帑天聖九年十一月復三館於崇文院其直舍未暇增修至嘉祐四年差官編校館閣書朝廷復以內帑屋三十間還崇文自後書庫直舍方具五元豐五年改崇文院為祕書省內帑復請其地六年十二月詔以前所得屋三十間歸之哲宗朝又詔內帑復祕省仍以朝服法物庫給與之以充所取之數本省尚慮他時復有侵紊則有司復失其所守奏乞定為永久之制有詔可之六淳化三年八月壬戌祕閣成太宗作贊賜之宰臣李昉等請刻石閣下李至上表引唐祕書省有薛稷畫鶴郎餘令畫鳳賀知章草書當時目為三絶又引顔真卿請肅宗題放生碑額近翰林學士承㫖蘇易簡乞御飛白書玉堂為此願賜新額以光祕府戊辰詔中書樞密院近臣觀新閣又賜上樽酒大官供膳是日遣中使賫御飛白書祕閣二字以賜李至李昉等相率詣朝殿稱謝退就飲宴三館學士預焉又賜御詩以美其事李至上表請以御製贊刋石祕閣帝以宰臣前已陳請又重違至意詔曰近以延閣載新萬幾多暇聊書贊詠以美成功所記微猷深虞漏略出於成典豈足多稱遽覽封章願刋珉石垂於不朽良積厚顔其贊序朕兼為親書並篆額以旌祕省九月五日奉詔摹勒石立十月遣中使李懷節以御草書千字文一卷付祕閣李至請於御製祕閣贊碑隂勒石帝謂近臣曰千字文蓋梁武得鍾繇書破碑千餘字俾周興嗣以韻次之詞理固無可取乘間偶書且非垂世立教之文孝經一卷乃本行之本實朕嘗親書之勒諸碑隂可也因賜李至等詔書喻㫖七太平興國三年三館新成盡遷舊館之書分為兩廡置庫藏之裒合為國文集參以舊書正副本凡八萬卷皆以類相從周雕木為梁以青綾帕幕之簡冊之府翕然一變矣八乾德元年平荆南詔有司盡收高氏圖籍以實三館國初三館裁數匱計萬三千餘卷三年九月命石拾遺孫逢吉往西川取僞蜀法物圖籍印篆赴闕得萬三千卷送三館開寶九年平江南命太子洗馬呂龜祥就金陵籍其圖書得二萬餘卷悉送史館僞國皆聚典籍惟蜀為多而江左頗為精真亦多修述九兩浙錢俶歸朝遣使收其書籍悉送館閣端拱元年五月詔置祕閣至是乃以史館書萬餘卷以實其中十又詔史館書收天文占候䜟緯方術等書五千一十二卷悉藏閣上十一景祐初年元詔羣儒即書府盡啓先帝所藏校定餘目翰林學士王堯臣史館檢討王洙館閣校勘歐陽修等入祕府選詩論撰文擇其僞濫者刪去之遺缺者補緝之摘其重復刋其訛舛集其書之總數凡三萬六百六十九卷以類分門為目成一十七卷初書府之制廢於五代太平興國之初始建崇文院合聚昭文史館集賢之書又建祕閣則貯三館真本書籍萬餘卷故賜名曰崇文總目崇文總目係以三館祕閣書集併合著録京師藏書之家惟故相王溥家為多官嘗借本𫝊寫丁謂家書亦多收入祕府三館祕閣所藏之書皆分經史子集四類昭文館三萬八千二百九十一卷史館四萬一千五百五十三卷集賢院四萬二千五百五十四卷祕閣一萬五千七百八十五卷十二淳化五年七月詔選官分校史記前漢後漢書既畢遣內侍集於杭州鏤板咸平中真宗謂宰相曰太宗崇尚文史而三史板本舊聞當時校勘官未能精詳尚有謬誤當再加刋正乃命直史館陳堯佐等覆校史記景德元年正月校畢並録差誤文字五卷同進詔賜帛有差又命直祕館刁術等覆校前後漢書凡修改三百四十九簽正卷集賢院四萬二千五百五十四卷其間雜編歲久多蠧祕閣一萬五千七百八十五卷皆黃本書編帙嚴整以備進御十三大中祥符八年十二月詔樞密使王欽若都大提舉抄寫校勘三館祕閣書籍翰林學士陳彭年副之令吏部銓選幕職州縣官有文學者先試判策擇可取者又送學士院試詩賦論命赴三館祕閣校勘又令翰林學士李惟朝迥王曾錢惟演知制誥盛度知陳知微於館閣京朝官令各舉服勤文學者一人為覆勘官迥等遂以集賢校理闕晏殊直集賢院徐奭麻溫直崇文院檢討馮元充選凡校勘畢送覆校勘官覆校既畢遂送主判館閣官檢㸃校勘又待制三人覆加㸃校皆有程課以考勤惰焉十四天聖二年六月詔校勘官南北史隋書以直史館張觀集賢校理王質朝宗慤李俶祕閣陳括館閣校勘陳彭年國子監直講孫覺校正命知制誥宋綬龍圖待制劉曄提舉十五景祐元年四月命直史館宋祁祕閣校理張觀館閣校勘胡宿張宗古覆校南北史康定元年冬十月十一之閏六月命翰林學士張觀知制誥李俶宋郊編校三館書判閣盛度章得象石中立李仲容覆校十六景祐三年十一月命太子中允集賢校理嵇闕大理寺丞館閣校勘胡宿重校地理書十七嘉祐二年命崇文院校尉掌禹錫祕閣校理林億張洞館閣校勘蘇頌太子中書陳闕校正醫書樞密使韓琦提舉十八嘉祐四年仁宗謂輔臣曰宋齊梁陳後魏後周北齊書罕有善本未行之學官可委編校官精加校勘八月命編校書籍孟恂丁寶臣鄭穆趙彥若錢藻孫覺曾鞏校宋齊梁陳後魏北齊後周七史恂等言梁陳等書缺獨館所藏恐不足以定本願詔京師及州縣藏書之家使悉上之仁宗皇帝為下其事至七年冬稍稍始集然後校正訛舛為完書刋本行之十九景祐六年四月以大理寺丞郭固編校祕閣所藏兵書類三百四十七部一千九百五十六卷委郭固校之先是三館祕閣置官編校書籍與天文為祕書兵書獨不預大臣有言固晚知兵法仍命就祕閣編校抄成黃本七十二冊國初以選換六皂副本至治平四年六月以編書畢選內藏庫副使路分都監二十哲宗朝臣寮言竊見高麗獻到書內有黃帝針經九卷據素問序稱漢文書藝文志黃帝內經十八篇素問與此書各九卷乃合本數此書幾經兵火散失幾盡偏存於東夷今此來獻篇帙具存不可不宣布海內使學者誦習伏望朝廷詳酌下尚書工部雕刻印板送國子監依例摹印施行所貴濟衆之功溥及天下有㫖令祕書省選奏通曉醫書官三兩員校對及令本省詳定訖依所奏施行二十一舊制每日校對書籍功冊葉背面二十一紙三館都監於每月終逐員功課聞奏自嘉祐中置編校此制遂廢元祐六年復著為令又案六典考工之職二十七最十日讎校精審明於刋定為校足之最乞以月終所奏降付考功詔依紹聖四年四月省尚書勘會館職每月校對書籍已有條制立定功課即不須逐旋奏聞其考功自來别無行遣顯屬繁冗奉聖㫖元祐六年指揮不施行二十二淳化元年二月詔自今游宴宣召三館其集賢祕閣校理並行令預會初校理李宗諤舉進士獻文自薦詔相府賦詩頌各一篇選授集賢校理之職自興國後罕有任者會帝宴近臣於後苑三館學士悉預宗諤任校理閣門吏拒之不得入翌日獻詩述其事故有是詔又請令京官乘馬入禁門並無故事集賢有修撰校理之職其類雖異而職務略同後苑閣門拒校理不得預宴蓋更易之矣祖宗時每時序游幸或雨雪休應皆賜宴於崇文院祥符天禧之際宸章睿藻宣示臣下自宰職至帖職皆得賡載仁宗最善飛白書每賜臣下館閣諸臣上已重陽館閣賜宴於瑞聖園二十三天聖中仁宗幸後苑賞花宴輔臣宗室從官以下及三館京官以上並預先是得唐明皇帝山水字石於長安置於清揮殿是日命從臣觀畢應制賦詩仁宗親第其能否二十四慶厯七年十二月二十六日羣玉殿宴三館預焉其禮數悉如召近臣觀書之會二十五皇祐二年賜太宗九絃琴譜御製明堂樂譜圖皇朝訓鑒圖三聖寶字御篆明堂字御飛白書明堂之明字編建館職賞花釣魚館閣學士悉預宴賦詩寶元後西方用兵遂罷二十六嘉祐七年三月復講之後雖罷宴嵗命中使賜牡丹酒於閣下祕省所藏之書盡嵗一曝之自五月一日始至八日罷二月詔尚書侍郎學士待制御史中丞開封尹殿中監大夫司成兩省官暨館職宴於閣下陳圖書古器縱閲之題名於榜而去凡酒醴膳餼之事有司供之仍賜錢百緡以佐其費大觀元年八月請於朝又增賜百緡㑹宴日遣中使以御酒化成殿果子賜在省官最為盛席前此未有二十七咸平二年以楊徽之夏侯嶠呂文仲為侍讀學士邢昺為侍講學士按故事唐開元中置侍講其後有翰林侍講學士五代以來四方多事時君右武不暇嚮學故此職久廢太宗崇尚儒術聽政之暇觀書為樂殆至宵分手不釋卷由是命文仲為翰林侍讀寓直禁中以備顧問然名秩未崇帝聰明稽古奉承先志首置此職擇耆儒舊德以充其選班秩次翰林學士祿賜如之設直廬於祕閣侍讀更直侍講長向日給尚食珍膳夜則迭宿令監館閣書籍中使劉崇超日具當宿官名於內東門進入自是多召對詢訪或至中夕焉二十八康定元年四月宋綬任禮部尚書知樞密院同提舉編修會要雜置官屬寓局于崇文院迄今因之著為故事以上並蓬山志二十九前世藏書分𨽻數處蓋防水火散亡也今三館祕閣凡四處藏書然同在崇文院其間官書多為人盜竊去士大夫往往得之嘉祐中乃置編校官八員校讎四館書吏百人悉以黃紙為大冊寫之自此私家不敢輒藏校讎纍年僅能終昭文一館之書而罷沈存中筆談館職稱學士集賢院開元故事校書官許稱學士今三館職事皆稱學士用開元故事也置編修局舊校書官多不恤職但職取舊書以墨漫一字復注舊字於其間以為日課自置編校局只得以朱圍之仍於卷末書校官姓名雌黃塗字館閣新書淨本有誤字處以雌黃塗之嘗校改字之法刮洗則傷紙紙貼之久易脫粉塗則字不沒塗數遍漫滅惟雌黃則漫滅仍久而不脫古人謂之鉛黃蓋用之有素矣沈括筆談事實類苑卷三十一

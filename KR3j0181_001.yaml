body:
  text: 事實類苑卷一宋江少虞撰祖宗聖訓太祖太祖性至仁雖用兵亦戒殺戮親征太原道經潞州麻衣和尚院躬禱於佛前曰此止以弔伐為意誓不殺一人開寶中遣將平金陵親召曹彬潘美戒之曰城陷之日慎毋殺戮設若困鬬則李煜一門不可加害故彬於江南得王師弔伐之體由聖訓丁寧也初梁太祖因宣武府第修之為建昌宮晉改命曰太寧宫周世宗復加營繕猶未盡如王者之制太祖始命改營之一如洛陽之制既成太祖坐正殿令洞開諸門直望之謂左右曰此如我心少有邪曲人皆見之錢俶入朝太祖眷禮甚厚然自宰相以下皆乞留俶而取其地太祖不從賜還本國復宴餞於便殿屢勸以巨觥陛辭之日俶感泣再拜太祖命於殿內取一黃袱封識甚密以賜且戒以塗中密觀洎即塗啓之凡數十軸皆羣臣所上章疏俶自是益感懼江南平遂乞納土秦亭之西地夕陽鎮産巨材森鬱綿亘不知其極止利於戎建隆初國朝方議營造尚書髙防知秦州郡地數百里築堡厄其要募兵千餘人為採造務與戎約曰渭之北戎有之渭之南秦有之果獲材數萬本為桴蔽渭而上後蕃部率帳屬絶渭奪筏殺防兵出師與我戰我兵剪戮甚衆生擒數十人縶俘於獄以聞太祖憫之曰奪其地之産得無爭乎仍連邊州之擾不若罷之下詔厚撫其酋所縶之戎各以袍帶賜之遣還其部諸戎泣謝後上表願獻美材五十里於朝並涑水紀聞太祖常與趙中令普議事有所不合太祖曰安得宰相如桑維翰者謀之乎普對曰使維翰在陛下亦不用蓋維翰愛錢太祖曰茍用其長亦當護其短措大眼孔小賜與十萬貫則塞破屋子矣錢俶進寶犀帶太祖顧謂曰朕有三條帶與此蓋不同俶請宣示一觀太祖笑曰汴河一條惠民河一條五丈河一條俶大愧服其規模豈不宏逺哉王全斌伐蜀之歲是時大寒太祖著帽絮被裘御講武殿氊帳曰此中寒尚不能禦况伐蜀將士乎即脫所服裘帽遣將持賜全斌其伐江南也曹彬李漢瓊田欽祚入辭以匣劔授彬曰副將而下不用命斬之漢瓊等皆股栗畏懾此所以見御將之恩威皆出於一太祖皇帝將展外城幸朱雀門親自規畫獨趙韓王普從幸上指門額問普曰何不祗書朱雀門須著之字安用普對曰語助太祖笑曰之乎者也助得何事太祖服用儉素退朝常用絁袴麻鞋寢殿門懸青布緣簾殿中設青布幔以上出楊文公談苑太祖少親戎事性好藝文即位未幾召山人郭無為於崇政殿講書至今講官所領階銜猶曰崇政殿說書云出傅商公佳話錢俶初入朝既而賜歸國羣臣多請留俶而使之獻地太祖曰吾方征江南俾俶歸治兵以攻其後則吾之兵力可減半江南若下俶敢不歸乎既而皆如所處出東軒筆録太祖聞國子監集諸生講書喜遣使賜之酒果曰今之武臣亦當使之讀經書欲其知為治之道也出涑水記聞太祖皇帝以神武定天下儒學之士初未甚進用及卜郊肆類備法駕乘大輅翰林學士盧多遜攝太僕卿升輅執綏且備顧問上因歎儀物之盛詢致理之要多遜占對詳敏動皆稱㫖他日上謂左右曰宰相須用儒者盧後果大用蓋肇於此出文正公筆録太祖討平諸國收其府藏貯之别庫曰封樁庫每歲國用之餘皆入焉嘗語近臣曰石晉割幽燕諸郡以歸契丹朕憫八州之民久陷彼中俟所蓄滿五百萬緡遣使北庭以贖山後諸郡如不我從則散府財募戰士以圗攻取後改曰左藏庫今為內藏庫出歸田録魏咸信言故魏國長公主在太祖朝嘗衣貼繡鋪翠𥜗入宫中太祖見之謂主曰汝當以此與我自今勿復為此飾主笑曰此所用翠羽幾何太祖曰不然主家服此宫闈戚里皆相效京城翠羽價髙小民窺利展轉販易傷生寖廣實汝之由汝生長富貴當念惜福豈可造此惡業之端主慙謝主因侍坐與孝章皇后同言曰官家作天子日久豈不能用黃金裝肩輿乘以出入太祖笑曰我以四海之富宫殿悉以金銀為飾力亦可辦但念我為天下守財耳豈可妄用古稱以一人治天下不以天下奉一人茍以自奉養為意使天下之人何仰哉當勿復言太祖平蜀得孟昶七寶裝溺器擲之於地令杵碎之曰汝以何器貯食似此不亡何待以上見楊文公談苑太祖豁逹既得天下趙普屢以微時所不足者言之欲潜加害太祖曰不可若塵埃中教識天子宰相則人皆物色之矣自後普不復敢言出丁晉公談録太祖嘗謂左右曰朕每因宴㑹乘歡至醉經宿未嘗不悔也太祖嘗見小黃門損畫殿壁者怒之曰子可斬也此天子廨舍耳汝敢敗之耶始平公云太祖初即位頗好畋獵嘗田獵墜馬怒自挾佩刀刺馬殺之既而嘆曰我耽於逸樂乘危走險自取顛越馬何罪焉自是遂不復獵太祖常罷朝坐便殿不樂者久之內侍王繼恩請其故上曰汝謂天子為容易耶早來吾乘快指揮一事而誤故不樂也太祖採聼明逺每遇邊關之事纎悉必知有間者自蜀還上問曰劔外有何事間者曰但聞成都滿城誦朱仙長苦熱詩曰煩暑鬱蒸何處避凉風清冷幾時來上曰此蜀民思吾之來伐也時雖已下荆楚孟昶有唇亡齒寒之懼而西討無名昶欲朝貢王昭逺固止之乾德三年昶遣諜者孫遇齎蠟丸帛書間道往太原結劉鈞為援為朝廷所獲太祖喜曰興師有名矣執間者命王全斌率禁旅三萬分路討之俾孫遇指畫山川曲折閣道逺近令工圗之面授神策令王全斌往焉曰所尅城寨止籍器甲芻糧耳若財帛盡分給戰士王師至蜀昶遣王昭逺帥師來拒未幾相繼就擒昶始降執昶赴闕大將王仁瞻自劍南獨先歸闕乞見恐彰已惡歷數全斌等數將貪黷財貨縱弛兵律俱為所訴反欲以自蔽太祖笑謂仁瞻曰納李廷圭妓擅開豐德庫取金寶此又誰耶惶怖叩伏待罪上又曰此行清介畏懼止有曹彬一人耳臺臣請深治蜀諸將橫越之惡太祖盡釋之已上出涑水紀聞太祖即位後遣王全斌劉光義為先鋒曹彬為都監沈義倫為行營判官收復覀蜀無何全斌殺降三千人是時曺不從但收其文案不署字王曹沈等回太祖𫝊宣送中書取勘左右曰方克復西蜀回雖殺降兵亦不可便案劾今後陛下如何用人太祖曰不然河東江南皆未歸服若不勘劾恐今委任者轉亂殺人又曰曹彬但退不干你事曹不退但叩頭伏罪曰是臣同商議殺戮降兵朝廷問罪臣首合誅戮太祖見曹如此皆與原之王授金州節度餘皆進擢之忽一日宣曹并潘美曰命汝收江南又顧曹曰更不得似往時西川亂殺人曹徐奏曰臣若不奏又恐陛下未知曩日覀川元不是臣殺降卒緣臣商量固執不下臣見收得當日文案元不肯署字太祖令取進呈覽之又謂曰卿既商量不下何為對朕堅自伏罪曰臣與王全斌等同奉陛下委任若王全斌等獲罪臣獨清雪不為穩便臣是以一向伏罪太祖曰卿既自欲當辜如此又安用留此文字曰臣從初謂陛下必行誅戮臣留此文書令老母進呈乞全老母一身太祖尤器遇之又潜謂曰但只要他歸服慎勿殺人是他無罪只是自家著他不得卿切㑹取曹曰謹奉詔㫖不敢違越今國家享無疆之休良由是耳曹之四子璨瑋琮珣皆享豐祿豈非餘慶乎已上出丁晉公談録宋白言開寶九年雩祀西洛隂雨踰月齊宿之旦尚未霽太祖遣中使禱無畏三藏塔與之誓言倘不即止毀其浮圗又俾近臣齎詔與嶽神宿齊日雨不止當施桎梏於汝至太極殿齊宿辰已間雨霽洛陽令督役夫輩除道上泥布乾土及郊祀還雨復作無畏西僧唐開元中至長安𤣥宗甚禮重之每祈雨輒應事具李德裕次栁氏舊聞及李華碑見楊文公談苑太祖既納趙韓王之謀數遣使者分詣諸道擇選精兵凡其材力技藝有過人者皆收補禁軍聚之京師以備宿衛厚其糧賜居常躬自按閲訓練皆一以當百諸鎮皆自知兵力精鋭非京師之敵莫敢有異心者由我太祖能强幹弱枝致治於未亂故也太祖征河東圍太原久之不拔宿衛之士皆自奮告曰蕞爾城而久不下者士不致力故也臣等請自往力攻必取之上曰吾搜簡訓練汝曹心盡力竭矣汝曹天下精兵之髓而吾之股肱爪牙也吾寧不得太原豈可糜滅汝曹於此城之下哉遂引兵而還軍士聞之無不感激往往有出涕者太祖征李筠河東遣其宰相衛融將兵助筠融兵散敗生獲之上面責其助亂因謂曰朕今赦汝汝能為我用乎對曰臣家四十口皆受劉氏溫衣飽食何忍負之陛下雖不殺臣臣終不為陛下用得間則走河東耳上怒命以鐵撾撾其首曳出融曰人誰不死得死君事臣之福也上曰忠臣也召之於御座前傅以良藥賜衣𢃄及鞍勒拜太府卿王師平江南徐鉉從李煜入朝太祖讓之以其不早勸李煜降也鉉曰臣在江南備位大臣國亡不能殉罪當死尚何所言上恱撫之曰卿誠忠臣事我當如事李氏也並見涑水紀聞開寶中趙普猶秉政江南後主以銀五萬兩遺普普白太祖太祖曰此不可不受但以書答謝少賂其使人可也普叩頭辭讓上曰大國之體不可自寢弱當使之勿測既而後主遣其弟從善入貢常賜外密賚白金如遺普之數江南君臣始震駭服上之偉度出楊文公談苑太祖明聖慈惠歷代創業之主不可比也初陳橋為三軍擁迫而回不得已而狥衆懇乃先與三軍約曰汝等入城不得驚動府君不得殺害百姓不得取奪財物能從吾令則不違汝推戴於是三軍曰不敢違命出丁晉公談録太祖將親征軍校有獻手撾者上問曰此何以異於常撾而獻之軍校密言曰陛下試引撾首視之撾首即劔柄也有刀韜於中平居可以為杖緩急以備不虞上笑投之於地曰使我親用此物事將何如當此時此物固足恃乎太祖親征澤潞中書舍人趙達憚涉山險稱墜馬傷足止於澤州及師還當草制復稱疾上怒宰相論逹人臣乃敢如此遂貶房州司户已上出洓水紀聞太祖皇帝得天下破上黨取李筠維揚誅李重進皆一舉蕩滅知兵力可用僣僞可平矣嘗語太宗曰中國自五代以來兵連禍結帑廪虛竭必先取西川次及荆廣江南則國用富饒矣今之勍敵正在契丹自開運以後益輕中國河東正扼兩蕃若遽取河東便與兩蕃接境莫若且存繼元為我屏翰候我完實取之未晚故太祖末年始征河東太宗即位即一舉平晉也周廣者開寶中為內外馬步軍都頭嘗好言外事一日白太祖曰朝廷遣使吳越錢俶南面坐旁設使者位俶雖貴極人臣民無二上而奉命者不正其名此大辱國太祖曰汝頗能折之否廣曰臣請行上即日遣廣為使俶猶襲故態廣曰比肩事主不敢就席俶遂移床西向正賔主之禮復命廣氣甚驕將希寵賞太祖曰汝蓋倚朝廷威勢不然者俶何有於汝哉廣大慙其御下之英略如此劉鋹性絶巧自結真珠鞍勒為龍戲之狀獻太祖太祖以示尚方工皆駭服償以錢三百索上謂左右曰移此心勤民政不亦善乎鋹在閩中多置鴆以毒臣下太祖幸講武池從官未集鋹先至詔賜巵酒鋹心疑之捧杯泣曰臣承祖父基業違拒朝廷至煩王師致討罪在不赦陛下既待臣以不死願為大梁布衣觀太平之盛未敢飲此酒太祖笑謂之曰朕推赤心於人腹中安有此事即取鋹酒自飲别酌以賜鋹鋹慚謝太祖善馭豪傑得人死力居常多幸講武池臨流觀習水戰目謂左右曰人皆言亡身為國然皆人之所難言之易耳時禁衛將帥軍廂皆侍側有天廂李進卿前對曰如臣者令死即死耳遂躍入池中上急令水工數十人救之得免幾於委頓上左右內侍數十人皆善武藝伉健人敵數夫騎上下山如飛其慰撫養育無所不至然未嘗假其威權泗州檻生虎來獻上令以全羊臂與之虎得全肉决裂而食氣甚猛悍欲觀之也俄口呿不合視之有骨橫鯁喉中上目左右內侍李承訓即引手探取無所畏常因御五鳳樓有風鳶墮南角樓鴟尾上上顧左右曰有能取之否一內侍失其姓名攝衣舉屋桷以登緣歷危險取之以獻觀之膽落蓋試其趫捷也太祖始自總戎為士卒畏服及踐阼善闕籍者多以闕雄武軍自此或習試武闕毆以教勝負漸增俸緡遷𨽻上軍闕侵晨出城習馬至暮歸飼馬不合闕洽耐辛苦不甚肥盛初議取蜀有闕曰西川除在天上不可到若舟車足跡可至必取之耳士皆賈勇思奮平蜀止六十日用精兵才七千人居常衛士直廬中或給以棊枰令對奕為樂曰此徒端居終日無他思慮以此使之適情耳太祖平蜀擇其親兵驍勇者百餘人補內殿直别立班院號川殿直南郊賞給凡夲班減五千遂相率擊登聞鼓訴其事上大怒曰朝廷給賜自我而出安有例哉盡捕違狀者四十人斬於市餘悉配𨽻下軍遂廢其班一日內酒坊火悉以監官而下數十人棄市詰得遺火卒縛於火中自是內司諸署莫不整肅並見楊文公談苑太祖時李漢超鎮關南馬仁瑀守瀛州韓令坤常山賀維忠易州何繼筠棣州郭進西山武守琪晉陽李謙溥隰州李繼勳昭義趙贊延州姚內斌慶州董遵誨環州王彥升原州馮繼業靈武搜榷之利悉以與之其貨易則免其征稅故邊臣皆富於財以養死士以募諜者夷人情狀山川道路罔不備見而周知之故十餘年無西東之憂出東齊記事太祖將改年號謂宰相曰須出古來未嘗有者宰臣以乾德為請三年平蜀宫人有入掖廷者太祖因閲奩具得鑑背字云乾德四年鑄大驚曰安得四年鑄此鑑以出示宰相皆不能對乃召學士陶穀竇儀問之儀曰蜀中主曾有此號鑑必蜀中所得太祖大喜曰作宰相必用讀書人自是大重儒臣矣太祖躬履儉約多所減損常服浣濯之衣乘輿服用皆尚質素寢殿以青布緣幃簾宫中闈幕無文采之飾常出麻履布裳賜左右曰我舊所服者也出聖政録太祖初臨御欲知外事有史圭者常為隊長掌衛殿廉事入白頗得實後有德州刺史郭貴知荆州貴之親吏在德州為奸知州國子丞梁夢升以法繩之貴素與圭善以事告圭圗去夢升圭紀於紙伺便言之一日探懷中所記進曰德州梁夢升欺蔑刺史郭貴幾至死上曰此必貴所為不法夢升真清強吏取記紙召黃門𫝊中㫖以夢升為贊善大夫既行又曰與左贊善圭慙怏而退俄坐漏禁中語黜官太祖時趙普為相車駕偶出因忽幸其第時兩浙錢王俶方遣使致書及海物十瓶普方置在廡下㑹車駕至倉卒迎不及屏也上顧見問何物普以實對上曰此海物必佳即令啓之皆滿貯瓜子金也普惶恐頓首謝曰臣未嘗發書實不知若知之當奏聞而却之上笑曰但受之無妨彼謂國家事皆由汝書生耳開寶中教坊使衛某年老當外補援後唐故事求領小郡太祖曰伶人為刺史豈治朝事尚可法耶第令於本部中遷叙乃以為太常大樂令出澠水燕談自唐寶大後歷肅代藩鎮遂不復制以及五代之亂太祖即位罷藩鎮權擇文臣使治州郡至今百餘年生民受賜每一詔下雖擁重兵臨大衆莫不即時聼命太祖既好讀書常曰堯舜四凶之罪止從投竄何近代法網之密哉蓋有意措刑矣出事實事實類苑卷一

body:
  text: 事實類苑卷三十二宋江少虞撰典故沿革封孔子後國朝孔子之後襲封文宣公至和中祖擇之言文宣乃先聖諡號後嗣不當以為封爵下學士院更定美稱乃改封其四十九代孫宗愿為衍聖公元祐初孔宗翰上言先聖之後世襲封爵為縣尉庭㕘州守者下至廟户減耗祠宇隳壞不堪其陋葢襲公爵以奉祠事恐末流不競或領他州公悉條具以聞願下所司搆完廢墜增土田别䕃襲之人使天下知朝廷尊孔子之意詔以衍聖公曰奉聖公奉聖公承襲者即予寄禄官不他職其勞考遷改所給廪俸並視在官給田萬頃賜監書置學官以誨其子弟楊文公談苑二至和二年封孔子四十七代孫宗愿為文宣公祖擇之言前代封孔子之後者在漢魏曰褒成宗聖在晉宋曰奉聖後魏曰崇聖北齊曰恭聖後周及隋封鄒國唐初曰褒聖開元中諡孔子為文宣王遂封其後為文宣公是以祖諡而加後嗣也乃下學士院更定美號而改封宗愿為衍聖公東齋記事孔子太公周公加諡立廟祥符元年十一月加諡文宣王曰𤣥聖文宣王祭以太牢追諡齊太公曰昭烈武成王令青州立廟周公曰文憲王令曲阜縣立廟非宗室女封郡縣主故事親王女皆封郡主趙普以元勲諸女封郡主高懷徳以駙馬之貴二女特封縣主當時禮官不正其失而諫官不言其非此典禮之誤也澠水燕談録皇子兼師傅皇子封東陽郡王除婺州節度檢校太傅翰林賈學士黯上言太傅天子師臣也子為師傅於體不順中書校勘自唐來親王無兼師傅官者盖自國朝命官祗以差遣為職事自三師三公以降皆是虚名故失於因循耳議者皆以賈言為當歸田録異姓兼中書令國朝未改官制以前異姓未有兼中書令者恤贈方有之元豐中曹郡王以元舅特賜兼中書令下度支給俸有司言自來未有活中書令請受則例沈括筆談烏帽天聖以前烏帽惟用光紗自後乃用南紗迨今幾十年復稍稍用光紗矣賣香印鳴鑼太祖廟諱語訛近香印故今世賣香印者不敢斥呼鳴鑼而已仁宗廟諱語近蒸今内庭上下皆呼蒸餅為炊餅亦此類錢文國家開寶中所鑄錢文曰宋通元寶至寶元中則曰皇宋通寶近世錢文皆著年號惟此二錢不然者以年號有寶字不可重故也改年號仁宗即位改元天聖時章獻太后臨朝稱制議者謂撰號名者取天字於文為二人以為二人聖者悦太后耳至九年改元明道又以明字於文為日月並也與二人㫖同無何以犯契丹諱明年遽改曰景祐是時連嵗天下大旱改元景祐意兾以迎和氣也五年因郊天改元曰寶元自景祐初羣臣慕唐朝𤣥宗以開元加尊號遂請加景祐於尊號之上至寶元亦然是嵗趙元昊以河西叛改姓元氏朝廷惡之遽改元曰康定而不復加於尊號而好事又曰康定乃諡耳明年又改曰慶厯至九年大旱河北尤甚民死者十八九於是又改元曰皇祐皇猶景也六年日蝕四月朔以為正陽之月自古所忌又改元曰至和三年仁宗不豫久之康復又改元曰嘉祐自天聖至此凡年號九易皆有謂也二國朝百餘年年號無過九年者開寳九年改為太平興國太平興國改為雍熙大中祥符九年改為天禧慶厯九年改為皇祐嘉祐九年改為治平惟天聖盡九年而十年改為明道家祭用臺桌秘府有唐孟詵家祭儀孫氏仲饗儀數種大抵以示人家用臺桌饗祀類几筵乃是㐫祭其四仲告祭當用平面毡條屏風而已官誥綾紙凡封贈父母祖唯降麻官用白皆五色綾紙法錦標大牙軸餘雖極品止給白丈綾紙法錦標大牙軸已上並歸田録後唐案檢余嘗求得後唐閔帝應順元年案檢一通乃除宰相劉昫兼判三司堂檢前有擬狀云具官劉昫右伏以劉昫經國才髙正君志切方屬體元之運資謀始之規宜注宸衷委司判計漸期富庻永賛聖明臣等商量望授依前中書侍郎兼吏部尚書同中書門下平章事充集賢殿大學士兼判三司散官勲封如故未審可否如蒙許允望付翰林降制處分謹録奏聞其後有制書曰宰臣劉句右可兼判三司公事宜令中書門下依此施行付中書門下准此四月十日用御前新鑄之印與今政府行遣稍異本朝要事對禀常事擬進入畫可然後施行謂之熟狀事速不及待報則先行下具制草奏知謂之進草熟狀白紙書宰相押字他執政具姓名進草即黄紙書宰臣執政皆於狀背押字堂檢宰執皆不押惟宰屬於檢背書日堂吏書名用印此擬狀有詞宰相押檢不印此其為異也大率唐人風俗自朝廷下至郡縣决事皆有詞謂之判則書判科是也押檢二人乃馮道李愚也狀檢瀛王親筆甚有改竄勾抹處按舊五代史應順元年四月九日己夘諤王薨庚辰以宰相劉句判三司正是十日與此檢無差宋次道紀開元宰相奏請鄭敏鳯池藁草擬狀注制集悉多用四六皆宰相自草今此擬狀為道親筆盖故事也三省樞密院印用塗金舊制中書樞密院三司使印用塗金近制三省樞密院印用銀為之塗金餘皆鑄銅而已京城用青涼繖京城士人舊通用青凉繖大中祥符五年九月唯許親王用之餘並禁用六年六月始許中書樞密院依舊用之皇后太后印近朝皇后太后皆有印篆文曰皇太后之印故事三宮立各官百官立長秋長樂長信之類是也宜以宮為文至尊之位亦不合言印當云某宮之寶官誥之制予嘗判官誥既知制誥時又提舉兵吏司封官誥院而不曰司勲恐遺之也凡文臣及節度觀察防團刺史諸司使副内殿承制管班皆用吏部印管軍至軍校環衞官用兵部印封爵命婦用司封印加勲用司勲印凡官誥之制后妃銷金雲龍羅紙十八張銷金褾袋寶裝軸絲網金帶公主銷金大鳳羅繡十八張銷金標袋玳瑁軸紅網塗金銀帉錔按皇后常作制誕告不裝告身而用冊本朝諸后皆止用告景祐元年立后用册治平熙寧皆修之親王左右僕射使相宰相色背五色金花綾紙十七張暈絲錦褾袋犀軸色帶紫絲網銀帶褾韜密使三師三公前宰相官至僕射東宮三師嗣王郡王節度使白背五色金花綾紙十七張暈錦褾袋犀軸色帶㕘知政事樞密使副知院同知僉書院事宣徽使僕射東宮三太御史大夫至率府副邑率以上白背五色綾紙十七張暈錦褾大牙軸色帶尚書觀文殿大學士資政殿大學士東宮三少六統軍上將軍留後宮察使同上惟用法錦褾近用翠毛獅子錦以代暈錦非舊制也三司使翰林學士承㫖至直學士待制承郎御史中丞及兩省賓客大卿監祭酒詹事庶子大將軍防團刺史横行使諸司使軍職遙郡樞密都丞㫖初除駙馬都尉白綾大紙七張法錦褾大牙軸色帶三司副使少卿監司業起居郎至正言知雜至監察御史六曹郎中員外郎諭徳少詹事家令率更令太子候太常博士節使行司馬副使少横行副使諸司副使樞密副承㫖軍職都指揮使並不遙郡者白綾大紙七張大錦褾大牙軸青帶國子溥士至洗馬通事舍人諸王友六尚奉御諸衞將軍承㫖崇班閣門祗候五官正諸州别駕樞密院諸房副承㫖官至五品以上用大綾紙大錦褾牙軸諸司員外郎朝請朝散朝奉郎提㸃諸獄發運使判官防團副使率府率副率京官館職堂後官中書密院主事諸軍職都虞候忠翊馬軍歩軍副都軍頭指揮使藩方馬歩軍副都指揮使虞候内供奉官至内品白綾中紙五張中錦褾牙軸青帶其秘書郎至將作監主簿白綾小紙五張黄錦標角軸青帶秘幕職州縣靈臺郎保長章正諸州長史司然中馬書録事主書守當樞密院令史中書令史諸軍指揮使内品符詔書藝白綾小紙五張小錦褾木軸青帶諸蕃蠻子大將軍司階司弋司候郎將已上並白綾大紙法錦褾大牙軸色帶凡修容婉容才人貴人美人綃金小鳳羅紙七張銷金標玳瑁軸紅絲網塗金銀􅜳錔司書司正尚食尚衣典寶常使金花羅紙七張法錦袋内降夫人郡君團窠羅紙七張暈緑錦標袋宗室婦常使金花羅紙七張法錦標袋宗室女素羅紙七張法錦褾袋國夫人錦銷團窠五色羅紙七張暈錦褾袋郡夫人常使金花羅紙七張見在兩府母妻使團窠法錦褾袋以上至司言司正等皆用玳瑁軸紫絲網銀􅜳錔郡君縣太君遥郡刺史正刺史以上母妻並金花五色羅紙七張餘命婦並素羅紙七張上元燃燈上元燃燈或云漢法漢祠太一自昏至晝故事梁簡文帝有列燈陳後主有光璧殿遙詠仙燈詩唐明皇先天中東都設燈文宗開成中建燈迎三宮是明唐以前嵗不常設本朝太宗時三元不禁夜上元御乾元門中元下元御東華門後罷中元下元而上元游觀冠於前代賜新火周禮四時變國火謂春取榆栁之火夏取棗杏之火季夏取桑柘之火秋取柞楢之火冬取槐檀之火而唐時惟清明取槐栁之火以賜近臣戚里本朝因之唯賜輔臣戚里帥臣節察三司使知開封府樞密直學士中使皆得厚賜非常賜例也金明池唐曲江開元天寶中旁有殿宇安史亂後盡圯廢文宗覽杜甫詩云江頭宮殿鎖千門細栁新蒲為誰緑因建紫雲樓落霞亭嵗時賜宴又詔有司於兩岸建亭館太宗於西郊鑿金明池中有臺榭以閲水戲而士人游觀無存泊之所若兩岸如唐制設亭館即踰曲江之盛也公家文書藁異名凡公家文書之藁中書謂之草樞密院謂之底三司謂之檢今秘府有梁朝宣底二卷即貞明中崇正院書也檢即州縣通稱焉已上並筆談乾徳鑄印乾徳三年重鑄中書門下樞密三司使印先是舊印縁五代舊文非公至是得蜀鑄印官祝温集自言其祖闕禮部鑄印官世襲謬篆印漢志所謂屈曲纒統以墓草者也臺省寺監及開封興元守令悉温集改鑄楊文公談苑品官䘮許擊鐘京師品官之䘮用浮屠法擊鐘初無定制景徳令文臣卿監武臣大將軍命婦郡夫人以上許於天清開寶二寺擊鐘至今以為定制賜諡周禮卿大夫卒太史於葬前賜諡祖奠之日讀誌後世有司失於申明典禮故須門生故吏録行狀子孫請諡近嵗遂有既葬而諡號終不及者天聖中孫爽王子融言乞臣寮薨謝不待本家請諡在官品合加諡者並令有司舉行詔從之並澠水燕談凱旋奏樂不避忌辰楊文正鎬江南人集賢校理澄心堂歸朝直秘閣上幸秘閣詢經義敷對稱㫖賜金紫景祐中為近侍扈從澶淵之幸洎凱旋鑾駕還闕日有司言行宮適當懿徳皇后忌辰上旋回鑾鼓吹鼙筦非便時公為儀仗使已先馳還闕備迎駕之儀遂馳騎遣問公公因奏於禮無害武王載木主伐紂時居喪尚前歌後舞况忌者乃追存思耳玉壺清話禁焚屍河東人衆而地狹民家有喪事雖至親悉燔爇取骨燼寄僧舍以至積久弃捐乃已習為俗韓稚珪鎮并州以官鏹市田數頃俾州民骨肉之亡者有安葬之地古者悖逆之人乃有焚殯之刑其士民則有歛殯祔葬之禮惟外夷禮洎僧尼許從夷禮而焚柩齊民則一禁之今韓公待俗以禮法真古循吏之事也倦游録贈官請諡唐制兼官三品得贈官如韓文公曾為京兆尹兼御史大夫終吏部侍郎而贈禮部尚書是也而觀察使多贈兩省侍郎以就三品得諡國初以來唯正三品方得諡兼官贈三品亦不得之真宗命陳彭年詳定遂詔文武官至尚書節度使卒許輟朝贈至三品請諡而吏失其𫝊寶元中光禄卿知河陽鄭立卒而輟朝非故事也事實類苑卷三十二

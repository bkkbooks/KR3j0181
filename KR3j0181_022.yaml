body:
  text: 事實類苑卷二十二宋江少虞撰宦政治績斷獄近嵗邢夀兩郡各斷一獄用法皆誤為刑曹所駁夀州有人殺妻之父母昆弟數口州司以不道緣坐妻子刑曹駁曰毆妻之父母即是義絶況其謀殺不當復坐其妻邢州有盜殺一家其夫婦即時死惟一子明日乃死其家財産户絶法給出嫁親女刑曹駁曰其家父母死時其子尚生財産乃子物出嫁親女乃出嫁姊妹不合有分此二事略同一失於生者一失於死者筆談陳晉公陳晉公為三司使將立茶法召茶商數十人俾各條利害晉公閲至第三等語副使宋太初曰吾觀上等之説取利太深此可行於商賈而不可行於朝廷下等固滅裂無取惟中等之説公私皆濟吾裁損之可以經久於是為三等稅法行之數年貨財流通公用足而民富世言三司使之才以陳公為首稱後李侍郎咨為使改其法而茶利浸失後雖屢變然非復晉公之舊法也陳晉公恕自朝升入三司為判官既而為鹽鐡使又為總置使洎罷參政復為三司使首尾十八年精於吏事朝廷藉其才晚年多病乞解利𣙜真宗議曰卿求一人可代者聽卿去是時寇萊公罷樞密使歸班晉公薦以代己真宗用萊公為三司使而晉公集賢學士判院事萊公入有檢尋晉公前後改革與立事件類為方册及以所出榜示别用新板題扁躬坐其第請晉公判押晉公亦不讓一一與之押字既而萊公拜於庭下而去自是計使無不循其舊貫至李咨為三司使始改茶法而晉公之規模漸革向之榜示亦稍稍除削今則無有復存矣東軒筆録張乖崖張尚書詠再知益州轉運黃觀以治狀入奏下詔褒美時賊鋒方斂紀綱過肅蜀民尚懷擊柝之惴嘉邛二州新鑄景德大鐡錢利害未定橫議風起朝廷慮之遣謝賓客濤為西川巡撫上臨軒諭之曰詠之性剛決強徑卿之性仁明和恕卿往濟之必無遺策宜以朕意諭詠賴卿在彼朕無西顧之憂無事宜與詠協心精議副朕倚矚謝公至蜀明宣寬詔尚書公轉蹈拜泣率從濤並轡撫勞蜀人遂安二有范延貴者為殿直押兵過金陵張忠定公詠為守因問曰天使沿路來還曽見好官員否延貴曰昨過袁州萍鄉縣邑宰張希顔者雖不識之知其好官員也忠定曰何以言之延貴曰自入萍鄉縣境驛傳橋道皆葺田萊墾野無惰農及至邑則㕓肆無賭博市易不敢喧爭夜宿邸中聞更鼓分明以是知其必善政也忠定大笑曰希顔固善矣天使亦好官員也即日同荐於朝希顔後為發運使延貴亦閣門祇侯皆號能吏也東軒筆録三乖崖張公詠尹益都日值李順兵火之後郡政未舉因決一吏杖詞不服公曰這漢兒要劔喫彼云決不得喫劔則得公命斬之以徇軍吏􅌓眙相顧自是始服公之威信李順黨中有殺耕牛避罪逃亡者公許其首身拘母十日不出釋之復拘其妻一宿而來公斷云禁母十夜留妻一宵倚門之望何疏結髮之情何重舊為惡黨因之逃亡許令首身猶尚顧望就中市斬之於是首身者繼至並遣歸業蜀民由此安居青箱雜記四張忠定公詠知通進銀臺司并州有軍校笞他部卒致死獄具奏上法官謂非所部當如凡人公執奏曰并接羌胡州兵數十萬一旦因一卒法死一校使卒有輕所部之心且生事不若杖遣於權宜為便上依法官議不數月并果有卒怨本校白晝五六輩提刀趨喧爭前刺校心胸狼籍尸下遂竄去朝廷方以公向所執為是澠水燕談五樞密直學士張詠知益州有巡檢所領龍猛軍人潰為羣盜龍猛軍人者本皆募羣盜不可制者充之標悍善鬭連入數州俘掠而去蜀人大恐詠乃召鈐轄以州牌印付之鈐轄愕然請其故詠曰今盜勢如此而鈐轄晏然安坐無討賊心是欲令詠自行也鈐轄宜攝州事詠將出討之鈐轄驚曰某今行矣詠曰何時曰即今詠顧左右張酒於其城西門上曰鈐轄將出吾今餞之鈐轄不得已勒兵出城與飲於樓上酒數行鈐轄曰某顧有請於公詠曰何也曰某所求芻糧願皆應付之詠曰諾老夫亦有請鈐轄曰何也詠曰鈐轄今往彼滅賊若無功而返必斷頭於此城下矣鈐轄震栗而去既而與賊遇果敢士衆皆還退幾十里鈐轄召其將校告之曰觀於張公謂真斬我不為異也遂復進力戰大破之賊遂大敗六張詠時有僧行止不明有司執之以白詠詠視判其牒曰勘殺人賊既而案問果一民也與僧同行於道中殺僧取其詞部戒牒三衣因自披剃為僧寮屬問詠何以知之詠曰吾見其額上猶有繫巾痕也並洓水紀聞王明王明字如晦魏郡城安人王師征嶺南為隨軍轉運使山路險絶仰給者數萬人須丁夫擔負無有闕者每下一郡一城必先保其簿書固守倉庫范蜀公蒙求劉煥治平間河北凶荒繼以地震民無糧食往往賤賣耕牛以茍延嵗月是時劉煥知澶州盡發公帑之錢以買牛明年震搖息逋民歸無牛可以耕鑿而其價騰踴十倍煥復以所買牛依元直賣與是故河北一路唯澶州民不失所由煥權宜之術也東軒筆録陶鑑淮南漕渠築埭以畜水不知始於何時舊傳召伯埭謝公所為按李翺來南路唐時猶是流水不應謝公時已作此埭天聖中監真州排岸司右侍禁陶鑑始議為復閘節水以省舟船過埭之勞是時工部郎中方仲荀文思使張綸為發運副使表行之始為真州閘嵗省冗卒五百人雜費百二十五萬運舟舊法舟載米不過三百石閘成始為四百石其後所載浸多官船至七百石私船受米八百餘囊囊二石自後北神召伯龍舟茱萸諸埭相次廢革至今為利豫元豐中過真州江亭後糞壤中見卧石乃胡武平為水閘記略敘其事而不甚詳具筆談許元許元初為發運判每患官舟多虛破釘鞠之數蓋陷水於中不可稱盤故得以為姦一日元至船場令拽新造之舟縱火焚之火過取其釘鞠稱之比所破才十分之一自是立為定額侯叔獻侯叔獻為汜縣有逃田及户絶沒官田最多雖纍經檢估或云定價不均內有一李誠莊方圓十里河貫其中尤為膏腴有佃户百家嵗納租課亦皆奧族矣前已估及一萬五千貫未有人承買者賈魏公當國欲添為二萬貫賣之遂命陳道古銜命計會本縣令佐視田美惡而增損其價道古至已閲視諸田而議增李田之直叔獻曰李田本以價髙故無人承買今又增五十貫何也堅持不可道古雅知叔獻不可欺因以其事語之叔獻歎曰郎中知此田本末乎李誠者太祖時為邑酒務専知官以汴水溢不能救護官物遂估所損物值價計五千貫勒誠償之是時朝廷出度支使錢俵民間預買箭桿雕翎弓弩之材未幾李重進叛王師征淮南而預買翎桿未集太祖大怒應欠負官錢者田産並令籍沒誠非預買之人而當時官吏畏懼不敢開析故此田亦在籍沒今誠有子孫見居邑中相國縱未能恤其無辜而以田給之莫若損五千貫俾誠孫買之為便道古驚曰始實不知但受命而來審如是君言為當而吾亦有以報相國矣即損五千貫而去叔獻乃召誠孫俾買其田孫曰實荷公惠奈甚貧何叔獻曰吾有策矣即召見佃百户諭之曰汝輩本皆下户因佃李莊之利今皆建大第髙廩更為豪民今李孫欲買田而患無力若使他人得之必遣汝輩矣汝輩必毀宅撒廪離業而去不免流離失職何若醵錢借與誠孫俾得此田而汝輩常為佃户不失居業而兩獲所利耶皆拜曰願如公所言由是誠孫卒得此田矣叔獻為尉與管界巡檢者相善縣多盜賊巡檢每與叔獻約聞盜起當急相報一旦有強盜十六人經其邑叔獻盡擒之既而歎曰巡檢豈以我為負約耶機會之速不及報然不可奪其功也於是盡推捕盜之勞於其下而竟不受賞當其獲盜時叔獻躬押至開封府府尹李絢謂曰子之才能吾深知之子可以見本府推官判官吾當率以同狀薦子也叔獻辭曰本以公事至府事畢歸邑若投謁以求薦非我志也竟不見推官判官而去並出東軒筆録張丞相張景卿丞相知潤州日有婦人夫出外數日不歸忽有人報菜園井中有死人婦人驚往視之號哭曰吾夫也遂以聞官公令屬官集鄰里就井驗是某夫與非衆皆以井深不可辨請出尸驗之公曰衆皆不能辨婦人獨何以知其為夫收付所司鞠問果姦人殺其夫婦人具共與謀筆談章惇熙寧七年元絳為三司使宋迪為判官迪一日遣使煮藥而遺火延燒計府自午至申焚傷殆盡方火熾神宗御西角樓以觀是時章惇以知制誥判軍器監遽部本監役兵往救火經由角樓以過上顧問左右以惇對翊日迪奪官勒停絳罷使以章惇代之東軒筆録邵煜邵煜知廣州鑿內濠以濟舟楫不為颶風所害後以陳世卿代之奏乞免本州計口買鹽之害五羊之民始有充衣飽食廣人歎曰邵父陳母除我二苦戚密學戚密學綸初筮仕知太和縣里俗險薄喜撰虛詞公至以術漸摩先設巨械嚴固狴牢其鞭挺絙索比他邑數倍民已悚駭次作諭民詩五十絶不事風雅皆風俗易曉之語俾之諷誦以申規警立限曰諷誦半年頑心不悛一以苛法治之果因此詩獄訟大減其詩有云文契多經嵗月深便將疆界漸相侵官中驗出虛兼實枷鎖鞭笞痛不禁大率類此江南往往有本每常嵗時與囚約曰放汝暫歸祝其先櫛沐蟣虱民感其惠皆及期而還無敢違者許仲宣許仲宣清社人三為隨軍轉運使心計精敏無絲髮遺曠征江南軍中之需當不備之際曹武惠王故欲試之凡所索則隨應王師將夜攻城仲宣隂記乞曰永夕運兵寧不食耶既食無器可乎預料陶器數十萬夜半爨成食兵將就食果束其器如數給之他率類此征交州為廣西胄士死於瘴者十七八大將孫全興失律仲宣乞奏罷兵不待報以兵屯湖南諸州開倉賞給縱其取餌謂人曰吾奪瘴嶺客死數萬生還中國已恨後時若更俟報已積尸於廣野矣誅一族活萬夫吾何恨哉又飛檄諭交人以禍福交人果送欵乞內附遣使修貢仲宣上表待罪太宗褒詔大嘉之玉壺清話陳從信太宗居晉邸知客押衙陳從信者心計精敏掌宫帑輪指節以代運籌絲忽無差開寶初有司啓奏倉儲止盡明年二月太宗因語之從信曰但令起程即計往復日數以糧奏併有可以責其必歸之限運至陳留即預關主司戒運徒先後於倉無淹留之弊每運可減二十日自泗至京舊限八十日一嵗止三運每運出淹留虛程二十日嵗自可漕一運太宗以白太祖遂卒為永制一嵗晉邸嵗終籌損年費幾約數百萬計惟失五百金屢籌不出一倉頭偶計之太宗一日登府樓遙觀尋種者賞歎精健令某府庫取金五百與之時從信不信役夫告之承昭太祖欲開濬五丈舊河以便運載吏督治有承昭者以南人諳水利使董其役承昭以絙都量河勢長短計其廣深以量鍤之濶狹以鍤纍尺以尺纍丈定一夫自早達暮合運若干鍤計鑿若干土總其都數合用若干夫以目奏上太祖謂曰不如所料索斬於河濬訖後悉如所奏上嘉之又令督諸軍子弟濬池於春明門外以習水戰後以防禦使從征太原晉人嬰城堅拒遂議板築以革納壯士蒙之為洞而人須力攻致久老我師上深憫之且時視其洞擕藥劑菜餌慰撫士卒時李漢瓊為攻城總管挽御衣以諫曰孤壘之危何啻纍卵矢石如雨陛下宜以社稷自重遂罷其幸止行班賚而已既不克又欲增兵承昭奏曰陛下有不語兵千餘在左右胡不用之上不寤承昭以馬策指汾太祖遂曉大笑曰從所取用承昭乞細布囊括土投上流以塞之不設板築可城巨方用其策授土將半水起一尋城中危蹙會蝗大起晉人間道求援契丹兵甫至遂議班師魏侍郎魏侍郎瓘初知廣州忽子城一角頺墊得一古磚磚面範四大字云委於鬼公蓋合而魏也感其事大築子城才罷詔除仲待制簡代之未幾儂智髙冦廣其城一擊而摧獨子城堅完民逃於中獲生者甚衆賊退師至筠州朝廷以公有前知之備加諫議再知廣二年召還公築城之效自論久不報有感懷詩曰羸羸霜鬢一衰翁蹤迹年來類斷蓬萬里逺歸雙闕下一身間在衆人中螭頭賜對恩雖重雉堞論功事已空淮上有山歸未得獨揮清淚向春風文潞公束詩進呈加龍圖閣尹京魏詩甚精處五羊書事曰誰言嶺外無霜雪何事秋來白滿頭錢若水錢若水為同州推官知州性急數以胸臆決事不當若水固爭不能得輒曰當奉陪贖銅耳已而果為朝廷及上司所駮州官皆贖論知州愧謝已而復然前後如此數矣有富民家小女奴逃亡不知所之奴父母言於州命録事參軍鞫之録事嘗貸錢於富民不獲乃列富民父子數人共殺女奴棄尸水中逺失其尸或為元謀或從而加功罪皆應死富民不勝捶楚自誣服具上州官審覆無異皆以為得實若水獨疑之留其獄數日不決録事詣若水廳事詬之曰若受富民錢欲出其死罪耶若水笑謝曰今數人當死豈不可少熟觀其獄詞耶且留之旬日知州屢趣之不能得上下皆怪之若水一旦詣州屛人言曰若水所以留其獄者密使人訪求女奴今得之矣知州驚曰安在若水密使人送女奴於知州所知州乃垂簾引女奴父母問曰汝今見汝女識之乎對曰安有不識也因從簾中推出示之父母泣曰是也乃引富民父子悉破枷縱之其人號泣不肯去曰微使君之賜則某滅族矣知州曰推官之賜也非我也其人趨詣若水廳事若水閉門拒之曰知州自求得之我何與焉其人不得入繞垣而哭傾家資以飯僧為若水祈福知州以若水雪寃死者數人欲為之奏論其功若水辭曰若水但求獄中人不寃死耳論功非某本心也且朝廷以此為若水功當置録事於何地耶知州歎服曰如此尤不可多及矣録事詣若水叩頭愧謝若水曰獄情難知偶有過誤何謝也於是逺近翕然稱之未幾太宗聞之驟加進擢自幕職半嵗中為知制誥二年中為樞密副使周諫議周諫議湛善射弩十發十中的隔屋射亦然嘗謂豫曰其法雖在審固然亦自有神用今以架縛弩施箭其上往往不中至於同人之射無不中的非神用而何湛為鹽鐡判官三司文帳煩夥吏胥弊欺若不究者為之立勘同法嵗減天下計帳七千道又括天下隱户三十三萬發其詭號凡十二種湖南之民掠良人踰嶺賣為奴婢湛為廣東提點刑獄下令捉搦又令自陳得男女一千六百餘人還其家而世少知之蓋古良吏也薛簡肅蜀人正月二日三日上冢知府亦為之出城置會是時薛簡肅公以二日會於大東門外有戍卒叩鄭龍胸家求冨貴鄭即以銀匙筯一把與之既出隨以告人至第二巷尾卒升屋放火殺傷傷人相以都監至捕者益多卒自知不免即下就擒都監往白簡肅公指揮只於擒獲處即處決民間以為神斷不然妄相攀引旬月間未能了得又安其徒黨反側之心也范文公范文公鎮青社會河朔艱食青之額賦博州置場納青民大患輦置之苦而河朔斛價不甚騰湧公至戒民本州納價每斗三鍰給鈔與之俾簽幕者挽金往幹曰博守席君夷亮余嘗薦論又足下之婦翁也擕書就彼坐倉以倍價招之事必可集齎巨榜數十道介其境則張之設郡中不肯假廩寄價舍可也簽稟教行事至則皆如公料斗斛時為厚價所誘貨至如山積不五日遂足而博斛亦行斛金尚餘數千緡按等差給還青民因立像祠焉文潞公文潞公為豫言初及第大理評事知絳州翼城縣未赴任有客李本者三見訪而後得見之且言某有壻為縣中巡檢幸公庇之又言曰某非獨公奉干亦有以奉助某嘗知其邑户口衆人猾難治因出一策文字皆影迹人姓名其首姓張比潞公至姓張人事已敗縣未能結丞簿尉皆云某等在此各嵗餘通邑政務為此人所持今公之來必辨之矣於是公盡得其姦狀上於州決配之邑人皆悚畏其次即石務均也初王公隨舉進士時甚貧遊於翼城逋人飯鏹執而入縣務均之父為縣吏為償錢又飯之館之於其家而母尤所加禮一日務均醉令王起舞不中節毆之王遂去明年登第久之為河東轉運使務均恐懼逃竄然王豈有意害之乎小人自隱如此也至是事敗潞公捕之當是時王公已為御史中丞矣未幾封一錠銀至縣葬石務均之母事少懈尋而王為參知政事奏務均教練使而務均亦改行自修終文之任邑中無敢肆橫者以此見潞公之才新及第已能疾惡而屏除之矣又見王公長厚而不忘一飯之恩也東齋記事事實類苑卷二十二

body:
  text: 事實類苑卷三十八宋江少虞撰詩歌賦詠真宗親選兩制館閣送劉總詩樞密直學士劉總出鎮并門兩制館閣皆以詩寵其行因進呈真宗深究詩雅方競務西崑體磔裂雕篆親以御筆選其平淡者止得八聯朝迥云夙駕都門曉微涼苑樹秋楊億止選斷句云關榆漸落邊鴻度誰勸劉郎酒十分朱巽云寒垣古木含秋色祖帳行塵起夕陽李維云秋聲如暮角膏雨逐行軒孫僅云汾水冷光搖畫㦸䝉山秋色鎮層樓錢惟演云置酒軍前樂聞笳塞上清都尉王貽永云河朔雪深思愛日并州春暖詠甘棠劉筠云極目關山髙倚漢順風鵰鶚逺凌秋上謂總曰并門在唐世將相出鎮凡闕遣從事者以題詠述寵行之句多寫佛宫道宇纂集成編目曰太原事迹後不聞其作也總後寫御選句圖立於晉祠於越亭詩公言咸平初罷處州赴闕道經饒州餘闕登於越亭前瞰琵琶州後鎮思禪寺林麓岑鬱千峯競秀真天下絶境古今留詩者百餘篇張佑云扁舟亭下駐烟波十五年遊重此過洲嘴露沙人渡淺巖梢藏竹馬蹄多層瀾漲水痕猶在古極題詩字已訛況是髙秋正圓月可堪聞聽異鄉歌劉長卿云天南愁望絶亭下柳條新落日獨啼鳥孤舟何處人生涯投越嶠世業陷邉塵草色迷征路鶯聲傍楚臣秦臺愁白首楚渚怨青蘋杳杳鍾陵暮悠悠鄱水春獨醒翻取笑直道不容身得罪風霜古全生天地仁青山數行淚滄海一窮鱗流落機心盡空憐鷗鶴親三篇絶唱也雍熙以來文士詩公自言雍熙初歸軔迄今三十年所聞文士多矣真能詩者甚鮮如闕者夙擅盛名而徐鉉梁周翰黃夷簡范杲皆前輩鄭文寶薛映王禹稱吳俶劉師道李宗諤李建中李維姚鉉陳堯佐悉當儕流後來之著名者如路振錢熙丁謂錢易梅詢李挺蘇為朱嚴陳越王曾李堪陳談吕夷簡宋綬邵煥晏殊江任焦宗古布衣有錢塘林逋縉雲周啓明錢氏諸子有封守惟濟供奉官昭度鄉曲有今南鄭殿丞兄故黎州家君極髙安薄覽宗人字牧之子並有佳句不以擲舉而錢惟演劉筠特工於詩其警䇿殆不可遽數自兵部而下公之所嘗舉今略記之兵部春望杳杳煙蕪何處盡搖搖風柳不勝垂徐鉉遊水蘭亭云蘭烟破浪城隂直玉勒穿花苑樹深習水戰云千帆雨助隂山勢萬里風馳下瀨聲病中題云向空咄咄煩書字舉世滔滔莫問津謫居云野日蒼茫悲逺舍水風隂慘濕貂裘陳祕監歸泉州云三朝恩澤馮唐老萬里江關賀監歸宿山寺云落宿依樓角歸雲擁殿廊梁周翰應制云百花將盡牡丹拆十雨初晴太液春黃夷簡題人山居云宿雨一番蔬甲拆春山幾焙茗旗香范杲頌聖云千里版圖來浙右一聲金鼓下河東鄭文寶春郊云百草千花路微風細雨天重經貶所云過關已躍樗蒲馬誤喘猶驚顧兔屏洛城云星沈㑹節歌鍾早天近斜陽烟樹微張靈州云越絶曉城蝴蝶夢單于秋引盡龍聲長安送别云杜曲花光濃似酒灞陵春色老於人送人歸湘中云滿帆西日催行客一夜東風落楚梅南行云失意慣中遷客酒多年不見侍臣花悽靈云舊井霜風仙界橘雙溪晴落海邊鷗送人知韶州云人辭碧落春風晚花老朱陵古渡頭水熙陵云承露氣清駒送日觚稜人靜鳥呼風邊上云鬢須相似雪峰外寂寥烟薛映送人鄂州云黃鵠晨霞傍樓起頭陀秋草繞碑荒吳淑送朱致政云洛殿夜涼初閣筆渚宫歲晚得懸車劉師道寄别云南浦未傷春草碧北山仍愧曉猿驚與張祕云久師金馬客就敵玉溪生荷花云有路期奔月無媒與嫁春殘花云金谷路塵埋國艷武陵溪水泛天香寄陳龍圖云城瞻北斗天何逺夢斷南柯日未沈歎世云野馬飛窗日醯雞舞瓮天春雪云青帝翠華沈物外素娥孀影弔雲端又雪云三千世界銀沈色十二樓臺玉作層湘中云凌波帝子魂何在芳草王孫怨未歸李宗諤春郊云一溪脆緑浮􅗌鶒萬樹春紅呌杜鵑蘇承㫖云金鑾後記人爭寫玉署新牌帝自書李建中送人云山程授館聞鴻夜水國還家欲雪天李維渚宫亭云故宫芳草在往事暮江流朱致政云清朝解組猶強健白首還鄉正太平和人贈馬太保云轉盼回巖電分鬚磔蝟毛寄洪湛云謫去賈生身健否秋來潘嶽鬢斑無姚鉉錢塘郡云疏鐘天竺曉一雁海門秋陳堯佐潮州徴還云君恩來萬里客路出千山送种放云風樵若耶路霜橘洞庭秋送朱荆南云部吏百函通爵里從兵千騎屬鞬櫜錢熙送人金陵拜掃云鶴歸已改新城郭牛卧重尋舊墓田丁謂和錢易云珊瑚新筆案雲母舊屏風送章南安云楊花過嶺路桃葉渡江船章明州云泣珠泉客通關市種玉仙翁寄版圖陳荆南云楚客夢雲鈴閣密郢人歌雪射堂開錢易畫景云雙蜂上簾額獨鵲下庭柯芭蕉云緑章封奏緘初啓青鳳來王尾乍開梅詢隂陵云千重漢圍合一夜楚歌聲李拱春題村舍云犬眠花影地牛牧水聲坡蘇為湖亭云春波何限緑白鳥自由飛劉端州云夜浪珠還浦春泥象印蹤宋嚴贈徐常侍云寓直有誰同騎省立班獨自戴貂冠陳越侍宴云千鍾人既醉九奏鳳來儀與劉從云誰憐松下韻不廢洛中吟李秦州云擁路東方騎懸腰左顧龜王曾李駙馬拜陵云人畏軒臺久春歸雨澤多李堪哭黎州家君云桐鄉留語葬泉路在生悲周建州云海月隨帆落溪花繞驛流送人云雷風有約春虯振霜雪無情紫蕙枯退居云雨密緑桐潤潮平釣石沈陳談閒居云籠雞對忩語庭雀繞門飛吕夷簡春早云梅無驛使飄零盡草怨王孫取次生九日呈梅集仙云人歸北闕知何日菊應東籬自去年寒食云人為介推初禁火花愁青女再飛霜宋綬送人知江陵云奇才劍客當前隊麗賦騷人託後車送人洪州云江涵帝子雲飛閣山際真君鶴馭天周賢良云楚澤傷春落鵯鵊長安索米愧侏儒邵煥送晏集南歸云官船風破浪關吏鼓通晨晏殊與張臨川云籬邊菊秀先生醉桑下雛嬌稚子仁又云東陽詩骨秀南浦别魂消章明州云騷客江山知有助秦源雞犬更相關送人洪州云射斗氣沈龍已化置芻人去榻猶懸江任送人云珠盤臨路泣斗印入鄉提焦宗古送人遊蜀云芳樹髙低啼蜀魄朝雲濃淡極巴天贈周𤣥良云南陽客自稱龍卧東魯人應歎鳳衰林逋湖山云片月通蘿徑幽雲在石床周啓明近臣疾愈云一丸童子藥五返使人車皇甫提刑云鴟夷江上湖田稔牛斗星邊貫索空錢惟濟太乙宫醮云庭下焚香連宿霧林間鳴珮起棲鸞從駕西巡云曉陌壺漿滿春風騎吹長故主第云鳳簫通碧落星石辨靈源錢昭度村居云黃蜂衙退海潮落白蟻戰酣山雨來大寒云雨被北風雖作雪水愁東海亦成氷金陵云西北髙樓在東南王氣銷梅花云東北風吹大庾嶺西南日映小寒天雁云三年别館風吹雪萬里長沙月照來秋日華山云人間路到三峰盡天下秋隨一葉來又鄭殿丞云青鳥幾𫝊王母信白鵝曾換右軍書將至京云近闕已瞻龍虎氣思鄉猶望斗牛星家君黎州赦至云山川百蠻國雨露九天書寄逺云吳越自為迢遞國參商元是别離星自遣云天上羲輪都易失人間堯厯自難逢哭諸屯田云部中車雨春無潤水上郎星夜殞光感懷云頓纓狂走鹿喣沫倦游鱗心知云速客苦驚雲聚散相逢多倍月虧盈自詠云剛腸欺竹葉衰鬢怯菱花淚云一斑早寄湘川竹萬㸃空遺峴首碑春晝云人歸漢后黃金屋燕在盧家白玉堂寄鱗云世味嫌為枳時光怨落蓂閒居云歌懷飯牛起書憤抱麟成蟬云二子自不食三閭何獨清登樓云逺水淨林色微雲生夕陽詠塵云已傷花榻滿休妒畫梁飛凡公之所舉者甚多值公病心煩不喜人申問今聊記其十之一二耳錢惟演劉筠警句近年錢惟演劉筠首變詩格學者爭慕之得其標格者蔚為佳詠二君麗句絶多如惟演奉使塗中云雪意未成雲著地秋聲不斷雁連天又云客亭厭見名長短村酒那能辨聖賢送僧遊楚云宿舍孤烟起行衣夢雨涼張并州云戈矛巡霧夕鐘鼓宴花晨章衢州云平檻晚波吳舫渡繞城春樹越禽飛章南安云離人南浦多春草越鳥棲枝有早梅劉潭州云坐激鮮颷湘竹晚樹寒涼雨越禽歸李太僕北使云漢月隨移帳燕鴻伴解鞍何袁州云疏鐘靜起軍城晚華表雙髙水國秋陳江陵云深沈珠網通歸夢紫翠春山接去舟太一宫云神庭古柏啼烏起齊室虛簾宿霧通送人云思滿離堂酒魂驚客舍烏髙泉州云東南一尉霄烽息西北髙風晚望迷章分亭云小雨郊原連苦霧夕陽樓閣照丹楓東封應制云羽毛相野駕宴喜魯郊民送余之處州云輕颷使車逺明月直廬空張僕射判河陽云緑野桑麻連泗水黃鍾歌吹擁千兵孫永興云魚尾故宫迷草樹龍鱗平隰自風烟漢武云五候東溟邀鶴駕幾窮西極待龍媒公子云歌翻南國桃根曲馬過章臺杏葉韀槿花云欲作飛烟散猶憐返照遲荷花云淚有鮫人見魂須宋玉招禁中鶴云天淵風雨多秋思遼海烟波失舊期無題云有時盤馬看遊懶盡日投壺笑未回又曰春瘦已寬連理帶夜長誰有辟寒金元夜云九枝火樹連金闕萬里霜輪上璧璫馬延州云沃野桑麻涵細雨嚴城鼓角送殘陽劉筠禁直云雨勢宫城濶秋城禁樹多陜州從事云角迥含商氣橋長斷落塵周賢云崎嶇一乘傳憔悴五羊皮章南鄭云甲士氣豪𫝊漢俗丙魚味美敵吳鄉李太僕北使云望月卿曹重占星使者賢送僧云卷袖齊鐘斷搘笻嶽雨餘僧崇惠云醉令難同社仙鵝好換書葉金華云柔桑蔽野鳴雛雉髙柳含風變早蟬劉潭州云前席久虛溫室樹心旌無奈楚風長又云沙禽兩兩穿鈴閣江草依依接射堂章九隴云溪箋未破水生硯爐酒新燒雷滿天又周賢良云春風亂鶯囀夕霧一鴻冥張嶺南云山月愁􅏈子風濤怒鱷魚西巡云龍駕昌明御天旗水一神張婺州云大野幾星分婺女清風萬古感顔烏章南安云嶺雲夏變梅蒸早越賈秋藏桂蠧多西京首坐云縈河帶繞中天濶碧落星懸大士居題雪云劉伶醉席梅花地海客仙槎粉水天利州轉運云鴟蹲野芋難為食雪積鹽泉久置宫章分寧云鶴伴鳴琴聽事晚鳥驚調角武城秋處州云朱飾兩轓巡屬邑月留雙筆在中臺閣宿云二讓月臨承露掌九雛烏繞守宫槐又云酒供硯滴濡毫冷太守更籌沃漏長雪闕云已回鄰面三年粉又結寒蠶幾繭氷汾陽道中云鼓音闕繩逺舞節鳴鸞玉步遲楊洪州云桃葉橫波人共醉劍光射斗獄常空李秦州云右墄獨登溫樹密前旗雙抗嶺雲南劉潭州云洛田荒二頃楚浪漲三篙槿花云吳言何薄命楚夢不終朝宫詞云難銷守宫血易斷舞鸞腸又云虹跨層樓繞螢飛下苑涼夏日云雲容倐變千峰險草色相沿百帶長新蟬云翼薄乍舒宫女鬢蛻輕全解羽人尸公子云行庖爨蠟雕胡熟求埒鋪金汗血驕明皇云梨園法部兼胡部玉輦長亭更短亭荷花云湔裙無限水障袂幾多風别墅云雲際尋撞技花間笑壁樓無題云荷心出水終無定蘿蔓從風莫自持又云藻井風髙蛛壞網杏梁春暖燕爭泥詠梨云先時櫻熟煩羊酪信逺梅酸損瓠犀洞户云密鎖香雲深處户亂飄梨雪晚來天贈希聿云吟餘雪散葉話久麈遺毛夕陽云塞迥橫烟紫江清照葉丹閨中云籠禽思隴樹洞犬識秦人柳絮云平沙萬里經春雪廣陌三條盡日風屬疾云簾鳴風笑厨烟絶月樹烏驚藥杵喧燈夕云金吾抱箭催壺水玉宇來風滿砌蓂禁中云萬年宫省樹五色帝家禽其警句絶多此但所記者耳近世釋子詩公嘗言近世釋子多工於詩而楚僧惠崇蜀僧希盡為傑出其江南僧元淨夢闕浙右僧寶通守恭行肇鑒微簡長尚能智仁休復蜀僧惟鳳皆有佳句惠崇贈裴太守云行縣山迎舸論兵雲繞旗髙生山閣坐云對語淮潮起題詩楚月新周達州云鎖城山月上鳴角海鷗驚東林寺云鳥歸松墮雪僧定石沈雲光梵師云梵容存古像唐語入新詩明大師云門掩前朝樹心懸别郡峰送李堪云秋聲動羣木暮色起千山希盡雁蕩山云來書逢歲晚去夢歷峰危廣南陳轉運云春生桂嶺外人在海門西僧東歸詩云帆影隨寒雁經聲隱暮潮宋承㫖林亭云雪溜懸危石棊燈射逺林贈僧云漱齒水溪逺開禪雪屋深送人云玉繩天濶逺金折海闕句學士云曉天金馬路晚歲石霜心寄人云山日秋光短江虹晚影低新津尉云劍月啼猿苦江沙濯錦寒北宫書亭云花露盈蟲穴梁塵落燕泥登上人云寄禪關樹老乞食塞城荒僧歸新安云風泉舊聽僧忩改雲穴曾行鳥徑殘春山云芳樹尋雲老孤泉落石危送人歸南海云落日橫秋島寒濤兀夜船寶通題相國寺云下朝人𢃄天香入出定僧迎御仗來守恭佛迹峰云布髮人來絶銜花鹿去多朝海峰云影落陽侯宅髙連覺帝居行肇送僧云聽錫樵停斧窺禪客立門送人之鄞江云江深鼇背出帆影斗邊飛簡長送人歸寧云烟壘沈寒角霜空擊怒鵰尚能送僧歸浙右云霜州楓落冷水館月生寒送僧歸四明云古寺山光滿重城海氣遙送人云西風隨雁急寒柳向人疏孫大諫知永興軍云關河虎符重殿閣獸鐶閒智仁溪居云寒聲病葉落曉色凍雲開僧歸天台云路遙無去伴山叠有啼猿冬夕云風忩燈易滅雪屋夜偏長休復送道士西遊云日暮長安道秋深太白峰惟鳳秋日送人云去路正黃葉别君堪白頭哭度禪師云海客傳遺偈林僧寫病容皆公之所舉略記之云爾公又言應集當代名公詩為筆談時有下江吳僧聞之競以詩為贄擇其善者多寫入筆談中唱和聨句唱和聨句之起其源逺矣自舜作歌臯陶揚言賡載及柏梁聨句顔延年有和謝監𤣥暉有和伏武昌登孫權故城等篇梁何遜集中多聨句至唐朝文士唱和聨句固多元稹作春深題二十篇並用家花車斜四字為韻白居易劉禹錫和之亦同此四句令狐楚所和詩多次韻起於此凡聨句或兩句四句亦有對一句者謂之轆轤體見楊文公談苑李白詞平林漠漠烟如織寒山一帶傷心碧暝色入髙樓有人樓上愁玉階空佇立宿鳥歸飛急何處是歸程長亭連短亭此詞不知何人寫在鼎州滄水驛樓復不知何人所撰魏道輔泰見而愛之後至長沙得古集於子宣內翰家乃知李白所撰杜工部詩陳舍從易當時文方盛之際獨以醇儒古學見稱其詩多類白樂天蓋自楊劉唱和西崑集行後進學者爭效之風雅之變謂之崑體由是唐時諸詩集幾廢而不行陳公時偶得杜集舊本文多脫誤至送蔡都尉詩云身輕一鳥其下脫一字陳公因與數客各拈一字補之或云疾或云落或云趂下莫能定其後得一善本乃是身輕一鳥過陳公歎服以為雖一字諸君亦莫到也九僧詩國朝浮圖以詩名於世者九人故時有集號九僧詩今不復傳矣余少時聞人多稱其一曰惠崇餘八人者忘其名字也余亦略記其詩有云馬放降來地鵰盤戰後雲又云春生桂嶺外人在海門西其佳句多類此其集已亡今人多不知其所謂九僧者矣是可歎也周朴詩唐之晚年詩人無復李杜豪放之格然亦務以精意相髙如周朴者措思尤艱每有所得必極雕琢故時稱其詩曰鍛鍊雖未及成篇已播人口其名重當時如此而今不復𫝊矣余少時猶見其集其句有云風暖鳥聲碎日髙花影重又云晚來山鳥閙雨過杏花稀誠佳句也評梅蘇二家詩聖俞子美齊名於一時而二家詩體特異子美筆力豪肆以超邁橫絶為奇聖俞覃思精微以深逺閒淡為意各極其長雖善論者不能優劣也余嘗於水谷夜行詩略道其一二云子美氣方雄萬竅號一意有時肆顛狂醉墨灑滂霈譬如千里馬已發不可殺盈箋盡珠璣一一難揀汰梅翁事清切石齒潄寒瀨作詩三十年視我猶後輩文辭愈精新心意雖老大有如妖嬈女老自有餘態近詩尤苦硬咀嚼且難嘬又如食橄欖真味久愈在蘇豪亦氣轢舉世侵驚駭梅窮獨我知古貨今難賣語雖指二子謂粗然不能優劣之也事實類苑卷三十八
